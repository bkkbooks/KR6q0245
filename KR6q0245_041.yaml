body:
  text: 古杭白巖嗣祖沙門淨符彚集南十潭州石霜慈明楚圓禪師南十汾陽昭嗣室中常插劒一口旁置水一盆草鞋一緉凡見僧參遽曰看劒稍涉擬議便喝出天童華云我當時若見便去左耳邊低聲下一轉語待他貪觀天上却與一指擬議拔劒便斬驀拈拄杖下座一時打散高峰妙云大小慈明勞而無功西峰不動一鎗一旗從教鳧短鶴長何故年年九月九遍地菊花香棲霞成云慈明如漢高之歌大風相似若寢食不能一日去諸懷也豈其終身以干戈待天下乎何恐懼如此大溈海云慈明老人與麼施設大似做成圈繢坑陷平人大溈者裏則不然有僧入門便高聲云仔細伊若眼目定動連棒打出慈明與永首座同辭汾陽後相從二十年終不脫灑一夕圍爐夜深明以火箸敲炭曰永首座永首座永咄曰野狐精明以手指曰訝郎當漢又恁麼去也永於言下頓悟高峰妙云慈明無端坑陷平人合喫三十棒永首座不合隨風倒柂亦當代喫十棒或有個抱不平底出來道西峰聻只向道心不負人面無慚色龍池微云永公雖然悟去却被火爐看破慈明雖有起死回生手段要且不出野狐見解好與一坑埋却慈明問真點胸如何是佛法大意真曰無雲生嶺上有月落波心明呵之曰頭白齒黃作者般見解真却問明如何是佛法大意明曰無雲生嶺上有月落波心真於言下大悟中峰本云驅耕夫牛奪飢人食慈明老人未為好手真點胸雖則向者裏懸崖撒手絶後再蘇若要知佛法大意更參三十年始得翠巖哲云慈明用向上鉗錘敲出鳳凰五色髓真老於言下吐氣撲碎驪龍明月珠雖則師資妙叶啐同時撿點將來未免喫翠巖手中棒何故無雲生嶺上有月落波心神鼎僼云慈明雖解就窠打劫怎奈與賊過梯翠巖悟則不無其如有屈無呌處何故聻早知燈是火飯熟已多時白巖符云慣敲識鎖善破情關瀏陽手段有之真公雖然悟去文成偶爾若是佛法大意又豈止未曾夢見慈明示衆一切聖賢皆以無為法而有差別前是案山後是主山那個是無為法良久曰向下文長付在來日天童華云天童也著一隻眼一切聖賢皆以無為法而有差別東拂于逮西瞿耶尼南閻浮提北單越到處去來不如在此天童忞云山僧也著一隻眼一切聖賢皆以無為法而有差別翻身躍倒劒門關大地山河無寸土廣教玉云慈明應菴二大老若有轉身處佛法到今日不至掃土廣教別資一路一切聖賢皆以無為法而有差別盞子撲落地碟子成七片相罵饒你接嘴相唾饒你潑水還會麼擊拂云大海若知足百川應倒流慈明冬日榜僧堂作此字二三其下注曰若人識得不離四威儀中首座見曰和尚今日放參明聞而笑之龍翔欣云衆中盡作奇特商量其奈旁觀者哂龍翔則不然慈明如蟲禦木首座偶爾成文崑崙來處無涓滴流出黃河九曲渾芙蓉覺云大小慈明向威音王以前拈出一個膠盆子首座隨邪逐惡便向他機境上起模畫樣養子不及父家門一世衰山僧當時若在直向道草本不勞拈出神鼎僼云一人肘後符靈難瞞識者一人頂門眼正已墮圈攣撿點將來各有差池雖然伯牙與子期不是間相識然而天童今晚不可空然拈拄杖空中打一圓相云若有人跳得出來朝與他一腰玉泉布裩東塔熹云大小石霜雖慈悲太煞善巧多方撿點將來也是好肉剜瘡慈明問顯英首座近離甚處曰金鑾去夏在甚處曰金鑾前夏在甚處曰金鑾先前夏在甚處曰和尚何不領話明曰我也不能勘得汝教庫下供過奴子來勘且點一碗茶與汝濕口愚菴盂云石霜不奈者擔板漢何只得打個懸空斤斗何不與渠本分草料趕出山門絶教渠一世向金鑾坐著滁州琅琊慧覺禪師南十汾陽昭嗣僧問拈椎竪拂即不問瞬目揚眉事若何瑘曰趙州曾見南泉來曰學人未曉瑘曰今冬多雨雪貧家怎奈何寶壽方云琅瑘與麼答話可謂寶藏大開怎奈不遇高鑑功成浪施然不因夜來雁怎見海門秋琅瑘上堂拈拄杖曰盤山道向上一路滑南院道壁立千仞險臨濟道石火電光鈍琅瑘有定乾坤底句各各高著眼高著眼卓拄杖下座白巖符云三個老古錐被琅瑘各與一杓惡水潑了也更道我有定乾坤句諸昆仲祇如他卓拄杖下座還是定乾坤句不是定乾坤句良久云者杓惡水却是琅瑘自潑了也琅瑘因僧問清淨本然云何忽生山河大地瑘曰清淨本然云何忽生山河大地僧有省松隱然云騎賊馬趕賊大小琅瑘固是作家然猶欠淘冶在今日或有問龍峰清淨本然云何忽生山河大地劈脊便棒且道與琅瑘是同是別有眼衲子試辨看資福廣云琅瑘和尚就窠打劫不資餘力信是敏子若清淨本然畢竟不知下落瑞州大愚守芝禪師南三汾陽昭嗣示衆三世諸佛不知有黧奴白牯却知有乃拈起拂子曰黧奴白牯總在者裏放光動地何謂如此兩段不同徑山杲云大愚若無後語洎合被黧奴白牯換却眼睛雖然如此也未免稱椎蘸醋愚菴盂云大愚拈個黧奴白牯還曾夢見麼大愚問侍者曰你問訊了一邊立地是什麼道理曰不會愚曰過者邊立者便過愚曰無端無端天寧琦云成人者少敗人者多廣胤標云侍者却難得何以見得聻不因夜來雁怎見海門秋大愚示衆竪窮三際橫遍十方拈起也帝釋心驚放下也地神膽戰不拈不放喚作什麼自曰蝦蟇靈巖儲云祥符則不然竪窮三際橫遍十方拈起也至簡至易放下也同天同地不拈不放喚作什麼自云阿喋大愚因僧問通身是眼口在什麼處愚曰三跳曰不會愚曰章底詞秋罷歌韻向春生愚菴盂云大愚果有懸河之辨怎奈者僧無眼大愚示衆大家相聚喫莖虀若喚作一莖虀入地獄如箭射能仁鑑云若不喚作一莖虀亦入地獄如箭射畢竟如何但能飯向無心碗自有人提折腳鐺靈泉開云恁麼説話大似豆腐拆骨醋裏除酸西山又且不然大家共喫者莖虀若不喚作一莖虀入地獄如箭何也棒打石人頭只要論實事舒州法華全舉禪師南十汾陽昭嗣到琅瑘瑘問近離甚處華曰兩浙曰船來陸來華曰船來曰船在甚處華曰埠下曰不涉程途一句作麼生道華以坐具摵一摵曰杜撰長老如麻似粟拂袖而出瑘問侍者此是什麼人者曰舉上座瑘曰莫是舉師叔麼先師教我尋見伊遂下旦過問上座莫是舉師叔麼莫怪適來相觸忤華便喝復問長老何時到汾陽曰某時到華曰我在浙江早聞你名元來見解只如此何得名播寰宇瑘遂作禮曰某甲罪過徑山杲云賓則始終賓主則始終主二大士驀劄相逢主賓互換直下發明臨濟心髓苟非徹證向上巴鼻具出常情正眼未免作得失論量雲門信云拳來腳去本分鉗錘若將破提籃盛水救火笑殺旁觀三十年後有人説破東山澓云衆兄弟向二尊宿舌頭上打得個鞦韆過來方得道出常情非特不被是非絆却抑且即是非而作佛事不然君向西秦我之東魯寶壽方云硬者硬似鐵軟者軟如綿發揮臨濟綱宗則不無正眼看來也是鼓粥飯氣青龍斯云二老一賓一主一擡一搦發明臨濟家風則不無怎奈都來是個小家子禪雲門今日若有法兄到來既本問他船來陸來想他亦不道在河下步下但只喚侍者汲耶溪水烹罏峰茶喫了促膝抵掌談笑寒暄而已且道是世諦流布別有佛法良久云須知遠煙浪別有好商量雲巖學云舉上座可謂竿木隨身逢場作戲雖然若無琅瑘唱拍相隨那得陽春雪曲東塔熹云二老宿言中帶戟語內藏鋒雖則碁逢敵手要且識者難瞞祇如一人拂袖一人作禮意歸何處具眼者定當看資國秀云琅瑘有陷虎之機法華有擒龍之作雖則二俱作家而法華猶未免暗輸一籌明眼者試辨看日云龍象蹴踏全主全賓終始還他二俱作家雖然者裏有三十棒二人平分法華示衆釋迦不出世達磨不西來佛法遍天下談玄口不開徑山杲云作賊人心虗愚菴盂云大小法華龍頭蛇尾一指海云既曰談玄為什麼又道口不開乃以如意擊案云還會麼若將耳聽終難會眼處聞來方始是南嶽芭蕉谷泉禪師南十汾陽昭嗣到慈明明問白雲橫谷口遊人何處來泉左右顧曰夜來何處火燒出古人墳明曰未在更道泉乃作虎聲明以坐具便摵泉接住推明置禪牀上明却作虎聲泉大笑曰我見七十餘員善知識今日始遇作家龍翔欣云若論作家總未是在何也一人得體不得其用一人得用不得其體如何敢稱臨濟兒孫諸德你若撿點得出非唯圓他古人舊話亦免今日鈍置我無傳和尚驀拈拄杖卓一卓云棒頭有眼明如日要識真金火裏看天寧琦云錯下名言當時慈明怎容得者風顛漢恁麼道更與一坐具看他作個什麼伎倆才眼目定動便連棒趂出臨濟法道未致寂寥愚菴盂云二大老驀拶相逢如馬伏波陳師反正俱妙似孫武子用兵進退有宜如龍插翼似虎戴角直是攖他不得近他不得雖然臨濟門下足可觀光若在顯聖者裏乃拍左案云且立一邊看谷泉同慈明山行遇一毒龍湫泉捉明同浴明掣肘去泉解衣跳入霹𮦷隨至腥風吹雨林木振搖明蹲草中意泉死矣須臾晴霽泉乃引頭出波間曰㘞南澗問云谷泉拚得一條窮性命要驗天下衲僧却被慈明老漢勘破黃檗琦云谷泉井底蝦蟇年久月深成精作怪與毒龍何異大小慈明掣肘而去雖然不被他惑未免在草中蹲不得出頭若是山僧待引頸時一棒打殺免致腥風作浪魔魅人家男女資福廣云谷泉賣弄若無慈明證據不免徒勞安吉州天聖皓泰禪師南十汾陽昭嗣到琅瑘瑘問埋兵掉鬬未是作家匹馬單鎗便請相見泰指瑘曰將頭不猛帶纍三軍瑘打泰一坐具泰亦打瑘一坐具瑘接住曰適來一坐具是山僧令行上座一坐具落在甚麼處泰曰伏惟尚饗瑘拓開曰五更侵早起更有夜行人泰曰賊過後張弓瑘曰且坐喫茶白巖符云二老相見可謂遇故鄉人説故鄉話然本色固是本色撿點將來未免俱帶些子客氣青十舒州投子義青禪師青十太陽玄嗣因僧問師唱誰家曲宗風嗣阿誰子曰威音前一箭射透兩重山曰如何是相傳底事子曰全因淮地月得照郢陽春曰恁麼則入水見長人也子曰祇知金玉異那辨楚王心僧禮拜子以拂子擊之報恩倫云者僧恁麼問投子恁麼答宗中辨的量外轉機可謂事存函蓋合理應箭鋒拄還曉會得也無其或莽鹵漫汗報恩為你饒舌拈拂子云笑把金針穿斷線殷勤分付到兒孫擲下拂子崇先奇云開疆闢土革故鼎新投子老人自是一代英傑且道者一隻箭如今落在什麼處有人道得天下橫行投子因芙蓉楷參問祖師言句如家常茶飯離此之外別有為人處麼子曰汝道寰中天子還假堯舜禹湯也無蓉擬進語子以拂子驀口摵曰汝發意來早有三十棒也蓉忽開悟禮拜便行子曰且來闍黎蓉不顧子曰汝到不疑之地耶蓉掩耳而去棲霞成云芙蓉當時直出豈不使人疑著被投子輕輕拽回不覺全身漏逗到者裏若能興波作浪管教投子回互不來崇先奇云俊哉大似破壁飛騰三十棒分付得著雖然撿點將來猶少三十棒在郢州興陽青剖禪師青十太陽玄嗣在太陽作園頭種瓜次太問甜瓜何時得熟陽曰即今熟爛了也曰揀甜底摘來陽曰與什麼人喫曰不入園者陽曰未審不入園者還喫也無曰汝還識伊麼陽曰雖然不識不得不與太陽笑而去崇先奇云瓜熟子離離不入園者坐享無功太陽父子恁麼揀辨可謂甜者徹蒂甜噫白巖符著語云甜瓜何時得熟平地上撈甚魚蝦即今熟爛了也面皮厚多少揀甜底摘來深入虎穴與什麼人喫倒轉鎗頭來也不入園者話作兩橛未審不入園者還喫也無大好一拶汝還識伊麼蒼天蒼天雖然不識不得不與是何言歟笑而去且信一半興陽因僧問娑羯出海乾坤震覿面相呈事若何陽曰金翅鳥王當宇宙個中誰是出頭人曰忽遇出頭時又作麼生陽曰似鶻捉鳩君不信御樓前驗始知真曰恁麼則叉手當胸退身三步也陽曰須彌座下烏龜子莫待重教點額痕報恩秀云者僧如牢度差與舍利弗創給孤獨園時鬬勝然龍固為鱗蟲之長其如終不免為妙翅之食幻寄稷云剖公著賊不知更授之太阿可悲可痛越州天衣義懷禪師青十雪竇顯嗣示衆百骸俱潰散一物鎮常靈百骸潰散皆歸土一物常靈甚處安南堂靜云一物常靈甚處安長空雲散碧天寬蓮宮佛剎花無數眨起眉毛仔細觀天寧琦云觀則不無喚什麼作一物喝一喝能仁鑑云南堂恁麼道只堪入佛不堪入魔山僧見處也要諸人共知亦有一頌一物長靈甚處安轉身踏破月團團刀山劍樹須摧折熱鐵煬銅飲必乾香山濟云既是百骸潰散喚什麼作一物良久云一物常靈甚處安可中有句許誰參雲收霧卷秋空靜萬里蟾光玉一團天衣示衆古人道五蘊山頭一段空同門出入不相逢無量劫來賃屋住到頭不識主人翁有老宿云既不識他當初問什麼人賃恁麼拈也太遠在何故須知死人路上有活人出身處活人路上死人無數那個是活人路上死人無數那個是死人路上活人出身處若撿點得分明拈却炙脂帽子脫却鶻臭布衫徑山杲云天衣古佛美則美矣善則未善具眼衲僧試甄別看愚菴盂云辨金鍮分玉石還他天衣古佛不解出身未免向鬼窟裏作活計者裏甄別得出正好戴却炙脂帽子穿却鶻臭布衫且道與古人是同是別南康雲居曉舜禪師青十洞山聰嗣初參洞山一日如武昌行乞至劉居士家士曰老夫有一問答得相契即開疏否則且請還山遂問古鏡未磨時如何居曰黑似漆曰磨後如何居曰照天照地士揖曰且請上人還山拂袖入宅居懡㦬而還洞山問何返太速耶居具言前事山曰你問我我與你道居遂問古鏡未磨時如何山曰此去漢陽不遠磨後如何山曰黃鶴樓前鸚鵡洲居於言下大悟天童忞云居士即俗明真誰言世上無仙客雲居行廛悟道須信壺中別有天然從長撿點當時未離鄂州城薦去猶較些子若向洞山門下悟來直是隔雲千里望長安何故天酥酡飯非珍饌一味園蔬飽即休象田現別前語云門前水數曲別後語云屋後山萬層雲居上堂諸方有弄蛇頭撥虎尾跳大海劍刃裏藏身雲居者裏寒天熱水洗腳夜間脫襪打睡早朝旋打行纏風吹籬倒喚人夫劈篾縛起天童忞云雲居與麼住持極是省緣撿點將來翻成多事何故逢人且説三分話未可全拋一片心洪州刺史許式居士青十洞山聰嗣一日與泐潭澄上藍溥坐次潭問聞郎中道夜坐連雲石春栽帶雨松當時答洞山甚麼話公曰今日放衙早潭曰聞答泗州大聖揚州出現底是否公曰別點茶來潭曰名不虗傳公曰和尚早晚回山潭曰今日被上藍覷破藍便喝潭曰須是你始得公曰不奈船何打破戽斗灜山誾云賊來相趂客來相待一個引玉拋磚一個埋兵掉鬬無端殃及上藍真個不奈船何打破戽斗要識三大老面目麼琵琶隨手撥簫鼓應時鳴荊門軍玉泉承皓禪師青十北塔廣嗣僧入室次有狗子在旁泉叱一聲狗子便出去泉曰狗却會你却不會灜山誾云玉泉用盡伎倆逞盡機謀者僧不妨坐觀成敗玉泉一日因衆集泉問曰作麼衆曰入室泉曰待我抽解來及上廁畢來見衆僧不去以拄杖趕散白巖符云與麼做處雖謂迥出常情然撿較將來猶帶粥飯氣在若是山僧見衆僧不去但喚將水來待伊將水至乃洗手云事訖就水當願衆生出世法中速疾而往便休玉泉示衆運推移布裩赫赤莫怪不洗無來換替薦福璨云薦福當時若見即向他道少賣弄玉泉因蘇東坡微服過訪泉問尊官高姓坡曰姓稱是稱天下老和尚底稱泉乃喝一喝曰且道者一喝重多少坡無對於是尊禮之天寧琦云玉泉是作家宗匠東坡是當世大儒驀劄相逢發揮此道盡謂東坡休去稱尾無星殊不知八兩半斤總在自家手裏雖然如是也須扶起玉泉只如他道者一喝重多少多少人道不得直饒道得更與一喝罄山修代東坡云猶未出定盤星在天界盛代子瞻撫掌云草賊大敗天童忞云叢林商量盡道子瞻胸藏萬卷不須玉泉一喝便見瓦解氷消殊不知玉泉墻塹不牢輕輕被他一拶直得全身敗露大衆請簡點看那裏是他敗露處若簡點不出未免總被俗官勘破金粟元云盡道東坡大儒稱子折却誰知玉泉老漢一釣便上當時學士若知有轉身句敢保天下長老不奈伊何雖然也須扶起玉泉喝一喝西遁超云東坡固是鈍漢玉泉亦太殺欺人見人可欺遂爾不顧自己敗缺東坡説姓稱便與他稱一稱萬一東坡云果然上鈎來也或云恰值牙行不在豈不使俗官反居上風巖代東坡云不勞再驗玉代東坡云者漢一釣便上洪州法昌倚遇禪師青十北禪賢嗣問英勝二首座曰我欲來者裏起法堂且道作得個什麼向當英曰賊是小人昌曰邵武子動著便作屎臭英曰曾經霜雪苦昌曰明珠自有千金價怎肯林間打兒英曰大似持鉢不得詐道不飢昌却指勝曰你且道合作得個什麼向當勝曰本來無位次不用強安排昌曰你者驢漢安向甚處著勝曰一任敲磚打瓦昌曰也只是個杜撰巡官英曰若是千金寶何須打兒昌曰東家人死西家人助哀英曰路見不平白巖符云拳來腳去鎗來劍去一步緊一步一著高一著三個老漢可謂經事多矣若是法堂向當終未能定奪在何故今年太歲當頭合逢戊巳法昌垂語我要一個不會禪底作國師徑山杲云且道是醍醐句是毒藥句永州祚云恁麼則十字街頭廖鬍子大有長處平田本云心不負人面無慚色法昌上堂春山青春水緑一覺南柯夢初足擕笻縱步出松門是處桃花香馥郁因思昔日靈雲老三十年來無處討如今競愛摘楊花紅香滿地無人掃雲門信云者個語話若作禪道佛法商量太遠在若作風流景緻會又辜負法昌還有人向者裏和會得麼出來説看若和會未得元在法昌舌根上轉東明際云雪嶠老漢與麼拈提且道還契他法昌也未南康雲居佛印了元禪師青十開先暹嗣入室次蘇子瞻適至印曰此間無坐榻學士來此作麼瞻曰暫借和尚四大為坐印曰山僧有一問學士道得即請坐道不得當輸玉帶瞻欣然曰便請印曰四大本空五蘊非有學士向什麼處坐瞻無對遂解下玉帶寶壽方別佛印於暫借四大為坐處拈棒便打天界盛於學士向什麼處坐處代子瞻云若恁麼則被某甲坐斷也又云者個破禪牀我不坐天童忞云佛印貪餌忘鈎東坡弄巧成拙若是山僧待他道四大本空五蘊非有向前抴倒便坐豈不顯得俊俏底蘇學士慧雲盛云佛印雖則便宜性命已在東坡手裏檀度依云學士方才要坐和尚錦帳高張怎奈措大寒酸不解驀直便上豈可謂入幕之賓乎雖然至今玉帶猶鎮山門大好疑著白巖符云金山者漢貪他蠅頭小利却向俗官手裏生被活埋杭州慧日永明延壽禪師青十天台韶嗣因二僧參乃問參頭曾到此間否曰曾到又問第二上座曾到此間否曰不曾到明曰一得一失少選侍者問適來二僧未審那個得那個失明曰你曾識者二僧也無曰不曾識明曰同坑無異土清化嶾云平展處不犯鋒鋩驗人處豈用多辭叵耐二僧無端纍他侍者受屈天斗偉云黃河九曲非無其源梗楠千尺非無其本永明一期施設自非本深源遠豈可得哉然懵懂侍者且置勿論當時被二僧道個情知和尚曾見法眼又作麼生福州嚴峰師木禪師青十天台韶嗣僧問靈山一會迦葉親聞嚴峰一會誰是聞者峰曰問者不弱灜山誾云者僧問處大似把炬逆風先著手嚴峰答處正如當罏賣酒便傾巵良久復云笑殺旁觀溫州瑞鹿寺上方遇安禪師青十天台韶嗣嘗閲楞嚴經至知見立知即無明本知見無見斯即涅槃乃破句讀曰知見立知即無明本知見無見斯即涅槃於此有省或者曰師破句了也安曰此是我悟處乃畢生不易時號安楞嚴灜山誾云安公若不是悟去幾多人笑水潦鶴也且道伊悟底是有知見無知見洪州雲居道齊禪師青十法燈欽嗣因大梅煦參乃曰我要問汝從什麼處來若從僧堂來即是謾語不從僧堂來又是自瞞汝畢竟從甚處來梅於言下頓悟翠巖芝云若不如是怎知如是友可玄云者僧親從堂中來為甚却道謾語雲居也是心斜不覺口歪
