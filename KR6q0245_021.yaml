body:
  text: 古杭白巖嗣祖沙門淨符彚集南四福州烏石靈觀禪師南四黃檗運嗣引麵次僧參石乃引麵示之僧便去石至晚問小師今日新到在甚處小師曰當時便去也石曰是即是祇得一橛雪竇顯云老觀大似失錢遭罪報慈遂徵云甚麼處是少一橛翠巖芝云老觀道他祇得一橛大似壓良為賤東禪觀云總似這個師僧靈山付囑有在老觀為什麼道只得一橛要會麼若不酬價爭辯真偽烏石居常扃戶人罕見之一日雪峰來扣門石問誰曰鳳凰兒石曰作什麼曰來㗖老觀石便開門搊住曰道道峰擬議石便托開閉却門峰住後示眾曰我當時若入得老觀門你這一隊噇酒糟漢向甚處模索明招謙代雪峰纔見開門便云動即喪又代老觀云俊哉俊哉有老宿云雪峰徒有此語當時入不得如今也入不得雪竇顯云這孤恩負德漢有甚麼交涉當時入不得豈是教你入今既摸索不著累他雪峰俱在老觀門下寶壽方云見烏石則易見雪峰則難古南門云三尊宿可謂陞老觀堂入老觀室要且只在門外何故話在報恩琇云山僧若作雪峰纔見渠搊住道道道便云這漢手忙脚亂作麼管教老觀進不得退不得雖然亦須救取老觀資福侶徵云且道雪峰恁麼道入得老觀門入不得老觀門若入得怎肯恁麼道若入不得怎敢恁麼道勝法法云雪峰向東海裏失錢要在金牛湖邊撈摝好與三十拄杖白巖符云掣電之機門墻岸岸烏石其人可觀也惜乎罕遇作家白巖若作雪峰當時待開門驀頭便與一喝竟拂袖去烏石到這裏雖有搏虎之技也只得高樹降旗鳳凰兒豈不俊哉烏石因僧問如何是毗盧師法身主觀曰我若向你道即別有也僧舉似洞山山曰好個話頭只欠進語何不問為什麼不道僧却來進前語曰為什麼不道石曰若言我不道即啞却我口若言我道即謇却我舌僧回舉似洞山山深肯之磬山脩云洞山雖識機宜恰似個扶小兒入市這僧隨人脚跟姑置勿論若夫烏石老漢也是方便不少報恩琇云觀老與麼答話好則好矣猶欠痛快若是山僧待問為什麼不道打落渠嘴非惟洞山不敢正視亦使這僧脫略見聞免見傳言送語白巖符云還知這兩個漢性命總在這僧手裏麼頂門有眼者試辨看益州大隨法真禪師南四長慶安嗣因僧辭乃問甚處去曰峩眉禮普賢去隨豎起拂子曰文殊普賢總在這裏僧一畵圓相拋向背後乃禮拜隨喚曰侍者取一貼茶與這僧保福展云大隨若無後語笑他衲僧雲門偃別云西天斬頭截臂這裏自領出去五祖戒云大隨不因一事不長一智雪竇顯云殺人刀活人劒具眼者辨取溈山秀云大隨茶非類趙州茶既不類趙州茶則得之者少矣這僧得之且道有甚長處然不義之財於我如浮雲天童覺云識法者懼欺敵者亡水中擇乳須是鵞王天童悟云這僧將成九仞之山不進一簣之土當時待喚侍者與茶何不祇對道也不消得大隨因僧問劫火洞然大千俱壞未審這個壞不壞隨曰壞曰恁麼則隨他去也隨曰隨他去又僧問龍濟脩劫火洞然大千俱壞未審這個壞不壞脩曰不壞曰為甚麼不壞脩曰為同大千龍濟脩云壞也礙塞殺人不壞也礙塞殺人道吾真云此二老宿一人道壞一人道不壞且道壞底是不壞底是會麼壞與不壞俱非內外不隔絲毫尋常面對黃龍清云此二尊宿雖則應處無偏其奈影響之流瞥生二見若是太平即不然忽有問劫火洞然大千俱壞未審這個壞不壞向道壞與不壞即且置還識這個麼忽地喚回秋夜夢舉頭惟見月當空博山來云大隨龍濟生死同條接物導機隨家豐儉一句則穿花折柳野渡氷消一句則帶霧披雲寒灰發𦦨畢竟者個壞不壞參陽山頂云二大老雖則機用縱橫未免旁觀者笑且道笑個什麼各見一邊大隨因貫休有詩曰禪客相逢只彈指此心能有幾人知乃即舉以問休曰如何是此心休無對歸宗柔代休云能有幾人知寶壽方代休但彈指一下韶州靈樹知聖如敏禪師南四長慶安嗣因尼送瓷鉢盂至樹遂托起問曰者個出在甚麼處尼曰出在定州樹乃撲破尼無對清凉欽別云不違此間保福展云欺敵者亡雲門澄代云老老大大鉢盂出處也不知福州靈雲志勤禪師南四長慶安嗣因見桃花有省乃述偈曰三十年來尋劒客幾回葉落又抽枝自從一見桃花後直至如今更不疑呈溈山安安曰從緣薦得永無退失次舉似玄沙沙曰諦當甚諦當敢保老兄未徹在地藏琛因玄沙問我恁麼道你作麼生會琛曰不是桂琛即走殺天下人翠巖芝云有一人如今問玄沙意作麼生且道此人還徹也未黃龍心徵云諸人且道靈雲當初見底是桃花不是桃花五祖演云說什麼諦當更參三十年昭覺勤云千鈞之弩不為鼷鼠而發機靈雲既撥轉天關玄沙乃掀翻地軸且道那裏是未徹處徑山杲云一家有事百家忙中峰本云靈雲白日青天向桃花樹下為魅所著玄沙雖則除邪輔正激濁揚清殊不知又是鬼門上貼卦天寧琦云人無遠慮必有近憂直饒百煉精金不免入罏再煆東塔明云一翳在眼空花亂墜不是玄沙善用金錍幾乎成個瞎漢天井新云不惟靈雲未徹敢保玄沙也未徹在何以見得雲在嶺頭閒不徹水流㵎下太忙生愚菴盂云靈雲若不是玄沙幾被桃花誤了一生溈山老也是憐兒不覺醜或問靈雲未徹在甚麼處對曰不妨疑著靈隱禮云玄沙恁麼道大似向驪龍頷下探珠饑鷹爪下奪雖則赤心片片怎奈傷鋒犯手山僧今日要問他既是諦當甚諦當為甚却道敢保老兄未徹在還有知他落處麼良久云不因栗棘金剛話難見銀山鐵壁心黃檗琦云靈雲眼中添眼備老眉上栽眉仔細看來成甚面孔棲霞成云若於玄沙地藏二老言下透得要見靈雲不難其或未能壽昌與你道破三十年來尋劒客有眼如聾幾回落葉又抽枝眼花作麼自從一見桃花後失却一隻了直至如今更不疑只得一半東明鑑云當時靈雲眼睛被桃花刺破直至如今依然成瞎乃驀豎拂子云大眾桃花開也還見麼良久云春色滿園關不住一枝紅艶出墻來永正元云靈雲觸目知機正是眼中著屑玄沙見兔放鷹翻成節外生枝若道靈雲是則辜負玄沙若道玄沙是又埋沒靈雲且道畢竟如何遂喝一喝云謾說超方眼休誇劫外春靈雲問僧甚處去曰雪峰去雲曰我有一信寄雪峰得麼曰便請雲脫隻履拋向面前僧便去至雪峰峰問甚處來曰靈雲來峰曰和尚安否曰有一信相寄峰曰在那裏僧脫隻履拋向峰面前峰休去溈山秀云雪峰既不能辨他來信端的者僧又祇知依模畵樣鈍置他靈雲忽若當時道我有一信寄他僧云便請靈雲只據坐者僧又若為通露不可大丈夫漢為人馳達教他一言不措白巖符云者僧與靈雲通信原封馳上不敢妄加一字固郵人役也怎奈雪峰書亦收了只是不拆封看知他雪峰是何心行靈雲因長生問混沌未分時如何雲曰露柱懷胎曰分後如何雲曰如片雲點太清曰未審太清還受點也無雲不答曰恁麼則含生不來也雲亦不答曰直得純清絕點時如何雲曰猶是真常流注曰如何是真常流注雲曰似鏡常明曰向上還有事也無雲曰有曰如何是向上事雲曰打破鏡來與汝相見芭蕉徹云相見便休又打破鏡作什麼白兆圓云若不打破鏡怎得相見太陽延云即今破也又作麼生相見乃云照盡體無依通身難辨的開福寧云好諸禪德盡十方世界是一面鏡作麼生說個打破底道理直饒眼親手辦光境俱亡如雞抱卵啐同時正好喫報慈拄杖何故弄影禪和如麻似粟黃龍忠云二尊宿發明本分大事可謂如切如磋如琢如磨不妨端的檢點將來大似貼肉汗衫未能脫體致使一等隨語生解流便向未分時計較打破處說道理驢年悟去麼若據牧菴見處說甚混沌分與未分打破鏡與不打破鏡直饒向露柱懷胎處會得正是片雲點太清諸仁者還委悉麼待虗空落地即向你道昭覺勤云一個善問一個善答膠漆相投水乳相合則且置且道打破鏡來如何相見良久撫掌云了天童覺云分與未分玉機夜動點與未點金梭暗拋直是一色純清未得十成穩坐且道打破鏡來向甚麼處相見還會麼清秋老兔吞光後湛水蒼龍蛻骨時袁州仰山慧寂禪師南四溈山祐嗣在溈山為直歲作務歸溈問甚處來曰田中來溈曰田中多少人仰插鍬叉手而立溈曰今日南山大有人刈茅仰拽鍬便去玄沙備云我若見即踏倒鍬子鏡清怤因僧問仰山插鍬意旨如何清云狗啣赦書諸侯避道玄沙踏倒意旨如何清云不奈船何打破戽斗南山刈茅意旨如何清云李靖三兄久經行陣雪竇顯云諸方咸謂插鍬話奇特大似隨邪逐惡據雪竇見處仰山被溈山一問直得無繩自縛去死十分徑山杲云仁者見之謂之仁智者見之謂之智百姓日用而不知故君子之道鮮矣天寧琦云幸是無事被妙喜老漢念一道真言直得天左旋地右轉博山來云父慈子孝夫唱婦隨要是家裏人始好說家裏話不然則索鹽奉馬矣二大老暗機圓合則不無南山刈茅者未許話會在天童悟云我若作仰山待問田中多少人便乃出去不惟截斷溈山後來老婆且教伊討頭鼻不著愚菴盂云作務歸家父子酬唱直得填溝塞壑無處出頭雪竇道仰山被溈山一問直得無繩自縛去死十分還知仰山麼偶行花下路驚起樹頭鶯資福廣云只拘來巢空穴來風是皆有託而然也若是義海無際暗機無形是豈有託而能然哉到者裏非但今人摸索不著縱臨濟德山有棒有喝亦用不得且道利害在甚麼處不見道南山大有人刈茅鳳山啟云主張門戶全憑得力兒孫向上提持須是當機作者老牯牛有䑛犢之愛小釋迦知跪乳之恩父父子子雖然可愛怎奈難為旁觀仰山因僧問法身還解說法也無山曰我說不得別有一人說得曰說得底人在甚處山推出枕子溈山聞乃曰寂子用劒刃上事徑山杲云溈山正是憐兒不覺醜仰山推出枕子已是漏逗更著個名字喚作劒刃上事誤他學語之流便恁麼承虗接響流通將去妙喜雖則借水獻花要且理無曲斷即今莫有旁不肯底出來我要問你推出枕子還當得法身說法也無天童華云若是劒刃上事仰山何曾會用忽有問天童法身還解說法也無亦向道我說不得別有一人說得說得底人在甚處只向道三生六十劫天寧琦云者僧問法身說法蹉過也不知仰山推出枕子又何曾見慣大小溈山將錯就錯配作劒刃上事縛作一束秤上稱來八兩半斤殊無輕重若也當時纔見者僧道法身還解說法也無便驟步歸方丈豈不是出格宗師免致天下衲僧貶剝仰山欽云法身說法已於問處流通推出枕子也只是個信受奉行溈山老漢雖曰列段分科若是正文敢道不知落處天寶樞云溈山恁麼道也是憐兒不覺醜若論劒刃上事仰山何曾夢見徑山琇云仰山推出枕子乞兒伎倆溈山道寂子用劒刃上事正是溺愛者不明大慧道妙喜雖則借水獻花理無曲斷即今莫有旁不肯的出來我要問他推出枕子還當得法身說法也無也是驢揀濕處尿天井新云溈山仰山却被者僧捉敗仰山問僧近離甚處曰廬山山曰曾到五老峰麼曰不曾到山曰闍黎不曾遊山雲門偃云此語皆為慈悲之故有落草之談溈山秀云今人盡道慈悲之故有落草之談只知捉月不覺水深忽若雲門當時謹慎脣吻未審後人若為話會黃龍新云雲門仰山只有受璧之心且無割城之意殊不知被者僧一時領過黃龍今日更作死馬醫乃拈拂子度與僧僧擬接便打溈山云仰山可謂光前絕後雲門雖然提綱挈要鉗錘天下衲僧怎奈無風起浪諸人還識者僧麼他親從廬山來黃龍震云仰山已是失却鼻孔雲門更下註脚有什麼救處我即不然近離甚處廬山曾到五老峰麼不曾到只向道別甑炊香供養此人天童覺云雲門雖然識得仰山底裏怎奈只知其一不知其二且道仰山意作麼生無限風流慵賣弄免人指點好郎君報恩秀云我若作仰山祇喚侍者點茶來者僧遊山困不然喝出教伊向後別作生涯白巖符云仰嶠萬斛明珠雲門徧地荊棘總在者僧懷揣裏山僧恁麼道還有不甘者麼仰山因大溈問妙淨明心汝作麼生會山曰山河大地日月星辰溈曰汝只得其事山曰適來和尚問什麼溈曰妙淨明心山曰喚作事得麼溈曰如是如是青龍斯云絃歌相和節拍相隨須讓他溈仰父子若是妙淨明心直饒圓古佛小釋迦三生六十劫也未夢見在仰山夢往彌勒內院居第二座有尊者白椎曰今日當第二座說法山乃起白椎曰摩訶衍法離四句絕百非諦聽諦聽眾皆散去及覺舉似溈山溈曰子已入聖位山便禮拜溈山秀云依文解義即不無當時彌勒會中有個作者見道摩訶衍法聲未絕便云合取兩片皮非唯止絕仰山寐語亦免使後人夢中說夢瑯瑘覺云且道當時聖眾肯仰山不肯仰山若肯又孤負仰山若不肯仰山平地喫交山僧今日不惜眉毛與諸人說破摩訶衍法離四句絕百非你若舉似諸方諸方恁麼會入地獄如箭射天童覺云玉女依俙夜動機錦絲歷歷吐梭臍水天湛碧全功墮雪月寒清一色迷諸禪德全功負墮一色猶迷作麼生體悉得相應去權挂垢衣云是佛却披珍御復名誰東禪觀云尊者白椎聖眾便散不妨使人疑著却待第二杓惡水潑了方始惺惺遲也且如摩訶衍法離四句絕百非道已道了諸人還識仰山麼報恩秀云大溈若解𢌞光返照和萬松無地容身莫有夢中了了醉裏醒醒底麼天童悟云大小仰山刺腦入膠盆被尊者白椎云今當第二座說法腦門粉碎了也當時拂袖便行直令一院聖眾疑著猶更白椎逐塊不少青龍斯云昨夜山僧亦作一夢夢見阿耨達池龍王請山僧齋齋畢問云威音王底父親名甚麼者個問頭奇特不敢姑他遂乃振威一喝龍王作禮而退忽然覺來只見徧地好雪大眾且道山僧夢的與仰山夢的是同是別仰山因一日有梵僧乘空至山問近離甚處曰西天山曰幾時離彼曰今早山曰何太遲生曰遊山翫水山曰神通遊戲不無闍黎佛法須還老僧始得曰特來東土禮文殊却遇小釋迦遂出梵書貝多葉與山作禮復乘空而去東林總云大小仰山被梵僧將兩杓惡水驀頭澆了也當時集雲峰下自有正令何不施行大眾且作麼生是正令咄黃龍新云大小仰山被者僧熱瞞更出貝多梵書塗糊一上如今若有異僧乘空而至雲巖門下喚來洗脚泐潭準云可惜仰山放過這漢當時若是寶峰便與擒住教維那僧堂前撞鐘集眾責狀趕出況佛法不當人情既稱羅漢諸漏已盡梵行已立為什麼不歸家穩坐只管遊山翫水大溈泰云仰山只知進前趂鹿不知身墮網羅尊者偶爾成文頗有衲僧氣息若人會得許你倒捋虎鬚白巖符云仰山被異僧活埋且置勿論祇如神通佛法是一是二若道是二治世語言資生業等皆與實相不相違背又作麼生若道是一不無闍黎須還老僧又作麼生者裏定當不出莫言無事好仰山指雪獅子謂眾曰還有過得此色者麼雲門偃云當時便與推倒雪竇顯云雲門只解推倒不解扶起瑯瑘覺云即今問諸人推倒扶起相去多少乃拈拄杖云拶過眉毛鼻孔呵呵大笑遂擲下淨慈昌云推倒也錯扶起也錯還有過得此色者麼錯錯南堂欲云雲門推倒雪竇扶起直饒過得此色也未是金毛獅子報恩秀云一則推倒一則扶起在他宗異派不道不得若洞上宗風更須知有正倒時便起正起時便倒底時節然後起倒同時起倒不立更買草鞋行脚三十年古南門云三個老漢雖則因事長智總未踏著向上關棙子如何是向上關棙子日出後一場懡㦬雪竇正云者一隊漢總被雪獅子轉白巖符云偃老盧公雖善看孔著楔總是口還人事若是白巖還有過得此色者麼但云有他若眼目定動便與劈面一掌却云還有過得此色者麼仰山問陸郎中承聞郎中看經得悟是否曰是弟子因看涅槃經道不斷煩惱而入涅槃得個安樂處山豎拂子曰只如者個作麼生入曰入之一字也不消得山曰入之一字不為郎中陸便起去清凉欽云且道入之一字為什麼人又云郎中且莫煩惱雪竇顯於仰山舉拂處別陸云拂子到某甲手裏也又別仰山後語云我將謂你是個俗漢白巖符云我若作仰山當時郎中纔道個是字便與搖手云猶隔遠在何故要使者漢別立生涯免在葛藤窠裏著脚仰山因龐公問久嚮仰山到來因甚却覆山豎拂子曰是仰是覆公乃打露柱曰雖然無人也要露柱證明山擲下拂子曰若到諸方一任舉似隱靜岑云大小仰山被龐公一拶直得手忙脚亂只如居士打露柱一下又作麼生鯨吞海水盡露出珊瑚枝仰山坐次有僧來作禮山不顧僧問和尚還識字否山曰隨分僧乃右旋一匝曰是什麼字山於地上書十字僧又左旋一匝曰是什麼字山改十字作卍字僧畵圓相以兩手托如修羅擎日月勢曰是什麼字山畵圓相圍却字僧乃作婁至德勢山曰如是如是善自護持報恩秀云仰山十字注也注了說也說破更要後面許多粥飯氣作麼當初待問師識字否何不道自來文寡看他又且如何笑巖寶云大小仰山泥水不分山僧則不然待者僧作婁至德勢劈脊便打云者野狐精何故如此不見道是真難滅是偽不昌仰山問僧甚處來曰幽州山曰我恰要個幽州信幽州米作麼價曰某甲無端從他市橋上過踏折他橋梁保寧勇云放你三十棒寶掌白云大小仰山龍頭蛇尾者僧便是崩倒了幽州城八十里寶掌拄杖也未肯放伊過在普寧頴云者僧也好與一頓何故若不酬價焉知真偽仰山到東寺既有廣南明珠機緣相見了却入客位復具威儀再上人事寺纔見乃曰已相見了也山曰與麼相見莫不當否寺便歸方丈閉却門山歸舉似溈山溈曰寂子是什麼心行山曰若不與麼怎識得伊保福展云仰山大似蚊子上鐵牛承天宗云仰山識得東寺強說道理即得相見即不可何也直使溈山親來也未能得與東寺相見在仰山因有官人來山問官居何位曰推官山豎起拂子曰還推得者個麼南㵎問云險白巖符云當時官人若是個性躁漢待道還推得者個麼便好呌班上拏下綑打三十看仰山者漢作何處置仰山携拄杖行次僧問和尚手中是什麼仰拈向背後曰見麼僧無語天童悟代僧撫掌笑云今日識得和尚仰山問雙峰你近日見處如何峰曰據某甲見處實無一法可當情山曰你解猶在境峰曰某甲只如此師兄又如何山曰你豈無能知無一法可當情者溈山云前箭猶輕後箭深無限平人被陸沉東禪嶽云解弄不須雙刃劒延齡何必九還丹寶壽方云雙峰者一件汗衫子仰山費盡腕頭力畢竟未能與伊拈却在我若作仰山待道某甲見處實無一法可當情便好劈面唾云我將謂你是個人便歸方丈管教雙峰者漢脫落一層有分仰山因歸溈山省覲溈問子既稱善知識怎辨得諸方來者知有不知有有師承無師承是義學是玄學子試說看山曰慧寂有驗處但見僧來便豎起拂子問伊諸方還說者個不說又曰者個且置諸方老宿意作麼生溈嘆曰此是從上宗門中牙爪端云溈山無事生事為憐三歲子仰山承虗接響弄醜出乖俱未免遭人怪笑當時眾中若有個漢見伊舉拂便好近前奪却大聲一喝而去溈山父子雖有通身牙爪亦當倒退千里鄧州南陽香嚴智閑禪師南四溈山祐嗣上堂若論此事如人上樹口䘖樹枝脚不踏枝手不攀枝樹下忽有人問如何是祖師西來意不對他又違他所問若對他則喪身失命當恁麼時作麼生即得時有虎頭招上座出眾曰樹上即不問未上樹時請和尚道嚴乃呵呵大笑雪竇顯云樹上道即易樹下道却難老僧上樹去也致將一問來翠巖芝云問者對者俱不免喪身失命如今衲僧作麼生徑山杲云吞得栗棘蓬透得金剛圈看者般說話也是泗洲人見大聖大溈果云香嚴慈悲之故有落草之談雖然檢點將來未免弄巧成拙皷山珪云香嚴大似蕭何制律天童覺云虎頭上座是個惡賊用無義手打不防家直饒本色作家往往做手脚不辦雪竇是別機宜識休咎底漢到者裏也只得藏身露影還會香嚴做處麼三千劒客今何在獨許莊周見太平天寧琦云香嚴老人曲設方便虎頭上座未辨端倪若論激揚此事三生六十劫天寶樞云上樹未上樹鐵蛇橫古路覿面笑呵呵苦瓠連根苦南堂欲云香嚴用盡神通不消虎頭一拶便乃四稜塌地雪竇縱有生機也只扶他不起愚菴盂云大眾香嚴握昆吾刀盡大地人喪身失命豎拂子云山僧今日上樹去也置將一問來自代云金香爐下鐵崑崙通玄奇云虎頭雖識好惡只見一邊我當時若在但禮香嚴三拜南㵎問云香嚴前不搆村後不迭店不得虎頭上座幾乎無出身路天寶真云香嚴善排陣勢虎頭不動旗鎗彼彼皆知且道呵呵大笑意作麼生殺人刀活人劒淨慈參云香嚴此話要與天下人斷命根細檢將來真個蕭何制律虎頭雖善別機宜也只在平展處著倒乃呵呵大笑云佛法大有只是牙痛白巖符云香嚴以大地作一紅爐烈焰亘天雖生鐵渾鋼立時鎔却如當時虎頭上座豈不俊哉怎奈眉毛至今尚帶焦氣然香嚴之作可謂善矣至矣然自己眉毛未審還得完全也未香嚴因仰山問聞你近日有省處試說看嚴舉擊竹頌曰一擊忘所知更不假脩持動容揚古路不墮悄然機處處無蹤跡聲色外威儀諸方達道者咸言上上機山曰此是夙昔記持有正悟別說看嚴曰去年貧未是貧今年貧始是貧去年貧尚有卓錐之地今年貧錐也無山曰如來禪許你會祖師禪未夢見在嚴曰我有一機瞬目視伊若人不會別喚沙彌山乃對溈山曰閑師弟會祖師禪也報恩遂徵云且道如來禪與祖師禪是分不分長慶稜云一時坐却溈山云香嚴可謂上無片瓦下無卓錐露裸裸赤灑灑沒可把若不是仰山幾乎放過何故不得雪霜力焉知松柏操徑山杲云溈山晚年好則劇教得一棚肉傀儡直是可愛且作麼生是可愛處面面相看手脚動怎知語話是他人天寧琦云師兄師弟去年今年論甚道說甚禪總是掉棒打月掘地討天禪禪也無妙也無玄莫把封皮作信傳香嚴曰去年貧未是貧今年貧始是貧去年貧尚有卓錐之地今年貧錐也無寶峰文云去年富未是富今年富始是富去年富惟有一領黑黲布衫今年添得一條百衲袈裟歲朝抖擻呈禪眾實謂風流出當家天寧琦云香嚴貧未是貧奈何猶有個渾身真淨富不是富家私未免俱呈露鳳山者裏不說富不說貧隨家豐儉沒踈親竪拂子云收來兔角長三尺放去龜毛重九斤博山奉云香嚴貧而諂真淨富而驕天寧雖能隨家豐儉未免為貧富兩字累致成狡詐且道博山者裏又作麼生豎拂子云泥牛觸折珊瑚枝石女裁成火浣布香嚴開法時溈山遣僧送書并拄杖到嚴接得曰蒼天蒼天僧便問和尚為甚如此嚴曰只為春行冬令天井新云得人一牛還人一馬理固然矣檢點將來也是死而不弔法忍謐云溈山杖子千里同風者僧送到對面千里且道誵訛在甚麼處甜瓜徹蒂甜苦匏連根苦天目律云香嚴與麼也是珊瑚枕上兩行淚半是思君半恨君東塔熹云溈山送杖養子之緣香嚴便哭不為分外則且置祇如道春行冬令又作麼生報恩須是報恩人風穴喜云者僧為溈山送拄杖兵隨印轉香嚴接得便哭將逐符行且道春行冬令意旨如何咄退菴智云大小香嚴把不住被拄杖子轉不得者僧一拶幾乎屈辱大溈
