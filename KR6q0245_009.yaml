body:
  text: 古杭白巖嗣祖沙門淨符彚集南二池州南泉普願禪師南二馬祖一嗣因東西兩堂爭貓兒泉見乃提起貓曰道得即不斬衆無對泉便斬之趙州自外歸泉舉前語示之州乃脫草履安頭上而出泉曰子若在即救得貓兒保福展云雖然如是也只是破草鞋翠巖芝云大小趙州祇可自救雪峰存問德山南泉斬貓意旨如何山以拄杖便打趂出復召云會麼峰云不會山云我與麼老婆猶自不會大溈智云南泉據令而行趙州見機而作雖然如是未免挂人脣吻大溈要與南泉把臂共行遂拈拂子云若道得即奪取去衆無語乃云啼得血流無用處不如緘口過殘春中峰本云南泉劒為不平離寶匣趙州藥因救病出珍瓶然雖慶快一時爭奈古佛家風掃土矣報恩秀云正當恁麼時盡十方世界情與無情一齊向王老師手中乞命當時有個漢出來展開兩手不然攔胸抱住云却勞和尚神用縱南泉別行正令敢保救得貓兒博山來云生擒活捉王老全提起死回生趙州手段救得救不得總不干他事且道節文在什麼處鼓山賢云南泉據令廓爾無前兩堂祇得拱手而聽趙州雖能超出怎奈也祇在刀下全身老僧當時若在却不恁麼待道道得即不斬但云兩堂未爭時和尚又作麼生管取王老師束手入方丈有分愚庵盂云還識南泉麼他是生鐵鑄就渾剛打成要向驪龍頷下摘珠阿修羅手中奪印趙州老漢雖善來機也是得張白狐裘脫秦虎口這兩堂是蘇秦張儀祇麼投秦入趙豈知天然王道寧可以口舌勝耶百丈雪云趙州戴草鞋而出雖曰據欵結案也是賊過後張弓子若在却救得貓兒雖謂重賞之下必有勇夫爭奈憐兒不覺醜山僧看來二俱有過好各與三十棒山僧與麼批判也要諸方檢點龍華體云其父攘羊而子證之南泉趙州其謂歟汝適來若在即救得貓兒咬牙封雍齒滴淚斬丁公吳聖玉云南泉據虎頭趙州收虎尾死貓兒却被二老弄活爭奈他兩堂雲水一死不再活如今要得活麼擘開眼云貓南泉謂僧曰夜來好風僧亦曰夜來好風泉曰吹折門前一株松僧亦曰吹折門前一株松又謂一僧曰夜來好風僧曰是什麼風泉曰吹折門前一株松僧曰是什麼松泉曰一得一失昭覺勤云大凡酬唱隨機著眼辨龍蛇別緇素所謂打鼓弄琵琶相逢兩會家只如南泉道一得一失敢問阿那個得阿那個失到這裏須是向上人始得還委悉麼鵝王擇乳素非鴨類愚庵盂云這公案有二僧持論致爭一云與趙州二庵主法眼指簾無二一云刁刀相似魚魯不同爭之不能已乃質之老僧老僧云一得一失南泉示衆曰喚作如如蚤是變了也今時師僧須向異類中行歸宗曰雖行畜生行不得畜生報泉曰孟八郎漢又恁麼去也德山密云南泉中毒也琅瑘覺云山僧不然遇水喫水遇草喫草焉知畜生行法華舉云且作麼生是異類中行石牛常臥三春霧木馬時嘶秋夜泉雲門澄因僧問如何是異類中行澄云輕打我輕打我僧云我會也澄云汝作麼生會僧遂作驢鳴澄休去愚庵盂云似地擎山不知山之孤峻如石含玉不知玉之無瑕大通智勝遷座而成正覺善財童子別峰而見德雲僧云智不到處切忌道著道著即頭角生却為甚麼作這般語話咄孟八郎漢又與麼去也慧雲盛云南泉既行荒草歸宗又入深村不知今時師僧如何進退設有恁麼去也是瞎驢趂大隊南泉上堂文殊普賢昨夜三更起佛見法見各與二十棒趂出院去也時趙州出衆曰和尚棒教誰喫泉曰王老師過在什麼處州便禮拜而出雲門偃云深領和尚慈悲某甲歸衣鉢下得個安樂又代云與衆除害報慈遂徵云且道趙州禮拜是肯南泉不肯南泉夾山齡云南泉一期逞俊爭奈平地起堆趙州雖是覿面投機不覺腦門著地昭覺勤云南泉動絃趙州別曲苦痛蒼天寒山拾得若是崇寧則不然燈籠露柱昨夜起佛見法見各與二十棒令歸本位去也或有個漢出云和尚棒教誰喫只對他道落賓落主高峰妙云南泉和尚雖則頂門具眼賞罰分明檢點將來也是虗空裏釘橛若無趙州後語未審如何折合高峰則不然忽有人起佛見法見但向他道善哉善哉時節若至其理自彰地藏學云南泉無風起浪趙州綿裏有針若作佛法商量管教入地獄如箭崇先奇云南泉為衆竭力禍出私門趙州固然是賊識賊未免證父攘羊雖然天下太平莫道無事好南泉同魯祖歸宗杉山喫茶次魯祖拈起茶盞曰世界未成時便有這箇泉曰今人祇識這箇不識世界宗曰是泉曰師兄莫同此見麼宗却拈起茶盞曰向世界未成時道得麼泉作掌勢宗以面作承掌勢昭覺勤云魯祖簸土揚塵南泉和泥合水歸宗火亂灰飛杉山坐觀成敗還委悉麼箭鋒相拄不相饒四人共拈一隻盞南泉因趙州問離四句絶百非請師道泉便下座歸方丈州曰這老漢尋常口吧吧地今日被我一問直得無言可對侍者曰莫道和尚無語好州與一摑曰這一摑合是王老師喫白巖符云趙州這漢大似箇新出紅爐的彈子犯著則簉破面皮爪牙隊裏豈不俊哉然總不出王老師圈繢且道那裏是王老師底圈繢南泉因僧問師歸丈室將何指南泉曰昨夜三更失却牛天明起來失却火龍翔欣云大小南泉和泥合水中峰則不然或有問師歸丈室將何指南即向道拄杖子今日開封天界盛云恁麼則住持不易雖然須是王老師始得芙蓉覺云南泉將三百六十骨節八萬四千毛竅一時攃在這僧面前了也爭奈這僧如蚊子上鐵牛無處入作龍淵則不然或有問師歸丈室將何指南向道飢餐渴飲間坐困眠南泉因至莊所莊主預設迎奉泉曰老僧居常出入不與人知何得預辦至是莊主曰昨夜土地神報道和尚今日來泉曰王老師修行無力被鬼神覷見侍者便問既是大善知識為甚麼被鬼神覷見泉曰土地前更下一分飯報慈遂云甚麼處是土地前更下一分飯處因聖頴云王老師被這僧一問未免向鬼窟裏作活計雲居錫徵云土地前一分飯是賞伊是罰伊只如土地覷見是南泉不是南泉天童覺云我當時見莊主與麼道便與捉住云放汝不得何故不見道來説是非者便是是非人報恩秀云天童雖解捉鬼賣未免莊頭鬼亂山僧即不然若見莊主道昨夜土地報便與彈指三下云唵度嚕度嚕地尾娑訶南泉上堂王老師賣身去也還有人買麼一僧出曰某甲買泉曰不作貴不作賤你作麼生買僧無對趙州諗云明年與和尚縫一領布衫臥龍球云和尚屬某甲去也禾山殷代云是何道理雪竇顯云雖然作家競買要且不解輸機且道南泉還肯麼雪竇也擬酬個價直令南泉進且無門退亦無路良久云別處容和尚不得雲居莊云山僧若作這僧待道不作貴不作賤你作麼生買即對道鼻索在某甲手裏直饒王老師別有長處也只得忍氣吞聲笑巖寶云山僧今日斬新出箇價直教這老漢更屬人不得屬己不得待云不作貴不作賤汝作麼生買但道請和尚暫歸方丈喫茶愚庵盂云雪竇只可作南泉奴祇如進且無門退亦無路還容得雪竇麼古南門云諸老宿與麼拈提還恰南泉意麼殊不知南泉老漢以己方人因慈悲之故有落草之談當時這僧待道不作貴不作賤作麼生買但云與麼則某甲與和尚平出也既顯自己手腳便不虗他一番法施還會麼子期去不返浩浩良可悲不知天地間知音復是誰白巖符云古今諸老殫精竭思莫不皆要作王老師的主人公殊不知價則酬矣而契券尚未入手在然則畢竟如何當時待道王老師賣身去也還有人買麼便好云某甲明日出州會客却煩和尚先行天目律云王老師只求要人著價相當殊不知奴兒婢使千古自招南泉因陸大夫問弟子家中瓶內養一鵝兒如今長大欲出此鵝且不得打破瓶亦不得損其鵝未審和尚有何方便泉召大夫大夫應諾泉曰出也高峰妙云南泉潦倒手眼不親縱饒出得也是死貨若是高峰只向他道大夫還曾示人麼才擬祇對便與亂棒打出非特為這漢脫却鶻臭布衫要使天下衲僧個個解粘去縛慶快平生瀛山誾云大夫設個問端固是巧妙若不遇王老師未免瓶破鵝殞且道喚出後如何萬里鵬同遠千年鶴共飛南泉同歸宗麻谷去禮忠國師泉於路上畫一圓相曰道得即去宗便於圓相中坐谷便作女人拜泉曰與麼則不去也宗曰是什麼心行泉乃相喚便回更不去禮翠巖芝云當時若見每人與一棒且圖天下太平雲居錫云比來要禮國師南泉為什麼却相喚回且道古人意作麼生報慈遂徵云只如南泉與麼道是肯語是不肯語五祖演云三人是慧炬三昧莊嚴王三昧薦福行云三個中有見得國師的有見不得國師的若人辨得出許你具頂門眼南華昺云動絃別曲還他麻谷歸宗掣鼓奪旗偏宜南泉老漢直得同行不同步黨理不黨親白雲盡處是青山行人更在青山外天童覺云我當時若見便與抹却圓相不唯打破南泉窠臼亦乃教歸宗無著身處麻谷呈伎倆不得南泉道恁麼則不去也果然果然天寶樞云三大老途中與麼呈伎倆要見國師驢年也未得在中峰本云南泉畫地為牢歸宗墮坑落塹麻谷恭而無禮撿點將來一人眼空四海一人舌拄梵天一人入地獄如箭大巍倫云這三個漢半路做箇抽身計以為自勝然究竟將來千説不如一見笑巖寶云三人未發足前鼻孔已在忠國師手裏直造中途果見弄粥飯氣磬山修云三大老雖同條生不同條死各有出身之路然三人中有一人堪為師法若人揀得出許你具擇法眼天井新云一人買帽相頭一人將錯就錯一人看樓打樓更有一人額頭汗出寶光淵云這三個弄泥團漢要見國師固為不可然王老師相喚便回且道是何意思南泉住庵時一僧到泉謂曰某甲上山作務請齋時作飯自喫了送一分來其僧作飯喫了將家伙一時打破却就牀臥泉候不來乃歸庵見僧臥泉亦就僧邊臥僧便起去泉住後曰我往前住庵時有個靈俐道者直至如今不見五祖戒云也是貧兒思舊債翠巖芝云兩個漢前不至村後不至店高峰妙云南泉雖則步步踏實未免隨人起倒這僧縱解飽食高眠決定不知飯是米做高峰恁麼告報設有一字虗妄永墮拔舌地獄通玄奇云這僧與麼行腳驢年也沒個在處南泉與麼接待極是沒量大人爭奈彼此不無鈍置愚菴盂云可惜這僧泯然無聞當時風儀令人可愛南泉過後思君子見之晚矣彼時下山來何不掘個坑將這僧埋却豈不據欵一結時有一僧云老漢聻盂乃與一頓熱棒趂出山門城山洽云南泉青天白日著賊不少這僧伎倆雖佳爭奈深入他家羅網雲庵悅云南泉雖有陷虎之機要且未盡其善我當時若見伊打破家伙高眠枕席但只呵呵大笑管取疑殺這漢南泉遣書與茱萸曰理隨事變寬廓非外事得理融寂寥非內僧達書了乃問萸如何是寬廓非外茱曰問一答百也無妨如何是寂寥非內茱曰覩對聲色不是好手僧又問長沙如何是寬廓非外沙瞪目視之如何是寂寥非內沙閉目視之僧又問趙州如何是寬廓非外州作喫飯勢如何是寂寥非內州以手作拭口勢泉聞乃曰此三人不謬為吾弟子昭覺勤云南泉雖則養子之緣其奈憐兒不覺醜殊不知這三人一人有目無足一人有足無目一人足目俱無雖然如是皆可與南泉為師為甚如此理事分明南泉上堂王老師自小養一頭水牯牛擬向溪東牧不免犯他國王水草擬向溪西牧不免犯他國王水草不如隨分納些些總不見得雲門偃云且道牛內納牛外納直饒你説得納處分明我更要問你覓牛在溈山哲云雲門只解索牛不解穿他鼻孔拈拄杖云三世諸佛天下老和尚鼻孔盡被山僧拄杖一時穿却且道山僧鼻孔在什麼處良久云誣人之罪以罪加之長慶稜云你道南泉前頭為人後頭為人雪竇顯云一時穿却雲峰悅云説甚納些些盡乾坤大地色空明暗情與無情總在山僧這裏放行則隨緣有地把住則逃竄無門且道放行好把住好昭覺勤云和光順物與世同塵不犯鋒鋩收放自在是南泉本分草料山僧自小養一頭水牯牛有時孤峰獨立有時閙市縱橫不論溪東溪西一向破塵破的且道即今在甚麼處試著眼看天童傑云南泉起模畫樣長慶披沙揀金雲門鼻孔先穿雪竇據欵結案拈拄杖云更有一個在甚麼處乃擲下拄杖靈隱嶽云王老師傾腸倒腹則不無未見移風易俗在山僧只養得一頭驢一向東倒西擂順時一日何啻千里拗時直是寸步不移且道與王老師水牯牛相去多少良久云漁人舞棹野老謳歌天童覺云南泉牧牛可謂奇特直是一切處關防不得為甚麼如此是他隨分納些些報恩秀云南泉水牯牛無鼻孔你這一隊漢作麼生穿所以勝默老人道在一切同一切一切處收不得且道隨分納些些了後如何芻蕘莠稗愁耘處蹄角皮毛趂謴時古南門云南泉只知落草求人爭奈妄生頭角引得諸大宗師都向草中打輥未得個淨絶還見南泉撒手處麼將此身心奉塵剎是則名為報佛恩愚庵盂云且道這些些還是溪東溪西除是這牛兒不囓一莖草不飲一滴水始得就使牽到他方世界外還出得他國王水土麼試請王老師定當看南泉巡堂次牽一頭牛入堂首座以手撫牛背一下泉便休去趙州乃以草二束置首座前國清英云趙州南泉大似屋裏販揚州首座恁麼可知禮也南泉因僧問牛頭未見四祖時為甚百鳥銜花獻泉曰為渠步步踏佛階梯曰見後為甚麼不來泉曰直饒不來猶較王老師一線道雲門偃云南泉祇解步步登高不解從空放下時有僧便問如何是步步登高門云香積世界如何是從空放下門云填溝塞壑南泉見鄧隱峰來乃指淨瓶曰淨瓶是境你不得動著境與我將水來峰將淨瓶傾水於南泉面前泉便休歸宗常云鄧隱峰也是亂瀉勝法法云鄧隱峰猶欠一槌在南泉休去伯牙與子期不是間相識祇如歸宗恁麼道且道是肯他是不肯他南泉示衆曰江西馬祖説即心即佛王老師不恁麼不是心不是佛不是物恁麼道還有過麼趙州出禮拜了便去有僧問趙州上座禮拜了去意作麼生州曰汝却問取和尚僧乃問泉適來諗上座意作麼生泉曰他却領得老僧意旨黃龍心云古人恁麼道譬如管中窺豹但見一斑設使入林不動草入水不動波猶是騎馬向氷稜上行若是射雕底手何不向蛇頭揩癢透關者試辨看良久云鴛鴦繡出自金針徑山杲云兩個老漢雖善靴裏動指頭殊不知傍觀者醜天寧琦云南泉趙州總被這僧一狀領過南泉因僧問父母未生前鼻孔在什麼處泉曰父母已生了鼻孔在什麼處國清英云去時鼻孔撩天來時腳踏實地為甚麼討人處分良久云不因楊得意爭見馬相如南泉玩月次僧曰幾時得似這個去泉曰王老師二十年前也曾恁麼來僧便問即今作麼生泉便歸方丈天童覺云二十年前且置二十年後作麼生還知王老師行履處麼室內無靈牀渾家不著孝紫梅周云樂平這裏也不管你二十年前二十年後正當八月十五夜又作麼生良久云寧可截舌不犯國諱南泉一日不赴堂侍者曰請和尚赴堂泉曰老僧今日在莊上喫油糍飽也曰和尚不曾出入泉曰汝不信去問莊主侍者方出忽見莊主曰謝和尚到莊徑山杲云和尚不赴堂莊主謝臨屈一字入公門九牛拔不出西遁超云一人見兔放鷹一人將錯就錯可謂一隊普州人但這莊主雖然伶俐未免一牽便動我若作莊主但向南泉面前冷笑一聲管教王老師滿面慚惶此鵝湖孚事諸方誤作南泉事非也特此辨正南泉問座主講什麼經曰彌勒下生經泉曰彌勒幾時下生曰現在天宮未來泉曰天上無彌勒地下無彌勒洞山價舉問雲居居云天上無彌勒地下無彌勒未審誰與安名洞山被問直得禪牀震動乃云吾在雲巖曾問老人直得火爐震動今日被子問直是通身汗流太陽玄云如今老僧舉起也有解問者致將一問來乃云地動也徑山杲云禪牀動火爐動地動即不無這三個老漢要見南泉直待彌勒下生始得忽有個漢出來道天上無彌勒地下無彌勒却教甚麼人下生又作麼生祗對但向他道老僧罪過愚庵盂云南泉等間置個問頭不特使座主口啞洞山直得禪牀震動雲嚴火爐震動太陽玄地動彼此隨摟搜你也動我也動動到彌勒下生有甚了期或問山僧天上無彌勒地下無彌勒未審誰與安名山僧直得八萬四千毛竅一時卓立打失了娘生鼻孔西遁超云天上無彌勒地下無彌勒畢竟意旨如何何不看取下文咄時時示時人時人渾不識南泉因陸亘大夫曰肇法師也甚奇怪解道天地與我同根萬物與我一體泉指庭前牡丹花曰大夫時人見此一枝花如夢相似陸罔測保寧勇代大夫拍手云阿誰得到這般田地昭覺勤云陸亘手攀金鎖南泉八字打開直得七珍八寶羅列目前乃豎拂子云天地一指萬物一馬通身是口分踈不下徑山杲云若向理上看非但南泉謾他大夫一點不得亦未摸著他腳跟下一莖毛在若向事上看非但大夫謾他南泉一點不得亦未夢見他汗臭氣在或有出來道大小徑山説理説事只向他道但向理事上會取天寧琦云還會麼你若向天地同根萬法一體上會落在肇公圈繢裏你若向事理上會又落在妙喜葛藤中總無自由分祇如南泉與麼道你畢竟如何會天寧不惜眉毛為諸人下個注腳平蕪盡處是青山行人更在青山外愚庵盂舉雪竇頌畢云大夫夢中作夢南泉夢中占夢也大奇怪雪竇善於原夢鏡裏山河影中聞見撲碎鏡拂却影可惜一枝花拈向霜天月下更來澄潭摸索可不道月落夜闌不知何處相見知有者揀點看寶壽新云大夫與麼問南泉與麼答且道明甚麼邊事以手一摑云多嘴吳聖玉云驅耕夫牛奪飢人食不無南泉撿點將來大似開眼説夢當時不若劈脊一棒免他向牡丹鑽龜打瓦南泉因趙州問道非物外物外非道如何是物外道泉便打州捉住棒曰已後莫錯打人泉曰龍蛇易辨衲子難瞞雪竇顯云趙州如龍無角似蛇有足當時不管盡法無民直須喫棒了趂出南堂欲云趙州物外相從善能回互南泉棒頭有準放收自由雪竇雖欲盡令而行未具辨龍蛇眼古南門云南泉真個憐兒不覺醜若是其人何待人趂自須掩鼻便出南泉因趙州問如何是道泉曰平常心是道曰還可趣向也無泉曰擬向即乖曰不擬爭知是道泉曰道不屬知不屬不知知是妄覺不知是無記若真達不疑之道猶如太虗廓然蕩豁豈可強是非耶州於言下悟理徑山琇云古人將心肝五臟一時吐露了也摩霄俊鶻便合乘時止濼困魚徒勞激浪寶壽方云王老師箋釋不易南石老擊節猶勤唱教門中甚為難得若是祖師門下千里萬里白巖符云南泉技藝慣壓行家拂袖玩月時雖馬祖亦嘗稱其為獨超物外乃今接趙州却似個善説座主為當本色恁麼為當別有意旨試定當看青龍操云南泉雖嚼飯餵嬰孩切忌作道理會
