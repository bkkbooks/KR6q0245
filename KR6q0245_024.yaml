body:
  text: 古杭白巖嗣祖沙門淨符彚集青四舒州投子大同禪師青四翠微學嗣一日指菴前一片石向雪峰曰三世諸佛總在裏許峰曰須知有不在裏許者子曰不快漆桶又一日與峰遊龍眠有兩路峰問那個是龍眠路子以杖指之峰曰東去西去子曰不快漆桶峰又問一槌便就時如何子曰不是性躁漢曰不假一槌時如何子曰不快漆桶又一日峰問此間還有人參也無子將钁頭拋向峰面前峰曰與麼則當處掘去也子曰不快漆桶雪竇顯云然則一期折挫雪峰且投子是作家罏鞲我當時若作雪峰待道不是性躁漢只向伊云鉗槌在我手裏諸上座合與投子著得箇什麼語若能道得便乃性躁平生光揚宗眼若也顢頇頂上一槌莫言不道溈山云雪峰雖是本分鉗槌爭奈投子是作家爐鞲衆中還有本分鉗槌者麼如無山僧為你諸人下一槌直是火星迸散乃卓拄杖云看看諸人護取眉毛好東禪觀云與麼酬對喚做作家爐鞲正是認狸為虎自取疑怖若據性空見處投子心肝五臟被雪峰盡情摟出古南門云投子雪竇俱是作家爐鞲爭奈鉗槌在手善說不善用未為性躁若是古南待雪峰才問一槌便就時如何劈脊便棒云打破者漆桶諸上座漆桶既然打破宗眼又作麼生光揚投子路次逢趙州州問莫便是投子山主麼子曰茶鹽錢布施我州乃先至菴子後歸手携油缶州曰久嚮投子及乎到來祇見箇賣油翁子曰你只識賣油翁且不識投子州曰如何是投子子提起油瓶曰油油州問大死底人却活時如何子曰不許夜行投明須到州曰我早候白伊更候黑南堂靜云趙州作家爐鞲要煅百煉精金投子本分鉗槌不免途中受用諸人要見二老落處麼十年辛苦無人問一旦成名天下知博山來云跨逐日之蹄截奔滙之水非趙州即投子非投子即趙州如善知奕者各見數著之先應在臨機自然調妥要知二老落處麼向鐵圍城穿下過來十字街頭與汝相見投子因巨榮禪客參子曰老僧未有一言半句挂諸方脣齒何用要見老僧榮曰到者裏不施三拜要且不甘子曰出家兒得與麼沒記榮乃繞禪牀一匝而去子曰有眼無耳朵六月火邊坐雪竇顯云也不得放過才繞便擒住云是誰不甘若跳得出不妨是一員衲僧溈山云者僧雖是慣戰沙場怎奈投子善能折挫何故真金若不經爐冶怎得光華徹底鮮古南門云者僧放過且不論祇如有眼無耳朵六月火邊坐還放過得投子麼投子因僧問如何是十身調御子下禪牀立又問凡聖相去多少子亦下禪牀立雪竇顯云此公案諸人無不委知若與麼舉天下衲僧盡為念話杜家雪竇還有長處也無試為大衆舉看凡聖相去多少投子下禪牀立如何是十身調御投子下禪牀立且道與前來舉底是同是別若道一般許上座具一隻眼若道別有奇特也許上座具一隻眼復更開一線道凡聖相去多少請上座下一轉語如何是十身調御請上座答一轉語非但參見投子亦乃知雪竇長處或若總道下禪牀立惜取眉毛好五祖演云或有人恁麼問山僧亦下禪牀立為什麼却依樣畫猫兒待我計較得成却向你道徑山杲云投子下禪牀今朝為舉揚驢前馬後漢切忌亂承當高峰妙云一轉語天懸地殊一轉語言端語的具眼者試辨取古南門云投子好箇十身調御被雪竇咬得百雜碎設有問者但道口上著龍華體云投子抱璞示人貴圖識者爭奈不遇賈目祇作瓦礫擲却雪竇固是明眼指瑜摘瑕爭奈太傷風化致令後人不見完璧諸人要見完璧麼良久云來朝更獻楚王看投子因僧問如何是一大事因緣子曰尹司空請山僧開堂昭覺勤云投子古佛叢林中推其得逸羣之辨得朴實道用看其等間拈掇不妨佛法世法打成一片然雖如是惜其不甚寬廓今日有問天寧如何是一大事因緣即向他道手握金輪清四海聖躬彌億萬斯年龍翔欣云投子老人可謂應機施設不犯鋒鋩中峰不免因齊慶讚一髮由來引萬鈞全肩荷負見當人通身手眼重拈掇枯木花開大地春磬山修云二老宿舉揚一大事因緣本無優劣作麼生是投子實頭處設有問磬山如何是一大事因緣但向他道朝看雲片片暮聽水潺潺天童忞云佛果眼蓋五天胸羅萬有據其生平施設發一言舉一令直欲上窮圓蓋下透風輪山僧今日非敢抑他威光細檢此語未免碌碌因人成事若是道峰即不然有問如何是一大事因緣但向他道數聲黃鳥青山外占斷風光作主人金粟元云與麼答話雖則朴實十分要且驚羣動衆新金粟則不然如何是一大事因緣但向他道橫吹玉笛鷗灘上九九奇巒盡點頭神鼎僼舉昭覺勤天童忞二語畢云三大老相席打令各展家風可謂一步高一步一浪濶一浪天童新長老則不然有問如何是一大事因緣但向他道雲開日現人人見水到渠成處處通投子因僧問一大藏教還有奇特事也無子曰有曰如何是奇特事子曰演出一大藏教雲巖新別云演入一大藏教昭覺勤云差病不假驢䭾藥徑山杲云演出演入則不無二老若是奇特事三生六十劫也未夢見在獅林則云叢林商量都道大慧不肯二老若作恁麼見解三生六十劫未夢見大慧在投子因僧問月未圓時如何子曰吞却三個四個曰圓後如何子曰吐却七個八個天童傑云吞却與吐却算來無處著要見滑稽人便是黃番綽南山寶云者則公案你若向吞吐處著倒我知你未識投子若問紫雲月未圓時如何遍界是光明圓後如何通身無向背且道與投子相去多少廣潤融云大小投子為人不無直截祇是賺他在三三四四七七八八上作活計若有問廣潤月未圓時如何向道大家在者裏圓後如何待山僧出隊回來為你說破投子因僧問不斷煩惱而入涅槃時如何子作色曰者個師僧好發業殺人國清機因其僧又問不斷煩惱而入涅槃時如何清便打松隱然云投子只解裁長不能補短國清只解補短不能裁長或有問龍峰不斷煩惱而入涅槃時如何只對他道有水皆含月無山不帶雲洞山度云投子古佛殺人不用刀活人不用劒非但善能裁長而且善於補短雖然在洞山者裏又且不然今日或有人恁麼問但向道柴炭紙衾松風水石且道與古人是同是別投子因僧問依俙似半月髣佛若三星乾坤收不得師於何處明子曰道什麼僧曰想師只有湛水之波且無滔天之浪子曰閒言語雪竇顯云投子古佛不可道不知若檢點將來直是天地懸隔若是雪竇才問和聲便打天童傑云田地穩密佛眼不能窺坐籌帷幄決勝千里還他投子老人者僧也解扣關擊節上門上戶只是插手腳不得雪竇道和聲便打也是賊過後張弓雲居莊云有人與麼問山僧山僧亦云道什麼待道只有湛水之波且無滔天之浪腳跟下痛與一頓拈拄杖云有麼有麼靠拄杖云縱饒栽種得不是棟梁材海舟慈云者僧文辭燦爛投子本分提持若是濟下兒孫痛打一頓逐出投子因一婆子家中失却牛特詣方丈請卜子召婆婆婆應諾子曰牛在白巖符云大小投子奇則奇矣要且鬼家活計未有殺活當時婆子應諾何不曰在即在祇是少了些頭角婆子從者裏搆去也未可知鄂州清平安樂令遵禪師青四翠微學嗣因僧問如何是小乘平曰錢貫如何是大乘平曰井索如何有是漏平曰笊籬如何是無漏平曰木杓覿面相呈時如何平曰分付與典座天寧琦云永祚不避諸方檢責也要矢上加尖打破大唐國覓一個會佛法底不可得澧州夾山善會禪師青四船子誠嗣因僧問如何是夾山境山曰猿抱子歸青嶂裏鳥銜花落碧巖前法眼益云老僧二十年只作境話會浮山遠云直饒不作境話會亦未許在何故犀因玩月紋生角象被雷轟花入牙琅瑘覺云且道如今作甚麼會良久云上士遊山水中人坐竹林黃龍新云者僧分明問境法眼因甚不作境會既不作境會作什麼會長憶江南三月裏鷓鴣啼處百花香黃龍震云直饒法眼盡力𨁝跳也出夾山圈繢不得法眼既出不得且道是什麼人出得乃豎起拂子云須是者老漢始得高峰妙云大衆還會麼直饒向者裏會得見法眼則易見夾山則難白巖符云不作境話會且作麼生會者裏也須有個眼目始得不然總是念言語漢真如元徵云者僧問底夾山答底兩兩分明是境話法眼因甚却恁麼道蟠龍長云法眼與麼解會要見夾山直待驢年夾山示衆百草頭上薦取老僧閙市裏識取天子雲門偃云蝦蟆鑽你鼻孔毒蛇穿你眼睛且向葛藤裏會取雲峰悅云雲門與麼道大似和泥脫墼若無後語疑殺天下人山僧今日因行不妨掉臂乃豎拄杖云還見雲門麼保寧勇云百草頭上分明顯露為甚不薦閙市裏終日相逢為甚不識未開眼者且莫錯怪夾山雖然如是干保寧什麼事雲居舜云古人與麼實為慈悲大衆且作麼生是閙市門頭天子會麼愁人莫向愁人說說向愁人愁殺人徑山杲云夾山垛生招箭雲門認賊為子雖然如是知恩者少負恩者多天寧琦云百草頭薦阿誰閙市裏識什麼仰山欽云與麼說話正是妄認前塵分別影事若是端拱垂衣孤峰獨宿未夢見在汝等諸人要見夾山豎拂子云一狀領過佛川義云大小妙喜錯判不少衆中還有辨別得出者麼如無野山翻案去也雲門垛生招箭夾山認賊為子我與麼道也是空費口脣皮何也不見道知恩者少負恩者多崇先奇云夾山好事不如無雲門禍不單行雖然如是駕與青龍不解騎又爭怪得山僧夾山上堂我二十年住此山未曾舉著宗門中事僧便問承和尚有言二十年住此山未曾舉著宗門中事是否山曰是僧便掀倒禪牀山休去明日普請掘一坑令侍者請昨日問話僧至曰老僧二十年說無義語今請上座打殺老僧埋向坑裏便請便請若不打殺老僧上座自著打殺埋向坑裏始得其僧歸堂束裝潛去昭覺勤云夾山濁時頭尾皆濁者僧清時始終俱清後人不會盡云者僧怕被打殺潛然而去殊不知綿裏有針者僧好即好只是少一轉語待道若不打殺老僧上座自著打殺埋向坑中始得只近前兩手擘開云猫中峰本云者僧始則攙旗奪鼓終則詐敗佯輸夾山雖有添兵減竈之謀爭奈腳跟下泥深三尺敬畏空云夾山者漢賊過張弓當時待者僧問何不曰我向來無此語喚侍者立時擯出亦不失乎有前無後乃無端掘坑不曾埋者僧却自埋却了也天井新云者僧若不潛去好與夾山一坑埋却慧雲盛云夾山褲內火發幾乎自身難保者僧虎頭㧓癢幸其作速躲得過白巖符云夾山掘個坑子盡大地人乞命有分其奈者僧別有條軟套索子不惟自得全生且能絆倒夾山如今還有為夾山扶起者麼夾山因虎頭上座參山問甚處來曰湖南來山曰曾到石霜麼曰要路經過爭得不到山曰聞石霜有毬子話是否曰和尚也須急著眼始得山曰作麼生是毬子曰跳不出山曰作麼生是毬杖曰沒手足山曰且去老僧未與闍黎相見雪竇顯云親見者僧從石霜來夾山因甚道不相識智海逸云夾山恁麼道是肯者僧不肯者僧若辨得出許你具擇法眼徑山策云入虎穴者不畏死登危竿者不怕險者僧要路經過夾山因茲落草檢點將來未免如猫弄鼠塗毒若作夾山待他道和尚也須急著眼即和聲打出且向道淨地上不要放屙還知麼傷鱉恕龜殺活由我開先金云夾山何用繁詞待道要路經過爭得不到便與劈脊打出不惟見我門庭高峻亦使者僧脫皮換骨夾山因與虎頭上座相見了次日又升座曰昨日新到在麼頭出應諾山曰目前無法意在目前不是目前法非耳目之所到頭曰今日雖問要且不是山曰片月難明非關天地頭曰莫𡱰沸便作掀禪牀勢山曰且緩緩虧著上座甚麼處頭豎起拳曰目前還著得者個麼山曰作家作家頭又作掀禪牀勢山曰大衆看者一員戰將若是門庭布列山僧不如他若據入理深談也較山僧一級地天童覺云夾山老子解開布袋頭將差珍異寶撒向諸人面前了也正當恁麼時作麼生路不拾遺君子稱美東禪嶽云夾山只吹無孔笛手提氈拍板大家唱云去年梅今年柳顏色馨香依舊且道是何曲調還會麼曲終人不見江上數峰青夾山因僧問撥塵見佛時如何山曰直須揮劍若不揮劍漁父棲巢僧後問石霜撥塵見佛時如何霜曰渠無國土甚處逢渠僧回舉似山山上堂舉了乃曰門庭施設不如老僧入理深談猶較石霜百步護國元云參須實參見須實見毫端許言之本末皆為自欺今夜忽有問三峰撥塵見佛時如何和聲便打為什麼黃金自有黃金價終不和沙賣與人梅山相云夾山斫木為舟石霜藏頭露面山僧則不然有問撥塵見佛時如何便與劈脊一棒非但使者僧當下悟去亦免費後人許多氣力石霜尊云夾山為衆竭力禍出私門石霜覿露全機遭人邈摸護國要且只有利人之心且無出人之眼若問山僧撥塵見佛時如何亦與和聲便打待伊擬議便與擲下拄杖夾山會下有一僧到石霜入門便道不審霜曰不必闍黎僧曰與麼則珍重便去又到巖頭入門便道不審頭乃噓兩噓僧曰與麼則珍重才回步頭曰雖是後生亦能管帶其僧歸舉似夾山山明日升堂乃喚曰昨日從石霜巖頭來底阿師出來如法舉前話僧舉了山曰大衆還會麼若無人道老僧不惜眉毛道去也乃曰石霜雖有殺人刀且無活人劒巖頭亦有殺人刀亦有活人劒白巖符云石霜巖頭已有夾山發放了也茲置弗論若夫者僧亦不妨許伊是個俊俏衲子祇是不合向夾山手裏納敗缺當時若解慎初護末待道如法舉前話便好掀倒禪牀教夾山者漢要做鹽鐵判官也未得在夾山因僧問如何是佛山曰此位無賓主曰尋常與什麼人對談山曰文殊與吾携水去普賢猶未折花來百丈泐云在家不會迎賓客出路方知無主人花階柳巷皆空過嗟怨堂中老令公且道尋常畢竟與什麼人對談良久云命坐孤星日犯歲君夾山問黃山月輪子是甚處人曰是閩中人山曰還識老僧麼曰還識學人麼山曰不然子且還老僧草鞋錢然後老僧還子廬陵米價曰恁麼則不識和尚也未審廬陵米作麼價山曰真獅子兒善能哮吼天奇瑞云神之通也虎穴魔宮無不自在用之妙也海角天涯有何障蔽縱之星布高穹奪之風捲殘雲自古明鎗易躲至今暗箭難防鼷口鼠食人不覺疼若人會得八表橫行大珠云凡參學流頂門具眼方堪共語看他作者相見機鋒相拄唱愈高和愈峻八面玲瓏何等自在雖然還知者僧暗傷毒箭處麼夾山因僧問如何是相似句山曰荷葉團團團似鏡菱角尖尖尖似錐復曰會麼僧曰學人不會山曰風吹柳絮毛毬走雨打梨花蛺蝶飛仰山欽云大小夾山雖然不負來機爭奈被者僧勘破仰山則不然如何是相似句荷葉團團團似鏡菱角尖尖尖似錐學人不會風吹柳絮毛毬走雨打梨花蛺蝶飛終是別些子天寧琦云夾山老漢與麼答話恰似夾竹桃花錦上鋪花只是未曾點著本分事在若有問天寧如何是相似句向道無將支遁鶴誤作右軍鵝夾山見船子後再住京口僧問如何是法身山曰法身無相如何是法眼山曰法眼無瑕僧舉似道吾吾曰者漢此回方徹育王雪云三十年前賣牛買馬三十年後賣馬買牛若是出格流決不向他語脉裏轉還見麼法身無相法眼無瑕青龍斯云夾山答話前來也恁麼道後頭也恁麼道為什麼道吾前頭失笑後頭却滿口肯他且道節目在什麼處豎拂子云尋常一樣窗前月才有梅花遂喝一喝云不得者一喝幾乎道個便不同夾山在溈山充典座溈一日問今日喫甚麼菜山曰兩年同一春溈曰好好修事著山曰龍宿鳳巢天童傑云柄在手縱奪臨時敲磕將來百味具足其中只缺一味且道是油是醬若人檢點得出華藏功不浪施天界盛云夾山者漢才遭一笑三橈開得眼來便乃氣吞諸方雖然汝等時中還曾咬著二年同一春麼喝一喝云趕起石老虎著夾山將示滅垂語曰石頭一枝看看即滅矣洛浦曰不然山曰何也浦曰他家自有青山在山曰苟如是即吾宗不墜矣愚菴盂云石頭一枝有賴洛浦此語墜吾宗者可惜夾山後語減價賣絲帛兒孫盡布衣白巖符云大小洛浦錯過夾山當時若是個克肖兒待道石頭一枝看看即滅矣便好震威一喝云者漢臨死猶寐語拂袖便出管教夾嶺一枝至今蕃茂乃無端云云豈不令夾山擔盡干係愚菴云墜吾宗者可惜夾山後語失却一隻眼殊不知夾山此語只好信他一半
