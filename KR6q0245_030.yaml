body:
  text: 古杭白巖嗣祖沙門淨符彚集青五撫州曹山本寂禪師青五洞山價嗣僧問世間什麼物最貴山曰死貓兒頭最貴曰為什麼死貓兒頭最貴山曰無人著價天童覺云曹山物貨不入行市仔細看來一文不值曹山遇賤則貴我者裏遇貴則賤且道還有相違處麼報恩秀云家無滯貨不富又云世尊拈花俱胝竪指且道與死貓兒頭是同是別曹山因僧問子歸就父為甚麼父全不顧山曰理合如是曰父子之恩何在山曰始成父子之恩曰如何是父子之恩山曰刀斧斫不開天童覺云翡翠簾埀絲綸未降紫羅帳合視聽難通犯動毛頭月升夜戶密移一步鶴出銀籠還知麼脫身一色無遺影不坐同風落大功報恩秀云退位朝君轉身就父曹山乃竭力提持罄囊分付了也天童於夜明簾外空王殿中借無舌人傳宣勑無耳人承旨此猶是月升夜戶邊事鶴出銀籠一句作麼生道九皋才翥翼千里漫追風曹山示衆諸方盡把格則何不與他一轉語教他不疑去雲門便問密密處為甚麼不知有山曰只為密密所以不知有曰此人如何親近山曰莫向密密處親近曰不向密密處親近時如何山曰始解親近門應諾諾徑山杲云濁油更點濕燈心天寧琦云雪山南面三千里白巖符云只為密密所以不知有錯不向密密處親近始解親近錯大小曹山山僧為諸人捉敗了也且道如何是此人祇如妙喜楚石二老與麼道有交涉無交涉不可一向忽略放過錯會古人他時閻老子考鞫莫言不道曹山因僧問如何是法身主山曰謂秦無人曰者個莫便是否山曰斬百丈泐云依門傍戶覔主問奴祇如曹山道個斬字且道意在於何喝一喝云將謂無人莫言不道白巖符云窮峰極頂不可不到到得不更進一步也只是個坐地死漢曹山為者僧抖擻尿腸發泄殆盡雖然你若便作不守珍御會却須斬為三段何故者裏無你著腳處曹山因僧問靈衣不挂時如何山曰曹山今日孝滿曰孝滿後如何山曰曹山好顛酒報恩秀云曹山有時醉醉裏醒醒有時醒不分晝夜蓋為他黃糧夢斷閨閣情忘新豐所以謂觸目荒林論年放曠也然則孝滿後畢竟如何四時春富貴萬物酒風流白巖符云今時師僧抱個不哭底孩兒便擬向十字街心掣風掣顛而堂上尊慈且不曾盡杯水之敬即望他靈衣著體已是見卵而求時夜況所謂孝滿乎又況所謂孝滿後乎實實此事非三病二光一一透盡更透盡連更透盡底氣息一點也無者要與曹山相見山僧者裏斷斷不許為什麼聻不是吾門無肯語乘龍端是不凡人曹山問僧作什麼來曰掃地來山曰佛前掃佛後掃曰前後一時掃山曰與曹山過靸鞋來五祖戒代僧進語云和尚是何心行天界盛云曹山一向只會作主若是山僧則不然待道前後一時掃却喚行者者僧掃地辛苦且與他一碗茶喫曹山一日聞鐘聲乃曰阿㖿阿㖿僧問和尚作什麼山曰打著我心僧無對五祖戒代僧云作賊人心虗徑山琇云賊不打自招寶壽方云弄精魂漢有什麼限好與貶向他方清化嶾云沒量大人却向聲色裏鼓弄人家男女豐山嚴云曹山老漢要驗作家殊不知却被者僧勘破曹山因僧問如何是獅子山曰衆獸近不得曰如何是獅子兒山曰能吞父母者曰既是衆獸近不得為什麼却被兒吞山曰豈不見道子若哮吼祖父俱盡曰盡後如何山曰全身歸父曰未審祖盡時父歸何所山曰所亦盡曰前來為什麼道全身歸父山曰譬如王子能成一國之事寶壽方云諸人要識全身歸父底意旨麼大用齊彰忘觸避臨機殺活更由誰壽昌存徵云既是所亦盡腳下兒孫擬從何處與祖父相見曹山問強上座佛真法身猶若虗空應物現形如水中月作麼生説個應底道理曰如驢覷井山曰道即太煞道只道得八成曰和尚作麼生山曰如井覷驢博山來云豪士之鋒詩人之態貫協精華斯無餘蘊曹山提挈過人如萬仞巖頭打斤斗下來攀仰不得非但三玄五位直是佛祖髑髏悉穿下過咦白巖符云如驢覷井説個應底道理不妨許你東卜西卜至曰如井覷驢你又作麼生會者裏著不得一隻眼要做曹山底奴子也未得在曹山因鏡清問清虗之理畢竟無身時如何山曰理即如此事作麼生曰如理如事山曰瞞曹山一人即得怎奈諸聖眼何曰若無諸聖眼怎鑒得個不與麼山曰官不容針私通車馬溈山云曹山雖然善能切磋琢磨其奈鏡清玉本無瑕要會麼不經敏手終成廢器東山澓云二尊宿唱拍相隨拳踢相應且道站腳在什麼處山僧為你饒舌去也曹山向煤墨裏突出眼睛一時被鏡清拈虗空楔塞却其奈曹山如佛圖澄脅下有孔遠近森羅人物駢闐一一殊形無不照見棲霞成云朕兆未分理微莫覩機輪才轉事相全彰窮玄於鳥道之先辨的於羊腸之外鏡清固已卓然有識矣官不容針私通車馬曹山非等間語無身有事超岐路無事無身落始終演教泐云動絃別曲葉落知秋放去收來明投暗合正偏不失妙叶無私不犯當頭轉身有路何故不見道但能不觸當今諱也勝前朝斷舌才曹山因僧問香嚴如何是道嚴曰枯木裏龍吟如何是道中人嚴曰髑髏裏眼睛僧不領往問石霜如何是枯木裏龍吟霜曰猶帶喜在如何是髑髏裏眼睛霜曰猶帶識在又不領乃問曹山如何是枯木裏龍吟山曰血脈不斷如何是髑髏裏眼睛山曰乾不盡未審還有得聞者麼山曰盡大地未有一人不聞曰未審枯木裏龍吟是何章句山曰不知是何章句聞者皆喪遂示偈曰枯木龍吟真見道髑髏無識眼初明喜識盡時消息盡當人那辨濁中清玄沙備別香嚴初語云龍吟枯木昭覺勤云念不異心不差圓融五位君臣跳出無為三毒便可以向枯木上生華寒巖中吹律看他三個老宿一人透語滲漏一人透情滲漏一人透見滲漏若善參詳便可玄關獨步還委悉麼莫守寒巖異草青坐斷白雲機不妙徑山杲舉圓悟語畢云諸人還揀得出麼若揀不出妙喜不惜眉毛為諸人説破香嚴透語滲漏被語言縛殺石霜透情滲漏被情識使殺曹山透見滲漏被見聞覺知惑殺分明説了具眼者辨天寧琦舉妙喜語畢云妙喜老人全身坐在三種滲漏裏却不被三種滲漏所拘雖然要見古人直是遠在為什麼聻無事教壞人家男女天童覺云王居門裏臣不出門報恩秀云天童能以無量法門作一句説有時一字法門海墨書而不盡還識天童安家樂業處麼獨鶴有時常伴水好雲無事不離山曹山因僧問抱璞投師請師雕琢山曰不雕琢曰為什麼不雕琢山曰須知曹山好手雲居莊云且道者僧會曹山語不會曹山語山僧道直饒會得也是無端白巖符云大小曹山為一個販骨董漢乃費却許多斧鑿未為好手今日有問覺王抱璞投師請師雕琢便驀頭與伊一棒直饒是荊山良璧教他百雜碎為什麼要使伊脫却鶻臭布衫拈却炙脂帽子曹山因僧問皓月當空時如何山曰猶是階下漢曰請師接上階山曰月落後相見天童悟上堂舉畢乃云且道既是月落後又如何相見時萬峰藏便出法堂悟便下座薦福如云曹山老漢審症開方天童萬峰依方合藥固皆不愧為杏林中國手然細撿將來俱未免帶些子醫生氣態曹山因辭洞山山問子向甚麼處去曰不變異處去山曰不變異處豈有去耶曰去亦不變異報恩倫云還知不變易處麼你擬心動念早是變易了也祇如曹山道去亦不變易又作麼生要委悉麼轉盡無功伊墮位孤標不與汝同盤弘云者片田地被曹山占却了也雖然如是券書還在洞山手裏洪州雲居道膺禪師青五洞山價嗣因劉禹端公上山謝雨問雨從何來居曰從端公問處來公遂禮三拜歡喜而退行數步居乃召端公公回首居曰問從何來公無語歸家三日而薨徑山杲云端公無語歸家三日而死正𭺗著弘覺癢處只是不知轉身一路當時待道問從何來但依前禮三拜歡喜而退且教弘覺疑三十年天童忞云雲居問殺端公眉毛落却大半端公遭問脫去説話終不借人舌頭即今有問天童雨從何來但向道合取口然則作麼生得他雨下但辦肯心決不相賺雲居令侍者送褲與一住菴道者道者曰自有娘生褲竟不受居却令侍者去問娘未生時著個什麼道者無語後遷化燒得舍利持似居居曰直饒燒得八斛四斗不如當初下取一轉語好菩提密代道者云謝和尚再三慧雲盛云且道當時下得什麼語始免罪戾我若作菴主待道娘未生時著個什麼向道多謝和尚重惠天目律云雲居老漢令行忒煞道者無語識法者懼侍僧從旁曰當時若問和尚娘未生時穿個什麼未審又作麼生乃向道是誰作造雖然今時師僧家非不能下千語萬語要求其舍利半粒又安得哉白巖符云雲居老漢錯過道者道者當時無語不妨作家只是可惜無人證明雲居因成尚書問如來有密語迦葉不覆藏此理如何居召尚書書應諾居曰會麼曰不會居曰若不會如來有密語若會迦葉不覆藏清涼欽徵云且道喚底是密語應底是密語若也應喚總是去即不密也且作麼生是密語東林總云怪哉弘覺二十年羚羊挂角絶迹忘蹤及被尚書一問直得帶水拖泥未免遭人笑怪法燈恁麼也是日午點燈夜半潑墨東禪觀云逢人且説三分話未可全拋一片心白巖符云經未明疏通之疏未明鈔通之弘覺老漢疏亦疏矣鈔亦鈔矣且道尚書還會麼直饒會得也未是自己家珍雲居參洞山山問汝名什麼居曰道膺山曰何不向上道居曰向上則不名道膺山深肯之天目律云二大老向尋常相見處一問一答竭力要發明尊貴一路殊不知只好替他作通事人即得若是向上事此去京師尚隔半月程在白巖符云簾埀香閣不露堯眉妙得其旨還他雲居老漢所以成洞家父子然只發揮得僚屬邊事若是尊貴一路敢曰欠在侍者便問如何是尊貴一路山僧出舌示之曰要舌頭便割取去雲居因僧問如何是諸佛師居喝曰者田厙奴僧禮拜居曰你作麼生會僧曰者老和尚居曰元來不會僧作舞出去居曰沿臺槃乞兒昭覺勤云識機宜別休咎有回互轉關底眼千百人中難得一個半個為什麼却成沿臺槃乞兒去也是憐兒不覺醜何山珣云翻手為雲覆手為雨主賓互換當機作舞堪笑沿臺槃乞兒也是面南看北斗百丈泐云田厙奴有什麼了期何不待他禮拜時一踏踏倒豈不剿絶雖然也不得草草雲居因洞山問甚處來居曰踏山來山曰阿那個山可住居曰阿那個山不可住山曰與麼則國內總被闍黎占却也居曰不然山曰子莫得個入路麼居曰無路山曰怎得與老僧相見居曰若有路即與和尚隔生也山曰此子已後千人萬人把不住罄山修云作家相見如珠走盤盤走珠縱橫無礙豈與敲氷索火緣木求魚者可同日而語今日有人踏山來我且問你有路來無路來謂有路來不合雲居謂無路來不合洞山有路無路罄山道個俱隔且作麼生合得古人意去試道看雲居上堂如人將三貫錢買個獵狗祇解尋得有蹤迹底若遇羚羊挂角莫道蹤迹氣息也無僧便問羚羊挂角時如何居曰六六三十六曰挂角後如何居曰六六三十六僧禮拜居曰會麼曰不會居曰不見道無蹤迹趙州諗聞僧舉此語乃云雲居師兄猶在僧便問羚羊挂角時如何州曰九九八十一曰挂角後如何州曰九九八十一曰得恁麼難會州曰有什麼難會曰請和尚指示州曰新羅新羅洞山瑩云一人高高山頂立要下下不得一人深深海底行要出出不得好各與三十拄杖何故一對無孔鐵錘雲居因僧問山河大地從何而有居曰從妄想有曰與某甲想出一錠金得麼居便休去僧不肯雲門偃云已是葛藤不能折合待伊道想出一錠金得麼以拄杖便打笑巖寶云雲門雖能折合尤未徑庭我若作雲居待伊問山河大地從何而有劈口打云妄想作麼何故雖善截其流而折其蔓未若拔乎本而塞乎源也白巖符云雲居與麼答話古今多少人誰不在他語脈裏失却一隻眼殊不知他帝青摩尼寶覿面拈來初無吝惜怎奈者僧有眼如盲當面不識雲居也只得抱羞而返雖然若是白巖待道與某甲想出一錠金得麼便好呵呵大笑歸方丈撫州疏山匡仁禪師青五洞山價嗣示衆老僧咸通年前會得法身邊事咸通年後會得法身向上事雲門出問如何是法身邊事山曰枯樁曰如何是法身向上事山曰非枯樁曰還許學人説道理也無山曰許曰枯樁豈不是明法身邊事山曰是曰非枯樁豈不是明法身向上事山曰是曰未審法身還該一切也無山曰法身周遍豈得不該門指淨瓶曰祇如淨瓶還該法身麼山曰闍黎莫向淨瓶邊覔門便禮拜徑山杲徵云且道雲門禮拜是好心不是好心白巖符云不是疏山老漢淨瓶子幾乎粉碎疏山因冬至僧問如何是冬來意山曰京師出大黃古南門云有問山僧如何是冬來意向道興化蓮殼好種火且道與古人相去多少諸人若作世諦流布佛法未夢見在更作佛法商量千里萬里畢竟如何須知遠煙浪別有好商量疏山訪香嚴值嚴上堂時有僧問不慕諸聖不重己靈時如何嚴曰萬機休罷千聖不擕山在衆作嘔聲曰是何言歟嚴便下座召山曰適對此僧語必有不是致招師叔賜責未審過在什麼處山曰萬機休罷猶有物在千聖不擕亦從人得如何無過嚴曰却請師叔道山曰若教某甲道須還師資禮始得嚴乃禮拜躡前問山曰何不道肯諾不得全嚴曰肯又肯個什麼諾又諾於阿誰山曰肯即肯他千聖諾即諾於己靈嚴曰師叔恁麼道向去倒屙三十年在山住後果如前記鏡清怤因疏山問肯諾不得全汝作麼生會清曰全歸肯諾山曰不得全又作麼生清曰個中無肯路山曰始愜病僧意資福廣云香嚴一擡一搦甚生光彩好則好惜乎不用衲僧拄杖當時若用衲僧拄杖也不待三十年雖然我更要問諸人祇如香嚴道師叔恁麼道向去倒屙在踈山果如其記還是佛法靈驗為復別有道理良久乃拍手呵呵笑云子期死後無知己怎教伯牙不斷絃白巖符云香嚴道萬機休罷千聖不擕箋釋不易山作嘔聲曰是何言歟義之所在憤不顧身嚴下座曰適對僧語未審過在什麼處大似腳跟欠穩當山曰萬機休罷猶有物在千聖不擕亦從人得如何無過好個鹽鐵判官嚴曰却請師叔道倒轉鎗頭來也山曰若教我道須還師資禮始得也欠看風使帆嚴乃禮拜躡前問干戈相待山曰何不道肯諾不得全只恐不是玉是玉也太奇嚴曰肯又肯個什麼諾又諾於阿誰者一拶也難當抵山曰肯即肯他千聖諾則諾於己靈説得道理好嚴曰師叔恁麼道向去倒屙三十年何異靈山記莂山住後果如前記疑殺天下人復云山僧為諸人花判了也還有知他肯諾不得全底意旨麼切忌向鏡清舌頭著倒踈山因知事僧為造壽塔造畢白山山曰將多少錢與匠人僧曰一切在和尚山曰為將三錢與匠人為將兩錢與匠人為將一錢與匠人若道得與吾親造壽塔來僧無語後僧舉似大嶺間嶺曰還有人道得麼僧曰未有人道得嶺曰汝歸與踈山道若將三錢與匠人和尚此生決定不得塔若將兩錢與匠人和尚與匠人共出一隻手若將一錢與匠人纍他匠人眉鬚墮落僧回如教而説山具威儀望大嶺作禮歎曰將謂無人大嶺有古佛放光射到此間雖然如是也是臘月蓮花大嶺聞此語亦曰我與麼道早是龜毛長三尺浮山遠云踈山以錐錐地大嶺用刀剜空雖然二古德錯下錐刀今時人亦難搆副何故後語中有捎有殺雖然如是河裏失錢河裏摝雪竇宗云説甚麼龜毛長三尺臘月蓮花盡是和衣草裏輥直饒向者裏分三列四説得倜儻分明祖師正眼未夢見在我當時若見踈山恁麼道只向道一文也無待他更説道理便與掀倒禪牀拆却壽塔教者老漢終身無依倚處為甚如此知恩方解報恩報恩倫云當時大嶺見義勇為當仁不讓便與從頭酬價今日林泉更資一路若將三文錢與匠人和尚此生決定不得塔何故勞而無益為伊多酒慢功若將兩文錢與匠人和尚與匠人共出一隻手兩不相虧並無懸欠若將一文錢與匠人纍他匠人眉鬚墮落皆知疏山一毛不拔還知林泉恁麼判斷處麼醉漢口沒量斗間割炒胡廝毆半窗涼月酒醒時燈火清熒何所有鼓山賢云疏山恁麼垂語陷阱不少幸得大嶺放光一一照破雖然要與疏山相見亦太遠在五祖岡云也是曹瞞疑冢七十二資福廣云疏山賣了布單學得些子算法便來者裏瞞人賴遇監院不會監院若會管取疏山死無葬身之地西渡金云疏山羅山二大老性命總落在知事手裏疏山常握木蛇有僧問和尚手中是什麼山提起曰曹家女天月禮云手中木蛇是曹家女美態異常惡心難禦驀拈拄杖云如今變現在南山倒用橫拈誰敢覷擲下杖云照顧性命白巖符云疏山年老忒殺懵懂分明手中木蛇却喚作曹家女可惜者僧乏屠龍手段放過疏山當時若是個漢待提起曰曹家女便與禮拜而去管教他性命落在我手裏隨州青林師虔禪師青五洞山價嗣凡有新到先令搬柴三轉然後參堂有一僧不遵乃問曰三轉內即不問三轉外如何林曰鐵輪天子寰中旨僧無對林便打趂出大溈秀云夫欲君臣道合應須水乳和同者僧既抗節朝堂自應喪身失命當時見道鐵輪天子寰中旨將坐具便摵待伊擬議拂袖出去豈不尤為峻利青林初參洞山山問近離甚處林曰武陵山曰武陵法道何似此間林曰胡地冬抽笋山曰別甑炊香供養此人林拂袖便出山曰此子向後走殺天下人去在鼓山永云恁麼抵對滴水難消因甚別甑炊香飯莫有知他洞山利害者麼天界盛云青林頭正尾正固是聖朝俊彥廊廟英標怎奈新豐老人未肯放過且道那裏是他未肯放過處試定當看青林因僧問學人竟往時如何林曰死蛇當大路勸子莫當頭曰當頭時如何林曰喪子命根曰不當頭時如何林曰亦無你回避處曰正當恁麼時如何林曰失却也曰未審向什麼處去林曰草深無覔處曰和尚也須隄防始得林撫掌曰一等是個毒氣博山來云青林棒喝不施針錐在舌根上何曾放過者僧爛泥中有刺縱得便宜不知早入行鋪了也當時若問博山但咄云沒去處看他道個什麼雖然在今之日討個師僧也難得鼓山賢云既不許當頭亦不許回避暫生擬議便隔千山教學人畢竟如何行履虗舟無意浮秋水櫓柂渾忘渡月明白巖符云一往看來者僧大似把髻投衙殊不知善戰者不居勝當時若不是青林老將幾被打破蔡州
