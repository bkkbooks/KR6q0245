body:
  text: 古杭白巖嗣祖沙門淨符彚集未詳法嗣先淨照禪師問楞嚴大師經中道若能轉物即同如來若被物轉即名凡夫祇如升元閣作麼生轉嚴無對汾陽昭代大師云彼此老大寶壽方代大師云今日被禪師一問直得口挂壁上唐朝因禪師微時掘地次見一大塊戲運槌猛擊之應手而碎忽然大悟老宿聞云盡山河大地被因禪一擊百雜碎靈巖儲云因禪雖向平田淺草驀地回光也是囫圇吞棗者老宿因齋慶讚未免矢上加尖山僧今日打草祇要驚蛇個中若有一撥便轉的衲僧免教撒土撒沙其或未然只得將錯就錯以拄杖豎起云看看便擲下歸方丈僧肇法師赴難姚秦臨法場説偈曰四大元無我五蘊本來空將頭臨白刃恰似斬春風玄沙備云大小肇法師臨死猶寱語肇公云諸法不異者不可續鳧截鶴夷嶽盈壑然後為無異哉雲門偃云長者天然長短者天然短又云是法住法位世間相常住乃拈起拄杖云不是常住法天寧琦云一家有事百家忙喝一喝下座肇公云有物流動人之常情白雲端云肇法師剛然不知有流動者洞山度云二大老也是徐六擔板各見一邊好各與二十拄杖且道洞山拄杖子還有分付處也無若道無分付處不可徒然若道有分付處二老過在甚麼處若緇素得出洞山分半院與伊諸禪德還緇素得出麼良久拂一拂云青山只解磨今古流水何嘗洗是非喝一喝實性大師因同參芙蓉訓禪師至上堂以右手拈拄杖倚左邊良久曰此事若不是芙蓉師兄也大難委悉便下座黃龍南云實性用不得便休却將佛法以為人情致令千載之下與人作笑端且道利害在什麼處青龍斯云實大師雖則人情佛法一時周備檢點將來大似向福建人前賣荔枝未免傍觀者哂圓通和尚因僧問一塵才起大地全收還見禪牀麼通曰喚什麼作塵僧又問法燈一塵才起大地全收還見禪牀麼燈曰喚什麼作禪牀東禪齊云此二尊宿語還是明伊問處不明伊問處未審還得盡善也未試斷看聖壽禪師示衆月半前用鈎月半後用錐僧便問正當月半時如何聖曰泥牛踏破澄潭月天童覺云兩頭得用聖壽作家直下忘功是誰體得放行也互換主賓把定也不留朕迹還有體得底麼玉女夜拋梭織錦於西舍寶壽新云説甚月半前月半後饒你踏得翻踢得破檢點將來猶未唧𠺕何故有水皆含月無山不帶雲天台智者大師在大蘇山誦法華經至藥王品是真精進是名真法供養如來於是悟法華旋陀羅尼三昧親見靈山一會儼然未散徑山杲云而今未獲旋陀羅尼者還見靈山一會否若見以何為證若不見是真精進是名真法供養如來靈巖儲云清波萬里湛寂凝然寶月凌虗光吞羣象正恁麼時喚什麼作旋陀羅尼三昧驀地迅雷一擊猛風四起雲散星飛水枯月落靈山一會又向甚處去也諸人要識智者麼乃舉拂云夾路桃花風雨後馬蹄何處避殘紅公期和尚因往羅漢路逢一騎牛公子期問羅漢路向甚麼處去公拍牛曰道道期喝曰者畜生公曰羅漢路向甚麼處去期却拍牛曰道道公曰直饒恁麼猶少蹄角在期便打公拍牛便走白巖符云者兩個漢一拳一踢未見輸贏大似赤眼撞著火柴頭若論羅漢路直是遠在千里宋太宗帝幸相國寺問僧看甚麼經對曰仁王經帝曰既是寡人經為甚麼在卿手裏僧無對雪竇顯代云皇天無私惟德是輔天寧琦云若問永祚但以手頂戴經云萬歲萬歲雪軒成云宋太宗天縱之資指出一卷真經了無文字可惜者僧不會若是山僧但從容對曰王言如絲其出如綸諸禪德且道還契他所問也無白巖符云我不似雪竇老學究既是寡人經為甚麼在卿手裏向道專為陛下流通他若是個作家君王更道流通一句作麼生便合掌云護國仁王經卷當第二帝幸開寶塔問僧卿是甚麼人對曰塔主帝曰寡人塔為什麼卿作主僧無對雪竇顯代云闔國咸知獅峰遜代僧云某甲今日謝恩有分帝因僧朝見乃問卿是甚處來對曰廬山臥雲菴帝曰朕聞臥雲深處不朝天卿因甚到此僧無語雪竇顯代僧云難逃至化寶壽方代僧云不學者死漢又云特謝陛下顧問佛日晢代僧云只因靈山一別帝因僧入對次奏曰陛下還記得臣僧麼帝曰甚處相見來僧曰靈山一別直至如今帝曰卿以何為僧無對雪竇顯代僧云貧道特特而來崇化能代僧拈起拂子白巖符代僧云將謂陛下忘却帝因僧奏曰藏經被回祿欲乞宣賜帝召問昔日摩騰不燒今日為甚却燒僧無對雪竇顯代僧云陛下不忘付囑白巖符代僧云知陛下不吝寶藏老子李𣆀柱史曰道湛兮似或存吾不知其誰之子象帝之先高峰妙云咄哉者漢錯下注腳湛兮似或存吾不知其誰之子毗耶城裏老維摩老子曰上士聞道勤而行之中士聞道若存若亡下士聞道大笑之薦福璨云上士聞道勤而行之著甚死急中士聞道若存若亡猶較些子下士聞道大笑之却有衲僧氣息三種人一時格下了也且道那個合受人天供養茶陵郁山主一日乘驢渡橋踏板而墮忽然大悟有偈曰我有神珠一顆久被塵勞關鎖今朝塵淨光生照破山河萬朵薦福璨云郁山主向驢前馬後逴得些些便乃誇張衒耀以當平生參學拈拄杖卓一卓云開先今日為伊一鎚擊碎了也顧視左右云莫有不甘者麼靠拄杖下座凌行婆謁浮杯和尚坐次乃問盡力道不得底句分付阿誰杯曰浮杯無剩語婆曰未到浮杯不妨疑著杯曰別有長處不妨拈出婆斂手哭曰蒼天中更添冤苦杯無語婆曰語不知偏正理不識倒邪為人則禍生有僧舉似南泉泉曰苦哉浮杯被者老婆摧折一上婆聞笑曰王老師猶少機關在澄一禪客見婆乃問怎生是南泉猶少機關在婆哭曰可悲可痛一罔措婆曰會麼一合掌而立婆曰伎死禪和如麻似粟一舉似趙州州曰我若見者臭老婆問教口啞一曰未審和尚怎生問他州便打一曰為甚麼却打某甲州曰似者伎死禪和不打更待何時連棒打出婆聞却曰趙州合喫婆手中棒後有僧舉似州州哭曰可悲可痛婆聞乃合掌歎曰趙州眼光爍破四天下州令僧問如何是趙州眼婆乃豎起拳頭僧回舉似州州作偈曰當機覿面提覿面當機疾報汝凌行婆哭聲何得失婆以偈答曰哭聲師已曉已曉復誰知當時摩竭國幾喪目前機高峰妙云山僧始初一看將謂總是白拈賊及乎再辨端倪却是浮杯較些子何故不因漁父引爭得見波濤灜山誾云凌行婆具超方作略雖趙州南泉亦讓一籌倒不如浮杯老人不動干戈善能捉敗且道何人為證乃以手捶胸曰蒼天東塔熹云一隊普州人撞著太行客各逞好手未見希奇惟有澄一禪客較些子何故不因一事不長一智忘名古宿有老宿一夏並不為人説話有僧歎曰我只恁麼空過一夏不敢望和尚説佛法得聞正因兩字也得老宿聞乃曰闍黎莫𧬊速若論正因一字也無道了扣齒曰適來無端不合與麼道鄰壁一老宿聞曰好一釜羮被一顆鼠糞污却報慈遂徵云且道是讚歎語不肯語若是讚歎又道鼠糞污却若不肯他老宿有甚麼過雪竇顯云誰家釜裏無一兩顆徑山琇云者僧無事生事老僧應病與藥線去絲來針鋒不露爭奈未會末後句在只如鄰壁老宿恁麼又且如何三臺須要大家催鳳日玥舉雪竇語畢云者三個漢總是隨人腳跟轉未出葛藤窠在若是鳳日待者僧恁麼問和聲便打趂出山門他若皮下有血必定別有生涯免得郎郎當當遞相鈍置本覺微云二老宿與麼做處大似拽尾靈龜更有個鑿壁偷光漢却向矢上加尖且道那裏是兩顆鼠糞污處有老宿於門上書心字窗上書心字壁上書心字法眼益云門上但書門字窗上但書窗字壁上但書壁字玄覺遂云門上不要書門字窗上不要書窗字壁上不要書壁字何故字義炳然龍唐柱云門上書箇窗字窗上書箇壁字壁上書箇門字何故東澗水流西澗水南山雲起北山雲白巖符云老宿犯相違謗法眼犯增益謗玄覺犯損減謗龍唐犯戲論謗者四個漢總被山僧據欵結案了也還有不甘者麼試出來諍一頭看有老宿曰祖師九年面壁為訪知音若恁麼會喫鐵棒有日在又一老宿曰祖師九年面壁何不慚惶若與麼會更買草鞋行腳三十年琅瑘覺云既不然且道祖師面壁意作麼生良久云欲得不招無間業莫謗如來正法輪天童傑云二老宿敲磚打瓦琅瑘老畫虎成貍諸人要見祖師面壁底意旨麼窮坑難滿有老宿曰者一片田地分付來多時也我立地待汝搆去法眼益云山僧如今坐地待汝搆去還有道理也無那個親那個踈試裁斷看昭覺勤云者一片田地分付來多時也我今日當衆慶懺慧雲盛云三老橫身為物太煞婆心其奈風波似難折合山僧則不然者一片田地分付來多時也我倦要睡去石霜尊云者一片田地分付來多時也因甚諸人踏不著只為分明極翻令所得遲古德因僧問一陽來復日長一線未審佛法長多少德曰長一線又有僧問古德一陽來復日長一線未審佛法長多少德曰一線長薦福璨云一等共行山下路眼中各自別風煙高峰妙云就窠打劫還他二老本分鉗錘若謂佛法短長端的未夢見在今日忽有問西峰佛法長多少只向他道東西十萬南北八千象田現云二老宿雖有補綴虗空底手段要且紅線未斷只向長短上作活計相去佛法奚啻十萬八千若是山僧則不然一陽來復日長一線未審佛法長多少只向他道休將玉線較長短好把金針繡出看古德曰佛法大有只是牙痛徑山杲云向道莫行山下路果聞猿呌斷腸聲勝法法云若是陶淵明攢眉便歸去古德曰長者長法身短者短法身天童覺云且道舜若多神喚什麼作法身良久云還會麼不可續鳧截鶴夷嶽盈壑去也有一行者隨法師入佛殿向佛而唾法師曰行者少去就何以唾佛行者曰將無佛處來與某甲唾法師無語溈山祐云仁者却不仁者不仁者却仁者仰山寂代法師但唾行者行者若有語即向伊道還我無行者處來資福侶代法師便打又云也只救得一半白巖符云法師無語不妨渾金璞玉只是罕逢明鑑有二住菴僧旬日不會一日相見上菴主問多時不見向甚麼處去下菴主曰在菴中造箇無縫塔上菴主曰某甲也要造一箇請借塔樣看下菴主曰何不早説恰被人借去了也法眼益徵云且道是借他樣不借他樣曹溪守衣鉢侍者因僧到乃提起衣曰者是大庾嶺頭提不起底僧曰為什麼却在上座手裏侍者無語雲門偃云彼此不了又於無語處代云遠嚮不如親到又云是獅子兒白巖符云守衣鉢侍者被者僧一拶直得汗流夾脊信知口是禍門當時待道為什麼却在上座手裏但低聲云闍黎不妨疑著管教者僧屈膝有分有婆子供養一菴主經二十年常令一女子給侍一日令女子抱定曰正當恁麼時如何主曰枯木倚寒巖三冬無暖氣女子歸舉似婆婆曰我二十年只供養得個俗漢遂遣出燒却菴天童傑云者婆子洞房深穩水泄不通偏向枯木上糝花寒巖中發𦦨個僧孤身逈逈慣入洪波等間坐斷潑天潮到底身無涓滴水仔細檢點將來敲枷打鎖不無二人若是佛法未夢見在南澗問云凌弱附強古今皆是長裙賣俏邪法難扶山僧昔年曾被婆子換却眼睛道者僧蹉過婆子仔細檢點將來却是婆子蹉過者僧撫掌呵呵大笑云三十年後與汝諸人説破崆洞慈云衆中道菴主未在婆子作家恁麼舉揚只見錐頭利殊不知婆子不知菴主受用處菴主不知婆子作用處一對訝郎當各與二十棒何故獅巖者裏賞罰分明龍華體云者婆子雖通身手眼終是老婆禪唯者僧入火無煙入水不溺頓使者婆子百千伎倆一時氷消瓦解東塔熹云菴主墻高數仞關節不通婆子暗度重關要探閫中春色若非一場特地爭見暗合明投天寶真云盡謂婆子有大手眼看來却被者僧一場活陷者僧被遣出門要且佛眼難覷鳳山啓云高山流水曲彌高和彌寡伯牙與子期不是間相識婆子且置還識得菴主的轉身句子麼無限風流慵賣弄免人指點好郎君西遁超云從來拈提者多扶婆子抑者僧不知婆子俗漢一語罵盡天下人者僧被逐而去陷盡天下人大愚哲云婆子有焚舟之計且無破釜之能者僧得退步之謀尤少斬關之力俱未免遭人檢點雖然要見婆子則易見者僧則難白巖符云明中坐舌頭還他婆子暗裏抽橫骨須是者僧雖然錐利鑿方各得其長細檢將來總是販私鹽漢澧陽路上有一婆子賣餅為業德山鑑初出蜀道過澧陽就其買餅點心婆指擔曰上座擔頭是什麼文字山曰青龍疏鈔婆曰鈔何經山曰金剛經婆曰我有一問若答得施與點心答不得請別處去買金剛經道過去心不可得現在心不可得未來心不可得未審上座點那個心山無語天童悟云我若作德山只向道山僧肚飢揀大者快搬來及至搬來却肩擔便行管教者婆子疑殺去在棲霞成云我若作周金剛待道未審上座點那個心但向道山僧今日勞倦當時下得者一語管教者婆子手忙腳亂搬點心不徹在昔有跨驢人問衆僧何往僧曰道場去人曰何處不是道場僧以拳毆之曰者漢沒道理向道場裏跨驢不下其人無語報恩秀云盡道者漢有頭無尾能做不能當殊不知却是者僧前言不副後語既知舉足下足皆是道場何不悟騎驢跨馬無非佛事萬松要斷者不平公案更與花判道喫拳沒興漢茆廣杜禪和早是不尅己那堪錯過他道場唯有一佛法本無多留與闍黎道戶唵薩哩嚩龍唐柱云者僧太粗糙向道場裏亂打人有施主入院行衆僧隨年錢知事僧曰聖僧前著一分施主曰聖僧年多少知事無對法眼益代云心期滿處即知保寧勇云只恐施主力所不及天寧琦代云鉢盂無底寶壽方代知事云與麼則大衆今日不得半文也廣南住菴僧值大王出獵吏人報菴主大王來請起僧曰非但大王來佛來亦不起王乃問佛豈不是卿師僧曰是王曰見師為甚麼不起僧無語法眼益代云未足酬恩天寧琦云欲觀其師先觀弟子白巖符代僧對云子不重則父不尊河渚謙云今日小出大遇有長者因一僧托鉢來家被狗咬長者乃指其僧所披袈裟曰吾聞龍披一縷金翅不吞大師全披法服為甚麼却被狗咬僧無語寶華忍代僧云未看山頭土先觀屋下郎居士韓某因三平遷化衆請作喪主韓乃以手巾覆鈔鑼上橫一口劒置龕前曰道得即作喪主衆無對韓便躍却鈔鑼哭曰蒼天蒼天先師遠矣羅山間云噫大奇大奇三平門下六百來人總被者俗漢吞却也陳老師當時若在只將三尺布蓋却頭橫亞一柄露刃刀揭起孝幕當堂而坐看韓家個漢要作喪主也未得要不作喪主也未得進之須有禮退之須有禮曹溪並出二支吉州青原行思禪師大鑑能嗣令石頭遷馳書與南嶽讓和尚且囑曰回時吾有箇鈯斧子與汝住山遷到南嶽未呈書便問不慕諸聖不重己靈時如何嶽曰子問太高生何不向下問遷曰寧可永劫受沉淪不從諸聖求解脫便歸原曰子返何速書信達否遷曰信亦不通書亦不達去日蒙和尚許箇鈯斧子即今便請原垂下一足遷便禮拜玄沙備云大小石頭被南嶽推倒至今起不得雪竇顯云石頭洎擔板過却又云大小南嶽不解據令翠巖芝云思和尚垂足石頭禮拜要且不得斧子且道後來使個什麼黃龍南云石頭雖然善能馳達不辱宗風其奈逞俊太忙不知落節既是落節回來因甚却得斧子東苑鏡云二大老皆有放過處不慕諸聖不重己靈時如何南嶽何不劈脊一棒子問太高生何不向下問石頭好與驀面一喝古南門云可惜者鈯斧子諸上座石頭既見南嶽因甚青原問著却云信亦不通書亦不達還會麼金雞破琉璃殼玉兔挨開碧海門天目律云者個鈯斧子若不是石頭承當也太難寶掌白云石頭可謂羽檄飛馳不辱使命但不應貪他個鈯斧子藥地智云索的是斧子如何却垂一足既不從諸聖求解脫作麼生便禮拜乃拂袖角云看看鈯斧子劈碎天地作八角磨盤趕倒金烏玉兔了也盲龜跛鱉那裏得知青原參六祖乃問當何所務即得不落階級祖曰汝曾作什麼來原曰聖諦亦不為祖曰落何階級原曰聖諦尚不為何階級之有祖深器之東苑鏡云我若作六祖待問當何所務即得不落階級便喝云者擔糞漢在者裏作麼若作青原待問曾作甚麼來便撫掌云者老漢猶作𥧌語在豈不使曹溪一路別有風光靈巖儲云聖諦尚不為何階級之有趙州慣喫茶曹山好飲酒一對老古錐兩人共隻手咄脫却嫁時衣塞斷鴻蒙口泥牛解作獅子吼白巖符云蕩空凡聖不立纖塵凜凜然翠壁秋崖逈絶攀仰自非衆角一何以能此獨惜乎嶺南葛僚當時放過他道聖諦尚不為何階級之有好以杖擊右案云且立者邊著青原老漢到者裏必當別有生涯青原因僧問如何是佛法大意原顧僧曰廬陵米作麼價博山來云高低米價環翠色於奇峰吞吐廬陵鍊蟾華於玉樹須知大用無方有感斯應若論青原的佛法三生六十劫未夢見在翠巖哲云諸禪德還識青原老漢立地處麼但見皇風成一片不知何處有封疆青原問石頭子何方來曰曹溪原曰將得什麼來曰未到曹溪亦不失原曰若恁麼用去曹溪作甚麼曰若不到曹溪怎知不失靈巖儲拈拄杖云上大人可知禮也爾小生且道節文在甚麼處卓一下云自是不歸歸便得五湖煙景有誰爭青原因荷澤神會參乃問甚處來曰曹溪原曰曹溪意旨如何會振身而立原曰猶帶瓦礫在曰和尚此間莫有真金與人麼原曰設有汝向甚麼處著玄沙備云果然雲居錫云只如玄沙道果然是真金是瓦礫翠巖芝云真金瓦礫錯下名言如今喚作什麼天聖泰云青原被荷澤一問直得額頭汗出口裏膠生衡州南嶽懷讓禪師大鑒能嗣參六祖祖曰甚處來嶽曰嵩山祖曰什麼物恁麼來嶽無對遂經八載忽然有省乃白祖曰某甲有個會處祖曰作麼生嶽曰説似一物即不中祖曰還假修證否嶽曰修證即不無染污即不得祖曰只此不染污是諸佛之所護念汝既如是吾亦如是白巖符云與麼酬對自非透頂透底親到那邊過來則斷乎不能措一辭馬駒踏殺天下宜乎其從腳下出也然當時六祖更能向腦後痛下一椎則兒孫之振振又不止於今日乃云如是如是是豈祖師之作略歟𨍏轢參云南嶽道説似一物即不中與麼那六祖道我亦如是臉皮厚多少南嶽因僧問如鏡鑄像像成後未審光向甚麼處去嶽曰如大德為童子時相貌何在曰祇如像成後為甚麼不鑑照嶽曰雖然不鑑照瞞他一點不得法眼益別云阿那個是大德鑄成的像寶壽方云大小南嶽箋釋不易雪峰者裏則不然如鏡鑄像像成後光向甚麼處去待他眼目定動劈脊便打青一南嶽石頭希遷禪師青一青原思嗣因藥山問三乘十二分教惟儼粗知嘗聞南方直指人心見性成佛實未明了伏望和尚慈悲指示頭曰恁麼也不得不恁麼也不得恁麼不恁麼總不得子作麼生山佇思頭曰子因緣不在此江西有馬大師子往彼去應為子説山至彼如前請問馬祖曰我有時教伊揚眉瞬目有時不教伊揚眉瞬目有時教伊揚眉瞬目者是有時教伊揚眉瞬目者不是子作麼生山於是有省便作禮祖曰子見個甚麼道理便禮拜山曰惟儼在石頭如蚊子上鐵牛祖曰汝既如是宜善護持法雲秀云石頭好個無孔鐵錘大似分付不著藥山雖然過江西悟去爭奈平地上喫交有什麼扶䇿處具眼者試辨看五祖演云衆中商量道即心即佛也不得不即心即佛也不得若恁麼敢稱禪客殊不知古人文武兼備韜略雙全山僧見處也要諸人共知只見波濤湧不見海龍宮溈山智云説什麼在石頭時如蚊子上鐵牛只今又何曾吐露得出溈山果云前箭猶自可後箭射人深藥山直饒恁麼悟去也落第二月徑山杲云好箇話端阿誰會舉舉得十分未敢相許笑巖寶云馬祖當時不合放過待他作禮好與本分草料何謂直教鐵牛也須通身汗出始得石頭參同契曰回互不回互雲門偃因僧問如何是回互門指板頭云不可喚作板頭如何是不回互門云祇者個是板頭天童覺云石頭舌頭無骨雲門眼裏有筋千古之下聲光赫揚如今要把手共行直須恁麼始解不恁麼然後沒交涉還相委悉麼少年曾決龍蛇陳潦倒還聽稚子歌寶壽新云恁麼酬酢大似徐六擔板各見一邊且道石頭意在甚麼處月照千巖靜溪流萬壑深石頭垂示曰語言動用沒交涉時藥山出曰直得非語言動用亦沒交涉頭曰者裏針劄不入山曰者裏如石上栽花白巖符云二老漢大似海龍王與帝釋天賽富直得四大部洲三山五嶽一時寶光璀璨日月失輝者裏還許你插得一句嘴麼時有僧出白巖搖手云莫將間學解埋沒祖師心出去
