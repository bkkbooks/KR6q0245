body:
  text: 古杭白巖嗣祖沙門淨符彚集青五雪峰上堂盡大地撮來如粟米粒大拋向面前漆桶不會打鼓普請看長慶稜問雲門云雪峰與麼道還有出頭不得處麼門云有稜云作麼生門云不可總作野狐精見解又云狼藉不少雲峰悅云匹上不足我更與你葛藤驀拈拄杖云還見雪峰麼咄近來王令稍嚴不許攙行奪市溈山哲云我更為諸人土上加泥舉拄杖云看看雪峰老人向你面前放屙咄為甚麼屎臭氣也不知智海逸云慙愧雪峰老一等是弄精魂就中弄得好雖然如是好事不如無昭覺勤云絶天維立地紀未足稱奇擘太華逗黃河亦非敏手若向者裏覷得透便可以撒驪龍窟明珠噴旃檀林香氣豈不快哉山僧今日不避泥水放一線道乃拈拄杖云還見雪峰麼遂卓一卓云劄靈隱嶽云陝府鐵牛不覺膽顫嘉州大象通身汗流且道象骨老人面皮厚多少烏石道云大小雪峰拋三放兩有甚了期興國則不然盡大地撮來在諸人眉毛眼睫上眠也同眠起也同起行也同行坐也同坐還見得親切麼擊拂云蚯蚓吸乾四大海藕絲牽動五須彌雪峰因三聖問透網金鱗以何為食峰曰待汝出得網來即向汝道聖曰一千五百人善知識話頭也不識峰曰老僧住持事繁保寧展云爭不足讓有餘雪竇顯云可惜放過好與三十棒一棒也饒不得直是罕遇作家承天宗云布縵天網須是雪峰深入虎穴還他三聖有般漢道雪峰在網內三聖在網外苦哉苦哉深屈古人若非此二員作家不能橫行天下溈山云三聖可謂龍門萬仞慣曾作客雪峰大似孟嘗門啓豈懼高賓寶峰文云俊哉俊哉快活快活恰似一隻子莫驚著報寧即不然透網金鱗以何為食待汝出得網來即向汝道一千五百人善知識話頭也不識便拽拄杖打出三門復云也好快活恰似一隻虎莫動著諸禪德且道報寧快活何似三聖快活莫有快活底漢麼出來定當看良久云把手拽不入徑山杲云一人粗似丘山一人細如米粖雖然粗細不同稱來輕重恰好徑山今日真實告報汝等諸人切忌鑽龜打瓦天寶樞云三聖大似毒龍攪海白浪滔天若不是雪峰慣入洪波爭得驪珠在握擊拂子一下報恩秀云三聖置個問頭不妨向荊棘林中掇出個膠盆子爭奈雪峰老漢先在三十步外看你自黏自惹直饒解別行一路終難逃雪峰法網海舟慈云我若作雪峰見三聖道透網金鱗以何為食劈面便掌云以此為食笑巖寶云雪峰老漢龍頭蛇尾一千五百人善知識話頭也不識但向道與麼則不虗為臨濟兒孫待伊眼目定動劈脊便毆博山來云捶打不開屏折不下各各具有隱身之術大似埋兵索戰然雖如是透網金鱗畢竟以何為食問取高郵定和尚古南門云雪峰老漢慣得其便雪竇好三十棒只是下手太遲有問古南透網金鱗以何為食和聲便打云一棒打殺縱饒作家又向甚處啖愚菴盂云三聖是將門之子用處固有家法雪峰是卜商之後善於方人一個是海青慣打天鵝一個是大鵬金翅擘海直取龍吞雖然作雪峰則易作三聖則難他要從刀鎗林裏過不損一毛百華叢中來不沾一瓣始是作家棲霞成云雪峰雖是縱奪可觀要且無大人相若有問攝山透網金鱗以何為食但向道死猫頭他更道一千五百人善知識話頭也不識向道莫怪空疏伏惟尚饗且道與古人相去多少寶掌白云草頭出沒不費光彩雪峰固是作家兀目昂頭揚鬐鼓𩮻三聖詎非好手山僧又且不然透網金鱗以何為食和聲便打若更動靜連棒打出直饒三聖氣勢騰天也只得曝腮有分佛日晳云三聖出處不凡雪峰慣得其便一挨一拶機用當行一放一收箭鋒中的龍騰滄海鶴舞丹霄雖各展謀略檢點將來也是平地栽荊棘叢林中到今猶自剗削不盡如今莫有下手剗削得者麼三聖雪峰在汝腳底如無莫道透網金鱗泥裏鰍也做不得在檀度依云因行棹臂風正帆張自是衲僧行徑豈古廟裏鐘磬邊縮腳老摩訶對泥神土佛而壁立萬仞耶一千五百癩狗囓枯樁一個半個俊鷹環狡兔然而豹載威而幽可據龍得雲而變可神善知識遇恁般漢不知聲應氣求而終日對長連牀畔黃口沙彌行棒行喝將鶴唳為鶯啼斯亦志士大痛矣哉然雖如是山僧尚有三十拄杖要打三聖何故吾輩饑當從謝仁祖索食不須陶胡奴米雪峰因一僧禮拜次峰乃打五棒僧曰過在甚麼處峰又打五棒喝出雪竇顯云我不曾與人葛藤前五棒日照天臨後五棒雲騰致雨汝若得也好與五棒溈山秀云者僧腦門著地過犯彌天雪峰輕恕猶自不知罪名再犯不容更道日照天臨雲騰致雨惑亂後人何謂曾被雪霜苦楊花落也驚東禪觀云性空自來性直不似雪竇瞞人雪峰前五棒打者僧禮拜後五棒打者僧無過諸人且道是不是若道是要你眼作甚麼保寧茂云前是殺人刀後是活人劍無奈者僧不悟若悟雪峰喫拳有分雪峰塔銘云兄弟橫十字同心著一儀土主曰松山卵塔號難提更有胡家曲汝等切須知我唱泥牛吼汝和木馬嘶但看五六月冰片滿長街薪盡火滅後密室爛如泥翠巖芝云然寰中天子敕塞外將軍令雪峰前不至村後不遘店若是翠巖和泥合水且與麼三十年後莫顢頇雪峰因僧問古㵎寒泉時如何峰曰瞪目不見底曰飲者如何峰曰不從口入僧舉似趙州州曰不可從鼻孔裏入僧却問古㵎寒泉時如何州曰苦飲者如何州曰死峰聞乃曰趙州古佛遂遙禮從此不答話雪竇顯云衆中總道雪峰不出者僧問頭所以趙州不肯如斯話會深屈古人雪竇即不然斬釘截鐵本分宗師就下平高難為作者薦福懷云諸仁者作麼生會不答話底道理讚歎趙州即不無還知趙州一片玉瑕生麼若人檢點得出相如不誑於秦主天童覺云扶豎宗乘須還大匠雪峰辦一千五百人善知識身心趙州用一百五十歲手段不妨奇怪如今衆中隨言定旨亂作褒貶深屈古人然則相席打令自有知音鏤骨銘心罕逢明鑒徑山杲云雪峰不答話疑殺天下人趙州道苦面赤不如語直若是妙喜則不然古㵎寒泉時如何到江扶櫓棹出嶽濟民田飲者如何清凉肺腑此語有兩負門若人辨得許你有參學眼浮山云趙州不因者僧爭得與雪峰相見雪峰不得趙州爭能圓得此話大小雪竇刺腦入膠盆育王權云一人隨波逐浪一人截斷衆流檢點將來總缺會在今日有問育王古㵎寒泉時如何須是親見雪峰飲者如何問取趙州瑞巖慍云者僧當面錯過纍他雪峰趙州輥入草窠裏雪竇浮山可謂入理深談互相擎展要且只能委曲不能直截今日有問古㵎寒泉時如何蟻子擎天柱飲者如何藕絲挂須彌且道與古人是同是別南堂欲云雪峰一期答話不知爬著趙州癢處趙州忍俊不禁不覺劄著雪峰痛處痛處癢癢處痛一時移在雪竇身上且道者僧還曾夢見也無烏石道云雪峰有活人劍無殺人刀趙州有殺人刀無活人劍帶纍者僧活又活不得死又死不得石溪則不然忽有問古㵎寒泉時如何但道萬里碧雲收一輪明月皎飲者如何鯨吞海水盡露出瑚枝古南門云雪峰不答話欽哉不恃己長趙州道個苦死盡美而未盡善古南則不然古㵎寒泉時如何闍黎從什麼處得者消息來待擬更問連棒打出不惟使者僧不向古㵎寒泉處軃跟且令向去別有通天活計通玄奇云者僧擔枷帶杻罪犯彌天只得泥首求救二老雖與敲枷打鎖雪罪釋刑苐恐情理難容還有識他雪峰不答話底麼堪笑堪悲天童忞云山僧即不然有問古㵎寒泉時如何浸爛鼻孔飲者如何穿過髑髏設若有個知氣息底問道與龍池水是同是別向伊道溪㵎豈能留得住終歸大海作波濤拍一拍寶壽新云雪峰具頂門眼照破蹄涔趙州出通天手導歸江海俾天下衲僧盡棄浮漚悉悟真源非法門大匠不可得而知也祇如雪峰從此不答話又作麼生莫把是非來辨我浮生穿鑿不相干寶掌白云打動氈拍板吹起無孔笛雪峰趙州不妨奇特山僧又且不然古㵎寒泉時如何好歸江海裏長負濟川舟飲者如何清風生兩腋爽氣透乾坤且道與古人同別雪峰示衆盡大地是個解脫門把手拽不入時有僧出曰和尚怪某甲不得又一僧曰用入作麼峰便打雪竇顯云三個中有一人受救在忽若總不辨明平地上有甚數龍池傳云即如二僧也俱會到者裏因甚有喫棒有不喫棒且道誵訛在甚麼處疏山順云既是盡十方世界總是個解脫門且道正屋在什麼處雪峰上堂要會此事如明鏡當臺胡來胡現漢來漢現玄沙出衆曰忽遇明鏡來時如何峰曰胡漢俱隱沙曰老和尚腳跟猶未點地在玄沙備別云我即不與麼若有問忽遇明鏡來時如何向道百雜碎明招謙云當與麼時莫道胡漢俱隱別作麼生道玄沙云破明招云喪也琅瑘覺云驗人端的處下口便知音龍池傳云山僧則不然忽遇明鏡來時如何但道收起收起為什麼若不收起有甚合殺雪峰上堂舉拂子曰者個為中下根人僧便問忽遇上上人來時如何峰亦舉拂子僧曰者個為中下峰便打雲門偃云我不似雪峰擒葛藤乃拈拄杖云者個為中下根人忽遇上上人來時如何便打護國元云宗師家有擒有縱有殺有活若是蛇頭上揩癢又且不然驀拈拄杖云者個為中下根人有問忽遇上上根人來時如何只向道我不似雲門打葛藤車溪冲云雪峰雲門雖則殺活縱橫甚生意氣檢點將來猶是節外生枝若據車溪見處遂豎拂子云祇將者個普為諸人無論上中下若要擎展一任擎展若要承當一任承當處處把斷要津個個壁立萬仞且道忽遇其中人來時如何萬國醉心嘗大鼎相將携手上高臺古南門驀拈拄杖云山僧者個為一切人不敢分上中下何故祇為諸人共有你若信得及便與釋迦老子同鼻孔出氣還會麼須知鷲嶺當年事一念回光尚宛然圓照森云雪峰拈起拂子雲門問著便打慈翁即不然忽遇上上人來時如何但云去汝非其人白巖符云者兩個老古錐打葛藤不少者裏則不然拈拄杖云者個為中下忽遇上上根人來時如何乃擲下拄杖歸方丈雪峰山下有一住菴僧多年不剃頭有問如何是西來意僧曰溪深杓柄長峰聞乃袖刀躬訪才見便問道得即不剃你頭僧便洗頭跪峰前峰乃剃之昭覺勤云菴主雖生鐵鑄就爭奈雪峰是本分鉗錘當初若只顢頇那顯驚天動地還委悉麼金鏃慣調曾百戰鐵鞭多力恨無讐南㵎問云菴主要得便宜末後却輸雪峰一籌勝法法云雪峰愛討便宜始終被菴主看破雪峰在洞山時山問作甚麼來峰曰斫槽來山曰幾斧斫成峰曰一斧斫成山曰此是者邊事那邊事作麼生峰曰直得無下手處山曰猶是者邊事那邊事作麼生峰休去汾陽昭代峰云某甲早困也雲溪挺云洞山飛電閃晴空雪峰擔雲入巖壑雖則兩兩作家者裏還缺一著且道是那一著待枯木糝花即向你道白巖符云洞山驗人不怕骨出苟非雪峰是個點頭知尾底漢幾成鈍置然在一期探索展拓可觀若是那邊事三生六十劫雪峰問僧什麼處去曰普請去峰曰去雲門偃云隨語識人天童覺云莫動著動著三十棒雲門云隨語識人又是為蛇𦘕足寶壽方云雪峰老漢多是事因叮囑起已往莫究直饒天童與麼又何止揚聲止響三十棒却須自領始得寶壽新云出草入草切莫動著一毫動著打折你驢腰雪峰普請搬柴次路逢一僧乃擲下一段柴曰一大藏教只說者個真如哲云一大藏教不說者個天寧琦云只者個是什麼說與不說且置諸人向什麼處見二大老中嶽能豎起拂子云提起則如是我聞放下則信受奉行雪峰問僧甚處來僧曰浙中來峰曰船來陸來曰二途俱不涉峰曰爭得到者裏曰有甚麼隔礙峰便打趂出僧後十年再來峰問甚處來曰湖南峰曰湖南與此間相去多少曰不隔峰舉拂曰還隔者個麼曰若隔怎得到者裏峰又打趁出僧住後每見人必詬罵雪峰同行聞特去訪問你因甚罵雪峰者僧舉前兩段因緣同行乃痛罵與伊點破者僧遂悲泣乃每于中夜焚香望雪峰禮拜高峰妙云者個公案頗類德山托鉢話諸方商量者極多錯會者不少俱眼底但於德山低頭處見得便會雪峰打意於巖頭不肯處見得便會者僧罵意又於巖頭密啓處見得便會同行點破意於巖頭撫掌處見得便會者僧悲泣意又於巖頭受記處見得便會者僧遙禮意西峰今日將二老父父子子縛作一束拋在諸人面前了也諸人要見二老則易要見西峰則難何故有眼無耳朵六月火邊坐雪峰因僧請益臨濟四喝意旨峰曰我當初行腳時便過河北已值大師遷化不得見他所以至今不知你要理會四喝意旨可往見他直下兒孫僧乃往見南院院曰那裏來僧曰雪峰院曰雪峰有何言句僧具陳前意院乃展具遙禮雪峰曰天下古佛中峰本云言不在口語不在舌端的有來由特地無交涉臨濟四喝豈但雪峰不知縱是他直下兒孫也未夢見在不知且置只如南院遙禮雪峰是有來由耶無交涉耶者裏定當得下要見臨濟也不難雲菴悅云雪峰蜜裏藏砒南院恭而無禮幸賴者僧不善觀光免却二大老一場禍事雪峰夾籬笆次玄沙曰正當恁麼時還有佛法也無峰曰有沙曰作麼生是夾籬處佛法峰撼籬笆一下沙曰某甲不然峰曰汝作麼生沙曰穿過篾頭來廣潤融云雪峰父子眼目人天則不無料揀將來未免笆塹不堅以至兒孫冷落今日若問廣潤正當恁麼時還有佛法也無曰有作麼生有向他道內不放出外不放入雪峰普請次路逢一獼猴峰曰人人有一面古鏡者個獼猴亦有一面古鏡三聖曰曠劫無名何以彰為古鏡峰曰瑕生也聖曰者老漢著甚麼死急話頭也不識峰曰老僧住持事繁雪竇顯云好與二十棒復云者棒放過也好免見將錯就錯天童覺云當時若見雪峰道瑕生也但近前云諾諾且道何故如此爭之不足讓之有餘報恩秀云三聖神鋒頴利每當點勘太難為人其如雪峰大方海涵天覆直饒浪激千層爭奈龍王不顧雖然也須知他爛泥裏有刺古南門云雪峰放去較危收來太速三聖雖則當仁不讓要且自己話頭也不識檢點將來總被者獼猴換却眼睛愚菴盂云好一面古鏡被二老擊得粉碎直至如今要個完全的也難得僧曰老漢又恁麼去也余曰老僧罪過雪峰示衆飯籮邊坐餓死人無數海水邊坐渴死人無數玄沙備云飯籮裏坐餓死人無數海水沒頭渴死人無數雲門偃云通身是飯通身是水天童覺云我則不然飯籮裏坐脹殺人無數海水沒頭浸殺人無數以前傷乎不吞以後失乎不吐祇如雲門通身是飯通身是水到者裏無你吞吐處又作麼生寶壽新云雪峰門下開得口玄沙手裏出得氣也是去死十分唯除雲門一關略較些子若是寶壽又且不然饒你通身是飯不消一踢通身是水不消一踏也是平地起風波青原然云者數大老為諸人說也盡情說了注也盡情注了然子細看來一隊不唧𠺕漢好人不肯做遍向屎裏臥者裏則不然通身是飯切忌飽殺也須屙得出通身是水切忌淹殺也須尿得出何故聻酥酪醍醐世所珍飲食不消成毒藥代雲鰲云盡大地是飯盡大地是海水直饒你吞得下吐得出鰲上座敢曰未在何故若是鳳凰兒豈向那邊討雪峰一日普請自負一束藤路逢一僧峰便拋下僧擬取峰便踏倒歸舉似長生曰我今日踏者僧快生曰和尚替者僧入涅槃堂始得峰便休去雪竇顯云長生大似東家人死西家人助哀也好與一踏白雲端云雪峰外面贏得五百家中失却一貫浮山口云者僧喫雪峰一踏小出大遇長生喫雪竇一踏禍出私門檢點將來總是涅槃堂裏漢瑞巖慍云者僧喫雪峰一踏白日見鬼長生喫雪竇一踏平地成仙大小浮山蹉過不少南堂欲云雪峰是則下坡不走快便難逢若不是長生未免勞而無功雖然且雪峰一踏何似雪竇一踏開先金云大小白雲錯會不少殊不知雪峰外面失了五百家中拾得一貫古南門云者僧當時踏倒如今起得也未若也起得東家人死西家人助哀不妨快暢若未起得你者一隊漢生淹在涅槃堂裏幾時得個轉身拈拄杖一時趁下報恩琇於峰便拋下處代僧便就藤邊臥又於便踏倒下代僧云好心不得好報雪峰指火云三世諸佛向火𦦨裏轉大法輪玄沙云近日王令稍嚴峰曰作麼生沙曰不許攙行奪市雲門偃云火𦦨為三世諸佛說法三世諸佛立地聽黃龍新云雪峰雲門交互爭輝忽若薪盡火滅三世諸佛向什麼處聽乃云莫戀白雲深處坐切忌寒灰燒殺人天童忞云雪峰雲門只知錐頭利黃龍新老但見鑿頭方山僧要問諸人薪盡火滅三世諸佛畢竟向什麼處聽良久云鯨吞海水露珊瑚大家依舊嘴都盧廣潤融云二老提唱綱宗猶缺勦絶一則勞三世諸佛搖脣鼓舌一則勞一世諸佛立在地聽至今移步不得融上座則不然火𦦨轉大法輪了也並不曾說著一字起身云久立衆慈伏惟珍重雪峰訪瓦棺茶話次問當時在德山斫木因緣作麼生棺曰先師當日肯我峰曰和尚離師太早時面前有一碗水峰曰將水來棺度與峰接得便潑却雲門偃云莫壓良為賤廣潤融云今時叢林批判者多有云待舉斫木話便將一碗水潑却或云祇消道個不會不會管取雪峰舌斷與麼批判不但離師太早正未遇師在山僧若作瓦棺不妨亦道個先師肯我待至雪峰潑水處便命侍者裝香遙禮德山云今日若非雪峰師兄何由得見先師大機大用非但據虎頭亦且收虎尾雪峰住後僧問和尚見德山得個甚麼便休去峰曰我當時空手去空手歸五祖演云如今說與透未過者有兩人從東京來問伊近離何處却云蘇州便問蘇州事如何伊云一切尋常雖然瞞山僧不過何故只為語音不同畢竟如何蘇州菱邵伯藕保寧茂云從門入者不是家珍自己流出還同瓦礫老東山依模脫墼殊不知二大老正是食飽傷心雖然既是東京來因甚却說蘇州話雪峰因閩王封柑橘各一顆遣使柬問曰既是一般顏色為什麼名字不同峰將柑橘依舊封回閩王復遣問玄沙沙遂將一張紙蓋却谷隱啓云雪峰玄沙二大老腳跟缺點地被兩枚柑橘惑亂俱未免為閩王所晒雪峰因僧問學人大事未明乞師指示峰曰是什麼僧于言下大悟鳳日玥徵云且道雪峰有指示無指示若道有雪峰向伊道什麼若道無者僧為什麼便悟去襄州高亭簡禪師青五德山鑒嗣參德山隔江才見便曰不審山乃搖扇招之簡忽開悟乃橫趨而去更不回顧徑山杲云高亭橫趨而去許伊是個伶俐師僧若要法嗣德山則未可何故猶與德山隔江在天目禮云諸方盡道水雲一照啐同時有甚交涉要見德山高亭麼便下座天寧琦云衆中商量道高亭見德山不與他說話便去所以妙喜道猶隔江在還曾夢見高亭麼拈拄杖云便好喚回與一頓且道是賞伊罰伊磬山修云徑山一擡一捺要且賊過後張弓今人在知識門下三二十年既不隔江合作麼生路遙知馬力歲久見人心白巖符云德山隔江招手殊費鹽醬高亭橫趨便去已涉途程直饒你向父母胞胎未出已前薦得到山僧者裏拄杖子正未肯放過你在廣胤標云高亭才擬見德山腳跟下好與三十便饒橫趨而去更賣草鞋始得枝山選云高亭橫趨而去未免承虗接響德山隔江招手也是因風吹火若到枝山者裏未輕易放過在河渚謙云德山隔江招手且作死馬醫高亭橫趨而去藥發狂亂莫有不出戶庭坐享太平者麼喚來與山僧洗腳高亭因夾山會下一僧到才禮拜亭便打僧曰特來禮拜何得便打某甲亭又打趁出僧回舉似夾山山曰會麼僧曰不會山曰賴汝不會汝若會即夾山口啞天童華云高亭一期忍俊不禁爭奈拄杖放行太速者僧當時若是個漢莫道高亭夾山便是達磨大師出來也斬為三段何故家肥生孝子國霸有謀臣淨慈明云高亭夾山門庭施設各得其宜但中間一人較些子應菴與麼道也是鞏縣茶瓶廣胤標云才難不其然乎高亭不合倚勢欺人夾山那堪壓良為賤者僧一等是為魅所著木菴到者裏路見不平未免拔刀相助何故聻執其兩端用其中於民
