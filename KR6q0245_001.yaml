body:
  text: 古杭白巖嗣祖沙門淨符彚集七佛釋迦牟尼世尊初降生時一手指天一手指地周行七步目顧四方曰天上天下唯吾獨尊雲門偃云我當時若見一棒打殺與狗子喫貴圖天下太平雪竇顯云便與掀倒禪牀法眼益云雲門氣勢甚大要且無佛法道理時有老宿云將謂無人證明雪竇云鈎在不疑之地琅瑘覺云雲門可謂將此深心奉塵剎是則名為報佛恩雲峰悅云雲門雖有定亂之謀且無出身之路法昌遇云雲門好一棒太遲生未離兜率腳跟下好與一鎚雖然也是賊過後張弓泐潭英云釋迦老子旁若無人當時若遇個明眼衲僧直教他上天無路入地無門然雖如是也須是銅砂鑼裏滿盛油始得天童華云雲門此話雖行未免落他陷穽高峰妙云世尊大似靈龜拽尾自取喪身之兆雲門雖則全提正令也是為他間事長無明當時但於地上畫一圓相就中書個丁字復展兩手示之管取氷消瓦解浮山口云雲門赤心片片蓋代功高雪竇見義勇為機如掣電二俱足可觀光其奈頂門無眼南堂欲云雲門好棒可殺驚人檢點將來未免傷鋒犯手山僧當時若見只消道個浣盆浣盆老漢若也知方管取暗裏抽身免見明中落節天童悟云我不似雲門大驚小怪當時若見但向前以手加額云貓看他面皮向甚處著古南門云洪濛未判誰識奇人開闢乾坤還他作手雲門雖則見利思義且道一棒還打得他殺也無相知不在千杯酒一盞清茶也醉人驀拈杖云汝等諸人還有同生同死者麼且過一邊著棲霞成云大小雲峰辜負雲門不少壽昌今日翻案去也且作麼生雲門雖有出身之路且無定亂之謀復云壽昌當時若見者黃面瞿曇恁麼道但向前合掌云大王萬福有人辨得許你天下橫行神鼎僼云叢林商量盡道知恩報恩殊不知落在驢前馬後若是天童便與摩頂授記善哉善哉如是如是不妨遞代相傳龍華體云韶陽雖則據令終是賊過張弓若要天下太平不如放過一著何故饒人不是癡崇先奇云總謂雲門跨竈也是疾行先長臯亭也與雲門一棒貴圖兩得相見爾等還甘麼萬壽範云黃面老子固已誇大而涉險跛足阿師豈非忠耿而蹈譏仔細檢點將來二者皆為不了何故不見道天下有道則庶人不議洞山昱云世尊手忙腳亂自生驚怪雲門棒雖有眼怎奈身入蠱毒之鄉二俱不了洞山今日幸是二千六百餘年的遠孫只以相繼為美更不敢犯顏取逆良久拂一拂云祇奉一人天地貴從教諸道自分權世尊於正覺山前臘月八日夜覩明星忽然大悟乃嘆曰奇哉奇哉我今普見一切衆生具有如來智慧德相但以妄想執著而不證得雲居莊云我要問釋迦老子喚什麼作智慧德相喚什麼作妄想執著擬議不來劈脊便掊還有為瞿曇出氣者麼拈拄杖云不敢望汝與釋迦老子出氣只是將自己鼻孔摸索得著也好靠拄杖雲門澄云瞿曇話作兩橛雲居菽麥不分真個徐六擔板只見一邊徑山今日要各與他二十烏滕還有不甘者麼出來為二老雪屈博山來云根本無明即是諸佛不動智不動智即是根本無明者裏別具一隻眼老瞿曇氷消瓦解廣教玉云大小釋迦話作兩橛當時若有人下得者一語免致後代兒孫起模畫樣然雖如是也不得屈我釋迦還有知廣教落處者麼喝一喝藥地智云雪山坐久成勞空花亂墜一瓢惡水只合自澆何故為他六年奇句不及下地先聲道林慮云大小瞿曇開得一雙眼失却一張口世尊一日升座大衆集定文殊白椎曰諦觀法王法法王法如是世尊便下座芭蕉徹云忙忙者匝地普天報恩秀云諸人未到法堂萬松未出方丈向那時薦得已是落四落三直饒七佛祖師道諦觀法王法法王法如是也須眼裏抽釘腦後楔始得天寧琦云將謂世尊別有長處也只懡㦬便休致令後代兒孫個個龍頭蛇尾獅林則云衆中商量道世尊入林不動草文殊入水不動波自然海晏河清風行草偃乃搖手呵呵大笑云錯了也錯了也且道是何道理掀翻海嶽求知己撥轉乾坤致太平博山來云世尊拉抹金針文殊橫抽玉線彌縫海嶽要是其人且道未升座前法王法在甚麼處天童悟云文殊大似認影迷頭世尊也是腳跟不著地雲門信云雙髻當時若在奪却文殊椎子喝一喝看那黃面老子作何去就報恩賢云大小世尊雖是頭正尾正殊不知却被文殊使令黃檗琦云世尊升座慙惶殺人文殊白椎不識好惡更道諦觀法王法法王法如是好與三十拄杖何故不合隨邪逐惡靈巖儲云正當恁麼時且道世尊文殊意在甚麼處者裏勘破得來一生參學事畢棲霞成云者兩個老漢大似掩耳偷鈴不顧旁觀者哂金粟元云大似赤眼撞著火柴頭雖然如是放過則彼此作家檢點則二俱失利具眼者端的看寶掌白云世尊搖頭文殊擺尾雖然頭尾吒沙未免無風浪起有者道何不當時才見升座便與攔胸約住一喝非唯黃面老子折合無門亦使大智鉗錘無著手處山僧道也是賊過後張弓城山洽云瞿曇起模畫樣妙吉看孔著楔雖云虎嘯龍吟究來總欠勦絶且作麼生得勦絶咄東塔熹云釋迦老子幸是可憐生被文殊將惡水驀頭一發便見氷消瓦解鳳山啓云白玉本無瑕雕文乃喪德世尊因普眼菩薩欲見普賢不可得見乃至三度入定遍觀三千大千世界覓不可得乃白世尊世尊曰汝但於靜三昧中起一念便見普賢於是普眼才起一念便見普賢在空中乘六牙白象雲居舜云諸仁者且作麼生會雲居道普眼推倒世尊世尊推倒普眼你道普賢在甚處崇先奇云普眼不見普賢則且置且道世尊還見普賢麼諸人不得隨人腳跟轉世尊云但於靜三昧中起一念見的是普賢不是普賢若説是前三度為甚不見若不是又道向空中乘六牙白象不可總作野狐精見解白巖符云普眼要見普賢無事討事更撞著個世尊教人向睛空揑目妄見狂華俱好與貶向二鐵圍山何故若是普賢你才擬心欲見早是隔山了也諸人要見普賢麼各請歸堂世尊因五通仙人問世尊有六通我有五通如何是那一通世尊召五通仙人通應諾世尊曰那一通你問我雪竇顯云老胡元不知有那一通却因邪打正琅瑘覺云世尊不知可謂因正而打邪五通不知實乃因邪而打正翠巖芝云五通如是問世尊如是答要且不會那一通雲峰悅云大小瞿曇被外道勘破了有旁不肯底麼出來我要問你作麼生是那一通雲蓋本云世尊如是召五通如是應作麼生是那一通良久云姹女已歸霄漢去呆郎猶向火邊蹲徑山杲云今時有一種弄泥團漢往往在那一通處錯認定盤星雲居莊云仙人善問世尊善答可謂光前絶後若是那一通總未夢見在古南門云大衆呼蛇容易遣蛇難那一通世尊被仙人一拶轉身無路只得將錯就錯若是山僧才問便摑仙人若當下知歸説甚那一通和前五通一時放下豈不灑灑地作個平地神仙清化嶾云若是那一通非特五通仙人不會直饒瞿曇老漢也未夢見在崇先奇云老胡也知有那一通祇是口門窄平田本云黃面老人被仙人輕輕一靠直得喚鐘作甕世尊因耆婆善別音響至一冢間見五髑髏乃敲一髑髏問耆婆此生何處曰此生人道又敲一髑髏問此生何處曰此生天道又別敲一髑髏問此生何處耆婆罔知生處天童悟云世尊大似有先鋒無殿後耆婆罔知也好與一敲何故不見道先以定動後以智龍華宗云世尊敲磕分明怎奈傷鋒犯手耆婆善別音響也是認影迷頭且道第三度敲底畢竟生甚麼處良久云泥牛入海無消耗挂角羚羊不見蹤世尊一日升座默然而坐阿難白椎曰請世尊説法世尊曰會中有二比丘犯律行我故不説法阿難以他心通觀是比丘即時遣出世尊還復默然阿難又白適來為二比丘犯律行今已遣出世尊何不説法世尊曰我誓不為二乘聲聞人説法便下座南堂靜云前箭猶輕後箭深高峯妙云世尊能挽千鈞之弩銀山鐵壁箭箭皆穿阿難雖有隱身之術殊不知髑髏後中箭還有跺避得過底麼世尊從忉利天下時四衆八部俱往空界奉迎有蓮花色比丘尼作念曰我是尼身必居大僧後見於是用以神力變作轉輪聖王千子圍繞最初見佛既見世尊乃劈面呵曰蓮花色比丘尼汝何得越大僧見吾汝雖見吾色身且不見吾法身須菩提巖中宴坐却見吾法身薦福懷云蓮花色比丘尼被熱瞞則且置還知瞿曇老漢性命在別人手裏麼白巖符云大小瞿曇二見不除好與蓮花色一狀領過世尊因七賢女遊尸陀林一女指尸曰尸在者裏人在甚麼處去一女曰作麼作麼諸女諦觀各各契悟感帝釋散花曰惟願聖姊有何所須我當終身供給女曰我家四事七珍悉皆具足唯要三般物一要無根樹子一株二要無陰陽地一片三要呌不響山谷一所帝釋曰一切所須我悉有之若三般物我實無有女曰汝若無此怎解濟人帝釋罔措遂同往白世尊世尊曰憍尸迦我諸弟子大阿羅漢不解此義唯有諸大菩薩乃解此義寶峰文徵云且道帝釋是會不會若不會因甚散花請給若會又道實無此三般物且作麼生明辨得不孤負聖女萬峰藏云聖女被帝釋熱瞞福嚴容云七賢女遊尸陀林大似買鐵獲金鑿石致玉得意則不無怎奈被瞿曇塗抹一上是汝諸人還檢點得出麼開先金云七賢女偶爾成文憍尸迦將錯就錯世尊老老大大不合打入者場子裏諸人要識三般物麼聽取個注腳便下座世尊因地布髮掩泥獻華於然燈佛然燈見布髮處遂約退衆乃指地曰此一方地且建一梵剎時有賢于長者持標於指處插曰建梵剎已竟時諸天散華讚曰庶子有大智矣博山來云插草建精藍長者全身領荷針芥相投唧𠺕固然唧𠺕要且未能免旁觀者哂寶壽方云世尊宿行未忘長者虗應故事總須拈向一邊祇如諸天散花讚嘆且道有利害無利害具眼者試撿別看世尊偕阿難行次見一古佛塔世尊便作禮阿難問此是甚麼人塔世尊曰過去諸佛塔阿難曰過去諸佛是甚麼人弟子世尊曰是吾弟子阿難曰應當如是天童悟云我若作阿難待世尊曰是吾弟子但問佛是甚麼人弟子待世尊擬開口便作禮休去乃無端却謂應當如是隨風倒舵豈是丈夫天界盛云世尊言中有響阿難句裏藏鋒并須喫棒有分為什麼聻人天師表不合用以機械蓮柎䇿云阿難不唧𠺕當時見道是吾弟子何不便禮三拜管教者黃面老子置身無地世尊於自恣日因文殊三處過夏迦葉欲白椎擯出才拈椎乃見百千萬億文殊迦葉盡其神力椎不能舉世尊遂問迦葉汝擬擯那個文殊迦葉無對昭覺勤云可惜放過當時待釋迦老子道汝擬擯那個文殊便與一椎看他作何合殺雲居元云一家有事百家忙天童覺云金色頭陀有心無膽當時盡令而行莫道百千萬億文殊祇者黃面瞿曇也與擯出不唯壁立真風亦令後人知我衲僧門下著你間佛間祖不得保寧茂云大小迦葉有頭無尾畢竟如何西天令嚴久立珍重高峰妙云文殊知底迦葉不知迦葉知底文殊不知彼彼不知則且置百千萬億文殊畢竟那個是真文殊天寧琦云迦葉太不丈夫莫道百千萬億文殊便是百千萬億世尊也下一椎擯出始見作家不見道棒下無生忍臨機不見師龍池傳云我若作迦葉把黃面老子先須擯却何故來説是非者便是是非人鼓山賢云文殊雖得便宜怎奈轉增醜態當時何不默受擯去教他迦葉三十年摸索不著寶壽新云文殊行處迦葉不知迦葉做處文殊不識唯黃面老子有顯有密有權有實怎見得聻咬牙封雍齒滴淚斬丁公慧雲盛云大小世尊雖善為二大士解交怎奈遭人怪笑何故當斷不斷反招其亂崇先奇云文殊三處過夏閙處偏刺頭迦葉白椎欲擯黨理不黨親世尊情知寡不敵衆致令金色頭陀一椎至今無著落處若是衲僧門下祇知盡法那管無民石塔忍云文殊三處度夏也是不守本分迦葉白槌大似捕風捉影世尊道汝擬擯那個文殊當時若是山僧據令而行看者黃面老子向甚麼處蹲立白巖符云諸方老宿盡謂尊者不能據令而行致成放過殊不知他當時無對爛泥裏有刺大有利害頂門有眼者莫道尊者不據令好寶峰辨云古今尊宿盡謂迦葉把住要津文殊十方坐斷寶峰看來正是放過一著復云險世尊因文殊至諸佛集處值諸佛各還本土唯一女子近世尊座而入三昧文殊白曰云何此女得近佛座世尊曰汝但覺此女從三昧起汝自問之文殊於是繞女三匝彈指一下乃至托至梵天盡其神力定不能出世尊曰假使百千文殊亦出此女子定不得下方過四十二恆河沙國土有罔明菩薩却能出得須臾罔明從地涌出作禮世尊世尊令出女子定罔明至女子前彈指一下女子於是從定而出翠巖芝云僧投寺裏宿賊打不防家五雲逢云不唯文殊不能出此定只恐如來也出此定不得翠巖真好問僧云文殊是七佛之師因甚出女子定不得罔明從下方來因甚却出得女子定莫有能對者獨英邵武方其問時以手揑其膝而去真笑曰賣匙箸漢未在天童覺云若定若動當人變弄鴻毛輕而不輕泰山重而非重還知老瞿曇鼻孔在我手裏麼龍翔訴舉公案了拈拄杖云一串穿却天童悟云出得出不得且置作麼生是定鼓山賢云天童道若定若動當人變弄是即是也只道得一半孰知三人皆是不守本分漢女子至今猶未出定在南澗問云古今盡道女子出定殊不知者一隊漢個個破家蕩産山僧今日有三十棒要世尊喫何故不因漁父引怎得見波濤愚菴盂云有者道線索在女子手裏收放由他恁麼判斷矮子過深溪又有道不可以智知不可以識識文殊用智識所以出他定不得罔明初發心菩薩無智無識不可思議所以出得他定若恁麼道烏龜鑽破壁大衆要識女子麼他是未剖之璧要識二菩薩麼抱璞投楚自取刖足之災要識世尊麼間來無事溪頭坐緑水青山花正紅棲霞成云當時文殊若出却女子定不獨老瞿曇一生口挂壁上天下老師向何處討飯喫雖然且道女子畢竟還曾出定也無雲巖學云者一隊漢神頭鬼面俱好與三十棒天目律云者四個漢靈山會上缺一不可若到寶壽一個也容不得何故者裏豈許你分出分入喝一喝白巖符云出得出不得并須喫鐵棒有分若夫女子瞿曇且放過一著何故若教盡法只恐無民世尊見文殊在門外立乃曰文殊文殊何不入門來文殊曰我不見一法在門外何以教我入門報慈遂徵云為復是門外語門內語溈山代世尊出語云吾不如汝黃龍新云文殊恁麼道入得門入不得門若人辨得氷消瓦解萬峰藏云總隔一片板崇先奇云世尊門裏出身不得文殊身裏出門不得仔細看來總是徐六擔板世尊在尼拘律樹下坐次因二商人問世尊還見車過否曰不見還聞否曰不聞莫禪定否曰不禪定莫睡眠否曰不睡眠莫別去否曰不曾別去商人乃嘆曰善哉世尊覺而不見遂獻白㲲兩段天童悟徵云商人如是問世尊如是答甚處是商人見世尊覺而不見處大愚鵬云三界大師被商人推在三百丈爛泥坑裏至今起不得世尊因乾闥婆王獻樂其時山河大地盡作琴聲迦葉起作舞王問迦葉豈不是阿羅漢諸漏已盡何更有餘習世尊曰實無餘習莫謗法好王又撫琴三遍迦葉亦三度作舞王曰迦葉作舞豈不是世尊曰實不曾作舞王曰世尊何得妄語世尊曰不妄語汝撫琴山河大地木石盡作琴聲豈不是王曰是世尊曰迦葉亦復如是所以實不曾作舞王乃信受禾山殷因修山主問乾闥婆王奏樂直得須彌岌峇海水波騰迦葉作舞作麼生會殷云迦葉過去世曾作樂人來習氣未除修云須彌岌峇海水波騰又作麼生殷休去法眼別殷云正是習氣幻寄稷云有底道世尊以藥去病澄源以病去藥夢也未夢見乾闥婆王在黃檗琦云乾闥婆王奏樂迦葉起舞同坑無異土疑有餘習以己方人瞿曇打許多葛藤王乃信受鈍置不少若是山僧待問迦葉是阿羅漢諸漏已盡何更有餘習不用之乎也者亦乃起舞不惟以楔出楔抑令乾闥婆王展轉疑殺白巖符云盡道乾闥婆王被金色頭陀換却眼睛殊不知黃面瞿曇被乾闥婆王換却眼睛尤甚世尊在第六天説大集經勑他方此土人間天上一切獰惡鬼神悉皆集會受佛付囑擁護正法設有不赴者四天門王飛熱鐵輪追之令集既集會已無有不順佛勑者各發弘誓擁護正法唯有一魔王謂世尊曰瞿曇我待一切衆生成佛盡衆生界空無有衆生名字我乃發菩提心薦福懷云臨危不變真大丈夫諸仁者作麼生著得一轉語與黃面老子出氣尋常神通妙用智慧辨才都使不著盡閻浮大地人無不愛佛到者裏何者是佛何者是魔還有人辨得麼良久云欲得識魔麼開眼見明欲得識佛麼合眼見暗魔之與佛以拄杖卓一卓云一時穿却鼻孔南堂靜云當時我若作世尊即向他道大衆魔王已發心竟應當如是住不然道汝喚什麼作衆生擬開口與一熱鐵輪徑山杲云天衣老漢恁麼批判直是奇特怎奈話作兩橛若向何者是佛何者是魔處休去不妨使人疑著却云開眼見明合眼見暗郎當不少又云魔之與佛拄杖子一時穿却鼻孔雪上加霜妙喜却為黃面老子代一轉語待者魔王道衆生界空無有衆生名字我乃發菩提心只向他道幾乎錯喚你作魔王此語有兩負門若人檢點得出許你具衲僧眼東禪觀云怪哉淺草撥著一箇大蟲上門上戶咬人火急可惜當時放過我若作世尊待道衆生界空無有衆生名字我乃發菩提心只消道個擔板漢非唯塞斷咽喉亦乃教伊轉動不得雖然如是相識滿天下知心能幾人天寧琦云澤廣藏山理能伏豹二大老何用多言當時只消對他道魔王魔王你認那個作菩提心還識也未設使一切衆生成佛盡衆生界空無有衆生名字你要發菩提心却未許你在管取拱手歸降龍池傳徵云且道者個魔王是歸依佛語是不歸依佛語雲門信云魔王言中有響護法已竟報恩琇云世尊不語百味具足天衣大慧雖奇特中奇特檢點將來未免金沙不辨菽麥不分如小兒啖李忙就赤邊咬大雄敢為世尊出一語咄男子汝已發菩提心竟他若擬議與一熱鐵輪崇先奇云黃面老子能説不能行當時待道我待衆生界空無有衆生名字我乃發菩提心何不向道我不如汝管取低首歸降何故不見道重賞之下必有勇夫補陀沃云且道者魔王具什麼眼敢恁麼道白巖符云者魔王大似個透網金鱗向千層浪裏搖頭擺尾世尊可謂釣不虗施只是我要問者魔王既是衆生界空無有衆生名字你向甚麼處發菩提心待他擬開口連棒打出龍淵法云世尊被魔王坐斷舌頭龍淵路見不平要與雪屈待才與麼道便云識得汝也擬議不來劈脊便棒友可玄云大集魔王小膽薄心當時便與掀倒華王座喝散人天儔不妨令人疑著却道待衆生界空無有衆生名字我乃發心正是把髻投衙好與苕菷二十樟山量云世尊若無握閫外威權底機幾被魔王惑亂一上雖然者裏有不願發菩提心者也許伊具一隻眼萬壽朗云老瞿曇有先鋒無殿後當時待道我待衆生界空無有衆生名字云云便與一熱鐵輪免伊向淨白地上躲跟者裏還有與魔王作主者麼拈拄杖云大衆看看四天門王飛熱鐵輪來也以拄杖旋風打散
