body:
  text: 古杭白巖嗣祖沙門淨符彚集青五洛京韶山寰普禪師青五夾山會嗣白頭因參山曰莫是多口白頭因麼因曰不敢山曰有多少口曰通身是山曰尋常向甚麼處屙曰向韶山口裏屙山曰有韶山口即得無韶山口向甚麼處屙因無語山便打雲門偃云者話墮阿師放你三十棒又云將謂是師子兒又云韶山今日瓦解氷消雪竇顯云從來疑著韶山愚菴盂云撥草傷蛇惹火燒身恁麼人在在有之因禪多口直得閉殺韶山無口直得屙殺清化嶾云因白頭遍身是口不奈韶山一屙何慧雲盛云盡道因白頭多口忽被把住咽喉無能出氣遍身是的甚處去了設向眼睫裏識些機宜知些進退三十棒韶山合當自喫白巖符云者多口阿師浪有其名當時待問有多少口何不向前劈面便掌韶山因僧問是非不到處還有句也無山曰有曰是什麼句山曰一片白雲不露醜天童覺云通身回互不觸尊嚴退位傍提要當宛轉還見韶山相為處麼盡力推爺向裏頭東山澓云韶山可謂打落楚天月摘去漢地星等閒道出一句藏鋒不露撿點將來猶未勦絶今日有問顯聖是非不到處還有句也無直云無他若道為甚麼無但云秋水長天一色落霞孤鶩齊飛韶山有僧到參禮拜起立山曰大材藏拙戶僧過一邊立山曰喪却棟梁材城山洽云前箭猶自可後箭射人深韶山因遵布衲訪值山在山下遵問韶山路向甚麼處去山以手指曰嗚那青青點黯處去遵近前把住曰久嚮韶山莫便是否山曰是即是闍黎有什麼事遵曰擬伸一問師還答否山曰看君不是金牙作怎解彎弓射尉遲遵曰鳳凰直入烟霄去惟怕林問野兒山曰當軒布鼓從君擊試展家風似老僧遵曰一句逈超千聖外松蘿不與月輪齊山曰饒君直出威音外猶較韶山半月程遵曰過在甚處山曰個儻之辭時人知有遵曰恁麼則真玉泥中異不撥萬機塵山曰魯班門下徒施巧妙遵曰學人即恁麼未審師意如何山曰玉女夜拋梭織錦於西舍遵曰莫便是和尚家風也無山曰耕夫製玉漏不是行家作遵曰此猶是文言如何是和尚家風山曰橫身當宇宙誰是出頭人遵無語山遂同歸至方丈人事了山遽召近前曰闍黎有衝天之氣老僧有入地之謀闍黎橫吞巨海老僧背負須彌闍黎按劍上來老僧掗鎗相待向上一路速道速道遵曰明鏡當臺請師一鑑山曰不鑑遵曰為甚麼不鑑山曰水淺無魚徒勞下釣遵無語山便打黃龍新云好打者般漢打殺百千萬個有甚麼過當時若在黃龍手裏棒折也未放過在何山珣云布縵天網打鳳羅龍主則琢玉鏤氷賓則攢花簇錦當機不讓覿面爭先結角螺文互存互奪諸方咸謂好手手中呈好手還端的也無若約慧日見處遵布衲若能慎初護末待韶山指出路頭驟步便升堂奧管取明窗下安排非唯截斷葛藤亦免上他鈎線何也一著不到處滿盤空用心昭覺勤云遵布衲如虎戴角凜凜威風怎奈韶山解踞虎頭收虎尾直得步步登高聲聲相應還知二老落處麼好手手中跨好手紅心心裏中紅心天童華云死心和尚一期大驚小怪殊不知韶山自遭布衲毒手之後至今無人撿點得出且道誵訛在什麼處龍唐柱云布衲何用繁辭烏那青青黯黯處便作禮云今日親見作家縱使韶山有入地之謀也要把他作撥草瞻風人管待城山洽云看者兩員尊宿鎗來劍去勝負難分正是有意氣時添意氣不風流處也風流苐可惜布衲末後落節還有為伊出一隻手者麼洪州上藍令超禪師青五夾山會嗣僧問善財見文殊後因甚却往南方藍曰學憑入室知乃通方曰為甚麼彌勒却遣見文殊藍曰道曠無涯逢人不盡天寧琦云奇特中奇特玄妙中玄妙達法源底須是上藍始得祖師門下直是未在福州牛頭微禪師青五投子同嗣僧問如何是和尚家風頭曰山畬脫粟飯野菜淡黃虀曰忽遇上上客來又作麼生頭曰喫即從君喫不喫任東西灜山誾云生鐵鑄心肝打得丁當響鄂州巖頭全奯禪師青五德山鑒嗣參德山才跨門便問是凡是聖山便喝巖便禮拜洞山聞僧舉乃曰若不是奯公也大難承當巖曰洞山老漢不識好惡錯下名言我當時一手擡一手搦雪竇顯云然則德山門下草偃風行要且不能塞斷天下人口當時才拜劈脊便打非唯勦絶洞山亦乃把定奯老還會麼李將軍有嘉聲在不得封侯也是閒琅琊覺云巖頭無人問著不妨奇特才被洞山腦後一錐便乃氷消瓦解南華昺云巖頭一期展露事不徒然無人讚歎猶較些子才被洞山稱提直得驚羣駭衆還會麼無滯自然隨勢去有聲多為不平來昭覺勤云德山據令而行只得一半洞山通方有眼千里同風巖頭既善據虎頭又能收虎尾大似作家戰將臨陳扣敵七事俱全不妨奇特敢問那裏是一手擡一手搦處謂言侵早起更有夜行人徑山杲云猛虎不識穽穽中身死蛟龍不怖劍劍下身亡巖頭雖於虎穽之中自有透脫一路向劍刃上有翻身之機若仔細撿點將來猶缺悟在即今莫有為巖頭作主底麼出來與妙喜相見良久喝一喝拍一拍云洎各停囚長智教忠光云還知三大老落處麼德山通身放倒洞山帶水拖泥若非巖頭具通方眼有格外機怎顯功高汗馬且作麼生是一手擡一手搦處殺人刀活人劍天寧琦云德山具咬猪狗手腳巖頭是煅了底精金驀拶相逢更無回互將他八兩換他半斤洞山雖是作家也只旁觀有分妙喜費許多氣力作什麼拈拄杖畫一畫云一南堂欲云家肥生孝子國霸有謀臣雪竇云然則德山門下草偃風行要且不能塞斷天下人口當時才禮拜劈脊便打非唯勦絶德山亦乃把定奯老說得道理好歸依佛法僧報恩秀云諸方盡謂巖頭一擡一捺洞山錯下名言殊不知洞山一擡一捺更甚雖然巖頭擡捺洞山賺出洞山擡捺萬松說破忽有個出來禮拜萬松却放過不打何也為伊皮下無血雲居莊云德山不無養子之緣洞山乃是因齊慶讚作麼生是巖頭一手擡一手搦不是射鵰手徒說李將軍博山來云問不在意裏答預於機先余所謂進得德山門破得巖頭句灼然兩彩一賽洞山雖是善因而招惡果又安知巖頭子為父隱直在其中耶鼓吹將來三人捆作一束始得古南門云雪竇恁麼道雖則看孔著楔殊不知巖頭歷代簪纓若不是德山如金博金大難酬對洞山向背後叉手道若不是奯公大難承當誣人之罪以罪加之簡點將來四大老固雖各恃己長衲僧門下總缺棒在何故青山只解磨今古流水何曾洗是非忽有個漢出來道古南也是為他閒事長無明合掌云山僧罪過愚菴盂云德山是荊山韞玉之石巖頭是剖玉之良工始終俱妙祇不當持一條斷貫索要量無邊身菩薩身才多少長不免被旁人耻笑且道笑個什麼笑他是貴介公子打毆儺㳂門乞丐靈巖儲云巖頭只知乘長風破萬里浪不顧黃河無底德山但解驅泰華塞四滄溟那識黑山有根父父子子使盡氣力至今無出頭分可笑又有個弄巧成拙底引鬼入墻致令者漢棺材裏瞪眼唬張嚇李古今無數知識出世一個個水上描根空中繪影喫盡許多生受終沒交涉設有僧到靈巖入門便問是凡是聖但呵呵冷笑直教者漢脊背汗出西遁超舉大慧語畢云如何是缺悟處令天下人向巖頭嘴邊東卜西卜無出頭日試再撿點看撿點不出我大禮他九拜有撿點得出者九十棒一棒也不饒演教泐云德嶠布龍蛇大陳洞山設陷虎機關巖頭久經行陳雖則不為所困其奈掩耳偷鈴若放過則彼此無傷撿點來三人盡皆是賊中有一個正賊一個草賊且道那一個是正賊那一個是草賊白巖符云德山當堂據令末上猶缺一籌巖頭泥裏藏鋒腳跟終是不穩并須受罰若夫洞山老漢且置勿論為什麼留與後人撿點巖頭因辭德山山曰甚麼處去頭曰暫辭和尚下山去山曰子他後作麼生頭曰不忘和尚山曰子憑何有此語頭曰豈不聞智與師齊減師半德智過於師方堪傳授山曰如是如是善自護持天童覺云德山尋常棒下不立佛祖及乎到者時節得恁麼老婆雖然是養子之緣怎免得後人撿責待伊道智過於師方堪傳授拽拄杖驀脊便打巖頭因僧問三界競起時如何頭曰坐却著曰未審師意如何頭曰移取廬山來即向汝道徑山杲云巖頭古佛向萬仞巖頭垂手鑊湯爐炭裏橫身蓋為慈悲之故有落草之談今日若有人問雲門三界競起時如何只向道快便難逢未審師意如何移取雲門山來即向汝道天寧琦云三界競起巖頭道坐却著見怪不怪其怪自壞妙喜道快便難逢順水流舟更加櫓棹天寧道在什麼處長安甚閙我國晏然未審師意如何待上山斫棒來却向汝道三段不同收歸上科大珠口云巖頭古佛答一轉語如泰華之嶽頓落千峰似滄溟之海截斷衆流蓋道眼精明有刮膜之手今日若有問大珠三界競起時如何珍重未審師意如何移取少微山來即向汝道眉山霈云巖頭雖有殺人刀且無活人劍巖頭問僧甚處來曰西京來巖曰黃巢過後還收得劍麼曰收得巖引頸近前曰㘞曰師頭落也巖呵呵大笑僧後到雪峰峰問甚處來曰巖頭峰曰巖頭有何言句僧舉前話峰便打三十棒趂出溈山哲云者僧黃巢過後曾收得劍却向巖頭處施設及至雪峰前鋒鋩不露何故為他巖頭大笑一聲直得天地陡暗四方絶唱若不得雪峰幾乎陸地平沉不見道殺人刀活人劍承天宗云可惜許者般漢只學得勝負之法殊不知勝負是生滅之因我當時若見但向他道作家作家教他擔板過一生寶掌白云者僧既收得劍因甚殺活威權全在他人手裏當時待他引頸向前何不道草賊大敗他若擬議呵呵一笑便出不唯塞斷巖頭咽喉就是雪峰也只與他平展如今莫有恁麼人麼良久云洎合停囚長智白巖符云可惜者僧有劍不善用動便犯手傷鋒當時待他引頸何不道降者不斬巖頭到者裏不獨有技無所施就使象骨老漢也只得從旁喝采巖頭因羅山間問石霜起滅不停時如何霜曰直須寒灰枯木去一念萬年去函蓋相應去純清絶點去山不契乃造巖頭問起滅不停時如何巖喝一喝曰是誰起滅山有省報恩秀云若是萬松喝了便休徑山琇云殺人須是殺人劍資福侶云大海不著死尸針鋒不留蚊蚋二大老千古提持兩兩相照今人向言句上著倒那個有活眼那個無活眼所以不契所以省去不惟不識二大老亦且不識羅山白巖符云必大死一回枯木上別見春光參取石霜當下點鐵作金化鯤鯢而騰高漢參取巖頭若夫殺人刀活人劍顛拈倒用則又於他二老分上豈疏親可得而較哉如今有問起滅不停時如何不許循途蹈轍試別道看巖頭到百丈丈曰有事相借問得麼奯曰幸自非言何須譗𧫡丈曰收得安南又憂塞北奯劈開胸曰與麼不與麼丈曰要且難搆要且難搆奯曰知即得知即得仰山寂云若有人知此二人落處不妨奇特若辨不得大似日中迷路昭覺勤云百丈獨坐大雄峰頂咳嗽風生四海英靈望崖而退因甚奯公到來直得弓折箭盡巖頭再到德山山見便下繩床作抽坐具勢奯曰者個且置或遇心境一如底人來向伊道個甚麼免被諸方撿責山曰猶較昔日三步在別作個主人公來奯便喝山默然奯曰塞却者老漢咽喉拂袖便出溈山祐云奯上座雖得便宜怎奈掩耳偷鈴昭覺勤云奯公一喝賓主歷然德山無語言遍天下溈山老子雪上加霜子細撿點將來總不可放過乃擲下拄杖巖頭值沙汰於鄂州渚邊撑渡兩岸各掛一板有過渡者擊板一下巖曰阿誰或曰要過那邊去巖乃舞棹迎之一日有婆抱兒渡乃問呈橈舞棹即不問且道婆手中兒甚處得來巖便打婆曰婆生七子六個不遇知音只者一個也不消得便拋向水中琅琊覺云欺敵者亡大溈智云巖頭業在其中只得通身泥水老婆雖有丈夫手段也是家醜外揚天奇瑞云綿裏有針泥裏有刺者婆子不妨奇怪若不是巖頭也大難抵對笑巖寶呵呵笑云者婆子圖個什麼巖頭當時待他才拋便好連棒打入水中始較些子何故不見道只者一個也不消得寶壽方云琅瑘道欺敵者亡且道在婆子分中在巖頭分中天童忞云奇怪者婆子雖是女流却有衲僧氣槩看他兩兩作家相見如擊石火閃電光相似如今衲僧總情解搏量道拋兒奇特錯過了也殊不知婆子下水拖人巖頭逆風把柂一個滑頭一個然撿點將來二俱不了若是山僧待他拋兒更與一橈打落教他母子俱喪不唯塞斷今時露布且與者老婆爭氣崆峒慈云者婆子抱贓呌屈著甚來由奯公令雖行怎奈猫頭鼠尾當時待道者個也不消得何不更與一橈使伊知有宗門牙爪不見道殺人須見血做鬼也光鮮菩曇深云者婆子雖有丈夫氣槩能提正令簡點將來大似徐六擔板只見一邊安樂方云婆子言中有刺巖頭棒下無情當時若再與一頓者臭老婆家私不唯無處賣弄連性命也須斷送巖頭因僧問浩浩塵中如何辨主巖曰銅砂鑼裏滿盛油天童傑云巖頭貧助富未是作家靈隱者裏則不然忽有問浩浩塵中如何辨主向道日輪正當午喝一喝石霜尊云大小巖頭只有定亂之謀且無出人之眼若問山僧浩浩塵中如何辨主劈脊便棒為甚如此驀地喚回秋夜夢舉頭惟見月當空巖頭因僧問古帆未掛時如何巖曰小魚吞大魚又僧問古帆未掛時如何巖曰後園驢喫草甌峰承云一轉語箭鋒相拄一轉語天地懸殊有人揀辨得出許你具一隻眼巖頭因瑞巖問如何是本常理頭曰動也曰動後如何巖曰不見本常理瑞佇思頭曰肯即迥脫根塵不肯即永沉生死瑞乃有省東塔明云將金博金瓦罐不離井上破以楔出楔水母何曾離得蝦縱使瑞巖漆桶子快也是君子可入巖頭因德山曰我者裏有兩僧入山住菴多時汝去看他怎生頭遂將一斧去見兩僧在菴內坐巖乃拈起斧曰道得也一下斧道不得也一下斧二僧殊不顧巖擲下斧曰作家作家歸舉似德山山曰汝道他如何巖曰洞山門下不道全無若是德山門下未夢見在南㵎問云巖頭大似金翅劈海直取龍吞二菴主雖則穩坐家堂到者裏也只得退身三步敢問諸人洞山門下且置作麼生是德山門下事劍去久矣徒勞刻舟雪竇正云巖頭當場落節背後揚威有什麼共語處若也據令而行德山合喫拄杖何也欲觀前人先觀所使眉山霈云雖然不趂行情家無滯貨不富巖頭因僧問路逢猛虎時如何巖曰拶天童傑云巖頭具殺人不眨眼底手段被者僧一問却向射垛後嚲避若也撿點得出雖是善因而招惡果又云巖頭眼觀東南意在西北好一拶性命落在別人手裏巖頭因羅山問和尚三十年在洞山又不肯洞山是否巖曰是曰和尚豈不是承嗣德山又不肯德山是否巖曰是曰不肯德山即且置祇如洞山有甚麼虧缺處巖良久曰洞山好佛只是無光間便禮拜白巖符云當機覿面提覿面當機捷奯公可謂善達其旨然被羅山奉個三尺帽子却似不曾知諸人還辨得出麼福州雪峰義存禪師青五德山鑒嗣上堂曰南山有一條鱉鼻蛇汝等諸人切須好看長慶出曰今日堂中大有人喪身失命雲門以拄杖攛向雪峰面前復作怕勢有僧舉似玄沙沙曰須是稜兄始得雖然我即不然僧便問和尚作麼生沙曰用南山作麼寶峰文云雪峰無大人相然則蛇無頭不行長慶却似怕阿家相似便道今日堂中大有人喪身失命雲門攛拄杖作怕勢為蛇畫足玄沙用南山作麼道我見處親切不免在窠窟裏更無一個有些子天然氣槩報寧門下莫有天然氣槩底麼不敢望你別懸慧日獨振玄風且向古人鶻臭布衫上知些氣息也難得護國元云雪峰搖頭雲門擺尾長慶為蛇添足玄沙一向插嘴諸人還知者一隊漢落處麼妙舞也應誇遍拍三臺須是大家催高峰妙云雪峰和尚雖慣作竊怎奈諸子不善參隨未免一場敗露致令千載之下惡聲猶在報恩秀云萬松當時若作雲門以拄杖攛向雪峰懷裏他若擬議隨後教伊自作自受親遭一口為什麼今朝二月二暫放龍擡頭愚菴盂云雪峰毒氣薰蒸長慶拚命挨拶雲門矢上加尖堪作甚麼玄沙用南山作麼巧不如拙然雖如是即今還有不被其所薰蒸者麼不妨出來與老僧相見罷罷救得來已是不堪了也雪峰問僧甚麼處去僧曰識得即知去處峰曰你是了事人亂走作麼曰和尚莫塗污人好峰曰我即不塗污你古人吹布毛作麼生與我說來看曰殘羮餿飯已有人喫了也峰休去雲門偃別雪峰前語云築著便屎臭氣又代後語云將謂是鑽天子元來只是死水裏蝦蟆雪竇顯出雪峰語云一死更不再活雪峰住菴時二僧來峰以手拓菴門放身出曰是什麼僧亦曰是什麼峰乃低頭歸菴後僧到巖頭頭問甚處來曰嶺南來頭曰曾到雪峰否曰曾到頭曰有何言句僧舉前話頭曰他道甚麼曰他無語低頭歸菴頭曰噫我當初悔不向伊道末後句若向伊道天下人不奈雪老何僧至夏末再舉前話請益頭曰何不早問曰未敢容易頭曰雪峰與我同條生不與我同條死要識末後句祇者是溈山哲云大小雪峰巖頭却被者僧勘破泐潭準云且道雪峰是會末後句不會末後句若道會巖頭又道當初悔不向伊道末後句若道不會因甚如今兒孫遍天遍地雖與我同條生不與我同條死末後巖頭雖與劈頭說破未免有些誵訛久參先德一舉便知後學初機莫道不疑好徑山杲云雪峰低頭歸菴疑殺天下人巖頭道我當初若向伊道末後句天下人不奈雪老何若不同床睡焉知被底穿又道雪峰與我同條生不與我同條死要識末後句祇者是殺人須是殺人刀活人須是活人劍博山來云莫道無語其聲如雷佛事門中商量不下巖頭寶𦦨吐華雪峰金針露鼻固是難兄難弟若論生死同條待別時來抹過一著甌峰承云大小巖頭龍頭蛇尾雪峰問僧近離甚處曰覆船峰曰生死海未渡為什麼便覆却船僧無語乃回謂覆船船曰何不道渠無生死僧再來進其語峰曰此不是汝語曰是覆船恁麼道峰曰我有二十棒寄打覆船二十棒老僧自喫要且不干闍黎事雪竇顯於為甚麼便覆却船處代僧云久嚮雪峰待峰擬議拂袖便行又於末後不干闍黎事處云能區能別能殺能活若也辨得天下橫行昭覺勤代僧便與掀倒禪床復云雪峰有驗人句覆船有透關眼雪竇有陷虎機且道崇寧成得個什麼邊事徑山杲云作家宗師天然有在然雖如是也是作賊人心虗是則不干者僧事二十棒何須自喫當時但添打覆船便了且道渠過在什麼處老老大大不合與人代語天寧琦云覆船道渠無生死還契得雪峰意麼若契得雪峰意為什麼道我有二十棒寄打覆船二十棒老僧自喫會麼者裏若會便見妙喜道作賊人心虗勘破雪峰了也是則不干者僧事二十棒何須自喫但添打覆船便了你道妙喜還有過也無頭上著枷腳下著杻古南門云覆船把髻投衙遡流尋源寄打二十棒也得因甚雪峰却自喫二十棒還會麼好事不須頻話會留將和氣暖丹田夾山豫代僧云幸知和尚是作家龍華宗云好隻無底船載得兩個沒巴鼻的老漢怎奈者僧不解把梢連纍大家通身打濕當時若是個伶俐衲僧見雪峰恁麼道好與震威一喝見覆船恁麼道亦好與震威一喝若下得者兩喝達磨一宗不致寂寥山僧者裏還有恁麼人麼良久云出頭天外看誰是者般人雪峰上堂云望州亭與汝相見了也烏石嶺與汝相見了也僧堂前與汝相見了也保福展問鵝湖孚云僧堂前相見即且置祇如望州亭烏石嶺作麼生相見鵝湖驟步歸方丈保福低頭入僧堂雪竇顯云二老是即是只知雪峰放行不知雪峰把定雲居齊徵云此二尊宿且道會得會不得相見不相見試斷看薦福璨云雪峰老人已是傷鹽費醬今時師僧入了門升了堂見了主人剗地握節當胸更求指示箇入處啞黃連和根嚼未是苦烏石道云雪峰布箇縵天網子打鳳羅龍保福鵝湖無端撞入裏許至今出頭不得如今還有透得者個縵天網子底麼卓拄杖云疏而不漏愚菴盂云請和尚下涅槃堂裏去鼓山霈云大衆鵝湖歸方丈保福入僧堂什麼處是相見處良久云兩箇漆桶相揩著冷光射破萬重山大覺升云大小雪峰有年無德屈抑多少人大覺則不然望州亭也不須相見烏石巔也不須相見僧堂前也不須相見何故茫茫宇宙人無數那個男兒不丈夫喝一喝下座雪峰因僧問聲聞人見性如夜見月菩薩人見性如晝見日未審和尚見性如何峰打三棒僧復問巖頭頭打三掌雪竇顯云應病設藥且與三下若據令而行合打多少天童覺舉雪竇語畢云雪竇一期趂快往往後人作行令會殊不知雪峰巖頭是個無固必漢南堂欲云前三後三應病與藥據令而行別有一著顧侍者云且道是那一著侍者擬議便打出愚菴盂云雪峰打巖頭打若論見性如隔羅縠在寶壽新云者僧大似向班門弄斧怎怪得二老惡辣鉗錘然撿點將來都來只得一橛且道那裏是他一橛處試道看白巖符云者僧祇有先鋒且無殿後帶纍他雪峰巖頭只作得個齊頭故事者裏還有能代者僧進一語者麼山僧當為你結案雪峰升座召衆曰看看東邊的又曰看看西邊的汝若要會拈拄杖擲下曰向者裏會取靈巖儲云雪峰古佛剖腹露心將從上來家業盡情分付了也衆中若有克家之子便好一肩擔荷去若無山僧不妨為伊清理一上東邊的玉樹撑天西邊的緑陰覆地擲下拄杖四止分明向者裏會都盧一契若人於此倜儻分明正好將三條篾牢束肚皮拈一柄鈯斧子隨處耕種去會麼鐵牛吼處春光滿木馬嘶時夜浦平拄杖不知何處去一雙秋鴈落沙汀雪峰在洞山作飯頭淘米次洞問淘沙去米淘米去沙峰曰沙米一時去洞曰大衆喫個什麼峰遂覆却盆洞曰據子因緣合在德山琅琊覺云雪峰與麼去大似拋却甜桃樹㳂山摘醋梨投子青云洞山恁麼道是甚道理雖然一色乾坤怎奈山高水濶所以野人云工夫不到不方圓言語不通非眷屬淘米去沙淘沙去米乃代峰出語云無影長生桂經霜結子頻大衆喫個什麼金鳳採香銜不盡玉雛食蕊葉長新天童覺云雪峰步步登高不覺草鞋跟斷若也正偏宛轉敲唱雙行自然言氣相合父子相投且道洞山不肯雪峰意在什麼處萬里無雲天有過碧潭似鏡月難來報恩秀云我者裏又且不然淘沙去米淘米去沙向道滌盡塵砂不遺顆粒大衆喫個什麼粥將木杓舀飯用笊篱撈雪竇宗云直木不棲鸞鳳金針已繡鴛鴦若不是新豐老人便見氷消瓦解
