body:
  text: 古杭白巖嗣祖沙門淨符彚集青六洪州同安常察禪師青六九峰䖍嗣僧新到繞禪牀三匝振錫一下曰凡聖不到處請師道安鳴指三下僧曰同安今日嚇得忘前失後安曰闍黎發足何處僧珍重便出安曰五湖衲子一錫禪人未到同安不妨疑著僧回首曰近見不如遠聞安曰貪他一杯酒失却滿船魚昭覺勤云全軍隊伍馬步相參兩陳交鋒不妨奇特怎奈二俱失利具眼者試辨看何山珣云奮大用發大機明來暗合平坦嶮𡾟彼既殺活拄杖我即綿裏稱錘縱使諸方眼目難斷個是個非畢竟如何堪笑一枝無孔笛主賓顛倒兩頭吹洞山瑩云者僧好如張翼德在霸陵橋上橫衝直闖威武可觀被同安緩緩地念了一道真言便把不住所以遭他點罰道貪他一杯酒失却滿船魚衆中還有為者僧出氣者麼卓拄杖云疏而不漏古塘云者兩個漢雖然賓主相合言氣相符若是聖凡不到處要且俱未夢見在同安因僧問遠趨丈室乞師一言安曰孫臏門下徒話鑽龜曰名不浪施安曰喫茶去僧便珍重安曰雖得一場榮刖却一雙足天童傑云拳來拳應踢來踢應拳踢交參孰負孰勝搖頭擺尾過牢關刖足之言誰肯信雖然有一處誵訛在諸人試檢點看同安因聞鵲聲謂衆曰喜鳴寒檜心印是渠傳僧出曰何必安曰衆中有人在僧曰同安門下道絶人荒安曰胡人飲乳返怪良醫僧曰休休安曰老鶴入枯池不見魚蹤迹天童傑云動絃別曲有唱有酬其唱愈高其和愈峻其間鄭衛之聲雖則雜然五音六律拍拍是令同安問僧近離甚處曰江西安曰江西法道何似此間曰賴是問某甲若問著別人則禍生安曰老僧適來造次曰某甲不是嬰兒徒用止啼黃葉安曰傷鱉恕龜殺活由我昭覺勤云宗師家握佛祖鉗錘理當即行不留朕迹者僧就上門上戶更說甚麼傷鱉恕龜劈脊便棒何故重賞之下必有勇夫同安因僧問如何是天人師安曰頭上角未全身上毛不出曰如何是頭上角未全安曰不擎戴如何是身上毛不出安曰寸絲不挂報恩倫云同安轉劫外機放風前箭聖解凡情一齊穿却何止劈筈奪窩紅心中的設使者僧手親眼辨如八臂那吒亦難摸索又於不擎戴下著語云已太崢嶸寸絲不挂下著語云猶有赤骨律在壽昌經云關津易過險阱難行謀士有先見之能將元惟威勇之力預知險處不踐定獲勝地高登不須血戰以成功善保軍民之塗炭從教神機妙算終是乾弄一場要知同安意麼突然掇出燎原燧驚散巢居鬼窟精吉州禾山澄源殷禪師青六九峰䖍嗣僧問習學謂之聞絶學謂之鄰過此二者謂之真過如何是真過殷曰禾山解打鼓曰如何是真諦殷曰禾山解打鼓曰即心即佛則不問如何是非心非佛殷曰禾山解打鼓曰如何是向上事殷曰禾山解打鼓東禪嶽云禾山以無量義百千法門若揭日月而行浮雲豈能掩蔽東禪不打者破鼓臨機變豹見兔放鷹且要諸人各各相委如何是真過實語如何是真諦如語如何是非心非佛不誑語如何是向上事不異語此四轉語如鐵蒺藜吞得過是好手其或未然言多去道轉遠豐山巖云禾山老漢被者僧一拶直得注腳太過禾山因江南李主召入宮問和尚何處來山曰禾山來主曰山在什麼處山曰人來朝鳳闕山嶽不曾移灜山誾云當時李主若道與麼則和尚遣侍者來耶禾山又作麼生請代禾山對一語看咄速道速道薦福如云禾山異境靈踪覩者皆羡今日被李主勘破福州羅山道間禪師青六巖頭奯嗣因保福問僧問巖頭浩浩塵中如何辨主頭曰銅沙鑼裏滿盛油意作麼生山召大師福應諾山曰獼猴入道場山却問明招忽有人問你又作麼生招曰箭穿紅日影徑山杲云還會麼獼猴入道場箭穿紅日影兩個老古錐擔雪共填井喝一喝天童傑云巖頭拔貧助富要且不能設有問山僧浩浩塵中如何辨主但對道日輪正卓午喝一喝天寧琦云我當時若作羅山待問銅沙鑼裏滿盛油意作麼生也與一喝召衆云且道天寧一喝與妙喜一喝是同是別天童忞云巖頭理上偏枯傑祖事上不足不肖兒孫隨例看孔著楔有問浩浩塵中如何辨主但云白面郎敲金鐙過紅妝人揭繡簾看資福侶云錦上鋪花還他三個老漢若是塵中主尚未敢相許台州瑞巖師彥禪師青六巖頭奯嗣到夾山山問甚處來巖曰臥龍來山曰來時龍起也未巖近前顧視之山曰灸瘡瘢上更著艾燋巖曰和尚又苦如此作麼山休去溈山哲云瑞巖雖然威獰訴怎奈夾山水清不容徑山杲云若不藍田射石虎幾乎誤殺李將軍瑞巖慍云二尊宿一挨一拶如善舞太阿不傷其手然也有到處也有不到處瑞巖坐盤石上終日如愚每自喚主人公復自應諾乃曰惺惺著他後莫受人瞞玄沙備因僧舉似乃云一等是弄精魂瑞巖較些子復謂僧云何不在彼中住僧云已遷化也沙云如今還喚得應麼僧無對雪竇顯云蒼天蒼天保寧勇代僧云和尚為什麼對面不聞雲居元云天下宗師總為者僧下語大似東家人死西家人助哀直饒瑞巖自出頭來也是棺材裏瞪眼昭覺勤云百丈寒潭徹底月在波心千尺巖松倚天風生幽谷直得凜凜孤標澄澄丰采及至月離碧嶂影落雲衢遂乃當面蹉過當時若是個漢待伊道即今還喚得應麼直下便喝非唯把斷玄沙要津亦乃與瑞巖老子出氣徑山琇云驚羣須是英靈漢敵勝還他獅子兒者僧只解傳言送語不能懸崖返躑非但錯過瑞巖亦乃錯過玄沙瑞巖慍云祖師弄者一解可謂超今邁古然只作得個看家兒子山僧向者裏著一隻眼非獨紹續箕裘直要衝樓跨竈會麼電光莫及石火難追兔徑非大象之所遊雞粟豈鳳凰之啖喝一喝古南門云者僧若從瑞巖來待問如今還喚得應麼但對道和尚莫瞞某甲不唯為瑞巖作主亦免雪竇助哀資福侶云如今還喚得應麼當時只消彈指一下管取唱和分明福州香溪從範禪師青六巖頭奯嗣鼓山僧到參溪曰汝豈不是鼓山僧僧曰是溪曰額上珠為何不現僧無對遽辭溪門送復召上座僧回首溪曰滿肚是禪曰和尚是甚麼心行溪大笑而已灜山誾云者僧前面失節後面本香溪為什麼到者裏却放過良久云也須知笑裏有刀福州聖壽嚴禪師青六巖頭奯嗣補衲次僧參聖提起示之曰山僧一衲衣展似衆人見雲水兩條分莫教露針線速道速道僧無對聖曰如許多時作甚麼來灜山誾云者僧當時何不道破也破也待聖壽動靜便與震聲一喝福州玄沙師備禪師青六雪峰存嗣上堂衆集遂將拄杖一時趁下却回謂侍者曰我今日作得一解險入地獄如箭射侍者曰喜得和尚再復人身翠巖芝云大小玄沙前不遘村後不迭店且作麼生道得出身句道吾真云大小芝老只是偏枯若是道吾即不然玄沙與侍者一人具一隻眼雲居舜云此話衆中舉得爛如泥且作麼生會山僧道侍者不在言玄沙也是荊棘林裏求栴檀東禪觀云大小玄沙性命在侍者手裏玄沙垂語諸方老宿盡道接物利生忽遇三種病人來且作麼生接患盲者拈椎豎拂他又不見患聾者語言三昧他又不聞患啞者教伊說又說不得且作麼生接若接不得佛法無靈驗時有僧出曰三種病人還許學人商量否沙曰許汝作麼生商量其僧便出沙曰不是不是地藏琛出曰某甲有眼耳口和尚作麼生接沙曰慙愧便歸方丈雲門偃因僧請益門云汝禮拜著僧拜起門以拄杖挃之僧乃退後門云汝不是患盲復喚近前來僧才近前門云汝不是患聾復云還會麼僧云不會門云汝不是患啞其僧於是有省雪竇顯舉了便喝云者盲聾喑啞漢若不是雲門驢年去如今有底或拈椎豎拂他又不管教伊近前他又不來問還會麼他又不應諸方還奈何得麼雪竇若不奈何汝者一隊驢漢又堪作什麼以拄杖一時趁散翠巖芝云早知燈是火飯熟已多時雲居元云地藏如龍無角似蛇有足玄沙只有先鋒且無殿後兩人病在膏肓針藥之所不到山僧為你諸人點破拈拄杖云棒頭有眼明如日要識真金火裏看本覺一云雲門雪竇也是因風吹火見兔放鷹爭如地藏逆水之波當時聞玄沙恁麼道便出衆云某甲有眼耳口請師接噫只者一拶非但玄沙盡西天此土諸佛諸祖也不免退身有分驀拈拄杖云放過則不可徑山杲云者僧雖然悟去只悟得雲門禪若是玄沙更買草鞋行腳天童覺云雲門平展者僧實酬且道什麼處是者僧悟處不救之疾難為針艾天寧琦云玄沙雲門氣急殺人彼自無瘡勿傷之也笑巖寶云雲門當時不合放過者僧反使他患盲聾瘖啞無有休日何故殺人須教死作鬼也光鮮古南門云種穀不生豆者僧既是盲聾瘖啞底因甚却向雲門言下省去驢漢還會麼擊拂子云上士一決一切了中下多聞多不信梅山相云者裏又且不然諸禪德若向拈椎豎拂上相見不如盲底若向語言三昧上摸索不如聾底若逞驢脣馬嘴而作伎倆不如啞底且道作麼生即得無影樹頭擒木馬不濕波中捉活魚棲霞成云三種病話如一部難經不特庸醫茫然即雲門雖能發藥要且不能按經妙喜道此僧只悟得雲門禪果然地藏云某甲有眼耳口和尚作麼生接可惜玄沙真病現前却拱手而去當時但云禮拜著待伊擬議痛棒打出豈不名擅諸方作個醫方捷徑西遁超云玄沙老人無端壓良民為賤指好肉作瘡合得何罪還有為玄沙出罪者麼但向云何幸如之玄沙因僧問如何是學人自己沙曰用自己作麼雲門偃云沒量大人向語脉裏轉却寶壽新云且道是者僧在語脉裏轉却玄沙在語脉裏轉却有理何用高聲玄沙到莆田縣百戲迎接次日問小塘長老曰昨日許多喧閙向甚麼處去也塘提起袈裟角沙曰料掉沒交涉法眼益別小塘云昨日有多少喧閙清凉欽別云今日更好笑溈山云大溈則不然或有人恁麼問但鳴指一下如有個衲子出來道料掉沒交涉却肯他何故大丈夫捋虎鬚也是本分且道利害在甚麼處黃龍新云奇怪諸禪德扶豎宗乘須是小塘長老始得玄沙為甚麼道料掉沒交涉我即不然昨日許多喧閙向什麼處去也天共白雲曉水和明月流昭覺勤舉溈山語畢云二老宿雖是提振綱宗要且貪觀天上月而今或有問山僧昨日許多喧閙向什麼處去只向他道又是從頭起他若道料掉沒交涉劈脊便棒何故曹溪波浪如相似無限平人被陸沉南華昺云玄沙恁麼道還有得失是非也無若謂有當人未具眼在若謂無因甚麼道料掉沒交涉還會麼是非已去了是非裏薦取博山來云人將語探水將杖探烈火裏辨真金閙市裏識天子袈裟下認取老僧玄沙小塘斯人也縱然蓋覆將來口苦心甜更有事在磬山修云山僧即不然或有問昨日許多喧閙向什麼處去只向道今日一出尤勝昨日他若道料掉沒交涉我也知你是個瞎漢開先金云苟非玄沙洎被小塘熱瞞一上黃龍道天共白雲曉水和明月流也好與他個料掉沒交涉何故不見道是非只為多開口煩惱皆因強出頭玄沙與天龍入山見一虎龍曰和尚虎沙曰是汝虎歸院後龍問適來見虎云是汝未審尊意如何沙曰娑婆世界有四種極重事若人透得不妨出得陰界雪竇顯云要與人天為師面前端的是虎徑山杲代天龍進語云也知和尚為人切天寧琦云畢竟是個什麼隨例道虎蝦跳不出斗寶壽方云玄沙天龍互相屈辱各自喪身失命了也還有為二老出一隻手者麼南㵎問云天龍拋磚玄沙引玉翻手覆手一直一曲賺却多少人性命不留妄生揑目山僧今日據令而行去也卓拄杖喝一喝慧雲盛於尊意如何下代沙便作虎聲於許汝出得陰界下代龍云明破即不堪玄沙見鼓山來畫一圓相示之山曰人人出者個不得沙曰情知你向驢胎馬腹裏作活計山曰和尚又作麼生沙曰人人出者個不得山曰和尚恁麼道却得某甲恁麼道為什麼却不得沙曰我得你不得雪竇顯云祇解貪觀白浪殊不知失却手中橈也雲峰悅云道得道不得總在玄沙圈繢裏如今作麼生出得他玄沙圈繢昭覺勤云灼然者一條路作者方知直得窮天地亘萬古而不移消劫石空芥城而無盡便是透關底也須著眼始得一等是恁麼時節為什麼道我得汝不得切忌向驢胎馬腹裏作活計淨因成云叢林中往往作鼓山未到玄沙境界會却諸人要識玄沙鼓山麼不見道盡出者個不得南華昺云捩轉鼻孔換却眼睛若無者個手段如何扶豎宗乘雖然如是直是好笑笑須三十年且道笑個什麼情知你在驢胎馬腹裏作活計東禪觀云當時我若作鼓山待道人人出者個不得即向道和尚元來別有長處不圖成就前功且要與玄沙向驢胎馬腹裏相見天童覺云玄沙大似倚勢欺人用強凌弱蓋他撥得轉弄得出兩個一般為甚麼道我得你不得是真難掩是僞不昌報恩秀云天宮淨土時人愛去鼓山不愛驢胎馬腹時人怕墮玄沙不怕所以降聲負氣惟俯視橫行具獅子王不欺之力還信天童保證麼塵中能作主化外自來賓古南門云你也說者個我也說者個者個畢竟是個什麼若也辨得驢胎馬腹裏作活計也不難其或失却手橈不惟貪觀白浪管取業識茫茫佛川義云叢林往往道鼓山機見未圓落在玄沙圈繢裏殊不知玄沙鼻孔被鼓山穿却至今動轉不得若有為玄沙作主者我要問他一等與麼道為甚我得汝不得本覺微云玄沙心肝五臟被鼓山一拶拶出至今收拾不起何故不見道不入驚人浪爭見弄潮人白巖符云人人出者個不得一等與麼道為什麼有得有不得者裏著得一隻眼許你親見玄沙玄沙令僧馳書上雪峰峰開緘見三幅白紙乃問僧會麼曰不會峰曰不見道君子千里同風僧回舉似沙沙曰山頭老漢蹉過也不知曰和尚如何沙曰孟春猶寒也不解道五祖戒出語云將謂鬍鬚赤明招謙云玄沙三幅白紙爭奈文彩已彰雪峰千里同風何故不知蹉過不見道養子莫教大大了好罵爺雲門澄云玄沙孟春猶寒雪峰千里同風總是開書後語未開書已前作麼生道口口泰云玄沙未封白紙已前早已氷消瓦解雪峰道個千里同風可謂雪上加霜檢點將來二者俱錯玄沙問鏡清教中道不見一法為大過患且道不見什麼法清指露柱曰莫是不見者個法麼沙曰浙中清水白米從你喫佛法未夢見在雪竇顯云大小鏡清被玄沙熱瞞我當時若見但向道靈山授記未到如此溈山云若不是鏡清幾乎忘前失後何故不逢別者終不開拳天童覺云鏡清當時恁麼答玄沙末後恁麼道還相契也無然則鏡清久不作佛法夢也須是玄沙同參始得天童華云鏡清放頑佛也不奈伊何若不是玄沙識破幾被露柱吞却天童傑云二尊宿驀劄相逢大似小兒則劇相似佛法身心何在乃舉應菴華語畢喝一喝云若教頻下淚東海也須乾愚菴盂云玄沙幸遇鏡清若是個反躑的漢那裏容得我常見欺敵者亡寶壽新云木人舉手石女點頭若論佛法二字依舊面南看北斗良久云會麼江北用鋤江南使牛白巖符云伯牙與子期不是閒相識二老其謂歟雖然當時鏡清大似口裏無舌未審玄沙還信得過麼玄沙示衆若論此事喻如一片田地四至界分結契賣與諸人了也只有中心樹子猶屬老僧在佛川義徵云諸禪德既是四至界分結契賣了因甚中心樹子猶屬玄沙玄沙因雪峰曰世界濶一尺古鏡濶一尺世界濶一丈古鏡濶一丈玄沙指火爐曰火爐濶多少峰曰如古鏡濶沙曰者老漢腳跟未點地在鏡清怤問僧為復古鏡致火爐與麼濶為復火爐致古鏡與麼濶西院明云與麼問人也未可在雲門偃云餿飯泥茶爐昭覺勤云現成公案古鏡本非火爐打破羅籠火爐即是古鏡若非父子相投怎見赤心片片祇如玄沙道者老漢腳跟未點地在諸人畢竟作麼生會天寶樞拈拄杖卓一卓云世界古鏡火爐百雜碎了也玄沙道者老漢腳跟未點地在意作麼生國清才子貴家富小兒驕天奇瑞云且道世界誰世界古鏡誰古鏡不可逐境打做兩橛豎拄杖云者是世界者是古鏡若然直下承當坐斷雪峰玄沙大丈夫切忌鬼窟裏虗淹歲月髻珠是云一言既出駟馬難追復喝一喝白巖符云象骨老人被玄沙一拶直得立地尿出雖然玄沙與麼道了而雪峰者裏不措一辭莫道無利害好玄沙因聲明三藏善別音響劉大王請驗之沙乃將銅火箸敲鐵火爐問聲明曰是什麼聲明曰銅鐵聲沙曰大王莫受外國人瞞雪竇顯別玄沙語云大王宜加信敬又別三藏語云莫瞞外國人好清凉欽代三藏進語云却是和尚瞞大王淨因成云既不是銅鐵聲玄沙喚作什麼聲然則三藏只知渡水不覺溼衣玄沙偏解誣人爭奈國有憲章且道三藏瞞大王何似玄沙瞞大王天童覺云理契則神貧子獲衣中之寶情封則物力士失額上之珠三藏只解瞻前不能顧後還知麼誣人之罪以罪加之高峰妙云大小玄沙能所未忘當時賴遇是劉大王若撞個本分衲僧管取一場漏逗蓮柎策云玄沙欺胡謾漢孤負國恩三藏祇明得聲未許觀光上國當時大王不受人瞞玄沙三藏總好與趁出國門玄沙因光侍者激曰師叔若學得禪某甲打鐵船下海去沙住後遣書問光曰打鐵船也未法眼益代光侍者云和尚終不與麼清凉欽代光侍者云請和尚上船支提愛云玄沙也是貧人思舊債慧林本代光侍者云昨日過新羅雲居元云禪也未曾參得何用思量舊事忽然被他撐動鐵船玄沙堪作甚麼雲居莊云諸方批判者不為不多然只能扶強不能扶弱山僧今日久勘不離元狀敢謂玄沙被光侍者領過直爾分疏不下畢竟如何官無定條從民私約玄沙因僧問承和尚有言盡十方世界是一顆明珠學人如何得會沙曰盡十方世界是一顆明珠用會作麼僧便休來日沙却問僧盡十方世界是一顆明珠汝作麼生會曰盡十方世界是一顆明珠用會作麼沙曰知汝在鬼窟裏作活計報慈遂徵云一般恁麼道為甚麼却成鬼窟去雪竇顯別玄沙語云諸方即得我者裏不得大覺升云者福建子生平一條鐵脊到者裏和身折倒若論此珠不但此僧不識敢保玄沙未識在何故民可使由之不可使知之玄沙示衆世尊道吾有正法眼藏付囑摩訶迦葉猶如話月曹溪豎拂子還如指月時鼓山出曰月聻沙曰者個阿師就我覔月山不肯却歸衆曰道我就他覔月雪竇顯云玄沙與鼓山如排百萬大陳祇拋瓦礫相擊有衲僧辨別得當知正法眼藏付囑有在護國元云玄沙鼓山各說道理要且未識月在諸人要識月麼幸無偏照處剛要未明人古南門云玄沙誘人犯法鼓山買帽相頭若非雪竇明辨端倪往往作肯不肯會即今莫有旁不肯底衲僧麼我要問你喚甚麼作正法眼藏玄沙侍雪峰行次峰指地曰者一片田地好造個無縫塔沙曰高多少峰乃上下顧視沙曰人天福報即不無和尚靈山授記未夢見在峰曰你作麼生沙曰七尺八尺琅瑘覺云國清才子貴家富小兒驕寶壽方云雪峰放憨玄沙逞俊師勝資強千古一遇熱閙門庭即得若是無縫塔且緩緩玄沙因雪峰遷化衆請作喪主三朝集衆點茶次沙遂於靈前拈起一隻盞子問曰大衆先師在日從你道如今且作麼生道若道得則先師無過若道不得過在先師還有人道得麼如是三問衆俱無對沙遂撲碎盞子歸院中塔口因玄沙問你作麼生會塔云先師有什麼過沙便面壁塔便出去沙復召塔塔回首沙曰你作麼生會塔便面壁沙休去笑巖寶云當時有個衲僧才見伊恁麼舉便掀翻茶桌免教祖禰不了殃及兒孫玄沙坐次見面前地上一點白指問侍者曰見麼者曰見如是三問三對沙曰你也見我也見因甚麼道不會高峰妙云大衆見即見會即會無復疑矣且道者一點白決定是個甚麼白巖符云不識不識玄沙因韋監軍曰曹山和尚甚奇怪沙乃問撫州取曹山幾里韋顧旁僧曰上座曾到曹山否曰曾到韋曰撫州取曹山幾里曰一百二十里韋曰與麼則上座不到曹山韋却起禮拜沙曰監軍却須作禮此僧此僧却具慙愧雲居錫云甚處是此僧具慙愧處若檢點得出許你有行腳眼承天宗云者僧可悲可痛直饒玄沙具金剛眼睛蹉過韋監軍了也玄沙與地藏方丈坐話值夜深沙乃曰侍者關格子門了汝作麼生出得藏曰喚什麼作門雪竇顯別地藏當時珍重便行清凉欽別云和尚莫欲歇去麼玄沙因韋監軍曰占波國人語稍難辨何況五天梵語還有人辨得麼沙提起槖子曰識得者個即辨得雲門偃云玄沙何用繁辭又云適來道什麼玄沙因南際一長老到雪峰數日次到玄沙沙曰此事唯我能知長老作麼生會際曰須知有不求知者沙曰山頭老漢費辛苦作麼雪竇顯別際語云雪峰門下幾個如斯玄沙對雪峰曰某甲如今大用去也和尚作麼生峰將三個木毬一齊拋出沙作斫牌勢峰曰汝親在靈山方得如此沙曰也是自家事灜山誾云父作子述真個克家檢較將來未免挂人脣齒慧雲盛云看他父子則劇相似舞拍承宮商合調若論大用拈却象骨巖許伊有個話會分玄沙因鏡清問學人乍入叢林乞師指個入路沙曰還聞偃水聲麼曰聞沙曰從者裏入清有省五祖演云果是得入一任四方八面若也未然輒不得離却者裏徑山杲云若要真個得入直須離却者裏天童傑云三大老總是岐路相角漆桶相揩有甚快活處山僧則不然入之一字亦不喜聞天寧琦云者裏是什麼所在離與不離便問阿誰憶昔東溪日花開葉落時幾擬以黃金鑄作鍾子期積翠潤云者裏則不然也不管你離與不離且道者裏是什麼所在衆無對侍者云喫茶潤打云誰教你多口古林如云得個入路許他鏡清更進一程須還妙喜然望他堂奧總未在
