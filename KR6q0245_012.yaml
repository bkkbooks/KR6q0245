body:
  text: 古杭白巖嗣祖沙門淨符彚集南二池州杉山智堅禪師南二馬祖一嗣因普請擇蕨次南泉拈起一莖曰者個大好供養山曰非但者個百味珍羞他亦不顧泉曰雖然如是個個須嘗過始得報慈遂徵云且道是相見語不是相見語翠巖芝徵云只如杉山與麼道還免得無過麼若免得去未具眼在若免不得又違前話白巖符云者兩個漢被一莖菜喪盡生平撫州石鞏慧藏禪師南二馬祖一嗣本以戈獵為務因趁鹿從馬祖菴前過乃問還見鹿過否祖曰汝是何人曰獵者祖曰汝解射麼曰解射祖曰汝一箭射幾個曰一箭射一個祖曰汝不解射曰和尚解射否祖曰解射曰一箭射幾個祖曰吾一箭射一羣曰彼此生命何得射他一羣祖曰汝既知如是何不自射曰若教某甲自射直是無下手處祖曰者漢曠劫無明煩惱今日頓息鞏遂擲下弓箭投祖出家清涼欽云且作麼生是一箭射一羣底道理直是三千大千世界生命也不消一箭雪竇顯云馬師一箭一羣信彩射得有甚用處不如石鞏一箭一個却是好手雪竇今日效古人之作擬放一箭高聲喝云看箭又云中也翠巖芝云馬祖一箭射一羣猶未善在山僧一箭射無數盡大地蠢動含靈無不中者雖然如是祇道得一半更有一半留與諸上座道石鞏凡見僧來皆張弓架箭示之一日三平至鞏曰看箭平乃撥開胸曰此是殺人箭活人箭又作麼生鞏乃彈弓弦三下平乃作禮鞏曰三十年張弓架箭只射得半個聖人遂拗折弓箭平後參大顛舉前話顛曰既是活人箭為什麼向弓弦上辨平無對顛曰三十年後要人舉此話也大難得雲門偃問長慶作麼生免得他道半個聖人長慶云若不還價怎辨真偽門云入水見長人雪竇顯云要先拗折不難怎奈三平中的了也然則老宿要活三平且未免張弓架箭首山念云人人盡道三平中的莫屈他也無良久云機關不是韓光作莫把胸襟當等間支提愛云射虎不真徒勞沒羽天童覺云石鞏習氣不除三平相席打令却云三十年張弓架箭祇射得半個聖人豈不是以己方人大都不入驚人浪到底難尋稱意魚高峰妙云石鞏張弓旁若無人三平承箭弄巧成拙然雖如是半個聖人又作麼生落花有意隨流水流水無心戀落花中峰本云穿百步楊透九重鼓固是眼親手便其如半個聖人有隱身之術石鞏之技窮矣鼓山賢云披胸當箭宛有大人之作然只忍得殺人箭再問活人箭蹉過多少時也鞏為作死馬醫雖然救得也只是半個了也石鞏問西堂藏你還解捉虗空麼曰捉得鞏曰作麼生捉堂以手撮虗空一下鞏曰你不解捉堂却問師兄作麼生捉鞏把堂鼻孔拽堂作忍痛聲曰太煞拽人鼻孔直欲脫去鞏曰直須恁麼捉虗空始得寶壽方云這般做處何異弄泥團者極盡心思終無濟事雖知祖師門下別有長處當時待道你還解捉虗空麼亦曰捉得作麼生捉直把石鞏一腳踏倒白巖符云施乾轉坤不無石鞏當時被西堂近前劈面便掌又作麼生唐州紫玉山道通禪師南二馬祖一嗣因于頔相公問如何是佛玉喚相公公應諾玉曰更莫別求藥山聞曰噫可惜于家漢生埋向紫玉山中公聞乃謁見藥山山問曰聞相公在紫玉山中大作佛事是否公曰不敢乃曰承聞有語相救今日特來山曰有疑但問公曰如何是佛山乃召于頔公應諾山曰是什麼公豁然有省羅山間云當時賴遇是于頔可中草窠裏撥著個焦尾大蟲何處有藥山大溈智云于頔當時若會見藥山喚云是什麼只向道和尚賺我來拂袖便去不惟作個慷慨丈夫亦乃不鈍置紫玉大溈泰云抉驪龍額上珠取輪王髻中寶如鐘待扣似谷傳聲八面玲瓏更無回互諸人要見于頔悟處麼真金已出礦鍛煉轉光輝烏石道云可惜于頔者漢脫得紫玉醬缸又醃在藥山虀甕雖然如是仔細檢點將來紫玉藥山腳跟總未點地在烏石則不然或有人問如何是佛即向他道大小石頭親見了寶山端的不空回毗陵芙蓉太育禪師南二馬祖一嗣一日因行食到龐公前公擬接育乃縮手曰生心受食淨名所呵去此一機居士還甘否公曰當時善現豈不作家育曰非關他事公曰食到口邊被人奪却育乃行食公曰不消一句昭覺勤云善現作家芙蓉奇特盡被龐老子一時領過了也只如道不消一句且道是那一句端坐受供養施主常安樂芙蓉因龐公問馬祖著實為人處還分付吾師否蓉曰某甲尚未見他作麼生知他著實處公曰祇此見知也無討處蓉曰居士也不得一向言説公曰一向言説師又失宗若作兩向三向師還開得口麼蓉曰直是開口不得可謂實也公撫掌而出昭覺勤云芙蓉何不道分付與我待問如何是著實處便好與一掌待他眼目定動更與一掌何故且要打斷許多葛藤雲居莊云芙蓉無端惹起許多葛藤若約徑山見處便與攔胸一踏直饒龐公知有馬大師著實處也做手腳不及佛川宗云者兩個撮驢糞漢也甚奇怪雖然暗地拋竿要且瞞野山不得信州鵝湖大義禪師南二馬祖一嗣唐憲宗詔入內於麟德殿論義湖問諸碩德曰行住坐臥畢竟以何為道有對知者是道湖曰不可以智知不可以識識安得知者是乎有對無分別是道湖曰善能分別諸法相於第一義而不動安得無分別是乎有對四禪八定是道湖曰佛身無為不墮諸數安得四禪八定是乎衆皆杜口徑山杲云相罵饒你接嘴相唾饒你潑水天寧琦云僧投寺裏宿賊打不防家瑞鹿信云鵝湖長老辨似懸河未免旁觀者哂行住坐臥畢竟以何為道貪觀天上月失却手中橈鵝湖舉順宗帝問尸利禪師曰大地衆生如何得見性成佛利曰佛性如水中月可見不可取謂憲宗帝曰佛性非見必見水中月如何攫取帝乃問何者是佛性湖對曰不離陛下所問帝默契之灜山誾云若道不離陛下所問即是佛性鵝湖眉毛亦須倒豎何故祇曉眼橫不知鼻直五臺山隱峰禪師南二馬祖一嗣俗姓鄧在襄州破威儀堂只著襯衣於砧椎邊拈起椎曰道得即不打于時大衆默然峰便打法眼益云鄧隱峰奇怪甚奇怪要且打不著又云其時一衆出自偶然翠巖芝云此語有勘破處且道勘破阿誰雪竇顯云果然果然東禪觀云彼時堂中是有人耶無人耶若有人可容得伊若無人爭容得伊又云笑殺旁觀城山洽云當時若有人奪椎子却打云看破了也看者漢作何合殺汾州無業大達禪師南二馬祖一嗣示衆若有一毫頭聖凡情念未盡不免入驢胎馬腹裏去白雲端云直使一毫頭聖凡情念淨盡亦未免入驢胎馬腹裏去磬山修云未盡淨盡山僧今日一齊拈却諸人還見一毫頭麼喝一喝云切忌鑽龜打瓦無業因僧問如何是佛業曰莫妄想又僧問如何是佛業曰即心是佛雪竇顯於莫妄想處著語云塞却鼻孔於即心是佛處著語云拄却舌頭昭覺勤云正當恁麼時舌頭又拄却鼻孔又塞却還有轉身吐氣處也無便打古南門云一轉語無繩自縛一轉語金鍮不辨一轉語堆山積嶽更有一轉語三十年後南嶽西園曇藏禪師南二馬祖一嗣一日自燒浴僧問和尚何不使沙彌童行園乃撫掌三下曹山寂云一等是拍手撫掌就中西園奇怪俱胝一指頭禪蓋為承當處不諦當僧却問西園撫掌豈不是奴兒婢子邊事山曰是曰向上更有事也無山曰有曰如何是向上事山叱曰者奴兒婢子天童覺云識尊卑知貴賤西園是作家分玉石辨金鍮曹山不出世者僧雖解切磋琢磨也祇向奴兒婢子邊著倒還知麼放曠淋漓兩不傷猶是夜明簾外客愚菴盂云諸禪德曹山與麼批判為復是一期壓捺為復是別有道理有者道古人提唱總不可作實法會理固如此也須要頭腦清白西園撫掌是甚時節俱胝豎指是何節目者裏緇素得出許你親見西園否則在人家屋簷下坐著驢年去在鎮州金牛和尚南二馬祖一嗣每自做飯供養衆僧至齋時舁飯桶到堂前作舞呵呵大笑曰菩薩子喫飯來長慶稜云金牛大似因齋慶讚大光誨因僧問長慶道因齋慶讚意旨如何光乃作舞僧便禮拜光云見甚道理便禮拜僧却作舞光云者野狐精東禪齊云祇如長慶大光是明古人意別為他分柝諸人每日喫飯過堂為當與古人一般為當別有道理若道別且作麼生得別來若道一般恰到他舞又被喚作野狐精還會麼若不會行腳眼在甚麼處雪竇顯云雖然如是金牛不是好心瑞巖慍云金牛露出醜舉止殘羮餿飯阿誰肯喫金牛因臨濟來乃橫按拄杖當門踞坐濟遂撫掌三下歸客堂牛却下看人事了乃問夫賓主相見各有軌儀上座何得無禮濟曰老和尚道什麼牛擬開口濟便打一坐具牛作倒勢濟又打一坐具牛曰今日不著便遂歸方丈溈山祐問仰山此二尊宿還有勝劣也無仰云勝即總勝劣則總劣溈山果云一人焦磚打著連底凍一人得便宜是落便宜具眼者辨取靈隱禮云驅耕夫牛奪飢人食不無臨濟若是毒蛇頭上揩癢猛虎口裏橫身須讓金牛始得只如勝劣不分直提向上又作麼生橫按鏌鎁全正令西遁超云二大老一則居勝一則退敗是將栗棘蓬擉瞎天下人眼睛是將爛汙泥塗却天下人眼睛今之學其宗者打必打到勝喝必喝到勝以為多打得幾下多喝得幾喝便為大機大用噫殊不知八百年前早為金牛踏殺了也利山和尚南二馬祖一嗣因僧問衆色歸空空歸何所山曰舌頭不出口曰為甚麼不出口山曰內外一如故漏澤杲云大小利山恁麼答話把人腳跟釘却不敢動著一步山僧者裏則不然若有問衆色歸空空歸何所向道此去武塘不遠為甚如此祇要你到家還會麼良久云莫怪坐來頻勸酒自從別後見君稀韶州乳源和尚南二馬祖一嗣上堂西來的的意不妨難道衆中莫有道得者麼出來試道看時有僧出禮拜源劈脊便打曰是什麼時節出頭來便歸方丈保福展代僧云為和尚不惜身命長慶稜云我即不然福云作麼生慶云不妨不妨承天宗云宗乘也不易扶豎者兩個老漢扶不起我道者僧若不出頭棒即是乳源自喫溈山果云者僧若具眼才見開口便好向道老和尚少賣弄不唯勘破乳源亦乃坐斷天下人舌頭廣胤標云者僧若是個漢待伊才拈棒便好接住送一送云和尚也須自領一半始得管教者老漢一場懡㦬筠州逍遙和尚南二馬祖一嗣因鹿西和尚曰念念攀緣心心永寂遙曰昨晚亦有人恁麼道西曰道個什麼遙曰不知西曰請和尚説遙以拂子驀口打西拂袖便出遙召衆曰大衆直是頂門上著眼也鑑他不破昭覺勤云老僧雖頂門無眼也驗得他骨出何以見得古墓毒蛇頭戴角南山猛虎尾吒沙洪州水潦和尚南二馬祖一嗣問馬祖如何是西來的的意祖曰禮拜著潦拜下祖乃當胸踏倒潦忽契悟起來撫掌呵呵大笑曰也大奇也大奇百千三昧無量妙義只向一毫頭上識得根源去住後每謂衆曰自從一喫馬師踏直至如今笑不休琅瑘覺云大衆你道水潦還曾悟也未天童覺云馬大師不合放過待伊起來恁麼道但問只者一毫頭從甚處得來待伊擬議更與一踏鼓山霈云大小水潦大似乞兒見小利白巖符云可惜馬師有殺人劍無活人刀致使大小水潦在一毫頭上著倒且作麼生與伊拈却者一毫頭良久云當時好更與兩踏衢州烏臼和尚南二馬祖一嗣因玄紹二上座參臼曰二禪客發足甚麼處玄曰江西臼便打玄曰久知和尚有此機要臼曰你既不會後面個師僧祇對看紹擬近前臼亦打曰信知同坑無異土參堂去雪竇顯云宗師眼目須是漝麼如金翅劈海直取龍吞有般漢眼目未辨東西拄杖不知顛倒只管説照用同時人境俱奪打殺一萬個有什麼過溈山哲云烏臼大似巨靈逞劈泰華之威蒼龍展奪驪珠之勢直得乾坤失色日月潛輝乃拈拄杖云諸人還識烏臼麼若也識去橫按鏌鎁寰中獨據若也未識棒頭有眼明如日卓拄杖下座白雲端云衆中商量道拄杖在烏臼手裏以強凌弱有什麼難苦哉作者般見解水亦難消所以道醍醐上味為世所珍遇斯等人翻成毒藥要識烏臼麼橫按鏌鎁全正令太平寰宇斬癡頑昭覺勤云雪竇可謂明辨古今分別邪正然雖如是只見烏臼放行處未明烏臼把住處要知烏臼把住處麼直得釋迦彌勒猶為走使不敢正眼覷著若使據令而行盡大地人並須喫棒天目禮云人人盡道烏臼用處如燒尾霹𮦷殊不知性命落在僧手裏似敗陳將軍投戈散地雲居莊云平地上嶮崖孤峻處平坦諸方祇知烏臼具超宗越格手段且不知烏臼徹底老婆心要識老婆心麼棒打石人頭嚗嚗論實事開先金云雪竇乃大方宗匠明辨古今何得扶強抑弱與麼説話豈無識者殊不知大小烏臼被二上座不動聲色使得手忙腳亂愚菴盂云烏臼只管據令而行彌勒釋迦立在下風試問二禪客還甘麼若甘則瞎却天下人眼若不甘則瞎却烏臼眼或曰甘與不甘一併收下也是瞎驢趁大隊寶掌白云烏臼老漢如神箭繞樹霹𮦷頂直使盡大地人亡鋒結舌無回避處且道具什麼眼以拄杖一時打散安國聰云者僧破浪衝關危亡不顧却有衲僧氣槩烏臼雖行閫外威權檢點將來性命落在者僧手裏鳳山啓云烏臼棒頭有眼足下無私慣用白拈手段但不應無罪而屈平人雖然只知盡法那管無民古鏡奇云烏臼吹毛在握殺活臨時縱饒你有三頭六臂到者裏未有不望崖而退雖然未免被者僧勘破資國秀云烏臼盡法不管無民雪竇也是順硃填墨昭覺雖則緇素精明只知烏臼把住處未明烏臼放行處要知烏臼放行處麼拈拄杖連卓云竹密不妨流水過山高豈礙白雲飛乃擲下拄杖烏臼問僧近離甚處曰定州臼曰定州法道何似者裏曰不別臼曰若不別更轉彼中去便打曰棒頭有眼不得草草打人臼曰今日打著一個又打三下僧便出臼曰屈棒原來有人喫在曰爭奈杓柄在和尚手裏臼曰汝若要山僧回與汝僧近前奪棒打臼三下臼曰屈棒屈棒曰有人喫在臼曰草草打著個漢僧作禮臼曰却恁麼去也僧大笑而出臼曰消得恁麼消得恁麼南堂欲云烏臼當軒據坐正令方行者僧自遠趨風𢬵得喫棒若是慣戰作家何處有烏臼也更若未會看取雪竇葛藤開先金云雲行雨施雷奔電掃縛虎放虎入草出草烏臼與者僧相見可謂主賓互換縱奪可觀因甚烏臼却道消得恁麼消得恁麼且道是肯伊不是肯伊具眼者辨取愚菴盂云要做臨濟下兒孫須知有者般事我坐你立收放自由主賓互換血脈貫通自然風雲凜冽所以謂之得大自在若一棒差排到底了無合殺做烏臼底奴子也未得在資福廣云多錢善賈長袖善舞隨時消息步中規矩善論掌上身飛人棄我取總欠一著在衢州石臼和尚南二馬祖一嗣參馬祖祖問什麼處來石曰烏臼來祖曰烏臼近日有何言句石曰幾人於此茫然祖曰茫然且致悄然一句作麼生石乃近前三步祖曰我有七棒寄打烏臼你還甘否石曰和尚先喫某甲後甘昭覺勤云草窠裏撥出一個半個有什麼共語處雖然如是猶放過一著在天井新云者兩個漢成則俱成敗則俱敗仔細看來總是乞兒索舊債白巖符云馬大師不肯據令而行祇緣利動君子豈當斷不斷反招其亂者可同日而語哉然則如今有恁麼衲子上門諸方必有長處始得不然總是套襲之流百靈和尚南二馬祖一嗣一日路次見龐居士乃問南嶽得力句曾舉向人也無士曰曾舉來靈曰舉向甚麼人士以手自指曰龐公靈曰直是妙德空生也讚歎不及士却問靈阿師得力句是誰得知靈戴笠子便行士曰善為道路靈更不回首徑山杲云者個話端若不是龐公幾乎錯舉似人雖然如是百靈輸他龐老一著何故當時若不得個破笠子遮却髑髏有甚面目見他龐公天寧琦云百靈戴笠便行得力句可謂分明舉似因甚麼妙喜老人道百靈有甚面目見他龐公也是扶強不扶弱有人與妙喜作主要問作麼生是得力句速道速道擬議不來劈脊便棒天童悟云百靈若非徑山直饒戴破笠子也無出頭分寶掌白云百靈龐公雖然各固封疆不知旁觀者醜今時都説百靈被龐公背地一推再也轉身不得據寶掌看來却是龐公末上被百靈一坐至今無處討個合殺具眼者辨看潭州龍山隱山禪師南二馬祖一嗣山居因洞山與密師伯從山下過見溪流菜葉洞曰深山無人因何有菜隨流莫有道人居否乃共撥草溪行五七里見隱羸形異貌因相與問訊隱曰此山無路闍黎從何處來洞曰無路且置山主從何而入隱曰我不從雲水來洞曰山主住此山多少時隱曰春秋不涉洞曰山主先住此山先住隱曰不知洞曰為甚麼不知隱曰我不從人天來洞曰山主得何道理便住此山隱曰我見兩個泥牛鬪入海直至如今絶消息洞山始具威儀作禮便問如何是主中賓隱曰青山覆白雲曰如何是主中主隱曰長年不出戶曰賓主相去幾何隱曰長江水上波曰賓主相見有何言説隱曰清風拂白月洞山辭退隱乃有三間茆屋從來住一道神光萬境間莫把是非來辨我浮生穿鑿不相干遂燒却菴更深入層峰焉天童覺云主也雲藏頂相賓也雪壓眉稜相去也門司有限言説也玉振金聲我此四句且道與隱山是同是別叢林具眼者試請辨看則川禪師南二馬祖一嗣因摘茶次龐居士問法界不容身師還見我否川曰不是老僧洎答公話士曰有問有答蓋是尋常川乃摘茶不聽士曰莫怪適來容易借問川亦不顧士喝曰者無禮儀老漢待我一一舉向明眼人川乃拋却茶籃便歸方丈雪竇顯云則川只解把定封疆不能同生同死當時好與捋下幞頭誰敢喚作龐居士昭覺勤云兩回不顧拋籃便歸且道旨歸何處還會麼苦瓠連根苦甜瓜徹蒂甜則川老漢經事多矣保寧茂云則川雖識陳勢不會降人善守則許智將未許若是當時提起茶籃便問者個是什麼人造底看龐公作何勾當古南門云奇怪龐公他雖是俗漢置個問端却解把定封疆則川乃來風深辨雖然可惜當時放過者老子待問法界不容身師還見我否便與把住云者藏頭露尾漢他若擬議拈茶籃便打不惟截斷此老葛藤亦見我方袍圓頂中人別有長處愚菴盂云則老把定牢關不通水泄可謂頭正尾正龐公向雪中覓粉墨上尋煤用盡自己心笑破他人口幸而免不為則老所逐鳳山啓云龐公衝鋒直入眼已無秦若非則川偃旗息鼓減竈藏鋒洎合打破蔡州城襄州龐蘊居士南二馬祖一嗣問馬祖不昧本來人請師高著眼祖直下覷公曰一種沒絃琴唯師彈得妙祖直上覷公乃作禮祖歸方丈公隨後入云適來弄巧成拙雲峰悅云且道是賓家弄巧成拙主家弄巧成拙還有人揀得出麼若揀得出三十棒一棒也較不得若揀不出明年更有新條在惱亂春風卒未休琅瑘覺云一夜作竊不覺天曉智海逸云二老漢一個開口了合不得一個合口了開不得更有一個未欲説破乃呵呵大笑歸方丈徑山杲云馬大師覷上覷下則不無怎奈昧却本來人居士雖然禮拜也是渾侖吞個棗馬師歸方丈士隨後入云適來弄巧成拙救得一半天寧琦云大師彈沒絃琴調高千古居士和無譜曲響徹九霄溪邊石女暗嗟吁海底泥牛亂奔走雖然如是也未契本來身在不見道蝦蟆口裏一粒椒雲居莊云我要問龐公喚什麼作本來人作麼生是沒絃琴拈拄杖云不是放過馬大師只是不欲説破卓拄杖一下萬峰藏云馬大師者回被俗子擒下也棲霞成云龐公若無後語幾被馬師瞞過則且置祇如龐公禮拜馬祖便歸方丈者裏還有人勘得破麼若勘得破許你具衲僧眼寶掌白云者兩個漢一等是向背地裏扶個黑漆桶扶來扶去不覺天曉白納得一場敗闕龐公曰護生須是殺殺盡始安居會得個中意鐵船水上浮昭覺勤云且道殺個什麼殺衆生物命凡夫見解殺六賊煩惱座主見解殺佛殺祖大闡提人見解衲僧分上畢竟殺個什麼徑山琰云只知開口易不覺舌頭長龐公辭藥山山命十禪客相送至門首公乃指空中雪曰好雪片片不落別處全禪客曰落在甚麼處公遂與一掌全曰居士也不得草草公曰恁麼稱禪客閻羅老子未放你在全曰居士作麼生公又與一掌曰眼見如盲口説如啞雪竇顯云好雪片片不落別處握雪團便打磬山修云我若作全禪客待道好雪片片不落別處便好云不落別處則且置你道在什麼處來他擬開口驀面便掌教者老漢別有生涯始得青龍斯云錦上鋪花人之常情雪中送炭從來罕見山僧要向冷竈裏著把火何則盡謂全禪客是個孟人郎不濟事被他龐居士折挫一上殊不知龐老兒被全禪客生生陷在雪坑裏至今出頭不得龐公一日菴中獨坐驀地曰難難難十石油麻樹上攤龐婆應聲曰易易易百草頭邊祖師意靈照女曰也不難也不易飢來喫飯困來睡徑山杲云者三個俗漢同行不同步同得不同失雖然笑殺旁觀大覺升云三個俗漢好各與三十拄杖何故者是什麼所在説難説易即今還有出得難易者麼設有也是臘月扇子理安洸云雖則家肥生孝子國霸産謀臣理安若見痛與三十何也免致分疆立界鳳山啓云風吹柳絮毛毬走雨打梨花白雪飛荷葉團團團似鏡菱角尖尖尖似錐若於此見得便捉敗他父子三人龐公有偈曰心如境亦如無實亦無虗有亦不管無亦不拘不是聖賢了事凡夫徑山杲云白的的清寥寥水不能濡火不能燒是個甚麼切不得問著問著瞎却你眼以拄杖擊香臺一下天寧琦云要作了事凡夫更須進前三步薦福如云楚石道要作了事凡夫更須進前三步且作麼生進五老雲九江水卷舒出沒太虗中究竟在吾皇化裏龐公頌曰十方同聚會個個學無為此是選佛場心空及第歸天童傑云十方同聚會鐵壁銀山個個學無為日月照臨此是選佛場龍蛇混雜心空及第歸凡聖同居驀拈拄杖橫按云龐居士在者裏坐地是汝諸人還見麼遂擲下云三生六十劫龐公賣笟籬一日下橋喫撲靈照見亦去爺邊倒公曰你作什麼照曰見爺倒地某甲特來相扶公曰賴是無人見國清英云龐公跌倒靈照扶起兩既不成一何有爾龐公曰男大不須婚女大不須嫁大家團圞頭共説無生話有老宿別云男大也須婚女大也須嫁討甚間工夫説甚無生話百丈源云者兩個漢雖則聲調不同要且舌頭皆一今日有一人男也婚女也嫁逢僧喜説無生話人間不問幾千秋但覺乾坤粟米大富與貴榮與華太虗空中之乎也者獨有當戶青山原是幅圖畫乃以拂空中畫一畫
