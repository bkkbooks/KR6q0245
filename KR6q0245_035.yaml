body:
  text: 古杭白巖嗣祖沙門淨符彚集青六韶州雲門文偃禪師青六雪峰存嗣到鵝湖聞上堂曰莫道未了底人長時浮逼逼地設使了得底明明得知有去處尚乃浮逼逼地門下問首座適來和尚意作麼生曰浮逼逼地門曰首座久在此住頭白齒黃作者個語話曰上座又作麼生門曰要道即道見即便見若不見莫亂道曰只如道浮逼逼地又作麼生門曰頭上著枷腳下著杻曰與麼則無佛法也門曰此是文殊普賢大人境界溈山哲云大凡撥草瞻風須是其人雲門可謂青天霹𮦷旱地震雷直得百里魂慮變懾不見道驚羣須是英靈漢敵勝還他獅子兒黃龍新云雲門以錐錐地首座以刀剜空直饒齊下錐刀未免頭上著枷腳下著杻寶掌白云雲門大似按劍鴻門氣衝牛斗其時雖有猛將如雲謀臣如雨也只得斂袵有分何故眼空宇宙誰當敵三尺龍泉照膽寒雲門因僧問如何是法身向上事門曰向上與汝道即不難作麼生會法身曰請和尚鑑門曰鑑即且置作麼生會法身曰與麼與麼門曰者個是長連牀上學得底我且問你法身還解喫飯麼僧無對雪竇顯云者僧將成九仞之山不進一簣之土過在什麼處積翠永云雲門直得入泥入水保福展代僧云缺他一粒也不得昭覺勤云雲門可謂驅耕夫之牛奪饑人之食權衡佛祖龜鑑宗乘所以後來尊宿各出眼目互相扶豎雖然如是只明得法身邊事未明得法身向上事且如何是法身向上事域中無背面閫外有威權南堂靜云者僧敢將游艇子撩撥洞庭湖殊不知雲門金鏃慣調曾百戰鐵鞭多力恨無讎若是大隨又且不然者僧也拈却雲門也架閣且作麼生會法身良久云任從滄海變終不為君通天童傑云雲門渾剛打就生鐵鑄成不動鉗鎚火星迸散永菴主冷處著把火義出豐年保福閙處愛入頭未免傍觀者哂天童據款結案也要諸方撿點若撿點得出生陷無間地獄南堂欲云若論戰也個個立在轉處者僧眨得眼來槍頭早在雲門手裏直得上天無路入地無門雪竇更要進土在還委悉麼箭穿紅日影須是射鵰人古南門云君子務本者僧喫飯不知下落便問法身向上事自非雲門明鑑秋毫焉到水窮山盡雪竇云將成九仞之山不進一簣之土只恐不是玉是玉也太奇清化嶾云韶陽如大冶紅爐慣煉精金者僧却將一錠汞銀不覺入爐便了要會法身向上事麼故國無消息家鄉絶往還雲門問新到汝是甚處人曰新羅門曰將什麼過海曰草賊大敗門引手曰為什麼在我手裏曰恰是門曰一任𨁝跳僧無對雪竇顯別雲門後語云噓噓又云雲門老漢龍頭蛇尾放過者僧為什麼在我手裏恰是劈脊便棒溈山云雲門雪竇只知步步登高大溈即不然為什麼在我手裏恰是便乃呵呵大笑不見道殺人刀活人劒南堂欲云者僧過得海來恰值落在雲門手裏雪竇推波助瀾可謂小出大遇白巖符云雪竇斬釘截鐵大溈放兩拋三雖然各出隻眼總不堪與雲門把手殊不知雲門老漢豁達大度雖百億須彌盧包納有餘又豈在乎一新生犢子為什麼在我手裏恰是如今不許蹈二老舊轍試別道看雲門上堂直得盡乾坤大地無纖毫過患猶是轉句不見一色始是半提更須知有全提底時節烏石道云雲門雷聲甚大雨點全無當時若有個漢待道更須知有全提底時節便與掀倒禪牀管取雲門一場敗缺雲門曰盡大地是個解脫門枉作佛法會却何不見山是山見水是水師林則云潦倒雲門前言不應後語如今盡大地人見山何曾喚作水見水何曾喚作山既不作佛法會又喚什麼作解脫門我眼本正因師故邪邪師過謬非衆生咎喝一喝雲門因僧問如何是西來意門曰長連牀上有粥有飯師林則云跛腳阿師只會現成受用不知稼穡艱難若問老僧却向他道元日人日未有不陰料想今年桃李貴不如井底種林檎雲門示衆拈拄杖曰凡夫實謂之有二乘析謂之無緣覺謂之幻有菩薩當體即空衲僧見拄杖但喚作拄杖行但行坐但坐總不得動著徑山杲云我不似雲門將虗空剜窟竉驀拈拄杖云拄杖子不屬有不屬無不屬幻不屬空卓一下云凡夫二乘緣覺菩薩盡向者裏各隨根性悉得受用唯於衲僧分上為害為冤要行不得行要坐不得坐進一步被拄杖子迷却路頭退一步被拄杖子穿却鼻孔只今莫有不甘的麼試出來與拄杖子相見如無來年更有新條在惱亂春風卒未休天寧琦云凡夫不合起有見二乘不合起無見緣覺不合起幻有見菩薩不合起當體即空見不可放過雲門老漢貪觀白浪失却手橈纍他天下衲僧總落拄杖圈繢放過不可好與一坑埋却愚菴盂拈拄杖云凡夫二乘緣覺菩薩總向者裏著倒直得行不得坐不得動不得靜不得擲下云如今拋向東洋大海裏免教向者枯木上生枝生葉雲門舉馬大師道一切語言是提婆宗以者個為主乃曰好語只是無人問我時有僧便問如何是提婆宗門曰西天九十六種你是最下種雪竇顯云赤幡被者僧奪了也白巖符云雪竇道赤幡被者僧奪了也噫也只見到者裏殊不知馬祖當時恁麼道早是義墮雲門問僧甚處來曰江西門曰江西一隊老漢寐語住也未僧無對法眼益云大小雲門被者僧勘破五雲逢云什麼處是勘破雲門處要會麼法眼亦被者僧勘破寶壽方云大小雲門只見他非要且不知己過無量現云我若作者僧當時見雲門恁麼道但禮拜了退白巖符云大小韶陽明於責人昧於責己大似個燈臺子相似惟者僧無語不虗曾見作家來雲門到灌溪有僧舉溪上堂語曰十方無壁落四面亦無門淨𧝹𧝹赤灑灑沒可把上座作麼生會門曰舉即易出也大難曰上座不肯和尚與麼道那門曰你適來恁麼舉那曰是門曰你驢年夢見灌溪曰某甲話在門曰十方無壁落四面亦無門你道大梵天王與帝釋天商量甚麼事曰豈干他事門喝曰逐隊喫飯漢天童忞曰大凡舉話須知話之起倒者僧既不是弄潮手空將鼻孔與人扭揑廣潤見處也要諸人共知拈拄杖云看看望海鑯動也𨁝跳上瑞雲峰頂壓著諸人頂門是你還解𢌞避也無良久云十方無壁落四面亦無門淨𧝹𧝹赤灑灑沒可把甚處去也抴拄杖一時打散雲門問直歲甚處去來曰刈茅來門曰刈得幾個祖師曰三百個門曰朝打三千暮打八百東家杓柄長西家杓柄短又作麼生直歲無語門便打溈山哲云直歲為衆竭力到雲門面前乃力盡神疲何故棋逢敵手難藏幸水到滄溟始識波徑山杲云直歲無語有三百個祖師證明雲門令雖行要且棒頭無眼溈山果云者僧若具眼見雲門恁麼道但云和尚休要把髻投衙擬議之間隨手便摵不惟慶快平生亦乃參學眼正天寧琦云大小雲門却被直歲勘破雲門示衆盡十方世界乾坤大地以拄杖畫一畫曰百雜碎雪竇顯云者漢是即是要且未有出身路如今拄杖在雪竇手裏復橫按云東西南北甚處得來古南門云雲門雪竇向萬仞崖頭垂手不妨各有出身之路雖然如是無風匝匝波資福侶云雲門雪竇一人舞百尺寒松一人坐千尋巨浪撿較將來忒煞驚羣動衆拈拄杖云者是凌霄峰得來底乃擲下雲門示衆三乘十二分教達磨西來放過即不可若不放過不消一喝雪竇顯舉畢隨後喝一喝云大衆好喝且道落在什麼處若要鼻孔遼天辨取者一喝開先金云辨即辨矣三乘十二分教著在什麼處直饒你知得著處分明三十棒一棒也少你不得何故不見道放過即不可雲門示衆直得觸目無滯達得名身句身一切法空山河大地是名身亦不可得喚作三昧性海俱備猶是無風匝匝之波直得忘知於覺覺即佛性喚作無事人更須知有向上一竅在天童覺云賓主不諳二俱有過各與二十棒祇如向上一竅又作麼生犀因玩月紋生角象被雷驚花入牙徑山杲云潑油救火渾間事雪上加霜愁殺人天童忞云山僧即不然收拾詩書歸舊隱鳥啼花笑一般春龍池微云雲門打葛藤不出知解若是向上一竅未夢見在且道如何是向上一竅遂震威一喝博山奉云向上一竅是什麼碗脫丘報恩琇云雲門慈悲之故而有落草之談大覺升云諸人要見雲門麼昔日曾擔睦州板一朝伸屈在靈樞所以病多諳藥性路遠說途艱若是俊鷹快總無恁麼事雲門因僧問秋初夏末前程若有人問作麼生祇對門曰大衆退後曰未審過在甚麼處門曰還我九十日飯錢來溈山哲云者僧貪程太速致使雲門隨索飯錢如今還有識雲門者麼出來與大溈相見良久云不是弄潮人休入洪波裏昭覺勤云者僧貪觀白浪雲門見機而作雖然斬釘截鐵未是本分草料有問崇寧只對道驢事未去馬事到來待伊如何若何劈脊便打護國元云老韶陽據虎頭收虎尾則不無斬釘截鐵猶缺一著或有問護國劈脊便打待伊道過在甚麼處向道我不似雲門索飯錢天童覺云大衆退後衲僧去就豈用機關那容體究蓑翁老熟慣波瀾橈棹不施船放流天童華云者僧有迎刃底謀略雲門具殺活底手段雖然如是應菴門下更須勘過了打天童傑云平如鏡面嶮似刀山者僧有破關底機謀雲門善用不戰屈人兵底手段雖然如是鼻孔在靈隱手裏天寧琦云放過即不可作麼生祇對但對他道七十二棒翻成一百五十過在甚麼處對他道你但喫棒我要者話行南㵎問云雲門可謂知機觀變善為切磋檢點將來亦是慈悲之故有落草之談諸人且如何委悉去路一身輕似葉高名千古重如山雲門示衆你若不相當且覓個入頭處微塵諸佛在你舌頭上三藏聖教在你腳跟底不如悟去好還有人悟得麼出來對衆道看雪竇顯云然則養子之緣怎奈壓良為賤其間或有不甘底出來掀倒禪牀豈不是大丈夫漢然雖如是且問據個甚麼道理乃驀拈拄杖云洎合停囚長智擊禪牀下座昭覺勤云崇寧今日土上加泥敢道直得溈山水牯牛觸殺東海鯉魚陝府鐵牛吞却嘉州大象雲門因僧問如何是透法身句門曰北斗裏藏身玉泉皓因張無盡舉傅大士與洞山二頌皓云此只頌得法身未頌得法身向上事盡云如何是法身向上事皓云昨夜雨雱烹打倒蒲萄棚知事普請行者人力拄的拄撐的撐撐撐拄拄到天明依舊可憐生徑山杲云雲門只答得法身句未答得透法身句今日有問徑山如何是透法身句向道蟭螟眼裏放夜市大蟲舌上打鞦韆天童悟云通玄又且不然有問如何是透法身句劈脊便棒縱使不會管教永劫不忘白巖符云韶陽老漢是透過法身那邊的人與麼答話笑殺皓布裩者裏有問如何是透法身句向道本鋪發賣南北川廣生熟藥材下顧者認招牌為記雲門因僧問如何是和尚家風門曰有讀書人來報徑山杲云讀書人既到者裏且如何與伊相見乃云不是冤家不聚頭天童悟云和尚家風雲門盡情說了相見之意大慧不妨道破祇如相見後又作麼生乃云君向瀟湘我向秦雲門因僧問如何是諸佛出身處門曰東山水上行昭覺勤云者裏則不然有問如何是諸佛出身處向道薰風自南來殿角生微凉高峰妙云二老雖具頂門正眼慤其本源天地懸隔徑山琇云東山昭覺恁麼提持鄭州出曹門妙喜悟去真州望長蘆徑山見處也要諸人共知諸佛出身處渾不用思惟早晨喫白粥如今肚又饑烏石道云雲門腳跟浮逼逼未嘗點地圓悟坐在家舍寸步不移檢點將來總未會諸佛出身處在若有問烏石如何是諸佛出身處但向道奇怪石頭形似虎火燒松樹勢如龍龍池傳云山僧則不然有問如何是諸佛出身處向道西河火裏坐雲門信云東山水上行則不難須彌安嘴上如何理會南㵎問云二老答處不是高峰大難委悉諸人切不得錯會有問理安如何是諸佛出身處但對道吾常於此切且道與古人是同是別愚菴盂云韶陽昭覺二大老可謂得之于心應之于手眉毛中挂五座須彌鼻孔裏藏四大海水要扶個諸佛出身處崖洲萬里靈隱禮云韶陽佛果二大老雖則陷虎却物正按旁提檢點將來於他諸佛出身處大似鄭州出曹門今日有問天寧如何是諸佛出身處但向道鶴唳蜀岡三尺雪烏棲古樹一枝雲洞山昱云提持向上玄關還他雲門老作家若是本分接人猶缺悟在設有問山僧如何是諸佛出身處向道三春已往孟夏漸熱且道與雲門是同是別雲門垂語古佛與露柱相交是第幾機乃自代云南山起雲北山下雨博山來云古佛在衆生肚裏結冬衆生在古佛肚裏度夏衆生不識古佛古佛不識衆生且道南山起雲北山下雨是甚麼節文拈拄杖云向下文長雲門因僧問不起一念還有過也無門曰須彌山圓通善云此公案或云才擬問早是過如須彌或云如須彌山八風吹不動千古鎮常安或云為人難透如須彌山與麼商量要且未夢見雲門在除是桶子底脫紅絲線斷方知總不恁麼不見道三句明一句一句明三句三一不相涉分明向上路天童傑云大小雲門話頭也不識徑山琇云者僧無量劫來著此貼肉汗衫若不遇雲門作家難為脫却雲門因僧問和尚壽年多少門曰七九六十八曰學人不會門曰不會為汝減却五年佛日晳云雲門大師一期演唱宗乘美則美矣未免玩人喪德山僧者裏則不然若有問和尚壽年多少但向道拄杖子同年倘更問拄杖子年多少便與劈脊一棒管取慶快平生雖然也是寒山道底雲門上堂聞聲悟道見色明心遂舉起手曰觀世音菩薩將錢買胡餅放下手曰元來祇是饅頭白雲端舉畢展兩手云有麼有麼又搖手云無也無也乃云曾經大海難為水除却巫山總是烟法雲秀拈拄杖卓一卓云者個是聲色那個是心良久云世間無限丹青手到此都盧𦘕不成黃龍清云雲門可謂食飽傷心諸人切忌向胡餅裏討汁五祖演云我即不然乃以手作打杖鼓勢云棚八攞扎南堂靜云老僧即不然張公喫酒李公醉李公喫酒張公醉張公李公酩酊醉鼻息如雷甕裏睡徑山杲拈拄杖云者個是色卓一卓云者個是聲諸人總見總聞那個是明底心那個是悟底道喝一喝云貪他一粒米失却半年糧復卓杖一下圓通善云韶陽老人可謂唱彌高和彌寡如今却向廷壽拂子頭上入方網三昧東方入定西方起乃至男身入定女身起還會麼野色更無山隔斷天光直與水相通天寧琦云汝等諸人不是不聞聲因什麼不悟道不是不見色因甚麼不明心雲門恁麼堤撕妙喜恁麼判斷一曲兩曲無人會雨過夜塘秋水深仰山欽云跛腳師撫憐赤子動則倒腹傾腸只是做造愴忙帶些粘牙綴齒欽上座則不然聞聲悟道見色明心卓拄杖云家家觀世音伏龍長云大小雲門只在聲色裏頭出頭沒者裏則不然拈拄杖卓一卓喝一喝雲居莊云我不似雲門認奴作郎指鹿為馬驀拈拄杖云看看拄杖子穿過諸人髑髏乃卓一卓博山來云聞聲悟道虗空敲不響又作麼生見色明心清風無形質又作麼生胡言漢語即不無觀世音菩薩入普門三昧雲門者漢向甚處摸索雪竇雲云韶陽與麼說話大似嚼飯餧嬰孩山僧則不然聞聲豈悟道見色不明心證取三摩提南無觀世音雲門問僧什麼處來曰禮塔來問曰謔我曰某甲實禮塔來門曰五戒也不持保福展云智不責愚汾陽昭云彼此相鈍置雲門因僧問如何是超佛越祖之談門曰胡餅徑山杲云雲門直是好一枚胡餅要且無超佛越祖底道理松隱然云妙喜一手擡一手搦未免話作兩橛既是好一枚胡餅又道無超佛越祖底道理諸禪德且道妙喜還有為人處也無參天寧琦云𡎺天寧傑云雲門信口垂慈不費心力天寧却不恁麼或有問如何是超佛越祖之談向道清晨喫白粥午後便不饑安國聰云妙喜只知其一不知其二殊不知臨濟玄要主賓洞山君臣偏正乃至百千法門無量妙義總不出者枚胡餅諸人還委悉麼苟或不然且向胡餅裏咬嚼雲門垂語人人盡有光明在看時不見暗昏昏作麼生是諸人光明自代曰廚庫山門又曰好事不如無愚菴盂云雲門代兩語一語水裏拈星一語山頭張網大唐國裏打鼓新羅國裏鳴鐘料掉沒交涉請歸堂喫茶靈巖儲卓拄杖云厨庫山門一擊洞開了也杓大碗小一任諸人檢點畢竟光明在什麼處不見道開口即錯擬心即乖雲門因僧問如何是道門曰透出一字徑山杲云透出一字却不相似急轉頭來張三李四天寧琦云天寧作麼生拈拄杖擊禪牀云洎合停囚長智雲門曰百草頭上道將一句來衆無語自代曰俱昭覺勤云劄復云直得萬機寢削千眼頓開細如須彌大如芥子軟如鐵硬如泥雖然如是只道得一半或有問山僧只對他道收且道落在什麼處徑山杲云普復云俱劄普日輪午李將軍射石虎雖然透過那邊枉發千鈞之弩天寧琦云雲門俱少實多虗圓悟劄了無交涉妙喜普直須薦取者三個漢各立生涯搖頭擺尾到處逢他深山藏猛虎淺草露羣蛇靈巖儲云圓悟老漢不識好惡錯下名言雲門當時恁麼答話惑亂人不少那堪土上加泥今日若有人問國清百草頭上道將一句來拽拄杖劈脊便打何故免教伊在百草頭上躲跟佛川宗云一把柳絲收不得和烟搭在玉欄杆雲門因僧問十二時中作麼生得不空過門曰你向甚麼處著此一問曰學人不會請和尚舉門曰舉不顧即差互擬思量何劫悟夾山豫云雲門恁麼為人正是前頭打得著後頭打不著若是山僧待道學人不會請和尚舉劈頭一棒向伊道逢人切莫錯舉雲門問僧看什麼經曰瑜伽論門曰義墮也曰甚麼處義墮門曰自領出去中峰本云雪上霜枷上杻覿面無私移星換斗要見者僧話墮處麼且待三十年後雲門示衆光不透脫有兩般病一切處不明面前有物是一透得一切法空隱隱地似有個物相似亦是光不透脫又法身亦有兩般病得到法身為法執不忘己見猶存坐在法身邊是一直饒透得法身去放過即不可子細檢點將來有甚麼氣息亦是病博山來云造精之極研極之疵非慧目莫能鑑若夫心知體合截流注之病根達本忘情鏡無己之景象除是向威音那畔分身十字街頭打睡底漢方可診候不然莫將日瘧誤作傷寒愚菴盂云世尊三昧迦葉不知迦葉三昧阿難不知阿難三昧商那和修不知佛祖三昧衆生不知衆生三昧山河大地不知燈籠三昧露柱不知打破情識窠臼掀翻從前鬼窟柏樹子開花虗空粉碎且道是三昧是病若檢點得出好參雲門禪若檢點不出不免髑髏前見鬼雲門因僧問弒父弒母佛前懺悔弒佛弒祖向什麼處懺悔門曰露育王雪云雲門具殺人不眨眼底手段被者僧輕輕一拶直得無言可對無理可伸雲門因講僧參經時乃曰未到雲門時恰似初生月及乎到後曲彎彎地門得知乃問是你恁麼道耶曰是門曰甚好吾問汝作麼生是初生月僧乃斫額作望月勢門曰你如此已後失却目在僧經旬日復來門又問你還會也未曰未會門曰你問我僧便問如何是初生月門曰曲彎彎地僧罔措後果失目琅瑘覺云你道佛法靈驗不靈驗如今有人問琅瑘如何是初生月向道經堂前打板聲白雲端云者僧失却目雲門和鼻孔不見雖然如是家住州西黃龍新云語驚時聽得無動機若謂者僧失雙目入地獄如箭射東禪觀云者僧雖失雙目光射九天雲門兩眼雖存前明後暗雲門上堂平地上死人無數過得荊棘林始是好手時有僧便出衆曰與麼則堂中第一座有長處也門曰蘇嚕蘇嚕溈山哲云若非雲門被者僧一問幾乎將南作北黃龍南拈起拂子云大衆若喚作拂子是平地上死人不喚作拂子未透荊棘林在五祖演云太平即不然平地上個個丈夫荊棘林裏坐得始是好手何故格泐潭清云只者拂子是荊棘林諸人作麼生過直饒過得也是猢猻繫露柱雲居莊云雲居則不然平地上活人無數入得荊棘林是好手或有出來說長說短拈拄杖便打何故水流溼火就燥禍福無門惟人自召笑巖寶云雲門被者僧一拶輒自先跳入荊棘林中坐地我則不然待道與麼則堂中第一座有長處也劈頭便打云汝為什麼又深入者一重
