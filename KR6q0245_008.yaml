body:
  text: 古杭白巖嗣祖沙門淨符彚集南一江西馬祖道一禪師南一南嶽讓嗣始匡徒日南嶽遣一僧來探伺上堂時乃出問曰作麼生祖曰自從胡亂後三十年不曾少鹽醬僧回舉似南嶽嶽然之徑山杲云雲門即不然夜夢不祥書門大吉天寧琦云馬大師道三十年不曾少鹽醬蚤是費却多少鹽醬了也我若作大師才見這僧出來便下禪牀擒住痛與一頓教他歸去舉似南嶽且顯師承有據自家眼目分明管取坐斷天下人舌頭又舉妙喜語畢云且道徑山與馬祖是同是別如何黑漆屏風上更寫盧同月蝕詩伏龍長云破驢脊上足蒼蠅壽昌經云馬祖恁麼道在老僧則不然自從胡亂後三十年不曾有鹽醬大衆且道與馬祖相去幾何大覺升云義出豐年還他馬祖然未免帶纍南嶽懸挂心頭馬祖因僧問離四句絶百非請師直指西來意祖曰我今日勞倦不能為汝説問取智藏去僧問藏藏曰何不問和尚僧曰和尚教來問藏曰我今日頭痛不能為汝説問取海兄去僧問海海曰我到這裏却不會僧乃舉似祖祖曰藏頭白海頭黑溈山哲云這僧與麼問馬師與麼答離四句絶百非智藏海兄都不知會麼不見道馬駒踏殺天下人五祖演云馬大師無著慙惶處只道得箇藏頭白海頭黑也是風后先生只知其一不知其二這僧擔一擔懵懂換得箇不安樂若也眼似流星多少人失錢遭罪高峯妙云馬師父子一門非特佛口蛇心亦善六韜三略這僧若無諸葛孔明之作管取喪身失命報恩秀云三箇老漢頭腦相似你若作離四句絶百非會好與這僧一坑埋却龍池傳云三大老被箇挑腳漢弄得家反宅亂至今父子不和還有解交者麼擲拄杖入方丈寶善真云慣作白拈獨羡馬師父子見賊捉賊可惜不遇作家雖然還有能識這僧者麼崆洞慈云大小馬祖一家性命總落在這僧手裏還有知這僧落處者麼焦山乘云今古白拈須讓這僧始得何也馬師一門有銅墻鐵壁之固却被他一朝劫盡金粟元云這僧致箇問頭機關太殺嶮峻自非馬師父子未免無出身之路雖然還覺髑髏著著中箭麼資福廣云咄這撞露柱瞎漢好與三十棒雖然馬師父子不得無過何故不見道發箭不中的信非好手靈巖儲云當大冶而不驚臨大亂而不怖非經天下之大經握乾坤之化育尚不能坐籌帷幄決勝千里又何敢望篤恭而天下平馬家父子如排百萬雄師大陳咳唾之下全軍就縛何術而致之哉伶俐衲僧試請定當白巖符云入水不動波入林不動草還他馬師父子技出一門然總未免被這僧在背地裏冷笑馬祖因僧於面前作四畫上一畫長下三畫短曰不得道一畫長三畫短離此四畫外請和尚答祖乃於地畫一畫曰不得道長短答汝了也南陽忠別云何不問取老僧溈山果云借婆衫子拜婆年高峰妙云字經三寫烏焉成馬西峰忍俊不禁特為諸人改正去也良久召侍者云分明記取鼓山賢云這僧立箇問頭也甚奇怪若是今時師家早是一棒打將去馬祖却不然就地一畫可謂投之木桃報以瓊瑤這僧小出大遇去也但祖云不得道長短答汝了也却似嚼飯餧嬰兒馬祖因龐公問不與萬法為侶者是什麼人祖曰待汝一口吸盡西江水即向汝道育王觀云馬大師只知開口易不覺舌頭長當時若問育王但向道直待虗空落地自然出他一頭何故車不橫推理無曲斷能仁鑑云馬大師與麼答話大似不知問頭來處致令龐公向死水裏浸殺大巖恁麼道且道意在於何不圖打草只要驚蛇石塔忍云龐家箇漢大似赤貧之士偶於十字街頭拾得一文金錢逢人便自誇富可見俗氣未除馬大師又如歷代簪纓孟浪公子揮金如土齒不關風隨口答將來總之老不戒性設有人問興國不與萬法為侶者是什麼人但向他道今日設齋檀越皆是山陰道上客只教他應接不暇為甚如此卓拄杖云傷心江上客不是故鄉人馬祖因百丈南泉西堂三人隨侍玩月次祖問正當與麼時如何堂曰正好供養丈曰正好修行泉拂袖便去祖曰經入藏禪歸海惟有普願獨超物外泐潭清云是則全是非則全非神鼎道只為老婆心切與麼説話大似金沙混雜玉石難分祇如馬師道經入藏禪歸海惟有普願獨超物外甚麼處是老婆心切處還辨得麼不省這箇意修行徒苦辛開福寧云馬大師等間舒卷妙手天然也是貪觀雲裏鴈失却渡頭船若人撿點得出披毛遊火聚戴角混塵泥其或見處朧為你下箇注腳經入藏禪歸海未是衲僧親到底拂袖前行歸去來擊碎重關門大啓還有見馬師者麼良久云休休長安夜夜家家月幾處笙歌幾處愁虎丘隆云馬駒踏殺天下人一摑直須一掌血無端為三大士各展家風不覺翻成老婆心切叢林浩浩商量總道玩月話奇特撿點將來克由叵耐何故三人證龜成鱉靈隱嶽於正好供養處云望梅林止渴正好修行處云金不博金拂袖便行處云只得一橛獨超物外處云唵摩尼達里吽𠷑吒復云這一夥落鼻孔漢總被穿却了也你諸人向什麼處出氣擊拂子下座烏石道云百丈西堂説到行不到南泉行到説不到總須喫棒有分雖然祇如馬祖道經入藏禪歸海惟有南泉獨超物外還有優劣也無以拂子打圓相云幸然明似鏡何用曲如鈎擊拂子下座黃檗琦云二三子嘲風弄月自減聲價實多馬老師亂搭印子塗污良人不少這裏有八十棒要打這四箇漢聊與明月清風增些光彩不致成羣作隊各説異端有箇漢出來道黃檗棒合誰喫也許他是箇具眼理安洸云供養修行欵出囚口拂袖便去乞兒伎倆還知馬師落處麼人莫知其子之惡莫知其苗之碩棲霞成云古者道一片月生海幾家人上樓馬師父子有之矣乃末上與麼道憐兒不覺醜何哉可惜者三個良家子弟活遭汙陷白巖符云這一隊漢幸是陶公後裔清白傳家無端為聖天子求賢貪他升合之祿喪名失節山僧要與馬祖二十拄杖為什麼聻太平無事不合塗污人家男女馬祖偕百丈行次見一羣野鴨飛過乃問是甚麼丈曰野鴨子祖曰甚處去也丈曰飛過去也祖遂把丈鼻扭丈負痛失聲祖曰又道飛過去也丈於言下有省中峰本云設錦穽以陷獸埀香餌以釣魚惟善作者能之馬師擬獲一禽深入荒草費盡腕力打破半邊鐵網豈善作者哉寶壽方云大小馬師可謂功不浪施然所獲亦莫過只是箇野鴨子若是箇衝天俊鶻馬師自己還得無事也未馬祖因僧問如何是佛祖曰即心是佛高峰妙云衆中商量皆謂心本是佛佛外無心故云即心是佛苦哉苦哉若作這般見解明朝後日喫鐵棒有分在既然如是合作麼生石壓笋斜出巖懸花倒生馬祖因僧問和尚為什麼説即心即佛祖曰為止小兒啼曰啼止後如何祖曰非心非佛曰除此二種人來如何指示祖曰向伊道不是物曰忽遇其中人來時如何祖曰且教伊體會大道黃檗琦云即心即佛頭上安頭非心非佛無繩自縛不是心不是佛不是物泥裏洗土塊山僧恁麼道意旨如何良久云土嚝人稀相逢者少馬祖因鄧隱峰辭祖問甚處去峰曰石頭去祖曰石頭路滑峰曰竿木隨身逢場作戲便去到石頭繞禪牀三匝振錫一聲問是何宗旨頭曰蒼天蒼天峰無語却回舉似馬祖祖曰汝更去待他有答汝便噓兩聲峰又去一依前問頭乃噓兩聲峰又無語歸舉似馬祖祖曰向汝道石頭路滑清化嶾云馬祖有決勝千里之謀隱峰有萬夫不當之勇惟石頭老漢坐觀成敗因甚如此曹溪波浪如相似無限平人被陸沉白巖符云污他清白門風教壞人家男女馬大師固已不能逃其責若夫石頭老漢斗筲器量一箇蠟鎗頭兩費旗鼓是又豈大人之識度歟馬祖因僧參乃畫一圓相曰入也打不入也打僧才入祖便打曰和尚打某甲不得祖靠却杖便休雪竇顯云二俱不了靠却拄杖擬議不來劈脊便棒雲居莊云大師令雖行爭奈無風起浪這僧棒既喫了要且有理難伸復云作麼生會他休去底道理寶壽新云放則兵隨將轉收則馬聽鑼聲既論立敵兩攻不無各有一能其運籌帷幄決勝千里獨許神駒何則祇圖國靖終不貴封侯馬祖因僧問如何是祖師西來意祖曰近前來向你道僧近前祖劈面便掌曰六耳不同謀黃龍南云在古人尚六耳不同謀那堪今日三二百衆浩浩地商量禍事禍事昭覺勤云南禪不妨因風吹火也未免隨語生解若有問道林如何是祖師西來意只對他道水長船高泥多佛大馬祖一日問百丈甚處來曰山後來祖曰逢著一人麼曰不逢著祖曰為甚麼不逢著曰若逢著即舉似和尚祖曰甚麼處得這消息來曰懷海罪過祖曰却是老僧罪過國清英云人既不見因甚各各擔一擔罪過獅峰遜云逢著不逢著則且置未審是什麼人若識得此人馬祖百丈與他挈草鞋有分馬祖不安院主問和尚近日尊候如何祖曰日面佛月面佛昭覺勤云此個公案若知落處便能獨步丹霄如或不知往往枯木巖前蹉路去也是他本分作家到者裏須有驅耕夫牛奪飢人食底手腳方始得見他馬大師為人處不然總沒交涉諸人到者裏且作麼生得平穩去祟慶古云當時院主可惜放過若不放過好與云情知和尚病在膏肓白巖符云天外遊絲空中鳥迹尚不可以摹擬況在茲以上者乎馬大師在枕席邊為院主一拶揭露些子直得夜光卞璧亦此擬不來怎奈院主徒有先鋒致成辜負若是個漢待云日面佛月面佛便好向道怪得醫人説和尚不解忌口當時院主下得者一語看馬祖者漢死即是活即是馬祖見南泉行食過乃問桶裏是什麼泉曰合取口天井新云馬祖問處南泉不知南泉答處馬祖不會若也會江西兒孫不致掃土南二洪州百丈懷海禪師南二馬祖一嗣因馬祖升座大衆才集丈遽出卷却席祖便下座丈隨至方丈祖曰我適來未曾説法汝因甚便卷却席丈曰昨日被和尚扭得鼻頭痛祖曰汝昨日向甚處留心丈曰鼻頭今日又不痛也祖曰汝深明昨日事雪竇顯云諸方皆謂奇特漝麼舉還當麼若當譬如水母以蝦為目若不當又空讚歎圖箇甚麼衆中有般漢亂踏向前問古人意旨如何更有老底不識好惡對道將謂仙陀客又道來日更到座前苦哉苦哉如此自稱宗師欲開人天眼目驢年去諸上座雪竇當時若見伊出來捲席劈胸一踏令坐者倒者俱起不得且要使後人別有生涯免見反相鈍置豈不是箇英靈底漢會也無歸堂白雲端出馬祖語云我鈍置猶可你鈍置太煞黃龍心云馬祖升座百丈卷席後人不善來風盡道不留朕迹殊不知桃花浪裏正好張帆七里灘頭更堪垂釣如今必有辨浮沉識深淺底漢試出來定當水脈看有麼有麼如無且將漁父笛間向海邊吹大溈智云曙色未分人盡望及乎天曉也尋常百丈上堂衆方集以拄杖一時打散復召曰大衆衆回首丈曰是什麼黃檗運上堂衆方集以拄杖一時打散復召云大衆衆回首檗云月似彎弓少雨多風雪竇顯云若是雪竇上堂衆方集以拄杖一時打散便休天童覺云下媒求鴿直鈎釣魚各有接物利生的手段若是牢籠不住呼喚不回底漢又作麼生以拄杖擊香臺一下龍泉濌云垂任公釣架由基箭也不過要見箇頭角又誰知林靜水寒杳無消息何似龍泉這裏廣大門庭一任他飢來喫飯倦來打眠何故白玉本無瑕雕文恐喪德百丈再參馬祖祖竪起拂子丈曰即此用離此用祖挂拂子舊處侍立少頃祖曰你已後開兩片皮將何為人丈却取拂子竪起祖曰即此用離此用丈亦挂拂子舊處祖震威一喝丈異日舉謂黃檗曰佛法不是小事我當時被馬大師一喝直得三日耳聾檗聞舉不覺吐舌汾陽昭云悟去便了説什麼三日耳聾石門聰云若不是三日耳聾爭承當得這一喝雪竇顯云奇怪諸禪德如今列其派者多究其源者少總道百丈於喝下大悟還端的也無然刁刀相似魚魯參差若是明眼漢瞞他一點不得只如馬師道汝已後開兩片皮將何為人百丈竪拂為復如蟲禦木為復啐同時諸人要會三日耳聾麼大冶精金應無變色東林總云當言不避截舌當爐不避火迸佛法豈可曲順人情東林今日向驪龍窟內爭珠去也百丈大智不無他三日耳聾汾州石門爭免箇二俱瞎漢只這三箇老漢還曾悟去也無良久云祖禰不了殃及兒孫雲蓋智云馬祖發大機顯大用獨百丈得其旨為什麼被馬祖一喝直得三日耳聾要會麼不入驚人浪難逢稱意魚黃龍新云黃龍路見不平要問雪竇既是大冶精金應無變色為甚麼三日耳聾要會麼從前汗馬無人識只要重論蓋代功昭覺勤云然則作家共相提唱不妨各有為人眼要且只明得馬祖百丈大機未明得他大用山僧不惜眉毛露箇消息也要諸方撿責還知這一喝麼直似奮雷霹𮦷聽者喪膽亡魂要會三日耳聾正如擊塗毒鼓聞者喪身失命竪拂子云或有箇問即此用離此用和聲便打隨後與一喝復云還見馬祖百丈麼徑山杲云百丈被喝直得三日耳聾黃檗聞舉不覺吐舌百丈疑其承嗣馬祖後因臨濟三度問佛法大意三度打六十棒便與三日耳聾出氣臨濟始覺如蒿枝拂相似敢問大衆既是師承有據因甚用處不同曹溪波浪如相似無限平人被陸沉浮山口云龍驤電卷虎嘯風生師資會遇不妨奇特雪竇云只如馬祖道你已後開兩片皮將何為人百丈竪起拂子為復如蟲禦木為復啐同時胡餅裏討甚麼汁大冶精金應無變色走作多少人還會麼劍斬甑人頭波斯腰不屈瑞巖慍云無辨龍蛇眼目難以荷負正宗無超佛祖機謀難以定論今古馬祖一喝何止百丈三日耳聾直得盡浮幢王剎海若聖若凡被他轟破耳門聽事不真喚鐘作甕與麼舉揚諸人還知落處麼良久云雲收雨霽長空濶一對鴛鴦畫不成古南門云若是明眼漢挂拂竪拂一喝耳聾總不必論祇這大冶精金也不消得何故曹溪波浪如相似無限平人被陸沉復云還見馬祖百丈麼愚菴盂云馬大師融冶乾坤指揮神䇿百丈握閫外威權黃檗便攙旗奪鼓所向無敵故知機用為列祖之神髓萬類之鉗錘汾州謂悟去便休説甚麼三日耳聾石門云若不三日耳聾爭得悟去恁麼批判古人還甘麼老僧不避𦎬羶試為斷看烽火漁陽樓上月曲中都是斷腸聲開先金云觀其所以師資契合如水投水因甚又於一喝之下始稱大悟開先不妨逐一指出百丈耳聾黃檗吐舌究竟將來二俱未瞥汾陽以訛傳訛石門將楔出楔惟有雪竇老師慣會證龜成鱉別別正法眼藏從此滅寶掌白云奔流度刃疾𦦨過風直下顯大機發大用還他馬師父子因甚一喝百丈直得三日耳聾要會麼金剛腦後抽生鐵華嶽三山倒卓空白巖符云黃金入火愈見其精神鋾鎔手段還他馬駒宜其踏殺天下若夫聾耳吐舌雖不愧為腳下兒孫然亦祇知順水撑篙不解逆風把柂百丈因雲巖問每日區區為阿誰丈曰有一人要巖曰因甚麼不教伊自作丈曰他無家活雲居莊云明眼人瞞他一點不得還會麼解弄不須霜刃劍延齡何必九還丹徑山琇云或謂百丈老人口吞佛祖眼蓋乾坤未免拖泥帶水殊不知曾為浪子偏憐客自愛貪杯惜醉人百丈因溈山五峰雲巖侍立次乃問溈併却咽喉脣吻作麼生道溈曰却請和尚道丈曰不辭與汝道恐已後喪我兒孫又問五峰峰曰和尚也須併却丈曰無人處斫額望汝又問雲巖巖曰和尚有也未丈曰喪我兒孫高峰妙云大小溈山推惡離己今日忽有人問西峰併却咽喉脣吻道將一句來即向道柴荒米貴忍飢無暇祇對愚菴盂云象王回顧挂角羚羊還他三老怎奈臨場試卷却忘了題目明明道併却咽喉脣吻亂開臭口作麼僧問和尚試道看余時以他事所移不及與對半辭乃一揖而別洞山瑩云三箇老漢恁麼酬對且道還有優劣也無若道有春色無高下若道無花枝有短長洞山亦道一句只是不許作道理會若作道理會喪我兒孫拈拄杖便歸方丈大慈言云當時百丈與麼問大似揚聲止響好與二十笤這三箇漢忒煞不唧𠺕且放過一邊傍有僧乃曰和尚也欠唧𠺕在山僧道我不如你白巖符云這一隊漢巍巍堂堂因甚却都來自語相違山僧見處也要諸人共知或有問併却咽喉脣吻作麼生道擲拄杖下座百丈因僧問如何是奇特事丈曰獨坐大雄峰僧禮拜丈便打天童華云大小百丈答話不了徑山及云百丈只好無佛處稱尊今日或有問新隆教如何是奇特事但對他道汝等皆當作佛他若禮拜更向道但辦肯心必不相賺百丈因黃檗問從上相承底事如何指示於人丈踞坐檗曰後代兒孫將何傳授丈曰將謂你是箇人便歸方丈雲峰悅云百丈老人大似憐兒不覺醜雖然如是盡法無民天童覺云言滿天下無口過行滿天下無怨惡還他百丈老漢黃檗不是不知有且要此話大行還會百丈歸方丈麼林間風葉落化外水天秋寶壽新云縱饒有收有放未免夷嶽盈壑由你一擡一捺難逃續𠒎截鶴畢竟作麼生即得聻也是掉棒打月百丈每上堂時有一老人隨衆聽法一日衆退惟老人不去丈問汝是何人老人曰某甲非人也於過去迦葉佛時曾住此山因學人問大修行人還落因果也無某對曰不落因果遂五百生墮野狐身今請和尚代一轉語貴脫野狐身丈曰汝問老人曰大修行人還落因果也無丈曰不昧因果老人於言下大悟作禮曰某已脫野狐身住在山後乞依亡僧津送丈乃領衆至後山巖下挑出死狐依法火葬百丈至晚上堂舉前因緣黃檗問古人錯對一語五百生墮野狐身轉轉不錯合作箇甚麼丈云近前來向汝道檗近前與丈一掌丈拍手笑云將謂鬍鬚赤更有赤鬚鬍法昌遇云敢問諸人不落因果為甚麼墮野狐不昧因果為甚麼脫野狐直饒道得落處分明也未出他野狐窠窟法昌當時若見但與他拈出雪峰古鏡教伊動轉不得然後放出紫胡狗子盡却性命免見兒孫今日成羣作隊雖然法昌與麼舉論大似持蠡酌海明眼人前一場笑具何故曾經大海難為水慣聽無弦不易琴黃龍新問元首座云百丈野狐話意作麼生元云甜瓜徹蒂甜苦瓠連根苦徑山杲云不落與不昧半明還半晦不昧與不落兩頭空索索五百生前箇野狐而今冷地謾追呼喝一喝云座中若有江南客何必樽前唱鷓鴣高峰妙云前不落後不昧還有得失也無若無因甚有墮有脫若有試出來分明道看有麼有麼總是一隊野狐精莫怪山僧壓良為賤獅林則云前不落後不昧引得野狐成羣作隊遂喝一喝云當時下得這一喝前後五百生一時粉碎天寧琦云古今盡向不落不昧上妄生卜度未有一箇出格帶纍百丈老人也在野狐隊裏天寧不是釘樁搖櫓膠柱調絃海枯終見底人死腳皮穿愚菴盂云宗師家拈提向上著著先有出身之路則不被目前所礙若儱侗將去何止不堪圓禪師問二僧舉此話一云不昧因果也未脫得野狐一云便是不落因果又何嘗墮野狐圓因有省圓公悟去則不無之二僧者披毛戴角有日在或曰謝師授記咄這野狐精又云不落因果兔子窠邊遭野火不昧因果粉蝶飛上梨花朵參洞山瑩云叢林盡道不落墮因果不昧脫因果山僧敢道饒你總不恁麼道亦未嘗脫得他野狐身在且道利害在什麼處貪觀天上月失却手中橈義山訥云義山更不學百丈就窠打劫待問大修行人還落因果也無便與震聲一喝當時若下得這一喝管免後代兒孫不作野狐見解資福廣云前百丈恁麼道咬人師子後百丈恁麼道獅子咬人辨山恁麼道諸人切忌鑽龜打瓦
