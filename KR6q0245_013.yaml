body:
  text: 古杭白巖嗣祖沙門淨符彚集青二澧州藥山惟儼禪師青二石頭遷嗣久不升座院主白曰大衆久思法誨請和尚説法山令打鐘衆集山升座良久便下座歸方丈院主隨後曰和尚適來許為大衆説法何得不垂一言山曰經有經師論有論師怎怪得老僧雪竇顯云可惜藥山老漢平地上喫撲盡大地人扶不起琅瑘覺云藥山下座不妨疑著及乎院主一拶失却一隻眼翠巖芝云藥山下座院主當初怪不為衆説法可謂誤他三軍薦福懷云藥山還見院主麼院主還見藥山麼三十年後遇著作家不得錯舉開福寧云藥山慎初護末佛眼難窺院主狹路相逢等間蹉過雪竇宗云威音劫外携手誰肯同歸十字街頭擲金幾多錯過敢問諸人且道藥山曾説不曾説若道曾説是謗藥山若道不曾説是孤負藥山且道畢竟為人在甚麼處良久云須知雲外千峰上別有靈松帶雨寒徑山杲於下座處著語云葛藤不少於怎怪得老僧處著語云笑殺人天童傑云翠巖只具一隻眼殊不知藥山歸方丈正是勞他三軍資福先云藥山竟歸方丈却似個好人只被他輕輕一揑便見忘前失後中峰本云藥山久不上堂與對衆不措一詞將謂將謂末後道個經有經師論有論師元來元來博山來云接物情捐淡泊為纍豫奪相感母怪其然又豈知希聽亂蛩音素質煩飾彩被院主拶著直得百雜碎古南門舉翠巖密菴語畢云二老雖則盡力扶持也只具一隻眼殊不知藥山院主一人運籌帷幄一人決勝千里雖然藥山但知與麼去不知與麼來若是山僧歸方丈見院主恁麼問但向道向下文長付在來日棲霞成云藥山好個曲調不妨音韻鏗鏘無端被院主一陳風吹直得宮商齊亂然雖如是猶勝人家間絃子清化嶾云奇怪藥山老漢慣拈無孔笛偏向劫初吹然則清音遍界怎奈知音者少龍華體云院主只管貪程不覺錯路藥山求人入草太殺泥水通身我若作藥山待問何得不垂一言但道將謂你是個人他若擬議連棒打出龍唐敷云藥山埀格外機放風前箭太煞倚富欺貧致使院主貪觀天上月失却掌中珠者裏則不然若是監寺為衆求誨山僧不妨聯珠綴玉織綿回文隨機露布直令各各當下知歸免使監院隨後伸問且道所説底是什麼法良久云夜寒久立伏惟珍重西山音云藥山密度金針院主暗穿玉線雖謂錦縫重重撿點將來羅紋結角處未免特殺破綻蓮柎䇿云往往道藥山忘前失後未免屈他古人殊不知藥山正如神龍護尾師子迷蹤非但當時折倒院主亦乃換却古今多少人眼白巖符云藥山向劫初已前撒下縵天網子擬圖負嶽金鯤少酬宿志乃撞入個三腳蝦蟇解得網來有悶只在肚裏撿點將來總之侍者不得力侍者若得力當時待院主擬伸啓請直好把院主喝出藥山豈不頭正尾正藥山因僧問學人有疑請師決疑山曰待上堂時來與闍黎決至晚上堂衆集山曰今日要決疑上座在甚麼處僧出衆而立山下禪牀把住曰大衆者僧有疑便與一推却歸方丈報慈遂徵云且道與伊決疑不決疑若道決疑且甚處是決疑處若道不與他決疑怎奈臨晚上堂何翠巖芝云藥山與麼決疑土上更加泥雖然如是者僧也不得孤負藥山雲居元云大小藥山被者僧勘破愚菴盂云是醍醐是毒藥殺人劒活人刀白巖符云以三萬斛香餌沉之巨浸則所圖者不在魴鯉藥山老漢為一田蛙井鮒乃費力如此豈善作者歟藥山因遵布衲浴佛次山曰者個從汝浴還浴得那個麼遵曰把將那個來山乃休去長慶稜云邪法難扶報慈遂徵云且道長慶恁麼道在賓在主衆中喚作浴佛語亦曰兼帶語且道盡善不盡善黃龍南云此二尊宿一出一入未見輸贏三十年後不得錯舉昭覺勤云藥山問處暗隔重關遵老答來一槌兩當不可只守者一路有問崇寧只浴得者個還浴得那個麼拈起杓子向伊道何似生天寶樞云老僧當時若見藥山恁麼道便舀杓水驀頭澆教伊氷消瓦解磬山修云藥山旁通線路俯誘初機布衲當仁不讓一拶便了我若作藥山待伊道把將那個來奪杓子驀頭與他一杓何故定水湛然滿浴此無垢人愚菴盂云好個休去藥山豈不能似今時粗浮暗短之流宗旨不合問個把將那個來便打便喝掀翻浴盆亂做一上好不知羞我道藥山若不休去提將來撇向東洋大海裏絶教他浴個像心像意待彌勒下生我還要問他把將那個來棲霞成云且道藥山還知有那個麼若知有為什麼被布衲一拶便休去者裏還有人著得一隻眼麼白巖符云我若作布衲者個從汝浴還浴得那個麼便與擲却杓子傾却香湯雖然藥山休去又作麼生藥山因僧問平田淺草麈鹿成羣如何射得麈中麈山曰看箭僧放身便倒山喚侍者拖出者死漢僧便走山曰弄泥團漢有什麼限雪竇顯云者僧三步雖活五步須死雲居元云藥山千鈞之弩不謂鼷鼠發機者僧帶箭出門一死更不再活淨慈昌云者僧趁得猢猻入他閙市藥山騎箇猛虎直上高山若作一處商量終是遭人撿點愚菴盂云者僧置個問頭也不易得及乎發箭原來是個死鹿或幸而他處飲甘露而再生不失其為威音王始祖乃望空作彎弓勢云看箭古南門云者僧草裏藏身立個問頭始終能荷藥山一箭中的怎奈射者僧不死棲霞成云超羣須是英靈漢敵勝還他獅子兒者僧盡力飛騰出不得藥山跨下豈獅子兒英靈漢哉藥山道拖出者死漢者裏別作個甚麼語始得不愧其為超羣敵勝試道看白巖符云者僧雖通身鎧仗進退有由怎奈藥山老將勇於窮討力追那裏有你軃跟處侍者拖出者死漢便起身撫掌呵呵大笑云者老漢今日勘破了也者僧若能如此藥山到者裏也只得納欵有分藥山謂雲巖曰與我喚沙彌來巖曰和尚喚他作什麼山曰我有個折腳鐺子要伊提上挈下巖曰與麼則與和尚出一隻手去也山便休溈山云藥山老漢若不得雲巖折腳鐺子幾成廢器大溈折腳鐺子也要諸人共出一隻手何故且圖古風不墜天童華云藥山道頭雲巖知尾雖然頭尾相稱要且不識羞耻天寧琦云見與師齊減師半德見過於師方堪傳授雲巖當時也欠一著待道我有個折腳鐺子要伊提上挈下抽身便出雪後始知松柏操事難方見丈夫心能仁鑑云盡謂藥山父子點頭知尾撿點將來總是泥裏洗土塊有甚麼交涉白巖符云事君者盡其忠雖死不易此為臣之常理若夫致君於堯舜之上者則又有説焉不學雲巖與麼道試別展一途看廣胤標云非千金之子不能運千金之資藥山也是年老心孤若非雲巖知他心腹幾成不順之恩撫掌云三年無改於父之道可謂孝矣藥山問僧甚麼處來曰湖南來山曰洞庭湖水滿也未曰未山曰許多時雨水為甚麼未滿僧無語雲巖晟代僧云湛湛地道吾智別云滿也洞山價云什麼劫中曾增減來雲門偃云只在者裏藥山看經次朗州刺史李翱到山默然殊不顧視翱乃曰見面不如聞名拂袖便出山召李翱翱回首山曰刺史何得貴耳賤目翱回拱謝且問曰如何是道山以手指上復指下曰會麼翱曰不會山曰雲在青天水在瓶翱欣然作禮乃述偈呈之曰煉得身形似鶴形千株松下兩函經我來問道無餘話雲在青天水在瓶松隱然云我者裏則不然今日若問龍峰如何是道但云國正天心順官清民自安且道與藥山還有優劣也無靠拄杖下座藥山一日趺坐次石頭見乃問汝在者裏作什麼山曰一物不為頭曰恁麼則間坐也山曰間坐則為也頭曰汝道不為不為個甚麼山曰千聖亦不識白巖符云大小藥山不居圜圚不住寒巖一段穩密田地雖大悲千眼覷見無由乃為石頭老漢等間一拶直是如珠囊結解穩密云乎哉藥山看經次僧問和尚尋常不許人看經為什麼却自看山曰我祇圖遮眼僧曰某甲學和尚得麼山曰你若看牛皮也須穿長慶稜云眼有何過報慈遂云且道長慶會藥山意不會藥山意雪竇宗云真心不動教海澄明得用如如義天炳煥正恁麼時且道是經是眼若向者裏見得徹更不用循行數墨逐妄迷真其或未然牛皮穿透猶自可髑髏遍野幾人知藥山晚參不點燈乃埀語曰我有一句子待特牛生兒即向汝道時有僧出曰特牛生兒也祇是和尚不道山喚侍者將燈來僧便抽身入衆洞山價因雲巖舉乃云者僧却會只是不肯禮拜清涼欽云當時不要索燈但問他道生底是特牛兒牸牛兒又代云雙生也投子青云且道甚處是者僧會處若道得堪與者僧雪屈道不得却被藥山瞞浮山遠云我有一句子待無舌人問即道昭覺勤云藥山垂釣意在鯤鯨者僧吞鈎三千浪激洞山正眼千里同風法燈重整旗鎗再裝甲胄雖然如是山僧即不然我有一句子威音王已前與諸人道了也或有問明頭合暗頭合只對他道龍得水時添意氣虎逢山勢長威獰黃龍震云會麼如人暗中書字字雖不成文彩已彰文彩既彰點燈為甚不見不見道賊是小人智過君子雲居莊云大小藥山龍頭蛇尾者僧只知捉月不覺水深大衆特牛生兒也山僧向汝道問將一句來洞山瑩云藥山要此話行拗直作曲者僧看孔著楔快便難逢仔細看來大家不了洞山亦有一句子待露柱生兒即向你道或有僧出云露柱生兒也祗是和尚不道但向道我也情知你在鬼窟裏作活計天井新云藥山機上生機者僧巧上生巧洞山陳後開旗還未輸他一半若非法燈怎見汗馬功高畢竟如何若不同牀睡焉知被底穿一指孚云藥山與者僧既有諸方老宿批判分明且置而勿論我要問諸昆仲畢竟喚甚麼作一句子不許依模拉樣別道看速道速道藥山因化主到甘贄行者家甘問甚處來主曰藥山來甘曰還將得藥來麼主曰行者有甚麼病甘遂捨銀兩錠主得銀便歸納疏山問子歸何速主舉前話山曰子著賊了也速送還伊主乃送還甘曰原來山頭有人遂益金施之同安顯云早知行者與麼問終不道藥山來雪峰空云藥山老漢亦自膽小若是雪峰即便收下何故且教甘贄者漢疑三十年寶壽方云藥山雖辨來風怎奈行者肘後有符不惟者僧著賊藥山著賊猶甚若是山僧當時待化主舉話了便命知事收入庫司上簿某日收甘贄行者買藥銀二錠看他行者性命落在山僧手裏天童忞云甘贄將蝦釣鱉化主貪餌忘鈎藥山亡羊而後補牢得失未免相半同安云早知行者恁麼問終不道藥山來雖有入地之謀且無衝天之計廣潤若作供養主當時一喝便行管取行者疑著半生菩提密云貪他一粒米失却半年糧化主立地死去至今活不得若是山僧待問還帶得藥來麼但向道是何心行行者若出銀兩錠好道貧道從來不經手居士須自送去始得惜乎者僧眉眼不𥋇纍他二老藥山雖是賊識賊但不合放過者僧致令走使不已玷辱家聲崆洞慈云大小藥山太殺拖泥帶水當時待渠納疏舉話便好與本分草料不惟使者僧向後別有生涯亦且令甘贄行者疑殺有分龍唐柱云我若作化主待他施銀兩錠復伸手曰行者還要再服兩三劑始得管取傾囊以施命根依舊在我手裏白巖符云甘贄道原來山頭有人遂益金施之藥山老漢在者裏十分喫虧古今諸老更無有一個知利害者我若作藥山見化主舉甘贄恁麼話了直把化主打三十痛棒擯出山門鄧州丹霞天然禪師青二石頭遷嗣因過慧林寺值凝寒乃取木佛燒火向院主呵曰何得燒我木佛霞以杖撥灰曰吾燒取舍利院曰木佛何有舍利霞曰既無舍利更請兩尊來燒院主自後眉鬚墮落投子青云不會作客勞煩主人大寧寬因僧問丹霞燒木佛為甚麼院主眉鬚墮落寬云賊不打貧家兒保寧勇云院主眉鬚墮落即且置丹霞眉毛還在也無若也見得與古佛同參若也不見切忌撥無因果寶峰文云丹霞燒木佛院主眉鬚落驀拈拄杖云不是木佛擲杖云誰敢燒你擬即眉鬚墮落不擬又且如何高聲云行者拈起拄杖天童華云諸方商量道院主忽起疑心以致斯禍殊不知院主買鐵得金一場富貴雲峰因僧問丹霞燒木佛為甚院主眉鬚墮落峰云一人傳虗萬人傳實僧云與麼則不落也峰云兩重公案僧云學人未曉特申請益峰云筠袁虔吉頭上插筆靈隱嶽云大小丹霞向深村裏失却一隻眼院主也是如蟲禦木偶爾成文高峰妙云丹霞燒木佛為寒所逼豈有他哉院主眉鬚墮落偶爾成文何足疑矣若作佛法商量管取入地獄如箭射福嚴容云丹霞通身是個大火聚不惟呵他眉鬚墮落設使讚他亦當眉鬚墮落為什麼聻丈夫造就不落凡調天童忞云丹霞燒木佛向火犀因玩月紋生角院主眉鬚墮落象被雷驚花入牙驀拈拄杖畫一畫云不得動著動著三十棒黃檗琦云丹霞迸出星火非但帶纍院主直得盡大地人眉鬚墮落何故寒則普天寒熱則普天熱神鼎澤云人人盡道院主落却眉鬚殊不知丹霞打失鼻孔喝者裏動著一莖毛雖是善因還招惡果金粟元云丹霞燒木佛無端無端院主墮鬚眉生受生受雖然彼此分明未免使人胡猜亂卜拈拄杖云木佛在者裏卓一卓云燒却了也乃擲下云大家照顧眉毛好南山寶云丹霞燒木佛為甚麼院主眉鬚墮落若人撿點得出禍不入慎家之門演教泐云丹霞移花兼蝶至院主買石得雲饒雖然如是不因紫陌花開早怎得黃鸝下柳梢丹霞一日訪龐居士門逢女子靈照洗菜次霞問居士在否照放下菜籃斂手而立霞再問居士在否照提籃便行霞遂回須臾居士外歸照乃舉似前話士曰丹霞在麼照曰去也士曰赤土塗牛奶溈山云大小丹霞被女子勘破山僧若作丹霞待他提籃便行但與呵呵大笑他若問長老笑個甚麼却向道不是冤家不聚頭昭覺勤云丹霞從苗辨地靈照因語識人放下菜籃當處發生提起菜籃隨處滅盡居士云赤土塗牛奶屋裏販揚州且道畢竟如何各自散去免增話會灜山誾云龐公若無後語幾乎被靈照喪却家風只如道赤土塗牛奶意作麼生不令蜂蝶誤錯認隔墻花天界盛云灜山蹉過古人龐公雖是沒牙大蟲其爪甚利靈照如鸞鳳沖霄隱顯莫測故於丹霞處明露秋光於龐公處暗藏春色愚菴盂云維摩會上散花天女與舍利弗用盡神力顯個不思議解脫法門不如靈照一個菜籃十八代先靈同受供養丹霞只見菜籃惜乎不見居士靈照若不是箇菜籃何處覓他父親居士曰赤土塗牛奶非此一論白巖符云只者女子也有權有實有照有用固不愧為龐家男女然祇顧向外禦敵又豈知自家屋裏失却了八鈷金叉當時問丹霞在麼何不向道靈照今日罪過乃云去也蒼天蒼天者裏若便放過那裏見甚龐公雖然也只是就地彈死丹霞問僧甚麼處宿曰山下宿霞曰甚麼處喫飯曰山下喫飯霞曰將飯與闍黎喫的人還具眼也無僧無對長慶稜問保福云將飯與人喫報恩有分為甚不具眼福云施者受者二俱瞎漢慶云盡其機來還成瞎否福云道某甲瞎得麼報慈遂徵云且道長慶明丹霞意為復自用家財芭蕉徹云各具一得一失又代僧云爭不足讓有餘又代霞云施受俱無利益汾陽昭代僧云若不上山怎識和尚保寧永代僧云今日被和尚勘破天童華云丹霞既已龍頭蛇尾長慶保福只得將錯就錯雖然二三老宿要且不知者僧落處具擇法眼者試請辨看龍池傳代僧撫掌呵呵大笑云勘破了也龍池微云丹霞幸是問著者僧若問著個作家管取頭破腦裂長慶保福雖善酬唱也是盲人摸象難為旁觀諸禪德龍池恁麼批判且道意在於何試定當看大覺升云丹霞長慶保福總須喫棒獨許者僧出一頭地何故不見道端坐受供養施主常安樂平田本代僧云與和尚一般待丹霞眼目定動便與掀倒禪牀丹霞因去馬祖處路逢一老人與一童子霞問公住何處老人曰上是天下是地霞曰忽遇天崩地陷又作麼生老人曰蒼天蒼天童子噓一聲霞曰非父不生其子老人與童子便入山去正覺顯云上天下地不妨聰明蒼天蒼天隨語生解是父是子褒貶分明噓一聲却較些子天目律云丹霞者漢向老人手裏納敗闕末後雖解道非父不生其子也是破皮鞋硬爭當時見道上是天下是地何不向道者野狐精原來只在者裏老人童子雖有裂土分茆之作也只得拱手歸降丹霞問龐公昨日相見何似今日公曰如法舉昨日事來作個宗眼霞曰祇如宗眼還著得龐公麼公曰我在你眼裏霞曰某甲眼窄何處安身公曰是眼何窄是身何安霞休去公曰更道取一句便得此話圓霞亦不對公曰就中者一句無人道得昭覺勤云是眼何窄是身何安昨日今日事無兩般淮南兩浙秋熱春寒恁麼會得也太無端三十年後莫受人瞞保寧茂云機不離位墮在毒海丹霞休去可謂力敵勢均惜乎不能圓却此話大似弓折箭盡者裏則不然昨日事拈向一邊今日事不用舉著明日事還有人道得麼若也道得宗通眼活著得千百個龐公若道不得莫道丹霞眼窄無處安身直饒通身是眼八面四方未免一時穿却
