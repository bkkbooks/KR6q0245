body:
  text: 古杭白巖嗣祖沙門淨符彚集青二荊州天皇道悟禪師青二石頭遷嗣因龍潭信問某甲自到來不蒙指示心要皇曰自汝到來吾時中未嘗不指示汝心要信曰甚麼處是指示某甲心要處皇曰汝擎茶來吾為汝接汝行食來吾為汝受汝和南時吾便低首何處不是指示汝心要處信有省笑巖寶云龍潭漝麼問天皇恁麼答若實會得凡聖祇有虗名迷悟皆為剩語若不會不可瞎驢趁大隊南山寶云大小天皇尋常斬丁截鐵被個漢一拶便乃平高就下若論心要猶隔津在天皇參石頭問離却定慧以何法示人頭曰我者裏無奴婢離個什麼皇曰如何明得頭曰汝還撮得虗空麼皇曰恁麼則不從今日去也頭曰未審汝早晚從那邊來皇曰道悟不是那邊人頭曰我早知汝來處也皇曰師何以贓誣於人頭曰汝身現在皇曰雖然如是畢竟如何示於後人頭曰汝道誰是後人皇從此頓悟徑山杲云且道悟得個甚麼明因懷云我若作石頭當時待道恁麼則不從今日去也便與劈頭一棒免得從那邊者邊前人後人處繞葛藤不了潭州長髭曠禪師青二石頭遷嗣參石頭頭問什麼處來髭曰嶺南來頭曰大庾嶺頭一鋪功德成就也未髭曰成就久矣祗欠點眼頭曰莫要點眼麼髭曰便請頭乃垂下一足髭便作禮頭曰你見個什麼道理便禮拜髭曰據某甲所見如紅爐上一點雪報慈遂徵云且道長髭恁麼祇對具眼不具眼若具眼為甚麼請他點眼若不具眼又道成就久矣且作麼生商量法燈欽代云和尚可謂眼昏雪竇顯云無眼功德有什麼點處雲居元云可惜勞而無功徑山杲云衆中商量甚多或云無眼功德有甚點處或云莫要點眼麼待他道便請好劈脊便打若恁麼未免穢汙者鋪功德雲門即不然待者老漢垂下一足但道起動和尚天寧琦云長髭親從大庾嶺來平白被石頭熱瞞一上見個什麼便問一鋪功德成就也未虗空裏釘橛又有長髭把不定便道成就久矣只欠點眼一盲引衆盲石頭垂下一足還當得點眼也無一個既不惺惺兩個更是懡㦬如紅爐上一點雪果然諸人切忌接響承虗脫空妄語開先金云好一鋪功德因甚只點得一隻眼開先即不然一鋪功德既已成就可中有個漢出來道請師點眼山僧但與劈脊打出且道與石頭垂足相去多少古南門云將謂無人證明雖然長髭也不得辜負石頭何故要行山下路且問過來人龍華體云石蘊玉而生輝蚌含珠而自媚長髭者鋪功德未到石頭不妨疑著及到石頭失却一隻眼且道那裏是他失却一隻眼處試辨看安國聰云長髭好不丈夫可惜一鋪功德被人玷汙了也當時待垂一足便與掀倒禪牀不為分外雪竇正徵云甚處是石頭點眼處雪竇恁麼道是肯伊是不肯伊長髭問僧甚處來曰九華控石菴髭曰菴主是什麼人曰馬祖下尊宿髭曰名什麼曰不委他法號髭曰他不委你不委曰尊宿眼在甚處髭曰若是菴主親來今日也須喫棒曰賴遇和尚放過某甲髭曰百年後討個師僧也難得雪竇顯云是則二俱作家要且只解收虎尾不解據虎頭若使德山令行並須瓦解資福廣云熱𦦨川流洪浪雲湧者僧能聿身徑過固是難得惜乎末後被人陰蛀全然不知何也信所謂祇能慎初不善護末資福今日為伊護末貴圖與古人相見待道百年後討個師僧也難得則向道是何言歟管教長髭開粥度夏雪竇正云作者相見照用同時行説俱到就中覓纖毫過患了不可得明覺則欲決黃河之濤控華山之石明眼看來直是冬行春令潭州大川禪師青二石頭遷嗣因江陵僧來參川問幾時發足江陵僧提起坐具川曰謝子遠來下去僧繞禪牀一匝便出川曰若不恁麼爭知眼目端的僧撫掌曰苦殺人洎合錯判諸方川曰甚得禪宗道理丹霞然云於大川法道即得我者裏即不然僧便問未審此間作麼生霞曰猶較大川三步在僧禮拜霞曰錯判諸方者多洞山價云若不是丹霞難分玉石天童悟云洞山老漢失却一隻眼須知者僧禮拜不是好心只是後來少一轉語前話不圓所以遭人檢點當時待丹霞曰錯判諸方者多但撫掌笑云者老漢大似不打自招如此則任是老丹霞也未免疑著普廕云洞山只解扶強不解扶弱丹霞好則好矣只是要便宜二俱不了遂以右手拍禪牀云過者邊著還知大川者僧二人落處麼一堂風冷淡千古意分明潮州靈山大顛寶通禪師青二石頭遷嗣因韓文公過訪問和尚春秋多少顛提起數珠曰會麼公曰不會顛曰晝夜一百八公不曉遂回次日再來至山門前見首座便舉前話問意旨如何座扣齒三下及見顛理前問顛亦扣齒三下公曰原來佛法無兩般顛曰何以見得公曰適來問首座亦如是顛乃召首座問是汝如此對否座曰是顛便打趁出院保福展云首座知前不知後大顛令不單行灜山誾云首座眼親顛師手快俱未免被文公勘破雖然還知大顛打首座意麼翻雲全在我覆雨更由誰寶壽方因僧問首座扣齒大顛亦扣齒不妨空合空水合水為甚麼却行擯斥方云明修棧道暗度陳倉僧云祇如首座又作麼生方云但得成人美何辭釁一身天界盛云既首座扣齒在前大顛扣齒在後如何大顛反逐首座若向者裏見古人能赤手殺人活人始堪續佛慧命不然總是虗生浪死有甚麼受用會麼龍生金鳳子沖破碧琉璃百丈泐云賽翁失馬已經得失相參假途伐虢未免因行掉臂目機銖兩舉一明三網疏豈漏巨鯤擊析偏嚴暴客扣齒出院條罪俱陳心不負人面無慙色神鼎澤云殺人須見血為人須為徹則不無大顛檢點將來合喫山僧手中棒何故聻不見道殺人須見血為人須為徹青龍斯云諸方或曰首座不合答是是乃十成死語逐塊語所以擯出或曰首座亦是作家大顛令不單行要借首座鼻孔出氣似恁般見解何異羣盲摸象有甚諦當處大衆既都不是畢竟誵訛在甚麼處卓拄杖云不因盡法無民怎得山河一統天寶真云首座扣齒互唱玄猷祇應贊嘆有分為什麼却遭擯出還知大顛落處麼打草祇要驚蛇龍華體云一條拄杖兩人羿雖然當時韓公若是個漢連大顛也須出院鳳山啓云掀翻海嶽別轉乾坤須是大顛老手若非首座孤掌難鳴何故不因漁父引怎得見波濤大顛因韓文公請曰弟子軍中事繁佛法省要處乞師一語顛良久公罔措時三平為侍者乃敲禪牀三下顛曰作麼平曰先以定動後以智拔公有省乃曰和尚門風高峻弟子於侍者邊得個入處光相得云三平雖善正打旁敲未免傷鋒犯手文公入處即不無佛法省要處未夢見在何故不合將砂盆底當作古鏡若夫大顛良久無孔鐵錘不吝面擲固為衲僧用處然檢點將來太殺費鹽費醬古塘云大顛默然賊身已露侍者敲牀轉見不堪文公雖然悟去也是杓卜聽虗聲白巖符云大顛良久已涉繁詞那堪侍者勞叨致使大儒浪經跋涉省要云乎哉當時直把侍者打了擯出也未救得一半澧州大同濟禪師青二石頭遷嗣因米胡領衆到才欲相見同便拽轉禪牀面壁而坐米於背後立少時却回客位同曰是即是若不驗過已後遭人貶剝乃令侍者請米至米才上却拽轉便坐同乃繞禪牀一匝便歸方丈米却拽倒禪牀領衆便去廣胤標云反古者不可非循禮者何足多此二老一期相見直是眼便手親光前耀後然仔細看來翻成特地何也誰謂含愁獨不見更教明月照流黃白巖符云偷天之作入地之謀在二老互擅其長主賓相見固足觀瞻若論古佛家風且各與他三尺覆面布子南三潭州溈山靈祐禪師南三百丈海嗣一日見劉鐵磨來山曰老牸牛汝來也磨曰來日臺山大會齋和尚還去麼山乃放身作臥勢磨便出去淨慈一云溈山老漢平生一條脊梁拗不曲被劉鐵磨一推推倒直至如今起不得若要扶起溈山請各下一轉語衆無語師以拄杖一時趁散中峰本云溈山被鐵磨一拶拶倒要起起不得鐵磨被溈山一推推轉要住住不得本上座與麼批判多少人在背後咬斷拇指博山來云案山起雲主山下雨杓卜聽虗聲熟睡饒譫語只饒弓折箭盡未是作家要得同氣相求同聲相應看者一隊水牯牛復笑云鼻頭總在博山手裏愚菴盂云溈山被鐵磨一問直得倒街臥路雖有牛馬踐踏總不顧也且道大會齋去不去來日再看義山訥云溈山婆子者兩個漢雖然一挨一拶拍拍相應要且祇在建化門頭若論衲僧巴鼻猶較三十步石塔忍云溈山老子為口勞身殊無大人氣象鐵磨雖能相機而轉要且老婆氣息溈山示衆老僧百年後向山下作一頭水牯牛左脅下書五字曰溈山僧某甲當恁麼時喚作溈山僧又是水牯牛喚作水牯牛又是溈山僧畢竟喚作什麼即得仰山出禮拜而退雲居膺代云師無異號資福寶云當時但作此相拓呈之芭蕉清代作此相拓呈之又云同道者方知芭蕉徹代當時作此相拓呈之又云説也説了注也注了悟取好乃述偈曰不是溈山不是牛一身兩號實難酬離却兩處應須道如何道得出常流中峰本云道是溈山僧却是水牯牛好道是水牯牛却是溈山僧好當時有人下得者兩個好字教他百劫千生要脫水牯牛也未得在通玄奇云溈山一身充兩役到底功不成名不就仰山雖解扶豎終是家業喪亡靈巖儲云溈山老子無大人相將平生底蘊一時傾出殊不顧旁觀者哂仰山個漢盡力欲為父隱怎奈依舊藏頭露尾山僧今日將他父子一串穿却擲向諸人面前個中還有撥著便轉的麼如無山僧再與你下個注腳切忌在驢胎馬腹裏作活計神鼎澤云要識溈山麼以左手拍禪牀云者裏是要識水牯牛麼以右手拍禪牀云者裏是復以兩手拍一拍云六月十三熱不相瞞雪竇正云大小溈山好似嚼飯餧嬰孩不堪檢點芭蕉雖然和盤托出若要絶人情見則未可知麼良久云貪觀天上月失却手中橈溈山因仰山香嚴侍立次溈舉手曰如今恁麼者少不恁麼者多嚴從東過西立仰從西過東立溈曰者個因緣三十年後如金擲地相似仰曰亦須是和尚提唱始得嚴曰即今亦不少溈曰合取口南堂靜云象王嚬呻獅子哮吼踞地盤空移星換斗坐斷舌頭合取狗口一回擲地作金聲九曲黃河徹底清溈山與仰山摘茶次溈曰終日摘茶只聞子聲不見子形仰撼茶樹溈曰子祇得其用不得其體仰曰未審和尚如何溈良久仰曰和尚祇得其體不得其用溈曰放子三十棒仰曰和尚棒某甲喫某甲棒教誰喫溈曰放子三十棒報慈遂云且道過在什麼處首山念云當時不是溈山便見扶籬摸壁琅瑘覺云五更侵早起更有夜行人又云若不是溈山洎合打破蔡州白雲端云溈山放子三十棒也是養子之緣天童覺云溈山仰山父父子子叢林盡道各得一橛殊不知天共白雲曉水和明月秋玉泉璉云直饒體用兩全怎奈當頭錯過錯過則且置祇如放子三十棒又作麼生三盞酒粧公子面一枝花插美人頭薦福璨云仰山撼樹溈山良久説體説用互揚家醜且道放子三十棒又作麼生展盡旗鎗用處窮依前輥入草窠中天童悟云溈仰父子雖善切磋未免體用分作兩路且作麼生得體用一致舉手云普請採茶去灜山誾云鸞隨鳳舞蠅見蛆歡且道是得體是得用廣教玉云氈拍板六律諧聽無孔笛五音協暢互換投機風流不墜還他父子作家若在臨濟門下棒折也未放在雖然且道溈山前後放六十棒又作麼生擊案云好雨千峰迎翠色太平野老唱謳歌溈山問仰山即今事且置古來事作麼生仰叉手近前溈曰猶是即今事古來事作麼生仰退後立溈曰汝屈我我屈汝仰便禮拜昭覺勤云仰山雖善進前退後發明古今其奈溈山向胡餅裏呷汁壓沙覓油雖然如是且道仰山叉手意作麼生若也知得行腳事辦其或未然老僧不曾孤負諸人自是諸人孤負老僧溈山上堂僧出曰請和尚為衆説法山曰我為汝得徹困也僧便禮拜玄沙備云大小溈山被者僧一問直得百雜碎愚菴孟云須知溈山未上堂早已徹困也溈山睡次仰山問訊溈乃回面向壁仰曰和尚何得如此溈起曰我適來得一夢你試為我原看仰取一盆水與溈洗面少頃香嚴亦來問訊溈曰我適來得一夢寂子為我原了汝更與我原看嚴乃點一碗茶來溈曰二子見解過於鶖子昭覺勤云夢中説夢深許溈山妙用神通須還二子傳茶度水耀古騰今年老心孤憐兒惜子向衲僧門下一人在門外一人在門內更有一人遍界不曾藏佛眼覷不見南堂靜云撥草瞻風孤峰獨宿鼓無絃琴唱無音曲溈仰香嚴鼎之三足臨機不費纖毫力任運分身千百億白巖符云香嚴仰山固不忝為溈山諍子然職典巾瓶則有分若是倒捋虎鬚當仁不讓則又須別有所長始得我若作仰山待道我適來得一夢汝試為我原看便向道者老漢幸才醒來猶作寐語管取溈山者漢慙惶無地溈山問雲巖聞汝久在藥山是否巖曰是溈曰如何是藥山大人相巖曰涅槃後有溈曰如何是涅槃後有巖曰水灑不著巖却問溈未審百丈大人相如何溈曰巍巍堂堂煒煒煌煌聲前非聲色後非色蚊子上鐵牛無汝下嘴處天童華云二尊宿説大人相何異指鹿為馬或有問歸宗虎丘大人相作麼生向他道九九百百半青半白天童忞云二尊宿指鹿為馬應菴祖證龜成鱉各領三頓棒若是天童則不然有問先老人大人相作麼生劈胸云看看復云堂堂皇皇歷歷落落三生六十劫悟去也不知溈山侍百丈入山作務次丈曰將得火來麼溈曰將得來丈曰在甚處溈乃拈一枝柴吹兩吹度與丈丈曰如蟲禦木徑山杲云百丈若無後語洎被典座瞞天寧琦云百丈却因後語被人覷破帶纍典座隨邪逐惡天寧幸是無事汝諸人在者裏覓個什麼以拄杖一齊趁散溈山因遊山到一盤石上坐仰山侍立次忽鴉銜一紅柿落在面前仰取以呈溈溈曰子甚處得來仰曰此是和尚道德所感溈分半與仰曰子也不得無分玄沙備云大小溈山被仰山一坐至今起不得天童悟云玄沙只知溈山被坐竟不知仰山被溈山半個柿子塞却咽喉至今轉氣不來溈山問道吾甚處去來吾曰看病來溈曰有幾人病吾曰有病底有不病底溈曰不病底莫是智頭陀麼吾曰病與不病總不干他事溈曰不干一句速道速道吾曰道得也與他沒交涉博山來云溈山懷仁道吾尚義二老雖則不露針鋒也太殺俊俏且道誰是病者誰是不病者誰是不干者試指出看天童忞云一千五百人善知識作與麼語話若是山僧與他劈脊便棒雖然者一棒有負墮處請諸人檢點看溈山上堂仲冬嚴寒年年事運遷移事若何仰山進前叉手而立溈曰我情知你答者話不得香嚴曰某甲偏答得者話溈乃躡前問嚴亦進前叉手而立溈曰賴遇寂子不會瑞巖慍云溈山將引二子向冰枯雪老之時作一家燕熊掌馱峰下箸厭餵管絃鼉鼓聲徹雲霄遠近觀瞻莫不欣艷及乎分付家財依然却成吳越擊拂云當初只道茅長短燒了方知地不平烏石道云溈山父子三人裝一棚傀儡打個決殺無好散場千古為叢林話欛且道那裏是他打決殺處兩人各各叉雙手門外砂盆井石走笑殺溈山老古錐却來面南看北斗金粟元云明投暗合線去絲來縱奪可觀轉身有路若是山僧見伊叉手進前各與一頓趁出者裏挨得身轉後代兒孫不致寂寥還會麼殺人刀活人劒溈山泥壁次李軍容來具公裳直至溈背後端笏而立溈回首見便側泥盤作接泥勢軍容便轉笏作進泥勢溈乃拋下泥盤携軍容手同歸方丈巖頭奯云噫佛法淡泊也大小溈山泥壁也不了明招謙云當時合作麼生免被巖頭檢點代云却轉泥盤作泥壁勢待伊動靜便歸方丈黃龍新云巖頭錯下名言殊不知溈山軍容弄巧成拙溈山問仰山天寒人寒仰曰大家在者裏溈曰何不直説仰曰適來也不曲和尚如何溈曰直須隨流瑞巖慍云珠明川媚玉潤山輝溈山父子之謂也是則固是當時若知有轉身一路子孫也未到斷絶還會麼人天渾莫測珍重赤鬚鬍溈山問僧汝會作什麼僧曰會卜溈拈起拂子曰者個六十四卦那一卦收僧無對溈曰適來大壯今是明夷寶壽新云溈山擔得個死貓頭只管東卜西卜祇要人舌頭上説得好些肚裏便乃快活其或未然遂生悔吝竟不解者僧出鬼谷之門所以被他覷破心肝五臟將你從前事體悉皆斷盡但不曾留得個外象三爻至今令人疑著要識外象三爻麼禍福無門惟人自召白巖符代僧云和尚今年須防失脫溈山與仰山行次指柏樹子問曰前頭是什麼仰曰柏樹子溈却問耘田翁翁亦曰柏樹子溈曰者耘田翁向後亦有五百衆溈山云山僧則不然耘田翁吾不如汝且道大圓是山僧是若人辨得許汝具擇法眼若也不辨佛法熾然生滅神鼎諲徵云為復意在耘田翁處為復意在仰山分上為復總不恁麼愚菴盂云溈山作恁麼語話耘田翁未肯點頭在溈山在法堂坐庫頭擊木魚火頭擲却火抄拊掌大笑溈曰衆中也有恁麼人遂喚來問你作麼生火頭曰某甲不喫粥肚飢所以歡喜溈乃點頭鏡清怤云將知溈山衆裏無人鼓山球云將知溈山衆裏有人昭覺勤云者僧洪音大震直得千五百人眼目定動及乎勘證將來却打個背翻筋斗若不是溈山怎見汗馬功勞磬山修云百姓日用而不知故君子之道鮮矣鏡清道將知溈山衆裏無人鼓山道將知溈山衆裏有人且道是賞伊是罰伊愚菴盂云者僧在千百衆中奪錦而歸及乎詢其所以却又將扇子掩面而避鏡清云將知溈山衆裏無人鼓山云將知溈山衆裏有人則二老為此僧擔板各有所見要識此僧也大難在會麼分明只在秋江上明月蘆花何處尋溈山夏末因仰山來問訊溈曰子一夏不見上來在下面作何所務仰曰慧寂在下面鋤得一片畬下得一籮種溈曰子今夏不虗過仰却問未審和尚一夏之中作何所務溈曰日中一飯夜後一寢仰曰和尚今夏亦不虗過道了乃吐舌溈曰寂子何得自傷己命溈山云仰山眼照四天下到大圓面前却向淨地喫交大圓雖則養子之緣不免拄後人脣齒天童覺云少當努力老合歇心者一夏總不虗過為什麼仰山道了吐舌若檢點得出禍不入慎家之門仰山欽云溈山與仰山是則子傳父業足可觀光奈何逗到下梢却又𮞏相矛盾致成父不父子不子矣龍興今夏亦無所作亦不空過且道與古人是同是別井底蟾蜍吞却月天寶樞云溈山道子也不空過一夏施鳩毒於樽爼之間仰山道和尚也不空過一夏揮戈矛於笑談之頃召大衆云會麼兩個駝子相逢著世上只今無直人徑山琇云鋤一片畬種一羅粟欵出囚人口日中一食夜間一寢兔子不離窠溈仰父子才相見便要打口鼓直饒説得天雨四花地搖六震怎如一默好芙蓉覺云二大老發揚家計雖互有所長檢點將來二俱空過我龍淵者裏一夏以來也不開畬種粟也無飽食高眠一味間携拄杖松根立笑問客從何處來且道是空過是不空過溈山一日指田謂仰山曰那頭得恁麼高者頭得恁麼低仰曰却是者頭高那頭低溈曰汝不信但向田中立看兩頭仰曰不必中間立亦莫住兩頭溈曰若如是著水看水能平物仰曰水亦無定但高處高平低處低平溈乃休去龍池微云溈仰父子議論者片田地最初到有些分曉及乎拶到臨末梢頭未免懡㦬而歇且道溈山懡㦬而歇仰山懡㦬而歇若人定當得出要見者片田地高低也不難溈山謂衆曰如許多人祇得大機不得大用仰山舉問山下一菴主曰山頭和尚恁麼道意旨如何主曰更請舉看仰擬再舉被菴主踏倒仰山歸舉似溈山山呵呵大笑笑巖寶別溈山云寂子更要一踏麼南澗問云盡道仰山被菴主一踏殊不知仰山有作賊不犯的手腳菴主雖得便宜未免遭人笑破口脣皮笑巖老漢恁麼道也是只見錐頭利且道山僧與諸老相去多少呵呵大笑白巖符云者僧鈎錐在手用處敏捷不妨是個慣戰作家或若仰山于更請舉一遍處劈面便掌又作麼生雖然仰山不即恁麼未必即為好心溈山問仰山曰大地衆生業識茫茫無本可據子作麼生知他有之與無仰曰慧寂有個驗處時有一僧從面前過仰召曰闍黎僧回首仰曰和尚者個便是業識茫茫無本可據溈曰此是獅子一滴乳迸散六斛驢乳開先金云諸方盡謂仰山勘破者僧據山僧看來大小溈仰却被者僧一狀領過南山寶云二老勘驗臨機雖謂快便殊不知總被者僧看破了也溈山示衆行腳高士直須向聲色裏橫行聲色裏坐臥始得時疏山仁新到出問曰如何是不落聲色句溈豎起拂子疏曰此是落聲色句溈放下拂子歸方丈疏不契遂辭香嚴嚴曰何不且住疏曰某甲與和尚無緣嚴曰有何因緣不契試舉看疏舉前話嚴曰我有個語疏曰請道看嚴曰言發非聲色前不物疏曰元來此中有人遂囑嚴曰向後有住處某甲却來相見乃去至晚溈問嚴曰問聲色話底矮闍黎在麼嚴曰已去也溈曰曾舉向子麼嚴曰某甲亦曾對他來溈曰試舉看嚴曰某甲向他道言發非聲色前不物溈曰他道什麼嚴曰他深肯某甲溈失笑曰將謂者矮子有長處元來只在者裏此子向後若有個住處近山無柴燒近水無水喫天童華云在今天下覓一個言發非聲色前不物底正如掘地討天何況更要會他溈山説話雖然切忌鑽龜打瓦龍翔欣云衆中商量盡道溈山用向上爪牙惜乎疏山失却一隻眼殊不知正是溈山失却一隻眼却被疏山看破中峰恁麼道諸人還甘麼保寧茂云宗師為人言不虗發然疏山既不能坐斷舌頭在應菴又豈免隨邪逐惡諸上座山僧者裏放一線道墮在聲色堆中把斷要津一任諸方簡責樟山量云溈山雖用向上爪牙怎奈鼻孔落在疏山手裏山僧即不然無事上山行一轉借問客從何處來賢峰竟云疏山不肯許伊是箇行腳衲僧祇不合向香嚴爛草繩子裏絆殺若不是溈山老人肘後符靈幾被兩箇擔板漢純置一上
