body:
  text: 古杭白巖嗣祖沙門淨符彚集南十四江州圓通道旻圓機禪師南十四泐潭乾嗣因左丞范沖宇致虗守豫章時過謁茶罷曰沖行將老矣墮在金紫行中去此事稍遠通呼內翰公應諾通曰何遠之有公躍然曰乞師再垂指誨通曰此去洪都有四程公佇思通曰見即便見擬思即差公豁然有省灜山誾云圓通老人囊中有妙藥能起死回生在頃刻左丞雖於此省入去此事不遠怎奈鄉音猶易識家國尚茫然成都府昭覺寺克勤佛果禪師南十四五祖演嗣上堂逈無依倚超宗越格非物非心萬仞壁立桑樹上著箭柳樹上出汁天井新云直饒恁麼也只道得一半且道是那一半聻聽事不真喚鐘作甕昭覺示衆通身是眼見不到通身是耳聞不及通身是口説不著通身是心鑑不出通身即且置或若無眼作麼生見無耳作麼生聞無口作麼生説無心作麼生鑑若向者裏撥得一線路便與古佛同參且道參什麼人徑山杲云惜乎徑山當時不在若在點一把火照看者老漢面皮厚多少即今莫有旁不甘底出來道和尚也是普州人又作麼生即向他道西天斬頭截臂者裏自領出去昭覺示衆古德道結夏已十一日寒山子作麼生又有道結夏已十一日水牯牛作麼生山僧即不然結夏已十一日燈籠露柱作麼生若識得燈籠露柱即識得水牯牛若識得水牯牛即識得寒山子徑山琇云大衆碎金鸞頭出五色髓固是他三大老之手若是新靈巖總無許多事何故家家門前赫日月太平不用將軍威白巖符云我要問昭覺寒山子作麼生識眼目定動便與掀倒禪床舒州龍門佛眼清遠禪師南十四五祖演嗣一日不安僧問生死到來時如何遠曰皖公山曰為復只者個別有在遠曰桐城縣有僧舉似禮首座座曰遠兄不相見三十年者漢徹也薦福行云禮首座與先師同參可憐死在句下白巖符云海龍王宮裏無凡物佛眼答話不妨驚羣怎奈賞鑑非人致成鈍置我若作禮首座不恁麼道且作麼生道遠兄不相見三十年尤作者般見解夢見也未嘉州九頂清素禪師南十四五祖演嗣因太守呂公來瞻大像問既是大像為什麼肩負大楹素曰船上無散工守乃作禮昭覺勤云疑殺天下人薦福行云將謂無人又云本有餘力大溈果別云全身擔荷元禮首座南十四五祖演嗣僧問金剛經曰修一切善法如何是善法禮遽起曰上是天下是地中間坐底坐立底立喚什麼作善法僧無對禮便打薦福行云大衆道無橫徑理當即行敢道禮首座鼻孔落在者僧手裏若人撿點得出天下橫行法閦上座南十四五祖演嗣到東林度座下見其得平實之旨一日拈一枝花繞度禪床一匝背手插香罏中曰和尚且道意作麼生度屢下語皆不契踰兩月度遂問閦曰你試為我説看閦曰某甲祇將花插香罏中和尚自疑有什麼事南澗問於和尚且道意作麼生處云者野狐精我當時若作東林便與劈脊打趂出免得相鈍置於和尚自疑有什麼事處乃噓兩噓云古今盡道閦上座驅耕夫牛奪飢人食有奪有縱能殺能活若約山僧撿點將來似者般底也祇是個龍頭蛇尾漢自救未得在平田本云家無白澤之圖必無如是妖怪金陵俞道婆南十四琅琅起嗣凡有僧至則曰兒兒僧擬議即掩却門佛燈珣往勘之婆見如前問燈曰爺在甚麼處婆轉身拜露柱燈即踏倒曰將謂有多少奇特便出婆躡起曰兒兒來惜你則個燈竟不顧白巖符云靈龜負圖自取喪身之兆婆子固為可惜何山雖鐵符在握善掃狼煙然只解明擊不解暗攻具眼者為何山別出一隻手看青十四潭州嶽𪋤海禪師青十四開先宗嗣因僧問進前三步時如何麓曰撞頭磕額退後三步時如何麓曰墮坑落塹不進不退時如何麓曰立地死漢白巖符云海和尚祇知嚴霜酷暑不解暖日春風者裏則不然進前三步時如何金花滿酌退後三步時如何紫誥榮歸不進不退時如何仙翁顧問慵回首天子招呼不上船明州天童宗珏禪師青十四長蘆了嗣因僧問如何是道童曰十字街頭休斫頭灜山誾云天童老漢向當陽指出八達康莊人人可得而履固稱作者然猶未是衲僧痛快或有問山僧如何是道便與劈面掌云誰教你草窠裏走出去無為軍吉祥元實禪師青十四天衣聰嗣參天衣一日偶失笑喧衆衣擯之中夜宿田里覩星月粲然有省歸呈衣衣見乃問洞山五位君臣如何話會祥曰我者裏一位也無衣令參堂乃謂侍僧曰者漢却有個見處奈不識宗旨何入室次衣預令行者五人分序而立祥至俱召實上座祥於是密契奧旨遂述偈曰一位才彰五位分君臣叶處紫雲屯夜明簾卷無私照金殿重重顯至尊衣稱善薦福如云天衣為其向上關未透大法未明乃一時婆心所至妙手巧心有難於形容者自非吉祥未易神會然祖師門下果有如是事乎抑果無如是事乎吉祥云一位才彰五位分我要問他五位且置只者一位從甚處得來南十五杭州徑山大慧宗杲禪師南十五昭覺勤嗣開堂日下座次少卿馮公楫問和尚常言不作者般蟲豸因甚今日敗缺山曰盡大地是個杲上座你作麼生見馮擬議山便掌天童忞云馮濟川可謂運斤有法其奈斫堊無功若是山僧盡大地是個杲上座你作麼生見但云恁麼則世界總被和尚占却待他動靜隨後便喝豈不增色宷僚雖然也須扶起大慧正當今日有問山僧又當對他個什麼雲綻家家月春來處處花白巖符云馮少卿向洪波浩渺裏要見長人却似個斗筲器量慣搜人短怎奈妙喜是個摩天金翅不但不嬰其羅縶且能直取龍吞雖然撿點將來猶少機關在今日有問新寶壽和尚常言不作者般蟲豸為什麼又在者裏向道符上座性命今日在你手裏徑山初在雲居首衆圓悟命秉拂小參昭覺元出問眉端挂劒時如何山曰血濺梵天悟於座後喝采曰住住問得極好答得更奇元乃歸衆山由此名著龍翔欣云奇哉奇哉一千七百人善知識生氣凜然誰知二百年後金陵城中再逢作者如獅子筋琴一奏則衆絃皆絶如塗毒鼓一擊則聞者皆喪我此一衆親近承事勿生疲厭各隨根器成就法器雖然有際天之雲濤可容吞舟之魚有九萬里之風可負垂天之翼東明際云圓悟老人雖是養子之緣怎奈旁觀者哂大慈云奇則奇矣怎奈憐兒不覺醜看他父子法戰一合下馬何如百戰場中見作家耶者裏撿點得出許你向劒刃上翻身其或未然未免傷鋒犯手咄徑山問僧道不用修但莫染污如何是不染污底道曰某甲不敢道山曰為甚不敢道曰怕染污山高聲呌曰行者將糞箕苕帚來僧茫然山便打出白巖符云者僧將成九仞之山欠進一簣之土則且置祇如大慧與麼道還免得無過也未我若作者僧待道如何是不染污底道但捧水一盆置妙喜前便出徑山問僧不是心不是佛不是物你作麼生會僧曰領山曰領你屋裏七代先靈僧便喝山曰適來領如今喝干他不是心不是佛不是物什麼事僧擬議山打出瑞巖慍云大慧老人提持個一著子縱以太虗空為口須彌盧為舌亦難擬其用處然撿點將來未免有得有失當時者僧若是個人見他與麼問只向道三更過鐵圍豈不光前絶後擊拂子云竹杖化龍去癡人戽夜塘徑山謂子韶曰你只知格物不知物格韶便問如何是物格山曰你不見唐明王斬閬守故事麼韶因有省乃曰子韶格物妙喜物格欲識一貫兩個五百寶壽方云妙喜子韶雖曰議論風生千古希遘然只解依樣畫葫蘆者裏則不然或有問如何是物格向道者枚如意是陶宗伯送底還會麼紅日一輪天外曉癡人盡向霧中看喝一喝光相得云釜中點沸不如竈裏抽薪惟善識者能之妙喜老人固是其手子韶便爾知歸不妨伶俐撿點將來大似蝦跳不出斗徑山問僧香嚴上樹話你作麼生會曰好對春風唱鷓鴣山曰虎頭上座道樹上即不問樹下道將一句來又作麼生曰適來向和尚道了也山曰好對春風唱鷓鴣是樹上語樹下語僧擬對山便打大珠云惜乎者僧龍頭蛇尾好對春風唱鷓鴣是樹上語樹下語只消道個疑則別參敢保徑山氷消瓦解安吉州何山佛燈守珣禪師南十五太平勤嗣既見佛鑑有所證入是夕厲聲謂衆曰者回珣上座穩睡去也圓悟聞得疑其未然欲與勘過遂召至因與遊山偶到一水潭悟乃推燈入水遽問曰牛頭未見四祖時如何燈曰潭深魚聚曰見後如何燈曰樹高招風曰見與未見時如何燈曰伸腳在縮腳裏悟乃稱賞之南堂欲云何山得即得未免帶水拖泥圓悟高則高怎奈使心用行雖然不入驚人浪難逢稱意魚白巖符云水不將杖探不知水之深淺金不將火試不知金之真偽何山之於昭覺既試矣探矣使大方老作家見必為噴飯為什麼本是同根生相煎何太急州樞密吳居厚居士南十五圓通旻嗣擁節歸鍾陵謁圓通曰某頃赴省試過此過趙州關嘗問前住訥老透關底事如何訥曰且去做官今不覺五十餘年通曰曾明得透關底事麼公曰八次經過常存此念然未甚到脫灑處通度扇與之曰請使扇公即揮扇通曰有甚不脫灑處公忽有省曰更請末後句通却揮扇兩下公曰親切親切通曰吉撩舌頭三千里灜山誾云圓通若無後語未免鈍置吳公只向揮扇處弄精魂有甚了期祇如道吉撩舌頭三千里是何意旨洪州分寧尚書莫將居士字少虗南十五大隨靜嗣官西蜀謁南堂咨決心要堂使其向好處提撕久無所入適如廁急穢氣甚急以手掩鼻遂有省徹見南堂相為乃呈以偈曰從來姿韻愛風流幾笑時人向外求萬別千差無覔處得來元在鼻尖頭堂印之灜山誾云尚書雖是苦心造到撿點將來猶帶些穢氣在何故為他向廁坑頭著倒南十六台州國清簡堂禪師南十六護國元嗣住江州圓通日上堂圓通不開生藥鋪單單只賣死貓頭不知那個無思算喫著通身冷汗流盤山嵩云盤山者裏既不開生藥鋪也不賣死貓頭只把一枝無孔笛臨風吹斷楚江秋南十八杭州靈隱松源崇嶽禪師南十八天童傑嗣臨終示衆久聚正路行者有只不能用黑豆法難以荷負正宗臨濟佛法到此平沉痛哉痛哉雲居莊云松源老祖壓良為賤若是黑豆法用得有甚奇特直須將斷貫索穿過從上佛祖鼻孔方有自由分時有僧問斷貫索莫在和尚手中麼莊云者瞎漢拈拄杖便打南二十海鹽天寧楚石梵琦禪師南二十元叟端嗣上堂通身是眼為什麼看不見通身是耳為什麼聽不聞通身是口為什麼説不到通身是心為什麼鑒不出報恩有一道聰明神呪布施諸人去也便下座大覺升云山僧即不然通身是眼有什麼看不見通身是耳有什麼聽不聞通身是口有什麼説不到通身是心有什麼鑒不出也無聰明神呪布施諸人珍重歸堂喫茶去天寧因僧問如何是山裏禪曰猢猻上樹尾連顛如何是城裏禪曰十字街頭一片磚如何是村裏禪曰扶桑人種陝西田曰謝師答話寧曰蒼天蒼天天目律云大小楚石恁麼答話若不得後語大似光景未忘寶壽則不然山裏禪虗巖午夜鎖輕煙城裏禪肉案頭邊唱哩嗹村裏禪牯牛牸跳出豬圈謝師答話潑油救燃祇者末後一句一任天下衲子鑽研明州育王橫川如珙禪師南二十天目禮嗣晚參少室無門戶如何便得通夜深寧耐立聽我説西東保寧茂舉畢召大衆云也有權也有實也有照也有用只是不得恁麼會珍重普明用云大好無門戶杭州淨慈斷橋妙倫禪師南二十徑山範嗣參無準準以狗子因何有業識令下語凡三十轉皆不契倫云可無方便乎準乃舉真淨頌示之倫悚然良久忽聞板聲大悟金明進云徑山養子之緣不顧腳跟泥水倫祖白汗通身要難恩酬罔極有問金明狗子因何有業識向道伏惟和尚珍重萬福如更眼目定動便與掀倒禪床何故牽藤引蔓恐辱先也龍淵法云無準老漢慣將死語開人活眼可謂婆心太切倫祖雖然瞥地收回劫外風光要且尤欠一籌何也不見道道泰不傳天子令時清休唱太平歌淨慈上堂德山低頭夾山點頭俱胝豎起手指頭玄沙𡎺破腳指頭拈棒云都來不出山僧拄杖頭何以見得卓拄杖云一葉落天下秋瓶山謙云開疆闢土革故鼎新固是淨慈老漢為人的赤心片片瓶山今日也要平分風月貴在諸昆仲共知驀拈如意云德山玄沙夾山俱胝總在瓶山如意頭上各各顯揚無量妙義還委悉麼不因夜來鴈怎見海門秋南二十一杭州天目高峰原妙禪師南二十一仰山欽嗣上堂海底泥牛銜月走巖前石虎抱兒眠鐵蛇鑽入金剛眼崑崙騎象鷺鷥牽此四句內有一句能殺能活能縱能奪若人撿點得出一生參學事畢寶壽方問僧云高峰道此四句內有一句能縱能奪能殺能活且道是那一句僧乃彈指云只者一句也能縱能奪能殺能活和尚請定當看壽叱云挑蔥賣韭漢出去你那裏得知古南門云山僧亦有四句五更撞鐘腳落地三更接板狗子吠二時粥飯濕匙筯半夜放參霜點被此四句中有一句全用有一句全體有一句全體即用全用即體有一句體用雙忘騰騰任運任運騰騰若人撿點得出便請歸家穩坐崆洞慈云山僧亦有四句水流濕火就燥雲從龍風從虎中有一句能縱能奪能殺能活若人撿點得出不惟參學事畢亦且堪與人天為師道林志云高峰道內有一句能縱能奪能殺能活且道是那一句諸人還定當得出麼如其不然乃驀竪如意云敢煩者個上座與汝通個消息遂擊案一下光相得云山僧亦有四句開田而食鑿井而飲日出而作日沒而息內有一句能縱能奪能殺能活若人辨得一生參學事畢且道與高峰是同是別云藏春色於壺天栽犢角於馬首固是高峰作略若論擒飛龍捉猛虎猶未可在高峰示衆竪拂子曰大衆到者裏進一步也不得退一步也不得總不恁麼也不得畢竟如何不得不得佛川宗云野山則不然乃竪拂子云大衆到者裏進一步也得退一步也得總不恁麼也得畢竟如何得得且道與高峰相去多少良久云兩彩一賽慧慶詮云二老與麼提持直截不妨直截義學看來不免被得失進退瞞過者裏則不然乃驀竪拂子云切忌頭上安頭便擲下南二十九秀州天寧法舟道濟禪師南二十九吉菴祚嗣因陸五臺問畫前元有易否寧曰若無將甚麼畫曰畫後如何寧曰元無一畫曰現有六十四卦何得言無寧曰居士莫著文字好曰請師離文字發一爻看寧召五臺臺應諾寶曰者一爻從何處起普明用云畫前畫後論有論無總與大易無涉直饒一喚一諾爻象分明也未是衲僧極則畫前元有易否天寧者漢何不當頭便喚五臺待他應諾却好云元有易否陸公者裏必然別有所入且免後來許多周遮南三十一金陵月心笑巖德寶禪師南三十一龍泉聰嗣侍龍泉無聞聰圍爐次泉問人人有個本來父母子之父母今在何處巖曰一火焚之泉曰恁麼則子無父母耶巖曰有即有佛眼不見泉曰子還見麼巖曰某甲亦不見泉曰為甚麼不見巖曰若見則非真父母泉然之白巖符云二老與麼酬對自非親從廣堂深奧中履歷過來要如此絲來線去血脈聯絡則三家村賣柴漢問他九重禁殿中事斷所不知而今主張直截痛快者卑為聯纖是又何曾嗅著他一點汗臭氣聻雖然若論本來父母猶隔遠在為什麼不見道若有所見則非真父母笑巖上堂拈拄杖曰有麼有麼時有僧出作禮巖劈脊便打曰多口作麼曰某甲一言也未何為多口巖復打曰再犯不容萬峰藏云俊則太煞俊未免著忙在杭州徑山無幻性沖禪師南三十一敬畏空嗣因編無趣録歸趣云子一向做得個甚麼山云性沖買得一段田收得原本契書請和尚僉押乃將録呈上趣接得云者個是我底你底聻山云和尚莫攙奪行市趣擲下録本山便出金明進云我若作敬畏待云請和尚僉押便乃垂下一足他更如何但云念子遠來且坐喫茶不特不負來機要且主賓有禮若作徑山待云者個是我底你底聻遽好與一掌何故大丈夫捋虎鬚未為分外古林如云我若作徑山待道者個是我底你底聻便與作禮云今日念和尚老大南三十二荊溪龍池禹門正傳禪師南三十二笑巖寶嗣因僧問如何是祖師西來意池曰屋北鹿獨宿僧曰不會池曰溪西雞齊啼夾山豫云師翁答話雖則一椎兩當未免令者僧分西著北不肖孫則不然今日或有問如何是祖師西來意但向道面臨江水濶早晚看行舟更曰不會向道兩岸蘆花裏清風引白鷗繡州興善南明慧廣禪師南三十二徑山沖嗣示衆五峯頭卓朔雙徑尾顛先喝石巖一任𨁝跳明月池覆地傾天此四句中有一句有殺人刀無活人劒有一句有活人劒無殺人刀有一句殺人刀活人劒俱有有一句殺人刀活人劒俱無揀點得倜儻分明許你參學事畢龍淵法云興善雖然殺活縱奪通身手眼撿點將來不無鈍置殺人空諸性云四句外尚有一句子百味具足不獨殺活也然雖南明終未能舉出在且道是那一句良久云著則瞎興善因看雪次僧云滿山都是雪善云隨聲逐色漢僧云請師離聲色道一句善却云滿山都是雪普明用云者僧身挨白刃活得命來不妨好手南老人費盡鹽醬究竟不獲稱心者裏還有向聲色外別道一句者麼良久云切忌道滿山都是雪藕菴衍云興善老漢慣將官物欺壓平人此間有為者僧雪屈者麼出來與藕菴拄杖子相見永寧振云大小南明却被者僧看破且道看破在甚處具眼者辨看南三十三明州天童密雲圓悟禪師南三十三龍池傳嗣因僧問如何是不動尊童曰此去徑山五百里翠巖云天童老漢慣用金剛王寶劒覿面全提可惜者僧不知落處若知落處便好向百草頭上卸却干戈雖然者裏則不然或有問如何是不動尊但向道露柱騎牛登五老燈籠踏雪返西峰天童因僧問學人遠來要問和尚討個佛做童曰佛也是你分外事翠巖云斬釘截鐵本分宗師直下知歸罕逢達者還委悉麼渾身已在含元殿何事嘮嘮問帝都白巖符云者老漢生平一條白棒不順人情不管是佛是魔驀頭便與一揕在者裏為什麼不用聻少年曾決龍蛇陳淹倒還同稚子歌天童因挂牌入室有僧才跨門即曰不用拈提請師便棒童曰為什麼聻僧無語童便打天童忞云者僧將成九仞之山尚虧一簣之土若是山僧待道為什麼聻但向道橫趨金殿過定惹䘖爐香敢保先師拄杖子兩手分付積翠潤云老天童祇有順水之波且無逆潮之浪若是山僧待渠道不必拈提聲未絶直與打出方丈令渠倒疑三十年不致後人向者裏軃跟雖然如今有恁麼僧來又作麼生乃喝一喝云曹溪波浪如相似無限平人被陸沉建寧普明鴛湖妙用禪師南三十三興善廣嗣同雪嶠上弦夜玩月次嶠指月問那半箇在那裏去了明良久云會麼嶠云也只得半箇明却問那半箇在那裏去了嶠亦良久明云也只得半箇嶠乃呵呵大笑金明進云二老舉揚箇事如善舞太阿終不傷鋒犯手雖然撿點將來太殺草窠裏輥金明若在見他恁麼便好拂袖而出何故不見道此夜一輪滿清光何處無永正元云塤篪奏互換可觀還他二老作家然只好明者一半事若是那一半事敢曰未在且作麼生是那一半事待月落後與你道龍淵法云二老道即太殺祇道得一半金明雖則善為折衷以小子看來大似湊成三個擔板退菴智云二老為那半個費却許多腕頭力作麼者裏若有問那半個在那裏去了但舉拳云鑑他更如何劈面便掌瓶山謙云向上一著即三世諸佛只得口挂壁上二大老合水和泥直是笑破人口向上云乎哉到瓶山者裏好各與三十笤
