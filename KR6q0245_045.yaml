body:
  text: 古杭白巖嗣祖沙門淨符彚集青十五明州雪竇足菴智鑑禪師青十五天童珏嗣參翠山宗宗問道者為衆竭力不無其勞竇曰須知有不勞者曰尊貴位中留不住時如何竇曰觸處相逢不相識曰猶是途中主賓如何是主中主竇曰丙丁吹滅火宗以手掩竇口竇拓開便行崇先奇云翠山恁麼問雪竇恁麼答盡謂賓主穆穆檢點將來大似持鉢不得詐道不饑青十六明州天童長翁如淨禪師青十六雪竇鑑嗣上堂霜風號肅殺霜葉墮蕭𮨱舉拂子曰看惟有玲瓏巖崔嵬望轉高所謂天童滯貨今朝短販一遭莫有酬價底麼下座文峰玉云長翁與麼說法陽春雪曲固難為和乃無端喚作滯貨要人酬價從前雪曲可惜變作下里巴歌了也還有挽轉者麼試與長翁出臂力看天童六坐道場并未言稟承有請為拈香者童曰我待涅槃堂裏拈出及臨終果拈香曰如淨行腳四十餘年首到乳峰失腳墮於陷穽此香今不免拈出鈍置我雪竇足菴大和尚龍唐柱云長翁老祖被雪竇活埋在碧玉穽中直得有屈無伸所以三回兩度吐露不得逗到臨末梢頭方才雪屈何也縱有伯牙琴應難寫心曲天童開爐上堂召衆打圓相曰個是天童火爐近前則燒殺退後則凍殺忽有個漢出來道合作麼生㘞火爐動也天界盛云我當時若見者漢恁麼道便與驀頭一喝云者老漢自己眉毛燒却也不知白巖符云在者裏又且不然盡大地是箇火爐你近前則燒殺退後亦燒殺直饒你總不恁麼也無你軃避處忽有個漢出來道畢竟合作麼生㘞可惜許崇先奇云天童老祖大似貧兒暴富賣弄家珍臯亭當時若見踏翻便行令者一隊趨炎附熱漢凍殺有甚麼過青十七襄州鹿門覺禪師青十七天童淨嗣參天童長翁值翁上堂曰一箇烏梅似本形蜘蛛結網打蜻蜓蜻蜓落了兩片翼堪笑烏梅咬鐵釘門不覺失笑曰早知燈是火飯熟幾多時天界盛云長翁用盡伎倆不過只發得沒意智漢個好笑究竟向上事未曾打發在鹿門示衆盡大地是學人一卷經盡乾坤是學人一隻眼以者個眼讀如是經千萬億劫無有間斷報恩秀云看讀不易愚菴盂云正恁麼時有經處無眼有眼處無經舉意讀時便成間斷報恩云看讀不易咄寐語作麼龍唐柱云看則眉毛落地讀則碓嘴生花烏龍岑云以者隻眼讀者卷經直是東南西北無一物能為障礙古今三世無一刻能為間斷只是看讀不易山僧為伊拈却去也遂豎起拂子高聲云盡大地是一卷經盡乾坤是一隻眼孟八郎漢便恁麼去乃擲下拂子崇先奇云鹿門恁麼示衆也是依經解義報恩雖善斷章節句怎奈打失眼睛皋亭一出娘肚皮便開眼見明閉眼見暗至今胸無一元字腳山依舊是山水依舊是水又何用別作解會也別無難易且道與古人是同是別辨得者出來吐露不知者切忌心粗鹿門因普照參照問如何是盡乾坤是學人一隻眼門曰汝被一卷經遮却也照擬對門搖手曰不快漆桶照於是得言外旨天界盛云鹿門慣得其便則且置且道如何是言外旨盞子撲落地碟子成七片青十八青州普照一辨禪師青十八鹿門覺嗣因大明寶問離四句絶百非請師直指西來意照曰昨日有人恁麼問被打出去也明曰今日又如何照曰你得恁麼不識痛癢明禮拜照曰可惜許棒折也明直得汗下文峰玉云一挨一拶有放有收還他二大老不虗其為作家手眼有者道赤眼撞著火柴頭也不妨許伊道著若是大明汗下猶未夢見在白巖符云殺人不用刀活人何必劒在普照老漢得之矣當時大明可惜放過若不放過待道可惜許棒折也便好進云知和尚祇有受璧之心且無割城之意看者老漢又當作何處置普照嘗垂百問勘學者茲略記其五問聲前薦得落在今時句後承當迷頭認影作麼生是空劫已前自己愚菴盂云道即不難恐落今時旁僧云請和尚道看余打一摑云羞也不識要稱禪客龍唐柱云青州老人秉洞上宗綱為天下歸仰大開東閣迎賓不忘重闈禁殿要識空劫已前自己麼良久云從來無位次誰敢強安排百丈源云貧逸富勞問二邊純莫立中道不須安且道甚處相見得個端的愚菴盂云可憐無定河邊骨盡是春閨夢裏人百丈源云和尚口乾呌侍者過茶來問回途轉位直須戴角披毛喚作畜生得麼愚菴盂云媧女不知亡國恨隔江猶唱後庭花百丈源云輕打我輕打我問念念釋迦生世步步彌勒下生為甚麼擬心即錯動念即乖愚菴盂云富嫌千口少貧恨一身多百丈源云甜瓜甜苦瓜苦問有口讀不盡無言心自明是則裂破虗空不是則鬼家活計上人端的處道將一句來愚菴盂云骨鎈又云背手抽金鏃百丈源云莫裝聾好明州天童雲外岫禪師青十八直翁舉嗣上堂閙市紅塵裏有閙市紅塵裏佛法深山巖崖中有深山巖崖中佛法山僧昨日出城門閙市紅塵裏佛法一時忘却了也歸到二十里松雲便見深山巖崖中佛法大衆且道如何是深山巖崖中佛法白雲淡濘出沒太虗之中青蘿夤緣直上寒松之頂龍唐柱云深山佛法雲外一一發泄了也且道如何是閙市紅塵裏佛法樓連湖野梅花弄霽雪之天樂作行營鼓吹雜胡笳之曲皓山季云雲外恁麼說法大似隨境漂流佛日哲云雲外老漢尋常氣吞寰宇及至拈著佛法二字便打作兩橛隆安佛法則不然閙市紅塵裏便是深山巖崖中深山巖崖中即是閙市紅塵裏所以太白峰頭和泥合水長安市上壁立萬仞壁立萬仞處通身合水和泥合水和泥時斬然壁立萬仞且道隆安有甚長處乃能如是卓拄杖云但見皇風成一片不知何處有封疆天童垂語天童今日大死去也你作麼生救天童今日大死去也你不要相救天童今日大死去也阿誰與我同行雪竇證於第一問著語云救他作麼第二問云請和尚喫飯第三問云和尚先行某甲後隨龍唐柱云可惜放過天童者漢我若在待云今日大死去也阿誰與我同行即與挑起鉢囊橫擔楖𣗖看者漢去得去不得若去不得便與推倒方丈才見真獅子兒豈不俊哉青十九磁州大明寶禪師青十九普照辨嗣示衆若論此事如人作針線幸然針針相似忽見人來不覺失却針祇見線者邊尋也不見那邊尋也不見却自曰近處尚不見遠處那裏得來多時尋不得心煩昏悶乃打睡拽衣就枕方就枕時驀然一劄曰原來在者裏愚菴盂云大明不能為後人抽釘拔楔作灑落了事人反引渠向針線上作活計就使模索得來轉見迷頭認影雖然三十年後一回飲水一回噎龍唐柱云有時求不得無心還自來須知此事奇特非常祇如枕邊一劄時如何分明一段風流事惟許佳人獨自知皓山季云若論此事直饒你驀劄相逢到山僧者裏猶未許在何故聻從門入者不是家珍崇先奇云大明雖婆心切切若是皮下有血底自然不甘還有為古人出氣者麼皋亭要問伊知痛癢也未青二十太原王山體禪師青二十大明寶嗣示衆既有尊貴之位須明尊貴底人須知尊貴底人不處尊貴之位方明尊貴不落階級寶壽方云太原與麼提持要明尊貴一路尚缺在為什麼不見道方外誰敢論量愚菴盂云如何黑漆屏風上更寫盧同月蝕詩王山見子生臺飯乃拍手一下飛去大明遂於山背上打一掌山回首明曰還是子辜負你還是你辜負我山罔措明曰幸自可憐生却乃互相辜負去山豁然有省十載執侍祕重深嚴一旦抽單罔不疑怪或問大明侍者何往明曰諸方來諸方去何介意哉曰參學何似明曰道有參學栽他頭角道無參學減他威光一衆方疑後承印記龍唐柱云全身奉重不觸威嚴轉位提持縱橫得妙道有道無二俱不涉諸人作麼生會天曉便藏無影樹太陽雖照不能尋青二十一磁州雪巖滿禪師青二十一王山體嗣初參普照照曰兄弟年少正宜力參老僧當年念念以佛法為事嚴避席進曰和尚而今如何照曰如生冤家相似嚴曰若不得此語幾乎枉行千里照下禪床握巖手曰作家那報恩秀云死灰裏一粒豆𪹼愚菴盂云普照當時待他問和尚而今如何也好頂門一棒或再進語更與一棒且教者漢參三十年普照若行得此令吾宗不止如是雖然爛泥裏有刺作者方知龍唐柱云雪巖向獅子頷下解鈴驪龍額上探珠誠為好手然終未免被普照贓誣一上至今稱不得好人報恩曰冷灰裏一粒豆𪹼也是壓良為賤崇先奇云萬松祖錯下名言殊不知青州勾賊破家我若作普照待問而今如何拈棒趂出免見互相鈍置白巖符云雪巖末上若不與一拶豈不失却青州雖然猶缺辣手當時待道如生冤家何不向道和尚今日瓦解氷消青州雖有惡水管取無處澆潑雪巖後造王山問洞山於覩影處悟邈師真意旨臨濟於徹困處悟佛法無多子如何後來出世為人立甚正偏君臣玄要人境無乃反惑亂人乎山笑曰子欲了此生死病源既於徹悟處與為人處自生惑亂則生死病根如何斷得古人所謂不疑言句是為大病子今既疑則病發矣子知此病即子藥乎巖於是坐臥不寧久之一日讀洞山兼中到頌曰折合終歸炭裏坐乃忽然契悟曰今日方知病即藥也呈解於山山曰料掉沒交涉巖曰者老漢此回瞞我不得也天界盛云草頭方子撞釆醫得一個也拈拄杖云還有要識者草頭方子者麼卓一卓云料掉沒交涉白巖符云大疑大悟不疑則不悟雪巖既疑矣悟矣且道還諦當也無直饒道此回瞞我不得殊不知早被王山籠了也山僧與麼批判還有為雪巖作主者麼良久云設有也是料掉沒交涉青二十二燕京報恩萬松行秀禪師青二十二雪巖滿嗣示衆機輪轉處智眼猶迷寶鏡開時纖塵不度開拳不落地應物善知時兩刃相逢時如何回互愚菴盂云遍身綺羅者不是養蠶人報恩示衆去則留住住則遣去不住不去渠無國土何處逢渠在在處處且道是什麼物得恁麼奇特愚菴盂云稱錘蘸醋報恩示衆動則埋身千丈不動則當處生苗直須兩頭撒開中間放下更買草鞋行腳始得愚菴盂云曾經三峽猿啼處不是愁人也斷腸報恩示衆踢翻滄海大地塵飛喝散白雲虗空粉碎嚴行正令猶是半提大用全彰如何施設愚菴盂云琉璃殿上無知識報恩示衆向上一機鶴冲霄漢當陽一路過新羅直饒眼似流星未免口如匾檐且道是何宗旨愚菴盂云閉眼食蝸牛一場酸澀苦報恩問僧俱胝竪指意旨如何僧乃竪一指恩曰祇者個更別有僧無語恩便喝出龍唐柱云措大漢子隨人語脈裏走不識轉身一路待云祇者個更別有便縮却指頭不惟與俱胝相見亦乃使天下人摸索不著報恩問僧洞山道龍吟枯木異響難聞如何是異響曰不會恩曰善解龍吟崇先奇云報恩老人雖別音響怎奈缺一著在者僧善解龍吟只是不知時節仔細看來也是別寶遇著瞎波斯報恩因僧問撒手那邊底人為什麼不居正位恩曰大功不宰曰回頭者畔底人為什麼不墮偏方恩曰至化無為白巖符云芳花叢裏不措一足萬年牀上懶去安眠獨許萬松個漢盡大地人無敢論量雖然你若作正偏回互會墮拔舌犁耕地獄有日在青二十三西京少室雪庭福裕禪師青二十三報恩秀嗣因僧問如何是祖師西來意庭曰待乳峰點頭即向汝道愚菴盂云乳峰點頭也道個什麼火裏䳭鷯吞大蟲龍唐柱云天華則不然有問如何是祖師西來意即向他道直待乳峰點頭亦不向汝道崇先奇徵云為是答者僧語為是別有道理者僧當時若果然會去乳峰至今橫點頭竪點頭若也不會祖師歸天竺久矣雪庭因僧問如何是向上尊貴一路庭曰漁歌驚起沙汀鷺飛出蘆花不見蹤愚菴盂云一字入公門九牛拔不出崇先奇云有人透得過者可辨語滲漏白巖符云與麼答話諸方盡作向上尊貴語會還諦當也未苟不曾認得皓布裩面目清楚要與他雪庭老漢相見千里萬里青二十四西京少室靈隱文泰禪師青二十四雪庭裕嗣上堂塵劫來事只在於今河沙妙德總在心源試教伊覿面相承便不解當風拈出且道過在什麼處卓拄杖曰祇為分明極翻令所得遲愚菴盂云只如靈隱還拈得出麼若拈得出何不略借一觀若拈不出河沙妙德向何處去也隔墻恩怨如何說獨抱琵琶月下彈龍唐柱云大小靈隱將差珍異寶撒出當陽供養諸人了也拈拄杖云看看見之不取思之千里崇先奇云大小靈隱只見錐頭利不見鑿頭方白巖符云逆來則瞋順來則喜甚處不是覿面相承處更要當風拈出作麼泰翁與麼說話大似要人頭上安頭驀竪拂子云決定是見擊案云決定是聞良久云不可更頭上安頭也乃擲下拂子青二十五西京還源寶應福遇禪師青二十五少室泰嗣因僧問如何是西來的的大意應曰風送泉聲來几畔月移花影到窗前愚菴盂云大小祖師引人向聲色裏作窠臼好與三十棒除却聲色也好與三十棒祇如愚菴聻點石化為金玉易勸人除却是非難南山寶云有能向者裏點得寶應老落處出方知釋迦掩室維摩杜口總是不守本分底人龍唐柱云轉功就位轉位就功則不無寶應若問山僧更有入理底句寒松盡夜無虗籟老鶴移棲空月巢崇先奇云寶應老人平常六韜三略七事隨身恁麼答話大似坐觀成敗然雖如是還覺腦門重麼青二十六南陽香嚴淳拙文才禪師青二十六寶應遇嗣因僧問如何是理法界嚴曰虗空撲落地粉碎不成文如何是事法界嚴曰到來家蕩盡免作屋中愚如何是事理無礙法界嚴曰三冬枯木秀九夏雪花飛如何是事事無礙法界巖曰清風伴明月野老笑相親崇先奇云香嚴老人只知指疆畫界不覺通身水泥者僧會即會也是紙上富貴若是四法界未夢見在白巖符云盡謂香嚴老漢被者僧扯入葛藤窠裏東兜西搭殊不知善言言者言滿天下無口過還知者老漢舌根不動處麼良久云切忌道山僧饒舌香嚴嘗讀證道歌至幻化空身即法身處豁然契悟愚菴盂云若向者裏悟去披毛戴角有日在龍唐柱云不離花下路便見洞中春會麼山僧借手行拳去也乃舉長蘆上堂云幻化空身即法身遂作舞云見麼見麼恁麼見得過橋村酒美又作舞云見麼見麼恁麼不見隔岸野花香且道香嚴悟底與長蘆道底還有差別也無青二十九西京少室俱空契斌禪師青二十九凝然改嗣僧問如何是空劫已前底事空曰烏龜向火愚菴盂云料掉沒交涉且道過在主家賓家者裏明得方許你會空劫已前底事如或不明且看烏龜向火龍唐柱云恁麼舉揚還當得空劫已前事麼天色稍晚各自歸堂參取好鳳山啓云五月五日午時節赤口白舌盡消滅崇先奇云者僧當時悟去可以隨處作主若更去東卜西卜則病在心頭青三十四建昌壽昌無明慧經禪師青三十四廩山忠嗣問僧趙州道臺山婆我為汝勘破了也畢竟勘破在什麼處僧曰和尚今日敗缺了也昌曰老僧一生也不奈何好教你知若實會舉似來看僧擬進語昌打一棒云者掠虗漢棲霞成云臺山一案拈却多少人鼻孔換却多少人眼睛者僧也解詐明頭及乎老漢拈出個柴頭向他面前一吹直得退身無路且道者一棒他還知落處麼白巖符云可惜者僧有前無後當時若是個善始善終底待道老僧也不奈何便好向道轉見不堪拂袖便出管教者老漢刮目相待崇先奇云臺山路惟趙州與壽昌老人親履實踐故不與路為讐可惜者僧當時舍近求遠遂成周遮若是臯亭待他道老僧一生也不奈何但云和尚更須買草鞋行腳不圖勘破壽昌并得參見趙老青三十五越州雲門顯聖湛然圓澄禪師青三十五大覺念嗣因鶴林參五臺山達觀可盤桓夜深次觀曰你信得及麼鶴曰信得及觀曰既信得及請將法華經拋入尿桶看鶴如所言諸方疑駭門往勘之問鶴有此事否鶴曰實有此事門曰汝信得及麼鶴曰信得及門曰既信得及割取頭來鶴不知所措門曰虗頭禪客觀聞曰阿耶阿耶鶴林萬劫地獄雲門一語出之矣東明際云此二尊宿一人有殺人刀無活人劒一人亦有殺人刀亦有活人劒若人撿點得出許伊具擇法眼寶壽方云二老漢生平氣吞宇宙雖嶽偃湫傾無能動其絲髮乃被一孟八郎轉却而所謂生平氣宇向什麼處去也廣潤融云雲門一語雖出鶴林萬劫地獄又纍天下老和尚及大地有情無情齊陷阿鼻還有跳得出者麼一僧云廣潤長老聻潤便打雲門因僧問如何是異類中行門曰輕打我輕打我僧曰我會也門曰你作麼生會僧遂作驢鳴天目律云師翁生平發一機垂一語如金剛圈栗棘蓬直是無你攢簇處因甚到者裏被人一拶便乃入泥入水寶壽孫又且不然如何是異類中行便與他一把草他若眼目定動向道者畜生草料也不識崇先奇云者僧雖善步趨猶缺返擲撿點將來也是邯鄲學唐步白巖符云雲門師翁一生眼腦端正氣宇清明無端引者僧向瞎驢痛馬隊裏作活計不肖孫則不然設有問如何是異類中行向他道木作頭泥水作頭解作頭石作頭雲門在雲棲棲舉高峰海底泥牛話問門曰他道內有一句能縱能奪能殺能活你且道是那一句門推出旁僧曰大衆證明棲頷之愚菴盂云彼時此語傳之海內直得須彌山震動大洋海波翻阿修羅手擎日月高聲唱云邪正不分過由旁僧崇先奇云披沙揀金還他雲門老人眼親手快若是內中一句能縱能奪能殺能活莫道雲棲便是高峰老漢亦拈不出何故聻大衆證明龜山宣云雲棲借馬行追雲門當風指出二老與麼相見五湖衲子便宜多矣然就中一句子畢竟未能指出雲門在雲棲時因津送亡僧回棲問衆曰亡僧遷化向什麼處去門出衆曰謝和尚掛念愚菴盂云雲門老漢雖善機宜還須替者僧入涅槃堂始得雲門因僧參乃問你行腳事作麼生僧畫一圓相門劃破圓相僧敲桌三下門却畫一圓相僧又敲桌三下門又重畫三圓相僧以手抹却門曰離此之外別道一句看僧擬議門便喝出東明際云者僧將成九仞之山不進一簣之土崇先奇云王者之師有征無戰者僧不識大命擅自對壘及乎被雲門老人大書露布方肯束手歸降錦德寒云我若作者僧待道離此之外別道一句看拂袖便出雲門一日上堂說法畢忽召衆曰還有問話者麼若有出來我祇要打草驚蛇僧才出門曰真是一場業地卓拄杖便下座愚菴盂云者老漢圖得一時俊快不顧後人撿點者片地從古至今何曾清淨得來偶然一時打草却被者僧靠倒雲門因雪嶠大師問如何是殺人刀門曰布鼓當軒誰敢擊如何是活人劒門曰雖然後學也堪為東明際別前語云照顧汝頭別後語云快走快走雲門因中丞蘇雲浦問鴛鴦繡出從君看不把金針度與人如何是金針門曰我在京師走一遭不曾遇著一人浦復問門曰古佛過去久矣崇先奇云雲門老漢金針暗擲辜負鴛鴦獨宿者俗漢錦衣夜行不思故國風光鳳山啓云祥麟不踐生草大鵬耻宿雞棲囓鏃之機驚羣之句誰敢追風但末梢頭太煞老婆若是不肖待復問便與一棒教者俗漢疑三十年海門涌云雲門不合將精金雜以沙賣諸人請另出一隻手信州博山無異元來禪師青三十五壽昌經嗣因壽昌以玄則禪師答僧問龍吟霧起虎嘯風生話命頌山衝口頌云殺活爭雄各有奇模糊肉眼曷能知吐光不遂時流意依舊春風逐馬蹄昌頷之棲霞成云掀翻海嶽須還地之才驅走雷霆要有滔天之作博山此頌地之才有矣滔天之作具矣要五百年名世鳳舞岐山十萬里傳心龍吟枯木又須別有話會處始得建陽東苑慧臺元鏡禪師青三十五壽昌經嗣因有省以偈呈壽昌曰識破不值半文錢可憐摸索幾多年宗流盡是欺心漢說甚祖師別有禪昌曰識得破果然不值錢你且道那裏是趙州勘破婆子處苑厲聲曰和尚莫作怪昌為大笑曰參禪要到者一著始不受人牢籠苑禮拜棲霞成云東苑老人被壽昌冷地一錐若無後語禍事禍事白巖符云東苑所供既實壽昌乃又向無頭對處揑出冤辭自非撫心無愧者則勘鞫臨場又安能當抵雖然末上一機未免彼此鈍置
