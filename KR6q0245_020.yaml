body:
  text: 古杭白巖嗣祖沙門淨符彚集南四鎮州臨濟義玄禪師南四黃檗運嗣問黃檗如何是佛法的的大意聲未絶檗便打如是三度問三度被打不契遂辭去檗指見大愚愚問甚處來濟曰黃檗來愚曰黃檗有何言句濟曰某甲三度問佛法的的大意三度被打不知某甲有過無過愚曰黃檗與麼老婆心切為汝得徹困更來這裏問有過無過濟於言下大悟乃曰原來黃檗佛法無多子愚搊住曰這尿牀鬼子適才問有過無過如今却道黃檗佛法無多子你見個甚麼道理速道速道濟乃於大愚肋下築三拳愚拓開曰汝師黃檗非干我事濟遂回黃檗檗見便問這漢來來去去有甚了期濟曰祇為老婆心切檗問甚處去來濟曰昨蒙和尚慈旨令參大愚去來檗曰大愚有何言句濟遂舉前話檗曰大愚這漢饒舌待來痛與一頓濟曰說甚待來即今便打隨與一掌檗曰這風顛漢來這裏捋虎鬚濟便喝檗喚曰侍者引這風顛漢參堂去溈山祐舉問仰山臨濟當時得大愚力得黃檗力仰云非但騎虎頭亦解把虎尾中峰本云汝師黃檗非干我事大愚肋下更合喫拳這風顛漢來這裏捋虎鬚黃檗面門猶缺一掌致使尿牀鬼子邪見勃興賺他後代兒孫一個個鼓粥飯氣白巖符云臨濟大似從禹門霹𮦷聲中立見霧拏雲於九霄之上其得意亦至矣然細檢將來猶未脫黃檗網子在具眼者試辨看廣胤標云金烹大冶玉出藍田養子之緣輸他黃檗好手劒刃翻身須是臨濟白拈語云福生有基禍生有胎不其然乎臨濟在滹沱河側住院一日謂普化克符二上座曰我欲於此建立黃檗宗旨汝且成褫我二人便珍重下去三日後普化却上來問和尚三日前說什麼濟拈棒便打三日後克符上來問和尚前日打普化作甚麼濟亦打長蘆仁云普化克符不可放過臨濟老人放過不可若是且菴一生擔板無人成褫然雖恁麼須知遠烟浪別有好商量天童忞云一賓一主一挨一拶生鐵鑄就渾剛打成建立黃檗宗旨發明從上心髓須是這般漢但惜二人珍重下去臨濟不與當下勦絶致令後人向三日前三日後弄精魂今日山僧路見不平不免為伊勦絶去也諸仁者山僧亦欲於此建立天童宗旨敢問諸人作麼生成褫山僧好為復珍重下去耶為復三日後上來耶為復從東過西耶為復良久默然耶為復拂袖出堂耶為復繞座三匝作女人拜耶為復揚眉瞬目豎指擎拳耶為復掀倒法座喝散大衆耶上來做處總是弄精魂畢竟作麼生出隻手眼共山僧建立宗旨聻還會麼鶴有九臯難翥翼馬無千里謾追風古南門云河北正宗機如掣電而克符普化乃當場不戰陳後興兵要成褫臨濟未得在山僧今日欲於本山建立臨濟宗旨或有個衲僧見義勇為單刀直入上前云和尚道什麼山僧劈脊便棒或有第二員衲僧上前云和尚適來為甚打這僧山僧也劈脊便棒且道與臨濟相去多少驀拈拄杖云棒頭有眼明如日要識真金火裏看佛日晳云握閫外威權據寰中正令不無臨濟若是建立黃檗宗旨大遠在何故既是建立宗旨因甚只要二人成褫晳上座恭奉綸音於此建立天童宗旨已賴聖天子出一隻手祇如現前大衆又作麼生成褫卓拄杖云潑天門戶同撐起萬國來賓法海寬演教泐云臨濟縱寰中殺活握閫外威權直得氣槩驚羣風標獨立建立宗旨則不無仔細檢點將來也是賊過後張弓臨濟示衆夫為法者不避喪身失命我於先師處三度問佛法的的大意三度被打如蒿枝拂相似如今更思一頓誰為下手時有僧出曰某甲下手濟拈拄杖度與僧擬接濟便打雪竇顯云臨濟放去較危收來太速五祖戒云臨濟大似貧兒思舊債雪竇宗云且道臨濟今日用底棒與當時喫底棒是同是別若道同孤負他黃檗若道別屈他臨濟若也盡其機來且道在阿誰分上乃拈拄杖云退後退後靈隱嶽拈拄杖云臨濟據令而行不知孤負黃檗雪竇盡力擔板也只見得一邊且道薦福節文在甚麼處擲下拄杖徑山琇云臨濟固是貧兒思舊債這僧渾若餓狗喫縴纏雪竇道臨濟放去較危收來太速醉我落花天借他絃管裏南堂欲云說什麼放去較危收來太速雖知臨濟有陷虎機這僧未具透關眼待道再思一頓誰為下手便與掀倒禪牀非惟塞斷這老漢咽㗋抑且出身有路伏龍長云雪竇靈隱二尊宿一人聾雙耳朵一人瞎隻眼睛不惟辜負臨濟亦乃喪我兒孫無明今日路見不平且要與渠雪屈良久云不得動著動著打折你驢腰通玄奇云臨濟若官居相位不忘落魄之時這僧恰似寒微庶子擬作侯門之客寶掌白云臨濟大師貴買賤賣不勝潦草這僧抗節衝鋒不顧喪身失命祇如道蒿枝拂相似意作麼生雲鬟梳未整香滲露花枝清化嶾云這僧也是個初生犢兒不畏虎若是個見義勇為底漢當時奪轉棒頭何處更有臨濟龍華體云臨濟誘人犯法固非好手這僧棒雖喫要且不甘東塔熹云大小臨濟若無這僧幾乎一場懡㦬雖然我若作這僧待道再思一頓誰為下手便拽下禪牀痛與一頓看伊如何合煞五峰甫云大小臨濟與麼做處雖謂頭正尾正爭奈鼻孔在這僧手裏臨濟見僧來舉起拂子僧禮拜濟便打又有僧來濟舉起拂子僧不顧濟亦打又有僧來濟舉起拂子僧曰謝和尚指示濟亦打雲門偃代云祇宜老漢大覺云得即得猶未見臨濟機在愚菴盂云有賓有主有照有用其中一棒超諸佛之先一棒為列祖頂門一棒撐天拄地若人揀辨得出許伊為臨濟兒孫旁僧云這老漢這裏是什麼所在分先分後論佛論祖盂便打趂出臨濟因普請鋤地次見黃檗來拄钁而立檗曰這漢困那濟曰钁也未舉困箇甚麼檗便打濟接住棒一推推倒檗乃喚維那扶起我來維那扶起曰和尚爭容得這風顛漢無禮檗却與維那一掌濟遽钁地曰諸方火葬我這來活埋仰山寂云正賊走却邏贓人喫棒溈山哲云黃檗倒地維那扶起火葬活埋清風未已三交嵩云正狗不偷油雞銜燈盞走通玄奇云臨濟喫棒亦快黃檗喫跌甚甘唯代罪者不得辭其責臨濟與麼道太煞欺人白巖符云城門失火殃及池魚大有恁麼事且置勿論一等家富兒驕實謂難為情理還有與黃檗出一隻手者麼有僧才出巖云你擬放驕麼直打出方丈臨濟栽松次黃檗曰深山裏栽許多松作麼濟曰一與山門作境致二與後人作標榜道了乃將鋤頭築地三下檗曰雖然如是子已喫吾三十棒了也濟又築地三下噓一噓檗曰吾宗到汝大興於世溈山云臨濟與麼大似平地喫交雖然如是臨危不變方稱丈夫黃檗云吾宗到汝大興於世也是憐兒不覺醜天童華云黃檗道雖然如是子已喫吾三十棒養子之緣固當如是臨濟正令雖行可惜甘向钁頭邊活埋應菴今日捋下面皮要與諸人相見驀拈拄杖卓一卓云驚羣須是英靈漢敵勝還他獅子兒臨濟上堂赤肉團上有一無位真人常在諸人面門出入未證據者看看時有僧出問如何是無位真人濟下禪牀搊住曰道道僧擬議濟托開曰無位真人是什麼乾屎橛便歸方丈雪峰存云臨濟大似白拈賊雪竇顯云善竊者鬼神莫知既被雪峰覷破臨濟不是好手召衆云雪竇今日換却你諸人眼睛了也你若不信各歸寮舍裏自摸索看琅瑘覺云臨濟可謂氷稜上度九𨸰劒刃上得全身天寧琦云臨濟若無後語洎被打破蔡州雖然家無白澤之圖必無如是妖怪仰山欽云臨濟如金翅劈海直取龍吞則且置祇如這僧被臨濟扭住畢竟是有語無語見月休觀指歸家罷問程龍翔訴云兩鋒相直者不虗發由基之箭斫堊不變者始可運郢人之斤臨濟尋常氣宇如王却作小廝兒戲幾乎法道遇大風而止龍翔今日作死馬醫無位真人築著磕著證據將來依然是錯且道是臨濟錯龍翔錯從教天下人卜度天寶樞云無位真人乾屎橛臨濟未是白拈賊千古長如白練飛一條界破青山色烏石道云臨濟具羅龍手段陷虎機關怎奈被者僧看破雖然他道無位真人是什麼乾屎橛又作麼生卓拄杖云黃花開滿地遍界盡鋪金南堂欲云殺人刀活人劒乃上古之風規亦今時之樞要龍睛鶻眼一覷覷破便可驅耕夫之牛令他苗稼滋盛奪饑人之食令他永絶饑虗政如上將軍臨陳破敵掣鼓搴旗寸刃不施橫尸萬里直教四夷入貢八表來降豈不是大丈夫兒成就大丈夫事其或未然莫把是非來辨我浮生穿鑿不相干古南門云往往道臨濟大師是個白拈賊且道曾竊得個什麼雪竇云既被雪峰覷破且那裏是覷破處古南今日雖不及古人善竊却與諸人分明說破乃拽拄杖一時打散金粟元云臨濟放去較危收來太速若也識得面門出入是無位真人若也不識無位真人亦在面門出入識未識且置乾屎橛作麼生道靈隱禮云大慧與麼道大似帝釋尊天復三有大城未須奮杵震威便把斷要津了也還委悉麼喝一喝云不看頑石吞金鏃那識將軍射虎心龍華體云者僧當時若是個漢待臨濟才下禪牀便與震威一喝管教者漢進前無路退不容身雖然臨濟且放過一著雪峰雪竇遞相作竊放過不可乃驀拈拄杖一時打散資福廣云此段話吾不取其放而獨取其收何謂也蓋為伊有當斷不斷不招其亂的劒崇慶古云臨濟婆心片片未免平地骨堆當時賴是者僧若是個漢待道無位真人是什麼乾屎橛便與劈面掌云者漢錯下名言管取臨濟退身有分西遁超云臨濟大師一生虎鬚拗龍角何今日便為人下注腳當時我若在即拍手大笑云者老漢著甚死急不打自招白巖符云大小臨濟放去若憨收來最捷直是個水面上葫蘆轉轆轆地那裏有你捉摸處雖然於他無位真人只好作個下使曹山雍云臨濟胸藏韜略收放自如固為好手者僧雖然排闥直入不顧危亡可惜龍頭蛇尾當時待他擒住便好與一掌直饒臨濟有陷虎之機也須倒退三千里海門廣云大小臨濟一面添花錦上一面腦後抽釘若是無位真人要且未在西渡金徵云既是無位真人因甚在赤肉團上試撿點看臨濟問院主什麼處去來曰州中糶黃米來濟曰糶得盡麼曰糶得盡濟以拄杖劃一劃曰還糶得者個麼主便喝濟便打適值典座至濟舉前話座曰院主不會和尚意濟曰你又作麼生座禮拜濟亦打黃龍南云寺主下喝不可放過典座禮拜放過不可臨濟令行歸宗放過三十年後有人說破黃龍新云典座禮拜有過無功院主一喝有功無過既是有功為甚麼却被打棒頭有眼明如日要識真金火裏看天童華云二尊宿雖則力提綱要撿點將來未免依草附木殊不知大小臨濟被者兩個漢破家散宅西禪需云院主一喝電卷雷奔山摧地裂典座禮拜雲收雨散月白風清雖然如是因什麼總被痛棒不見道臥龍才奮迅丹鳳便翱翔報恩秀云院主被棒賞不避仇讐供養主蒙恩誅豈擇骨肉天童悟云臨濟大師謾他一點不得且什麼處是謾他不得處乃拈拄杖云棒頭有眼明如日要識真金火裏看遂擲下廣教玉云院主典座雖竭力擔荷怎奈臨濟當時祇令行一半若據令盡行何處更有今日你諸人還曾夢見麼乃拈拄杖一齊打散慧雲盛云院主下喝典座禮拜各有見處臨濟乃俱不放過何也黃金自是黃金價怎肯和沙混賣人臨濟上堂有一人論劫在途中不離家舍有一人離家舍不在途中阿那個合受人天供養徑山杲云賊身已露雲巖游云識取鈎頭意莫認定盤星徑山及云臨濟見處偏枯果然只具一隻眼山僧昨抵昌國訪諸官寮從東過西從西過東波波挈挈竟日只在途中且如何說個不離家舍比日歸來山門頭合掌佛殿裏燒香穿僧堂入厨庫總是自家屋舍又如何說個不離途中衲僧家只要據實而論若不據實而論謂之脫空謾語漢怎受人天供養隆教與麼告報也是小脫空且平實一句作麼生道乃云從來不唱脫空歌把火燒山拾田螺白榔樹梢魚扇子急水灘頭鳥作窠好大哥以拂子擊禪牀一下雲居莊云離家舍不離家舍在途中不在途中即不論山僧道盡大地止有一人合受人天供養諸人還識那一人麼擊拂子云莫教開却眼子過新羅天界盛云者小廝兒與麼說話更要喫蒿枝在天童忞云臨濟大師話墮了也還有檢點得出者麼若也檢點得出許你與伊同參合受人天供養如或未然喝一喝云莫把是非來辨我浮生穿鑿不相干臨濟因一老宿參乃曰禮拜即是不禮拜即是濟便喝宿便拜濟曰好個草賊宿曰賊賊便出去濟曰莫道無事好時首座在傍濟乃問還有過也無曰有濟曰賓家過主家過曰二俱有過濟曰過在什麼處座便出去濟曰莫道無事好南泉願云官馬相踏保寧勇云者一羣賊其間有正賊有草賊且道那個是正賊那個是草賊還辨得麼口欵易招贓物難認護國元云老宿身挨白刃臨濟功不虗施首座不善旁觀惹得一身泥水雖然如是且道前頭無事與後頭無事相較幾何於此緇素分明不但穿却臨濟鼻孔亦許你眼光爍破四天下其或未然莫道無事好臨濟因黃檗入厨問飯頭作什麼曰揀衆僧米檗曰一日喫多少曰二石五檗曰莫太多麼曰猶恐少在檗便打飯頭舉似濟濟曰與汝勘過者老漢乃往見檗檗舉前話濟曰飯頭不會請和尚代轉一語檗曰汝但舉濟曰莫太多麼檗曰來日更喫一頓濟曰說甚來日即今便喫遂與檗一掌檗曰者風顛漢又來者裏捋虎鬚濟喝一喝便出去溈山祐云養子方知父慈仰山寂云黃檗大似勾賊破家寶壽方云臨濟者漢慣得其便大似家富兒驕正眼看來古佛家風又何止掃土而已臨濟示衆你要與佛祖不別但莫外求你一念清淨心光是你屋裏法身佛一念無分別心光是你屋裏報身佛一念無差別心光是你屋裏化身佛此三種身是你即今目前聽法的人只為不向外馳求有此功用獅林則云大小臨濟原來是個弄光影底我當時若見便與一喝喝住掀倒禪牀非唯坐斷渠儂舌頭亦免後代兒孫向光影裏作活計白巖符云盡謂臨濟宗單主直截痛快視他家稍涉語言便貶為聯纖為葛藤使其讀大師此語又當何如獅林雖能子為父隱然亦祇知其一不知其二殊不知大師乃善言言者濶大波瀾如大海焉無物不具豈小家兒得一升喫一頓者可得而知之哉臨濟曰我有時一喝不作一喝用獅林則云字經三寫烏焉成馬老僧一喝只作一喝用臭肉爛鮓賣與要者有過無過諸人試定當看喝一喝臨濟曰一喝分賓主照用一時行昭覺勤喝一喝云且道是賓是主是照是用還委悉麼千峰勢到嶽邊止萬派聲歸海上消城山洽喝一喝云且道是賓是主衆中道賓主歷然我要問他如何是歷然底事擬議不來劈脊便棒何故不見道照用一時行臨濟聞德山示衆曰道得也三十棒道不得也三十棒謂洛浦曰你去問他道得為什麼也三十棒待伊打你便接住棒推一推看他作麼生浦如教而問德山便打浦接住推一推德山便歸方丈閉却門浦回舉似濟濟曰我從來疑著者漢雖然如是你還識德山麼浦擬議濟便打雲居齊云只如臨濟道我從來疑著者漢是肯語是不肯語為當別有道理試斷看白巖符云者赤稍鯉不唯蹉過德山亦乃蹉過臨濟若是符上座當時待德山歸方丈閉却門便好向門上書箇封字歸來待臨濟道你還識德山麼便震聲一喝拂袖而出雖然還知臨濟德山總被洛浦一狀領過麼臨濟因兩堂首座相見同時下喝時有僧問還有賓主也無濟曰賓主歷然廣慧璉云兩堂首座相見同時下喝諸人且道還有賓主也無若道有祇是個瞎漢若道無亦是個瞎漢不有不無萬里崖州若向者裏道得也好與三十棒若道不得亦與三十棒衲僧家到者裏作麼生出得山僧圈繢良久云苦哉蝦蟆蚯蚓𨁝跳上三十三天撞著須彌山百雜碎拈拄杖曰一隊無孔鐵錘速退速退承天宗云臨濟此語走殺天下衲僧我即不然當時見問還有賓主也無但云一對無孔鐵錘大溈智云作麼生是賓主歷然底道理若也會得一雙孤鴈撲地高飛其或未然一對鴛鴦池邊獨立天童覺云殺人刀活人劒在臨濟手裏雖然如是當時道賓主歷然便與震威一喝直饒大騁神通也只得同聲相應愚菴盂云試檢點看那家是賓那家是主何處是賓主互換若道無賓主現道賓主歷然若道有賓主同時一喝向何處分賓分主卓拄杖一下喝一喝云我者裏也有賓有主有照有用若檢點得出可與二首座同參有麼有麼否則山僧自道去也復喝一喝拽杖竟行雲菴悅云當時者僧見道賓主歷然便好與掀倒禪牀直饒臨濟別運機籌也須落二落三臨濟臨終謂衆曰吾遷化後不得滅却吾正法眼藏三聖出曰怎敢滅却和尚正法眼藏濟曰已後有人問你向他道甚麼聖便喝濟曰誰知吾正法眼藏向者瞎驢邊滅却溈山秀云古者忍死待來因何正法眼藏却向瞎驢邊滅却臨濟行計速速三聖又却匇匇因斯父子情忘遂使後人失望若不得流水還應過別山中峰本云認他財為己物將官路當人情濟之心亦濫矣三聖當時見他道不得滅却吾正法眼藏便與掩却臭口猶較些子乃云怎敢滅却噫以聖較濟又豈止濫而已哉報恩倫徵云祇如三聖與麼喝正法眼藏可窺不可窺見徹見不徹諸人試斫額看博山來云驅耕奪食須是滹沱補網張風還他三聖然要傳持他正法眼藏且緩緩雲巖學云臨濟問處孤危三聖答處超絶檢點將來臨濟老漢也是憐兒不覺醜臨濟問洛浦從上一人行棒一人行喝阿那個親浦曰總不親濟曰親處作麼生浦更喝濟便打仰山欽云二大老雖是啐同時要且未會轉身句或有問山僧如何是轉身句顧侍者云牢記取臨濟升堂有僧出濟便喝僧亦喝便禮拜濟便打翠巖芝云臨濟也心粗好彩賴是者僧若是今時衲僧且作麼生即得東禪觀云臨濟除是不作作則萬竅怒號者僧搏扶搖而上九萬里噫雲居莊云譬如水母無目求食須假於蝦明眼衲僧不妨辨取臨濟因僧問如何是吹毛劒濟曰禍事禍事僧禮拜濟便打白巖符徵云者僧禮拜是好心不是好心臨濟便打是吹風劒不是吹毛劒要做腳下兒孫者裏也不得草草臨濟見僧來乃豎起拂子僧禮拜濟便打翠巖芝云者僧有理難伸死而不弔且作麼生會如今作麼生與者僧出氣臨濟小參我有時奪人不奪境有時奪境不奪人有時人境兩俱奪有時人境俱不奪中峰本云有時奪人錯有時奪境錯有時人境兩俱奪錯有時人境俱不奪錯臨濟大師到者裏鎖却咽喉了也莫有為伊出氣者麼切忌將錯就錯臨濟曰我者裏是活祖師西來意一切臨時要用便用獅林則拈拂子搖拽示衆云我者裏也是活底要用便用一切臨時且道與臨濟是同是別以拂子一擊便擲下云臨濟猶缺者一著在車溪冲拈拄杖云我者裏一切臨時要用便用不論死活雖然以拄杖畫圓相云臨濟天如總出者個不得臨濟問僧甚處來曰定州來濟拈棒僧擬議濟便打僧不肯濟曰已後遇明眼人去在僧後參三聖才舉前話聖便打僧擬議聖又打天童華云臨濟三聖當時若有轉身句後代兒孫未至掃土驀拈拄杖云更有一個甚麼處去卓拄杖一下愚菴盂云竹上泉通竹下水㵎東花發㵎西紅廣教玉云諸方盡謂此僧少振作待濟拈棒直掀翻禪牀而出不惟坐斷臨濟舌頭亦可與三聖同參殊不知臨濟父子總被者僧看破臨濟曰第一句薦得堪與佛祖為師第二句薦得堪與人天為師第三句薦得自救不了天寶樞喝一喝云且道是那一句若喚作第一句自救不了喚作第二句萬里崖州喚作第三句定光金地遙招手智者江陵暗點頭石霜尊云石霜亦有三句第一句薦得紅爐飛片雪第二句薦得一劒定烟塵第三句薦得歸依佛法僧具眼者試辨看臨濟半夏上黃檗見檗看經濟曰我將謂是個人元來是唵黑豆老和尚住數日便辭去檗曰汝破夏來何不終夏去濟曰義玄暫來禮拜和尚檗便打趁令去濟行數里疑此事却回終夏後一日辭黃檗檗問什麼處去濟曰不是河南便歸河北檗拈棒濟約住遂與檗一掌檗呵呵大笑乃喚侍者曰將百丈先師禪板几案來濟曰侍者將火來檗曰不然你但將去已後坐斷天下人舌頭去在焦山體云賓主歷然師資道合輕來重答不墮常情分付禪板几案貴圖坐斷天下人舌頭正是憐兒不覺醜假饒索火燒却終不向別處托生會麼老婆心切呵呵笑一任傍人說短長臨濟示衆我有時一喝如金剛王寶劒有時一喝如踞地獅子有時一喝如探竿影草有時一喝不作一喝用你作麼生會僧擬議濟便喝天寧琦喝一喝云且道者一喝落在什麼處為復是金剛王寶劒為復是踞地獅子為復是探竿影草為復是一喝不作一喝用試辨看若辨不出報恩與你注破金剛王劒目前可驗擬議不來墮坑落塹踞地獅子直下便是打破髑髏拈却牙齒探竿影草好也不好左手扶起右手推倒有時一喝不作喝用大小臨濟只管說夢便與麼會猶缺一喝在喝一喝開先金云者僧擬議臨濟便喝還是金剛王寶劒還是踞地獅子還是探竿影草還是一喝不作一喝用者裏緇素得出權衡佛祖號令人天未為難事其或未然山僧更為你指出喝一喝東明際喝一喝云且道是金剛王寶劒耶是踞地獅子耶是探竿影草耶是一喝不作一喝用耶向者裏緇素得出許你具參學眼其或未然光陰迅速生死事大切須薦取復喝一喝臨濟因座主相看乃問業何經論主曰某甲荒虗粗習百法論濟曰有一人於三乘十二分教明得有一人於三乘十二分教明不得是同是別主曰明得即同明不得即別侍者洛浦曰者裏是什麼所在說同說別濟回問浦曰汝又作麼生浦便喝濟送座主回遂問適來是汝喝老僧那浦曰是濟便打廣胤標云洛浦可謂將成九仞功虧一簣當時待問是汝喝老僧那但向道劒去久矣管教臨濟老漢括目相待瓶山謙云我若作洛浦待問是汝喝老僧那便彈指三下不惟築斷者漢咽喉亦且自有出路
