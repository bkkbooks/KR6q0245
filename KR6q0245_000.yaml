body:
  text: 宗門拈古彙集序德山云吾宗無語句實無一法與人老瞿曇亦云吾於四十九年未嘗説一字則三藏十二部千七百則機緣又何從而得之此舉世之所難話會者自非額堂眼正肘後符靈則亦未易與言斯旨矣夫曰無語句而主賓問答布衫胡餅之説遍叢林曰未嘗説一字而金函玉軸炳然如日星是豈無所謂而然乎聞之云善言言者言雖滿於天下而無口過譬彼道火者終日齒牙脣舌終不之然則雖龍宮充棟雲水汗牛初未嘗有一字一句然後知瞿曇德山之所言斯有在矣會公云語帶玄而無路舌頭談而不談其此之謂歟吾宗自周行七步倒却剎竿以來流及支那葛藤遍地然實無一元字腳挂人脣吻所以腳下兒孫競從而舉唱之拈提之當舉椎豎拂電掣雷轟之際一揚一抑愈出愈奇要皆不可以意想測直是如日裏神珠光色無定詎捫空捕影輩可同日而語哉乃宋得建溪集之於前元古林續之於後曰宗門統要者其寬緩採擇各有指歸讀者不啻登妙峰之巔胸空天海不自知其為高且遠又如入娑羯羅龍宮差珍異寶璨然在目不自知其為身處富鄉然則是書即為吾宗之一大成固已足稱之況又從而彚集之乎符不敏墾掘餘念建溪古林之用心乃間取宋元迄今諸宗匠凡一拈一代一別一徵足以開鑿人天眼目者皆採而續之計四十有五卷題曰宗門拈古彚集蓋從瑪瑙階上更布赤砂猶之乎自江河而海海而滙於阿耨達池其汪洋浩瀚亦至矣而所謂多子塔前黃梅夜半所授受一件大事舍是則何異棄荊山而求卞璧直敢曰是集真吾宗之一大成洵非妄也或者曰古人接物亦有道而已此特糟粕耳事之奚為符曰然此固古人糟粕也古人之醇醴試呈我以一二可乎其人方鉗口結舌赧顏而退噫清淨寶月固不在標月者指端然自非徹見天心乃離指端而別覓又豈得哉後之有向此別具一隻眼徹見從上諸老一敲一拍之所自則視此集為糟粕又何不可康熙三年甲辰重九日廬陵嗣祖沙門淨符書於待堂宗門拈古彙集序世謂宗門一派起自鷲嶺拈華不知老瞿曇才落地來指地指天獨自稱尊之際早已將大千世界釘遍葛藤樁子矣譬射者之垛高不過三尺毋論穿楊繞樹手即黃口小童稍解彈亦忍俊不禁相與挾爛泥丸爭向千人萬人中百步奔騰博大聲一呼是豈止迦葉一人發此一枝蓬蒿乎四十九年羣矢亂飛老瞿曇直得東閃西避卒莫奈何幸而得全䇿保生告終雙樹詎意二千年後跛腳雲門突出要一棒打殺餧狗且紿曰貴圖天下太平哀哉瞿曇真是忍痛難伸禍出私門也然自達磨東渡六傳至曹溪出青原南嶽為二支二支不數傳又分為五宗五宗之徒出紛如逐鹿星分碁布插滿支那誰不高歌垓下密握帷中而還沛傷情孰有過於雲峰悅者然豫猶有微憾焉嘗謂雲門雖有出身之路且無定亂之謀此語非是借劍殺人蓋不欲辜偃老一棒耳世衰道微人稀土曠究將舉似阿誰甲辰秋客虎林得與白巖位中和尚敘草年之好兩宿寒燈高談千古始得一就正焉宗門統要一書自古林繼續之後海內宗匠作者如林皆未經收入白巖恐其散漫流落窮搜極討苦心百至成書四十五卷命曰宗門拈古彚集視統要為大全為法門遠架津梁可謂大有功於狂瀾一柱矣然亦不能無憂焉何則當此祖風濫觴日語頌則人人自謂乳峰宏智語拈則人人自謂昭覺萬松殊不知此四老者精華淳朴各擅其長而所謂繞樹穿楊得凌跨偃公悅老者則亦未必盡能無説也或曰白巖寶鏡當軒妍𡟎自別鏌鋣在握魍魎敢歬似不須臺下觀場為古人出淚嗟嗟豫非不知白巖有此二物也非白巖豫敢作此論哉讀斯集者知白巖之用心庶足以見先德於今日則吾道不亦重有望於後昆乎住金陵攝山棲霞禪寺嗣祖沙門大成題於虎林報國院中宗門拈占彚集凡例是書之集自有佛祖以來千七百則機緣經作家手拈掇一過不啻黃金增色真能使陳爛葛藤頓生光怪則拈掇語當尤重於機緣其命名獨曰宗門拈古者在是是集宋元以上諸師拈提語既載統要而宋元迄今諸師所未載者凡一拈一別一代一徵皆準統要成規次第續之其諸師有拈語而統要乏機緣者增補之統要有機緣而乏拈語者茲不録古今諸方語録其拈別代徵語有善本單刻流行者有載上堂小參等法語中者有成藁抄録尚未經梨棗者有散沒無聞僅考諸行狀銘者皆一一據實而録匪敢鑿空諸師拈語既皆璞玉渾金豈忍割棄苐於一公案下璨然一目雖等是卞璧而厚薄未免或分此採擇之不得不注意也至於辭旨雷同固可稱雙珠聯璧然亦不敢並存恐彼此致招蹈襲是書所重既歸作家手眼則去取責任敢不從公其能在本公案外別出手眼殺活自在則雖行者白衣不敢忽而不録若僅祇依摸畫樣無點鐵成金手段乏縱橫與奪鉗錘則雖現踞曲名震閭閻斷不能循其偏私阿諛泛採書稱彚集理必廣收苐深隱厚藏賢聖輩兼以地僻途遙其岸岸孤風既不屑為人所知人又豈能盡知之而所有高見遠識不獲搜討者他日天龍不負自當補入字經三寫烏焉成馬之失蓋所從來統要中有機緣脫誤拈語失真處稽諸燈録裁以祖意一皆考證的實決無疑溷燈譜世系既非此書所急而卷帙次第乃仍以南嶽青原世代分列者意在便學者易於撿討循世得人機緣自見蓋機緣出載必有其人耳公案凡師資主賓相見看其機用應屬誰家則收入誰家不是可互相那移者如淩行婆之斂手哭蒼天收在浮杯章中澧陽路上賣餅婆之三心中點那一心收在德山章中則於浮杯德山難為情矣又如羅山之問石霜巖頭起滅不停一則語載羅山章中固見其所悟之由有自若論接機作用又當收入巖頭章乃為其妥知此則公案之撿討自不煩於思繹淨符稽首宗門拈古彚集目録卷第一七佛