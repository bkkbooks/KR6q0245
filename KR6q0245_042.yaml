body:
  text: 古杭白巖嗣祖沙門淨符彚集南十一洪州黃龍慧南禪師南十一慈明圓嗣因化主歸上堂世間有五種不易一化者不易二施者不易三變生為熟者不易四端坐喫者不易更有一種不易是甚麼人良久曰聻便下座翠巖真時為首座藏主問適來和尚道第五種不易是什麼人真曰腦後見腮莫與往來天童傑云一手不獨拍兩手鳴摑摑豁開三要三玄揑碎佛祖標格村歌社舞得人憎勝似當年白拈賊天寧琦云山僧則不然第五種不易是甚麼人莫怪坐來頻勸酒自從別後見君稀雪竇雲云是則是猶有者個在今日有問雪竇第五不易是什麼人但向道老僧隨例餐䭔子也得三文買草鞋五磊權云二大老與麼答話美則甚美了則未了山僧則不然第五不易是什麼人無漏國中留不住浮幢王剎任分身石霜尊云或有問山僧第五不易是誰向道有眼無耳朵六月火邊坐黃龍因僧問德山棒臨濟喝直至如今少人拈掇請師拈掇龍曰千鈞之弩不為鼷鼠而發機曰作家宗師今朝有在龍便喝僧禮拜龍曰五湖衲子一錫禪人未到同安不妨疑著百丈泐云黃龍一向具咬猪狗底手腳今日被者僧折倒既是千鈞之弩不發鼷機為甚輕為破的具眼者分辨看黃龍示衆有一人朝看華嚴暮觀般若晝夜精勤無有暫暇有一人不參禪不論義把個破席日裏睡如是二人同到黃龍一人有為一人無為安下那一個即是良久云功德天黑暗女有智主人二俱不受天童忞云山僧不比黃龍小家子禪如是二人同到能仁一齊安下何故海濶從魚躍天空任鳥飛佛川義云智眼精明門庭孤峻須讓黃龍撿點將來猶缺大人之相且道野山者裏又作麼生擊拂子云但願春風齊著力一時吹入我門來黃龍室中嘗問僧曰人人盡有生緣上座生緣在何處正當問答交鋒却復伸手曰我手何似佛手又問諸方參請宗師所得却復垂腳曰我腳何似驢腳三十餘年示此三問學者莫能契其旨叢林目為三關龍翔欣云黃龍三關如商君立法法雖行而先王之道廢矣故當時出其門者甚多得其傳者益寡使其恪守慈明家法子孫未致斷絶白巖符云陽春雪曲無能和者村歌舞社到處與人合得著龍翔深悉此意故為如是語若曰曹溪波浪如相似無限平人被陸沉則龍翔失言又其甚矣蓋黃龍用處敏捷不落窠臼斯所以為慈明諍子而乃曰使其恪守慈明家法子孫未致斷絶噫是何言之厲且過也吾所不敢聞命瑞鹿信云我手何似佛手上大人丘乙己我腳何似驢腳化三千七十士人人有個生緣爾小生八九子上座生緣在甚麼處佳作仁可知禮也復云黃龍設三關撈摝四海英靈大似布縵天網被山僧一時收下了也現前大衆還委悉麼鴛鴦繡出從君看不把金針度與人袁州楊岐方會禪師南十一慈明圓嗣因僧問如何是佛岐曰三腳驢子弄蹄行曰莫祇者便是麼岐曰湖南長老徑山琇云大小楊岐被者僧一問未免手腳俱露雲門信云要會三腳驢子落處須向驢胎馬腹裏走一遍來見楊岐始不難能仁鑑云盡謂楊岐答話奇特殊不知却被者僧勘破悲華恁麼道有為楊岐作主底麼白巖符云剖破籓籬別開潑天門戶還他楊岐老作然只答得佛邊事若是佛向上事此去殑伽河十萬八千未為遠楊岐上堂楊岐乍住屋壁疏滿床盡撒雪真珠縮却項暗嗟吁良久曰翻憶古人樹下居龍唐柱云會長老親見慈明將謂有多少奇特遇茲境緣便打不過未免長吁短歎山僧乍住龍唐上無片瓦旁無四壁烟雲堆裏坐臥經行舉頭天外自在逍遙慶快諸禪德桃花流水杳然去別有天地非人間楊岐在九峰受請下座九峰勤和尚把住曰且喜今日得個同參岐曰作麼生是同參底事曰九峰牽犂楊岐拽杷岐曰正恁麼時楊岐在前九峰在前峰擬議岐拓開曰將謂同參元來不是天寧琦於擬議處代峰便喝龍翔欣云楊岐九峰塤篪迭奏今古罕聞龍翔今日對衆舉揚貴要大家知有且道知有個什麼祖翁田地無多子努力同心兩弟兄石塔忍云者兩個尊宿骨肉操戈不顧旁觀者哂怎似我其天和尚甜言美語逼得鮎魚上竹竿略無𢌞避處雖然在前在後固無論祇如弟遂兄高又且如何良久云板拍相催難縮手當風妙叶貴知音河渚謙於擬議處代峰云念你今日新做長老楊岐一日問白雲端你受業師為誰端曰茶陵郁和尚岐曰聞伊過橋遭攧有省作偈甚奇能記否端為誦曰我有明珠一顆久被塵勞關鎖今朝塵淨光生照見山河萬朵岐笑而趨起端愕然通夕不寐黎明咨詢之適歲暮岐曰汝見昨日打毆儺者麼端曰見岐曰汝一籌不及渠端益眩然乃問曰畢竟意旨如何岐曰渠愛人笑汝怕人笑端大悟護國元云楊岐大笑眼觀東南意在西北白雲悟去聽事不真喚鐘作瓮撿點將來和楊岐老漢都在架子上將錯就錯若是南明則不然我有明珠一顆切忌當頭錯過雖然覿面相呈也須一槌打破舉拂子云還會麼碁逢敵手難藏幸詩到重吟始見工天童忞云諸禪德若論者顆明珠體超太虗堅逾金石生佛聖凡總在渠景子裏頭出頭沒山僧要問南明且作麼生打破若打得破世界人物一時空荒絶滅若打不破來年更有新條在惱亂春風卒未休還有為南明作主者麼楊岐上堂薄福住楊岐年來氣力衰寒風凋敗葉猶喜故人歸囉囉哩拈却死柴頭且向無烟火天目禮云淨慈亦有一頌自住南山寺年荒遇水災風凄蒲柳變不見故交來正恁麼時如何相思黃葉落白露點蒼苔宣州興教坦禪師南十一琅瑘覺嗣開堂日雪竇化主省宗出問諸佛未出世人人鼻孔撩天出世後為什麼杳無消息教曰雞足峰前風悄然宗曰未在更道教曰大雪滿長安宗曰誰人知此意令我憶南泉拂袖歸衆更不禮拜教曰新興教今日失利便歸方丈令侍者請宗至教曰適來錯抵對一轉語人天衆前何不禮拜蓋覆却宗曰大丈夫膝下有黃金怎肻禮拜無眼長老教曰我別有語在宗乃理前語至未在更道處教曰我有三十棒寄你打雪竇宗乃禮拜南㵎問云賓則始終賓主則始終主忽然賓主互換未免有得有失若道興教是主怎奈被省宗不肯若道省宗是賓因甚却寄棒打雪竇者裏緇素分明許你具超方眼目還委悉麼不因夜來雁怎見海門秋天井新云雖然二俱作家怎奈一齊捉敗當時宗化主禮拜興教合下個什麼語得圓前話李向赤邊咬龍唐柱云宗化主慣臨大敵雖是作家怎奈坦堂頭埋兵掉鬬却有掩襲之計所以化主一鼓而勇再鼓而怯不免束手投降若是個漢待他道我有三十棒寄你打雪竇即好云且喜和尚出世事畢豈不頭正尾正光相得徵云宗化主前頭不禮拜後頭却禮拜且道有利害無利害檀度依云祥不踏生草大鵬耻宿雞欄寒山子忘却來時路要且須知有倒行逆施手段雞足長安之句雖空花水月耀古騰今不拜高風於雪竇門下吾必以省宗為巨擘焉然而三十拄杖畢竟是阿誰領南嶽雲峰文悅禪師南十一大愚芝嗣上堂汝等諸人與麼上來大似刺腦入膠盆與麼下去也是平地喫交直饒不來不去朝打三千暮打八百寶壽方云雲峰者漢如當臺鏡子相似只會照人不能照己殊不知自己未出方丈門時早已喫交了也雲峰因僧問如何是心地法門峰曰不從人得曰不從人得時如何峰曰此去衡陽不遠徑山杲云雲門即不然如何是心地法門不從人得不從人得時如何看腳下龍華體云辨山又且不然如何是心地法門不從人得不從人得時如何困來打眠饑來喫飯金明進云二老恁麼答話心地法門何曾夢見金明則不然如何是心地法門不從人得不從人得時如何劈脊便棒白雲靜云者裏又不然如何是心地法門不從人得不從人得時如何到江吳地盡隔岸越山多青十一東京天寧芙蓉道楷禪師青十一投子青嗣在投子作典座子曰厨務勾當不易蓉曰不敢子曰煮粥耶蒸飯耶蓉曰人工淘米著火行者煮粥蒸飯子曰汝作甚麼蓉曰和尚慈悲放他閒去崇先奇云深相體信出入無難芙蓉得之矣三十年後人多懈怠那裏討者閒漢文峰玉云持籌畫䇿自有羣寮端拱無為須還主上芙蓉與麼酬對可謂善得其旨然到文峰者裏尚須別有個話會始得為甚麼曹溪波浪如相似無限平人被陸沉芙蓉因侍郎楊傑居士相會公曰與師相別幾年矣蓉曰七年公曰學道來參禪來蓉曰不打者鼓笛公曰恁麼則空遊山水百無所能也蓉曰別來未久善能高鑑公乃大笑東明際云平坦處不妨孤危孤危處不妨平坦博山奉云非楊公不能見芙蓉之造詣非芙蓉不能當楊公之探討黃金遇火愈見精光則固是若在明眼作家俱難為撿點且道什麼處是難為撿點處若人辨別得出許你具超方眼芙蓉一日侍投子遊菜園子度拄杖與蓉蓉接得便隨行子曰理合如是蓉曰與和尚提鞋挈杖也不為分外子曰有同行在蓉曰那一人不受教子休去至晚問蓉早來說話未盡蓉曰請和尚舉子曰卯生日戌生月蓉即點燈來子曰汝上來下去總不徒然蓉曰在和尚左右理合如此子曰奴兒婢子誰家屋裏無蓉曰和尚年尊缺他不可子曰得恁麼殷勤蓉曰報恩有分風穴喜云明投暗合玉轉珠回賓主和同不無洞達然則門庭酬唱足可觀光若論向上一途猶未可在何也不見道那邊不坐空王殿怎肯耘田向日輪芙蓉因僧問師唱誰家曲宗風嗣阿誰蓉曰金鳳夜棲無影樹峰巒才露海雲遮天目律云還見芙蓉老漢答處通玄麼不見道韶陽曾見睦州來芙蓉因僧問如何是無縫塔蓉曰白雲籠嶽頂終不露崔巍鳳山啓云湘南潭北金刀已剪不開白鳥蘆花玉戶推歸不得芙蓉恁麼道雖則針線綿密由來巴鼻全無要見無縫塔也大難在何故霜天月落夜將半誰共沉潭照影寒金陵蔣山法泉禪師青十一雲居舜嗣僧問初祖面壁意旨如何泉曰撑天拄地曰便與麼去時如何泉曰落七落八又問二祖立雪齊腰意旨如何泉曰三年逢一閏曰為什麼付法傳衣泉曰村酒足人沽白巖符云蔣山言中有響響奪可觀誠堪眼目人天千古一遇若是山僧者裏又且不然初祖面壁意旨如何平地摝魚蝦便恁麼去時如何曹溪波浪如相似無限平人被陸沉二祖立雪齊腰意旨如何刺腦入膠盆為什麼付法傳衣若要不招無間業莫謗如來正法輪杭州佛日戒弼禪師青十一育王璉嗣因僧問如何是毗盧印日曰草鞋踏雪曰學人不會日曰步步成跡高峰妙云佛目和尚雖則高提祖印不負來機殊不知古篆難明致令者僧遇如不遇若是高峰則不然忽有人問如何是毗盧印但云文不加點學人不會要會作麼且道與佛日是同是別清化嶾云古今參學者往往被一緉草鞋遮却雙眸不覩光明當時若別開隻眼管取覷透佛日面門返觀毗盧印值什麼破銅錢東京法雲圓通法秀禪師青十一天衣懷嗣上堂山僧不會巧說大都應個時節相喚喫碗茶湯亦無祖師妙訣禪人若也未相諳踏著稱錘硬似鐵龍唐柱云寶壽即不然山僧慣會巧說著著應時及節未須相喚茶湯超勝祖師妙訣禪人若也能相諳大冶紅罏無鈍鐵南十二洪州黃龍祖心禪師南十二黃龍南嗣與夏倚公立談肇論至會萬物為自己者及情與無情共一體處時有狗臥香桌下龍拈壓尺擊狗又擊香桌曰狗有情即去香桌無情自住情與無情如何得成一體公立不能對龍曰才涉思惟便成剩法何嘗會萬物為自己瑞巖慍云黃龍老漢場慈不少夏公立如入寶山空手而回諸人要會萬物為自己情與無情共一體麼槌殺有情狗子碎却無情香桌盡情收拾將來與他一團束縛拋向東洋大海自然灑灑落落雖然更須知有頂門一竅始得拈拄杖擊香臺云阿剌剌阿剌剌登山腳膝酸喫茶舌頭滑十字街頭石敢當對月臨風吹尺八天童忞云抽釘楔即不無瑞巖怎奈傷鋒犯手何如有情狗子仍教他守夜無情香桌且留來支用諸人要會萬物為自己情與無情共一體麼且聽拄杖子為你著力擊香桌一下龍華體云黃龍博得些些小利未免旁觀者哂恕中雖能據欵結案且未出得他肇公圈繢總不如公立當時却較些子隆慶寶峰雲菴真淨克文禪師南十二黃龍南嗣示衆今朝九月一夜來霜氣寒當知門外路一一透長安喝一喝瑞巖慍云老真淨向淨潔地上撒屎撒溺當時一衆甚麼處去也山僧敢將狗尾要續其貂今朝九月一山風吹面寒知音千里外白雁報平安是則是未見作家不見道善言言者言所不能言善跡跡者跡所不能跡喝一喝才有是非紛然失心寶峰因黃龍南曰適令侍者捲簾問渠捲起簾時如何渠曰照見天下放下簾時如何渠曰水泄不通不捲不放時如何渠無語汝作麼生峰曰和尚替侍者下涅槃堂始得龍喝曰關西人果無頭腦乃顧視旁僧峰却指之曰只者師僧也未夢見龍大笑白巖符云黃龍道渠無語汝作麼生若是今時學者十個有五雙便向他不捲不放時著倒是他寶峰却不恁麼寶峰道和尚替侍者下涅槃堂始得若是如今師家不是蠻罵便是瞎棒是他黃龍却不恁麼且道他父子節文在什麼處覿面當機雷電疾還他家富産兒驕雖然總不禁旁僧冷眼寶峰自香城歸見黃龍龍問甚處來峰曰特來禮拜和尚龍曰恰值老僧不在峰曰向甚麼處去龍曰天台普請南嶽遊山峰曰恁麼則學人得自在去也龍曰腳下鞋甚處得來峰曰廬山七百五十文唱得龍曰何曾得自在峰指鞋曰何嘗不自在龍駭之資福廣云黃龍攻其所不守寶峰守其所不攻衝車臨埤火箭飄空敵手相逢勝負難決餘艎驀喚隨聲應奪得荊蠻一個船且道賓家分上主家分上寶峰上堂衲僧門下無非過量境界自在禪定乃喝一喝曰豈不是過量境界又謦咳一聲曰豈不是自在禪定阿呵呵將此深心奉塵剎是則名為報佛恩雲居莊云顯示過量境界自在禪定還他真淨老人若是衲僧門下猶缺悟在徑山則不然拈拄杖卓一卓云得之於心事事無礙應之於手法法圓成靠拄杖云他家自有通霄路不向如來行處行寶峰法界三觀六頌其一曰事事無礙如意自在手把猪頭口誦淨戒趂出淫房未還酒債十字街頭解開布袋一指海云寶峰老漢奇特甚奇特冷眼看來只是個破戒比丘山僧則不然事事無礙如意自在食不論頓睡懶解帶見惡不瞋見好亦愛一生從來不會揑怪大衆且道山僧底是寶峰底是隆慶府泐潭洪英禪師南十二黃龍南嗣因僧參禮拜起便垂下袈裟角曰脫衣卸甲時如何潭曰喜得狼烟息弓弰壁上懸僧却攬上袈裟曰重整衣甲時如何潭曰不到烏江畔知君未肯休僧便喝潭曰驚殺我僧拍一拍潭曰也是死中得活僧禮拜潭曰將謂是收燕破趙之才元來是販私鹽漢灜山誾云將軍節制屈殺偏裨當時者僧何不道賊賊便出如菴彰云者僧衝鋒抗敵不覺腦後著戈泐潭雖能布長蛇大陳怎奈無生擒活捉之機顧左右云者裏還有不顧危亡單刀直入者麼如無看山僧向餓虎口中奪食去也拈拄杖一齊趂散黃檗積翠永菴主南十二黃龍南嗣問僧審奇汝久不見何所為奇曰近見偉藏主有個安樂處永曰試舉似我奇乃敘所得永曰汝是偉未是奇莫測歸以告偉偉笑曰汝非永不非奇愈疑走積翠質之南公南亦大笑之永聞作偈曰明暗相參殺活機大人境界普賢知同條生不同條死笑倒菴中老古錐陽山頂云三個老漢綿裏有針泥裏有刺明賞暗罰則不無若是衲僧巴鼻天地懸隔何故不合說是說非白巖符云者三個漢向平地上鋪錦穽者僧一往看來分明被他活陷然以山僧撿點恰是他父子三人被者僧將條斷貫索一串穿却舒州白雲守端禪師南十二楊岐會嗣上堂若端的得一回汗出便向一莖草上現瓊樓玉殿若未端的得一回汗出雖有瓊樓玉殿却被一莖草蓋却作麼生得汗出去自有一雙窮相手未曾輕易舞三台徑山杲云一莖草上現瓊樓玉殿決定可信瓊樓玉殿被一莖草蓋却莫被他熱瞞徑山恁麼道為已得一回汗出者說未得一回汗出者切不得動著伏龍長云善知識者是大因緣解粘去縛蓋是尋常奪食驅耕須還敏手白雲張千鈞之弩豈因鼷鼠發機大慧垂四海之鈎只為獰龍上釣且道無明者裏作麼生既有一雙窮相手不妨容易舞三台天寧琦云拈却一莖草瓊樓玉殿在什麼處到江吳地盡隔岸越山多笑巖寶云白雲大慧俱善抑揚當時則不無怎奈撲鼻臭汗氣在寶壽新云白雲雖然為衆竭力猶未十分稱的殊不知一莖草全是瓊樓玉殿說甚端的不端的瓊樓玉殿即是一莖草更要現個什麼直饒鳳山另展機謀運出奇才折合將來也只得一半何故只見錐頭利不見鑿頭方還知新長老落處麼幸是五湖南畔客相將擕手出雲樓資福廣云瓊樓玉殿被一莖草蓋却古今有之若於一莖草上現瓊樓玉殿只恐白雲徒有此語何故不見道末大必折尾大不掉佛日晳云隆安者裏即不然不須汝諸人汗出但只饑來喫飯困來打眠白雲上堂古人留下一言半句未透時撞著鐵壁相似忽然一日覷透方知自己原是鐵壁如今作麼生透復曰鐵壁鐵壁獅林則云白雲被鐵壁覷透打失一隻眼睛伏龍長喝一喝云用鐵壁作麼寶掌白彈指一聲云百雜碎白雲因僧問一喝分賓主照用一時行去此二途請師別道雲便喝僧曰從來疑著和尚雲便打僧曰作家宗師雲曰也不消得僧禮拜伏龍長云者僧道從來疑著和尚是肯語是不肯語白雲便打是賞伊是罰伊選佛若無如是眼直饒千載亦奚為白雲因提刑郭公甫謁上堂夜來枕上作得個山頌謝公甫大儒廬山草載之舊今日遠訪白雲之勤而今舉與大衆請已後分明舉似諸方此頌豈唯謝公甫大儒且要與天下有鼻孔衲僧脫却貼肉汗衫乃曰上大人丘乙己化三千七十士爾小生八九子佳作仁可知禮也友可玄云白雲本欲令提刑脫却貼肉汗衫殊不知更為伊添上一重了也諸人試撿點看金陵保寧仁勇禪師南十二楊岐會嗣上堂若說佛法供養大衆未免眉鬚墮落若說世法供養大衆入地獄如箭射去此二途且道保寧今日當說什麼三寸舌頭無用處一雙空手不成拳百丈泐云保寧參禪不過雪竇誓不再還故能赤手空拳向十字街頭橫衝直撞誰敢攖鋒角敵今日山僧不顧危亡為大衆捉敗去也乃呵呵大笑歸方丈石霜尊云大小保寧元來小膽石霜即不然若說佛法供養大衆如龍得水若說世法供養大衆似虎靠山去此二途又作麼生從前汗馬無人識只要重論蓋代功保寧示衆釋迦老子四十九年說法不曾道著一字優波毱多丈室盈籌不曾度得一人達磨不居少室六祖不住曹溪誰為後昆誰為先覺既然如是彼自無瘡勿傷之也拍膝顧衆云且喜得天下太平寶壽方云保寧道彼自無瘡勿傷之也不知早自挖肉了也又道天下太平不知早自作亂了也保寧示衆大方無外大圓無內無內無外聖凡普會瓦礫生光須彌粉碎無量法門百千三昧拈拄杖曰總在者裏還會麼蘇嚕蘇嚕㗭哩㗭哩松源嶽云者老漢大似業識茫茫無奈船何打破戽斗保寧茂云松源摟出心肝要且未見先保寧在山僧今日重為拈出會盡萬法一如拈却金圈栗棘也是泗洲人見大聖保寧上堂風鳴條雨破塊曉來枕上鶯聲碎蝦蟇蚯蚓一時鳴妙德空生都不會都不會三個成羣四個作隊窈窈窕窕飄飄颻颻向前村後村折得梨花李花一佩兩佩南堂欲云保寧大似二八少年風流才子一向賣俏於唱教門中足可觀光在我衲僧門下正好喫棒何故禾黍不陽豔競栽桃李春翻令力耕者半作賣花人能仁鑑拈拄杖云者裏則不然白雲為蓋流水作琴一曲兩曲無人會雨過夜塘春水深福州長慶惠暹文慧禪師南十二淨因臻嗣僧問離上生之寶剎登延聖之道場如何是不動尊慶曰孤舟載明月曰忽遇櫓掉俱停又作麼生慶曰漁人偏愛宿蘆花灜山誾別云我不與麼道或有問如何是不動尊祇向道燒香禮拜著且道與長慶是同是別青十二鄧州丹霞子淳禪師青十二芙蓉楷嗣上堂乾坤之內宇宙之間中有一寶祕在形山肇法師恁麼道祇解指蹤話跡且不能拈示於人丹霞今日劈開宇宙打破形山為諸人拈出具眼者辨取以拄杖卓一下曰還見麼鷺鷥立雪非同色明月蘆花不似他象田現云剖破藩籬高厰玄閣要人把手共登固是丹霞一片熱腸怎奈荊山良璧尚帶玼痕當時以拄杖卓一下便休不妨奇特乃更箋了又注祖師門下濟得個什麼邊事丹霞因僧問牛頭未見四祖時如何霞曰金菊乍開蜂競採曰見後如何霞曰苗枯花謝了無依白巖符云大小丹霞與麼答話未免令人向牛頭見與未見處話作兩橛者裏則不然牛頭未見四祖時如何松直棘曲見後如何鵠白烏玄丹霞上堂寶月流輝澄潭布影水無蘸月之意月無分照之心水月兩忘方可稱斷所以道升天佛事直須揚却十成底事直須丟却擲地作金聲不須回顧若能如是始解向異類中行諸人到者裏還相委悉麼良久曰常行不舉人間步披毛戴角混塵泥崇先奇云有國有家未嘗不本此丹霞老人恁麼為人難免喪盡家珍南山寶云與麼說話且道與雪峰輕打我還有同別也無若人撿點得出要明異中異也不難遂撫案云咦也不得自瞞洪州寶峰闡提惟照禪師青十二芙蓉楷嗣示聰藏主法語五則其第五曰有情故情滲漏有見故見滲漏有語故語滲漏設得見無情無語無拽住便問他你是何人靈巖儲良久云會麼夜來牀席破𠺒嗦到天明寶峰上堂太陽門下妙唱彌高明月堂前知音蓋寡不免舟橫江渚棹舉清波唱慶堯年和清平樂如斯告報普請承當擬議之間白雲萬里天目律云當堂慵正坐狹路不相逢直得雙放雙收全賓全主還他寶峰則固是若是向上一途又豈止白雲萬里東京淨因枯木法成禪師青十二芙蓉楷嗣上堂知有佛祖向上事方有說話分諸禪德且道那個是佛祖向上事有個人家兒子六根不具七識不全是大闡提無佛種性逢佛殺佛逢祖殺祖天堂收不得地獄攝無門大衆還識此人麼良久曰對面不仙陀睡多饒寐語寶壽方云大小淨因恁麼提持撑門抵戶即得若是佛向上事三生六十劫且作麼生是佛向上事喫官飯遊官街興時踏斷長溪月散髮狂歌笑落腮賢峰竟云三種滲漏語從上以來要得斷盡無餘者實鮮若夫成枯木斷拂翁與麼提持可無憾矣然所謂向上事則未可竟上座有一轉語舉似諸人諸人切不得作向上會友可玄云寶壽也是酒助歌娛樂風催景氣新若是佛祖向上事何曾道著良久云還有人道得麼乃擊案一下云天意高難問人情老易悲
