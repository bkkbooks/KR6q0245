body:
  text: 古杭白巖嗣祖沙門淨符彚集旁出祖師二六祖旁出南陽慧忠國師六一大鑒能嗣因西天大耳三藏到京自謂得他心通肅宗帝命師試三藏見拜起立於右師問汝得他心通那藏曰不敢師曰汝道老僧即今在什麼處藏曰和尚是一國之師何得去西川看競渡師良久又問汝道老僧即今在什麼處藏曰和尚是一國之師何得向天津橋上看弄猢猻良久師又問汝道老僧即今在什麼處藏罔知師叱曰者野狐精他心通在什麼處藏無對玄沙備徵云汝道前兩度還見國師麼雪竇云敗也敗也報慈遂徵云前兩度見後來為甚麼不見且道利害在甚麼處趙州諗因僧問大耳三藏第三度不見國師未審國師在什麼處州云在三藏鼻孔裏後有僧問玄沙既在三藏鼻孔裏因甚不見沙云只為太近翠巖芝云只如三藏還見國師鼻孔麼白雲端云國師在三藏鼻孔裏有甚難見殊不知在三藏眼睛裏天童覺云三藏不見國師則且置你道國師還自知下落處麼若謂自知則百鳥銜花諸天送供未有休日且道正當恁麼時落在什麼處高峰妙云大小國師平生伎倆總被者胡僧勘破雖然賴遇聖君證明報恩秀云若在眼睛裏有甚難見殊不知三藏通身是國師雖然也只道得一半若要全道三藏未離西天時早已與國師相見了也天童悟云如今若問在三藏眼睛裏因甚不見向道非汝境界寶壽新云要見國師則易見三藏則難何故只知三藏不解國師落處殊不知國師被三藏勘破且道那裏是他勘破處城山洽云且道第三度國師在甚麼處者裏著得一隻眼方稱無事衲僧鳳山啓云大小國師被三藏惑亂一上佛川宗云人人道三藏不知國師落處殊不知國師鼻孔却在三藏手裏只是當時尚欠一籌待道即今在甚麼處但拍掌呵呵大笑管教他一國之師分踈不下菩提珍云大小國師被三藏逼得無地藏身則且置祇如第三度因甚不見山僧道非但三藏摸索不著敢保國師自己亦未知落處在乃呵呵大笑國師喚侍者者應諾如是三召三應諾師曰將謂吾孤負汝誰知汝孤負吾趙州諗云如人暗中書字字雖不成文彩已彰雪竇便喝愚菴盂云者一喝有賓有主有照有用徑山杲云者一喝在國師侍者分上在趙州分上隨後一喝愚菴盂云相罵饒你接嘴投子同云抑逼人作麼雪竇云躲根漢玄沙備云却是侍者會雪竇云停囚長智雲門偃云作麼生是吾孤負汝處若會得也是無端雪竇云元來不會雲門又云作麼生是侍者孤負國師處粉骨碎身未報得雪竇云無端無端法眼益因僧問國師喚侍者意作麼生眼云且去別時來雲居錫云法眼恁麼道為復明國師意不明國師意雪竇云瞞我不得興化獎云一盲引衆盲雪竇云端的瞎有人問雪竇便打也要諸方檢點報慈遂問僧云甚處是侍者會處僧云若不會爭解與麼應遂云汝少會在又云若於此見得便識玄沙翠巖芝云國師與侍者總欠會在如今作麼生會雪竇顯云國師三喚點即不到侍者三應到即不點又云將謂吾孤負汝却是汝孤負吾謾雪竇一點不得雲居錫徵云且道侍者會不會若會國師又道汝孤負吾若不會玄沙又道却是侍者會且作麼生商量天童覺云仁義道中師資分上再呼能再應論實不論虗且道有孤負無孤負皓玉無瑕雕文喪德浮山云國師好肉剜瘡雲門灸瘢上著艾雪竇大似隨邪逐惡殊不知鼻孔總在侍者手裏保寧茂云兩人端的瞎彼此弄泥團端巖慍云叢林中商量國師三喚嘔出心肝侍者三應全身擔荷是則固是只是國師道將謂吾孤負汝誰知汝孤負吾又作麼生若曰兩無孤負昧却雲門若曰兩有孤負屈了雪竇總不與麼浮山又道鼻孔總在侍者手裏瑞巖向者裏露箇消息也要諸方檢點易分雪裏粉難辨墨中煤南堂欲云國師三喚侍者三應可謂形直影端及乎道箇將謂吾孤負汝却是汝孤負吾便見分踈不下且道誵訛在什麼處笑巖寶呵呵大笑云諸禪德還知者笑落處麼若知國師只得瓦解氷消若不知侍者依然四稜著地還委悉麼一陽已度先春信臘夜寒梅破雪開愚菴盂云老僧居平亦喚侍者侍者隨應侍者擎杯遞盞老僧隨手應接老僧與侍者兩不相負亦不相瞞夾路桃花風雨後馬蹄何處避殘紅南澗問云妙喜老人前不遘村後不迭店要見國師侍者三生六十劫寶壽新云國師三喚如珠走盤侍者三應如盤走珠畢竟孤負在甚麼處波斯吹鐵笛音韻出青霄河渚謙云國師如是喚侍者如是應可謂啐同時針芥相契且那裏是他辜負國師處𡛥女已歸霄漢去呆郎猶向火邊蹲獬云三呼三應醉裏傾杯雲門雪竇畫蛇添足直下悟去也是無端國師因肅宗帝問如何是無諍三昧師曰檀越踏毗盧頂上行帝曰此意如何師曰莫認自己清淨法身徑山杲云諸人要見國師麼只在你眼睛裏開眼也蹉過合眼也蹉過既在眼睛裏為甚麼却蹉過妙喜恁麼道也蹉過不少國師同肅宗帝到宮前乃指石獅子曰陛下者石獅子奇特下取一轉語帝曰朕下語不得請師下語師曰山僧罪過後耽源問皇帝還會麼師曰皇帝會且置你作麼生會玄沙備云大小國師被侍者勘破寶壽新云不是真獅爭能善哮吼雖然且道國師善哮吼肅宗善哮吼耽源善哮吼請下一轉語看倘復道某下不得請師下到者裏作麼生結煞噫為君難為臣不易國師因南泉參乃問甚處來泉曰江西來師曰還將得馬師真來麼泉曰祇者是師曰背後底聻泉便休長慶稜云大似不知保福展別云幾不到和尚此間雲居錫云此二尊宿盡扶背後只如南泉休去為當扶面前扶背後天界盛云南泉井底架高樓國師漆桶裏斫額此外兩兩三三扶面前扶背後正是揚州拾馬糞却去蘇州賣合香國師因丹霞參才展具師曰不用不用霞退後三步師曰如是如是霞進前三步師曰不是不是霞繞禪牀一匝出去師曰去聖時遙人多懈怠三十年後覓個漢也難得保福展云丹霞貪程不覺行困溈山云丹霞可謂懷藏至寶遇智者乃增輝國師鴻門大啓陟者須是其人如今還有為丹霞作主者麼出來與大溈相見有麼不是龍門客切忌遭點額泐潭準云客路如天遠侯門似海深登彌天釋之門者須是其人接待高賓應有孟嘗君之度量苟不如是便見主賓道異雲泥不合大溈果云丹霞一進一退暗中贏得一著國師倒東擂西未免旁觀者哂昭覺勤云賓主相見欲展不展退後進前禮過成諂猶幸南陽老而不耄東禪觀云明鏡當臺胡來胡現漢來漢現洪鐘在架大扣大鳴小扣小鳴一卷一舒一擒一縱可謂照用兩全行説俱到且如國師道去聖時遙人多懈怠三十年後覓個漢也難得畢竟是褒是貶崇先奇云國師當軒布鼓難為擊者丹霞漁陽三弄意氣天生衆中總謂賓主穆穆殊不和雖得一場榮刖却一雙足雲溪挺云二老有縱有奪識咎識休不愧一回相見雖然如此黃石公賴遇子房若是漢高不免遭他慢罵國師因丹霞來訪值睡次乃問侍者國師在否者曰在即在只是不見客霞曰太深遠生者曰莫道上座佛眼也覷不見霞曰龍生龍子鳳生鳳兒師睡起侍者舉似前話師乃打侍者二十棒趁出院霞聞嘆曰不謬為南陽國師天童華云侍者喫棒出院蓋千載一時然歸宗豈免眼熱丹霞固雖好手怎奈落在國師網子裏諸人還辨得麼苟或未然猶握金鞭問歸客夜深誰共御街行徑山榮云國師幸自高眠侍者播揚家醜不因多口丹霞怎見國師哮吼敢問大衆國師既在為什麼不見客向者裏看得破非唯知耽源落節亦見自己有出身之路雖然如是莫將間學解埋沒祖師心天奇瑞云丹霞只知其一不知其二侍者只知其二不知其一二人通該二十棒可惜放過且道國師眼在甚麼處復云待汝喫了棒向汝説通玄奇云侍者瞪眼寐語纍他國師寢食不安丹霞雖解就地埋人殊不顧旁人看破還有知他侍者喫棒丹霞喫驚底麼試道看棲霞成云國師橫身世外飽食高眠恃有侍者接待也及乎佳賓一到未免恭而無禮若非國師智鑑高懸幾被丹霞鏟却光彩然丹霞雖好手未免不會作客勞煩主人南山寶云侍者眼孔雖高丹霞賞鑑不善若非國師動絃別曲撥轉機宜未免遭人檢點雖然也是禍出私門鳳山啓云門題鳳字句裏藏機弘拓家風義方教子可謂無孔笛逢氈拍板雖然且道丹霞還曾相見國師麼靈峰靈云丹霞向碧洞狂歌國師在玉壺大醉若非侍者放憨怎見汗馬功高白巖符云丹霞個漢處心不良非南陽照妖有鏡則一國之師幾乎被侍者斷送然侍者棒雖喫要且無恙唯丹霞遍身骨節至今猶痛潛麓化云利動君子丹霞姑置勿論賊過張弓國師徒誇好手檢點將來有甚氣息到不如孟八郎一枝冷箭兩處中的却較些子國師因與紫璘供奉論義師升座奉曰請師立義某甲破師曰立義已竟奉曰是什麼義師曰果然不見非公境界便下座廣胤標云善戰者致人不致於人若紫璘者只有先鋒且無殿後當時若是個人待道立義已竟但向道情知者老漢向鬼窟裏作活計管取因形措勝縱越人之兵雖多亦奚益於勝哉國師問紫璘供奉甚處來曰城南來師曰城南草作何色曰作黃色師乃問童子城南草作何色子曰作黃色師曰祇者童子亦可簾前賜紫對御談玄溈山云國師恁麼問供奉與童子恁麼答且道還有利害麼若也辨得許你親見國師若辨不得城南草依前作黃色徑山杲云你道國師拖泥帶水説老婆禪得麼海門涌云國師雖慣壓良為賤檢點將來也是草窠裏輥國師因供奉注思益經師曰凡注經須會佛意始得曰若不會佛意怎解注經師令侍者盛一碗水水中著七粒米碗面安一隻箸問奉曰是什麼義奉無語師曰老僧意尚不會何況佛意溈山果云供奉先鋒有作殿後無功當時才見問是什麼義便好云草本不勞拈出踢倒便行直饒國師通身是口也無説處國師問供奉大德所蘊何業曰講青龍疏師曰是疏金剛經麼曰是師曰經文最初兩字喚作什麼字師曰如是師曰是什麼奉無對明招謙代供奉云昔日靈山今朝親見溈山果云溈山要問明招昔日靈山今朝親見畢竟是個什麼當時有人下得者一拶縱使明招通身是眼也未免一狀領過雲溪挺代供奉云和尚人天之師字也不識國師問僧近離甚處曰南方師曰南方知識以何法示人曰南方知識祇道一朝風火散如蛇退皮如龍換骨本爾真性宛然無壞師曰苦哉苦哉南方知識説法半生半滅曰南方知識即如此未審和尚此間説何法師曰我此間身心一如身外無餘曰和尚何得將泡幻之身同於法體師曰你為什麼入於邪道曰什麼處是某甲入於邪道處師曰不見教中道若以色見我以音聲求我是人行邪道不能見如來雲門偃舉至身心一如身外無餘處乃云山河大地何處有耶神鼎諲云國師與麼道龍頭蛇尾前來身心一如向什麼處去也試檢點看淨慈昌云者僧當時待國師舉六如偈了便好云苦哉苦哉大小國師半生半滅東禪觀徵云國師與者僧即色聲相見離色聲相見若離色聲相見何異南方知識半生半滅若即色聲相見又道色見聲求是行邪道衆中莫有為國師作主者麼我要問你既是身心一如身外無餘泡幻之身為什麼不同法體國師因麻谷持錫到繞禪牀三匝振錫一下卓然而立師曰汝既如是何用更見貧道谷又振錫一下卓然而立師曰者野狐精出去雪竇顯代麻谷云洎不到此白巖符云寶符在握豫奪從容還他南陽老作不愧為一國之師然終不免麻谷在背地裏冷笑國師因肅宗帝問師在曹溪得何法師曰陛下還見空中一片雲麼帝曰見師曰釘釘著懸挂著五祖戒云好事不如無磬山修云且喜國師答話不涉離微不落理路可謂超今邁古獨步乾坤倘肅宗帝若解轉身一拶不知者一片雲又如何收卷祇如轉身一句作麼生道良久云一堂風冷淡千古意分明白巖符云肅宗帝等間置個問端未當好心若非南陽老漢未免彼此鈍置然則國師與麼道且道是曹溪所得耶非曹溪所得耶試定當看國師因虞軍容問師住白巖山如何修行師乃以手摩童子頂曰惺惺直言惺惺歷歷直言歷歷他後莫受人瞞保福展云國師被軍容一拶直得手忙腳亂白巖符云與麼修行直是個弄精魂漢有甚麼限者裏則不然忽有人問師住白巖山如何修行向道瓦鼎慣烹丹穴鳳長竿時釣碧潭龍國師問座主講甚麼經曰唯識論師曰作麼生會唯識曰三界唯心萬法唯識師指簾子曰者個是什麼法曰色法師曰座主簾前賜紫對御談經何得五戒不持寶壽方代座主別前語云者邊是香臺那邊是露柱別後語云國師大似不曾讀論國師因馬祖遣西堂藏馳書至師問汝師説什麼法藏從西過東立師曰祇者個更別有藏却過西立師曰者個是馬師底仁者底作麼生藏曰早個呈似和尚了也保福展云大小西堂埋沒馬大師不少白巖符云藏公酬對有據施設可觀真不愧為馬師專使雖然荊山渾璞不無小玼當時待道者是馬師底仁者底作麼生便好作禮云明朝更獻楚王看便出豈不尤為淳萃國師因馬祖遣伏牛自在馳書至師問馬師近日如何示徒牛曰即心即佛師曰是什麼語話良久又問此外更有何言教牛曰非心非佛或曰不是心不是佛不是物師曰猶較些子牛却問馬大師即恁麼未審和尚此間如何示徒師曰三點如流水曲似刈禾鐮雪竇顯向猶較些子處便喝又向曲似刈禾鐮處云是甚麼語話也好與一拶見之不取千載難逢溈山云國師道猶較些子當時但呵呵大笑復問和尚此間如何示徒待云三點如流水曲似刈禾鐮又呵呵大笑教他國師進且無門退亦無路何故入虎穴撩虎尾須是其人薑山方云大小國師有頭無尾待伊道不是心不是佛不是物何不亦向道是甚麼語話豈不光前絶後古南門云馬祖國師鼻孔總被伏牛穿却了也忽有個漢出來道是什麼語話劈脊棒云三段不同收歸上科國師問紫璘供奉佛是什麼義曰覺義師曰佛曾迷否曰不曾迷師曰用覺作麼奉無語徑山杲云若不入水怎見長人資福侶云國師也是從井救人國師因涅槃時至乃辭代宗帝帝曰師滅度後弟子將何所記師曰告檀越與老僧造個無縫塔帝曰請師塔樣師良久曰會麼帝曰不會師曰貧道去後有侍者應真却諳此事乞詔問之後代宗詔應真入內問前語真良久曰聖上會麼帝曰不會真乃述偈曰湘之南潭之北中有黃金充一國無影樹下合同船琉璃殿上無知識雪竇顯云代宗不會且置耽源還會麼祇消個請師塔樣盡西天此土諸位祖師遭者一拶不免將南作北有旁不肯底出來我要問你那個是無縫塔神鼎諲云耽源恁麼頌且道盡善不盡善神鼎與諸人下四轉語湘之南潭之北君臣有路中有黃金充一國淨妙體圓無影樹下合同船千聖同轍琉璃殿上無知識凡聖路絶若與麼會去必不相賺神鼎與麼注解只是孤負國師保寧勇云所謂非父不生其子雖然如是瞞代宗一人即得怎奈天下衲僧眼何且道那個是衲僧眼便下座五祖演云國師良久懸鼓待槌當時代宗若是個作家君王待伊教詔耽源便好道國師何必灜山誾云國師塔樣大𪢬囫生耽源塔樣大玲瓏生且道國師底是耽源底是古南門云出身猶可易脫體道應難當時待代宗道請師塔樣但道想陛下造者塔不得更有問那個是無縫塔驀口摑云合取口金粟元云好個塔樣從古至今未曾有一人識得耽源與麼頌非惟欺瞞皇帝亦乃辜負國師崇先奇云大小雪竇抑己揚人殊不知無縫塔樣至今巋然不動可惜代宗錯過若是作家君王如飛龍在天光被四表又何止衲僧門下後來耽源述偈也是父為子隱子為父隱具眼者試邈摸看永嘉玄覺禪師六一大鑒能嗣證道歌云心是根法是塵兩種猶如鏡上痕痕垢盡時光始現心法雙忘性即真百丈雪云我雲門者裏又且不然心是根法是塵兩種猶如車兩輪兩輪未轉車無用兩輪轉處示車身永嘉云江月照松風吹永夜清宵何所為佛性戒珠心地印霧露雲霞體上衣徑山杲云者個阿師好與三十棒且道過在甚麼處不合將常住物入衣鉢下薦福璨云江月照松風吹永夜清宵何所為顧視大衆云薦福門下若有個樣衲僧喚來洗腳何故無為無事人猶是金鎖難報恩賢云妙喜雖則捉賊獻贓棒不虗發怎奈不顧自家失利大衆還知妙喜老人失利處麼不許他人富甘得自家貧永嘉云大丈夫秉慧劒般若鋒兮金剛𦦨非但空摧外道心且曾落却天魔膽一指海云永嘉老頭兒元來膽小山僧則不然大丈夫秉慧劒般若鋒兮金剛𦦨非但空摧佛祖心早曾落却虗空膽吉州耽源山應真禪師六二南陽忠嗣參方回省覲馬祖却於祖前畫一圓相就上禮拜祖曰子莫欲作佛否源曰某甲不解揑目祖曰吾不如汝雪竇顯云然猛虎不食其子怎奈來言不豐諸人要識耽源麼只是個藏身露影漢南堂欲云耽源歸省獻個胡餅馬祖舐犢自不勝情雪竇云然猛虎不食其子怎奈來言不豐檢點將來恰踏著耽源影子海舟慈云耽源識得馬祖前箭雖避後箭難逃若是伶俐衲僧收坐具便出古南門云耽源作個圓相佛固不欲作怎奈早已揑目馬祖道吾不如汝大似信其言而不觀其行雖然馬駒踏殺天下人莫道不食其子通云耽源者漢擬歸省時早自揑目了也更有個馬簸箕把不住道吾不如汝又豈止揑目而已耽源問國師百年後有人問極則事作麼生國師曰幸自可憐生須要個護身符子作什麼五祖戒代云和尚終是老婆心切大溈泰云大小耽源被國師一坐直至如今起不得若是大溈即不然待道幸自可憐生要須個護身符子作什麼向道暗中為照燭嶮處作津梁白巖符云幸自可憐生要須個護身符子作什麼粉骨碎身難報此恩大溈道暗中為照燭險處作津梁且道與麼説話還契他國師意也無山僧代耽源進一語貴與國師相見幸自可憐生要須個護身符子作什麼對道某甲今日悔出此問
