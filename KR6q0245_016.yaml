body:
  text: 古杭白巖嗣祖沙門淨符彚集南三趙州因僧問學人乍入叢林乞師指示州曰喫粥了也未曰喫粥了也州曰洗鉢盂去僧大悟雲門偃徵云且道有指示無指示若言有趙州向伊曾道個甚麼來若言無這僧因甚悟去雪竇顯云我不似雲門為蛇畵足直言向你道問者如虫禦木答者偶爾成文然雖與麼瞎却衲僧眼作麼生免得此過諸仁者要會麼還你趙州喫粥也未拈却這僧喫粥了也雪竇與你拄杖子歸堂雲峰悅云雲門與麼道大似為黃門栽鬚與蛇畵足山僧則不然這僧恁麼悟去入地獄如箭射黃龍心云雲門雪竇雖善鋤強輔弱捨富從貧要且不能安家立國乃問僧你朝來亦喫粥亦洗鉢而今是迷是悟僧禮拜起龍喚近前云我有一柄拂與汝歸堂龍門遠云山僧今日喫粥了也洗鉢盂了也只是不悟既是善知識為甚麼不悟還會麼豈可喚鐘作甕終不指鹿為馬善人難犯水銀無假冷地忽然覰破管取一時放下開福寧云大眾且道那裏是這僧悟處還委悉麼幾般雲色出峰頂一樣泉聲落檻前徑山杲云雲門大似阿修羅王托動三有大城諸煩惱海隨後喝云寐語作麼復云雲峰雖善背手抽金鏃翻身控角弓爭奈蹉過雲門何又云趙州與這僧若不得雲門一生受屈而今諸方有一種瞎漢往往盡作洗鉢盂話會了天寧琦云諸仁者見雲門則易見妙喜則難誵訛在甚麼處劒去久矣爾方刻舟雲居莊云趙州以楔出楔雲門看樓打樓這僧悟去還有勘破處也無良久云風不鳴條雨不破塊古南門云住住雪竇但知雲門無蛇畵足自亦未免靈龜曳尾忽若總拈過時如何瞎愚菴盂云趙州向蝎瓮裏蹲踞雲門入蛇阬中坐臥雲峰向虎牢裏遊戲蝎不能螫蛇不能毒虎不能措其爪牙果然妙手據山僧判斷趙州也無洗鉢盂話雲門縱有畵蛇之筆向甚處添足還是雲峰入地獄這僧入地獄拍案一下云山僧今日將三大老頂相光明神通妙用拈向諸人面前漆桶不快若作佛法商量入地獄如箭射喝一喝云萬山紫翠烟嵐裏濃淡浮沉畵不成東明際云子丑寅卯辰巳午未就裏知音本無忌諱阿呵呵會也未脚頭脚底任縱橫長安風月何足貴清化嶾云一個裙拖地一個褲更長雖然這僧悟去也只會得個奴兒婢子邊事佛日晳云大慧道諸方拈掇甚多下註脚亦不少未甞有一人分明說破妙喜今日為諸人分明說破喫粥了便洗鉢盂且道還曾指示無黑豆從來好合醬比丘尼定是師姑這大慧老漢牙如劒樹口似血盆原來只在這裏洗鉢盂話何曾說得破隆安今晚不惜唇齒為汝諸人分明說破喫粥了便洗鉢盂趙州東壁掛葫蘆拈得鼻好打失口達磨不是老臊鬍本覺微云大小趙州鼓粥飯氣這僧悟去也是刺腦入膠盆趙州到黃檗檗見來便閉却方丈門州乃把火於法堂內呌曰救火救火檗開門捉住曰道道州曰賊過後張弓保福展云黃檗有頭無尾趙州有尾無頭五祖戒云黃檗只會買賤不會賣貴趙州因禍致福雪竇顯云直是好笑笑須三十年忽有個衲僧問笑個甚麼笑賊過後張弓南堂欲云重門擊柝黃檗過於隄防囓鏃破關趙州慣得其便雖然兩不相傷笑破雪竇鼻孔古南門云雪竇好一笑祇是不合隨趙州語脉走畢竟如何賊賊雲溪挺云一個開門入盜一個把髻投衙惹得黃口小兒笑破嘴脣皮趙州與侍者文遠論義曰鬬劣不鬬勝勝者輸胡餅遠曰請和尚立義州曰我是一頭驢遠曰我是驢胃州曰我是驢糞遠曰我是糞中虫州曰你在彼中作麼遠曰我在彼中過夏州曰把將胡餅來五祖戒云禍不單行瑯瑘覺云趙州文遠也是蕭何置律徑山杲云文遠在驢糞中過夏面赤不如語直趙州貪他少利贏得箇胡餅撿點將來也是普州人送賊畢竟如何鵞王擇乳素非鴨類天童覺云高高標不出低低望不及眼自爭先得籌因打結贏天寧琦云當時文遠待趙州道我是一頭驢便好道輸却胡餅了也老漢取餅就手奪得便行寶華忍云文遠勝裏輸明輸暗勝趙州輸裏勝明勝暗輸纔勝即輸輸即勝算來胡餅都無分而今拈出大家看動着些兒成話柄咄演教泐云趙州只知貪程不覺錯路文遠雖輸果餅未免暗得便宜山僧與麼道具眼者辨取趙州外出路逢一婆子乃問什麼處去婆曰偷趙州笋去州曰忽遇趙州又作麼生婆便與州一掌州休去雪竇顯云好掌更下兩掌也無勘處五祖演云趙州休去作麼生商量白雲露箇消息貴要諸人共知婆子雖行正令一生不了趙州被打兩掌咬定牙關婆子可謂去路一身輕似葉趙州高名千古重如山南堂欲云將謂胡須赤更有赤須胡龍池傳云且道趙州休去是肯伊是不肯伊古南門云趙州今日小出大遇南山寶云這兩個漢都來病入膏肓雖針藥有所不能救若人撿點得出許伊具一隻眼圓照森云還識趙州老漢麼雲縷縷風絮絮寄言行路兒莫上山頭去甌峰承云賊是小人智過君子白巖符云這婆子不惟竊笋亦且并竹而歸可謂偷天手段不讓礄跖然趙州休去又豈止偷天而已趙州一日於雪中倒臥曰相救相救有僧便去身邊臥州便起去翠巖芝云此僧在趙州圈繢裏還有人出得麼天童華云這僧如虫禦木要見趙州天地懸隔有般瞎漢便道山僧扶強不扶弱殊不知我王庫內無如是刀喝一喝勝法法云這僧只顧救人不解自救趙州到道吾纔入堂吾曰南泉一隻箭來也州曰看箭吾曰過州曰中有本作茱萸非也今依會元雪竇顯云二俱作家葢是道吾趙州二俱不作家箭鋒不相拄直饒齊發齊中也只是個射垛漢報慈遂云且道二大老相見還有優劣也無若撿點得出許你於中字上有個入處古南門云趙州道吾露個爪牙不枉同條雖然祗如雪竇道直饒齊發齊中也只是個射垛漢是肯伊是不肯伊還會麼好手手中呈好手紅心心裏中紅心擊禪牀一下明招補云好手手中呈好手則不無趙州然在作家不啐啐同時失又作麼生趙州因見僧掃地乃問與麼掃還潔淨也無曰轉掃轉多州曰豈無撥塵者曰誰是撥塵者州顧視曰會麼曰不會州曰問取雲居去僧後問雲居如何是撥塵者居曰者瞎漢古塘云二老當斷不斷致使這僧轉掃轉多山僧則不然待云誰是撥塵者便接過掃帚痛與一頓為甚如此不見道為人須為徹趙州見文遠侍者在佛殿禮佛州以拄杖打一下曰作甚麼遠曰禮佛也是好事州曰好事不如無中峰本云文遠云禮佛也是好事不妨頑軟趙州云好事不如無話墮了也要知趙州老人話隨處麼待伊磕破腦門即向你道趙州因僧問狗子還有佛性也無州曰無僧曰上從諸佛下及螻蟻皆有佛性狗子因甚麼却無州曰為伊有業識在又僧問狗子還有佛性也無州曰有僧曰既有為什麼入這皮袋裏來州曰為伊知而故犯翠巖芝云說有說無兩彩一賽如今作麼生高峰妙云大小趙州拈出一粒巴豆子攪亂衲僧肚腸設有吞吐得者亦不免喪身失命何故急急愽山來云道有道無靈鋒橫握盡大地人向趙州手裏乞命有分惟不跨石橋者不在其限為什麼剛刀雖快不斬無罪之人愚菴盂云這僧好似個遼東賣猪漢得一白頸猪以為奇貨到淮南來不覺慙惶無地趙州老漢好似美髯公慣使拖刀計不出常䇿若是山僧則不然有問狗子還有佛性也無我則向他道癩斯吞蝦蟆白巖符云趙州這漢等閒出一言是返魂香起死回生只在片時是鴆毒酒失身喪命只在片地且道為甚得如此利害聻良久云還他肘後有靈符趙州因南泉曰今時人須向異類中行始得州曰異即不問如何是類泉以兩手托地州近前一踏踏倒却向涅槃堂裏呌曰悔悔泉令侍者問悔個甚麼州曰悔不更與兩踏白巖符云路當窮處不解轉身鋒到銳時欠於趨避總是墮身死漢南泉父子可謂善轉身矣善趨避矣然細撿將來尤欠一着且道那裏是他欠一着處天井新云南泉欠趙州一着趙州輸南泉一機作麼生會千年故紙好合藥趙州示眾老僧今夜答話去也有解問者致將一問來時有僧出禮拜州曰比來拋磚引玉却引得箇墼子保壽沼云射虎不真徒勞沒羽法眼益舉問覺銕嘴此意如何覺云如國家拜將乃問甚人去得或有人出云某甲去得須云汝去不得眼云我會也報慈遂云甚麼處却成墼子去叢林中道纔出來便成墼子祇如每日出入行住坐臥不可總成墼子且道這僧出來具眼不具眼光孝覺因長慶問那僧纔出禮拜為什麼便將為墼子孝云適來那邊亦有人恁麼問慶云向伊道什麼孝云亦向伊道比來拋磚引玉却引得箇墼子雪竇顯云靈俐漢纔聞舉着便知落處然雖如此放過覺鐵嘴夫宗師家語不虗發出來必是作家因甚麼拋磚引墼諸禪德要識趙州麼從前汗馬無人識只要重論葢代功昭覺勤云諸方盡道趙州得逸羣之機一期施設不妨自在這僧要擊節扣關閃電光中卒着手脚不辦覺銕嘴能近取譬不墜宗風法眼有通方鑑才便知落處敢問諸人既是宗師為甚麼拋磚只引得箇墼子白巖符云覺公錯下名言法眼隨語生解且置一邊趙州以勢欺人放過不可當時這僧出來便與掀倒禪牀看他作何合煞趙州因僧問如何是咬人師子州曰歸依佛歸依法歸依僧莫咬老僧天寧琦云這僧也只是個喋屎狗為甚麼趙州一見便撒屎彩奔齪家趙州因僧問至道無難唯嫌揀擇是時人窠窟否州曰曾有人問老僧直得五年分踈不下雪竇顯云識語不能轉死卻了也好與二十棒這棒須有分付處若辨不出且放此話大行古南門云趙州答話深辨來風雪竇道識語不能轉死卻了也好與二十棒古南道無端無端又道這棒須有分付處若辨不出且放此話大行古南道個瞎若人辨得管取丹霄獨步愚菴盂云趙州古佛尚且經及五年道不得何况其餘你們只管亂開大口時旁僧哂之余乃打三下曰舉似明眼人看趙州到百丈丈問近離甚處州曰南泉丈曰南泉近日有何言句州曰未得之人直須悄然丈便喝州作怕勢丈曰大好悄然州乃作舞而出瑯瑘覺云趙州老人向獅子窟中換得爪牙昭覺勤云作家相見彼此難搆茫然悄然進前退後揑不成塑不就大路不行草裏走天童忞云賊是小人智過君子然二人賊漢之中有一正賊有一草賊若定當得出許你是個漢子不然總須著賊趙州問座主講什麼經主曰涅槃經州曰問一段義得麼主曰得州以脚向空趯一趯吹一吹曰是什麼義主曰經中無此義州曰脫空謾語漢此是五百力士揭石義也不識老宿代講主云和尚謾某甲謾大眾雪竇顯別云和尚慣得其便趙州問僧發足何處曰雪峰州曰雪峰有何言句示徒曰尋常道盡十方世界是沙門一隻眼汝等諸人向甚處屙州曰闍黎若回寄箇鍬子去瑯瑘覺云眾中有云寄鍬子去埋卻雪峰若道寄鉢盂去便說盛粥飯用狂解夢見作麼商量不是僧繇手謾說學丹青清化嶾云當時可惜不遇作家若是山僧見道闍黎若回寄箇鍬子去便云不將去他若問為什麼不將去和尚這裏少他不得趙州到雲居居曰老老大大何不覓箇住處州曰什麼處是從諗住處居曰山前有箇古寺基州曰和尚自住取又到茱萸萸曰老老大大何不覓箇住處州曰什麼處是從諗住處萸曰老老大大住處也不知州曰三十年弄馬騎今日卻被驢子撲雲居錫云甚麼處是趙州被驢撲處溈山云雲居茱萸為人猶如為己爭奈趙州不入這綣繢然雖如是不得雪霜力焉知松栢操大溈泰云二老只解把住不解放行趙州只解放行不解把住撿點將來未為全美且雙放雙收一句作麼生道畢竟水須朝海去到頭雲定覓山歸趙州問僧曾看法華經麼曰曾看州曰衲衣在空閑假名阿練若誑惑世間人汝作麼生會僧擬禮拜州曰汝披衲衣來麼曰披來州曰莫惑我曰作麼生得不惑去州曰莫取我語雪竇顯云大小趙州龍頭蛇尾諸人若能辨得便乃識破趙州如或不辨個個高擁衲衣莫惑翠峰好古南門云雪竇也是繩上生蛇揑目自惑且問諸人只如趙州恁麼問這僧恁麼答還是這僧惑趙州趙州惑這僧當時要得不惑待伊問汝披衲衣來麼但云和尚眼中不可著屑趙州在井樓上打水次見南泉過乃抱柱懸脚曰相救相救泉遂向踏梯上打曰一二三四五州少頃卻具威儀上方丈曰適來謝和尚相救昭覺勤云一人將錯就錯一人看樓打樓雖然如是父為子隱直在其中徑山䇿云趙州懸半賣狗南泉有年無德作這去就當時只好拽翻梯子教這漢一生蹭蹬還知麼養子方知父慈西山音云土老師若不將錯就錯趙州這漢幾乎懸殺趙州問新到曾到此間麼曰曾到州曰喫茶去又問一僧曾到此間麼曰不曾到州曰喫茶去院主問和尚為甚曾到也喫茶去不曾到也喫茶去州喚院主主應諾州曰喫茶去保福展云趙州慣得其便鏡清怤舉問僧云汝作麼生會僧便去清云邯鄲學唐步雪竇顯云這僧不是邯鄲人為甚學唐步若辨得出與汝茶喫青龍斯云趙州老漢通身為人不免被院主看破趙州因僧辭州問甚處去曰諸方學佛法去州豎拂曰有佛處不得住無佛處急走過三千里外逢人不得錯舉曰與麼則不去也州曰摘楊花摘楊花徑山杲云有佛處不得住生鐵秤錘被蟲蛀無佛處急走過撞著嵩山破竈墮三千里外逢人不得錯舉兩個石人相耳語恁麼則不去也此語已徧天下摘楊花摘楊花唵摩尼達哩吽㗶吒天童覺云沉空滯跡犯手傷鋒俱未是衲僧去就直須不入人行市不上他牀榻正不立玄偏不附物方能把住放行有自由分薦福璨云趙州說話如巫師祭鬼相似真實懇切要令病人當下安樂末後一道神呪雖然靈驗爭奈救這僧不得天寧琦云妙喜老祖唱之於前天寧遠孫和之於後門前種萵苣萵苣生火筯火筯開蓮花蓮花結木瓜木瓜忽然顛落地撒出無限無限芝蔴何也且要入拍寶壽新云斬新鐵蒺藜直透兩重關欲透兩重關嶺頭依舊月彎彎趙州聞沙彌喝參乃向侍者曰教伊去侍者纔教沙彌去沙彌便珍重州向傍僧曰沙彌得入門侍者在門外雲居錫云什麼處是沙彌入門侍者在門外這裏會得便見趙州趙州因僧問二龍爭珠誰是得者州曰老僧祇管看雪竇顯云看即不無爭即不得且道扶這僧扶趙州雲居莊云爭者不得得者不爭趙州只管看要且不失珠古南門云爭即不無看即不得且道珠在甚麼處趙州到一庵主處問有麼有麼主豎起拳頭州曰水淺不是泊船處便去又到一庵主處問有麼有麼主亦豎起拳頭州曰能縱能奪能殺能活便禮拜姜山愛云趙州只見錐頭利不見鑿頭方雲居舜云趙州當時甚生意氣雖然如是要且鼻孔在二庵主手裏龍門遠云庵主一等豎拳趙州因甚肯一個不肯一個且道得失在甚麼處要識趙州麼拍禪牀左邊一下要識二庵主麼拍禪牀右邊一下還有檢點得出者麼良久云易開終始口難保歲寒心溈山果云泣露千般草吟風一樣松為什麼肯一個不肯一個這裏見得透釋迦不先彌勒不後坐斷要津天長地久苟或不然月庵為你下箇註脚良久云若不如是爭知如是昭覺勤云佛祖命脉列聖鉗錘換斗移星驚天動地有般漢未出窠窟只管道舌頭在趙州口裏殊不知自己性命已屬他人若能握向上綱宗與二庵主相見便可以定龍蛇別緇素正好著力還知趙州落處麼切忌瞞頇萬峰藏云可惜趙州不遇三峰老漢當時若見與麼揑怪便與對眾三十拄杖趂出院免得天下人論量通玄奇云二庵主懷藏至寶以待其人趙州更是大海經商酬價罕有人識明果淖云趙州慣做白拈賊不消庵主一箇拳頭口欵盡供了也雖然且道二庵主還識趙州麼西遯超云盡道二庵主本無優劣趙州無風興浪惑亂人一上料掉沒交涉又謂趙州權衡在手抬搦任意借庵主拳頭顯自家作用這便是趙州自贊殺活縱奪處亦料掉沒交涉還有知趙州落處者麼咄蓮華峰一條拄杖子未放你在雲庵悅云水淺不是泊船處言中有響能縱能奪便禮拜句裏藏鋒老趙州可謂用盡神通二庵主善能坐觀成敗如今有般無主孤魂不具透關眼乃只管較得較失不惟蹉過古人亦且埋沒自己明眼見那禁一笑還委落處麼大冶精金應無變色東塔熹云兩個擔板漢坐觀成敗帶累老趙州淨地喫交理安洸云權衡佛祖龜鑒宗乘須是趙州直捷擔荷不負來機還他庵主既同豎一拳頭因甚有恁麼有不恁麼鴛鴦繡出從君看不把金針度與人蓮柎䇿云趙州著緉草鞋到處行脚不怕疑殺人乃向二菴主手裏納敗闕顧左右云且道甚處是趙州納敗闕處兩行孤鴈撲地高飛一對鴛鴦池邊獨立趙州因僧問道人相見時如何州曰呈漆器雪竇顯云諸禪德還有識趙州底麼出來相共商量若未能辨明大好從頭舉與你點破四九三十六收古南門云趙州已是無折合雪竇更添鹽添醬雖然還有識得趙州者麼三生六十劫靈巖儲云趙州古佛雖是當門只一齒等閒吐露些兒直令人五年分疎不下趙州因二僧相推不肯作第一座主事白州州曰總教伊作第二座曰第一座教誰作州曰裝香著曰裝香了也州曰戒香定香慧香解脫香天童華云趙州下一槌不妨驚羣動眾仔細檢點將來也是泥裏洗土塊若是薦福門下不用相推第一座也有人第二座也有人第三座也有人雖然如是不免從頭註破第一座鐵眼銅睛不破第二座陽春白雪無人和第三座真實身心同達磨且道與趙州是同是別愚庵盂云趙州著個座元於佛祖位上使天下叢林無敢正座規繩自此一跌直至於今整理不上還有人為法社正紀綱者麼不必相推請來相見如無山僧擯却聖僧去也趙州到保壽壽見來便背面而坐州乃展坐具壽便起歸方丈州收坐具便下去保福展云保壽忘頭失尾趙州平地喫撲趙州因一僧曰某甲從長安來橫一條拄杖不曾撥著一人州曰自是大德拄杖短僧無語天童悟代僧云某甲罪過不意輕觸和尚趙州因僧問久嚮石橋到來祇見略彴州曰汝祇見略彴且不見石橋曰如何是石橋州曰渡驢渡馬城山洽云這僧借事驗主邈視趙州趙州不妨頑軟用白拈手段輕輕按過果然上釣你道渡驢渡馬是賞他罰他這裏看破一生參學事畢不然喫水也須防噎趙州上堂金佛不度爐木佛不度火泥佛不度水真佛屋裏坐徑山杲云趙州和尚吐心吐膽恁麼告報了也還有知恩報恩者麼便下座仰山欽云揭示如來正體發明向上宗猷趙州固是好手只是不合強生節目雪崖見處又且不然金佛度爐木佛度火泥佛度水真佛𠰒切忌話墮忽有個漢出來道你恁麼說正是強生節目拍膝一下云將謂無人證明天界盛云大小妙喜不識好惡盡大地人被趙州刳了眼睛鼻孔將個無位真人推下萬丈深坑至今求出頭不得徑山今日為伊出隻手救拔去也金佛須度爐木佛須度火泥佛須度水真佛不許他在黑山下作鬼家活計直教劒刃上行火𦦨裏走入生死流闢聖凡路顯全機大用向如意頭上縱橫無礙去也會麼換骨洗腸重整頓通身手眼更須參趙州示眾曰老僧三十年前在南方火爐頭有一則無賓主話直至於今無人舉著淨慈聞云森羅萬象明暗色空日夜舉揚趙州古佛不是不知只為貪程太速白巖符云者裏也有一則無賓主話山僧三十年前未發意行脚時早已舉示諸人了也是汝諸人還記得麼趙州三十年無人舉著白巖未發意行脚時早已舉示且道早已舉示底是無人舉著底是若言無人舉著底是錯過白巖若言早已舉示底是錯過趙州直饒你二俱坐斷中亦不存更要問你喚什麼作無賓主話擬議不來痛棒打出瓶山謙云趙州祇知賣弄殊不知未開口前早落賓主行隊
