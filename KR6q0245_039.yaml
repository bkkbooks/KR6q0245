body:
  text: 古杭白巖嗣祖沙門淨符彚集南八汝州首山省念禪師南八風穴沼嗣示衆拈竹篦曰喚作竹篦則觸不喚作竹篦則背汝諸人且喚作什麼時葉縣省在會下乃近前掣得拋向階前却曰是什麼山曰瞎縣於言下大悟廣慧璉云省驢漢悟則太煞悟要且未盡先師意旨天寧琦云廣慧恁麼道先師實有意旨那將一把火照看面皮厚多少下坡不走快便難逢若是向上提持還我竹篦師兄始得雲居莊云脫體風流須是首山當機抗敵還他葉縣一向與麼去臨濟佛法掃土而盡甌峰承云我王庫內無如是刀明招補云我當時若在待道汝諸人喚作什麼但噓兩虗管取首山者漢瓦解氷消首山因汾陽問百丈卷席意旨如何山曰龍袖拂開全體現曰師意如何山曰象王行處絶狐蹤汾於言下大悟禮拜起曰萬古碧潭空界月再三撈摝始應知保寧茂云大小首山龍頭蛇尾有底便道真不掩僞曲不藏直拍禪牀云毗婆尸佛早留心直至如今不得妙首山因僧問如何是佛山曰新騎驢阿家牽曰未審甚麼句中收山曰三玄收不得四句豈能該曰此意如何山曰天長地久日月齊明首山念又因僧問新騎驢阿家牽意旨如何山曰百歲翁翁失却父曰百歲翁翁豈有父耶山曰汝會也又曰此是獨坐無尊卑從上無一法與人愚菴盂云欽深淵默漆雞頭大將軍除壁虱光相得云與麼答話應機接物不妨迅捷檢較將來未免旁觀者哂首山因僧問如何是佛山曰杖林山下竹筋鞭道峰清云首山控千里馬發穿楊箭無有不中之者怎奈遇著者僧致令勞而無功若有問道峰如何是佛祇向道此問何來且道與首山是同是別汝州廣慧真禪師南八風穴沼嗣風穴問會昌沙汰時護法善神向什麼處去真曰常在闤闠中要且無人見穴曰你徹也徑山杲云你道風穴自徹也未青八鼎州梁山緣觀禪師青八同安志嗣示衆南來者與伊三十棒北來者與伊三十棒琅瑘覺云梁山好一片真金將作頑鐵賣却琅瑘即不然南來者與你三十棒北來者與你三十棒從教天下人貶剝天童忞云琅瑘雖不將金作鐵賣其奈自不說價要人還錢廣潤又則不然南來者與你三十棒北來者與你三十棒棒頭有眼明如日要識真金火裏看佛日晳舉琅瑘語畢云二老可謂婆心太切只知入水入泥不顧旁觀者哂隆安即不然南來者任他南來北來者任他北來三十棒切忌動著何故黃金自有黃金價何必和沙賣與人白巖符云琅瑘攙行奪市錐只恁麼利廣潤擬出一頭鑿只恁麼方要見梁山較三千里梁山上堂真園頭出問家賊難防時如何山曰識得不為冤曰識得後如何山曰貶向無生國裏曰莫是他安身立命處麼山曰死水不藏龍曰如何是活水龍山曰興波不作浪曰忽遇傾湫倒嶽時如何山下座把住曰闍黎莫教溼著老僧袈裟角黃龍清云梁山老漢洞達機宜堪稱作者怎奈借便開門展轉令人著賊黃龍即不然才見問家賊難防時如何便與一刀兩斷教伊永絶窺窬然雖如是忽有個衲僧出來却指山僧云賊賊又作麼生具眼者辨取天童華云梁山和尚要且只解戰賊不解殺賊有問山僧家賊難防時如何劈脊便打何故不見道齊之以禮雲門信云園頭久默此要真有運籌帷幄決勝千里之機苟非梁山大難抵敵雖然末後中他一箭且喜卸甲而歸還有救得者麼若問雲門忽然傾湫倒嶽時如何但向道照管尾巴且看園頭作何折合棲霞成云擒賊須擒王梁山縱之而不擒何也蓋欲試其賊之手段果能為王否應菴云只解戰賊不解殺賊嗚呼殺又何難戰不易也使其弓折箭盡自肯投降則賊可轉為良民矣齊之以禮必先導之以德龍華體云梁山老人向平田淺草撥著個焦尾大蟲直是利害若非深諳伏虎之方幾遭毒口遂高聲召云大衆者裏也有一個好生隄防還見麼乃驀拈拄杖下座一齊打散鳳山啓云正偏妙叶玉線金針者僧如庖丁游刃用有餘饒梁山似郢匠揮斤纖毫無損應菴曰只能戰賊不解殺賊殊不知垂衣裳而天下治者堯舜也河渚謙云梁山原來膽小只能識賊貶賊不能用賊若是山僧待問家賊難防時如何但向道用防作麼不見道家無小使不成君子白巖符云真公一挨一拶儘有捋虎鬚底膽略自非梁山老漢濶大門牆難為包裹雖然者裏却不恁麼待道忽遇傾湫倒嶽時如何劈脊便打云者畜生看你走向甚麼處去寶光淵云梁山老漢也是當斷不斷返招其亂若據寶光見處待問家賊難防時如何便與三十痛棒趁出為什麼不見道來說是非者便是是非人梁山因太陽玄參問如何是無相道場山指觀音像曰者是吳處士畫底玄擬進語山急索曰者個是有相底如何是無相底玄頓悟於言下遂作禮起却依位立山曰何不道取一句玄曰道即不辭恐上紙筆報親舟云大似雲雷相送冲霄跨漢只在片時咦清化嶾云犀因玩月紋生角象被雷驚花入牙棲霞成云梁山可謂有奔流度刃之機活捉生擒之手太陽如香象渡河截流而去忽然回顧直得滿地落花紅似錦百川四瀆盡芬芳烏龍岑云玉線金針繡鴛鴦於錦上須是梁山東君布令見春工於一枝還他玄老雖然傑出當時未免費人脣舌金陵清凉法眼文益禪師青八地藏琛嗣問修山主毫釐有差天地懸隔你作麼生會修曰毫釐有差天地懸隔眼曰與麼又爭得曰和尚作麼生眼曰毫釐有差天地懸隔修便禮拜東禪齊徵云山主恁麼祇對為甚麼不肯及乎請益法眼乃仍只恁麼道且道疑訛在什麼處者裏看得透許你具一隻眼五祖戒別法眼劈脊便打保寧勇云修山主當時何不也好向法眼道與麼會又爭得白巖符云大小保寧錯過修山主也不知是他便禮拜也太煞誵訛徑山杲云法眼與修山主絲來線去綿綿密密扶起地藏門風可謂滿目光生若是徑山門下更買草鞋行腳始得何故毫釐有差天地懸隔甚處得者消息來天寧琦云二老漢不會轉身句加今有問天寧毫釐有差天地懸隔作麼生會向他道昨日有人恁麼問三十棒趁出院去也報恩秀云萬松當時見法眼道恁麼又怎得向道久聞和尚有此機要不然擺手便行管取一時坐斷博山來云法眼勾人在不疑之地且道有多少法術王言如絲其出如綸河渚謙代修云和尚元來別有長處法眼問僧甚處來曰泗洲禮拜大聖來眼曰大聖今年出塔否曰出眼却問旁僧曰你道伊到泗洲不到泗洲浮山遠云者僧到即到泗洲只是不見大聖道場全云者僧見即見大聖只是不曾識法眼東禪觀云者僧到也到泗洲見也見大聖識也識法眼只是自討頭不見報恩琇云者一隊漢病在膏肓只顧道那僧不見誰知却是自不識那僧有人出來道和尚也是扶弱不扶強新報恩隨聲便打且道是肯他不肯他法眼因僧問聲色兩字甚麼人透得眼却謂衆曰諸上座且道者個師僧還透得也未若會此僧問處透聲色也不難天童覺云從前不了祇為家賊難防直下分明且向草菴止宿高峰妙云明修棧道暗度陳倉愚菴盂云平地上死人無數法眼指子曰識得子周匝有餘雲門偃云識得子天地懸殊雪竇顯云澤廣藏山理能伏豹薦福懷云識得子是楠木做圓通秀云識得子四腳著地泐潭清舉法眼雲門雪竇語畢云三個漢總是依他作解明昧兩岐不脫見聞如水中月黃龍即不然逼塞乾坤外開張日月前徑山杲云識得子好剃頭洗腳雖然如是錯會者多龍池傳云識得子更參三十年歸來休云依舊是子雲門澄云識得子正有事在清化嶾云識得子不許坐著坐著則禍事資福侶云識得子雙目如瞽靈溪昱云法眼解放不解收雲門解收不解放天衣平地上喫交總是依草附木何如拽杖看雲起閒聽黃鸝三兩聲法眼問覺上座船來陸來覺曰船來眼曰船在什麼處曰船在河裏覺退眼乃問旁僧曰你道適來者僧具眼不具眼博山來云虗空無彩色大海有波瀾報恩琇代旁僧云賊過點兵義山訥云絲來線去不露鋒鋩自非見處精明用處自在何以能此雖然你若作佛法會帶纍他二老不值半文錢慧雲盛云覺上座四稜踏地故法眼退己讓人旁僧若是個漢好與道潭州紙貴一狀領過白巖符云與麼相見可謂大羮玄酒一掃諸方古今殘剩不妨奇特中奇特乃無端向旁僧露尿臭氣得不返令人惡心獬云法眼恁麼問覺上座恁麼答若作佛法會入地獄如箭射法眼因僧參次乃以手指簾尋有二僧齊去捲簾眼曰一得一失黃龍清云法眼鏌鎁在手殺活臨時二僧齊去卷簾且道那個得那個失還會麼世事但將公道斷人心難與月輪齊南㵎問云法眼探頭二僧逐塊直饒收處迅捷未免平地喫交百丈泐云八字打開眉橫鼻直眼裏無筋一世貧千古萬古空相憶法眼道一得一失還有分疏得者麼卓拄杖云山僧口門窄資福侶云虎嘯堂前又且不然或有二僧一齊卷簾但向道一對無孔鐵錘且道賞伊罰伊若到諸方不得錯舉曹溪珠云清凉老漢指尖頭上大有神鋒二僧不善𢌞避未免喪身失命若是個漢當時待指簾便好與掀倒禪牀法眼因僧問承教有言從無住本立一切法如何是無住本眼曰形興未質名起未名博山來云形未興名未起且道森羅萬象從何處得來者裏放過即不可喝一喝法眼上堂三通鼓罷簇簇上來佛法人事一時周畢慧溫尼云三通鼓罷簇簇上來拄杖不在苕帚柄聊與三十天童忞云法眼用鉤慧溫用錐山僧也不鉤你也不錐你且放教冷來看乃云三通鼓罷簇簇上來向下文長付在來日法眼問永明潛曰律中道隔壁聞叉釧聲即名破戒現覩金銀合雜朱紫駢闐是破戒是不破戒明曰好個入路眼曰汝向後有五百毳徒為王侯所重在天寧琦云真個入得錦上鋪花若入不得眼中著屑光相得云法眼欲從火裏拈出一莖眉毛既不可得而永明乃善于就窠打劫固足稱矣然只解瞻前不能顧後資福廣云石雨和尚住雲門時每拈此話問人無有契其機者廣後至亦蒙問及廣答云此是古人作用耳雨持以示衆大為稱賞越年復舉此話問廣云汝去年道是作用且道是甚麼作用廣云大似騎賊馬殺賊雨便休去不復措一辭大衆且道山僧此兩語有得失無得失雨和尚讚嘆休去是好心不是好心者裏見得方有參學眼法眼因僧問如何是曹源一滴水眼曰是曹源一滴水天童傑云法眼和尚向百戰場中舞纛旗未免旁觀者哂忽有問靈隱如何是曹源一滴水只對他道和屎合尿法眼因僧慧超問如何是佛眼曰汝是慧超金粟元云法眼恁麼抵對可謂瘥病不假驢䭾藥能彈何用玉絲絃者僧悟去亦覺可人檢點將來猶有事在且道是什麼事咄玄沙道底廣胤標云紅爐點雪還他作者者僧懵懵懂懂擔一尊沒鼻孔古佛要法眼與他點睛法眼輕輕與他一點立時光天照地然到衲僧門下更須擉瞎方堪共語法眼因僧問古佛堂前何人先到眼曰不動步者資福廣云法眼恁麼答話引他業識茫茫者坐在無魂必死之地將謂古佛堂前可以坐致殊不知唐喪光陰虗消歲月古佛堂前驢年夢見然則畢竟什麼人先到即向他道牛頭獄卒襄州青溪洪進禪師青八地藏琛嗣問修山主明知生是不生之理為甚麼為生死之所流修曰笋畢竟成竹去如今作篾使還得麼進曰汝向後自悟去在修曰某甲所見止如此上座意作麼生進指廊下曰者個是監院房那個是典座房修即禮謝白巖符云大小青溪他是將門之子不是慣欺僚屬祇為他富堪敵國差珍異寶東擲西拋總是他尋常事又何足怪雖然祇如修山主禮謝且道是會了恁麼不會恁麼為是別有利害撫州龍濟紹修禪師青八地藏琛嗣問僧甚處來曰翠巖濟曰翠巖有何言句示徒曰尋常道出門逢彌勒入門見釋迦濟曰與麼道又爭得僧便問和尚又如何濟曰出門逢阿誰入門見什麼僧於言下有省薦福懷云山僧則不然出門則吳山楚水入門則佛殿行廊或有個衲僧出問師意如何却許伊具一隻眼西禪需云龍濟頭白齒黃作恁麼語話懶菴即不然出門竹徑無人掃入戶方塘照影寒龍濟上堂具足凡夫法凡夫不知具足聖人法聖人不會聖人若會即同凡夫凡夫若知即是聖人此語具一理二義若人辨得不妨於佛法中有個入處若辨不得莫道不疑好珍重黃龍清云修山主只知布網張羅不覺自遭籠至今不得出身徑山杲云點鐵化為金玉易勸人除却是非難天寧琦云修山主熟處難忘也是胡地冬抽笋淨慈一云直饒有個入處堪作什麼凡夫則是凡夫聖人則是聖人且道凡聖兩忘一句作麼生道閒持經卷倚松立笑問客從何處來愚菴盂云辨得也是草裏漢辨不得也是草裏漢若龍濟者不敢批評請自領去龍濟頌曰欲識解脫道諸法不相到眼耳絶見聞聲色閙浩浩昭覺勤云聲不到耳色不到眼聲色交參萬法成現且道還踏著解脫道也無不省者個意修行徒苦辛龍濟頌曰初心未入道不得閙浩浩鐘聲裏薦取鼓聲裏顛倒天目禮云修山主可謂五音六律無相奪倫美則美矣要且活埋在聲塵堆裏至今出身不得何故玄沙道底龍濟頌曰二破不成一一法鎮長存若人一二解永劫受沉淪昭覺勤云修山主直似倚天長劒凜凜神威向平坦坦處壁立千仞壁立千仞處平坦坦雖然只道得一半山僧即不然二破不成一一法亦不存不作一二解永劫受沉淪龍濟曰是柱不見柱非柱不見柱是非已去了是非裏薦取徑山杲咄云又是從頭過天寧琦云教裏少哩修山主有多少奇特也只是座主見解未夢見我衲僧巴鼻在見露柱但喚作露柱見燈籠但喚作燈籠不得動著動著三十棒龍濟曰萬法是心光諸緣唯性曉本無迷悟人只要今日了天寧琦云既無迷悟了個什麼從前汗馬無人識只要重論蓋代功福州東禪玄亮禪師青八白龍希嗣僧問本無迷悟為什麼却有佛有衆生禪曰話墮也灜山誾徵云且道是者僧話墮東禪話墮試論量看隨州智門光祚禪師青八香林遠嗣僧問蓮花未出水時如何門曰蓮花曰出水後如何曰荷葉天童覺云靈龜無卦兆空殼不勞鑽智門因僧問如何是佛門曰踏破草鞋赤腳走如何是佛向上事門曰拄杖頭邊挑日月雪竇顯云千兵易得一將難求笑巖寶云一句明三句三句明一句還他智門只如雪竇恁麼道在者僧在智門具眼者定當看智門因僧問如何是般若體門曰蚌合明月曰如何是般若用門曰兔子懷胎雪竇顯云非惟把定世界亦乃安怗家若善能參詳便請丹霄獨步古南門云古南則不然如何是般若體盲人見暗如何是般若用機婦停梭大衆何必特地參詳幸在家中穩坐還會麼早知燈是火飯熟幾多時鼎州德山慧遠禪師青八雙泉郁嗣解夏上堂僧問九旬禁足今已滿自恣之儀事若何山曰猢猻趁蛺蝶九步作一歇曰未審意旨如何山以頌示之曰兩個兒童舁木鼓左邊打了右邊舞剎那變現百千般分明示君君記取瑞巖慍云答也答了頌也頌了怎奈者僧未肯點首在靈巖路見不平要與德山相見自恣在今朝有花當面貼一句定誵訛猢猻趁蛺蝶蛺蝶飛無處尋空中打坐海底穿針驀拈拄杖顧視左右云衆中莫有因齊慶贊者麼卓拄杖云休將閒學解埋沒祖師心蘄州五祖戒禪師青八雙泉寬嗣因玉㵎頌雲門北斗藏身話曰北斗藏身為舉揚法身從此露堂堂雲門賺殺他家子直至如今謾度量且問其作頌之意㵎乃張目視之戒曰若恁麼會雲門不值一錢公亦當無兩目後㵎果如其言戒暮年亦失一目覺範曰今人妄意測度先德之言疑誤後昆亦可以少誡中峰本云北斗藏身豈但玉㵎頌不出便是五祖戒也只得向背後叉手暮年各損其目也是好采洪公謂誤謗先宗感果如是休將閒學解埋沒祖師心五祖問僧近離甚處曰東京祖曰還見天子也無曰常年一度出金明池祖曰有理可恕無理難容出去真如元徵云者僧親從東京來他恁麼應對見天子不見天子五祖末上與麼道是賞伊是罰伊蓮華峰祥菴主青八奉先深嗣示寂日拈拄杖示衆曰古人到者裏為什麼不肯住衆無對峰乃曰為他途路不得力復曰畢竟如何以拄杖橫肩曰楖𣗖橫擔不顧人直入千峰萬峰去言畢而逝昭覺勤云也好與三十棒只為他擔板腦後見腮莫與往來諸人還辨得菴主麼腳跟也未點地在天童覺云負入不負出本色住山人思大吞盡諸佛普眼不見普賢且道病在甚麼處驀拈拄杖卓一下云官不容針私通車馬寶壽新云蓮峰拄杖子攪亂三千大千世界了也還知麼却化為龍矣還降得麼咦明招補云菴主老不歇心怎奈土曠人稀相逢者少棗樹第二世禪師青八黃龍機嗣問僧近離甚處曰漢國樹曰漢國天子還重佛法也無曰苦哉賴值問著某甲若是問著別人則禍生樹曰作什麼曰人尚不見有何佛法可重樹曰闍黎受戒來多少時曰二十夏樹曰大好不見人便打雪竇顯云者僧棒即喫要且去不再來棗樹令雖行怎奈無風浪起南堂欲云者僧句裏藏鋒棗樹棒頭有眼說什麼去不再來直須棒了出院天奇瑞云埋兵索戰輸他作者量敵排軍豈不傷軀正眼從來付大謀大衆到者裏如何免得良久云塗毒鼓邊休側耳古南門云者僧有前無後棗樹有後無前雪竇明眼難瞞要且蹉過棒頭白巖符云者僧祇解慎初不解護末棗樹雖善護末要且不解慎初拈拄杖云者裏還有善始善終者麼設有在白巖門下並須喫棒為什麼聻待你脫却汗臭衫子謾謾來與你道棗樹問僧發足甚處曰閩中樹曰俊哉曰謝師指示樹曰屈哉僧作禮樹曰我與麼道落在什麼處僧無語樹曰彼自無瘡勿傷之也昭覺勤云凡為宗師言不虗發者僧既是閩中來有何俊哉謝師指示有何屈哉還見得誵訛麼若見得方信道棗樹在山僧拂子頭上無風起浪好肉剜瘡其或未然老僧罪過彌天棗樹因僧辭乃問若到諸方有問老僧此間法道你作麼生對曰待問即道樹曰何處有無口底佛曰祇者也還難樹豎拂子曰還見麼曰何處有無眼底佛樹曰祇者也還難僧繞禪牀一匝而出樹曰善能祇對僧便喝樹曰老僧不識子曰用識作麼樹敲禪牀三下昭覺勤云棗樹有口如啞者僧有眼如盲繞禪牀一匝敗軍之將敲禪牀三下弓折箭盡白巖符云棗樹用盡伎倆畢竟不奈者僧何者僧呈盡醜態畢竟脫棗樹籠不得二俱不了若到山僧者裏并須喫棒趁出
