body:
  text: 古杭白巖嗣祖沙門淨符彚集青三澧州龍潭崇信禪師青三天皇悟嗣因德山來參直上法堂曰久嚮龍潭及至到來潭又不見龍又不現潭引身曰子親到龍潭德山無語遂棲止焉雪竇顯云將錯就錯雲峰悅云大小德山向虀甕裏醃殺黃龍心云雪竇與麼道為是德山將錯就錯龍潭將錯就錯識休咎的衲僧必知去處未過關者亦宜辨取還相委悉麼縱饒栽種得不是棟梁材天童悟云既是潭又不見龍又不現因甚道子親到大似方木逗圓竅諸仁者且道甚麼處見親到處試斷看古南門云龍潭老漢就身打劫可惜德山牙如劒樹口似血盆驅而納諸𮊁獲陷穽之中而莫之知避也且道利害在什麼處棲霞成云龍潭將蝦釣鯉德山認奴作郎兩個老漢好與三十痛棒或曰德山且置龍潭過在甚處向道不當魔魅人家男女京兆翠微無學禪師青三丹霞然嗣龍牙問自到和尚法席每每上參不蒙一法示誨意在於何翠曰嫌少個甚麼牙又問洞山山曰爭怪得老僧法眼益別云祖師來也雪竇顯云兩個老漢被這僧穿却唯有法眼與他同參若是雪竇門下喫棒了趂出雲居齊云此三尊宿還有親踈也無若有那個親若無親踈眼在什麼處翠微因清平參問如何是西來的的大意微曰待無人即向你道平良久曰無人也請和尚道微下禪牀引平入竹園平又曰無人也請和尚道微指竹曰這竿得恁麼長那竿得恁麼短平乃有省天童忞云向翠微未屙已前薦去已是第二頭若竹園裏悟得底直是第八首畢竟作麼生顧眎大眾云咦洎合打破蔡州吉州孝義性空禪師青三丹霞然嗣僧參次義乃展手示之僧近前却退後義曰父母俱喪略不慘顏僧呵呵大笑義曰少間與闍黎舉哀僧打筋斗而出義曰蒼天蒼天昭覺勤云展開兩手只見錐頭利進前退後不見利頭錐呵呵大笑笑裏有刀連哭蒼天弓折箭盡且道畢竟如何良久云若不共同橋上過爭信橋流水不流僊天和尚青三大川嗣因僧參擬作禮天曰野狐兒見什麼了便禮拜曰老禿奴見什麼了便恁麼問天曰苦哉苦哉僊天今日忘前失後曰要且得時終不補失天曰爭不如此曰誰甘天呵呵大笑曰遠之遠矣僧四顧便出高峰妙云一問一答有賓有主盡謂二俱作家若據山僧檢點這僧猶自可僊天笑殺人陽山頂云盡道這兩個漢箭鋒相拄拳踢相應若據陽山檢點將來直是天地懸隔白巖符云大澤之龍深林之虎驀拶相逢風號雲卷則不無其奈上古淳風為之瓦解僊天因新羅僧到參纔展坐具天便捉住曰未發本國時道取一句來僧無語天便推出曰問伊一句便道兩句寶壽方云這僧無語不妨將成九仞之山爭奈末上欠進一簣之土若是個頭尾相稱的漢待道問伊一句便道兩句便好向道却悔某甲遠來管教僊天這漢大開東閣有分廣胤標云且道那裏是這僧道底兩句試分析看若分析得出僊天被汝看破分析不出辜負僊天勞力漳州三平義忠禪師青三大顛嗣問大顛不用指東話西請師直指顛曰幽州江口石人蹲平曰猶是指東話西顛曰若是鳳凰兒不向那邊討平作禮顛曰若不得後句前話也難圓昭覺勤云徹底老婆心不向那邊討父子要投機無端入荒草三平陞座次有道士出眾從東過西又有一僧從西過東平曰適來道士却有見處師僧未在士出作禮曰謝師接引平便打僧出作禮曰乞師指示平亦打復召眾曰此兩件公案作麼生斷還有人斷得麼如是三問眾皆無對平曰既無人斷老僧為斷去也乃擲下拄杖歸方丈溈山喆云若不是三平老漢幾乎作道理斷却不見石鞏道三十年一張弓兩隻箭只射得半個聖人果然三平有偈曰即此見聞非見聞無餘聲色可呈君個中若了全無事體用何妨分不分天童覺云正相逢沒交涉六戶不掩四衢絕蹤遍界是光明通身無向背正恁麼時作麼生機絲不掛梭頭事文彩縱橫意自殊本生和尚青三大顛嗣示眾拈拄杖曰我若拈起汝便向未拈起時作道理我若不拈起汝便向拈起時作主宰且道老僧為人在什麼處時有僧出曰不敢妄生節目生曰也知闍黎不分外曰低低處平之有餘高高處觀之不足生曰節目上更生節目僧無語生曰掩鼻偷香空招罪犯雪竇顯云者僧也善能切磋怎奈弓折箭盡總不如本生是作家宗師拈起也天回地轉應須拱手歸降放下也草偃風行必合全身遠害還見本生為人處麼復拈拄杖云太平本是將軍致不許將軍見太平古南門云本生雪竇俱是作家宗師竭力為人怎奈節目太多不若者僧一時坐斷何故不見道毗婆尸佛早留心直至如今不得妙拋下拄杖云是什麼雪竇正云者僧雖有衲僧氣魄怎奈少捋虎鬚的作略當時若與抝折拄杖不獨見其牙爪亦且免雪竇在節目上更生節目潭州石室善道禪師青三長髭曠嗣每見僧來便豎起拄杖曰三世諸佛盡由者個對者少得冥契長沙聞乃曰我若見即令放下拄杖別通個消息三聖將此語祇對被室認破為長沙語杏山聞三聖失機乃親到石室室見來乃潛入碓房碓米杏曰行者接待不易貧道難消室曰穿心盌子盛將來無底盤子合取去說甚麼難消杏便休昭覺勤云石室置個問端不妨孤峻若非長沙怎得投機雖然只知恁麼不知不恁麼遂舉拄杖云過去諸佛不恁麼現在諸佛不恁麼未來諸佛不恁麼或若總道放下拄杖子我也知你只是個學語之流生機處道將一句來天寧琦代杏山云何得將常住物入衣鉢下用報恩琇云一個綿包特石一個鐵褁泥團放行則在廟之圭璋把住乃處堂之燕拈拄杖云恁麼也不是不恁麼也不是放下不放下總不是卓拄杖云倚天長劒逼人寒慧雲盛代杏山云切忌脹破肚皮南四睦州龍興道明陳尊宿南四黃檗運嗣因僧問高揖釋迦不拜彌勒時如何州曰昨日有人問趁出了也曰和尚恐某甲不實那州曰拄杖子不在笤帚柄聊與三十雪竇顯云睦州只有受璧之心且無割城之意南堂靜云衲僧家高揖釋迦不拜彌勒不為分外也須是本分鉗錘方能辨其真偽何故出羣須是英靈子敵勝還他師子兒選佛若無如是眼直饒千載亦奚為西禪需云若要扶持大法舉唱宗乘者老漢却較些子諸人要見睦州麼劒為不平離寶匣藥因救病出金瓶南堂欲云雪竇與麼批判深屈古人山僧道睦州和盤托出只是罕遇知音古南門云雪竇祇見一邊殊不知睦州老漢量才補職得人一牛還人一馬龍華體云雪竇只見錐頭利不見鑿頭方殊不知睦州大似金翅劈海直取龍吞雖然如是怎奈被者僧勘破睦州問僧甚處來曰那邊劄州曰老僧屈曰和尚知即得州曰擔枷過狀漢劈脊便打雲峰悅云睦州何用繁辭那邊劄劈脊便打睦州示眾我見百丈不識好惡大眾纔集以拄杖一時打下復召大眾眾回首乃曰是什麼有甚共語處黃檗和尚大眾纔集以拄杖一時打下復召大眾眾回首乃曰月似彎弓少雨多風猶較些子雪竇顯云說甚猶較些子直是未在據雪竇眾集一時打下便休或有個無孔鐵錘為眾竭力善能擔荷可以籠今古把斷乾坤乃驀拈拄杖云放過一著瑯瑘覺云若入洪波裏須是弄潮人靈隱嶽云轉見誵訛者幾個漢出來張羅布網却向平地上撈蝦摝蜆用盡自己心笑破他人口昭覺勤云百丈將棒喚狗未免相顧睚眦黃檗香餌綴鈎吞者喪身失命睦州當眾舉覺與賊過梯雪竇要人擔荷無風起浪崇寧今日總不恁麼各請歸堂古南門云睦州借劒殺人雪竇停囚長智雖然為眾竭力要且鈍置百丈黃檗不少會麼楖𣗖橫擔不顧人直入千峰萬峰去睦州問僧近離甚處僧便喝州曰老僧被你一喝僧又喝州曰三喝四喝後作麼生僧無語州便打曰者掠虗漢泐潭清云者僧只解瞻前不能顧後恁麼行脚鈍置殺人黃龍即不然待道三喝四喝後如何將坐具一摵拂袖便行非唯截斷睦州葛藤且與天下衲僧出氣靈隱嶽云老睦州甚生氣槩却向者僧手裏呈欵睦州一日喚僧曰大德僧回首州曰擔板漢雪竇顯云睦州只具一隻眼何故者僧喚既回頭因甚却成擔板黃龍新云雪竇亦只具一隻眼者僧喚既回頭因甚却不成擔板鼓山珪云睦州和尚被者僧勘破天童悟云睦州與麼道且道是賞伊罰伊若道罰伊者僧喚既回頭甚麼處是擔板處若道賞伊睦州因甚道擔板諸人撿點看莫只學矮子看戲南㵎問舉雪竇黃龍二語畢云路見不平以楔出楔則不無三大老撿點將來一總是擔板漢何故字經三寫烏焉成馬睦州因秀才相訪州問蘊何事業曰會二十四家書州以杖空中點一點曰會麼曰不會州曰又道會二十四家書永字八法也不識黃龍南云睦州一點直在威音王已前及乎八法論書却被個俗人勘破若是黃龍即不然孔門弟子無人識碧眼胡僧笑點頭溈山云睦州雖然用得者一點妙大似倚勢欺人大溈即不然乃畵一圓相云會麼字義炳然文不加點徑山印云睦州大似如風吹水自然成文惜乎逞俊太過翻覺烏焉成馬山僧今日有秀才來雖有拂子拄杖束之高閣何故文不在茲天童忞云睦州一點偶爾成文秀才罔措字義炳然只為少年時順硃頑了兼之舊本頗有錯簡山僧不免為諸人改正二十四家書會盡空中一點便茫然休茫然從來小生八九子大人乙己化三千薰云睦州善註黃龍善判要且二俱不了畢竟作麼生拈拄杖畫一畫云我不似睦州打葛藤睦州上堂裂開也在我揑聚也在我僧便問如何是裂開州曰三九二十七菩提涅槃真如解脫即心即佛我且恁麼道你又作麼生曰某甲不與麼州曰盞子撲落地碟子成七片曰如何是揑聚州乃斂手而坐雲峰悅云相罵饒你接嘴相唾饒你潑水天童覺云睦州用處直是長三短五七縱八橫撒在面前拋向腦後不妨奇特然則門庭施設自是一家入理深談不啻百步靈隱嶽云也好笑睦州被者僧拶得恰似落湯螃蠏七手八脚一時露天井新云者僧贏得一擔輸却兩頭睦州老漢眼光爍破四天下到者裏也只得斂手而坐寶壽新云陳老師與麼說話雖則有權有實有放有收子細看來遭人怪笑何故祇如庭前金菊殿後芙蓉是裂開耶是揑聚耶甌峰承云者僧擬冲霄漢却遇漫天網子睦州雖然頭正尾正未免傍觀者哂萬壽範云將纘先王之舊蹟擬收天下之逸民睦州可謂才醇傑異其奈被者僧即將民事以試之便乃法令寬弛流而為𤨏屑之弊雖欲救之無術矣睦州問僧近離甚處曰趙州州曰趙州有何言句示徒僧舉喫茶去話州乃呵呵大笑曰慙媿却問僧趙州意作麼生曰只是一期方便州曰苦哉苦哉趙州被你將一杓屎潑了也便打州却問沙彌你作麼生會彌便設拜師亦打其僧往沙彌處問適來和尚打你作甚麼彌曰若不是我和尚不打某甲雪竇顯云者僧克由尀耐將一杓屎潑他二員古佛諸上座若能辨得非唯與趙睦二州雪屈亦乃免雪竇與天下老宿無過若道不得到處潑人卒未了在徑山杲云雪竇只知一杓屎潑他趙睦二州殊不知者僧當時被趙州將一杓屎潑了却到睦州又遭一杓只是不知氣息若知氣息什麼處有二員古佛天寧琦云者僧不會喫茶意旨不知潑屎氣息帶累好人墮屎窖中合喫多少拄杖雪竇妙喜一時放過也須替他入涅槃堂始得法海猊云雪竇妙喜恁麼批判雖則各資一路殊不知自身亦被者僧塗污即今還有不受塗污者麼山僧傾湘江之水與古人去穢滌垢去也卓拄杖下座睦州晚參汝等諸人還得個入頭處也未若未得個入頭處須覓個入頭處若得個入頭處已後不得孤負老僧時有僧出禮拜曰某甲終不敢孤負和尚州曰早是孤負我了也雲峰悅云古人與麼道和身放倒了也汝諸人還相委悉麼若相委悉孤負睦州若不相委悉雲峰亦遭連累法雲秀云還會麼睦州便是陳蒲鞋若見可謂大施門開更無壅塞其或未然莫道不窒礙好參白雲端云睦州老兒可謂經事多矣要坐便坐要行便行雖然如是天無全功雲居莊云大小睦州通身泥水我則不與麼遂厲聲召眾云退後退後眾擬議拈拄杖一齊趁出棲霞成云與麼說話所謂曾為浪子偏憐客是則是棲霞即不然若得個入頭逢人切忌錯舉白巖符云我要問尊宿你當時底入頭處試為我說看待他動靜便撫掌云者老漢却自孤負了也睦州見僧來乃曰現成公案放汝三十棒曰某甲如是州曰寺門頭金剛為什麼豎拳曰金剛尚乃如是州便打雲門偃云睦州正恁麼時天下人披枷帶鎻雲峰悅於放汝三十棒處云作賊人心虗妙喜曰又添一個道了問僧云你道我恁麼道還有過也無僧云作賊人心虗妙喜曰三個也有徑山杲云雖然無孔笛撞著氈拍板直是五音調暢六律和偕仔細檢點將來未免旁觀者哂且道誰是旁觀者良久云不得動著動著打折你驢腰東禪嶽云臨危不變真大丈夫當時若不是者僧幾被打破蔡州諸人還識睦州麼貧無達士將金贈病有閑人說藥方天寧琦云睦州與者僧二俱作家二俱不作家還有人辨得出麼白巖符云者僧硬作主宰尊宿有放無收俱難為明眼我若作睦州待道金剛尚乃如是便起身云老僧今日不奈你何竟歸方丈睦州因天使吳尚書至門首見便問三門俱開從那門入州召尚書尚書應諾州曰從者門入雪竇顯別云客是主人相師睦州問武陵長老了即毛端吞巨海始知大地一微塵長老作麼生曰和尚問誰州曰問長老曰何不領話州曰你不領話我不領話雪竇顯云墮也墮也復云者葛藤好與劃斷拈拄杖云什麼處去也天童覺云睦州武陵總道不領話其間有貪觀白浪失却手橈乃豎起拂子云看開先金云雪竇道墮也墮也還是武陵墮睦州墮試為我斷看若斷不出無將閒學解埋沒祖師心古南門云兩個老漢奪鼓攙旗仔細看來直是好笑且道笑個甚麼若人辨得毛端吞巨海大地一微塵睦州因雲門偃參纔見來便閉却門偃乃扣門州曰誰曰文偃州曰作甚麼曰己事未明乞師指示州開門一見便閉却如是扣門者三至第三日州開門偃乃拶入州便擒住曰道道偃擬議州便推出曰秦時𨍏轢鑽遂掩門損偃一足偃從此悟入萬壽範云睦州忍心害理雲門雪屈無地天涯知己情原我鴻鴈來時滿地秋睦州因僧問如何是展演之言州曰量才補職如何是不展演之言州曰伏惟尚饗徑山杲云睦州古佛恁麼答話美則美矣也只得八成若是徑山則不然或問如何是展演之言向道問一答百有何妨如何是不展演之言喝一喝云莫屎窖沸報恩琇云妙喜老人土上加泥直饒道得十成猶是五十步而笑百步也報恩則不然如何是展演之言不說一字如何是不展演之言其聲如雷神鼎澤云二尊宿恁麼答話大似喫李子只向赤邊咬若是菩提則不然如何是展演之言今日正月初十如何是不展演之言孟八郎漢又與麼去也且道與古人是同是別復喝一喝睦州因僧問以字不成八字不是未審是何章句州彈指一聲曰會麼曰不會州曰上來講讚無限良因蝦蟇𨁝跳上天蚯蚓驀過東海徑山杲云者僧只問經頭一字睦州盡將善知眾藝差別字輪以龍龕手鑑唐韻玉篇從頭註解撒在者僧懷裏者僧也不妨奇特直下便肯承當且道什麼處是他承當處聽取個註脚以字不成八字不是彈指未終普天匝地擘開四十二般若波羅密門參透華嚴會中善知眾藝教內教外一時收世出世間皆周備無邊罪咎如火消氷無量勝義如恒沙聚更有個末後句堅牢庫藏永收藏總屬山前熊伯莊天寧琦云經頭一字是什麼字睦州彈指一下將黃面老人四十九年說不盡底一時吐露了也妙喜矢上加尖道更有末後一句諸人還委悉麼良久云山斷疑休去峰高又起來睦州因僧問一言道盡時如何州曰老僧在你鉢囊裏雲門偃有僧問一言道盡時如何門曰裂破雪竇顯云我則不然一言道盡時如何乃彈指三下徑山杲云或有問山僧一言道盡時如何向道者漆桶天寧琦云有人來問天寧一言道盡時如何隔白巖符云抵戶撑門拋珠擊玉在諸老各擅其長符上座者裏又且不然一言道盡時如何今歲六橋春事好環湖惟見是雕鞍國清英云有問國清一言道盡時如何但呵呵大笑睦州因僧參纔禮拜州便叱曰你因甚麼偷常住果子喫僧曰某甲纔到和尚為甚麼道偷果子州曰贓物現在寶掌白云誣人之罪以罪加之睦州者漢好與二十棒睦州因僧問祖意教意是同是別州曰青山自青山白雲自白雲曰如何是青山州曰還我一滴雨來曰道不得請師道州曰法華鋒前陣涅槃句後收天童覺云若向者裏識得睦州釋迦出世達磨西來總是不守本分底漢還識得麼臂長衫袖短脚瘦草鞋寬報恩秀云睦州老漢尋常辯若懸河及乎者僧問著便乃分踈不下睦州示眾老僧在此住持不曾見個無事人到來汝等何不近前時有一僧方近前州曰維那不在汝自領去山門外與二十棒僧曰某甲過在甚麼處州曰枷上更著杻通玄奇云睦州恁麼早是自己昏昏焉能使人昭昭獅峰機云大小睦州自語相違好與者僧一狀領過復顧左右云險睦州上堂問眾曰首座𠰚答曰在寺主𠰚答曰在維那𠰚答曰在州曰三段不同今當第一向下文長付在來日便下座昭覺勤云一等是借路經過就中睦州奇特若是崇寧又且不然首座𠰚在寺主𠰚在維那𠰚在因行不妨掉臂打草只要驚蛇若能一撥便轉免致撒沙撒土睦州示眾大事未明如喪考妣大事既明亦如喪考妣青峰楚因僧問大事既明為什麼亦如喪考妣楚云不得春風花不開及至花開又吹落天目禮云大事未明如喪考妣則固是大事既明因甚亦如喪考妣曾經巴峽猿啼處不待三聲已斷魂
