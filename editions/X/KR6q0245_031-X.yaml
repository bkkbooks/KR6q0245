body:
  text: 古杭白巖嗣祖沙門淨符彚集青五高安白水本仁禪師青五洞山价嗣上堂老僧尋常不欲向聲前色後鼓弄人家男女何故且聲不是聲色不是色僧便問如何是聲不是聲水曰喚作色得麼曰如何是色不是色水曰喚作聲得麼僧禮拜水曰且道為汝說答汝話若向者裏會得許你有個入處雪竇顯云白水也甚奇怪要且貪觀天上既非聲前句後且作麼生入雲居舜云白水既已入草者僧又落深村然則陽春雪曲時人難和村歌社舞到處與人合得著大溈秀云白水只知橫千不會豎百如何是聲不是聲莫逐音響如何是色不是色莫逐青黃且從伊向聲前色後覓個安身自然別有生涯徑山杲云白水將一串雲居子換却天下人眼睛却被者僧將一條斷貫索不動干戈穿却鼻孔雲居道陽春雪曲時人難和村歌社舞到處與人合得著是則也是未免隨摟搜杲上座不惜眉毛為諸人說破聲不是聲色不是色馬後驢前神出鬼沒雪曲陽春和不齊村歌社舞且淈𣸩以拂子擊禪牀云者個決定不是聲復舉起云者個決定不是色且畢竟是個什麼喝一喝云此時若不究根源直待當來問彌勒天寧琦云白水也只道得個聲不是聲色不是色別有什麼奇特白雪陽春雖唱得爭奈時人和不得誵訛在甚麼處聲不是聲色不是色靈巖儲云白水掩耳偷鈴者僧當面著賊佛日晳云大小白水不惜眉毛未免傍觀者哂隆安尋常無拘無束不妨向聲前句後鼓弄人家男女何故祇因聲不是聲色不是色設有問如何是聲不是聲但云山青水綠如何是色不是色犬吠驢鳴或云和尚何得顛倒聲色便與劈脊一棒云不是知音徒勞側耳雖然此中有兩負門且道在白水分上隆安分上檢點得出許你具參學眼廣教玉逐句下著語云老僧尋常不欲向聲前句後鼓弄人家男女曾為浪子偏憐客自愛貪杯惜醉人何故要且聲不是聲色不是色綿包特石鐵褁泥團如何是聲不是聲金將火試喚作色得麼擔枷過狀如何是色不是色不到烏江不盡頭喚作聲得麼重言不當喫且道與你說答你話兩段不同收歸上科有人辨得曲不藏直許你有個入處誤賺人不少復云古人恁麼提唱喚作嚼飯餵嬰孩汝等直下掃破迷雲豁開慧日不妨於聲色中起倒聲色中坐臥立地見本仁和尚敗闕處白水垂語眼裏著沙不得耳裏著水不得僧便問如何是眼裏着沙不得水曰應真無比如何是耳裏著水不得水曰白淨無垢天童覺云白水老人可謂大而無外小而無內具足千變萬化祇個赤手空身不受一滴一塵直是滿眼滿耳還見麼立足無閒地知心有幾人潭州龍牙居遁禪師青五洞山价嗣問翠微如何是祖師意微曰與我將禪板來牙遂過禪板微接得便打牙曰打即任打要且無祖師意又問臨濟如何是祖師意濟曰與我將蒲團來牙過蒲團濟接得便打牙曰打即任打要且無祖師意住後僧問和尚行脚時問二尊宿祖師意未審二尊宿明也未牙曰明即明也要且無祖師意五祖戒云祖師土宿臨頭又云和尚得與麼面長雪竇顯云臨濟翠微只解放不解收我當時若作龍牙待伊索蒲團禪板拈得劈𮌎便擿溈山喆云翠微臨濟可謂本分宗師龍牙一等是撥草瞻風與他後人為龜為鑑住後道二尊宿明即明矣要且無祖師意瞻前顧後應病與藥不無龍牙大溈則不然待問未審二尊宿明也未劈脊便棒非唯扶豎翠微臨濟亦乃不孤他來問石門聰云龍牙無人拶著猶可纔被個衲子一拶失却一隻眼東禪齊云眾中道佛法即有只是無祖師意若恁麼會有何交涉且別作麼生會無祖師意底道理昭覺勤云龍牙參來莾鹵學處顢頇雖然顧後瞻前爭奈藏身露影既是無祖師意用明作麼若向者裏辨得出山僧與你拄杖子若辨不出和鼻孔一時穿却博山來云龍牙者漢一副鐵脊梁直硬到底打破大唐國討個頭正尾正的難得古南門云三個老漢靴裏動指頭雪竇雖為龍牙出氣要且只見錐頭利不見鑿頭方明覺地云龍牙大似塊真金千煅萬煉愈精愈淨可謂臨危不變真大丈夫雖然却被者僧看破龍牙因僧問如何是祖師西來意牙曰待石烏龜解語即向汝道曰石烏龜語也牙曰向汝道什麼又僧問香林遠如何是祖師西來意林曰坐久成勞天童覺云一句子仰之彌高一句子鑽之彌堅一句子瞻之在前一句子忽然在後還辨得麼赤心片片知人少覿面堆堆覩者稀龍牙頌曰天下名山到因脚辛苦年深與襪著而今老大不能行手裏把柄破木杓白雲端云龍牙老人可謂熟處難忘徑山杲云端和尚恁麼大似以己方人杲上座即不然家貧難辦素食事忙不及草書天寧琦云者一個那一個和本三人一時放過是非終日有不聽自然無五祖演云山僧即不然脚也不能著草鞵手也不能把木杓端坐受供養施主常安樂古南門云龍牙只為破木杓不能放下雖則誇經賣紀要且有年無德山僧則不然天下名山在雙脚辛苦窮途無襪著而今思憶轉傷神手裏空空無木杓既無木杓將個甚麼接待諸人今日人事煩倦要睡去留與諸人啗龍牙因僧問十二時中如何著力牙曰如無手人行拳雲居齊云好言語且作麼生會甞問一僧他道無手底人何更行得拳也不妨道得是及問伊佛法伊便休去將知露布說得無用處不如子細體取古人意好大溈秀云是則是又教人入陰界作活計十二時中如何用力如有手人行拳又且如何龍牙示眾學道如鑽火逢烟未可休直待金星現歸家始到頭神鼎諲別云學道如鑽火逢烟便可休莫待金星現燒脚又燒頭翠巖真云若論頓也龍牙猶在半途若論漸也神鼎正欠悟在畢竟如何今年多落葉幾度掃歸家普廕云二尊宿不循本分將常住地各自分疆列界致令後人竟無立足之處山僧今日亦有一頌從本不曾學於茲何可休當人真活計不在此兩頭且中間一句作麼生道白日依山靜黃河入海流參龍牙一日在帳中坐僧問不是無身不欲全露請師全露牙撥開帳曰還見麼曰不見牙曰不將眼來報慈嶼云龍牙老漢只道得一半法眼益別云飽叢林古塘云龍牙全身獨露者僧覿面不逢當時見伊撥開帳便好和身推倒京兆華嚴休靜禪師青五洞山价嗣在洛浦作維那因普請白椎曰上間搬柴下間鋤地時首座便問聖僧作什麼嚴曰當堂不正坐那赴兩頭機泐潭準云華嚴和尚雖臨時對答應用不失其宜然只解順水撑篙不解逆風把柁當時若是準上座纔見伊道聖僧作甚麼便打一椎云大眾普請罷首座當出院謹白諸禪德且道因什麼如此不見道一朝權在手看取令行時昭覺勤云珠鑽九曲休靜可謂神功玉解連環山僧更資一路或有問聖僧作個什麼只對他道廓如明鏡當臺照不動形聲應萬緣瑞州九峰普滿禪師青五洞山价嗣問僧近離甚處曰閩中峰曰遠涉不易曰不難動步便到峰曰有不動步者麼曰有峰曰爭得到此間僧無對峰以拄杖趁下洞山瑩云為人為徹殺人見血固是九峰一片熱腸可惜者僧不善為客勞煩主人當時若是個衲僧但向道和尚大似不曾行脚管取者棒別有分付處益州北院通禪師青五洞山价嗣問夾山目前無法意在目前不是目前法非耳目之所到豈不是和尚語山曰是通便掀倒禪牀叉手而立山起來打一拄杖通乃下去法眼益云是他掀倒禪牀何不便去須待夾山打一棒了纔去意在什麼處愚菴盂云夾山好拄杖祇是分付遲了待問豈不是和尚語驀頭便打此時北院縱有神用也措手不及然雖如是北院待夾山打一下始行是何意思弄玉已隨蕭史去丹青留與後人狂洞山道全禪師青五洞山价嗣因僧問清淨行者不入涅槃破戒比丘不入地獄時如何山曰度盡無遺影還他越涅槃寶壽新云好個師僧竟不知墮在無影坑中憑空以為究竟若不是洞山重布梯航何時復出得見天日要識清淨行者麼東邊是要識破戒比丘麼西邊是還信得及麼也是無事生事越州乾峰和尚青五洞山价嗣上堂法身有三種病二種光須是一一透得始解歸家穩坐更須知有向上一竅在雲門出問祇如菴內人為什麼不知菴外事峰呵呵大笑門曰猶是學人疑處峰曰子是什麼心行門曰也要和尚相委峰曰直須與麼始解穩坐門應曰喏喏雪竇顯云若明得褒貶句未必善因而招惡果昭覺勤云動絃別曲問一知十手搦手擡以膠投漆菴內不見菴外無孔鐵錘不會人生相識貴知音水入水兮金博金溈山果云乾峰平地生堆韶陽因風起浪然雖合水和泥千古叢林榜樣既是合水和泥為什麼是叢林榜樣不入洪波裏爭見弄潮人天童覺云坐著病在膏肓用著光不透脫直饒縱橫十字圓轉千機也未知有向上一竅在還得穩坐地麼到頭霜夜月任運落前溪資福侶云乾峰無端劃地成牢韶陽亦乃就空作跌檢點將來總成笑具且道笑個什麼賊是小人智過君子乾峰示眾舉一不得舉二放過一著落在第二雲門出眾曰昨日有人從天台來却往徑山去峰曰典座來日不得普請便下座雪竇顯云諸禪德雲門老漢只解一手擡不能一手搦還有共相著力者麼試露爪牙看雲居元云此語眾中商量甚多會者極少乾峰夢裏合眼跳黃河覺來身在牀上雲門醉後扶人倒上樹醒來只在座中二人打作一團至今分疎不下若人知得落處許你解空第一溈山喆云乾峰善唱雲門善拍唱拍相隨風清古格還有知音者麼一堂風冷澹千古意分明育王璉云舉一黑如漆舉二全不是且道作麼生良久云城東打鼓城西響園內花開園外春護國元云道頭知尾告往知來若非彼此共知又安能向者裏共出一隻手是即是爭奈猶欠一著在徑山杲云乾峰洗面摸著鼻雲門喫飯咬著砂二人驀地相逢著元來却是舊怨家雖然如是只許老胡知不許老胡會又云彼此揚家醜賴遇無傍觀者育王光云眼親手辨彼此作家檢點將來猶欠一著在鴻福即不然舉一不得舉二放過一著落在第二忽有人出劈脊便打何故擊碎髑髏消息盡從教大地黑漫漫天童覺云坐斷十方千差路絕放開一線萬派朝宗二尊宿開拓家風方見衲僧去就還端的麼太平天子寰中旨汗血將軍塞外心東山報云古人恁麼說話正是抱贓呌屈東山即不然舉一不得舉二放過一著落在第七到者裏須知有向上一路始得如何是向上一路良久云莫守寒巖異草青坐著白雲宗不妙天童忞云乾峰恁麼說話大似釘樁搖櫓抱橋柱洗澡忒殺無轉智若是山僧舉一不妨舉二放過一著橫三豎四昨日有人從天台來却往徑山去呼直歲新年頭已過第三日了也今朝好普請且道天童意在於何良久云春風景裏乾坤大無限江山開𦘕圖古南門云雲門只解步步登高不解從空放下拈拄杖云古南亦乃放過且任此話大行愚菴盂云二大老要共扶者破砂盆一個向高高山頂立一個向深深海底行山僧今日舉二去也乃左右顧眎云大眾萬福廣胤標云獨掌不浪鳴兩掌鳴摑摑你看雪竇恁麼道要且知一不知二殊不知雲門是個無孔笛遇著氈拍板說甚五音六律直是陽春白雪亦須却步何故自從舞得三台後拍拍都來總是歌普寧頴云乾峰丁一卓二雲門放兩拋三雖謂唱拍投機然只解順水推舟不解逆風把柁當時待他恁麼道何不便與掀倒禪牀直饒乾峰全機也較三千里寶慶法云夫好手終不彰名既一個向孤峰頂上放兩拋三一個從平地裏神出鬼沒已自漏逗了也後來道典座來日不得普請不奈船何打破戽斗慧雲盛云乾峰動絃雲門別曲拍唱拍和聲金振玉洞山門下足可觀光若到滹沱未堪收錄且道誵訛在什麼處西山音云一個砧杵敲殘深夜月一個井梧搖落故園秋西山則不然為什麼大抵還他肌骨好不搽紅粉也風流乾峰因僧問十方薄伽梵一路涅槃門未審路頭在什麼處峰以拄杖畫一畫云在者裏雲門偃因其僧持此語請益門乃拈起扇子曰扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾會麼雪竇顯代僧便喝有僧請益長慶慶云問取堂中第二座雪竇代僧云錯尋有僧問雪竇竇云墮坑落壍又自代云作賊人心虗黃龍南云乾峰一期指路曲為初機雲門乃通其變故使後人不倦大溈秀云古今盡道乾峰安居祖師之堂開後人之徑路殊不知乾峰老漢被者僧一問直得手忙脚亂諸禪德且道誵訛在甚麼處良久云不在水兮不在山只在人心返覆間東林總云古德道乾峰搖頭雲門擺尾者僧只是個撞露柱漢脚跟下錯過也不知便謂東家點燈西家暗坐龍銜海寶遊魚不顧山僧今日不可也隨波逐浪臨危悚人殊不知大小乾峰雲門俱被者僧勘破且道什麼處是勘破處良久云多時雨水不及曬㫰寶峰文云乾峰與麼還夢見也未若是真淨則不然十方薄伽梵一路涅槃門未審路頭在什麼處劈脊便棒却問他路頭在什麼處待伊擬開口熱喝出去更有個折脚老比丘不分緇素不辨邪正拈起扇子道扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾似者般和泥合水漢糞埽堆頭埋却十個五個有什麼過阿呵呵樂不樂足不足而今幸對山青水綠年來是事一時休信任身心嬾拘束大眾休磕睡好黃龍清云若向乾峰句中會去正是死句坐殺闍黎若向雲門語下承當業識茫茫隨波逐浪既俱不許畢竟向甚麼處會諸人還知落處麼自古上賢猶不識造次凡流豈可明南華昺云乾峰曲盡慈悲當機提掇雲門巧開方便覿面發機直得枯木生花冷灰騰𦦨且道東海鯉魚打一棒雨似盆傾明什麼邊事因風吹火用力不多徑山琰云唱愈高和愈峻還他二老若是十方薄伽梵一路涅槃門總未踏著在愚菴盂云韶陽酬機太奢乾峰答話太嗇奢則不可以便愚蒙嗇則不可以周廣眾我雲門者裏九逵八達之路其道坦坦其平如砥一任你騎驢跨馬奔南走北只是山僧于津口要路驀展手云討將公驗來鼓山霈云乾峰周道如砥雲門十字縱橫若能信步歸來方知道常在於其中經行及坐臥如或未然山僧更與饒舌十方薄伽梵一路涅槃門路頭在什麼處拈拄杖云下坡不走快便難逢乃卓一卓下座廣胤標云苟可以強國不法其故苟可以利民不循其禮二老漢雖是一等為人未免巧盡拙出若是木菴待問十方薄伽梵一路涅槃門未審路頭在甚麼處便和聲踏倒使伊直下得個倒斷則庶幾不致于亡羊泣岐矣演教泐云乾峰搖頭雲門擺尾二老神通妙用則不無未免被者僧勘破白巖符云變二王真楷作張顛草書雲門善得其妙非久精授陣補戈之法者要尋他轉換結搆處斷不可得然於他涅槃門路終難指出在如今有僧恁麼問諸方曲彔牀上漢又當別作個什麼苟當不可也依樣𦘕葫蘆乾峰因雲門問請師答話峰曰到老僧也未曰恁麼則文偃在遲也峰曰恁麼那恁麼那曰將謂侯白更有侯黑報恩秀云雲門晴空激電乾峰旱地奔雷及乎雙放雙收雖作家衲僧難為摸索博山來云非常之問非常之答迅雷不及掩耳良駟不及追風宛轉偏圓各負鉤深索隱的手段然檢點將來好與痛棒何也為他無事生事放過即不可甌峰承云兩個漆桶失却鼻孔明州天童咸啟禪師青五洞山价嗣簡大德問學人卓卓上來請師的的啟曰我者裏一屙便了有甚麼卓卓的的曰和尚與麼答話更買草鞋行脚好啟曰近前來僧近前啟曰只如老僧與麼祇對過在什麼處簡無對啟便打天童華云啟禪師固是本分鉗錘塞斷新天童口未得在者僧雖深入閫域要且未具透關眼澧州欽山文𨗉禪師青五洞山价嗣良禪客問一鏃破三關時如何山曰放出關中主看良曰與麼則知過必改山曰更待何時良曰好箭放不著所在便出山曰且來闍黎良回首山下禪牀把住曰一鏃破三關則且置試與欽山發箭看良擬議山打七棒曰且聽者亂統漢疑三十年同安察云良公雖解發箭要且未中的僧便問未審如何得中的安云關中主是什麼人欽山聞云良公若解與麼也免得欽山口然雖如是同安不是好心亦須看始得天童覺云山堆嶽積來瓦解冰消去則時人知有與我放出關中主看且合作麼生有的道當時便喝當時便掌然則一期瞎用則得要且未是關中主在還體得麼當堂不正坐那赴兩頭機欽山與巖頭雪峰同到德山欽出問天皇也恁麼道龍潭也恁麼道未審和尚作麼生道德山曰汝試舉天皇龍潭道底看欽擬議德山便打欽被打歸延壽堂曰是即是打我太煞巖頭曰你恁麼他後不得道見德山來法眼別云是則是錯打我雪竇顯云諸禪德欽山置個問端甚是奇特爭奈龍頭蛇尾汝試舉天皇龍潭道底看以坐具便摵大丈夫漢捋虎鬚也是本分他既不能德山令行一半若盡令行雪峰巖頭總是涅槃堂裏漢翠巖芝云欽山只顧其前不顧其後如今作麼生與欽山出氣五祖戒云德山只解打死欽山不會打活欽山溈山云德山門下草偃風行大溈則不然待問未審和尚作麼生道劈脊便打且道德山是大溈是會麼橫按鏌鎁全正令太平寰宇斬癡頑古南門云雪竇扶強不扶弱不知德山老漢被欽山一拶直得推過別人擬議便打死馬醫了也若據令而行何待道天皇龍潭纔踏步向前便大棒趁出定龍蛇摛虎兕又有甚麼過洞山昱云大小德山殺活自在欽山雖有迎刃之謀爭奈龍頭蛇尾巖頭雪峰坐觀成敗義不容誅若盡令而行總須大棒打出白巖符云你試舉天皇龍潭道底看喝者老漢見面不如聞名拂袖便出當時欽山下得者翻手脚不但使德山令無所施且得增同參十倍意氣欽山因僧問如何是和尚家風山曰錦繡銀香囊風吹滿路香巖頭聞乃令僧傳語曰傳語十八姐好好事潘郎天童忞云𨗉老不昧洞上之宗奯公無違德山之子檢點將來一人猶挂本來衣一人尚行心處路未出曹山四禁在若是山僧如何是和尚家風似玉珍不御如簧語帶悲遂顧眎左右云即今莫有傳語底麼眾默然乃云血染杜䳌春又過為君那惜損蛾眉靈巖儲云欽山祇圖賣弄風流不顧魂消夢斷巖頭雖然憲章國法爭奈罪不重科有問山僧如何是和尚家風向道明知君不至再上小樓頭顧左右云且道山僧恁麼告報意在於何良久擊竹篦一下云頻呼小玉元無事祇要檀郎認得聲欽山因德山侍者來參纔禮拜遽把住曰還甘欽山與麼也無侍曰某甲卻悔久住德山今日無言可對山乃放手曰一任祇對侍撥開胸曰且聽某甲通氣一上山曰德山門下即得者裏一點也用不着侍曰久委欽山不通人情山曰累他德山眼目參堂去徑山筞云殺人不問問人不殺撥胸吐氣彼此孟八直饒有始有終也是戽水相潑要識欽山與者僧麼李順王小破草鞋方十三李師囊破襪欽山與雪峰巖頭行脚時至一店喫茶次山曰不會轉身通氣者不得茶喫頭曰若恁麼我定不得茶喫峰曰某甲亦然欽曰者兩個漢話頭也不識頭曰甚處去也欽曰布袋裏老鴉雖活如死頭退後曰看看欽曰奯公且致存公作麼生峰以手畫一圓相欽曰不得不問頭呵呵笑曰太遠生欽曰有口不得茶喫者多昭覺勤云欽山雖解轉身吐氣亦未有喫茶分何也話在鵞湖心云欽山大似忍辱仙人節節支解面不改客無它子當時若在就初問處便與打破茶具那有許多瑣碎欽山因僧參山豎起拳又伸掌曰開即成掌五指參差復握拳云如今為拳必無高下汝道欽山還通商量也無僧近前卻豎起拳山曰你恁麼只是個無開合漢雪竇顯云我即不然乃豎起拳云握則為拳有高有下復開云開即成掌無黨無偏且道放開為人好把定為人好開也造車握也合轍若謂閉門造車出門合轍我也知你向鬼窟裏作活計昭覺勤云掌亦是手握亦是手商量個什麼乃舉一足云展亦是脚收亦是脚無高無下不許商量且道與欽山是同是別南堂欲云展也不是掌握也不是拳兩頭俱坐斷一劍倚天寒且道還有為人處也無喝西風吹渭水落葉滿長安古南門云差之毫𨤲失之千里可惜個無開合漢被欽山熱瞞當時纔見伊舉何不云和尚莫𥧌語好直令欽山倒戈而退雪竇恁麼道也是隨邪逐惡白巖符云欽山者漢慣會倚勢欺人大似自家只管放火燒山卻不許人點燈喫飯
