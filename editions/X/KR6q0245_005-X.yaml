body:
  text: 古杭白巖嗣祖沙門淨符彚集東土祖師初祖菩提達磨大師般若多羅嗣本南天竺國香至王第三子得般若多羅記莂後盛化本國復念東震旦國有大乘根器乃於梁普通七年庚子至梁因武帝問如何是聖諦第一義祖曰廓然無聖帝曰對朕者誰祖曰不識保寧勇代帝吐舌示之中峰本云缺齒老胡手携泥彈子要與東震旦人鬬富可謂不知量矣被梁王指出照乘明珠問之情知伊道個不識愚菴盂云山僧則不然或有問如何是聖諦第一義雙柑迤𨓦黃鸝下踏徧落花鴛水春靈巖儲云恁麼答話果然達磨不會禪良久云咦如此批判想夫子亦未必識字畢竟如何拍案云王何必曰利卓拄杖休去靈隱禮云達磨大師氣葢神洲纔被武帝一拶直得無繩自縛去死十分雖然如是也須救取武帝清化嶾云盡道武帝不會祖師意殊不知達磨被他兩度徹骨髓天寶真云武帝將謂是個別寶波斯真寶現前却又不能鑒得當時若是個漢者碧眼胡趂出朝門有分四祖浪云中峰老人壓良為賤殊不知萬乘之君落在達磨大師圈繢裏至今無人能出初祖因慧可問諸佛法印可得聞乎祖曰諸佛法印匪從人得可曰我心未寧乞師安心祖曰將心來與汝安可曰覓心了不可得祖曰與汝安心竟芭蕉徹云金剛與泥人揩背五祖戒云若只恁麼何用西來雲居元云彼自無瘡勿傷之也雖然如是一言易出駟馬難追五祖演舉至乞師安心處乃云白雲當時若見好與三十棒何故他人見將謂說安心法畢竟如何菩薩龍王行雨潤遮身向上數重雲雲居莊云殺人須是殺人刀活人須是活人劒棲霞成云垂鈎四海為釣獰龍呂望之志遠矣因甚一見西伯即抝折釣竿其亦天將以夫子為木鐸乎白巖符云者碧眼胡甘沉座主當時問諸佛法印可得聞乎何不向道胡餅裏討甚麼汁神光他是個皮下有血的者裏必有長進且免他又從人覓安心法而乃聯聯纖纖却道諸佛法印匪從人得呵呵匪從人得從甚麼處得饒他說得來處分明更要問者碧眼胡覓法印在擬議不來莫怪性躁初祖曰吾本來茲土傳法救迷情一花開五葉結果自然成五祖演云達磨大師信脚來信口道後代兒孫都成計較諸人要會開花結果處麼鄭州梨青州棗萬物無過出處好南堂欲云提本分鉗錘碎情解窠窟還他五祖要見花開結果處則太遠在諸人要會花開結果處麼拈却鄭州梨放下青州棗出門便是長安道久立珍重初祖一日命門人曰時將至矣汝等盍各言所得乎時有道副對曰如我所見不執文字不離文字而為道用祖曰汝得吾皮尼總持曰我今所解如慶喜見阿閦佛國一見更不再見祖曰汝得吾肉道育曰四大本空五陰非有如我見處無一法可當情祖曰汝得吾骨最後慧可出但禮拜依位而立祖曰汝得吾髓乃傳衣付法為東土第二祖薦福懷云祖師與麼說話無計較中翻成計較無途轍中翻成途轍若教伊踏著德山臨濟門免見九年冷坐被人喚作壁觀胡僧直饒如是也未免殃及兒孫太陽玄云且道更有一人出來得個什麼自云不得不得又云意況不到翠巖芝云二祖被他當面塗糊莫道髓皮也不曾摸著因甚却紹祖位五祖演云當時若見四人恁麼各與三十棒只如白雲也合喫二十九棒留一棒與汝諸人其有知痛癢者不惟不孤負他先聖亦乃得見白雲脫或未然堂裏喫粥喫飯更須爛嚼莫只渾圇吞却一指海云噫航海西來只要覓得一個半個那管將錯就錯海上座若在見他纔禮拜便與一踏非唯顯衲僧眼目亦免使後人向禮拜處躲跟寶壽新云者缺齒胡婆婆呾呾像個嚼飯餧嬰孩一般有甚用處若是新長老待伊一夥黑漆桶呈了如何若何便各與劈頭一棒不特使伊各得勦絕葛藤管取他一個個轉轆轆地且免後人向皮髓邊著倒二祖慧可大師菩提達磨嗣因僧璨問弟子身纏風恙請和尚懺罪祖曰將罪來與汝懺璨良久曰覓罪了不可得祖曰與汝懺罪竟宜依佛法僧住璨曰今見和尚已知是僧未審何名佛法祖曰是心是佛是心是法法佛無二僧寶亦然璨曰今日始知罪性不在內外中間如其心焉佛法無二祖深器之瑯瑘覺云猶欠作云何梵在梁山觀於覓罪了不可得處云罪性向甚麼處去也又云非但罪性覓者亦不見有雲居齊云二祖深器之且道是肯他會佛法耶是肯他說道理耶耽源寧云盡道可大師得初祖安心之法克紹西宗看他恁麼酬對向來俗氣一毫也不曾移易更有個承虗接響者道如其心焉佛法無二似者般漢總與一坑埋却有什麼過三祖僧璨大師慧可嗣信心銘曰六塵不惡還同正覺雪竇顯云拄杖子是塵有什麼過過既無應合辨主所以道糞掃堆頭現丈六金身且拈在一邊赤肉團上壁立千仞又放過一著直饒八面四方正好連架打古南門云雪竇拄杖子雖善能為祖師作主要且脚跟未點地在三祖信心銘曰至道無難唯嫌揀擇報恩秀云三祖道個嫌字先自憎愛了也却道但莫憎愛洞然明白又何啻揚聲而欲止響諸人退步就己試子細檢點看德山繪別云至道最難須是揀擇若無憎愛怎見明白佛川義云祖師八字打開兩手分付了也雖然直捷固然直捷怎奈極是諸訛要得與祖師覿體相見山僧更資一路乃云至道無難唯嫌揀擇但莫憎愛洞然明白良久云參南華曹溪六祖慧能大鑒禪師五祖忍嗣寓南海法性寺廊廡間暮夜因風颺剎旛有二僧對論一曰旛動一曰風動持論不決祖乃曰不是風動不是旛動仁者心動雪峰存云大小祖師龍頭蛇尾好與二十棒孚上座侍立次不覺咬齒峰曰老僧與麼道也好與二十棒保福展云作賊人心虗也是蕭何置律巴陵鑑云祖師道不是風動不是旛動既不是風旛向甚處著有人與祖師作主出來與巴陵相見雪竇顯云風動旛動既是風旛向甚處著有人與巴陵作主出來與雪竇相見黃龍新云不是風動不是旛動明眼漢一點瞞他不得仁者心動且緩緩你向甚處見祖師乃擲下拂子曰看泐潭清云不是風動不是旛動靈利漢懸崖撒手便好承當顧後瞻前轉生迷悶仁者心動而今還有為祖師作主者麼出來與老僧相見天童華云一盲引眾盲相牽入火炕徑山杲舉雪峰語畢云要識孚上座麼犀因玩月紋生角要識雪峰麼象被雷轟花入牙中峰本云甞鼎一臠具知眾味非風動非旛動仁者心動可謂甞鼎之一臠矣使人不覺惡心嘔吐天寧琦云諸禪德風動旛動心動與你拈却了也向什麼處見祖師徑山琇云大小祖師為人錯下註脚合喫三十棒龍池傳云不是風動不是旛動也不是心動僧問畢竟是什麼動傳召僧僧近前傳乃與僧一掌云只許你知不許你會又一掌云去龍池微云我有四十痛棒二十打二僧不合道風動旛動十棒打曹溪不合道心動十棒待打個人時有僧出擬問微劈脊便打云慣釣鯨鯢沉巨浸却嗟蛙步𩥇泥沙能仁鑑云古今多少人不向二僧逐境漂流處著倒定在祖師黑山鬼窟裏作活計山僧今日與諸人掀翻窠臼去也風動也三十棒旛動也三十棒心動也三十棒傍僧云和尚聻鑑乃顧侍者云認取者僧便歸方丈金粟元云還知祖師落處麼書頭教娘勤作息書尾教娘莫瞌睡中間一句不成文無限相思華雨淚甌峰承云是風動是旛動二僧各有見處非風動非旛動祖師漏逗不少仁者心動好與三十棒為什麼凉泉者裏賞罰分明一任諸方判斷大覺昇云大小祖師惡口拶著便說心說性敢保未徹在大覺今日為你分明剖露不是風動不是旛動不是心動道得出身句合受人天供白巖符云大小祖師當時只道不是風動不是旛動便了不妨令人疑著却乃道仁者心動千古之下得不遭人檢點顧左右云者裏還有為祖師出氣者麼直饒道不是心動也好與三十苕帚五峰甫云六祖像個村學究對蒙童講中庸大學動便誠正卒脩令人打瞌睡不徹何不道春遊芳草地夏賞綠荷池却解六祖有偈曰兀兀不脩善騰騰不造惡寂寂斷見聞蕩蕩心無著壽昌經云兀兀不脩善撞破虗空成幾片騰騰不造惡轉身挨倒空王閣寂寂斷見聞十方法界共慈門蕩蕩心無著驚起蟭螟吞五嶽祇如此意還相似麼噫長江晝夜東流去海水從來不減增六祖因永嘉到繞禪牀三匝振錫一下卓然而立祖曰夫沙門者具三千威儀八萬細行大德從何方來生大我慢永曰生死事大無常迅速祖曰何不體取無生了無速乎永曰體即無生了本無速祖曰如是如是永方具威儀參禮須臾告辭祖曰返太速乎永曰本自非動豈有速耶祖曰誰知非動永曰仁者自生分別祖曰汝甚得無生之意永曰無生豈有意耶祖曰無意誰當分別永曰分別亦非意祖歎曰善哉少留一宿雪竇顯舉至生大我慢處便喝一喝云永嘉當時下得者一喝免見龍頭蛇尾又向卓然而立處代祖云未到曹溪與你三十棒了也浮山云先行不到末後太過瑞巖慍云永嘉承虗接響祖師將錯就錯雪竇龜背刮毛浮山馬頭安角繞禪牀三匝兮眼似銅鈴勉留一宿兮頭如木杓松風江月少人知南海波斯生白澤六祖因臥輪有偈曰臥輪有伎倆能斷百思想對境心不起菩提日日長祖乃別云慧能無伎倆不斷百思想對境心數起菩提作麼長天童覺云葵花向日柳絮隨風鼓山賢云六祖為救臥輪施此法藥若執以為實作臥輪奴也未得在寶壽新云纔說乾三連便有坤六斷且道作麼生得圓成一卦去要知爻象分明處只在文王掌上觀六祖因僧問黃梅意旨什麼人得祖曰會佛法人得曰和尚還得否祖曰我不得曰和尚為什麼不得祖曰我不會佛法翠巖芝云會得即二頭不會即三首作麼生便有出身之路徑山杲云還見祖師麼若也不見徑山與你指出蕉芭蕉芭有葉無了忽然一陣狂風起恰似東京大相國寺裏三十六院東廊下壁角頭王和尚破袈裟畢竟如何歸堂喫茶天寧琦云棒打石人頭嚗嚗論實事雲居莊云得與不得會與不會即不問祖師性命因甚落在者僧手裏清化嶾云者僧雖善一挨一拶却無膽量若是久歷沙場底漢待道我不會佛法便掀倒禪牀豈不光前啟後崇先奇云且道祖師恁麼答話還得黃梅意旨不得黃梅意旨要會麼白馬紫金鞍騎出萬人看借問誰家子讀書人做官靈谿昱云會佛法也三十棒不會佛法也三十棒畢竟黃梅意旨什麼人得姹女已歸霄漢去獃郎猶向火邊𨀛六祖一日謂門人曰吾欲歸新州汝等速治舟楫門人曰師從此去早晚却回祖曰葉落歸根來時無口法雲秀云非但來時無口去時亦無鼻孔白雲端云祖師可謂善解借手行拳有般漢往往道言猶在耳不見道子期去不返浩浩良可悲不知天地間知音復是誰五祖演云祖師恁麼道猶欠悟在旁出祖師四祖旁出牛頭法融禪師四二四祖信嗣因四祖到山入後菴見虎便作怕勢融曰和尚猶有者個在祖曰者個是什麼融於言下有省雪竇顯代融但亦作怕勢又云洎合放過大溈喆因僧問牛頭未見四祖時如何寒毛卓豎見後如何額頭汗出雲門澄云四祖見虎便作怕勢百尺絲綸直下垂和尚猶有者個在一釣便上者個是什麼更與臨風一拶融於言下有省從門入者未必家珍若是個返躑獅兒四祖也須著險宣州安國玄挺禪師四六牛頭威嗣因僧問五祖忍大師云真性緣起其義云何祖默然時安國侍立其旁乃曰大德正興一念問時是真性中緣起僧言下大悟徑山杲云未興一念問時不可無緣起也時有僧云未興一念時喚什麼作緣起妙喜云我也只要你與麼道天寧琦云崑崙奴著鐵褲打一棒行一步靈巖儲云父子上山各自努力人人盡道黃梅就下平高殊不知脚頭太嶮者僧只顧萬仞巖頭進步那識身在帝鄉挺禪妙喜一人點即不到一人到即不點山僧終不說破具眼者脚下看取文峰玉別妙喜後語云贓物現在潤州鶴林玄素禪師四六牛頭威嗣因僧敲門林問是什麼人曰是僧林曰非但是僧佛來亦不著曰佛來為什麼不著林曰無汝棲泊處寶壽方云鶴林與麼道將謂立在高高山頂殊不知被者僧推向萬丈深淵裏多少時了也還有檢點得出者麼若有試出來與雪峰拄杖子相見杭州徑山國一道欽禪師四七鶴林素嗣因馬祖遣人送書到書中作一圓相欽發緘見遂於圓相中著一點却封回忠國師聞乃曰欽師猶被馬師惑保福展云甚處是欽師被馬師惑處且作麼生得不惑去雪竇顯云徑山被惑且置若將呈似國師又別作個什麼伎倆免被惑去有老宿云當時坐却便休亦有道但與畫破若與麼祇是不識羞敢謂天下老師各具金剛眼睛廣作神通變化還免得麼雪竇見處也要諸人共知祇者馬師當時畫出早自惑了也溈山云諸人還識馬祖徑山麼一點水墨兩處成龍國師道欽師猶被馬師惑可謂千里同風不見道手執夜明符幾個知天曉徑山杲云馬師仲冬嚴寒欽師孟夏漸熱雖然寒暑不同彼此不失時節忠國師因甚却道欽師猶被馬師惑還委悉麼無風荷葉動決定有魚行天寧琦云圓相中著點墨日月無光天地暗黑初未惑欽師馬師先自惑累及老南陽也一場狼藉良久云平生肝膽向人傾相識如同不相識保寧茂云醉漢扶酒人起倒憑誰力雖然國師出手也是郎當徑山琇云馬祖無風起浪國一隨邪逐惡雖是解弄精魂未免二俱失利致使忠國師道欽師猶被馬師惑汝諸人還知落處麼鵓鳩樹頭啼意在麻畬裏雲居莊云箭鋒相直縱奪當機還他馬祖國一始得驀拈拄杖召眾云只如國師道欽師猶被馬師惑畢竟意在於何卓拄杖一下古南門云古南有三十棒一打馬師不應自惑二打欽師不應被惑三打雪竇不應判惑更有一棒欵欵與諸人道破崇先奇云馬師草草問候欽師万字折點雖然往復無差轉見道路周遮總謂忠國師道欽師猶被馬師惑殊不知字經三寫烏焉成馬白巖符云馬祖徑山無大人相拈向一邊國師明於責人昧於責己好與三十烏藤良久顧左右云今日幸是無人西山音云欽師事忙不及草書馬師家貧難辦素飯雖然一往一來祇是隨家豐儉且道忠國師作麼生親言出親口國一因馬祖遣智藏來問十二時中以何為境一曰待汝回去時有信藏曰即今便回去一曰傳語馬祖道却須問取曹溪雲居莊云馬祖大似埋兵掉鬬國一可謂遇變出奇者僧雖善通使命要且勞而無功驀拈拄杖畫一畫云三級浪高魚化龍癡人猶戽夜塘水國一同忠國師在唐代宗宮中坐次見帝駕來乃起立帝曰師何以起一曰檀越何得向四威儀中見貧道徑山杲云不向四威儀中又如何見國一寶壽方云國一妙喜各見一邊俱未免後人評議姑置勿論雪峰今日要問諸人向行住坐臥中見既不得不向行住坐臥中見又不得畢竟向甚麼處見者裏挨得身插得足許你與古人把臂同行不然日用四威儀中大有蹉過杭州鳳林鳥窠道林禪師四八徑山欽嗣因侍者慧通辭林問何往通曰諸方學佛法去林曰若是佛法此間亦有少許通曰如何是和尚此間佛法林於身上拈起布毛吹示之通有省大溈秀云可惜者僧認他口頭聲色以當平生殊不知自己光明葢天葢地神鼎諲舉公案了遂於身上拈布毛示眾隨後一吹云會麼已後不得孤負老僧徑山杲云溈山與麼批判也未夢見鳥窠在天寧琦云侍者能於拈起布毛處便喝免致諸方檢點我恁麼道也是為他閒事長無明天寶真云鳥窠與麼地也是憐兒不覺醜好與三十棒何故黃金自有黃金價何必和沙賣與人五祖旁出嵩山峻極禪師五三破竈墮嗣因僧問如何是脩善行人山曰擔枷帶鏁曰如何是作惡行人山曰脩禪入定曰某甲淺機請師直指山乃曰爾問我惡惡不從善爾問我善善不從惡僧良久山曰會麼曰不會山曰惡人無善念善人無惡心所以道善惡如浮雲起滅俱無處僧於言下有契悟後破竈墮聞舉乃曰此子會盡諸法無生薦福懷云前頭則官不容針後面則私通車馬若能辨得許你具擇法眼昭覺勤云窮善善自何來究惡惡從何起若能明見者個田地便知諸法無生有問崇寧如何是大脩行底人脩禪入定如何是大作惡底人擔枷帶鏁且道與嵩山是同是別徑山杲云怎奈在髑髏前作妄想烏石道云石溪者裏又且不然有問如何是大脩行底人向道橫身當宇宙如何是大作業底人赤脚上刀山且道與古人是同是別良久云但得此身無罣礙何妨塵事亂如麻壽昌經云惡人無善善人無惡倏爾言外知歸翻然不落因果僧大悟悟甚麼獅兒迸斷黃金索據實舉論俱未免過畢竟過在什麼處閒雲萬斛凝青嶂一任風雷鼓復收六祖旁出洛京荷澤神會禪師六一大鑒能嗣因鄉信至報二親亡澤乃入堂白椎曰父母俱喪請大眾念摩訶般若眾纔集澤便結椎曰勞煩大眾寶壽方云大小荷澤雖然放去較危收來太速要莊嚴二親報地猶未可雪峰則不然今日或有報二親俱忘亦入堂白椎曰父母俱喪請大眾撾法鼓左手鑼右手舞十字街頭嚇跳虎顧眾云咄走開走開莫來攔我毬門路
