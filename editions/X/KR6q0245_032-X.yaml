body:
  text: 古杭白巖嗣祖沙門淨符彚集南六汝州南院寶應慧顒禪師南六興化獎嗣上堂赤肉團上壁立千仞僧問赤肉團上壁立千仞豈不是和尚道院曰是僧便掀倒禪牀院曰者瞎驢亂做僧擬議院便打徑山杲云吾今為汝保任此事終不虗也天童華云也是勾賊破家若非者僧敢捋虎鬚怎見汗馬功高雖然如是山僧更資一路赤肉團上壁立千仞若有僧出劈脊便棒何故殺人刀活人劒具眼者看鼓山永云電光影裏緇素區分纖毫不犯總教滅門天寧琦云者僧敢向毒蛇頭上揩癢蒼龍頷下披鱗誰不賞他大膽只是末上少了一着自出洞來無敵手得饒人處且饒人雲居莊云重賞之下必有勇夫磬山修云者僧將成九仞之山欠進一簣之土寶壽方於僧擬議處代云情知和尚龍頭蛇尾黃檗琦云南院門庭孤峻者僧步驟亦奇祇是不合龍頭蛇尾致被點罰氣悶殺人待他道瞎漢亂做劈面便掌管教壁立千仞一時推倒豈不俊哉資國秀云南院雖然縱奪可觀但知盡法不管無民者僧也是龍頭蛇尾此間若有僧出掀倒禪牀但分付明牕下安排南院因僧問祖意教意是同是別院曰王尚書李僕射曰意旨如何院曰牛頭南馬頭北徑山杲云前頭答得著後頭答不著明因懷徵云妙喜恁麼道且道恰南院意不恰南院意南院因僧問從上諸聖向什麼處去院曰不上天堂則入地獄曰和尚又作麼生院曰還知寶應老落處麼僧擬議院以拂子驀口打曰你還知喫拂子底麼曰不會院曰令合是你行又打一拂子雪竇顯云令既自行且拂子不知來處雪竇道個瞎且要雪上加霜黃龍心云然則白珪之玷猶尚可磨病在膏肓最難救療者僧令既在手為什麼不能行過在甚處徑山杲云權衡臨濟三玄三要須還他南院始得雪竇為什麼道拂子不知來處妙喜道個瞎且要兩得相見東禪觀云令合是者僧行為什麼却自行懵懂底便道拂子在南院手裏若與麼非惟自抑威光亦乃不識南院性空道南院令雖自行要且打者僧不著天寧琦云雪竇雖是明眼宗師要且不知寶應老落處既未知寶應老落處因什麼却道拂子不知來處只具一隻眼妙喜道個瞎也是東家人死西家人助哀開先金云旁觀喝彩錦上鋪花即不無他雪竇妙喜若是寶應老落處未夢見在開先道個瞎要且別資一路諸人還知開先落處麼便下座瑞光徹云猛虎口裏分蹄饑鷹爪下奪敲骨取髓痛下鍼錐須是臨濟嫡骨兒孫方始有此作略雲溪挺云南院打死漢不算好手則且置祇如妙喜如此告報畢竟是第幾玄泰云南院雖善奪鼓褰旗終是自救不了南院問風穴曰南方一棒作麼生商量曰作奇特商量穴却問和尚此間一棒作麼生商量院拈拄杖曰棒下無生忍臨機不見師穴於言下大悟徑山杲云風穴當時好大展坐具禮他三拜不然便與掀倒禪牀乃回謂侍者云你道當時風穴禮拜是掀倒禪牀是者云草賊大敗杲云你看者瞎漢亂統便打磬山修云風穴悟則不無怎奈落在第二頭山僧若作南院待問此間一棒作麼生商量劈脊便棒管教伊七通八達白巖符云往與天界盛和尚徵論次因舉及此界曰我若作南院待問此間一棒作麼生商量便好與劈面打符曰和尚也不妨說得到界乃反詰曰長老又作麼生符乃起身曰不念和尚老大拳痛手酸也未放在便出南院上堂諸方只具啐同時眼不具啐同時用時有僧便問如何是啐同時用院曰作家不啐啐同時失曰此猶未是某甲問處院曰汝問處作麼生曰失院便打其僧不肯翠巖真云運籌帷幄決勝千里南院雖則全機受敵其奈土曠人稀溈山云南院高提祖印縱奪臨時者僧善能當鋒抗敵怎奈力竭計窮如今還有本色衲僧麼出來與大溈相見不圖鼓舞揚聲貴要宗風不墜有麼有麼如無大溈今日大似索戰無功雲居悟云作麼生是啐同時眼眼若得明其用自備又道作家不啐啐同時失何故不啐所以道子若哮吼其母即喪諸人還明得麼乃頌曰子若哮吼其母即喪全歸其子十方通暢大用現前理自然何必起心作模樣若更不會雲居拄杖其僧後於雲門會下聞二僧舉此話一僧曰當時南院棒折那其僧忽契悟遂奔回省覲院已遷化乃謁風穴穴問莫是當時問先師啐同時話底僧麼曰是穴曰汝當時作麼生會曰某甲當時如在燈影裏行相似穴曰汝會也瑯瑘覺云者僧只解豎降旗不解奪劒戟翠巖真出風穴語云當時待者僧擬祇對以坐具劈口摵溈山云大小風穴却將惡水潑人大溈即不然某甲當時如在燈影裏行相似便好向道先師肉猶煖在你作者般見解以拄杖打下法堂免見孤他南院東禪觀云扶南院門風還他風穴諸方往往道伊肯者僧殊不知者僧被伊推在萬丈坑裏南㵎問云全機勝敵草偃風行提持向上綱宗須是南院老漢者僧後來悟去祗知納款投降不解搴旗斬將風穴當時待伊道是便好連棒打出者僧或可別立生涯免得後人向燈影邊摸索驀拈拄杖云今日有人為者僧作主出來與山僧拄杖子相見如無山僧今日失利資福廣云吾讀趙括傅慨其徒能讀父書而不知觀機制變是以喪師損威死於敵人之手若是廉頗輩則不然觀機制變著著該通以是而知作家不啐啐同時失其旨深矣白巖符云古今諸老各出手眼扶樹自己門風即不無若是南院落處何異隔靴抓癢首山云你若坐時我須立我若坐時你須立者裏不曾討個頭鼻望他南院門牆何啻千里南院因僧問日月交謝寒暑迭遷如何是不涉寒暑者院曰紫羅抹額繡裙腰曰向上之機今已曉中下之流如何解會院曰炭庫裏藏身虎丘隆云問既有宗答亦驚羣雖然如是南院只解觀根逗機應病與藥虎丘更資一路或有問日月交謝寒暑迭遷如何是不涉寒暑者向他道前村深雪裏昨夜一枝開向上之機今已曉中下之流如何解會向道買帽相頭寶壽新云南院虎丘雖則各展機謀要且終無二致有問新上座日月交謝寒暑迭遷如何是不涉寒暑者向道好個問頭向上之機今已曉中下之流如何解會便與驀頭一摑且道與古人相去多少試參合看若參合得可以廣贊法化輔弼真風如或未然新上座更有話在乃按拂下座南院因一僧參纔入方丈便以手指曰敗也院拈拄杖度與僧擬接院便打雲峰悅云者僧頭上有光不知脚下似漆且作麼生直饒你十字縱橫正好朝打三千暮打八百天寶樞云者僧當時纔見南院擬取拄杖便好震威一喝拂袖而出縱使南院全機殺活也只是個賊過後張弓南院因僧問古殿重興時如何院曰明堂瓦插簷曰與麼則莊嚴畢備也院曰斬草蛇頭落昭慶庭云貧思寶所曲指化城設忽遨遊亡家失業畢竟如何須知泣玉人特地成狼藉大行山禪房院克賓禪師南六興化獎嗣一日興化曰維那汝不久為唱導之師賓曰不入者保社化曰你會了不入不會不入賓曰總不與麼化便打復曰克賓維那法戰不勝罰錢五貫設饡飯一堂來日齋時化自白槌曰克賓維那法戰不勝不得喫飯即便趁出院雪竇顯云克賓要承嗣興化罰錢出院且置却須索取者一頓棒始得且問諸人棒既喫了作麼生索得雪竇要斷不平之事今夜與克賓雪屈以拄杖一時打散黃龍南云克賓失錢遭罪有理難伸興化以剛決柔未足觀也并須一狀領過溈山曰興化令雖行大似以勢欺人克賓一期輸機怎奈千古聲光不墜且道利害在甚麼處若不沙場經久戰揭天犪鼓喪紅塵白雲端云叢林自古至今盡道克賓知恩方解報恩恁麼說話可謂埋沒古人然則諸人且作麼生見得他克賓維那要會麼雖為興化燒香要且自熏天炙地雲居舜云大冶精金應無變色其奈興化令行太嚴不是克賓維那也大難承當若是如今汎汎之徒翻轉面皮多少時也徑山杲云雲居抝曲作直妙喜道要作臨濟兒孫直須翻轉面皮始得天童華云大小雪竇與克賓維那雪屈要且無合殺中峰本云有令不行有事不斷天下之公患也興化既行矣又斷矣未免旁觀者哂南堂欲云興化全師出征克賓堅壁不戰及乎力盡伎窮未免牽牛納璧雪竇要斷不平直為克賓雪屈會麼雖得一場榮刖却一雙足天寧琦云克賓法戰不勝興化據令而行稱提臨濟宗風揭示正法眼藏棒頭出孝子佛法無人情當時將謂茆長短燒了方知地不平通玄奇云興化為人可謂深入虎穴只是不得虎子克賓雖則咬牙喫棒大似夢還故鄉若是伶俐衲僧管教興化棒折棲霞成云興化白椎老婆心切克賓出院乳哺情深從上先德互相激揚何曾夢見他父子斧斫不開處所謂三級浪高魚化龍癡人猶戽夜塘水靈巖儲云興化雖然間不容髮太殺倚勢欺人克賓固能始終一貫未免成父之惡舜老夫足則抝曲作直要且車不橫推妙喜慈悲之故有落草之談且喜新興化總不在者裏豈不聞垂衣裳而天下治者堯也聲色之於以化民末也君子胡不慥慥爾能仁鑑云興化令行維那有些不甘雪竇為維那雪屈興化還甘麼不因楊得意怎識馬相如寶慶法云盡道克賓法戰不勝罰錢出院殊不知興化被他一坐至今起不得且道利害在什麼處具眼者辨看龍華體云大丈夫威武不能屈於克賓見之矣雖然若非興化怎見汗馬功高廣教玉云盡道興化門牆千仞不是克賓赤身擔荷怎見汗馬功高殊不知龍門無宿客霹𮦷送飛騰卓拄杖一下法雲云克賓既為興化入室之子甘居門外不打不罰更待何時雖然如是三盞酒裝公子面一枝花插美人頭白巖符云賓則始終賓主則始終主扶持臨濟正宗還他興化父子有者道你不久為唱導之師賊你會了不入不會不入賊當時下得者兩個賊字免見狼當殊不知龍象蹴踏非驢所堪白雲靜云赤身挨白刃扷劒攪龍門須還他英靈漢子興化既移星換斗克賓乃將錯就錯且道他二老恁麼意作麼生雪後始知松柏操事難方見丈夫心守廓侍者南六興化獎嗣問德山從上諸聖向什麼處去山曰作麼作麼廓曰勅點飛龍馬跛鼈出頭來山休去明日山浴出廓過茶與山山撫廓背一下曰昨日公案作麼生廓曰者老漢今日方始瞥地山又休去雪竇顯云然精金百煉要須本分鉗錘德山既以己方人者僧還同受屈以拄杖畫一畫云適來公案且置從上諸聖向什麼處去大眾擬議一時趁出黃龍南云德山持聾作啞雖然暗得便宜廓公掩耳偷鈴怎奈旁觀者哂報恩秀云豈止偷鈴如九重淵底驪龍頷下抉珠正值龍睡若覺時必為虀粉溈山云若不登龍門焉知滄海深直饒浪激千尋怎奈龍王不顧雲居元云大凡一賓一主須是知音同死同生方堪受敵廓侍者獨立於懸崖石上翻身倒捋虎鬚周金剛安坐於大海波心背手逆擒麟角在檀特山前列陣向占波國裏爭鋒分明有輸有贏且道誰得誰失請諸人斷看報恩秀云若問萬松從上諸聖向什麼處去便與攔腮一掌云在者裏直教飛龍跛鼈縮項攢蹄侍者德山亡鋒結舌雖然還識德山老漢麼少年曾決龍蛇陣老倒還聽稚子歌南堂欲云德山固是作家爐鞲本分鉗錘怎奈廓侍者是煅過了的金從他以己方人畢竟無屈可受靈巖與麼批判莫有為雪竇作主者麼博山來云德山一條棒尋常血滴滴地到者裏因甚不用還會麼暗裏抽橫骨明中坐舌頭古南門云猛虎口裏橫身毒蛇頭上揩癢一出一入一挨一拶不妨好手雪竇恁麼舉從上諸聖且置者一隊漢向什麼處去可憐無限弄潮人畢竟還落潮中死資福廣云探頭太過者墮坑落壍而不知輸機誘敵者奔南敗北而不辭妙略神算終古無雙待得眼開劒去久矣白巖符云廓公一期俊俏不玷旁觀德山養子之緣殊費乳血若是諸聖去處咄劒去久矣爾方刻舟蓮柎筞云廓老輪鞭深入其奈搏擊無功德山兩度班師祗解暗中屈敵放過則二俱作家檢點則總欠一著然雖如是不是沙場行陣久揭天犪鼓喪紅塵守廓因行脚到襄州華嚴嚴上堂曰大眾今日若是臨濟德山高亭大愚鳥窠船子兒孫不用如何若何便請單刀直入華嚴與汝證據廓出禮拜起便喝嚴亦喝廓又喝嚴亦喝廓禮拜曰大眾看者老漢一場敗缺復喝一喝拍手歸眾嚴便下座歸方丈時風穴作維那上去問訊嚴曰維那汝來也叵耐守廓適來把老僧扭揑一上待集眾打一頓趁出穴曰趁他遲了也自是和尚言過他是濟下兒孫本分恁麼嚴方息怒穴下來舉似廓廓曰你著甚來由勸者漢我未問前早要棒喫得我話行如今不打搭却我者話也穴曰雖然如是已徧天下也天童悟別華嚴方息怒云老僧若作華嚴連棒打出則風穴不敢傳言送語矣福嚴容云華嚴龍頭蛇尾不能令廓公契服若是山僧當時見他道大眾看者老漢一場敗缺聲未絕連棒打出不惟兩個作家益見華嚴令不孤行南㵎問云二虎之下獸不容蹄兩刃之間人不容足華嚴一期施設可謂主令森嚴不知守廓是透脫牢籠底漢橫衝直撞收展自如遂致者老漢卸甲倒戈龍頭蛇尾千載之下寧免遭人檢點敢問諸人那裏是他華嚴敗缺處驀拈拄杖云匡扶須藉英靈手顯發還他過量人資福廣云戰如雷霆解如風雨乃衲僧遊戲事而華嚴又欲聲鐘以難廓公何也為是陣後興兵為復別有道理具眼者試請道看淨慈嵒云華嚴最初亦未甞不開個舖面奈何龍頭蛇尾故令太阿倒授而漢盡得楚徒成千秋遺恨乃今學語流謂華嚴不解作主到底若在今日某人不待守廓拜起便與痛棒打出不惟可免養虎傷身管取寰中獨踞如斯杜硬葢為從前學處不玄向後又不遇人是以出言吐氣總不慚惶得不為識者笑白巖符云諸方各出手眼盾堅矛利不無所長若要與華嚴守廓二老相見未敢相許白巖不顧犯忌敢為直言道風穴在二老手裏生遭陷沒固不待言又豈知他華嚴守廓一上神通非同小小還委悉麼除却華山陳處士誰人不帶是非行汝州西院思明禪師南六寶壽沼嗣因同參顒公出住南院往訪之纔見人事了乃曰某甲從許州來無可人事收得江西剃刀一柄獻和尚南院曰汝從許州來為甚麼却收得江西剃刀西院遂於院手上掐一掐南院曰侍者收取西院以衣袖拂一拂便出南院曰阿剌剌阿剌剌溈山云西院雖收得江西剃刀無處施呈直遇同參方始拈出如今還有收得者麼試呈似山僧看如無尋常用個什麼西院因僧問學人有一問在和尚處時如何院曰設有也斬為三段僧作禮院便休去會下有一僧曰堂頭和尚道即太煞道未了在問話僧乃拽其僧上方丈白曰者僧不肯和尚語院曰是上座不肯老僧那僧曰不曾覺事亦不曾說院乃一時喝下僧到法堂又曰說甚太煞道直下未了在問話僧又拽其僧白方丈院曰上座果不肯老僧那僧曰莫信者僧今日三度見伊風發乃一總趁下雲巖學云思明棒頭有眼者僧見機而作檢點將來總被者擔板漢使得七上八下鎮州寶壽二世禪師南六寶壽沼嗣開堂日三聖推出一僧壽便打聖曰漝麼為人非但瞎者僧眼瞎却鎮州一城人眼去在壽便擿下拄杖歸方丈法眼益徵云什麼處是瞎却鎮州一城人眼瞎雪竇顯云寶壽三聖雖發明臨濟正法眼藏要且只解無佛處稱尊當時者僧若是個漢纔被推出便與掀倒禪牀直饒寶壽全機也較三千里瑯瑘覺云不是三聖怎到今日雖然如是錯會者多溈山秀云寶壽為將因何三聖却作中軍可惜鎮州一城人眼至今未辨東西然清議之排必有竊吹之處當時連三聖趁出必然救得鎮州一城人眼泐潭準云三聖成褫寶壽出世好則甚好要且只得一橛溈山云寶壽大似寰中天子敕正行三聖塞外將軍令正舉還有不惜性命者麼出來與老僧相見老僧今日要斷不平之事良久云橫按鏌鎁全正令太平寰宇斬癡頑昭覺勤云寶壽全機擔荷不妨奇特要且只見一邊當時若善發明臨濟正法眼藏待三聖道恁麼為人非但瞎者僧眼瞎却鎮州一城人眼去在便與本分草料何故一不做二不休天童華云盡道寶壽三聖是作家爐鞲本分鉗錘有甚交涉殊不知二大老被者僧一拶直至如今扶不起今日莫有為二老雪屈者麼出來與明果相見驀拈拄杖擿下云龍蛇易辨衲子難瞞天童傑云二尊宿美則美矣若要扶持臨濟正宗每人各須喫一頓棒始得且道那裏是欠處具眼者試定當看東禪觀云盡道三聖有奔流度刃之作向平地上湧波瀾寶壽用疾𦦨過風之機向虗空裏轟霹𮦷二老各出隻手扶豎臨濟正法眼藏與麼說話要作臨濟兒孫且緩緩性空道蚊子如何擎大柱藕絲焉可繫須彌若是臨濟正法眼藏端的向二人邊滅却靈隱嶽云二尊宿等閒一挨一拶直下發明臨濟心髓只是不知性命總在者僧手裏還有檢點得出者麼龍翔訢云斬釘截鐵發揮格外真機揑聚放開顯示當陽正眼直得龍吟霧起虎嘯風生一道神光貫通今古如斯舉唱猶涉途程且到家穩坐一句作麼生道三事衲衣青嶂外一爐沉水白雲中仰山欽云一收一放有主有賓葢是尋常茶飯就中寶壽三聖猶較一著且如何見得若無舉鼎拔山力千里烏騅不易騎南堂欲云手眼通身拳踢相副寶壽三聖固是作家若要發明臨濟正法眼藏直是未在雪竇道者僧若是個漢便與掀倒禪牀不是射鵰手徒說李將軍烏石道云寶壽用秦楚強兵之術三聖畫孫吳吞併之機各各氣宇如王欲得一統封疆萬民樂業猶未得在何故太平本是將軍致不許將軍見太平徑山琇云寶壽三聖發明臨濟正法眼藏直是斬釘截鐵怎奈承當者少雪竇既是權柄在手便合與者僧雪屈說甚麼當時還會麼若無舉鼎拔山力千里烏騅不易騎東山澓云二大老雖然水滴不漏未免惹人向是非勝負裏走作山僧今日開堂有人推出僧來山僧也不用棒也不用喝但向他道我不如你他若道與麼為人非但瞎者僧眼瞎却越州一城人眼去在不妨向他道個瞎且道與古人相去多少未過關者看看東明際舉天童傑語畢云若論扶豎臨濟正宗豈但二老喫棒直饒盡大地人喫棒也只扶豎得一半何故不見道攻乎異端斯害也已南㵎問云二老是臨濟嫡骨兒孫故能向人天眾前發明臨濟骨髓惜乎當時無人承當致使二大老不能轉身吐氣開先金云明修暗度不無三聖決勝運籌還他寶壽似則似祇如三聖道恁麼為人非但瞎者僧眼瞎却鎮州一城人眼去在未審諸人作麼生會臥龍纔奮迅丹鳳便翱翔棲霞成云風馳電卷海震嶽搖二老灼然有驚羣之作然究其實落未免都成乾弄一場不特笑殺旁觀亦被者僧冷地看破道峰清云寶壽提持祖令非但瞎却鎮州一城人眼直得十方黑暗日月無光若不是三聖高懸古鏡未免人人扶牆摸壁今日新道峰既無人推出僧來山僧亦不行棒要且瞎却天下人眼且道利害在其麼處呈拄杖云一片白雲橫谷口幾多歸鳥盡迷巢東塔熹云我要翻雪竇案縱使者僧纔推出便掀倒禪牀也只是棺材裏瞠眼有甚用處者僧若果是個漢纔推出珍重便出不惟闔會觀光亦使二老疑殺白巖符云二大老發揮臨濟正法眼藏可謂竭其力矣只是終未免被者僧在背地裏泠笑寶壽在先寶壽沼為供養主沼問父母未生前還我本來面目來壽立至夜深下語不契翌日辭去沼曰汝何往壽曰昨日蒙和尚語問某甲不契往南方參善知識去沼曰南方禁夏不禁冬我此間禁冬不禁夏汝且作街坊過夏若是佛法闤闠之中浩浩紅塵常說正法壽不敢違一日街頭見兩人交爭揮一拳曰你得恁麼無面目壽當下大悟昭覺勤云築著磕著當頭彰本地風光應聲應色直下無絲毫透漏還會他道得恁麼無面目麼龍袖拂開全體現磬山修云得恁麼無面目噫錦繡叢中撞著白雲堆裏活埋洞見本地風光面目依然長在噫吉州資福如寶禪師南六西塔穆嗣僧問古人拈椎豎拂意旨如何福曰古人與麼那曰拈椎豎拂又作麼生福便喝出雲門偃云古人是什麼眼目有僧曰和尚與麼驢年會麼門乃召僧曰來來僧近前門以拂子驀口打髻珠是云者裏則不然古人拈椎豎拂意旨如何向道頻呼小玉元無事只要檀郎認得聲者僧若是個見角知牛底漢者裏必能別露一斑且免資福空費許多鹽醬資福因陳操尚書來乃畫一圓相操曰弟子與麼來早是不著便何況更用如此福於圓相中著一點操曰將謂是南番舶主福便歸方丈閉却門雪竇顯云陳操只具一隻眼溈山云資福雖是本分爐鞲怎奈陳操是煆了精金諸人要識資福麼等閑拋一釣驚動碧潭龍靈巖儲云雪竇恁麼批判肘臂終不外曲殊不知尚書撥盡白雲為尋知己資福打開青嶂善應來機雖則二俱好手未免起模畵樣資福因僧問如何是一塵入正受資作入定勢曰如何是諸塵三昧起資曰汝問阿誰靈谿昱云靈谿則不然如何是一塵入正受舉拳云者個是拳頭如何是諸塵三昧起便與驀口𡎺龍唐古云資福老漢也是隨人起倒者裏則不然如何是一塵入正受汝問阿誰如何是諸塵三昧却作入定勢郢州芭蕉慧清禪師南六南塔涌嗣上堂拈拄杖示眾曰你有拄杖子我與你拄杖子你無拄杖子我奪却你拄杖子靠拄杖下座溈山云大溈即不然你有拄杖子我奪却你拄杖子你無拄杖子我與你拄杖子大溈既如是諸人還用得也未若人用得德山先鋒臨濟後令若也用不得且還本主投子青云人無遠慮必有近憂天童覺云你有則一切有你無則一切無有無自是當人與奪關芭蕉什麼事正漝麼時作麼生是你拄杖子寶峰文云大眾現錢買賣莫受人瞞知麼有利無利不離行市天童傑云芭蕉老漢將常住物私置草簿花破過頭致令後代兒孫向拄杖子節目上更生節目凌辱宗風徑山乾索索地有也不與無也不奪為甚如此拈拄杖卓一卓云一朝權在手看取令行時天寶樞云你有拄杖子我與你拄杖子錯你無拄杖子我奪却你拄杖子錯良久云錯錯烏石道云有處與固為錦上添花無處奪畢竟作麼生話會諸仁者還勘辨得出麼良久云來年更有新條在惱亂春風卒未休愚菴盂云者老漢寬處有餘狹處不足顯聖者裏則不然你有拄杖子雙手提不起你無拄杖子和身放不下金粟元云覿面提持臨機與奪二尊宿固不妨兵隨印轉別立一家要且勞而無功未識當人拄杖子在且作麼生是當人拄杖子若也道得非惟坐斷古人舌頭亦乃與天下衲僧出氣金仙璨云芭蕉者漢大似個三家村裏小孩子挖得團臭泥搓圓揑扁縮短扯長輥轆轆圓活活雖謂收放自由未免勞掌費指弁山則不然你有拄杖子奪你拄杖子你無拄杖子與你拄杖子且道與古人是同是別檢點得出許伊具一隻眼神鼎澤云一分銀子買一雙草鞋了無奇特只是不許人穿何故法如是故喝一喝神鼎僼云芭蕉與麼道大似仁義盡從貧處斷世情偏向有錢家天童則不然你有也與你你無也與你只是要你識得拄杖子來處你若識得伊來處有則錦上鋪花無則雪中送炭尋常應用如龍得水似虎靠山你若不識得來處二六時中要橫不得橫要豎不得豎未免被伊礙却設有個漢道我有也不要無也不要和尚又作麼生我也要問你底來處你有也不要你底從何而有識得你自己底即是山僧底要且推不去若無也不要我且問你尋常撥草瞻風穿雲渡水全承誰力與麼豁豁達達莾莾蕩蕩近年來如稻麻竹葦大眾知來處不思議不知處無本據畢竟拄杖子從甚處來良久云休從林下覓莫向㵎邊求芭蕉示眾如人行次忽遇前面萬丈深坑背後野火來逼兩畔荊棘叢林若也向前則墮在坑壍若也退後則野火燒身若也轉側則被荊棘林礙當與麼時作麼生免得若也免得合有出身之路若免不得則墮身死漢廣胤標云芭蕉老漢到者裏為你和贓捉敗了也是你諸人皮下還有血麼且如今合著得個什麼語與芭蕉相見還知麼若是凌行婆定合哭蒼天芭蕉因僧問賊來須打客來須看忽遇客賊俱來時如何蕉曰屋裏有一緉破草鞋曰祇如破草鞋還堪受用也無蕉曰汝若將去前凶後不吉資福廣云雙關把住一劒通開若是短販之徒便見冰消瓦解雖然如是我不恁麼忽遇客賊俱來時如何但向道你是作家
