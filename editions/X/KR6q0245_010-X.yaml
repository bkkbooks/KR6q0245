body:
  text: 古杭白巖嗣祖沙門淨符彚集南二南泉山下有一菴主或謂曰南泉和尚近日出世何不去禮見主曰非但南泉直饒千佛出興我亦不去泉聞乃令趙州往勘之州見便說拜主不顧州從西過東又從東過西主並不顧州曰草賊大敗遂拽下簾子便歸舉似泉泉曰我從來疑著這漢次日泉乃與沙彌攜茶一瓶盞三隻到菴擲向地上乃曰昨日的昨日的主曰昨日的是什麼泉於沙彌背上拍一下曰賺我來賺我來拂袖便回雪竇顯云大小南泉趙州被這擔板漢勘破了溈山云菴主坐觀成敗大小南泉趙州向淨地上喫交智海禾云是即是菴主只解把定封疆不能同生同死當時趙州禮拜但云這賊我識得你待伊從東過西從西過東便拽拄杖趂出且看趙州別有箇什麼伎倆甌峰承云且道那裏是擔板漢勘破南泉趙州處若是明眼衲僧向這裏勘破雪竇也不難南泉因陸亘大夫問弟子家中有一片石也曾坐也曾臥如今擬鐫作佛得麼泉曰得大夫曰莫不得麼泉曰不得不得雲巖晟云坐即佛不坐即非佛洞山价云不坐即佛坐即非佛天童覺云轉功就位轉位就功還他洞上父子且道南泉意作麼生直是針錐不入高峰妙云南泉恁麼祇對正所謂聖人無常心以百姓為心也大巍倫云陸大夫一片石如不遇南泉幾喪淳矣天奇瑞云大夫向這石頭上坐臥不安皆是自不守分若非南泉怎得風光徧界難然總是泥裏洗土塊愚菴盂云南泉老漢也是箇五百僧善知識為甚人質所疑了無雌黃人言得便言得人言不得亦言不得大眾要識南泉麼落花飛絮壓浮萍縱在蒼苔不須掃芙蓉覺云盡道南泉騎賊馬趕賊奪賊鎗殺賊殊不知落花有意隨流水流水無情戀落花陸亘盡生平伎倆要人不知被這片石一生擔板白巖符云王老師機輪轉處如水銀墮地顆顆皆圓初不假絲毫造作然要且不知他大夫是何心行南泉示眾曰三世諸佛不知有黧奴白牯却知有大溈智云三世諸佛既不知有黧奴白牯又何曾夢見灼然須知向上有知有底人始得且作麼生是知有的人喫官酒臥官街當處死當處埋沙場無限英靈漢堆山積嶽露屍骸博山來云手把地尾連天王老師異類中行也三世諸佛不知有掬明月於無影樹頭黧奴白牯却知有剪白雲於不應山谷何人知此意除是長嘯者愚菴盂云我要問諸人如何是黧奴白牯知有底事有對曰黃金國土琉璃地獅子巖前水草香余云你作恁麼語話啣銕負鞍有日在南泉問良欽空劫中還有佛否欽曰有泉曰是阿誰欽曰良欽泉曰居何國土欽無語洞山瑩代欽轉身便行海門涌云老胡西來覓箇不受惑底人如良公者未易多得奈將成九仞之山欠進一簣之土當時若能輕彈一指敢教王老師不作等閒看南泉因甘贄行者設齋請念誦泉拈起槌曰大眾為黧奴白牯念摩訶般若波羅蜜甘贄拂袖便出粥後泉問典座行者在甚麼處座曰當時便去也乃泉打破鍋子雲門信云南泉老老大大未免隨人起倒直饒打破鍋子也是賊過後張弓愚菴盂云兔子懷胎蚌含明月三十棒寄打雪竇六不收看破雲門女媧氏煉石補天秦始皇驅山塞海雖然如是三十年後舉著一回飲水一回噎明招補云王老師雖則據令而行也是不奈船何打破戽斗如菴彰云行者設粥不是好心南泉雖則念誦分明爭奈被人覰破祇如打破粥鍋畢竟如何話會顧左右云知音不在頻頻舉達者須知暗裏驚南泉因趙州問知有底人向什麼處去泉曰向山前檀越家作一頭水牯牛去州曰謝師指示泉曰昨夜三更月到牕雲峰悅云若不是南泉洎被打破蔡州徑山杲云雲峰老人失却一隻眼殊不知只因後語當下打破蔡州開先金云如斯問答還他南泉父子遞相讚仰也須妙喜雲峰開先又作麼生昨夜三更月到牕雲峰妙喜兩窺光如今欲識山前事且去襄陽問老龐洞山瑩云雲峰看樓打樓徑山因孔著楔若約衲僧眼目敢保俱未夢見且道洞山有甚長處良久云獅子不食鵰殘俊鷹不打死兔南泉問維那今日普請作甚麼那曰拽磨泉曰磨從你拽不得動著磨中心樹子那無語保福展代僧云比來拽磨如今却不拽法眼益代僧云恁麼即不拽也南泉問黃檗黃金為世界白銀為壁落是什麼人居處檗曰是聖人居處泉曰更有一人居何國土檗义手而立泉曰道不得何不問王老師檗却問更有一人居何國土泉曰可惜許天寧琦云二大老一人無事生事一人將錯就錯直是好笑當時若作黃檗待他道更有一人居何國土但道這野狐精設使南泉通身是口也須飲氣吞聲能仁鑑云潛行密用如愚若魯還他黃檗若是家有諍子國有諍臣猶欠一著待云道不得何不問取王老師但云可惜許縱使南泉通身伎倆到這裏施展不開南泉坐次一僧問訊叉手而立泉曰太俗生僧合掌泉曰太僧生僧無語徑山杲云合掌太僧生叉手又俗氣總不恁麼時尊體無頓處無頓處有巴鼻唵蘇魯蘇魯㗭唎㗭唎喝近來王令稍嚴不許攙行奪市天寧琦云叉手太俗合掌太僧不僧不俗誰敢安名撿點將來也是垛生招箭且道落在這僧分上南泉分上南泉曰我十八上便解作活計趙州道我十八上便解破家散宅神鼎諲云你道破家散宅底好解做活計底好初參之士且取前語久參先德直須破家更有一言萬里厓州普賢素云十八上便解作活計囊無繫蟻之絲厨乏聚蠅之糝十八上便解破家散宅南頭買賤北頭賣貴撿點將來各好與三十棒這裏且放過一著何故曾為蕩子偏憐客自愛貪杯惜醉人薦福璨云山僧當時若見各人脚跟下痛與三十何故他家自有黃金骨不必旃檀入細雕地藏學云諸禪德還是解做活計底是破家散宅底是撿點得出許你親見二大老立地處不然自己脚跟下泥水不分無自由分且作麼生方得自由擊拂子云等閒拶出虗空骨出沒縱橫總不拘南泉因座主辭泉問甚麼處去主曰山下去泉曰第一不得謗王老師主曰爭敢謗和尚泉乃噴啑曰多少主便出去石霜諸云不為人斟酌雲居膺云非師本意長慶稜云請領話雲居錫徵云座主當時出去且道是會不會南泉普請擇菜次時趙州作爐頭乃在堂內呌曰救火救火大眾一齊到僧堂州乃關却門眾無語泉乃拋鑰匙從牕入義山訥云我不學南泉益油添薪當時見他閉却門便拈土塊就門上書兩箇封字要他趙州至今出身無計洪州廬山歸宗智常禪師南二馬祖一嗣與南泉同行一日告別煎茶次泉曰從前與師兄商量語句彼此已知此後有人問畢竟事作麼生宗曰這一片地大好卓菴泉曰卓菴且置畢竟事作麼生宗乃踢翻茶銚便起泉曰師兄喫茶了普願未喫宗曰作這箇語話滴水也難消五祖戒云南泉只解作客不解作主溈山云南泉逢強即弱歸宗逢弱即強三十年同行畢竟事不通商量雖然如是猶較王老師一綫道昭覺勤云驚羣之句誰不聳然有者道南泉搆他歸宗不著所以遭他呵叱殊不知行人更在青山外蔣山不惜眉毛為諸人下箇註脚南泉探頭太過歸宗壁立萬仞且道還有出身路也無喝下須教三日聾天童華云南泉貪程太急歸宗薄處先穿二老雖發明馬祖正眼要且極則事未夢見在何故家住東州龍池微云南泉逆水撐船篙篙到底只是撐不上歸宗順風使帆揚揚得意其奈略遇波濤便手忙脚亂雖然還知二老落處麼拈拄杖卓一卓云從前汗馬無人識只要重論葢代功歸宗因僧辭乃問甚麼處去曰諸方學五味禪去宗曰諸方有五味禪我這裏只有一味禪僧便問如何是一味禪宗便打僧曰會也會也宗曰道道僧擬開口宗又打黃檗運云馬大師出八十四員善知識箇箇屙轆轆地祇有歸宗較些子昭覺勤云若作黃檗深辯端倪幾乎勞而無功資福先云歸宗幸是好一味禪無端著鹽著醋却成五味了也如今忽有人來辭去諸方學五味禪只向他道善為道路若是箇漢必然別有生涯天寧琦舉黃檗語畢云說什麼較些子直是未在我這裏只有一味禪便與掀倒禪牀見之不取思之千里徑山琇云五味禪一味禪總拈向一邊當時這僧見歸宗擬拈棒拂袖便行非但靠倒歸宗管取話行天下天井新別昭覺語云只因黃檗明辨端倪所以勞而無功演教泐云黃檗昭覺只見錐頭利不見鑿頭方殊不知歸宗被這僧一拶直得手忙脚亂歸宗因僧問如何是佛宗曰向你道你還信否曰和尚重言焉敢不信宗曰只你是曰如何保任宗曰一翳在眼空花亂墜僧有省法眼益云若無後語何處討歸宗雪竇顯於和尚重言焉敢不信下別宗云侍者寮喫茶去歸宗因芙蓉辭乃問甚麼處去蓉曰歸嶺中去宗曰子在此多年裝束了却來為子說一上佛法蓉結束了上去宗曰近前來蓉乃近前宗曰時寒途中善為蓉聆此言頓忘前解高峰妙云歸宗佛法恁麼流布拈花微笑命若懸絲今日凡有人來告辭總與艸鞵一緉歸宗剗草次有座主來參偶見一蛇過宗以鋤斷之主曰久響歸宗元來只是箇麤行沙門宗曰你麤我麤主曰如何是麤宗竪起鋤頭主曰如何是細宗作斬蛇勢主曰與麼則依而行之宗曰依而行之且置你甚處見我斬蛇主無對德山鑑因雪峰問古人斬蛇意旨如何山便打峰便走山召云存衲子峰回首山云他後悟去方知老漢徹底婆心雪竇顯云歸宗只解慎初不能護末德山頗能據令未明斬蛇乃云大眾看翠峰今日斬三五條以拄杖一時打散歸宗因普請入園取菜乃畫圓相圍却一株以標插之語眾曰輒不得動著便去少頃宗復來見菜猶在遽以棒趂曰這一隊漢無一箇有智慧底蹋倒標子拔菜而歸雲居莊云設有僧却這一株菜莫契得歸宗意麼拈拄杖敲香几云歸宗和尚來也靠拄杖下座歸宗因一僧於夜半忽大呌曰我悟也我悟也一眾駭然明日宗上堂曰喚昨夜呌大悟底僧出來僧便出宗曰你昨夜見箇什麼道理便呌大悟僧曰尼姑元是女人做宗便休白巖符云歸宗只有照妍𡟎鏡且無增黃金色底鉗錘若是山僧待道尼姑原是女人做便痛與一頓趂出要教渠平地上別有生機杭州鹽官海昌齊安國師南二馬祖一嗣一日喚侍者與我過犀牛扇子來者曰扇子破也官曰扇子既破還我犀牛兒來侍者無對投子同代侍者云不辭拈出恐頭角不全雪竇顯云我要不完全底頭角石霜諸代侍者云若還和尚即無也雪竇云犀牛兒猶在保福展代侍者云和尚年尊別請人好雪竇云可惜勞而無功資福寶畫一圓相相內書一牛字雪竇云適來為甚不拈出雪竇顯云若要清風再拂頭角重生請諸禪客下一轉語扇子既破還我犀牛兒來一僧云大眾參堂去竇喝一喝云拋鈎釣鯤鯨釣得箇蝦蟇雲居舜代侍者云已颺在搕𢶍堆頭了也報恩秀云諸方拈掇總是空口白話要且端的不曾與鹽官相見萬松若作侍者見道與我過犀牛扇子來有甚羽蒲紙竹綾絹椶櫚信手拈來便與一柄何也縱有千般異終無兩樣風證果成云扇子既破還我犀牛兒來這老漢何不領話寶壽新代侍者云幸是某甲若是別箇一場禍事白巖符云古今諸老各出隻手互呈頭角盡為侍者代語然秋菊春蘭各擅其美則不無要且未能盡善殊不知當時鹽官錯過侍者且道那裏是錯過侍者處不見道扇子破也鹽官因講僧參官問座主業何經論曰講華嚴經官曰華嚴有幾種法界曰廣說則重重無盡略言有四種官竪起拂子曰這箇是第幾種法界主沉吟官曰思而知慮而解鬼家活計日下孤燈果然失照保福展代云若禮拜即喫和尚棒禾山殷代講僧云某甲不煩和尚莫怪法眼益代拊掌三下昭覺勤云鹽官以強凌弱則且置如何道得一句恰好免得他道鬼家活計良久云劍閣路雖險夜行人更多徑山杲云兩段不同收歸上科鹽官會下有主事僧忽一日見鬼使來追乃告曰某甲身充主事未暇脩行乞容七日得否使曰待為白王若許七日後來不然須臾便至言訖不見至七日後復來竟覓其僧了不可得洞山价因有舉問僧曰若被覓著時如何抵擬他山代云被他覓得也天童悟徵云前頭鬼使因甚見後頭鬼使因甚不見鹽官示眾曰虗空為皷須彌為椎什麼人打得眾無對南泉願云王老師不打這破鼓法眼益別云王老師不打雪竇顯云打者甚眾聽者極少且問誰是解打者莫謗鹽官好南泉道王老師不打這破皷法眼道王老師不打兩箇既不奈何一箇更是懡㦬又云王老師不打還肯得諸方也無自代云千年田八百主黃龍心云南泉法眼只解瞻前不能顧後且如鹽官道虗空為鼓須彌為椎什麼處是破處直饒檢點得破處分明我更要問你覓鼓在天童華云南泉法眼大似喫李子只向赤邊咬山僧今日與鹽官相見去也虗空為鼓須彌為椎要打便打莫問是誰乃卓拄杖一下天童傑云諸方尊宿各出隻手只是隨例打鼓並無一人性躁祥符今日直截與諸人道虗空為皷須彌為椎漆桶參堂去天寧琦云且道甚處是他破處驢年夢見麼雲居莊云南泉與麼道鹽官還肯也無山僧即不然虗空為皷須彌為槌什麼人打得但向他道打即不辭只是罕遇知音愚菴盂云山僧有鼓便打有笛便弄無論渠破與不破若更問我覓鼓自領出去寶壽新云虗空為鼓須彌為椎什麼人打得乃代云聽能仁鑑云二尊宿節拍相隨大似桑林之舞可謂解和撿點將來未免隨人脚跟轉大巖今日要與鹽官相見虗空為鼓須彌為槌驀拈拄杖卓一卓云切忌聞著鹽官因僧問如何是本身盧舍那官曰與老僧過淨瓶來僧將淨瓶至官曰却安舊處著僧送至本處復理前問官曰古佛過去久矣雲門偃別官語云無朕迹雪竇顯云直是一手指天一手指地爭得無還會麼雲在嶺頭閒不徹溈山云山僧不然忽有人問如何是本身盧舍那但云大眾歸堂去若人向大溈門下薦得古釋迦不先新彌勒不後且道轉身一句作麼生道良久云明年更有新條在惱亂春風卒未休東禪觀云盲者難以與乎文彩聵者難以與乎音聲這僧既不薦來機國師只成虗設雲門道無朕迹扶國師不起雪竇道一手指天一手指地爭得無也扶國師不起以拂子畫一畫云前來葛藤一齊畫斷且道畢竟如何是本身盧舍那擲拂子下座南堂欲云國師不得雲門洎合勞而無功總似雪竇未免白日見鬼如今有問山僧如何是本身盧舍那向道一氣不言含有象萬靈何處謝無私白巖符云這僧貪觀六橋花柳失却故園春色且置勿論祇如鹽官與麼提持還與他本身盧舍那有交涉無交涉鹽官因法空禪師到請問經中諸義官一一答了乃曰自禪師到來貧道總未得作主人空曰便請官曰今日夜也且歸本位安置待明日來空下去至明旦官令沙彌屈法空空至官顧沙彌曰咄這沙彌不曉事教屈法空禪師祇屈得箇守堂家人來空無語鼓山賢云齊安主禮有餘法空不會為客我若作法空待道貧道總未得作主人便好道和尚可謂習氣難忘更道屈得守堂家人來向他道莫怪沙彌自是和尚亦未識法空拂袖便出管教齊安作主不成明州大梅法常禪師南二馬祖一嗣住大梅馬祖令一僧問和尚見馬祖得箇甚麼便住此山梅曰大師向我道即心即佛我便向這裏住僧曰大師佛法近日又別梅曰作麼生別曰他又道非心非佛梅曰這老漢惑亂人未有了日任他非心非佛我只管即心即佛僧回舉似馬祖祖曰梅子熟也禾山殷因僧問大梅恁麼意作麼生殷云真獅子兒天井新云即心即佛非心非佛牙齒無筋舌頭無骨梅子熟也是典罰語是證明語長安今夜家家月幾處笙歌幾處愁西遯超云馬祖添箇八兩連前凑成一斤大梅已足一斤何妨佯推八兩雖然如是未識他父子鍼芥水乳在咄咄自領三十棒白巖符云一往看來大梅這漢大似箇隔墻擔板殊不知他是箇渾剛打就生銕鑄成底而所謂殺活縱奪權實照用一點也不曾欠缺馬祖在三千里外劈面唾噫大梅還甘也未大梅因夾山與定山同行議論次定曰生死中無佛即無生死夾曰生死中有佛即不迷生死互相不肯乃同上山請質夾山理前語問未審二人見處那箇較親梅曰一親一踈夾山復問那箇親梅曰且去明日來夾山明日又問那箇親梅曰親者不問問者不親夾山住後乃曰我當時在大梅失却一隻眼雪竇顯云夾山畢竟不知換得一隻眼大梅老漢當時聞舉以棒一時打出豈止劃斷兩人葛藤亦乃為天下宗匠昭覺勤云是則是兩口金剛王寶劍要且拂掠虗空金山則不然生死為諸佛根基諸佛乃生死爐鞴若解險絕承當即證六通八解南堂欲云夾山失却隻眼住後方知雪竇畫斷葛藤作得天下宗匠雖然李將軍有佳聲在不得封侯也是閒萬善緣云這兩箇瞎漢累他大梅費鹽費醬夾山後來縱然知過怎奈只具一隻眼雪竇雲云祇如道失却一隻眼換得一隻眼同別在甚麼處若撿點得出許你具一隻眼不然更為你下箇註脚失却一隻換一隻今朝却是四月一一年三百六十日每日盂兩度濕參古南門云雪竇醉後添杯不知大梅牙如劍樹二老葛藤早已劃斷夾山失却一隻眼過後方知那一隻向甚處去也古南不避檢責確實評量道有佛無佛死生生死一翳在眼空花亂墜大梅因龐居士問久嚮大梅未審梅子熟也未梅曰熟也你向甚麼處下口士曰百雜碎梅伸手曰還我核子來士無語翠巖芝云此二人大似把手上高山寶峰文云且道二人相見還有優劣也無大梅幟代龐公云嚼破裏頭仁用核作麼復呵呵笑曰恁麼道也是﨟月扇子國清英云要識大梅龐公麼本是同根生相煎何太急留錫省云不負見馬大師者只一龐老子善與諸老打口皷無敗手因甚於大梅手裏一時鈍置殊不知他當時無語其聲如雷大梅因僧問如何是祖師西來意梅曰西來無意鹽官安聞云一箇棺材兩箇死漢雪竇顯云三箇也有玄沙備云鹽官是作家黃龍新云雪竇道三箇也有是死漢是活漢具眼者請試甄別昭覺勤云一串穿却大梅忽一日示眾曰來莫可抑往莫可追從容間聞鼯鼠聲梅乃曰即此物非他物汝等諸人善自護持吾今逝矣言訖示滅雪竇顯云這漢生來莾鹵死後顢頇即此物非他物是何物還有分付處也無有般漢不解截斷大梅脚跟只管道貪程太速寶峰文云既非他物是什麼物興善廣云者漢臨死猶口裏水漉漉地即此物非他物瞞頇不少咄
