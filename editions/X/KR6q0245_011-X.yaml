body:
  text: 古杭白巖嗣祖沙門淨符彚集南二池州魯祖寶雲禪師南二馬祖一嗣尋常見僧來便面壁南泉聞曰我尋常與師僧道向佛未出世時會取尚不得一箇半箇他漝麼驢年去保福展問長慶云祇如魯祖節文在甚麼處被南泉漝麼道慶云退己讓人萬中無一羅山閑云陳老師當時若見背上與五火抄何故為伊解放不解收玄沙備云我當時若見也與五火抄雲居錫云羅山玄沙總恁麼道為復一般別有道理若擇得出許上座佛法有會處報慈遂徵云南泉為復是唱和語不肯語翠巖芝云何勞如此若有僧來見箇什麼知時好又云我即不然未具胞胎不得會會即打折你驢腰徑山杲云魯祖不得南泉幾乎覰破壁報恩秀云南泉恁麼貶屈魯祖長慶却道正是退己讓人魯祖把斷關津羅山却道解放不解收盡是魚前布網賊過張弓拈拄杖云萬松不曾面壁你者一隊來覓什麼節文乃一齊打散瑞巖慍云諸方多作奇特解會殊不知者箇老漢被人以無文印印破面門至今不欲呈露還有不動舌頭與他雪屈者麼良久云只有照壁月且無吹葉風笑巖寶云當時若有箇衲僧入來便與掀倒不惟打斷諸老葛藤亦免魔魅人家男女雲門信云魯祖面壁若作佛法商量入地獄如箭射靈巖儲云妙喜要見魯祖直須覰破壁設有箇師僧云和尚是什麼心行但向道前村深雪裏昨夜一枝開待伊眼目定動合掌道果然衲子難瞞左右顧云且道靈巖節文在什麼處良久云明日向汝道西遯超云南泉老漢好像入旃檀林却燒一爐香見咸陽火却投一束柴雖然若不遇知音夜光投人鮮不按劍白巖符云雲老敲願老拍玉振金聲可謂千古一遇然在正眼看來總是鼓粥飯氣東墖熹著語云將謂無人證明魯祖因僧問如何是不言言祖曰汝口在什麼處曰某甲無口祖曰汝尋常將什麼喫飯僧無對洞山价代僧云他不饑喫什麼飯雪竇顯云好劈脊棒者般漢開口了合不得合口了開不得汾陽昭代僧云只為不會五祖戒代僧云和尚不妨具眼黃龍新云雪竇只知者僧開口了合不得合口了開不得殊不知魯祖被者擔板漢勘破天童覺云者僧只解握死蛇頭不能捋猛虎鬚當時待他問你口在什麼處猛與一喝拂袖便行直饒魯祖全機管取做手脚不及南堂欲云當時者僧若是箇漢待道你口在什麼處便與掀倒禪牀非唯使魯祖高豎降旂且免雪竇馬後喝節古南門云者僧問箇不言言却能始終照顧只是未解轉身古南見來也未免劈脊便棒何故要伊知得通身是口寶掌白云魯祖只解塞斷來機不會移風易俗或問山僧如何是不言言劈脊便棒待伊動靜連棒打出伶俐漢忽然拶著必然別有生涯白巖符云殺人須見血魯祖以之矣將什麼喫飯喝當時者僧下得者一喝魯祖鉢袋子管取分付有分雖然者僧無對不妨作家只是無人委悉魯祖因僧問如何是雙林樹祖曰有相身中無相身曰如何是無相見祖曰金香爐下鐵崑崙仰山欽云魯祖恁麼答話始終只是說道理山僧則不然有問如何是雙林樹秋來葉落春到花開如何是春到花開那邊一片雲今日定下雨幽州盤山寶積禪師南二馬祖一嗣上堂若言即心即佛今時未入玄微若言非心非佛猶是指蹤極則天童覺云有錢不解使解使却無錢且作麼生得十成去娶他年少婦須是白頭兒報恩秀云今時路頭不得全體非心非佛有缺神用欲得十成去除是三冬向火六月賣氷始得所以道娶他年少婦須是白頭兒然則調和琴瑟一句作麼生道長翁短婆婆遞互廝折磨盤山上堂向上一路千聖不傳學者勞形如猿捉影瑯瑘覺云上來講讚無限良因慈明圓云向上一路千聖不然徑山杲云向上一路熱盌鳴聲天童傑云向上一路掘地覓天薦福璨云盤山道向上一路千聖不傳深諦律尼娑婆訶慈明道向上一路千聖不然蘇嚧悉唎娑婆訶諸人與麼領會歌羅歌羅天寧琦云諸大老盡力道只發明得向下一路若是向上一路驢年夢見麼天童忞云盤山道向上一路千聖不傳抱贓呌屈作麼慈明道向上一路千聖不然且莫詐明頭妙喜道向上一路熱盌鳴聲合眼跳黃河千巖道向上一路在你脚底接竹點青天先老人道向上一路踏破草鞵猢猻倒上樹這五個漢被山僧一時領過了也畢竟作麼生是向上一路拈拄杖起身云歸堂喫茶開先金云字經三寫烏焉成馬者一隊漢盡力道只道得向下一路若是向上一路又豈止未夢見在要識向上一路麼良久云屋漏看星眠天井新云向上一路墮坑落壍夜夢不祥書在壁上青龍斯云盤山慈明二尊宿大似假借豪門虗張聲勢若是向上一路依舊提掇不出弁山今日要與諸人覿面拈出遂擲下拄杖云看看金仙璨云盤山慈明二大老一個㗋脣緊澁一個齒舌寬宏雖然各立門墻正眼看來總未踏向上路在佛川義云古今諸老與麼提持不無長處要透向上一路直待驢年廣教玉云向上一路三生六十劫海門涌云本來一條徑直大路被者夥老古錐指點一上返成迂曲致使疲極之輩退失寶所海門豈可坐視今日要使渠一個個就路還家乃驀地掀倒禪牀竟歸方丈盤山示眾心月孤圓光吞萬象光非照境境亦非存光境俱忘復是何物洞山价云光境未忘復是何物雲門偃云直饒恁麼猶是半途未是透脫一路如何是透脫一路良久云天台華頂徑山杲云白鷺下田千點雪黃鸝上樹一枝花清化嶾喝一喝云字經三寫烏焉成馬雪竇雲云者兩個漢大似徐六擔板只見一邊好各與二十拄杖若要扶豎從上來事且緩緩東明鑑舉光境俱忘復是何物喝一喝云是甚麼光境未忘復是何物乃舉拂云喚者個作甚麼復喝一喝盤山上堂諸禪德可中學道似地擎山不知山元孤峻如石含玉不知玉本無瑕若如此者是真出家雪竇顯云晝行三千夜行八百是我尋常用底且拈放一邊汝諸人向什麼處見盤山徑山杲云若能如是揑目生花翠巖云諸人要見盤山則易見徑山則難靈巖儲云開眼也著閉眼也著甚處不是盤山良久喝一喝云瞌睡漢醒也未盤山示眾諸禪德譬如擲劒揮空莫論及之不及斯乃空輪無迹劒刃無虧若能如是心心無知全心即佛全佛即人人佛無異始為道矣徑山杲於心心無知下云咄咄我王庫內無如是刀愚菴盂云若論本色衲子實無如是刀若論本色衲子實有如是刀一僧旁哂云不見盤山道學者勞形如猿捉影盂云咄情知你坐在鬼窟裏盤山將順世告眾曰有人邈得吾真否眾將所傳頂相呈似皆不契時普化出曰某甲邈得盤曰何不呈似老僧化遂翻一觔斗而出盤曰者漢向後徹風狂去在乃奄化保福展云普化掣顛不少盤山醜拙更多長蘆了撼身云快活殺我也若無爍破乾坤底眼孔怎見渾金璞玉復云山僧依普化樣子摸得一本今夜展開要使大眾瞻仰遂打一觔斗歸堂棲霞成云若是臨濟大師三十棒一棒也少不得賴遇盤山放過且道者棒頭落在什麼處你若道便好劈脊我也知你瞎棒亂做國清英云咄咄咄一人傳虗萬人傳實盤山初參時一日出門見人羿喪歌郎振鈴曰紅輪決定沉西去未委魂靈往那方幕下孝子哭曰哀哀山忽身心踴躍歸舉似馬祖祖印可之雲居莊云夫為人師者須具透關眼別邪正來機只如盤山認個昭昭靈靈以為極則馬大師從而印可豈不孤負先聖欺罔後昆山僧此間若有者般人必然別有生涯且道是什麼生涯鴛鴦繡出從君看不把金針度與人蒲州麻谷寶徹禪師南二馬祖一嗣到臨濟問大悲千手眼那個是正眼濟搊住曰大悲千手眼作麼生是正眼速道速道谷拽濟下禪牀却坐濟問訊曰不審谷擬議濟便喝拽谷下禪牀却坐谷便出去因聖頴云諸禪德此二尊宿如此且道意作麼生今人盡道照用照什麼椀一切人只解自騎馬去捉賊自持刀去殺賊此二人便能奪賊馬捉賊奪賊刀殺賊雖然如是臨濟得便宜却是失便宜仰山欽云二大老恁麼激揚雖則百千手眼一時俱露又怎免得個二俱瞎漢且道還有檢點得出底麼瞎天寧琦云二老主賓互換縱奪可觀如猛𦦨燒空忽雷震地相似雖然與他大悲千手眼有何交涉只見波濤湧不見海龍宮安國聰云擊節扣關衝樓跨竈一挨一拶縱奪超羣還他二老好手若論大悲正眼驢年未夢見在麻谷到章敬處繞禪牀三匝振錫一下卓然而立敬曰是是又到南泉繞禪牀三匝振錫一下卓然而立泉曰不是不是谷曰章敬道是和尚為甚麼道不是泉曰章敬即是是汝不是此是風力所轉終歸敗壞長慶稜代谷於是是處云和尚佛法身心何在又代谷於章敬即是是汝不是處云和尚是什麼心行保福展別云但振錫一下而出又拈云章敬南泉可謂一是一非又云麻谷依稀似曲纔堪聽又被風吹別調中雲居錫云章敬未必道是南泉未必道不是又云麻谷當初但持錫出去恰好雪竇顯代麻谷於是不是兩處俱云錯溈山云章敬道是落在麻谷彀中南泉道不是亦落在麻谷彀中大溈即不然忽有人持錫繞禪牀三匝振錫一下卓然而立但向伊道未到者裏好與三十棒泐潭清云章敬道是也好與三十拄杖南泉道不是也好與三十拄杖何故是與不是全彰妙義章敬南泉一場失利勝默光云是無可是非無真非是非無主萬善同歸梟鷄晝夜徒自支離我無三寸鱉得喚龜迦葉不肯一任攢眉天寧琦云繞禪牀振錫參禮常儀為什麼章敬道是南泉道不是苦瓠連根苦甜瓜徹蒂甜棲霞成云不入虎穴怎得虎子有者道麻谷被南泉換却眼光殊不知南泉被麻谷一拶幾乎打破蔡州雪竇下兩錯也只救得一半博山來云章敬道是雪竇道錯南泉道不是有什麼語話分惟麻谷錫杖頭較些子麻谷一日在帳內坐以手巾葢却頭披雲和尚來入見便作哭聲良久出去法堂上繞禪牀一匝却入撥開帳見谷去却手巾坐乃曰死中得活萬中無一谷便下牀就位抽坐具雲近前把住曰前死後活你還甘麼谷曰甘即甘阿師堪作什麼雲推向一邊曰知道你前言不副後語昭覺勤云入寺看額見表知裏披雲慣作高賓拈尾作頭拈頭作尾麻谷孟甞門下看他詶對不道他不知有只為用意太深當時待道死中得活萬中無一好與云蒼天蒼天何故得人一牛還人一馬麻谷使扇次僧問風性常住無處不周和尚為什麼却搖扇谷曰你只知風性常住且不知無處不周曰作麼生是無處不周的道理谷却搖扇僧作禮谷曰無用處師僧著得一千個有什麼益昭覺勤云者僧一期可觀可惜有頭無尾若不是麻谷作家洎合放過敢問諸人甚處是者僧落節處撥開向上竅能有幾人知溈山果云者僧只知腦門著地不覺當面錯過當時若據令而行何處更討麻谷潭州東寺如會禪師南三馬祖一嗣因仰山來參問汝是甚處人山曰廣南人寺曰我聞廣南有鎮海明珠是否山曰是寺曰此珠如何山曰黑月即隱白月即現寺曰還將得來否山曰將得來寺曰何不呈似老僧山叉手近前曰昨到溈山亦被索此珠直得無言可對無理可伸寺曰真獅子兒善能哮吼昭覺勤云東寺只索一顆仰山傾出一栲栳天寧琦云仰山雖是個獅子兒怎奈把鎮海明珠作豌豆賣却千古之下遭人檢點山僧今日黨理不黨親便是東寺到來也須勘過了打洞山瑩云仰山韞匵於斯善賈沽諸可惜東寺被他珠光一爍直得龍頭蛇尾山僧若作東寺但喚侍者快將糞箕掃帚來白巖符云鎮海明珠仰山固然在握然不免被他帶累遭人塗污當時待問還將得來否便好對道已擲在糞掃堆頭了也他若更道真獅子兒善能哮吼以手掩耳便出管取東寺安排明牕不及䖍州西堂智藏禪師南三馬祖一嗣普請次乃曰因果歷然怎奈何怎奈何時有僧出以手托地堂曰作什麼曰相救相救堂曰大眾者個師僧猶較些子僧拂袖便走堂曰獅子身中蟲自食師子肉昭覺勤云西堂洞明綱要始終正令全提者僧異類中行其奈龍頭蛇尾敢問大眾因果歷然一句作麼生道是則龍女頓成佛非則善星生陷墜西堂因李翱尚書甞問僧馬大師有甚麼言教僧曰大師或說即心即佛或說非心非佛李曰總過者邊一日問堂馬大師有甚麼言教堂呼李翱李應諾堂曰皷角動也如菴彰云盡道李公勘者僧殊不知李公在者僧面前納敗一上又向西堂處討巴鼻却被西堂一拶直得轉身無路即今還有為他轉得身者麼出來與如菴拄杖子相見僧纔出彰遽云不是弄潮人休入洪波裏便下座西堂因僧問有問有答賓主歷然無問無答時如何堂曰怕爛欲那長慶稜因僧舉問云有問有答賓主歷然無問無答時如何慶云人人盡道休官去林下何曾見一人雪竇顯云何不與本分草料南堂欲云二員古佛與麼答話可使千古流芳若要塞斷衲僧咽㗋猶未可在今夜或有問靈巖有問有答賓主歷然無問無答時如何向道冬至寒食一百五上元定是正月半白巖符云此處無金十兩俗人酤酒三升二老其謂歟雪竇云何不與本分草料也是掩耳偷鈴總未得勦絕拈拄杖云者裏或有問有問有答賓主歷然無問無答時如何擲下拄杖歸方丈京兆章敬懷惲禪師南三馬祖一嗣因百丈遣僧來探候敬上堂次展坐具禮拜起將敬一隻靸鞋以袖拂却塵了倒覆向下敬曰老僧罪過黃龍新云百丈逞盡神通不消章敬道個老僧罪過便見氷消瓦解鼓山珪云黃龍孟八郎猶欠一著在只知百丈逞神通不知百丈伎倆俱盡只知章敬道個老僧罪過不知章敬一欵便招會麼蛇吞蝦蟆猶自可更有蜈蚣在後頭婺州五洩山靈默禪師南二馬祖一嗣謁石頭便問一言相契即住不契即去頭據坐洩便行頭隨後召曰闍黎洩回首頭曰從生至死祇是者個回頭轉腦作麼洩言下大悟乃抝折拄杖而棲止焉洞山价云當時若不是五洩先師也大難承當然雖如是猶涉途程在長慶稜云險報慈遂徵云那裏是他猶涉途程處且道洞山意作麼生雲峰悅云大小石頭坐不定把不住似者擔板漢放去便休又喚回被他糊塗一上道我向者裏有個悟處驢年夢見溈山行云五洩當時便去不妨坐斷天下人舌頭乃被人喚回糊塗不少直饒抝折拄杖也是賊過後張弓如今得失是非一時坐斷敢問大眾石頭據坐意作麼生地藏恩云五洩當時只合與麼去不合與麼來洪州百丈惟政禪師南二馬祖一嗣問南泉諸方善知識還有不說似人的法也無曰有丈曰作麼生是不說似人的法曰不是心不是佛不是物丈曰恁麼則說似人了也曰某甲即恁麼和尚作麼生丈曰我又不是善知識怎知有說不說的法曰某甲不會請和尚說丈曰我太煞與汝說了也溈山云百丈只知瞻前不知顧後當時待伊道某甲不會但云老僧亦不會百丈若下得此一轉語非惟與南泉為宗匠亦乃與天下人為宗匠天奇瑞云者兩個漢拈頭失尾拈尾失頭惹那諸方笑怪既有不說的法且道還許你賓主問答也無饒你檢點得出進退無門更誇精細轉見不堪諸人到此作麼生各請歸堂珍重百丈一日路逢天使留齋次偶驢子鳴使曰頭陀丈舉首使却指驢丈却指使使無對保福展云百丈因齋慶讚法眼益別云但作驢鳴支提愛云一家有事百家忙澧州茗溪道行禪師南二馬祖一嗣甞曰吾有大病非世所醫曹山寂因僧問古人曰吾有大病非世所醫未審是什麼病山曰攢簇不得底病曰一切眾生還有此病也無山曰人人盡有曰和尚還有此病也無山曰正覓起處不得曰一切眾生為什麼不病山曰一切眾生若病即非眾生曰未審諸佛還有此病也無山曰有曰既有為甚麼不病山曰為伊惺惺愚菴盂別云吾有大病一物可醫且道是什麼物若拈得出可與苕溪同參潭州三角山總印禪師南二馬祖一嗣上堂若論此事眨上眉毛早已蹉過了也時麻谷便問眨上眉毛即不問如何是此事角曰蹉過也谷乃掀倒禪牀角便打保福展云三角也是賊過後張弓雪竇顯云者兩個有頭無尾漢眉毛未曾眨上說什麼此事蹉過尋有僧問眉毛為甚不眨上竇便打昭覺勤云喚作此事已是好肉剜瘡了也何況更云眨上眉毛早已蹉過麻谷雪竇賊過後張弓則固是更有一個驀拈拄杖下座天寶樞云二大老恁麼酬唱不妨雷轟電卷石裂崖崩若是此事白雲萬里南堂欲云二老雖則縱奪可觀怎奈傷鋒犯手我者裏從來未曾提著此事諸人也未曾眨上眉毛中間固無蹉過與不蹉過諸人既不掀倒禪牀山僧也不劈脊便棒自然聲和響順形直影端非惟主伴互融亦乃人天欣悅擊拂子云水歸大海波濤靜雲到蒼梧氣象閒天界盛云是賊識賊不妨爭先後手麻谷見三角恁麼舉便好掀倒禪牀那堪更問此事三角見麻谷恁麼問便好劈脊一棒那堪更道蹉過雖則有照有用未免皆打落節處雪竇要爭先手鈎得僧出便打不妨照用同時若是天覆地載山高水深當別有不眨眉毛在古南門云三角眉毛若無雪竇洎合打作兩橛即今有問劈脊便打討甚眉毛廣教玉云二老大似饑鷹分肉猛虎奪食雖則競價相酬未免取笑旁觀山僧今日撾鼓陞座諸人簇簇上來總不敢動著不用干戈管取風和雨沐天下太平其間一挨一拶若言蹉過欺誑平人若言不蹉過畢竟喚什麼作此事喝一喝下座白巖符云者兩個漢手忙脚亂熱閙門庭即得若論此事又豈止白雲萬里鼎州中邑洪恩禪師南二馬祖一嗣因仰山問如何得見佛性義邑曰我與汝說箇譬喻如一室有六牕內有一獼猴外有獼猴從東邊喚猩猩獼猴即應如是六牕俱喚俱應仰山禮謝起曰適蒙和尚譬喻無不了知更有一事祇如內獼猴瞌睡外獼猴欲相見又且如何邑下繩牀執仰山手作舞曰猩猩與汝相見了譬如蟭螟虫在蚊子眼睫上作窠向十字階頭呌曰土曠人稀相逢者少信相顯云諸人要見二老麼我也與你說個譬喻中邑大似個金師仰山將塊金來使金師酬價金師亦盡價相酬臨成交易賣金的更與貼秤金師雖然闇喜心中未免偷疑何故若非細作定是賊贓雲居錫云中邑當時若不得仰山者一句語何處有中邑也崇壽稠云還有人定得此道理麼若定不得只是個弄精魂脚手佛性義在什處報慈遂云若不是仰山怎得見中邑且道什麼處是仰山得見中邑處東塔明云大小中邑錯下名言又喚作佛性又喚作獼猴復鼓掌呵呵笑云是何言歟報恩琇云入驚人浪得稱意魚不無中邑金翅入海直取龍吞還他仰山山僧則不然如何得見佛性義驀口便掌免見拖泥帶水又云若作仰山見他說喻了但作禮曰謝師指示看中邑者漢如何合煞棲霞成云中邑閉眼說醒仰山開眼說夢究竟二俱不了若是佛性義三生六十劫也未夢見在翠巖云能近取譬中邑可謂仁矣惜乎被仰山一拶未免手忙脚亂翠巖則不然如何得明見佛性劈脊便棒何故免得猩猩貪瞌睡勞他六戶喚頻頻資福廣云良驥負鹽非伯樂不能賞鑑騄駬載車須王良方堪駕御馬則固然或遇嘯風猛虎返擲獅兒又且如何收拾遂以手作格勢云且道者邊著
