body:
  text: 古杭白巖嗣祖沙門淨符彚集青六雲門曰一任橫說豎說未是宗門苗裔若據宗門苗裔是甚麼熱盌鳴三乘十二分教說夢達磨西來說夢若有老宿開堂為人說法將利刀殺却百千萬個有甚麼過天童忞云眼葢諸方氣凌一世許他雲門老子檢點將來跛脚阿師說得行不得當時山僧若在直出眾前扼腕立地向他道和尚項上三百斤鐵枷何不卸却待他動靜便與掀倒禪牀白巖符云韶陽老漢像心像意信口說大似旁若無人殊不知話墮了也還有出他一頭地者麼雲門因僧問如何是佛門曰乾矢橛理安問云驚羣句直是驚羣奇特事不妨奇特雲門大師可謂硬峻一時汝等諸人切忌向者裏咬嚼雲門曰既知來處什麼劫中無祖師自代曰某甲今日不著便徑山杲云雲門也是作賊人心虗徑山則不然既知來處甚麼劫中無祖師不圖打草祇要驚蛇雲門上堂眾集門以拄杖指面前曰乾坤大地微塵諸佛總在裏許爭佛法覓勝負還有人諫得麼若無人諫得待老漢與你諫看僧曰請和尚諫門曰者野狐精愚菴盂云者老漢挾勢凌人取面鏡來請老漢試照照看你面皮厚多少雲門問嶺中順維那古人豎起拂子放下拂子意旨如何順曰拂前見拂後見門曰如是如是門後却舉問僧汝道當初諾伊不諾伊僧無對門曰可知禮也愚菴盂代僧云和尚也須防護口業好雲門示眾十五日以前即不問十五日以後道將一句來乃自曰日日是好日天童覺云屬虎人本命屬猴人相冲雲門到庫下問僧作什麼曰設供門曰你是甚處人曰某處人門乃喚典座與者上座設却供溈山云雲門一期慈悲却成多事當時便回去免見挂人脣齒良久云若不登樓望焉知滄海寬雲門曰佛法太殺有祇是舌頭短復自曰長也天童覺云雲門大師雖然自起自倒要且車不橫推理無曲斷徑山杲云向道莫行山下路果聞猿呌斷腸聲天寧琦云雲門原不知有佛法一個個舌頭徧覆十方世界特地說無說有說短說長好劈口便掌且道天寧意在什麼處河裏失錢河裏摝寶壽新云佛法兩字在雲門手裏以為一件奇貨殊不知在新長老門下一些也用不著何則拄大門又短做火叉又長雲門因僧問如何是清淨法身門曰花藥欄曰便恁麼去時如何門曰金毛獅子雪竇顯著語云太無端昭覺勤云還知者僧問處與雲門答處麼若知得兩口無一舌若不知未免顢頇天童覺云賊來須打客來須待雲門雪竇二俱作家者裏莫有便恁麼去者麼切忌撞頭磕額雲門示眾拄杖子化為龍吞却乾坤了也山河大地甚處得來通玄奇云雲門一期施設不妨新鮮斟酌將來也是抱贓呌屈靈隱禮云雲門恁麼道大似藏盡楚天月猶存漢地星山僧則不然卓拄杖云拄杖子把定乾坤了也山河大地分付阿誰復卓拄杖云一人有慶兆民賴之雲門因僧問樹凋葉落時如何門曰體露金風昭覺勤云雲門善巧方便可謂即事即理即隱即顯三句可辨一鏃遼空雖然猶是粘皮著骨若有問蔣山樹凋葉落時如何對他道撑天拄地且道是三句是一鏃試玉須經火求珠不離泥天寧琦云者僧若道個謝師答話雲門大師管取有理難伸山僧即不然樹凋葉落時如何拈起拄杖纔佇思打下法堂免致諸方檢點昭覺淵云雲門具逸羣機擊節扣關於閃電光中與人解粘去縛楔抽釘不妨好手檢點將來大似與賊過梯者裏則不然或有問樹凋葉落時如何向道落霞與孤鶩齊飛秋水共長天一色雲居莊云者僧置個問頭不妨親切只如雲門與麼答還有為人處也無徑山則不然忽有與麼問但向道不因夜來雁爭見海門秋拈拄杖畫一畫下座天寶樞云得人一牛還人一馬喝一喝愚菴盂云釋迦老子無事向水中撈月達磨祖師有手只可拏空挨得黃檗痛棒再到睦州折脚三個毬子一時輥來四下藤條好稱禪佛豎拂子云雲門大師來也你若向體露金風上見崖州萬里白巖符云文義相隨還他韶陽答話若是白巖又且不然樹凋葉落時如何但向他道分付火爐頭雲門因僧問如何是塵塵三昧門曰鉢裏飯桶裏水雪竇顯云直饒多口阿師也難下嘴報恩秀云者僧問處直要人當面拈出雲門恁麼道且道是拈出不拈出資福廣云何止鉢裏桶裏直得通身徧身猶見有饑渴者且道過在什麼處雲門因僧問佛法如水中月是否門曰清波無透路曰和尚從何處得門曰再問復何來曰正恁麼時如何門曰重叠關山路昭覺勤曰者僧汎一隻船入雲門法海裏引得一陣猛風看他把舵張帆也不易當抵及至下梢可惜輸他一籌且道什麼處是輸處試辨看磬山修云者僧向萬古碧潭再三撈摝爭奈雲門有翻天覆地之能靈巖儲云者僧將成九仞之山終虧一簣之土當時但向道和尚脚下草鞵錢什麼人還待伊眼目定動便與一喝免使多少人向光影裏撈摸雲門上堂眼睫橫亘十方眉毛上透乾坤下透黃泉須彌塞却汝咽喉還有人會得麼若有人會得拽取占波國與新羅鬪額愚菴盂云上南京船往福建去北京人來為什麼不得江西信試道看雲門上堂拈起拂子曰者裏得個入處去揑怪也日本國裏說禪三十三天有個人出來喚曰特舍兒擔枷過狀愚菴盂云是時天子雨𭦟陀羅花摩訶𭦟陀羅花𭦟殊沙花摩訶𭦟殊沙花旃檀香風悅可眾心漆桶不快請過一邊雲門示眾與你說菩提涅槃真如解脫是燒楓香供養你與你說佛說祖是燒黃熟香供養你與你說超佛越祖之談是燒餅香供養你歸依佛法僧下去徑山及云雲門氣宇如王乃作此座主見解山僧者裏道菩提涅槃真如解脫是將黑豆換你眼睛說佛說祖是將木槵子換你眼睛說超佛越祖之談是將魚目換你眼睛歸依佛法僧下去焦山乘云我又不然說菩提涅槃真如解脫是將陳葛藤絆殺汝說佛說祖是將乾屎橛薰殺汝說超佛越祖之談是將栗棘蓬鯁殺汝歸依佛法僧下去雲門因僧問如何是正法眼門曰普風穴沼因僧問如何是正法眼答云瞎天童傑云如何是正法眼破砂盆大梅幟云三大老各奏宮商自成曲調且道還有親疎也無陽春雪曲無人和一遇知音便與彈雲門示眾乾坤之內宇宙之間中有一寶祕在形山拈燈籠向佛殿裏將山門來燈籠上靈隱禮云雲門恁麼告報雖謂出就藏鋒佛日者裏又且不然四威儀內萬象之中中有一寶祕在當陽以拄杖卓一卓云會麼四顧良久復卓一卓云海神知貴不知價留與人間光照夜雲菴悅云雲門田地穩密神通妙用則不無若較解粘去縛猶欠一著在雲門遊歷時到陳操尚書家操問儒書即不問三乘十二分教自有座主作麼生是衲僧行脚事門曰尚書曾問幾人來操曰即今問上座門曰即今且置作麼生是教意操曰黃卷赤軸門曰此是文字語言作麼生是教意操曰口欲談而詞喪心欲緣而慮忘門曰口欲談而詞喪為對有言心欲緣而慮忘為對妄想作麼生是教意操無語門云曾聞尚書看法華經是否操曰是門曰經中道一切治世語言資生業等皆與實相不相違背且道非非想天即今有幾人退位操又無語門曰尚書不得草草師僧家拋却千經五論十年二十年尚不奈何尚書又爭怪得保寧茂云雲門道一句語中具三句且道從前許多絡索在三句內三句外諸方商量咸謂雲門有掣電之機陳操尚書雖則肩橫日月背負須彌及乎挨拶將來未免草繩自縛如斯話會要見古人遠之遠矣畢竟如何李將軍有嘉聲在不得封侯也是閒福州鼓山神晏國師青六雪峰存嗣示眾鼓山門下不得咳𠻳時有僧咳𠻳一聲山曰作甚麼僧曰傷風山曰傷風即得瑯瑘覺云大小國師雷聲甚大雨點全無雲葢本云鼓山雖是探竿影草未免將曲作直道林即不然作麼生傷風山中無別藥門外有青松城山洽云鼓山把定封疆不許半人來往為什麼却放過者僧不見道獅子不食鵰殘俊鷹不打臥兔廣教玉云鼓山垂鉤四海者僧拽裾龍門雖然拳踢不施却也師承有據諸方盡道鼓山龍頭蛇尾殊不知者僧被鼓山推在百丈深坑裏了也至今出頭不得鼓山示眾欲知此事如一口劒僧便問學人是死屍如何是劒山曰拖出者死屍著僧應諾便歸衣鉢下結束而去至晚山問首座問話底僧在否座曰當時便去也山曰好與三十棒東禪齊徵云者僧若不肯鼓山有甚麼過若肯何得便發去又云鼓山拄杖賞伊罰伊具眼者試商量看雪竇顯云諸方老宿總道鼓山失却一隻眼殊不知重賞之下必有勇夫雖然如是若子細檢點將來未免一時埋却東禪觀云者僧將個死屍出來弄得活活地鼓山好一口劒尚欠磨礱在寶壽方云盡道鼓山好棒惜乎用得遲了學人是死屍如何是劒劈脊便與二十趁出諸方雖有舌劒脣鋒誰敢檢點恁麼批判未夢見鼓山在諸人試檢點看古南門云者僧藏鋒運劒被鼓山二十棒打得橫屍萬里雖然如是旁觀者哂鼓山有偈云直下猶難會尋言轉更賒若論佛與祖特地隔天涯舉以問僧曰汝作麼生會僧無語其僧乃謂侍者曰某甲不會請代一轉語侍者曰和尚與麼道猶隔天涯在山聞乃喚侍者問汝為者僧代語是否者曰是山便打趁出院開先金云鼓山與侍者做處不密總被者僧一狀領過且置不問只如開先亦曰直下猶難會尋言轉更賒若論佛與祖特地隔天涯諸人又作麼生會白巖符云者僧無語不妨直下會得鼓山與侍者却乃遠在天涯不見道直下猶難會尋言轉更賒鼓山初參雪峰纔入門峰便搊住曰是什麼山釋然契悟舉首搖舞峰曰子作道理耶山曰何道理之有峰為首肯徑山琇云臥龍纔奮迅丹鳳便翱翔明州翠巖令參禪師青六雪峰存嗣上堂一夏與兄弟東語西話看翠巖眉毛在麼長慶曰生也雲門曰關保福曰作賊人心虗翠巖芝云為眾竭力禍出私門雲居元云翠巖知而故犯經赦不原雲門按後施行依公問罪還識長慶保福麼普州人送賊昭覺勤云輸機是算人之本翠巖坐却天下人舌頭無㗖處長慶云生也因事長智保福云作賊人心虗是精識精雲門云關據欵結案雖宗師競酬還截得翠巖脚跟麼不躡前蹤試請道看雪竇宗云盡大地是翠巖一隻眼更說什麼眉毛在不在直得諸方尊宿做盡伎倆出他圈繢不得宗上座又作麼生以拂子畫圓相云分付海山無事客釣鰲時下一圈圝大溈泰云保福道作賊人心虗同道者方知長慶云生也隨語生解雲門云關塞斷咽喉若有問大溈又作麼生拈拄杖卓一卓云一串穿却報恩秀云雪竇道善竊者鬼神不知既為保福天童覰破翠巖不是好手殊不知許大雲門長慶都被翠巖一莖眉毛一時穿脚鼻孔徑山琇云翠巖也是和麩糶又云一隊無孔鐵錘松隱然云保福道作賊人心虗好事不出門長慶道生也惡事傳千里雲門道關錯者一隊漢只解護惜眉毛不知打失鼻孔龍峰今日直要與伊據欵結案大眾還委悉麼暑氣盡隨雲雨去清風透入戶庭來喝一喝普明領云灼然是賊是賊寶掌白云翠巖只知開口易不覺舌頭長長慶閙處愛入頭雲門喪車挂藥袋保福抱贓呌屈寶掌今日據欵結案了也更要露個消息貴要諸人共知乃豎拂子云見之不取思之千里天目律云翠巖將謂拭唾誰知狼藉轉多保福長慶雲門不堪向狼藉處更添齷齪雖然他弟兄恁麼做處且道還據干計也無翠巖因座主請就講筵齋巖曰山僧有個問頭道得即齋乃拈起胡餅曰者個還具法身麼座主曰具巖以胡餅就口曰與麼則喫却法身也座主無對雲門偃代座主特謝和尚降重空筵明因懷代座主云不謂宗師家也作恁麼見解福州長生皎然禪師青六雪峰存嗣因有僧問雪峰如何是第一句峰良久僧舉似生生曰此是第二句峰令其僧再問如何是第一句生曰蒼天蒼天白巖符云雪峰長生揭盡神思妙筞也只提持得第二句直饒瞿曇掩室毗耶杜口也只提持得第二句且作麼生是第一句歸堂喫茶長生因僧問古人有言無明即佛性煩惱不須除如何是無明即佛性生忿然作色舉拳呵曰今日打者師僧去也曰如何是煩惱不須除生以手拏頭曰者師僧得恁麼發人業薦福如云長生與麼答話大似隨人脚跟轉福州安國弘瑫禪師青六雪峰存嗣舉國師文云得之於心伊蘭作栴檀之樹失之於旨甘露乃蒺藜之園謂僧曰一語須具得失兩意汝作麼生道僧豎拳曰不可喚作拳頭瑫不肯亦豎拳別云祇為喚者個作拳頭雪竇顯云無繩自縛漢拳頭也不識大溈秀云雪竇安國盡謂孤高方外及乎臨鋒受敵又却逐隊隨行天童華云若見得雪竇徹便見得安國龍頭蛇尾若見不徹伊蘭作栴檀之樹甘露乃蒺藜之園東禪觀云者僧不能鉗安國之口安國不能止雪竇之譏雪竇不能免大溈之議可憐者一隊漢不奈一個拳何待云我要個語具得失兩意只向道休何謂如此獅子一滴乳迸散十斛驢乳南堂欲云我不似安國論得論失一語兩意拈拄杖我此拄杖能殺能活活中有殺殺中有活或則殺活同時或則殺活不同時若善用去世出世間無法不備便乃縱奪可觀卷舒無礙若用不得總是無繩自縛漢笑巖寶云大小安國脚跟未點地在古南門云安國也是自起自倒喚作拳頭道失得麼不可喚作拳頭道得得麼只為喚作拳頭若向得失上走有甚了期雪竇雖則動絃別曲要且不出此老圈繢畢竟如何展手云急須著眼看仙人四祖浪云甚處是安國龍頭蛇尾處若檢點得出伊蘭作栴檀之樹檢點不出甘露乃蒺藜之園太原孚上座青六雪峰存嗣上雪峰峰聞乃集眾原到法堂上顧視雪峰便下看知事明日却上禮拜曰某甲昨日觸忤和尚峰曰知是般事便休雪竇顯云一千五百人作家宗師被孚老一覰便高豎降旗明日道知是般事便休果然雲門偃因僧問作麼生是觸忤處門便打雪竇云打得百千萬個有甚用處直須盡大地人喫棒方可扶豎雪峰且道太原孚具什麼眼雲居舜云大小雪峰被孚上座惑亂一上又云只者孚上座也是擔枷過狀雪竇宗云只知其一不知其二殊不知雪峰坐籌帷幄決勝千里孚上座呈盡平生見解也只在雪峰圈繢裏南堂欲云眼眼相覰心心相知僧問雲門作麼生是觸忤處門便打棒頭有眼明如日雪竇云打得千個萬個有甚用處要識真金火裏看法忍謐徵云孚上座上法堂顧視便下看知事那裏是他觸忤處雪峰道知是般事便休且道伊知什麼事白巖符云雪竇道一千五百人作家宗師被孚老一覰便豎降旗是又豈知他雪峰老漢不動干戈善能坐觀成敗太原因鼓山赴閩王請雪峰門送回至法堂曰一隻聖箭射入九重城裏去原曰是伊未在峰曰渠是徹底人原曰若不信待某甲去勘過遂趁至中路便問師兄向甚麼處去山曰九重城裏去原曰忽遇三軍圍繞時如何曰他家自有通霄路原曰恁麼則離宮失殿去也曰何處不稱尊孚拂袖便回峰問如何原曰好隻聖箭中路折了也遂舉前話峰乃曰渠有語在原曰者老凍儂猶有鄉情在峰休去溈山喆云此話眾中商量不少或云纔問甚處去者裏便好打不打是聖箭折處或云忽遇三軍圍繞時如何好打不打是聖箭折處如斯理論非唯瞞他亦乃自瞞要會麼相如曾奪連城璧秦主安然致太平寶峰文云雪峰一千五百人善知識受侯王供養福報因緣即不無若是佛法未在洞山則不然待道好隻聖箭中路折了也却問他你道什麼他擬舉便痛棒打出一使孚上座已後作個本色衲子二與聖箭子增其鋒鋩三與禪門作個真正宗匠為後人眼目諸禪德是不是有眼者辨取保寧勇別鼓山語云孚上座我也知你是個惡人徑山杲云眾中商量甚麼處是聖箭折處云鼓山不合答他話是聖箭折處鼓山不合說道理是聖箭折處恁麼批判非唯不識鼓山不識孚老殊不知孚上座正是一枚賊漢於鼓山面前納一塲敗闕懡㦬而歸却來雪峰處本大似屋裏販揚州若非雪峰有大人相者賊向甚麼處容身當時可惜放過却成個不了公案只今莫有為古人出氣底麼試出來我要問你甚麼處是聖箭折處天寧琦云鼓山聖箭子射入九重城甚生意氣孚上座却云箭折誣人之罪以罪加之妙喜謂孚上座是一枚賊漢向鼓山面前納敗闕歸騎賊馬殺賊蒼天蒼天大凡事不孤起當時雪峰只因賣弄者一隻聖箭子致使勾賊破家若也咬定牙關誰敢無風起浪便是盡大地稻蔴竹葦化作衲僧要勘鼓山也無啟口處天寧不是貶剝古人聖箭子是甚麼廁草莖拋向垃圾堆頭著更問他折處且莫𡱰沸湯好雲門澄云一人死中得活好手手好手一人半路抽身得便宜處失便宜雪峰道好隻聖箭射入九重城裏去早是拋鈎擲釣孚上座云待某甲勘過始得盲龜跛鱉納敗闕了也孚趂至中途歸舉似雪峰大似把髻投衙峰云他有語在須知不是好心孚云老凍儂猶有鄉情在貪歬不覺錯後峰便休無齒大蟲傷人不知痛太原因保福簽瓜次福曰道得與你瓜喫原曰把將來福度與一片原接得便雪竇顯云雖是死蛇解弄也活誰是好手者試請辨看南堂欲云猛虎口中奪食饑鷹爪下分餐太原較些子保福若具奔流度刃底手待伊擬接便與拋向背後看他把什麼蛇弄白巖符云者兩個漢昂昂藏藏等是獅門牙爪乃爾弄泥彈子過日明眼人見討甚面目我若作孚上座待道道得與你瓜喫便取瓜而去看保福又作麼生若作保福待道把將來便以瓜度與他擬接却縮手袖瓜看孚上座又作麼生疎山順云太原被保福一片瓜塞却咽喉至今出氣不得眾中莫有與孚上座雪屈出來與疎山拄杖子相見太原到投子子曰久嚮太原孚上座莫便是麼原便作掌勢子曰老僧招得原便出子曰且聽諸方斷看原却回首子便打玄沙備云莫是投子招得麼白巖符云投子太原雖謂手親眼辨怎奈互相屈辱太原在雪峰一日玄沙到峰謂沙曰此間有個老鼠子今在浴室裏沙曰待與和尚勘過遂到浴室值原打水沙曰相看上座原曰已相見了沙曰甚麼劫中曾相見原曰瞌睡作麼沙却入方丈白峰曰已勘破了峰曰作麼生勘伊沙舉前話峰曰汝著賊也南㵎問云孚上座略展鋒鋩却被玄沙據定雪峰到底具大人之相不謬為一千五百人善知識還有人檢點得出麼神仙祕訣父子不傳太原因鼓山問父母未生時鼻孔在什麼處原曰老兄先道山曰如今生也汝道鼻孔在什麼處原曰恁麼又爭得山却問師兄作麼生原曰將手中扇子來扇子再問原但搖扇而已山毆原一拳昭覺勤云崇寧又不然父母未生鼻孔在什麼處只劈口便掌
