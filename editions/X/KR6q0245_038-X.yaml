body:
  text: 古杭白巖嗣祖沙門淨符彚集青七洪州同安志禪師青七同安丕嗣先同安臨寂上堂曰多子塔前宗子秀五老峰前事若何如是三舉莫有對者末後志出曰夜明簾外排班立萬里歌謠道太平安曰須是者驢漢始得白巖符云先同安鉢袋子分付不得個人到臨末梢頭尤切切也求賢之急亦至矣志老與麼應對雖不失其為宗旨然未審還恰他意也無若不恰他意他又道須是者驢漢始得若恰他意怎奈三十代後有個白巖不肻襄州石門慧徹禪師青七石門蘊嗣僧問如何是伶俐底人徹曰維摩不離方丈室文殊未到早先知又僧問如何是伶俐底人徹曰垢膩汗衫皂角洗又僧問如何是伶俐底人徹曰古墓毒蛇頭戴角天童覺云一句子把定要關一句子不存軌則一句子體用雙照若人會得許你伶俐還端的麼枯龜妙在孫臏手一灼爻分十字文石門因僧問年窮歲盡時如何門曰東村王老夜燒錢開先暹因其僧又問年窮歲盡時如何先曰依舊孟春猶寒昭覺勤云不妨田地穩密若有問道林年窮歲盡時如何只向他道定盤星上轉風車烏石道云石門雖則善應來機怎奈倚他門戶數他珍寶石溪則不然忽有問年窮歲盡時如何只向他道兩竿紅燭下一片祖師心磬山修云有人問磬山年窮歲盡時如何對他道一爐紅焰煖騰騰道林慧云石溪雖則盡力提撕終是以常住物私做人情今夜忽有問弁山年窮歲盡時如何向他道寒暄一夜隔客鬚兩年催且道與古人相去多少襄州廣德周禪師青七廣德延嗣僧問阿逸多不斷煩惱不修禪定佛記此人成佛無疑此理如何周曰鹽又盡炭又無曰鹽盡炭無時如何周曰愁人莫向愁人說說起愁來愁殺人徑山杲云古人恁麼喚作洗脚上船愚菴盂云不是問津來渡口安能遊徧武陵春益州青城香林澄遠禪師青七雲門偃嗣僧問如何是室內一盌燈林曰三人證龜成鼈瑞巖慍云三人證龜成鼈一口各含一舌當機不辨來風喫水也須防噎老香林能捩挈真燈照世都吹滅喝一喝香林因僧問如何是衲衣下事林曰臘月火燒山雪竇顯云臘月火燒山萬種千般翹松鶴冷踏雪人寒達磨不會大難大難昭覺勤云舉一明三衲僧孔竅千差一轍本分鉗錘雖然如是道林則不然或有問如何是衲衣下事只對他道綿包特石鐵褁泥團天童華云香林恁麼道老鼠入牛角忽有問歸宗如何是衲衣下事只對他道來年更有新條在惱亂春風卒未休天童忞云應菴老祖恁麼道亦未免貪前失後若是山僧有問如何是衲衣下事但向他道一氣不言含有象萬靈何處謝無私古南門云香林冬行春令雪竇拆東補西若要理會衲衣下事各自摸取好靈巖儲云恁麼答話雖則及時及節未免移東補西若是東山則不然如何是衲衣下事向道動則風生且道香林底是東山底是若撿點得出東山性命在諸人手裏撿點不出諸人性命在東山手裏拋拄杖云負命者上鈎來天井新云雪竇拖泥帶水處截鐵斬釘昭覺截鐵斬釘處帶水拖泥諸人還知香林為人處麼狗啣枯骨走寶掌白云唱既高和亦峻還他二老若是衲衣下事正未夢見在甌峰承云者一隊漢將衲衣下事錯下註脚各好與三十拄杖獬云二尊宿向瑪瑙堦前垂手琉璃殿上經行若是衲衣下事白雲萬里韶州白雲子祥禪師青七雲門偃嗣問僧不壞假名而談實相你作麼生會僧指椅子曰者個是椅子祥以手撥椅曰與我將鞋袋來僧無對祥曰者虗頭漢雲門偃聞云須是他始得徑山杲云雲門扶強不扶弱怎奈憐兒不覺醜者僧當時若是個漢待他道將鞋袋來便與掀倒禪床直饒白雲牙如劍樹口似血盆也分疎不下天寧琦拈拄杖云者個是假名那個是實相者個是實相那個是假名一不是二不成路遠夜長休把火大家吹殺暗中行昭慶庭云公道無私民情得所既諳風憲那許替身然雖易辨來鋒怎奈難為去就良久云放過一著南㵎問云雲門憐兒不覺醜不知白雲當時失却一隻眼何故只有殺人刀且無活人劍鼎州德山緣密圓明禪師青七雲門偃嗣上堂及盡去也直得三世諸佛口掛壁上猶有一人呵呵大笑若識此人參學事畢投子青云藏盡楚天月猶存漢地星報恩秀舉投子語畢云車也去了藉甚油缸博山來云孤危不立更用相親法外無身猶欠哮吼鼻孔與眉毛從來不相識相識去舌頭原在口裏白巖符云山僧擬辭賢岫遠赴長安長揖矣烟霞雲鳥把臂乎車馬袍笏你若向者裏覰見一班要與他山相見有甚麼難德山上堂俱胝和尚凡有扣問只竪一指寒則普天普地寒熱則普天普地熱雪竇顯云什麼處見俱胝老莫錯認定盤星復云森羅萬象徹下孤危大地山河通天嶮絕什麼處得一指頭禪妙喜曰可謂是貴人多忘古南門云有利無利不離行市岳州巴陵新開顥鑑禪師青七雲門偃嗣僧問祖意教意是同是別陵曰雞寒上樹鴨寒下水五祖演云大小巴陵只道得一半白雲即不然掬水月在手弄花香滿衣又因僧問祖意教意是同是別答云人貧志短馬瘦毛長佛日晳云演祖文皺皺地也只道得一半隆安即不然祖意教意是同是別馬搭鞍驢拽磨巴陵示眾祖師道不是風動不是旛動既不是旛風向甚麼處著有人與祖師作主出來與巴陵相見雪竇顯云雪竇道風動旛動既是風旛向甚處著有人與巴陵作主亦出來與雪竇相見古南門云巴陵大似見角知牛雪竇亦乃因風吹火固能盡力提持要且未解與祖師作主古南也只因風吹火不是風動不是旛動大眾曹溪大師來也高著眼隨州雙泉師寬明教禪師青七雲門偃嗣遊山回首座領眾門接座曰和尚遊山嶮𡾟不易寬提起拄杖曰全得者個力座乃奪却拄杖寬放身便倒大眾皆進前扶起寬起以拄杖一時趂散回謂侍者曰向道全得者個力黃龍南云明教雖然會起會倒不覺弄巧成拙資福侶云一倒一起煞有規程然當時一眾竟不扶起非唯省却一頓拄杖且看此老如何起身復云險白巖符云首座見義勇為猶欠末著參隨持公力護妄惹冤情若夫明教者漢雖曰通身手眼予奪自在然未免被侍者笑破口唇皮襄州洞山守初禪師青七雲門偃嗣參雲門門問近離甚處山曰查渡門曰夏在甚處山曰湖南報慈門曰幾時離彼山曰八月二十五門曰放汝三頓棒山明日却上問訊曰昨蒙和尚放三頓棒不知過在甚麼處門曰飯袋子江西湖南便恁麼去山於言下大悟雪竇顯云雲門氣宇如王拶著便氷消瓦解當時若據令而行子孫也未到斷絕白雲端云大小雲門被洞山一問直得額頭汗出口裏膠生天童傑云雲門放去太奢收來太儉末後殷勤何不與他本分草料洞山恁麼悟去也是杓卜聽虗聲靈隱嶽云諸方盡謂父子投機啐同時殊不知雲門正令不行却向草窠裏輥致令洞山打失鼻孔至今無摸索處保寧茂云雲門探竿在手洞山抱贓領罪若當時雲門纔開口洞山好大展坐具三拜復歸客寮看他者漢何處著楔浮山云把定乾坤佛祖無進入之路放開江海魚龍得游泳之方雲門老人不妨奇特雪竇云雲門氣宇如王拶著便冰消瓦解識甚好惡當時若據令而行瞎却天下人眼瑞巖慍云雲門放洞山三頓棒汝諸人作麼生會諸人會處便道洞山慣曾作客少遇知音雲門食店雖開不許人喫所以雪竇抑雲門而出洞山浮山小雪竇而扶雲門與麼見解天地懸殊諸人要會麼年年八月二十五查渡依然冷浸秋天井新云山高水深雲行鳥飛在雲門則可在天井則不可何故家無滯貨不富靈巖儲云雪竇恁麼道為復是成褫雲門為復是成褫洞山若謂一點水墨兩處成龍錯過目前更道兩段不同收歸上科辜負先覺山僧今日不圖雪上加霜祇要諸人寒毛卓豎有麼有麼良久卓拄杖云飯袋子江西湖南便恁麼去愚菴盂云雲門到者裏也把不住使人上頭上面會見老胡一枝掃土而盡法忍謐云洞山若非末後殷勤墮在爛泥坑裏永拔不出又云只為末後殷勤墮在爛泥坑裏永拔不出獬云雲門放洞山三頓棒儉生不孝雪竇據令而行義出豐年要見洞山麼人居大國方知貴水到瀟湘一樣清洞山示眾五臺山上雲蒸飯佛殿階前狗尿天幡竿頭上煎䭔子三個胡孫夜簸錢道吾真別云老僧則不然三面狸奴脚踏月兩頭白牯手拏烟戴冠碧兔立庭栢脫殻烏龜飛上天且道誵訛在什麼處保福達云一等為虗空畵眉目洞山道吾較些子雲溪挺云上大人收拾起如何若何趙錢孫李洞山上堂言無展事語不投機承言者喪滯句者迷復云於此四句語中見得分明也作個脫灑衲僧根椽片瓦粥飯因緣堪與人天為善知識於此不明終成莽鹵愚菴盂云夜夢不祥題破在壁君子讀之化為大吉洞山因都諫太保問眼處入正受諸塵三昧起此意如何山曰洞山茶盌裏有太保太保茶盌裏有洞山太保無語却將此語問谷隱隱曰不落無言說又問延慶慶曰喚什麼作三昧幻寄稷云三老恁麼道忒殺廉纖若有問幻寄如何是眼處入正受諸塵三昧起但向伊道過愚菴盂云一個老婆禪一個新婦禪一個女兒禪總被太保折倒了也洞山因僧問如何是佛山曰麻三觔天寶樞云麻上生繩猶自可那堪繩上更生蛇喝一喝云一條來往長安路金粟元云向者裏會得見洞山則易見自己則難既見洞山為甚却不見自己乃竪拳云看看者個重多少松隱理云我不似洞山指東話西如何是佛你問阿誰他若眼目定動直向道古佛過去久矣蘄州北禪悟空寂禪師青七雲門偃嗣問僧甚處來曰黃州禪曰夏在什麼處曰資福禪曰福將何資曰兩重公案禪曰怎奈在北禪手裏何曰在手裏即收取禪便打僧不甘禪隨後趂出雪竇顯云奇怪宛有超師之作還知者僧麼只解貪前不能顧後若在雪竇手裏棒折也未放在保寧茂云北禪拋鈎者僧施釣一個半觔一個八兩且道優劣在者僧在北彈南堂欲云一不做二不休打人須是鐵拳頭金陵奉先深禪師青七雲門偃嗣同明和尚在眾時聞僧問法眼如何是色眼竪起拂子或曰雞冠花或曰貼肉汗衫二人特往請益問曰承聞和尚有三種色話是否眼曰是深曰子過新羅便歸眾李後主在座不肯白法眼曰寡人來日置茶筵請二僧重新問話明日後主備綵一箱劍一口謂二人曰今日請上座重新問話若問得是奉賞雜綵若問不是只賜一劍法眼陞座深出問今日奉勑問話師還許也無眼曰許深曰子過新羅捧綵便行大眾一時散去時法燈作維那乃聲鐘集眾僧堂前勘辯燈曰承聞上座久在雲門有什麼奇特因緣舉一兩則商量看深曰古人道白鷺下田千點雪黃鸝上樹一枝花維那作麼生商量燈擬議深乃打一坐具便歸眾佛日晢云法眼大人相法燈小丈夫深上座慣得其便雖然若到隆安門下總不許動著何故識法者懼雲溪挺云法燈縱饒掘得萬丈深坑將他一時埋却也是賊過後張弓況乎立馬成擒未免喪師辱國深公深公得利不可再往奉先同明和尚到淮河見人牽網有魚從網中透出深曰明兄俊哉一似個衲僧相似明曰雖然如此怎如當初不撞入網羅好深曰明兄你省悟在明至中夜方省徑山杲云明上座省得底且道是網羅裏底網羅外底愚菴盂云一度被蛇咬三年怕爛草西遯超云須知古人言不虗發且道如何是他欠悟處若向明公語下搜求直須打到棒折若儱侗道個惑亂一上打到棒折尚未放休除此二途還有知二公落處者麼乃呵呵大笑云入也入也東塔熹云深禪布彌天網子驗衲僧鼻孔惜明上座沒量大人被語脈轉却末後省去不無未免從他網子裏經過眉州黃龍贊禪師青七雲門偃嗣問僧近離甚處曰香林龍曰在彼多少時曰六年龍曰世尊在雪山六年證無上菩提汝在香林六年成得個甚麼僧無語龍曰移厨喫飯漢寶壽新云者僧據黃龍判斷分文不值仔細看來不無長處且道那裏是他長處只見波濤濶不覺洞庭深泉州招慶道匡禪師青七長慶稜嗣普請挑泥次中路按拄杖問僧上窟泥下窟泥曰上窟泥慶打一棒又問一僧上窟泥下窟泥曰下窟泥慶亦打一棒又問明招上窟泥下窟泥招放下泥擔叉手曰請和尚鑑慶便休徑山杲云招慶雖然休去怎奈明招不甘雲門當時若見他放下泥擔云請師鑑劈脊也與一棒看他如何折合天寧琦云國清才子貴家富小兒驕愚菴盂云上窟也打下窟也打放下泥擔便休去好不了事且道是賞伊是罰伊撿點不出也與你一拄杖福州報慈光雲禪師青七長慶稜嗣問僧近離甚處曰臥龍慈曰在彼多少時曰經冬過夏慈曰龍門無宿客為什麼在彼許多時曰獅子窟中無異獸慈曰汝試作獅子吼看曰若作獅子吼即無和尚慈曰念汝新到放汝三十棒雪竇顯云奇怪諸禪德若平展則兩不相傷據令則彼此俱險還撿點得出麼古南門云者僧且置忽若據令報慈合喫多少棒清化嶾云主善驗賓賓能看主可謂二俱作家雖然若是山僧者裏只管盡法不顧無民仁王教云一主一賓雖然好手未免互相鈍置雖然末上報慈道念汝新到放汝三十棒且道是賞是罰時有僧出教便打泉州太傅王延彬居士青七長慶稜嗣入招慶佛殿指鉢盂問殿主者個是什麼鉢主曰藥師鉢公曰只聞有降龍鉢主曰待有龍即降公曰忽遇拏雲浪來時作麼生主曰他亦不顧公曰話墮也雲門偃別殿主云他日生天莫辜負老僧玄沙備別殿主云盡你神力走向什麼處去保福展別云歸依佛法僧百丈恒別殿主作覆鉢勢溈山喆云殿主只知瞻前不知顧後太傅神威既逞殿主鉢盂猶覆大溈當時若見他道拏雲浪來時如何托起鉢盂道盡汝神力直饒八大龍王來也只得振威愬白巖符云忽遇拏雲浪來時作麼生以手指空云放爾為霖霄漢去復指鉢云莫教忘却此中來當時殿主下得者番手脚管取太傅屈膝有分太傅到招慶煎茶朗上座與明招把銚忽翻却茶銚公乃問茶罏下是什麼朗曰捧罏神公曰既是捧罏神為什麼翻却朗曰事官千日失在一朝公拂袖便出明招曰朗上座喫却招慶飯了却向外邊打野榸朗曰上座作麼生招曰非人得其便雪竇顯云當時但踏倒茶罏溈山云王太傅大似相如奪璧怒髮衝冠明招也是忍俊不禁難逢快便大溈若做朗上座當時見問既是捧罏神為什麼翻却但呵呵大笑何故見之不取千載難追灜山誾云王太傅如秤衡上星兒觔兩分明秤得天下衲僧也然簡點將來却被招慶明招捉敗且道捉敗在甚麼處寶掌白云太傅大似挑戰無功山僧若作朗上座待問茶罏下是什麼便與震威一喝管教者俗漢心平意降又云明招也是東家人死西家人助哀資福侶別云正現大人相益州淨眾歸信禪師青七青峰楚嗣僧問蓮花未出水時如何淨曰菡萏滿池流曰出水後如何淨曰葉落不知秋天童覺云李陵持漢節潘閬倒騎驢牛眠烱云淨眾與麼答話未免惹人情解山僧者裏則不然蓮花未出水時如何龍師火帝出水後如何鳥官人皇婺州明招德謙禪師青七羅山閑嗣問國泰古人道俱胝只念三行呪便得名超一切人作麼生與他拈却三行呪便得名超一切人泰竪起一指招曰不因今日怎識得者瓜洲客泐潭清云明招只識得瓜洲客且不識國泰直饒識得也未夢見俱胝老在明招違和國泰深和尚來問疾纔入招便曰阿㖿阿㖿深師叔救取老僧深曰和尚有什麼救處招舉頭一覰曰咦眼子烏律律地依前是個舊時深上座乃回身面壁更不相見徑山印云明招若不轉身面壁有甚面目見國泰一疾尚不奈何豈況出入生死愚菴盂代國泰高聲喚侍者拏湯來復云苦哉屈哉明招擁爐次僧問目前無法意在目前不是目前法非耳目之所到那句是賓那句是主招指火曰與我向此中拈出一莖眉毛得麼曰非但某甲盡大地人喪身失命招曰你因甚自把髻投衙徑山杲云者僧有頭無尾明招有尾無頭若人道得頭尾圓全句雲門與你拄杖子天寧琦云不解拈出火裏眉毛未知四句中那一句是賓那一句是主妙喜道者僧有頭無尾明招有尾無頭直饒妙喜道得頭尾圓全句天寧拄杖子未放伊在愚菴盂云前不遘村後不迭店且幸留得個火罏子靈巖儲云者僧於荊棘林裏出頭明招向火燄中垂手雖則予奪臨時撿點將來二俱不了當時若是靈巖見者僧恁麼問便與他劈頭一喝不唯使者僧即棘林而成寶所亦與從上漆桶增幾分光彩明招到招慶有度上座問羅山尋常道諸方盡是飯惟有羅山是白飯上座從羅山來遂展手曰白飯請些子招打兩掌度曰將謂是白飯元來只是飯招曰癡人棒打不死度至晚舉似諸禪客次招近前曰不審度曰今日便是者上座下兩掌有瑫上座曰不用下掌就裏許作麼生道招曰就裏許也道道瑫無對招曰是你諸人一時縛作一束倒卓向尿闥下來日相見珍重天童傑云尋常向諸人道終日在洪波浩渺中舀水相潑渾身無一點濕是他明招踏著者些子自然用出閒閒地惜乎鋒頭少銳引得許多葛藤若是華藏見他道將謂是白飯元來只是飯連腮更與兩掌且教者漢疑三十年明招上堂眾纔集便曰風頭稍硬不是汝安身立命處且歸暖室商量便歸方丈大眾隨後到方丈招曰纔到暖室便見瞌睡以拄杖一時打散薦福璨云風頭稍硬且歸暖室商量鈎頭有餌大眾隨後到方丈黃連隨根嚼未是苦纔到暖室即便瞌睡以拄杖一時打散可惜黃金如糞土復云明招先鋒有作殿後并吞可惜眾中無人當時若見道此處風頭稍硬且歸暖室商量便好一時散去教者老漢要歸方丈未可在鄂州黃龍誨機禪師青七玄泉彥嗣僧問禪以何為義機曰以謗為義雪堂行云三世諸佛是謗西天二十八祖是謗唐土六代祖師是謗天下老和尚是謗諸山是謗山僧是謗於中還有不謗者也無談玄說妙無沙數怎似雙峰謗得親天寧琦云若有人問南湖禪以何為義向他道以贊為義且道謗底是贊底是眼見則瞎耳聽則聾口說則啞心思則窮天際雪埋千丈石洞門凍折幾株松福州鼓山智嶽了宗禪師青七鼓山晏嗣初遊方至鄂州黃龍便問久嚮黃龍及乎到來祇見赤班蛇龍曰汝祇見赤班蛇且不識黃龍山曰如何是黃龍龍曰滔滔地山曰忽遇金翅鳥來又作麼生龍曰性命難存山曰恁麼則被他吞却去也龍曰謝闍黎供養山便禮拜灜山誾云今日撞著個買劍客三十文貨與一口白巖符云黃龍一等做處予奪得宜不媿為巖頭嫡孫然冷地裏不知不覺直為鼓山吞却還有人辨得出麼鼎州大龍智洪弘濟禪師青七白兆圓嗣僧問色身敗壞如何是堅固法身龍曰山花開似錦㵎水湛如藍徑山杲云若以此明堅固法身生身入地獄愚菴盂云試問大龍還曾夢見堅固法身麼廣教玉揮拂子云會麼昨日是三十今朝乃初一展事投機知不知野老愛閒烟樹立無限輪椎劈不開古今空射轅門戟擬不擬如山屹三更半夜過牢關忠言不避風前泣福州報慈院文欽禪師青七保福展嗣僧問如何是妙覺明心慈曰今冬好晚稻出自秋雨成灜山誾云知時識節須是報慈若論妙覺明心未夢見在且畢竟作麼生是妙覺明心喝一喝漳州地藏桂琛禪師青七玄沙備嗣問僧甚處來曰南州藏曰彼中佛法如何曰商量浩浩地藏曰怎如我者裏栽田博飯喫曰怎奈三界何藏曰喚什麼作三界溈山云清貧長樂濁富多憂報恩秀於怎如我者裏栽田博飯喫下云當時便好道恁麼則非但南州也博山來云者僧羈縻三界帶累他南州禪客俗氣不除如今還有與地藏相見者麼更須拋却犁耙鋤頭始得大慈言云大小地藏道個栽田博飯不妨令人疑著無端末上道你喚什麼作三界却似龍頭蛇尾仁王教云地藏家風無媿古佛真個千載一遇乃為者僧一拶直得七零八落地藏問僧甚處來曰秦州藏曰將得什麼物來曰不將得物來藏曰你為什麼對眾謾語其僧無對藏却問秦州豈不是出鸚鵡曰鸚鵡出在隴西藏曰也不較多溈山云者僧親從秦州來為什麼道對眾謾語要會麼作客不殷勤帶累主人拖泥涉水福州安國慧球禪師青七玄沙備嗣上堂我此間粥飯因緣為兄弟舉唱終是不常欲得省要却是山川大地與汝發明其道既常亦能究竟若從文殊門入者一切無情土木瓦礫助汝發機若從觀音門入者一切音響瑕蟇蚯蚓助汝發機若從普賢門入者不動步而到以此三門方便示汝如將一隻折箸攪大海水令彼魚龍知水為命會麼若無智眼而審諦之任汝百般巧妙不為究竟瑯琊覺云雖是善因而招惡果薦福行云若據山僧撿點安國自己性命亦未知落處在者裏一隻折箸也不消得莫有虎口奪食者麼若無山僧不免向灸瘢上更下一燋去也拍禪床下座東禪觀云安國一時嚼飯餵嬰兒不知旁觀惡心福州大章山契如菴主青七玄沙備嗣僧問生死到來如何回避章曰符到奉行曰恁麼則被生死拘將去也章曰阿㖿㖿灜山誾云者老漢恁麼放憨直得閻家拱手雖然更須勘道始得
