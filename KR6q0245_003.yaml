body:
  text: 古杭白巖嗣祖沙門淨符彚集應化聖賢西天文殊菩薩一日令善財採藥曰是藥者採將來善財徧觀大地無不是藥却來白云無有不是藥者殊曰是藥者採將來善財遂於地上拈一莖草度與文殊殊接得示眾曰此藥亦能殺人亦能活人五祖戒出善財語云慙媿首山念云文殊大以掩耳偷鈴瑯瑘覺云文殊可謂誠實之言要且額頭汗出口裏膠生溈山喆云解用不須霜刃劒延齡何必九還丹天童華云大小文殊被善財換却眼睛烏石道云盡道善財能採不能用文殊能用不能採殊不知者兩個漢天共白雲曉水和明月流象田現豎如意云象田者一莖草亦能殺人亦能活人脫或遇著個四大忘我百骸調適的到來且道殺即是活即是乃放下如意云文殊祇欠者一著崇先奇云大小文殊善財互相熱瞞不顧旁觀者哂文殊因菴提遮女問明知生是不生之理為甚麼却被生死之所流轉殊曰其力未充羅漢機云有者道與麼答話替菴提遮女添上一重枷鏁與麼見解夢見文殊也未又有道文殊稱大智被語言轉親言出親口殊不知七佛之師等閒出一語如金剛王寶劍你纔擬議早是血濺梵天了也雖然今日却被機上座捉敗還有知他下落者麼請別出一隻手善財童子參德雲比丘於妙高峰頂四維上下徧觀求覓不可得經七日後乃見比丘於別峰徐步經行始得相見鳳日玥云徧觀求覓竟不可見有般漢道無見是真見又有道法身無相更要見個甚麼恁麼解會三生六十劫也未夢見衲僧汗臭氣在然則畢竟意旨如何以拂子擊案一下云是處是慈氏無門無善財無邊身菩薩將竹杖量世尊頂丈六了又丈六量到梵天不見其頂乃擿下竹杖合掌說偈曰虗空無有邊佛功德亦然若有能量者窮劫不可盡白巖符云無見頂相莫說一無邊身設使百千萬億無邊身盡其神力窮未來劫亦量不盡雖然乃抬眸云白巖者裏不消一維摩居士示疾毗耶離城因三十二菩薩問疾各說不二法門至文殊曰我於一切法無言無說無示無識離諸問答是為菩薩入不二法門於是文殊却問維摩曰我等各自說已云何是仁者所說不二法門維摩默然文殊讚曰乃至無有語言文字是菩薩真入不二法門保福展云維摩一默未出化門又云大小維摩被文殊一坐直至如今起不得報恩秀云要起有甚麼難便掌雪竇顯但舉文殊語畢云維摩道甚麼良久云勘破了也瑯瑘覺云文殊與麼讚善也是杓卜聽虗聲維摩默然汝等諸人不得鑽龜打瓦大溈智徵云不二法門是默然不是默然若是默然文殊則為剩語不是默然維摩一場虗設畢竟如何具眼者辨昭覺勤云者一轉語叢林話會不少有道默然有道良久有道據坐有道不對要且摸索不著直得其聲如雷普震羣動自古及今前聖後聖所說法門只向維摩片時之間一時顯現且道正當恁麼時作個甚麼苟當始得與維摩相見天寶樞云盡大地人性命被者維摩橫拖倒拽天寶即不然如何是不二法門劈脊便棒報恩秀云橫身為眾不免禍出私門那堪文殊點破已露瑕玼直饒天童道現居俗塵而無俗氣也是掩鼻偷香博山來云明修棧道暗度陳倉若以語默商量何異鉢盂安足二大士雖則傳脂付粉水洩不通以不二法門較之尚晚在磬山修云諸方商量都只在語默上摸索有甚交涉你若向眾菩薩未啟口處識得根源方知說的即是默的默的即是說的眾菩薩未甞說一字老維摩其聲如雷還會麼龍象蹴蹋非驢所堪瀛山誾云維摩不二法門文殊盡其神力捶擊不開爭奈保福猶嫌未出化門為甚如此大抵祖關無嶮易由來玄路有高低鳳日玥云金粟如來被者多口阿師一靠靠倒至今起不得當時若是山僧見道如何是仁者所說不二法門便與劈頭一棒七佛之師到者裏也只得退身三步亦且免後人向默然處躲跟清化嶾云文殊揚聲止響維摩平地喫交二俱好笑若論不二法門更須喫棒始得白巖符云文殊維摩各見一邊未免互相鈍置要顯不二法門三生六十劫時有僧問畢竟如何是不二法門符曰山僧今日牙痛不能為汝說得且待明日來崇先奇云文殊維摩互相熱瞞帶累三十二菩薩口挂壁上若是不二法門俱未夢見普明燁云維摩洗脚抱橋文殊葛藤徧地總是落二落三與不二法門絕無交涉諸禪德且道如何是不二法門逢人切莫錯舉天目灝云潦倒維摩若不得文殊幾乎病殺維摩因須菩提持鉢至乃滿盛香飯謂之曰汝能於食等於法亦等汝能謗於佛毀於法不入眾數亦不得滅度其施汝者不名福田供養汝者墮三惡道汝能如是乃可取食須菩提茫然不知所答置欲走道場辯云當時若有個倒拈蝎尾逆捋虎鬚擺手出荊棘林底漢纔見他恁麼道但云賢賢易色事父母能竭其力事君能致其身與朋友交言而有信直饒淨名老人也須倒退三千里天童忞云道場雖善就下平高裁長補短怎奈出爾反爾一似鞏縣茶瓶不如當時輕輕向道將謂汝是個俗漢管取淨名一坐不起香飯滿鉢持歸寶峰清云義出豐年還他維摩居士其奈須菩提貪觀天上失却手橈致令食到口邊被人奪却今日眾中莫有與須菩提出氣者麼請下一轉語看廣胤標云揜馳說之口奪紛爭之辨莫之敢逆者貴乎明斷尊者當時何不取一摶食待伊云云直下塞却渠口免得者漢向葛藤窩裏著倒雖然於今看來亦似冷地輸他先一著分明笑倒老空生殃崛摩羅尊者因持鉢至一長者門正值其家婦人產難長者曰瞿曇弟子汝為至聖當有何法能免產難殃崛曰我乍入道未知此法待我回問世尊却來相報及返具事白佛佛告殃崛汝速去報言我從賢聖劫來未曾殺生殃崛奉佛語疾往告之其婦得聞當時分娩天童忞云世尊移花兼蜨贈殃崛擔泉帶月歸產婦雲在嶺頭閒不徹長者水流㵎底太忙生案內有犯四人一一為諸人依律發放了也且道生下的孩兒作麼生理論分付沒眼村翁一任鑽龜打瓦通玄奇云長者此問險事罕聞殃崛不知辭勞不得瞿曇與麼道未必靈驗婦聞免難賺殺幾多人百丈泐云長者弄巧成拙世尊相席打令殃崛刺腦入膠盆盡道女子當時得免產難誰知至今母子尚未分娩莫有救得者麼眾無語乃拈棒一齊趁出檀度依云世尊因風吹火尊者曲順人情其婦得產多少人到者裏分疎不下噫物類之起必有所始榮辱之來必象其德所由來尚矣廣教玉云殃崛持鉢到長者門掬水月在手弄花香滿衣適值其家婦人產難險瞿曇弟子汝為至聖當有何法能免產難事因叮囑起我乍入道未知此法待我回問世尊却來相報切忌話墮及返具事白佛大似詐明頭汝速去報言我從賢聖劫來未曾殺生面赤不如語直殃崛持佛語疾往告之不妨軟頑其婦得聞當時分娩且信一半者則公案諸方盡在背後引領顢頇一生廣教今日將古人肝膈盡情揭露了也然尚有一處誵訛未經點出且道是那一處送語傳言只大都上他機境便塗糊同時繡出鴛鴦譜信彩拈來是也無天親菩薩從彌勒內院而下無著問經稱人間四百年彼天為一晝夜彌勒於一時中成就五百億天子證無生法忍未審說什麼法天親曰祇說者個法薦福懷云彌勒已是錯說天親已是錯傳山僧今日將錯就錯與你諸人註破良久云諦聽諦聽又良久云向下文長付在來日雲門澄云天親者漢錯下名言若是彌勒說底法直得摩竭提國更須掩室毗耶離城猶當杜口為甚麼聻不見道萬籟有心聞不得孤崖無耳謾知音靈巖儲云將錯就錯則不無薦福若是者個法元字脚也不曾動著更說什麼向下文長乃豎拄杖云看看木上座將百億四天下百億須彌山百億香水海百億器世界中間所有日月星辰森羅萬象菩薩聲聞人天修羅地獄畜生有情無情四足多足總鎔作一卷無畏普光明經為汝諸人晝夜說熾然說無間歇眾中還有證無生法忍者麼有則出來喫棒崇先奇云彌勒也不錯說天親也不錯傳臯亭今日與你重舉只是不得錯會良久云止止不須說我法妙難思舍利弗尊者問須菩提夢中說六波羅密與覺時是同是異提曰此義深遠吾不能說會中有彌勒大士汝往彼問舍利弗乃問彌勒彌勒曰誰名彌勒誰是彌勒雪竇顯云當時若不放過隨後與一拶誰名彌勒誰是彌勒者便見冰消瓦解昭覺勤云夢中說六波羅密與覺時是同是異低聲低聲此義幽深吾不能說爛泥裏有刺會中有彌勒大士可往問之推過別人又爭得舍利弗問彌勒將錯就錯誰名彌勒誰是彌勒者面皮厚三寸古南門云五更侵早起更有夜行人龍華體云弁山有九十棒要打者三個漢舍利弗不合向青天白日寐語須菩提不合推過別人雪竇不合停囚長智或有個旁不甘底出來道和尚棒教誰喫也許伊具一隻眼舍利弗因入城遙見月上女出城舍利弗心中思惟此姊見佛不知曾得忍否近前便問什麼處去女曰如舍利弗與麼去弗曰我纔入城爾當出城云何言如我與麼去女曰諸佛弟子當依何住弗曰諸佛弟子依大涅槃而住女曰諸佛弟子既依大涅槃而住而我亦如舍利弗與麼去溈山云一人入城一人出城何言如舍利弗與麼去若人知得此二人去處十二時中動轉施為無非住諸佛大涅槃若也未知業識茫茫無本可據東禪觀云舍利弗依大涅槃而住坐在解脫深坑月上女如舍利弗與麼去也是隨邪逐惡昭覺勤云住無所住行無所行見無所見用無所用各人脚跟下廓同太虗如十日並照觸處光輝苟知恁麼則與月上女同證無生得不退轉隨去來住無不皆在大解脫中三世諸佛鼻孔一時穿却說什麼如舍利弗與麼去報恩琇云月上女見也見得到說也說得好然檢點將來尤欠丈夫之作纔見問什麼處去便與劈面一掌直教他兩眼流星安敢正視城東有一老姥與佛同生不欲見佛每見佛來即便𢌞避雖然如此回顧東西總皆是佛遂以手掩面於十指掌中亦總是佛雪竇顯云諸上座他雖是個老婆宛有丈夫之作既知𢌞避稍難不免吞聲忍氣如今不欲見佛即許你切忌以手掩面何故明眼底覰著將謂雪竇門下教你學老婆禪福嚴容云老姥不欲見佛天然氣槩東西總皆是佛氣槩天然於此見得老姥即佛佛即老姥不然則有寒暑兮促君壽有鬼神兮妬君福黃檗琦云不欲見佛風平浪靜總皆是佛水漲船高瞿曇節文則且置且道老姥風騷在什麼處若不同牀睡焉知被底穿清化嶾云雪竇失却一隻眼殊不知者老婆猶帶脂粉氣在見個黃面老子即便𢌞避若見山河大地草木叢林又向什麼處𢌞避還有為雪竇出氣者麼出來試道看崇先奇云城東老姥其知可及其愚不可及既知無處𢌞避何故以手掩面婦女態度一時露出即今還有不欲見佛者麼漏澤杲云有底道幸自可憐生苦苦相逼他作甚麼有底道人人自己是佛更向何處𢌞避似則似是則未是山僧黨理不黨親敢道釋迦老子被城東覰破何也掀翻海嶽求知己撥轉乾坤見太平安國聰云婆子眼空四海旁若無人宛有丈夫氣槩是則固是將手掩面不欲見佛殊不知此處無銀三十兩文峰玉云婆子忒殺逞俊殊不知也是日下逃影廣額屠兒於涅槃會上放下屠刀便曰我是賢劫千佛一數東山覺云今時叢林將為廣額是過去一佛權現屠兒且喜沒交涉又謂廣額是殺人不眨眼底漢颺下屠刀立便成佛且喜沒交涉又謂廣額放下屠刀曰我是千佛一數者一佛多少分明且喜沒交涉要識廣額麼夾路桃花風雨後馬蹄何處避殘紅城山洽云者屠兒都謂有大人之作檢點將來也是瞎驢趁隊何故不見道丈夫自有冲天志豈向他人行處行波羅提尊者示異見王曰在胎為身處世為人在眼曰見在耳曰聞在鼻辨香在舌談論在手執捉在足運奔徧現俱該法界收拾在一微塵識者知是佛性不識喚作精魂王聞感悟徑山杲云即今問諸人畢竟那個是佛性那個是精魂天寧琦云書頭教娘勤作息書尾教娘莫瞌睡還識娘面嘴麼玉容寂寞淚欄杆梨花一枝春帶雨松隱然云諸方盡道異見王聞法開悟殊不知波羅提尊者被王一拶直得技窮力盡進退無門妙喜盡平生力也救他不得龍峰今日路見不平出一隻手去也乃喝一喝云適來異見王波羅提妙喜盡向者裏掃蹤滅跡了也更說甚麼佛性精魂作用見聞盡是陽𦦨空花不勞把捉且歸家穩坐一句作麼生道太平天子朝元日五色雲車駕六龍瀛山誾云當時喚作佛性尊者面皮已厚三尺更說八處作用教壞人家男女不少雖然如是比他一等弄精魂手脚猶較些子能仁鑑云便與麼會喚作依通己眼未開無自由分直須竿頭進步絕後再甦始得一為無量無量為一小中現大大中現小雖然還識祖師麼為憐三歲子不惜兩莖眉洞山瑩拈拂子拂一拂云者個是佛性將什麼喚作精魂又拂一拂云者個是精魂將什麼喚作佛性復連拂兩拂云癡人面前不得說夢便擿下拂子大覺昇云大小尊者只識得精魂佛性未夢見在今日有問佛性在什麼處向道趙錢孫李周吳鄭王龍華體云且道精魂與佛性相去多少點石化為金玉易勸人除却是非難勝思惟梵天謂不退轉天子曰天子我常於此佛國土不曾見汝天子曰梵天我亦不曾於此國土不曾見我天童悟云者兩個漢各自分疆立界各各不相見各各自稱尊殊不顧旁觀者醜大愚鵬云不曾見汝不曾見我一對無孔鐵錘難為勘破我當時若見各與他二十拄杖障蔽魔王領諸眷屬一千年隨金剛齊菩薩覓起處不得忽一日得見乃問曰汝依何而住我一千年覓汝起處不得齊曰我不依有住而住不依無住而住如是而住法眼益云障蔽魔王不見金剛齊即且從只如金剛齊還見障蔽魔王麼徑山杲云既覓起處不得一千年隨從的是什麼我不依有住而住不依無住而住如是而住互相熱瞞法眼道障蔽魔王不見金剛齊即且從只如金剛齊還見障蔽魔王麼恁麼批判也是看孔著楔只今莫有知妙喜起處底麼乃喝一喝云寐語作麼天寧琦云金剛齊道我不依有住而住不依無住而住一時被障蔽魔王捉敗了也雖然也須扶起金剛齊始得雲門信云金剛齊太殺漏逗既不依有無而住怎麼又被魔王覰見資福侶徵云一千年覓起處不得為甚麼忽一日得見莫是金剛齊滲漏麼莫是魔王眼花麼咄須菩提尊者因說法次帝釋雨花乃問此花從天得耶曰弗也從人得耶曰弗也畢竟從何而得帝釋乃舉手尊者曰如是如是雲門偃云帝釋舉手處與你四大五蘊釋迦老子是同是別天寧琦云澤廣藏山理能伏豹放過須菩提尊者尋常將什麼說法也好與一拶天寧慧云帝釋舉手尊者如是彼此都來熱瞞到天寧者裏各與他二十拄杖雲門澄云帝釋舉手尊者如是未免互相瞞熱祖師門下無如是事我若作尊者待伊舉手便與熱喝要使帝釋天別有生涯白巖符云大小尊者乞兒見小利我則不然當時見帝釋舉手便一直向他道不是不是須菩提巖中宴坐諸天雨花讚歎尊者問空中雨花讚歎復是何人云何讚歎曰我是梵天敬重尊者善說般若尊者曰我於般若未曾說一字汝云何讚歎曰如是尊者無說我乃無聞無說無聞是真說般若雪竇顯云避喧求靜處世未有其方他在巖中宴座也被者一隊漢塗汙更有者老漢把不住問空中雨花讚歎復是何人早見敗闕了也我重尊者善說般若惡水驀頭潑又云我於般若未甞說一字草裏走尊者無說我乃無聞識甚好惡總似者般底漢何處有今日復召云大眾雪竇幸是無事你來者裏覓個甚麼盌以拄杖一時趁散磬山修舉雪竇話畢云明覺老漢似個築漏洞底一般空生梵天底不妨築著自家底漏洞還曾築著也無薦福如云大小空生不善宴座惹得一隊漢撒沙撒土當面塗汙一上如來弟子解空何在當時但兀坐不釆梵天縱有惡水管教無處澆潑龍華宗云須菩提老老大大開眼著賊也不知賓頭盧尊者因阿育王內宮齋三萬大阿羅漢躳自行香見第一座虗位王問其故海意尊者曰此是賓頭盧位此人近見佛來須臾當至言訖賓頭盧從空而下王修敬已便問承聞尊者親見佛來是否尊者以手筞起眉毛良久曰會麼王曰不會尊者曰阿耨達池龍王曾請佛齋吾是時亦預其數大溈喆云阿育王飯三萬阿羅漢要且不識賓頭盧當時待他筞起眉毛便與作禮非唯識得尊者亦乃同參古佛汾陽昭代王云却勞尊者雲居元代王當時驀面便唾虎丘隆云尊者得大機顯大用不枉親見佛來雖然賴得育王放過若不放過打失眉毛也白巖符云大小尊者瞞阿育王即得若是別人則禍事當時待道阿耨達池龍王曾請佛齋吾是時亦預其數便好喚內侍撤去首席看尊者作何去就青龍操云二尊者若不是育王並須出國樟山量云操衲僧柄偃閫外韜在賓頭盧尊者得之矣阿育王當時可惜放過若不放過待䇿起眉毛便好云與麼則合在第二位自却據第一位看者老漢又當作何面孔友可玄云阿育王只解放行不解把住者裏則不然待道阿耨達池龍王請佛齋吾是時亦預其數却喚內侍尊者遠降辛苦再點一碗茶來贒峰竟云尊者於三萬大阿羅漢中作第一座則固是若論親見佛來則未可何故對大王前不合指東話西
