body:
  text: 古杭白巖嗣祖沙門淨符彚集青四潭州漸源仲興禪師青四道吾智嗣侍道吾至檀越家弔慰源拊棺問生耶死耶吾曰生也不道死也不道曰為什麼不道吾曰不道不道回至中路源曰和尚今日須與某甲道若不道打和尚去也吾曰打即任打道即不道源便打歸院吾令去後有省值吾化去乃造石霜舉此話請益霜曰不見道生也不道死也不道源大悟雲居元云石霜矢上加尖喚醒千個漸源也無用處當初待伊舉了痛棒打出非唯作天下宗師亦乃為道吾雪屈五祖演云白雲今日憤氣不平須要斷這公案道吾第一不解為身作主第二不能隨機入俗當時待伊問生耶死耶但向道等歸院裏向你道若著得此語伶俐漢一踏踏著大小道吾和尚也免一頓拳頭昭覺勤云道吾橫身為物指出生死根源漸源親到寶山當面蹉過若不是金剛正性夙植根深爭得向平田淺草驀地回光見得道吾著力相為處且作麼生是道吾著力相為處試道看徑山杲云生也不道死也不道兩重公案一狀領到露刃吹毛截斷綱要脫却鶻臭衫拈却炙脂帽大坐當軒氣浩浩喝一喝天寧琦云生耶死耶動念即乖不道不道何處尋討拽脫鼻孔打破髑髏腰纏十萬貫騎鶴上揚州有意氣時添意氣不風流處也風流妙雲雄云道吾入水求人叵耐杖頭太短致侍者重重蹉過者裏若有問生耶死耶驀喚云闍黎待應諾却問云生耶死耶他擬開口便與劈面掌要使伊當下知恩漸源因寶蓋約姪來訪源乃捲簾在方丈內坐蓋一見乃下却簾便歸客位源令侍者傳語曰長老遠涉不易猶隔津在蓋遂擒住侍者與一掌者曰有堂頭和尚在莫打某甲蓋曰為有堂頭老漢所以打你者回舉似源源曰猶隔津在昭覺勤云老漢一舒一卷賓主歷然隔津通津彼此相照侍者親蒙賜掌恩大難酬寶蓋到處垂慈費盡腕頭氣力天童覺云灼然猶隔津在然則各各彼彼自是一家且作麼生得同生同死共命連枝去暗裏抽橫骨明中坐舌頭鼓山賢云漸源見寶蓋寶蓋未見漸源寶壽新云既謂賓主合歡因甚各立疆界莫有奇特處麼拍手一下云相逢不下馬各自奔前程漸源一日持鍬到石霜於法堂上從東過西從西過東霜曰作麼源曰覓先師靈骨霜曰洪波浩渺白浪滔天覓甚先師靈骨曰正好著力霜曰者裏針劄不入著什麼力源持鍬肩上便出太原孚別源云先師靈骨猶在明招謙云莫道作麼別下得什麼語代云鸕語鶴又代漸源便擲却鍬子云淺水無魚青龍斯云二老可謂同條共貫收放臨時仔細看來猶未勦絶要得勦絶麼先師靈骨謾勞尋溢目煙光亘古今堪笑持鍬徒著力何如撫掌共披襟漸源在帳內坐有僧來撥開帳曰不審源以目視之良久曰會麼曰不會源曰七佛已前事為甚麼不會僧舉似石霜霜曰如人解射箭不虗發東林總云漸源道七佛已前事則且從未審石霜喚什麼作箭良久云漸源頭白石霜頭黑七佛已前曾漏泄既漏泄掩不得南海波斯生白澤鼓山永云漸源夢中説夢石霜接響承虗要且二俱不了淥清和尚青四道吾智嗣因僧問不落道吾機請師道清曰庭前紅莧樹生葉不生華僧良久清曰會麼曰不會清曰正是道吾機為什麼不會僧禮拜清便打曰須是老僧打你始得昭覺勤云來源既正只貴轉身者僧眼既𥉌𭿇淥清遂因風放火當時若是個漢待他道庭前紅莧樹生葉不生華便與掀倒禪牀直饒道吾親來也須與他平展還委悉麼棋逢敵手難藏幸詩到重吟始見工鼎州德山宣鑑禪師青四龍潭信嗣示衆今夜不答話問話者三十棒時有僧出禮拜山便打僧曰某甲話也未問因甚麼便打山曰你是甚處人曰新羅人山曰未跨船舷好與三十棒法眼益云大小德山話作兩橛報慈遂云叢林中喚作隔下語且從祇如德山道問話者三十棒意作麼生德山密云大小德山龍頭蛇尾雪竇顯云此二老宿雖善裁長補短舍重從輕要見德山老漢亦未可在何故殊不知德山握閫外威權有當斷不斷不招其亂底劒諸人還識新羅僧麼只是個撞著露柱的瞎漢琅瑘覺云德山何似履春氷雖然如是如貓弄鼠溈山哲云德山大似清平世界鋥甲磨鎗者僧不惜性命身挨白刃法眼道話作兩橛大似藥病相治圓明道龍頭蛇尾也是金鍮不辨雪竇道撞著露柱底瞎漢截斷衆流如今還有人為新羅僧作主麼出來與大溈相見乃豎拂云去去西天路迢迢十萬餘翠巖芝云時人盡道德山作家用得好若與麼會還曾夢見麼山僧道德山被者僧一推直得瓦解氷消黃龍清云雖則雪竇高提祖印坐斷寰區只解瞻前不能顧後者僧堂堂出來什麼處是撞著露柱處還有人辨得麼若也辨得不唯與新羅僧雪屈亦見當人眼目分明若辨不得非唯新羅僧撞著露柱盡大地衲僧個個出來撞著露柱南堂靜云德山老人寂寂惺惺法眼圓明精精靈靈六韜三略武緯文經新羅衲子有丙無丁丹霞淳云諸方盡道者僧才出德山便打末後却道未跨船舷好與三十棒是話作兩橛處龍頭蛇尾處若與麼會大似盲人摸象非惟不曾夢見德山自己亦乃未有參學眼在何故殊不知德山韜略雙全文武兼備放開則大野風行把住則碧天星落然則貪扶正宗步步登高仔細觀來一向只顧他非不能自省己過者僧當時若是個作家直饒德山通身手眼也須放下拄杖子豈不見道大丈夫捋虎鬚未為分外者僧既無奪驪龍珠的手段致使德山令行一半如今衆中莫有為新羅僧雪屈者麼便請掀倒禪牀喝散大衆丹霞者裏不學德山倚勢欺人却分半院與伊住為甚如此深嗟季運一將難求若無實説異獸藏頭角靈禽惜羽毛昭覺勤云德山大似金輪聖主寰中獨據四方八表無不順從等間布一勑施一令直得風行草偃若不是者僧爭見殺活擒縱威權自在法眼圓明雪竇雖則直截單提各能扶樹德山要且只扶得末後句未扶得最初句且作麼生是德山最初句大鵬一展摩霄翅誰顧奔騰六合雲護國元云忒煞倚勢欺人山僧見處也要諸人共知者僧當時若是個漢待他道你是甚處人便與掀倒禪牀撩起便行直饒德山牙如劒樹口似血盆也須倒退三千里何故識法者懼淨慈一云者僧以赤肉挨他白刃也不易抵當當時若是個漢才見道今夜不答話問話者三十棒便好震聲一喝奪德山棒到行正令去直饒德山全機也須退後三千里薦福璨云大小德山可惜龍頭蛇尾却引者僧向草窠裏頭出頭沒當時待他道某甲話也未問因甚打某甲腳跟下痛與三十何故為人須為徹浮山云德山門下草偃風行其奈法眼圓明猶不放過雪竇雖則縱奪可觀抑揚有準要見二老宿亦未可拈拄杖畫一畫云到江吳地盡隔岸越山多瑞巖慍云德山以強凌弱者僧有理難伸法眼圓明固是見義勇為怎奈死而不弔浮山云雪竇雖則縱奪可觀抑揚有準要見二老宿亦未可圖他一粒米失却半年糧南堂欲云總謂德山勾賊破家者僧把髻投衙法眼圓明據欵結案雪竇扶強抑弱逐惡隨邪如斯理論要契他古人直是白雲萬里當時者僧見道今夜不答話珍重便行非唯坐斷德山亦且光揚宗眼雲居莊云諸方老宿只能扶強不能扶弱徑山今夜要斷不平牙如劒樹口似磉盆還他德山老漢若是辨衲僧眼猶欠悟在者僧當時才出直云某甲今夜不問話只與和尚相見他若行棒便與接住一推非唯坐斷德山且免雪竇檢罰豈不是個俊快衲僧拈拄杖卓一卓云鶴有九皋難翥翼馬無千里謾追風松隱然云且道者僧合喫棒不合喫棒若道合喫棒者僧過在甚麼處若道不合喫棒怎奈德山令不虗行要會麼良久云不是李將軍徒勞射石虎大巍倫云我若作新羅僧見德山才開口呵呵大笑便出福嚴容云德山埋兵挑鬬要作家者僧只知貪程不覺錯路若是山僧見道今夜不答話問話者三十棒便對云和尚今夜不著便他若動靜但云夜深請和尚尊重開先金云德山懸羊賣狗雪竇欺胡罔漢不因法眼圓明怎得從公判斷開先挈領振綱也只救取一半敢問諸人因甚不與全救分付無眼村翁打鼓普請自看崆洞慈云德山雖別肘後符懸縱橫自在要且陳腳不穩者僧雖然奮勇當前危亡不顧惜無先見之機何故當時待道今夜不答話便與掀倒禪牀德山縱有通天作用管教氷消瓦解棲霞成云從上古德各出手眼雖則互有所長要且斷者話不倒不知德山布箇萬里長陳擬窺天下英奇無端走出個驢前馬後漢來德山為之氣索未跨船舷好與三十棒亦不得已豈德山心之所欲哉大慈璸云一往看來者僧大似個孟八郎漢不識利害猛虎腮邊捋鬚不幾喪身失命殊不知德山老漢被者僧暗地裏把條斷貫索穿却鼻孔了也諸人還委悉麼山僧不是扶弱鋤強也要指諸人個入處卓拄杖云月黑霜濃毛骨冷鶴翅千尺一聲鴉喝一喝東塔熹云德山干將在握殺活自由怎奈一席兩令未見好手若是長溪見者僧出禮拜便歸方丈不惟使者僧結舌有分且免得彼此遞相鈍置廣胤標云德山尋常一條脊梁骨硬似鐵拗不折及乎遇著者僧盡平生氣力都使不去未審者僧有甚長處不見道放過一著縛手縛腳德山到溈山挾復子上法堂從西過東從東過西顧視方丈曰有麼有麼溈坐次殊不顧盻山曰無無便出至門首乃曰雖然也不得草草遂具威儀再入相見才跨門提起坐具曰和尚溈擬取拂子山便喝拂袖而出溈至晚問首座今日新到在否座曰當時背却法堂著草鞋去也溈曰此子已後向孤峰頂上盤結草菴呵佛罵祖去在雪竇顯於無無便出及拂袖而出兩處皆著語云勘破了也又於呵佛罵祖去在處著語云雪上加霜五祖戒云德山大似作賊人心虗溈山也是賊過後張弓昭覺勤云雪竇兩處俱道勘破且道是勘破德山勘破溈山徑山杲云二尊宿恁麼相見每人失却一隻眼城山洽云二尊宿一出一入各各胸藏韜略力舉千鈞多少鹵莽的盡謂溈山不及德山有甚麼交涉祇如溈山道此子已後向孤峰頂上盤結草菴呵佛罵祖去在是何意旨澤廣藏山理能伏豹德山因一僧相看乃近前作相撲勢山曰與麼無禮合喫山僧手裏棒僧拂袖便行山曰饒你如是也只得一半僧轉身便喝山打曰須是我打你始得曰諸方有明眼人在山曰天然有眼僧擘開眼曰貓便出山曰黃河三千年一度清天童華云者僧是透關底漢若非德山本分鉗錘幾乎死在句下只如德山道黃河三千年一度清又作麼生嶺梅殘雪裏雲鬢未梳時龍池微云者僧雖久經行陳到德山面前未免納誠降欵德山只欲坐致太平被者僧鎗旗一展直得伎倆俱露總未免旁觀者哂且道誰是旁觀者若也識得龍池與伊三十拄杖報恩琇云咸謂德山舉鼎山氣吞寰宇誰知揖讓升降折旋中禮有如此夫語云臨事而懼好謀而成德山其謂歟德山凡見僧入門便棒臨濟凡見僧入門便喝龍泉濌云閉門打睡接上上機須還他過量丈夫始得若夫二老漢與麼做處未免旁觀者哂何故聻黃金自有黃金價何必和沙賣與人德山上堂我先祖見處即不然者裏無佛無祖達磨是老臊胡釋迦是乾屎橛文殊普賢是擔屎漢等覺妙覺是破執凡夫菩提涅槃是繫驢橛十二分教是鬼神簿拭瘡疣紙四果三賢初心十地是守古冢鬼自救不了雲門偃云讚佛讚祖須是德山老人始得琅瑘覺云諸方若與麼會入地獄如箭射只如雲門與麼道也須入地獄如箭射德山因臨濟侍立次山曰今日困濟曰者老漢寐語作麼山便打濟便掀倒禪牀山休去雪竇顯云二員作者具啐同時眼有啐同時用雪竇擬向飢鷹爪下奪肉猛虎口裏爭餐敢謂德山臨濟俱是瞎漢有人辨得天下橫行雲峰悅云奇怪諸德看此二員作家一拶一捺略露風規大似把手上高山雖然如是未免旁觀者哂且道誰是旁觀者喝一喝下座徑山杲云雲峰與麼批判大似普州人徑山若見縛作一束送在河裏不見道蚌鷸相持俱落漁人之手西堂顯云然則德山門下草偃風行怎奈臨濟當機不讓雖然如是未出葛藤窠裏護國元云二老忒煞旁若無人真如若見每人各與二十痛棒且道利害在什麼處有人明辨得許你親見臨濟德山天寧琦云衆中道德山臨濟好手手中呈好手紅心心裏中紅心殊不知用盡自己心笑破他人口天童悟云臨濟拽倒禪牀大似不奈船何打破戽斗當時若作今時拽倒驀面擲豈不得人一牛還人一馬古南門云二老漢當時恁麼相見可謂旁若無人豈料千古之下咽喉被雪竇把定大衆還辨得麼若辨不得古南今日放一線道乃擊禪牀云長安風月貫今昔那個男兒摸壁行城山洽云德山無事生事臨濟慣捋虎鬚且置勿論敢問當時臨濟掀倒禪牀德山便爾休去意作麼生天目律云饒你恁麼也是鼓粥飯氣復云噁雪竇正云德山向水稜上行船臨濟於針鋒尖走馬實為今古罕覯雪竇為什麼却道二俱瞎漢試定當看白巖符云者兩個漢一挨一拶技藝都來可觀就中一個更毒若人委悉得許你親見臨濟德山不然總是瞎漢踈山順云者兩個漢踈山當時若見將一條麻繩縛作一束送在大洋海裏何故太平無象日何必待以干戈德山上堂問即有過不問猶乖有僧出禮拜山便打僧曰某甲才禮拜為甚便打山曰待汝開口堪作什麼雲居莊云德山權衡在握殺活臨時者僧久經行陳奮不顧身然雖如是未免二俱不了還有緇素得出者麼真金自有真金價終不和沙賣與人寶壽新云者僧興兵只為德山討戰觀其勢似有得失察其原本無輸贏是以饒你殺得北斗歸南終不能使天下立地太平如何得立地太平去君王懶問朝堂事卿相何由奏帝基白巖符云德山據令未到手酸棒折為甚麼便爾放過者裏也有些子誵訛當時我若作者僧待道待汝開口堪作什麼好與云恁麼則和尚却須喫棒德山因雪峰問從上宗乘學人還有分也無山打一棒曰道什麼峰曰不會明日復上請益山曰我宗無語句實無一法與人峰於此有省巖頭奯云德山老人一條脊梁骨硬似鐵雖然如是於唱教門中猶較些子長慶稜因保福問只如巖頭出世有何言教過於德山便與麼道慶云汝不見伊道如人學射久久自中福云中後如何慶云展闍黎莫不識痛癢福云和尚今日非唯舉話慶云展闍黎是什麼心行明招謙云大小長慶錯下名言丹霞淳云德山恁麼説話祇知入草求人不覺通身泥水仔細看來祇具一隻眼丹霞則不然我宗有語句金刀剪不開深深玄妙旨玉女夜懷胎德山因龍牙問學人仗鏌耶劒擬取師頭時如何山引頸近前曰㘞牙曰頭落也山呵呵大笑牙後到洞山舉前話洞曰德山道什麼牙曰德山無語洞曰莫道無語且將德山落底頭呈似老僧看牙方省便懺謝有僧舉似德山山曰洞山老人不識好惡者漢死來多少時救得有甚麼用處保福展云龍牙只知進前不知失步翠巖芝云龍牙當斷不斷如今作麼生斷法華舉云諸上座莫是德山無機鋒麼為當別有道理良久云㘞東禪觀云龍牙抱劒傷身自招過咎德山為頭作主幸好機籌忽被洞山指蹤不覺尾巴露出白巖符云遁公輕敵去死十分無足與論德山做處暗陷於菟是稱好手然為新豐白澤一照則又手忙腳亂好在什麼處德山一日飯遲自托鉢至法堂前時雪峰作飯頭見曰者老漢鐘未鳴鼓未響托鉢向甚麼處去山便低頭歸方丈峰舉似巖頭頭曰大小德山未會末後句在山聞令侍者喚巖頭問曰你不肯老僧那巖密啓其意山乃休至明日升堂果與尋常不同巖至僧堂前撫掌大笑曰且喜老漢會末後句也他後天下人不奈伊何雖然如是也只得三年活雪竇顯舉明招謙代德山語云咄咄沒處去沒處去云曾聞説個獨眼龍元來只在者裏殊不知德山是個無齒大蟲若不是巖頭識破怎得今日與昨日不同諸人要會末後句麼只許老胡知不許老胡會溈山云巖頭大似高崖石裂直得百里走獸潛蹤若非德山度量深明怎得昨日與今日不同溈山果云古今無異路達者共同途透出威音外須明肘後符且道那裏是巖頭識破德山處若檢點得出非但參學眼明亦乃領過雪峰其或緇素不辨邪正未分路遠夜長休把火大家吹滅暗中行高峰妙云佛祖機緣古今公案其中誵訛無出於此或謂巖頭智過於師故有密啓其意殊不知犯彌天之咎萬劫遭殃且道利害在什麼處撫掌大笑云侍者分明記取三十年後有人證明雲門信云密啓其意壁上貼門神低頭歸方丈慚惶殺人果與尋常不同毫釐有差天地懸隔愚菴盂云一個在高高峰頂立一個在深深海底行一個山上行船一個巖前走馬直得花飛錦上月到上林然雖如是禾黍不陽𦦨競栽桃李春翻令力耕者半作賣花人古南門云字經三寫烏焉成馬諸人若於鐘未鳴鼓未響時會去不惟穿却德山明招鼻孔亦乃坐斷巖頭雪竇舌頭不然碗子撲落地碟子成七片要會末後句且緩緩報恩琇云承虗接響者蹉過德山抑強扶弱者埋沒巖頭山僧老實告報道師勝資強還他德山父子喝一喝云好手手中呈好手知音知外有誰知崆洞慈云大小雪峰龍頭蛇尾當時待低頭歸方丈何不以手拊其背云者老漢做賊人心虗不惟使父兄做伎倆不成亦免後人向末後句裏著倒諸方要識末後句麼良久云星沉水底光千點鴈過空中字幾行百丈泐云其父攘羊而子證之直則直矣天下不奈伊何父為子隱子為父隱美則美矣天下不肯伊何縱饒見得分明要識巖頭則易識德山則難何故便歸方丈閉却門寶壽新云德山雖則無事生事檢點將來亦未為分外怎奈遇著個無下落漢便乃當頭一拶非特使伊暗裏藏刀亦要知你做處若何不料折腳波斯驀頭跳出復來劒刃上弄險怎教伊不高懸戰鼓密布鎗旗他見你鋒頭稍硬也只得抽身便轉別露囊錐以為得志那知伊冷地退敗是個兵行偽計所以剛到臨崖之際便欲放出辣手攔腮一拶豈期宗門不幸重遭一上扭揑直得鎗頭卓朔無可奈何祇如臨末稍頭一場露布又作麼生好還有人遮掩得麼殊不知德山父子性命已落在新長老手裏棲霞成云德山父子雖善簧鼓其道怎奈不善臨風別調韻出青霄大家暗地搖脣未免自揚家醜然不因一事不長一智且道伊畢還會末後句也無禹力不到處河聲流向西雪竇正云明招只知向前不知退後雪竇漝麼批判不妨難會祇如末後句畢竟作麼生會乃喝一喝東塔熹云德山藏身露影似個無齒大蟲雪峰暗得便宜不覺通身著賊若非多口阿師怎得今日不同昨日雖然且道末後句如何委悉也是胡餅裏討汁枝山選云者老漢尋常逞盡英俊剛被雪峰一問直得分踈不下若無巖頭密啓洎乎埋沒生平雖然且道末後句子既會得因甚只得三年活踈山順云德山被雪峰一拶直得去死十分若無巖頭一貼返魂藥何處有德山衆兄弟要會末後句麼逢人但恁麼舉智者林云德山作賊心虗被雪峯一拶懡㦬而回雪峯見伊低頭若能云者賊則德山伎倆窮矣友可玄云潛師夜戰者固不見德山略地曉攻者是又豈知巖頭殊不知將軍日挑戰都護夜巡營還他德山父子雖然燕山猶有石須勒幾人名
