body:
  text: 古杭白巖嗣祖沙門淨符彚集南十三洪州黃龍悟新禪師南十三黃龍心嗣示衆粗言及細語皆歸第一義你者一隊尿床鬼子三生六十劫也未夢見第一義在天童忞徵云死心恁麼說話為是眼蓋諸人氣吞一切耶為復第一義諦不可圖度耶為復不憤不啓不悱不發激厲將來耶請撿點看白巖符云黃龍老禿山翁瞎驢要提持第一義諦第一義諦是個什麼風雨亭邊破草鞋即使拾得有什麼用處汝輩有血性漢切不得被他惑亂黃龍因僧問承師有言老僧今夏向黃龍潭內下三百六十箇釣筒未曾遇著個錦鱗紅尾為復是鈎頭不妙為復是香餌難尋龍曰雨過竹風清雲開山嶽露曰恁麼則已得真人好消息人間天上更無疑龍曰是鈎頭不妙是香餌難尋曰出身猶可易脫體道應難龍曰亂統禪和如麻似粟靈巖儲喝一喝云者漢何異緣木求魚天寧今夏拋却絲綸冷坐巾幘山前看他鳶飛魚躍鳳走麟奔總不暇顧著數盡落霞對明月撥開松影露青天偶爾有個蟭螟撞到面前並不與他京三下四一任越水吳山何故聻若將有意為有意往往事從有意生黃龍上堂行腳高人解開布袋放下鉢囊去却藥忌一人所在須到半人所在須到無人所在也須親到天童傑云死心有年有德語不妄發如大冶精金千煅萬鍊始成繞指然後裁截並無虗棄雖然畢竟意歸何處三邊一箭收功後四海何愁不太平白巖符因僧問云如何是半人所在未聞梅破臘如何是一人所在尚有菊擎霜無人所在還用到否巖便喝一喝云者瞎漢亂撞作麼黃龍因太史黃庭堅參龍問死心死學士死彼此燒作一堆灰向甚處相見堅無語龍曰晦堂處參得底用未著在堅後謫官黔南忽有省乃曰尋常被天下老和尚瞞却多少唯死心道人不肯可謂真實相為灜山誾云鐵面去皮晦堂拆骨死心又敲骨出髓矣山谷始得疑情盡命根斷若到山僧者裏且立一邊著為什麼鐵壁從渠透銀山更要通石霜尊云死心捨命從人太史一死更不再活東京法雲佛照杲禪師南十三寶峰文嗣示衆老僧熙寧八年文帳在鳳翔府供申當年崩了華山四十里壓倒八十村人家汝輩後生茄子瓠子幾時知得白巖符云者漢大似為魅所著白日見鬼不知惑亂多少人山僧今日放他不過直貶向鐵圍山裏永不許伊出頭為什麼太平天下那許妖言法雲因一座主曰禪家流多愛脫空雲乃問承聞座主講得百法論是否曰不敢雲曰昨日晴今日雨是什麼法中收主無對雲曰莫道禪家流多愛脫空好主抗聲曰和尚且道昨日晴今日雲是什麼法中收雲曰二十四時分不相應法中收主乃屈膝作禮而謝徑山杲云昨日晴今日雨時分不相應三日後看取天寧琦云雲自帝鄉去水歸江漢流瑞州九峰希廣禪師南十三寶峰文嗣遊方日謁雲蓋智乃問興化打克賓意旨如何智下禪床展兩手吐舌示之峰打一坐具智曰此是風力所轉又問石霜琳琳曰你意作麼生峰亦打一坐具琳曰好一坐具祇是不知落處又問真淨淨曰你意作麼生峰復打一坐具淨曰他打你也打峰於言下大悟南㵎問云三大老中有一人堪為佛祖之師有一人堪為人天之師有一人自救不了且那個堪為佛祖之師那個堪為人天之師那個自救不了撿點得出三十棒一棒也不較若撿點不出三大老為你證明然雖如是廣道者悟去又悟個甚麼切忌鑽龜打瓦風穴喜云九峰雖則三度令行到底不知坐具落處真淨道他打你也打正是金鍮莫辨玉石難分即今還有辨得出底麼若辨得出生陷無間地獄臨江慧力可昌禪師南十三東林總嗣因僧問佛力法力即不問如何是慧力力曰踏倒人我山扶起菩提樹曰菩提無樹向甚處下手力曰無下手處正好著力曰今日得聞於未聞力曰莫把真金喚作鍮報恩琇云新報恩則不然有人問如何是慧力但向他道喫官酒臥官街當處死當處埋天童忞云高高山頂立還他慧力深深海底行須是報恩始得然從長撿點一人入佛不能入魔一人入魔不能入佛若是天童又且不然設有人問如何是慧力祇向他道山月如銀牽老興閒行不覺過峰西神鼎僼云昌老見處只可自了若有問山僧如何是慧力但向他道煩惱海中為雨露無明山上起雲雷眉山學士蘇軾居士字東坡南十三東林總嗣參東林論無情說法話有省乃獻投機頌曰溪聲便是廣長舌山色無非清淨身夜來八萬四千偈他日如何舉似人上竺智謁護國元舉前頌且云也不易到此田地元曰尚未見路徑何言到耶智云溪聲便是廣長舌山色無非清淨身若不到此田地如何有者個消息元云是門外漢耳智致疑通夕不寐乃曉鐘鳴去其祕蓄乃別前頌云東坡居士太饒舌聲色關中欲透身溪若是聲山是色無山無水好愁人持以告元元云向汝道是門外漢幻寄稷云上竺者漢思量了一夜却寐語東坡門外漢者漢未及門此菴云向汝道是門外漢且道是賞伊罰伊莫錯會好蘄州五祖山法演禪師南十三白雲端嗣垂語譬如水牯牛過窗櫺頭角四蹄都過了因甚尾巴過不得天童華云者樣說話多年在肚皮裏信知天下無人理會所以密之三寸今日拈出敢問諸仁者既是大的俱過了因甚尾巴過不得獅林則云者個是東山演祖不了事處老漢參方三十年也有兩件不了底事是什麼兩件事饑來要喫飯困來要打眠大梅幟云過得過不得則且置畢竟喚什麼作牛尾巴良久云遍界不藏全體露絲毫有見事還差喝一喝五祖示衆今夏無可管顧諸人近作得一家宴遂擡手曰囉囉招囉囉搖囉囉送莫怪空疏伏唯珍重薦福璨云老東山龍肝鳳髓百味具足怎奈美食不中飽人喫伏龍長云一個鐵餕餡百味具足知他祭了多少閒神野鬼直饒一咬百雜碎到者裏急須吐却佛日晳云東山老祖設一佳宴破費常住不少隆安今晚也設一佳宴管顧大衆只是不破費常住一絲毫許良久云罷罷罷休休休免使諸方笑怪不見道好男不喫分家飯好女不穿嫁時衣自家珍寶用不盡何必區區向外馳五祖上堂山僧昨日入城見一棚傀儡不免近前看或見端嚴奇特或見醜陋不堪動轉行坐青黃赤白一一見了仔細看來元來青布幕裏有人山僧忍俊不禁乃問長史高姓他道老和尚看便了問甚麼姓大衆山僧被他一問直得無言可對無理可伸還有人為山僧道得麼昨日那裏落節今日者裏拔本天寧琦云誰家別館池塘裏一對鴛鴦畫不成白巖符云五祖是從那邊過來底人胸次間要禪道佛法氣息一點也無斯所以能向空中建城雉海面上架樓臺也自餘是什麼新婦禪骨董禪又那裏得知雖然尚有一人呵呵大笑若識得此人許你具透關眼五祖謝監收上堂人之性命事第一須是欲得成此先須防於若是真人南㵎問云大小五祖弄巧成拙寶掌白云會麼山僧今日不惜舌頭與諸人略為道破良久云摩斯吒心肝要且不在樹頭上諸人莫錯會好寶峰辨云賊不打貧家五祖因僧問一代時教是個切腳未審切那個字祖曰鉢囉娘曰學人祇問一字為什麼却答許多祖曰七字八字昭覺勤云迅雷不及掩耳甄峰承云利似倚天長劒鈍如無孔鐵錘五磊權云大小演祖與麼答話畢竟正文未曾道著且道如何是正文良久云孔門弟子無人識碧眼胡僧笑點頭天目律云者僧問個切腳五祖乃恁麼答且道是什麼義紅塵堆中花街柳巷僻谷窮山白雲淡宕五祖示衆釋迦彌勒猶是他奴且道他是阿誰開聖覺曰鬍張三黑李四祖然之時圓悟為首座乃曰好則好恐未實更當搜看次日祖入室仍舉前話問覺覺曰昨日向和尚道了也祖曰道什麼覺曰鬍張三黑李四祖曰不是不是覺曰和尚為甚昨日道是祖曰昨日是今日不是覺於言下大悟天童忞云大小東山只知有己不知有人將常住果子私自受用若是天童即不然釋迦彌勒猶是他奴且道他是阿誰高聲召云大衆今晚小盡二十九普請大衆喫茶去抴拄杖驟步下應供堂鐵佛源云諸人要知五祖底端的麼問取古廟裏中央第一尊泥塑土地位下黑將軍五祖曰世有一物不屬凡不屬聖不屬邪不屬正萬事臨時自然號令瑞巖慍云大小五祖白雲正傳將謂有回天關轉地軸底謀略如斯吐露何異宋人以死鼠為璞瑞巖則不然世有一物在凡屬凡在聖屬聖在邪屬邪在正屬正萬事紛紛何須號令拈拄杖卓一卓五祖曰四五百石麥二三千石稻好個休糧方耆婆不得妙靈隱嶽云五祖老人好語只為探頭太過香山有個方便也要諸人共知透得金剛圈細嚼鐵酸餡一飽忘百饑始信不相賺伏龍長云管取有錢常住不無演祖若是將無作有拔貧助富還我無明老漢始得米不蓄一粒菜不栽一莖任渠往來者喫得飽膨脝天童忞云千巖貧而諂五祖富而驕不肖忝為後裔終不敢邯鄲學他唐步何故大抵還他肌骨好不搽紅粉也風流寶峰清云有錢常住實是千巖將無作有還他五祖若是貧無不足富不有餘除是天童老人始得然則道峰者裏又作麼生良久云祇有楊岐粟棘蓬五祖示衆祖師說不著佛眼看不見四面老婆心為君通一線便下座徑山及云若教頻下淚滄海也須乾焦山傑云二老漢用盡氣力費盡唇舌千載而下未免遭人撿點五祖因僧問如何是佛祖曰露胸跣足如何是法祖曰大赦不原如何是僧祖曰釣魚船上謝三郎徑山杲云此三轉語一轉語具三玄三要四料揀四賓主洞山五位雲門三句百千法門無量妙義若人揀辨得出許你具一隻眼五祖因僧問牛頭未見四祖時如何祖曰頭上戴纍垂曰見後如何祖曰青布遮前曰未見時因甚麼百鳥銜花獻祖曰富與貴是人之所欲曰見後為什麼不銜花獻祖曰貧與賤是人之所惡徑山杲云師翁雖則善赴來機怎奈語驚時聽徑山今日有兩語要與師翁相見牛頭未見四祖因甚百鳥銜花獻茅屋上安鴟吻見後因甚不銜花獻佛殿裏掘東司靈巖儲云徑山固是別轉旗鎗未免分身兩處國清今日只有一轉語要與徑山相見牛頭未見四祖因甚百鳥銜花獻不快漆桶見後為什麼不銜花獻不快漆桶且道五祖底是徑山底是國清底是一僧才出儲云不快漆桶便下座五祖示衆前回底今日使不著今日底後回使不著使不著重遭撲自古至于今誰錯誰不錯忽有個漢出來道白雲不是今日錯自云錯保寧茂云扶竪臨濟正宗揭示楊岐奧旨還他五祖始得雖然也是泥裏洗土塊山僧即不然去年底今日用得著今日底後日用得著用得著重拈却一步濶一步一著高一著或有個漢出來道長老與麼說話也是無孔鐵鎚只向他道若是無孔鐵鎚正用得著五祖示衆如何是祖師西來意庭前柏樹子恁麼會則不是了也如何是祖師西來意庭前柏樹子恁麼會方始是白巖符云恁麼會則不是滴淚斬丁公恁麼會方始是咬牙封雍齒顧左右云大小五祖為諸人一揑粉碎了也還會麼五祖因諸寺長老入山上堂臨濟入門便喝是什麼熱碗鳴聲德山入門便棒拗曲作直雲門三句洞山五位大開眼了作夢何故如此國清才子貴家富養兒驕雲居莊云五祖老人大似將常住物作自己人情徑山見處也要諸人共知乃竪起拂子云德山臨濟洞山雲門只今在拂子頭上各說不二法門了一時走入淨瓶裏澡浴去也何故如此水流原在海月落不離天五祖示衆曰狗子勝猫十萬倍愚菴盂云摟破南泉窠窟掀翻趙老家私再看五祖為什麼平白地上分個勝負為復抑揚之語耶為復故意扭揑耶為復一期方便耶若作恁般見解不唯不識五祖要見南泉趙州遠之遠矣古人一般提持個事利害在什麼處法性不寬波瀾不廣不到七通八達處難以評論古今却不是你一味該抹得去底道理不見道當時摩竭令幾喪目前機五祖出隊歸示衆出隊半個月眼不見鼻孔失却祖師禪拾得個骨董且道甚處著一分奉釋迦牟尼佛一分奉多寶佛塔峰頂𨛱云山僧出隊五個月眼睛鼻孔無差別有人問我祖師禪劈頭拄杖要見血祇如遇著釋迦牟尼佛多寶佛塔又作麼生良久乃和南云恭惟合山頭首久別衆慈萬福萬福五祖參白雲舉南泉摩尼珠話方伸請問雲便叱之祖領悟乃獻投機偈曰山前一片閒田地叉手叮嚀問祖翁幾度賣來還自買為憐松竹引清風雲特印可令掌磨事文峰玉徵云賣來還自買即不問諸人且道畢竟喚什麼作一片閒田地直饒你道得分明我更要問你討契券在方山捨云演老師毒中浮山後擔一擔骨董撞入白雲保社忽地打翻始知自己庫藏取用無竭雖然撿點將來也是不唧𠺕漢提刑郭正祥居士字功甫南十三白雲端嗣到雲居請佛印元升座公拈香曰覺地相逢亦何早鶻臭布衫今脫了要識雲居一句玄珍重後園驢喫草召大衆曰此一瓣香薰天炙地去也印曰今日不著便被者漢當面塗糊便打乃曰謝公千里來相訪共話東山竹徑深借與一龍騎出洞若逢天旱好為霖擲拄杖下座公拜起印曰收得龍麼公曰已在者裏印曰作麼生騎公擺手作舞便行印撫掌曰祇有者漢猶較些子白巖符云功甫龍即騎矣只是不能為雨為霖以潤枯藁當時若是頭角崢嶸待道還收得龍麼便好掀倒法座提刑郭公一日謁白雲雲問牛醇乎公曰醇矣雲遽厲聲叱之公拱而立雲曰醇乎醇乎於是為公升堂曰牛來山中水足草足牛出山去東觸西觸灜山誾云郭公水牯牛醇則醇矣惜乎缺些頭角當時待白雲厲聲叱便好拽下座痛與一頓博山奉云白雲一擡一捺善得養子之緣末上與麼道也是憐兒不覺醜青十三真州長蘆真歇清了禪師青十三丹霞淳嗣上堂處處覔不得祇有一處不覔自得且道是那一處良久曰賊身已露車溪冲云處處覔不得且道什麼處不是有一處不覔自得人無下賤下賤自生良久什麼處去也賊身已露還我贓物來復云真歇和尚祇解閉門作活未知奪角衝關且作麼生是奪角衝關底句卓拄杖云扛江入水寶壽新云者老賊被新上座捉敗了也還有人遮蓋得麼如無且與你一條出路拍香几云去道林志云祇有一處不覔自得且道是那一處拈拄杖云春在草頭上遊人幾個知乃卓一卓崇先奇云督亢圖窮匕首現旁觀者為之髮竪還有不惜性命底漢麼長蘆普請次路逢一僧蘆以杖指地上竹擔僧拈起竹擔曰短些子蘆劈脊打曰者裏是什麼所在說長說短大慈言云者僧赤身挨白刃不善趨避未免喪身失命長蘆雖則見兔放鷹怎奈勞而無功二者俱好與三十烏藤大慈恁麼道還有為長蘆出氣者麼復云險長蘆上堂轉功就位是向去底人玉韞金山貴轉位就功是却來底人紅爐片雪春功位俱轉通身不滯撒手無依石女夜登機密室無人掃正恁麼時絶氣息一句作麼生相委良久曰歸根風墮葉照盡月潭空聞菴宗答僧問云如何是轉功就位撒手無依全體現扁舟漁父宿蘆花如何是轉位就功夜半嶺頭風月靜一聲高樹老猿啼如何是功位齊彰出門不踏來時路滿目飛塵絶點埃如何是功位齊隱泥牛飲盡澄潭月石馬加鞭不轉頭雲溪挺云且作麼生說個轉底道理良久云且過那邊著又云切忌折合明州天童宏智正覺禪師青十三霞淳嗣示衆諸禪德吞盡三世佛底人為什麼開口不得照破四天下底人為什麼合眼不得許多病痛為你一時拈却了也且作麼生得十成通暘去還會麼劈開華嶽連天色放出黃河倒海聲百丈泐云天童費許多氣力不消山僧一彈指已拈却了也復喝一喝云無人識得渠天斗偉云小大天童者兩種人底病痛不妨為伊拈却若是十成通暘則未可諸人要得十成通暘麼喫官酒臥官街毫無一物掛胸懷狂歌明月清風裏天子徵書召不來天童因僧問清虗之理畢竟無身時如何童曰文彩未痕初消息難傳際曰一步密移玄路轉通身放下劫壺空童曰誕生就父時合體無遺照曰理既如是事作麼生童曰歷歷才回分化事十方機應又何妨曰恁麼則塵塵皆現本來身去也童曰透一切色超一切心曰如理如事又作麼生童曰路逢死蛇莫打殺無底籃子盛將歸曰入市能長嘯歸家著短衫童曰木人嶺上歌石女溪邊舞崇先奇云者僧久客未歸猶思故園風景天童老人不惜老婆與他話盡雲山若是未能身裏出門者何異夢中悲喜然雖如是瞞皋亭不得白巖符云問在答處答在問處如此相見自非曲巷𢌞廊無往不穿通過來者要插一嘴知不可得然細撿將來是則總是不是則總不是為什麼我王庫內無如是刀天童因僧問如何是向去底人童曰白雲投壑盡青嶂倚空高曰如何是却來底人童曰滿頭白髮離巖谷半夜穿雲入市曰如何是不去不來底人童曰石女喚回三界夢木人坐斷六門機清化嶾云覺祖真乃道樞綿密智域淵深等閒為人處赤心片片及盡玄微而今不肖兒孫也要平分風月土上加泥有問如何是向去底人開眼不覺曉如何是却來底人日午打三更如何是不去不來底人威音猶不住那赴兩頭機且道與天童相去幾多試簡點看婺州智者法銓禪師青十三長蘆信嗣上堂要扣玄關須是有節操極慷慨斬得釘截得鐵硬剝剝地漢始得若是畏刀避箭碌碌之徒看即有分以拂子擊禪床下座天寧琦云大小智者用盡自己心笑破他人口壽山別無奇特晨朝熱水洗面黃昏脫襪打眠大海從魚躍長空任鳥飛灜山誾云智者天寧一個緊似鐵篐一個寬如皮袋各見一邊則固是如今諸方在者裏作麼生始得與二老別出一頭地良久云坐斷兩邊中不立還他過量越情人青龍操云自口裏水漉漉地要人勦截恐難在
