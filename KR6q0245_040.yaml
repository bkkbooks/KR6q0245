body:
  text: 古杭白巖嗣祖沙門淨符彚集南九汾陽太子院善昭禪師南九首山念嗣僧問如何是接初機底句陽曰汝是行脚僧如何是辨衲僧底句陽曰西方日出卯如何是正令行底句陽曰千里特來呈舊面如何是立乾坤底句陽曰北俱盧州長粳米食者無瞋亦無喜又曰只將此四轉語驗天下衲僧纔見汝出來驗得了也翠巖芝云先師將此四句語驗天下衲僧仔細思量却被天下衲僧一時勘破徑山杲云諸人要識大愚麼三年無改於父之道可謂孝矣汾陽示眾識得拄杖子行脚事畢有作首山示眾雲峰悅拈拄杖云者個豈不是拄杖那個是你行脚事復云楖𣗖橫檐不顧人直入千峰萬峰去溈山拈拄杖云者個是拄杖那個是行脚事直饒向者裏見得於衲僧門下只是個脫白沙彌若也不識且向三家村裏東卜西卜忽然卜著也不定泐潭澄云識得拄杖子入地獄如箭射靈隱嶽云汾陽雖是開口見膽未免落在第二頭驀拈拄杖云者個不得喚作拄杖子漆桶參妙峰善云識得拄杖子行脚事畢錯識得拄杖子入地獄如箭錯老僧則不然識得拄杖子錯復云妙峰三個錯不是無病藥龐公賣笊篱清平道木杓徑山琇拈拄杖云者個喚作拄杖子早是頭上安頭那堪更云識得行脚事畢大小汾陽話作兩橛伏龍長云識得拄杖子更買草鞋行脚三十年雲居莊云汾陽一條拄杖換却天下衲僧眼睛寶掌白云今之禪和子纔見人提起個拄杖子便向白木枝上著倒莫說行脚事要做個脫白沙彌猶未得在乃呈起拄杖云者個是拄杖子用識作麼皮下有血底一手奪來抝作兩橛山僧也只得唾手休去若是三搭不回正好南天台北五臺行驢脚馬脚無了日在普廕舉伏龍語畢云二尊宿一人坐殺天下衲僧至今走不得一人走殺天下衲僧至今坐不得大雲道識得者個穿却鼻孔到者裏直使天下衲僧欲走走不得欲坐坐不得然雖如是報恩有分白巖符云盡大地是條拄杖子你作麼生識不學汾陽頭上安頭別道一句看擬議不來劈脊便打汾陽示眾拈拄杖曰三世諸佛在者裏為汝諸人無孔竅遂走向山僧拄杖裏去強生節目淨因成云汾陽與麼示徒大似擔雪填井旁若無人山僧今日為汝諸人出氣拈起拄杖云三世諸佛不敢強生節目却向山僧拄杖裏走出向諸人道我不敢輕於汝等汝等皆當作佛天童忞云呼來遣去許他二老死蛇活弄然雖如是向上一竅未曾動著山僧今日為諸人拈掇去也拈起拄杖云識得者個三世諸佛被諸人穿却鼻孔若也未識諸人鼻孔被三世諸佛穿却擲下拄杖云是個什麼汾陽示眾夫學般若菩薩當參活句莫參死句天童忞云有般漢聞恁麼說話便商量道有義味是死句無義味是活句似則固似怎奈摩斯吒心肝不在樹頭上此去彌勒佛下生時尚隔五十六億七千萬歲在然則畢竟作麼生是活句靠拄杖云強中強吉中吉波羅會上有殊利當門不用栽荊棘急力勑明州城內近來少賊顧侍者云有人守方丈麼者云有自云山僧今秋防失脫汾陽因僧問如何是祖師西來意陽曰青絹扇子足風凉中峰本云拈得便用道出平常山高水濶地久天長青絹扇子足風凉是拈得便用耶道出平常耶誰人知此意令我憶汾陽汝州葉縣歸省禪師南九首山念嗣問僧日暮投林朝離何處曰新戒不曾學禪縣曰生身入地獄下去智門寬代僧進語云鑰匙在和尚手裏洞山聰云者僧言中有響許你是個作家怎奈有前無後當時若是個俊俏衲僧待道生身入地獄何不向道却煩和尚引導葉縣因僧問諸餘即不問如何是今日施設縣曰有你者瞎驢在曰與麼則打鼓弄琵琶縣曰捺胃放屁聲雲峰悅云然則一期以勢欺人其奈事不孤起葉縣老人失却一隻眼還有人撿點得出麼你若撿點得出雲峰分半院與你若撿點不出良久云橫按鏌鎁全正令太平寰宇斬痴頑襄州谷隱山蘊聰慈照禪師南九首山念嗣上堂十五日已前諸佛生十五日已後諸佛滅十五日已前諸佛生你不得離我者裏若離我者裏我有鈎子鈎你十五日已後諸佛滅你不得住我者裏若住我者裏我有錐子錐你且道正當十五日用鈎即是用錐即是正當十五日鈎錐一時息更擬問何如回頭日又出昭覺勤云放行處把住把住處放行雖是為人鉗錘怎奈傷鋒犯手若是崇寧則不然十五日已前不得住我者裏若住我者裏我放火燒你十五日已後你不得離我者裏你若離我者裏我放火燒你正當十五日化為萬斛明珠撒在大千沙界處處盡放光明各各急須著眼徑山杲云張三玄三要扶竪臨濟正宗須是恁麼人始得雖然如是雲門即不然十五日已前諸佛本不曾生十五日已後諸佛本不曾滅十五日已前你若離我者裏我也不用鈎鈎你一任橫擔拄杖緊捎草鞋十五日已後你若住我者裏我也不用錐錐你一任抝折拄杖高掛鉢囊且道正當十五日合作麼生十五日前後鈎錐徒爾為今朝十五日正好用鈎錐且作麼生用路逢死蛇莫打殺無底籃子盛將歸天寧琦云用盡自己心笑破他人口報恩秀云妙喜向石門放行處把定把定處放行終是撞頭磕額賴有末後句與天童同參且道同參底事作麼生石女夜裁無縫錦死蛇多出放生籃伏龍長云二大老把手上高山怎奈旁觀者哂且道無明有甚長處十五日已前諸佛生以不生生為生十五日已後諸佛滅以不滅滅為滅十五日已前你若住我者裏我却用錐錐你直須尸橫萬里血濺梵天十五日已後你若離我者裏我却用鈎鈎你直須眉毛撕結鼻孔相拄所以道十五日前後鈎錐常在手正當十五日大家要知有一任面南看北斗草木叢林獅子吼棲霞成云谷隱恁麼說話大似手忙脚亂奈伊不何攝山即不然十五日已前你若住我者裏一任吟風嘯月十五日已後你若離我者裏一任翫水觀山正當十五日又作麼生意氣不從天地得英雄豈藉四時催谷隱因僧問如何是夜半正明天曉不露隱曰牡丹花下睡猫兒廣胤標云花明無月夜聲急正秋天今人動輙以理事功位會他家裏事却似捧土培泰山掬水沃東海直是遠在且畢竟如何即是竿頭絲線從君弄不犯清波意自殊谷隱入州看官路逢延慶長老問中路相逢一句作麼生道隱曰某甲禮拜和尚有分明日到院茶話次慶曰昨日聞學士說新石門和尚和尚久在石門為什麼却新去隱曰腦後合掌天寧琦云石門道某甲禮拜和尚有分延慶著賊也不知要識石門麼李靖三兄久經行陣雖然如是未免倚勢欺人谷隱因僧問一陽纔起天地咸知依時及節事如何隱曰午夜燈光連夕照曰照後如何隱曰茶烟香篆一時清天童忞云山僧則不然有問一陽纔起天地咸知依時及節事如何但向道長至來朝賀昏鐘此夜參參後如何大眾歸單打坐兩序𥨊堂茶湯廣教玉云慈照禪師答者僧話要且無合殺山僧則不然有問依時及節事如何便捧更問如何若何連棒趂出倘或是個衲僧必定有轉身一路谷隱因僧問一處火發任從你救八方齊發時如何隱曰快曰還求出也無隱曰若求出即燒殺你僧禮拜隱曰直饒你不求出也燒殺你仁王教云我不似谷隱聯纖八方火發時如何合掌云諸行無常是生滅法生滅滅已寂滅為樂汝州廣慧元璉禪師南九首山念嗣參首山問學人親到寶山空手回時如何山曰家家門前火把子慧曰某甲從今不疑天下老和尚舌頭也山曰汝會處作麼生與我說來看慧曰祇是地上水碙砂山曰汝會也慧便禮拜徑山杲云你道首山還肻他廣慧也無若道肻他何故不與一棒若道不肻他何故不與一棒有人於此道得妙喜與你一棒并州承天三交智嵩禪師南九首山念嗣示眾第一單鎗甲馬第二甲馬單鎗第三撒星排陣第四衣錦還鄉僧便問如何是單鎗甲馬交曰不是金牙作怎能射尉遲曰如何是甲馬單鎗交曰金鏃馬前落婁樊喪膽魂曰如何是撒星排陣交曰陣雲橫海上未辨聖明君曰如何是衣錦還鄉交曰四海無消息回奉聖明君天寧琦云三交幸是太平時節何得干戈相待報恩今日也不用單鎗甲馬也不用甲馬單鎗也不用撒星排陣也不用衣錦還鄉寒來向火熱則乘凉撒手到家人不識了無一物獻尊堂大覺昇云三交雖有圖王定亂之謀不免為太平奸賊大覺無者許多般去就却能坐致太平乃竪拂子云會麼吾寧鬬智不鬬力一紙賢於十萬師青九郢州太陽警玄禪師青九梁山觀嗣上堂夜半烏雞抱鵠卵天明起來生老鸛鶴毛鷹嘴鷺鷥身却共烏鴉為侶伴高入烟霄低飛柳岸向晚歸來仔細看依稀却似雲中鴈崇先奇云混不得類不齊太陽老人拈示殆盡只是罕遇知音皐亭恁麼道多少錯會者又向炭庫裏作活計白巖符云恁麼說話若人委悉得三病二光一時透脫不然山僧且為你點破舜若多神被無手人將兔角杖打得通身紅爛直得鮮血淋漓大地如雪還委悉麼直饒你委悉得要見太陽猶隔一由旬在太陽問僧甚處來曰洪山陽曰先師在麼曰在陽曰在即不無請渠出來我要相見僧曰聻陽曰者個猶是侍者僧無對陽曰喫茶去龍池微云者僧將一條斷貫索到處要穿人鼻孔者回却被明安老漢穿却直得措手脚不辦雖然明安老漢在洞下不無所長若是臨濟棒折也未放在崇先奇云者僧果的從洪山來只是錯傳洪山語以致虗費太陽常住茶湯太陽因僧問如何是和尚家風曰滿瓶傾不出大地沒饑人報恩倫云明安老漢不負問端盡情吐露可謂所得甚簡施設彌寬丹霞道罔象無心黃帝重卞和有志楚王嫌雖謂知言然亦只是矢上加尖空中著楔要識明安家風麼熱則乘凉寒向火了無閒事掛心頭崇先奇云太陽老人從來家風嚴密門庭廣大可惜者僧不是登龍者明州雪竇重顯禪師青九智門祚嗣到大龍問語者默者不是非語非默更非總是總不是拈却大用現前時人知有未審大龍如何龍曰子有如是見解那竇曰者老漢瓦解氷消龍曰放你三十棒竇禮拜歸眾龍却喚云適來問話底僧出來竇便出龍曰甚處是老僧瓦解氷消竇曰轉見敗闕龍作色曰叵耐叵耐竇不顧後舉似南嶽福嚴雅雅曰大龍何不與本分草料竇曰和尚更須行脚南㵎問云賓則始終賓主則始終主檢點將來二俱不了山僧則不然待問大龍如何劈脊便棒者老漢今日瓦解氷消連棒趂出免得相鈍置福嚴云何不與本分草料雪竇却道和尚更買草鞋行脚始得我要問福嚴本分草料甚麼處去也拈拄杖云龍蛇易辨衲子難瞞崇先奇云雪竇老人大似個黠兒拾得風流袋不顧旁觀者哂且道誰是旁觀白巖符云逆剝龍鱗倒拖兕尾固是英雄豪傑流事然在大方老作又當好笑你道他笑個甚麼他笑道新婦兒方梳澡六幅長裙就地掃翻蹤馬上握金鞭不顧堂前有大嫂雪竇舉古德曰眼裏著沙不得耳裏著水不得忽有個漢信得及把得住不受人瞞佛祖言教是什麼熱椀鳴聲便請高掛鉢囊抝折拄杖管取一員無事道人又曰眼裏著得須彌山耳裏著得大海水一般漢受人商量佛祖言教如龍得水似虎靠山却須挑起鉢囊橫擔拄杖亦是一員無事道人復云恁麼也不得不恁麼也不得然後沒交涉三員無事道人中選一人為師天童覺云坐斷乾坤建立世界和光混俗各有所長且道選那一人為師驀拈拄杖云穿過了也南堂欲云高掛鉢囊抝折拄杖未是無事道人挑起鉢囊橫擔拄杖亦未是無事道人恁麼也不得不恁麼也不得然後沒交涉亦未是無事道人卓拄杖喝一喝云木馬火中嘶黃昏後日出崇先奇云雪竇雖則慈悲之故有落草之談帶累多少人生陷地獄要識三員無事道人麼也只是官驛裏撮馬糞漢雪竇為道日損偈曰三分光陰早二過靈臺一點不揩磨區區逐日貪生去喚不回頭怎奈何無禪才云雪竇老漢顢顢頇頇儱儱侗侗更參三十年也未會禪在然雖如是土曠人稀試聽下個註脚瞎却摩醯三隻眼南北東西路不分千林落葉無人掃獨自松門展脚眠雪竇曰大施門開無壅塞忽有個衲僧出來雪竇倒退七百里何故臨危不悚人有老宿云大施門開無壅塞忽有個衲僧出來兩手分付何故心不負人面無慚色又老宿云大施門開無壅塞忽有個衲僧出來三十棒一棒也不較何故許人一物千金不移天童忞云靈峰今日亦大施門開無壅塞忽有個衲僧出來且教他立在門外何故伊欠少個什麼雪竇因僧問古人道有讀書人到來意旨如何竇曰且在門外立曰請師相見竇曰任是顏回亦不通天童忞云雪竇雖是真實相為太殺不近人情若是天童有問讀書人到來時如何導之以德請師相見齊之以禮畢竟意旨如何相逢相見呵呵笑更有春風春又春雪竇上堂起立曰雪竇得與麼高諸人得與麼矮若人道得齊肩句許伊把定乾坤廣潤融云雪竇恁麼說禪忒殺齊頭故事山僧則不然驀涌身上禪床竪拄杖云廣潤得與麼高諸人得與麼矮若人道得齊肩句猶是兔子喫牛奶雪竇示眾客從遠方來遺我徑寸璧中有四箇字字字無人識佛鑑懃云客從遠方來遺我徑寸璧中有四箇字不必重拈出高峰妙云二大老一人說易一人說難未免見有偏枯高峰則不然客從遠方來遺我徑寸璧中有四箇字字字無平仄焦山傑云前二老明中有暗暗中有明高峰半明半暗總未免偏枯我則不然客從遠方來遺我徑寸璧中有四箇字字字無點畫雪竇示眾天得一以清地得一以寧衲僧得一以無風浪興爾若辨得禍不入慎家之門天童悟云者龍頭蛇尾漢錯下註脚天得一以清地得一以寧衲僧得一以無風浪興以拄杖一時趂散石佛伽云大小雪竇慣向人前賣弄我當時若在便與掀翻几案雪竇示眾諸人要知真實相為麼但上無攀仰下絕己躬自然常光現前個個壁立千仞雲峰悅云雪竇恁麼為人入地獄如箭射廣教玉云雪竇雖則養子之緣怎奈無出身路雲峰路見不平亦且枷上著杻三角則不然要知真實相為個個須從拄杖上翻身其或未委長連單上有粥有飯作麼生道白巖符云雪竇恁麼為人未見好手我者裏則不然諸人要知真實相為麼但饑來喫飯困來打眠只是不得動著動著則入地獄如箭雪竇示眾乾坤之內宇宙之間中有一寶掛在壁上達磨九年面壁不敢正眼著如今衲僧要見劈脊便打昭覺勤云雪竇妙中之妙奇中之奇向佛祖頭上提持衲僧頂門鑿竅不妨自在要且只見錐頭利不見鑿頭方若是山僧則不然乾坤之內宇宙之間中有一寶竪拄杖云在拄杖頭上拈起也天回地轉放下也草偃風行有時八臂三頭有時壁立千仞如今莫道衲僧要見直饒千聖出來列祖齊至並須倒退三千里敢問大眾且道什麼人合得受用分付天台木上座突出南山鼈鼻蛇攛拄杖下座寶壽方云二老與麼說話要提持者一著子大似壓沙取油殊不知我王庫內無如是刀天界盛云二老漢撥亂乾坤即不無若是安定國未敢相許在杖人即不然乾坤之內宇宙之間中有一寶良久噫無限珍奇何處用前三三與後三三福嚴容云二大老一人說近一人說遠依稀越國彷彿揚州山僧者裏則不然乾坤之內宇宙之間中有一寶遂喝一喝洞山度云者裏則不然乾坤之內宇宙之間中有一寶驀竪拂子云要見便見要拈便拈其或佇思停機莫怪洞山性躁乃擊禪床喝一喝雪竇因僧問黑荳未生芽時如何竇曰透水透砂生芽後如何竇曰餧驢餧馬廣教玉云擴佛祖心印提本分鉗錘饒我雪竇山僧承大眾鋤荳將今視古也擬定個眼目設有問黑荳未生芽時如何白雲峰倒卓生芽後如何西河浪潑天若道與古人別法無異旨若道與古人同語言又異具眼者辨取雪竇到洞山聰處山問溈山水牯牛上座作麼生會竇曰作後人標榜山擬道竇以坐具拂一下便行山曰且來上座竇曰未參堂古南門云雪竇好一頭水牯牛只是不受人調制雖然不唯標榜後人亦乃標傍佛祖雪竇示眾春山疊亂青春水漾虗碧寥寥天地間獨立望何極便下座却顧謂侍者曰適來有人看方丈麼曰有竇曰作賊人心虗烏石道云雪竇家私平生受用之物盡情擲出與諸人了也烏石者裏雖然活計無多也要諸人委悉且作麼生是烏石活計卓拄杖云燕語鶯啼春日暖園林是處百花香雪竇上堂十方無壁落四面亦無門古人向什麼處見客或若道得接手句許你天上天下崇先奇云雪竇恁麼為人何能坐斷得天下人舌頭當時若有個師僧出眾但向他道和尚話墮也不知待他眼目定動拂袖便行靈峰祥云我要問雪竇你即今向甚處著此一問天台山德韶國師青九法眼益嗣示眾通玄峰頂不是人間心外無法滿目青山法眼聞曰只此一頌堪起吾宗徑山杲云滅却法眼宗祇緣者一頌昭慶庭云天不葢地不載無處隱身水自綠山自青纖毫礙眼祇如通玄峰頂不是人間且道是什麼所在一片落花飛萬國春歸去天童悟云新通玄則不然今日別開一路通玄峰頂別是人間只緣不薦錯認青山喝一喝云還薦麼便下座天台因僧問乍離凝峰丈室來坐般若道場今日家風請師一句台曰虧汝甚麼處曰恁麼則雷音震動乾坤界人人無不盡沾恩台曰幸然未會且莫探頭僧禮拜台曰探頭即不中護國蘊云國師恁麼答話揭露佛祖家風則不無要且此僧未肯點頭今日若有問山僧今日家風請師一句但向道天台一萬八千丈朝夕烟雲八面封金陵清涼法燈泰欽禪師青九法眼益嗣開堂山僧本欲居山藏拙養病過時奈緣先師有未了底公案出來與他了却時有僧出問如何是先師未了底公案燈便打曰祖禰不了殃及兒孫曰過在什麼處燈曰過在我殃及你翠巖芝云為眾竭力禍出私門雲峰悅云者老漢一期與奪也似光前絕後及乎拶著又却龍頭蛇尾如今莫有為清涼作主底麼昭覺勤云法燈縱域中殺活握閫外威權直得氣槩驚羣風標獨立山僧卑志本亦如斯今日出來祇緣五祖先師有個現成公案對眾舉揚有不惜性命底出來挨拶看如無不免自拈自弄去也喝一喝擊拂子下座天童覺云者僧若是個漢出來便掀倒禪床不惟自己有出身之路亦免祖禰不了殃及兒孫東禪觀云千鈞上弦必思鏖戰寸鐵入手惟恐無敵者僧既不惜出來好大家割捨理會却只恁麼把伊塗糊一上所以清涼公案至今未了仰山欽云跨竈起家法燈是則好手其奈自身不了殃及祖翁新護聖欲了先師公案別有人在且道是阿誰乃打噴啑一聲百丈雪云山僧本欲潛棲巖壑養病過時亦為先師有不了公案今日出來特為了却或有問雲門有甚不了公案只向他道石女驚回霜夜夢木人撲落午天星更問過在甚麼處向道易使清風梳翠竹難教明月住須彌古南門云法燈可謂謙光導物枉尺直尋山僧則不然徧界不曾藏雖踞孤峰絕頂未甞不在水雲深處又何曾隱遯來本師現在喫得屙得有甚公案不了既然如是今日又向諸人面前呌喚作麼祖燈續焰明無盡只要鈎頭得錦鱗龍唐敷云當仁不讓法燈固是作家見義勇為者僧翻成特地若是治平欲了先師公案又且不然良久曰鐵牛喫盡欄邊草轟角春風匝地生杭州報恩慧明禪師青九法眼益嗣一日有新到參恩問近離甚處曰城都恩曰上座離城都到此山則城都少上座此間剩上座剩則心外有法少則心法不周說得道理即住不會請去僧無對洞山瑩代僧云某甲縱說得道理終不似和尚好瑞州洞山曉聰禪師青九文殊真嗣上堂晨雞報曉靈粥後便天明燈籠猶瞌睡露柱却惺惺復曰惺惺直言惺惺歷歷直言歷歷明朝後日莫認奴作郎珍重崇先奇云大眾好言語若人信受奉行敢保一生受記從教三十年後有人道皐亭和泥合水白巖符云說到燈籠猶瞌睡露柱却惺惺處便止不妨令人疑著陽春雪曲難為和者乃復云惺惺直言惺惺歷歷直言歷歷下里巴歌豈堪王者之聽雖然他道不得認奴作郎喫飯穿衣是奴擎拳竪指是奴畢竟郎在甚麼處洞山示眾天晴葢却屋乘時刈却禾輸納王租了鼓腹唱謳歌薦福璨云打淨潔毬子誰人不會開先則不然天晴葢却屋乘時刈却禾輸納王租了秋冬事轉多呵呵呵喚不回頭怎奈何枝山選云洞山家法固是嚴密撿點將來惜乎太殺安排枝山者裏田不耕稅不納幾間敗屋隨緣修補也無甚謳歌可唱諸仁者且道枝山家法與洞山家法相去多少潭州北禪智賢禪師青九福嚴雅嗣除夕小參年窮歲盡無可與諸人分歲老僧烹一頭露地白牛炊黍米飯煑野菜羮燒榾柮火大家喫了唱村田樂何故免見倚他門戶旁他墻剛被時人喚作郎便下座歸方丈至夜深維那入方丈問訊曰縣裏有公人到禪曰作甚麼那曰道和尚宰牛不納皮角禪遂捋下頭帽擲地上那便拾去禪下禪床擒住曰賊賊那乃還帽曰天寒且還和尚禪呵呵大笑那出去時法昌為侍者禪顧昌曰者公案作麼生昌曰潭州紙貴一狀領過仰山欽云活剝耕牛北山是則好手其奈墻壍不牢被個販私鹽漢子和贓捉敗天寧則不然今夜無可管顧諸人不免烹個獨角泥牛炊無米飯唱無聲曲與諸人分歲忽有個漢出來道有公人索和尚筋角便與和聲一棒何故有功者賞寶華忍云北禪將官路當人情虗裝好體面欽祖貼別人不發積連你一齊窮靈祐則不然也不烹露地白牛免得天寒地凍捋帽露頂也不宰獨角泥牛免得年窮歲盡動棒勞神然雖如是畢竟如何是分歲一句乃拽杖便歸方丈寶壽方云新雲門今夜無可與諸人分歲也煑些野菜羮炊黍米飯與眾兄弟喫了燒榾柮火也唱個村田樂只是不烹露地白牛何故不欲將常住物私做人情佛川義云埜山者裏也無潭底月可㓟也無嶺頭雲可切也無折角泥牛可宰也無露地白牛可烹但向氷河中取火枯木上拈花緩操沒絃琴謾吹無孔笛唱個菩薩蠻與諸人分歲去也良久云哩囉哩哩囉囉哩囉囉哩相州天平山從漪禪師青九清谿進嗣到西院旬日甞自曰莫道會佛法覔個舉話底人也無院聞而默之異日上法堂院召曰上座漪舉首院曰錯進三兩步院又曰錯近前院曰適來兩錯是上座錯是思明老漢錯曰是從錯院曰錯錯乃曰上座且在者裏過夏共汝商量者兩錯不肯便去住後每舉前話曰我行脚時被業風吹到汝州有西院長老勘我連下兩錯更留我過夏待共我商量我不道恁麼時錯我發足向南方去時早知錯了也首山念云據天平作恁麼解會未夢見西院在何故話在昭覺勤云如今人聞他道未發足向南方時早知道錯了也便去卜度道未行脚時自無許多佛法禪道及至行脚被諸方熱瞞不可未行脚時喚地作天喚山作水幸無一星子事若總恁麼作流俗見解何不買一片帽大家戴有甚麼用處佛法不是者個道理龍翔訢舉雪竇頌畢云者則公案叢林中商量者多決斷者少中峰今日為諸人斷看一人監主自盜一人賣賊放贓一人知而不首各與三十拄杖何也速則易改久則難追愚菴盂云山僧要與二老把臂同行西院要做他家嫡骨兒孫觀風知變不昧其源七事隨身師子威獰有照有用將道天平是個人臨濟爪牙實有望焉那知是個抱橋柱洗澡漢有欲與天平雪屈者試來與愚菴商量者四錯看五祖岡云假使九洲之鐵也難鑄此兩錯鳳山啟云天平老釘樁搖櫓將魚目要與龍王鬬富可謂不知量矣若也主賓互換與奪自如非惟不負西院亦不致擔板到底西遯超云古今知識判斷者多要皆冬運機籌各立營寨但未識孫吳兵法有主客強弱之勢在我耳老夫今用唐虞三代之風掃却諸軍陣勢貴圖君尊臣奉父嚴子順以見太平景象還會麼莫帶累二大老做了瞎漢白巖符云適來者兩錯是上座錯是思明老漢錯錯錯天平當時下得者兩錯管取西院懡㦬而休免見後來費却許多唇舌至今遭人撿點
