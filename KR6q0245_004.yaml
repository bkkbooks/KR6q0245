body:
  text: 古杭白巖嗣祖沙門淨符彚集應化聖賢東土欣州一老翁因佛陀波利尊者遊臺山老翁見乃問向什麼處去尊者曰臺山禮文殊去老翁曰大德見文殊還識否尊者無對汾陽昭代云今日慶幸雲門澄云當時便作禮三拜老翁若更如何若何轉身拽杖竟去臺山老翁問佛陀波利曰尊者何來者曰西國來翁曰還將得佛頂尊勝經來否者曰不將得來翁曰空來何益尊者遂回太陽玄云當初下得甚麼語得與老翁相見免回西天乃展兩手似伊雲門澄云還將得佛頂尊勝經來否對曰將得來他若道何不呈似老翁但近前叉手云適才山下被人借去了也老翁更若如何若何便與一喝拂袖竟去臺山翁因永嘉無著法師謁五臺至金剛窟遇翁翁引升堂命坐翁問近自何來曰南方翁曰南方佛法如何住持曰末法比丘少奉戒律翁曰多少衆曰或三百或五百著却問此間佛法如何住持翁曰龍蛇混雜凡聖同居曰衆多少翁曰前三三後三三汾陽昭代著云識得你靈雲勤因雪峰問老翁道前三三後三三意旨如何勤云水中魚山上鳥峰云意作麼生勤云高可射兮深可釣徑山杲云我當時若見只向他道和尚如此住持直是不易天童傑云或三百或五百且置勿論祇如老翁云前三三後三三如何話會良久云竹影掃階塵不動月穿潭底水無痕天寧琦云畢竟前三三後三三是多少有者道前三三後三三我不如你你自會得好佛日晳云當時山僧若在各與三十痛棒縛作一束拋向萬年冰下凍得伊嘴扁免使後代人妄自分南分北較多較寡今日設更有個不唧𠺕的出來問隆安佛法如何住持向道將此深心奉塵剎曰衆多少朝去八百暮到三千山僧恁麼答話且道與古人孰優孰劣良久乃橫按拄杖云除却華山陳處士誰人不帶是非行臺山翁與無著茶次翁拈起玻璃盞問曰南方還有者個麼曰無翁曰尋常將什麼喫茶著無對洞山價代展兩手又云有無且置借取者個看得麼曹山寂代云久承大士按劍為什麼處在一塵長慶稜代云若與麼癡客勸主人汾陽昭云謝顧問雲門澄代無著當時但拱手云謝茶寶壽方云老翁言中有響句裏藏鋒爭奈無著者漢是個無孔鐵錘寶壽新代云原來你不曾到我南方在白巖符云尋常將什麼喫茶我若作無著當時但舉盞吸乾復索童子云斟茶來他若眼目定動便與撲碎盞子便行直教疑殺者老翁去在臺山翁因與無著話久日色稍晚著曰擬投一宿得否翁曰汝有執心在不得宿曰某甲無執心翁曰汝曾受戒否曰受戒久矣翁曰汝若無執心何用受戒著辭退翁令均提童子相送著問童子曰前三三後三三是多少童召大德著應諾童子曰是多少洞山價云欲觀其父先觀其子汾陽昭於何用受戒處代著云悔出前言於童子曰是多少處代著云識得你金陵寶志禪師問一梵僧曰承聞尊者喚我作屠兒曾見我殺生否曰見志曰有見見無見見不有不無見見若有見見是凡夫見無見見是聲聞見不有不無見見是外道見未審尊者如何見僧曰你有此等見耶汾陽昭代志公云不枉西來寶志十二時辰歌曰雞鳴丑一顆圓光明已久內外推尋一總無境上施為渾太有天目禮云大小志公只向境上著倒山僧則不然有時因好月啓戶望前峰寶志垂語曰終日拈香擇火不知身是道場玄沙備別云終日拈香擇火不知真個道場雪竇顯云一對無孔鐵錘昭覺勤云終日拈香擇火不知拈香擇火天童覺舉志公語畢云弄精魂漢有什麼限舉玄沙語畢云奇怪八十翁翁入場屋不是小兒戲復云且道利害在什麼處有智無智較三十里報恩秀云身是道場髑髏前見鬼無數真個道場何妨徹底承當雖然楚人失弓楚人得之未若人失弓人得之尤為得也敬畏空云諸禪德既云身是道場未審佛在那裏還要見麼乃豎拂子云容顏甚奇妙龍池傳云老僧晚年無事終日祇是拈香擇火古南門云諸人每日拈香擇火還見寶公也無若見正好喫棒佛川宗別云終日拈香擇火不是拈香擇火婺州雙林善慧大士因梁武帝請講經士才升座以尺揮案一下便下座武帝愕然寶志乃問陛下還會麼帝曰不會志曰大士講經竟白雲端云大士與志公被武帝一狀領過汾陽昭云講得甚好本覺一云大士已是葛藤志公重下注腳諸人如今要聞麼良久云兩段不同收歸上科磬山修舉白雲端語畢云三大老一人有定國之謀一人有安之智一人有過量之才可惜武帝未能搆得雖然帝王自有擎天略不動干戈定太平白巖符云大士志公雖善分科演義要且未解講經總不如衍老當時却較些子法海猊云大士據虎頭志公收虎尾武帝聻良久云四海浪平龍睡穩九天雲靜鶴飛高大士曰法地若動一切不安天寧琦云壽山從朝至暮不知走了幾遭若是法地誰敢動著一莖草復云我不爭恁麼道傅大士坐了起不得大士曰有物先天地無形本寂寥能為萬象主不逐四時凋寶壽方云有物先天地將什麼作眼無形本寂寥舉拂云者個聻能為萬象主天際日上月下作麼生不逐四時凋瞞歷代老古錐即得山僧則不然無物先天地有形本寂寥不為萬象主常逐四時凋且道與大士是同是別城山洽云大士恁麼主張引人向鬼窟裏作活計者裏則不然有物先天地無時不寂寥能為萬象主亦逐四時凋大士一日披衲頂冠靸履朝見梁武帝帝問是僧耶士以手指冠帝曰是道耶士以手指靸履帝曰是儒耶士以手指衲衣汾陽昭代云大士多能五祖戒云笑殺傍觀五峰甫云武帝若是個作家君王好立刻趕者碧眼胡出國何故譏察異言異服律有明條獅峰遜云傅大士抖擻三百六十骨節做盡伎倆不消武帝一個耶字冰消瓦解了也大士有偈曰夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止纖毫不相離如身影相似欲識佛去處祇者語聲是玄沙備云大小傅大士祇認得個昭昭靈靈報慈遂徵云且道他認不認若認他又是補處彌勒不可認也若不認玄沙又與麼道不可徒然雪竇顯於欲識佛去處下別語云三生六十劫乃云天下衲僧跳不出直饒口挂壁上漢別有一竅勘過了打又云玄沙也是打草驚蛇九峰勤云大小傅大士向一法中而見有異九峰即不然夜夜困即眠朝朝覺即起洞山聰云九峰大力量人言不虗發洞山又不然困來即便眠覺來即便起只如你衲僧家白日還打睡麼雖然如是三十年後且莫和泥合水法昌遇云傅大士如張漫天網羅龍打鳳奈何鱗甲羽毛總在裏許逃生無路若是靈禽異獸決定別有生涯保寧勇云玄沙道大士只認得個昭昭靈靈洞山道你衲僧家白日還打睡麼者兩轉語誰言世上無仙客須信壺中別有天保寧亦有一偈要眠時即眠要起時即起水洗面皮光啜茶溼却嘴大海紅塵飛平地波濤起阿呵阿呵呵囉哩哩囉哩崇先奇云大小傅大士話作兩橛在衲僧門下自救不了何故須知遠煙浪別有好商量南嶽慧思禪師因志公令人傳語云何不下山教化衆生目視雲漢作麼思曰三世諸佛被我一口吞盡何處更有衆生可教化五祖戒代志公又傳語云更説道理看報慈遂徵云且道是山上語山下語雪竇顯云有什麼屎臭氣翠巖芝云思大祇見錐頭利不見鑿頭方天聖泰云思大祇知開口寶公平地喫交雲居舜云思大和尚志公未傳語前猶較些子保寧勇別思大語云傳語法師合取狗口雲居莊云兩個漢總與一坑埋却不為分外雖然也不得草草良久云雲自帝鄉出水從江漢流獅林則云一人拖泥帶水一人斂手縮腳徐六擔板遭人點檢召衆云寶公思大二大老即今在山僧拄杖頭上眉毛撕結共展神通還見麼拈起一枚無孔笛臨風丁倒兩頭吹天寧琦代志公復傳語云勘破了也龍翔欣云思大被志公一拶直得倒退三千里天童忞云志公傳語不是好心思大雖是本色人未免落他圈繢簡點將來猶少機關在者裏還有為思大作主者麼拈拄杖云儂家不管興亡事一任和雲占洞庭棲霞成云思大高踞南嶽峰頂自謂羲皇上人却被志公輕輕一拶便見手忙腳亂黃檗琦云蚌𧑐相持俱落漁人之手天目律云將謂思大有甚長處龍唐柱云志公慣向第二門頭賣弄要扯別人上他門戶幸是思大深辨來風才見本色住山人雖然總不如龍唐者裏衲被蒙頭萬事休此時山僧都不會演教泐云從苗辨地因語識人寶公可謂運籌帷幄決勝千里思大雖則眼空四海要且不知性命落在別人手裏還有為思大作主者麼若無舉鼎拔山力千里烏騅不易騎白巖符云者漢一釣便上三世諸佛一口被我吞盡噫且緩緩天台豐干禪師一日欲去遊五臺向寒山拾得曰你共我去遊便是我同流若不去不是我同流山曰你去遊作什麼干曰禮文殊山曰你不是我同流翠巖芝云大似辨才見蕭翼寶壽方云明施縱奪還他寒山暗下鉤錐須是豐干者漢是則是在我衲僧門下並須喫棒靈溪昱云五更侵早起更有早行人天台寒山子因趙州遊天台路次相逢見牛迹山問曰上座還識牛麼州曰不識山指牛迹曰此是五百羅漢遊山州曰既是羅漢因什麼却喚作牛去山曰蒼天蒼天州呵呵大笑山曰作什麼州曰蒼天蒼天山曰者小廝兒却有大人作略靈巖儲云寒山也是虗空裏剜窟竉趙州眼光爍破四天下盡力道祇道得個不識國清要問諸人祇如寒山趙州一等道蒼天蒼天還有優劣也無一僧出云蒼天蒼天儲云識得你也僧擬議儲却云蒼天蒼天寒山子因衆僧炙茄次山將茄丳向一僧背上打一下僧回首山呈起茄丳曰是什麼僧曰者風顛漢山却向傍僧曰你道者個師僧費却我多少鹽醬寶峰文云寒山打者僧實為費鹽醬多莫別有道理黃龍清云寒山子只知為者僧費多少鹽醬不知自己拋撒更多且道什麼處是拋撒處良久云十方世界成狼藉一日收來五味全獅林則云大樹大皮裹小樹小皮纏者僧既受寒山點檢寒山也合受人檢點還知寒山合受檢點處麼試道看靈巖儲云寒山將常住物肆意拋撒全不顧潔淨地上狼藉者僧合水和泥鵝王擇乳素非鴨類諸人還識旁僧麼卓拄杖一下云三生六十劫城山洽云寒山弄白拈手段當面瞞人者僧當時何不便奪却茄丳打云茄子也不識寒山有偈曰吾心似秋月碧潭光皎潔無物堪比倫教我如何説保福權別云老僧則不然吾心似燈籠點火內外紅有物堪比倫來朝日出東靈溪昱云大小寒山出門不認貨好與三十拄杖且道是賞是罰檢點得出許你親見寒山天台拾得一日掃地次寺主問汝名拾得因豐干拾得汝歸汝畢竟名甚麼姓甚麼拾得乃放下苕帚叉手而立主再問拾得拈帚掃地竟去寺主罔測寒山捶胸曰蒼天蒼天拾得曰作甚麼寒山曰不見道東家人死西家人助哀二人作舞笑哭而去靈巖儲云寺主祇問一個姓名拾得將無量劫來氏族名字一齊陳出寺主直是妙智圓明分疏不下寒山雖將衆藝字母重為注疏幾多人作哭笑會不識自己姓名者不妨疑著明州憨布袋和尚嘗以杖荷一布囊凡供身之具盡貯囊中入肆聚落見物即乞無論醯醢魚𦵔才接入口遽分少許置囊中或於稠人處打開布袋撒下曰看看又一一拈示問人曰者個喚作什麼琅瑘覺云慈氏菩薩昭覺勤云熟處難忘白巖符云太狼藉生當時我若見好與捶折腳骨拐為什麼免見惑亂天下人無有了期布袋在街衢立有僧問和尚在者裏作什麼袋曰等個人僧曰來也袋遂於懷中取一橘子度與僧擬接袋却縮手曰汝不是者個人歸宗柔別云歸去來寶壽方云者僧也許伊是個行家只是猶欠些子待道等個人便好云與麼則請和尚先行他若更度橘子便好撫掌呵呵大笑拂袖竟去管教者漢懡㦬而休白落得一場狼藉棲霞成云布袋逢人便賣弄若不得個橘子幾被者僧賺却汝不是者個人賊過後張弓布袋將示寂於嶽林寺東廊下端坐磐石説偈曰彌勒真彌勒天童覺著語云拶破面門分身千百億築著鼻孔時時示時人高著眼時人皆不識當面諱卻偈畢安然而化天童覺云憨布袋攔街截巷直是無回避處還辨得麼腦後見腮莫與往來徑山及云慈氏如來三百六十骨節八萬四千毛竅一時撒向諸人懷裏了也敢問諸人還識得也未若也識得天下無彌勒地下無彌勒卓拄杖云此時若不究根源直待當來問彌勒寶壽新云盡大地是樓閣遍法界是彌勒為什麼有識有不識雖然且待來日金粟元云者漢不打自招山僧此者路見不平要與他華劈一上彌勒真彌勒少賣弄分身千百億者野狐精時時示時人費力作麼時人皆不識切莫壓良為賤或有路見不平底我要問他布袋和尚聻擬議不來驀頭便棒雍州萬年縣杜法順大師法身頌曰懷州牛喫禾益州馬腹脹天下覓醫人灸豬左膊上象田現云只者一頌如萬仞銀山無你措腳處又如一團栗棘無你下嘴處山僧不惜眉毛一一為諸人下個注腳懷州牛喫禾上大人益州馬腹脹丘乙己天下覓醫人化三千灸豬左膊上七十士諸禪德如其忍俊不禁出來道和尚恁麼也是將土泥裏洗却向他道爾小生八九子佳作人可知禮也西天祖師初祖迦葉尊者釋迦嗣踏泥次有一沙彌見乃問尊者何得自為祖曰我若不為誰為我為法眼益云我當時若見拽來踏泥五祖戒云迦葉與沙彌説得道理好洞山價云莫要茶喫麼保寧勇云雖然如是旁觀者哂西山音云大小尊者極善和泥合水二祖阿難尊者迦葉嗣問迦葉曰師兄世尊傳金縷袈裟外別傳個甚麼迦葉召阿難難應諾迦葉曰倒却門前剎竿著汾陽昭云不問那知五祖戒云露翠巖芝云千年無影樹今時沒底靴泐潭清云剎竿未倒穿却諸人髑髏換却諸人眼睛剎竿倒後向什麼處見釋迦老子雲居莊云若向剎竿未倒時會得埋沒先宗若向剎竿倒却後會得辜負自己且道世尊傳金襴外必竟別傳何物三面狸奴腳踏月兩頭白牯手拏煙萬峰蔚云迦葉喚阿難暗號私通倒却門前剎竿依前不會若問萬峰世尊傳金縷袈裟外別傳何物只對他道低聲低聲且道與古人是同是別萬峰藏云世尊傳的且道在金縷袈裟外在金縷袈裟內咄靈巖儲云盡道迦葉祇解推倒不解扶起殊不知尊者置毒藥於乳中亦能殺人亦能活人致使西天四七東土二三一個個析髓分皮曹溪路上迄今血滴滴地金粟元云盡道阿難被迦葉熱瞞殊不知迦葉被阿難勘破安國聰云阿難扶起迦葉推倒兩個無孔鐵錘就中有個恰好且道那個是恰好以手搖云明破即不堪九祖伏馱密多尊者佛陀難提嗣偈曰父母非我親誰是最親者諸佛非我道誰是最道者雲蓋本云父母非我親無有不親者諸佛非我道無有不道者祖師得第一句雲蓋得第二句有人添得一句許伊鼎足三分伏龍長云父母非我親我亦非親者諸佛非我道道亦非我者祖師也不得第一句雲蓋也不得第二句千巖碎身如微塵何止頭破作七分十祖脅尊者伏陀密多嗣因富那夜奢合掌前立尊者問汝從何來曰我心非往尊者曰汝何處住曰我心非止尊者曰汝不定耶曰諸佛亦然尊者曰汝非諸佛曰諸佛亦非翠巖芝云祖師與童子一問一答總欠會在如今作麼生會二十四祖師子尊者鶴勒那嗣因月氏國王聞其有道乃越國往見之尊者曰大王來時好道去時亦如來時王有省中峰本云飯裏沙泥中刺倣佛不同依俙相似大王來時好道去時亦如來時尊者黃金鑄面皮尊者因罽賓國王秉劍問師得蘊空否尊者曰已得蘊空曰既得蘊空離生死否尊者曰已離生死曰既離生死就師乞頭得否尊者曰身非我有豈況於頭王便斬之白乳涌高數尺王臂自落玄沙備云大小師子尊者頭也不解作得主雪竇顯云作家君王天然有在翠巖芝云尊者引頸國王舉劒正與麼時還有人諫得住麼至今無人斷得此公案如今衲僧作麼生斷琅瑘覺云罽賓好一口劒怎奈劒上無眼尊者好個師子要且不解返躑黃龍新云黃龍要問雪竇既是作家君王因甚臂落徑山杲云孟八郎漢又與麼去天寧琦云似則也似是則未是天童華云玄沙道大小尊者頭也不解作得主隨氀㲣漢玄覺徵云且道斬著斬不著將蝦釣鱉汾陽道知師不吝將錯就錯雪竇道作家君王天然有在提水救火翠巖道當時祖引頸王舉劒正與麼時還有人諫得麼至今無人斷得此公案如今衲僧作麼生斷莫要説夢芭蕉道賣寶撞著瞎波斯誣人之罪琅瑘道罽賓好一口劍怎奈劒上無眼尊者好個師子要且不解返躑賊過後張弓者一隊漢被山僧勦絶了也還見師子尊者麼驀拈拄杖卓一卓云修身慎行恐辱先宗龍池傳云我若作尊者才見問得蘊空否便云要頭便斫將去問什麼蘊空不蘊空古南門云雪竇祇解歸德于君不善承休于祖有人辨得罽賓國王師子尊者白頭如新傾蓋如故資國秀云國王機似星馳尊者用如電掣然雖各運神通未免均為落節何以如斯不見道作家不啐啐同時失寶壽新云尊者然則酬他宿命其中未必好心國王雖則據令而行未免腦門著地二十五祖婆舍斯多尊者師子嗣因與外道無我尊論義外道曰請師默論不假言説尊者曰不假言説孰知勝負曰但取其義尊者曰汝以何為義曰無心為義尊者曰汝既無心安得義乎曰我説無心當名非義尊者曰汝説無心當名非義我説非心當義非名曰當義非名誰能辨義尊者曰汝名非義此名何名曰為辨非義是名無名尊者曰名既非名義亦非義辨者是誰當辨何物如是往反五十九番外道杜口信伏太陽玄云蚌鷸相持死在漁人之手又云何用繁辭徑山杲云婆舍斯多何用忉怛當時若見他道請師默論不假言説便云義墮也即今莫有與妙喜默論者麼或有個衲僧出來道義墮也我也知你向鬼窟裏作活計天寧琦云我若作二十五祖才見外道入門便連棒打出豈不丈夫更待他道請師默論遠之遠矣二十七祖般若多羅尊者不如蜜多嗣因赴東印土國王齋次王問諸大德盡轉經師為甚麼不轉尊者曰貧道入息不居陰界出息不涉衆緣常轉如是經百千萬億卷汾陽昭代云却勞尊者心力報恩秀云者老漢無大人相把葫蘆馬杓翻騰一上當時好與掀倒打斷葛藤博山來云險處錐穩處劄國主探端灑不溼釘不入尊者機辨如是經還轉也未待你腳跟下線斷始知信受奉行尊者路行次或有人問汝行何急尊者曰汝行何慢又問汝姓甚麼尊者曰與汝同姓或凡或聖人莫可知天童悟云大小祖師被路人換却眼睛古林如云可怪尊者大路不行却向草窠裏輥
