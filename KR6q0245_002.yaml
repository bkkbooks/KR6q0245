body:
  text: 古杭白巖嗣祖沙門淨符彚集七佛世尊因文殊一日忽起佛見法見被世尊威神攝向二鐵圍山五雲逢云什麼處是二鐵圍山還會麼如今有人起佛見法見五雲與烹茶兩碗且道是賞伊罰伊白雲端云世尊當時無大人相如今有向承天者裏起佛見法見承天終不敢教動著他何謂如此但得雪消盡自然春到來五祖演云五祖則具大慈悲遂拍手云曼殊室利不審今後更敢也無良久乃自云一度被蛇傷怕見斷井索師林則云古人用處偏枯有前無後我者裏家法又別直饒不起佛見法見也須貶向二鐵圍山何故賞則俱賞罰則俱罰寶華忍云瞿曇白雲五祖三大老雖云扶樹綱宗要且未透末後句在曹山則不然者裏若有起佛見法見每人分半院與他何故一掌不浪鳴兩掌鳴摑摑開先金云文殊遭貶即不無正恁麼時且道瞿雲還免得二鐵圍山麼咦六月朔風吹大地家家屋上砌蹇霜菩提珍云世尊握閫外威權全提正令若非文殊也大難承當如今有人起佛見法見山僧願捨四大作禪牀供養世尊因調達謗佛生身陷入地獄乃令阿難往問你在地獄中安否調達曰我在此如三禪天樂世尊又令問你還求出否調達曰我待世尊來便出阿難曰佛是三界導師豈有入地獄分調達曰佛既無入地獄分我豈有出地獄分翠巖真云親言出親口徑山杲云既無出分又無入分喚什麼作釋迦老子喚什麼作提婆達多又喚什麼作地獄還委悉麼自携瓶去酤村酒却著衫來作主人天寧琦云妙喜與麼批判刁刀相似魚魯參差殊不知釋迦自釋迦調達自調達地獄自地獄料掉沒交涉一夜落花雨滿城流水香伏龍長云臨危不悚真大丈夫萬峰藏云既是三界導師為甚無入地獄分阿難直受始得寶華忍云世尊鈎頭有餌慣釣金鱗調達把定封疆全身賣俏堪笑阿難不唧𠺕當時若有衲僧氣槩待道我豈有出地獄分便好云將謂你謗世尊調達縱有通天伎倆也只得瓦解氷消白巖符云奇怪阿難一往看來大似替人傳語殊不知一個葫蘆敗盡兩家世尊因靈山會上五百比丘得四禪定具五神通未得法忍以宿命智通各各自見往昔弒父害母及諸重罪於自心內各各懷疑於甚深法不能證入於是文殊承佛神力遂手握利劒持逼世尊世尊乃謂文殊曰住住不應作逆勿得害吾吾必被害為善被害文殊師利汝從本已來無有我人但以內心見有我人內心起時我必被害即名為害於是五百比丘自悟本心如夢如幻於夢幻中無有我人乃至能生所生父母於是異口同聲而讚嘆曰文殊大智士深達法源底自手握利劒持逼如來身如劒佛亦爾一相無有二無相無所生是中云何殺天童傑云為人須為徹殺人須見血文殊費盡腕頭氣力要且不知此劒來處帶纍釋迦老子通身是口分踈不下五百比丘恁麼悟去入地獄如箭射忽若踏翻大海躍倒須彌雲門扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾又作麼生良久云自從舞得三臺後拍拍元來總是歌萬峰藏云我若作世尊待文殊來便一棒打殺免得比丘於無相無生處打之繞南山寶云世尊被文殊一拶直得將從前所有滯貨盡情拋出若不得五百比丘善能解腕縱文殊通身是手也收拾不及雖然如是在瞿曇門下則得衲僧門下一點也用不著崇先奇云世尊舍己從人慈悲太殺文殊權柄在手未得自由帶纍五百比丘髑髏粉碎於甚深法何曾夢見若是祖師門下直須血濺梵天不見道為人須為徹世尊因外道問不問有言不問無言世尊良久外道歎曰世尊大慈大悲開我迷雲令我得入遂作禮而去阿難乃白世尊曰外道見何道理稱歎而去世尊曰如世良馬見鞭影而行五祖戒云大小世尊被阿難一狀領過法眼益因僧請益云外道問世尊不問有言不問無言聲未絶眼遽約住云住住你擬向世尊良久處會那僧從此悟入雪竇顯云邪正不分過猶鞭影又云諸禪德迷雲既開決定見佛還許他同參也無若共相委知則天下宗師並為外道伴侶如各非印證則東土衲僧不如西天外道翠巖芝云大小世尊被外道當面塗糊祇如外道云令我得入要且未夢見在既不曾夢見為什麼却悟去楊岐會云世尊既捨己從人外道乃因齋慶讚溈山哲云外道懷藏寶鏡世尊親為高提直得森羅顯煥萬象歷然又得阿難金鐘再擊四衆共聞然雖如是大似二龍玩珠長他智者威獰雲居齊云什麼處是外道悟處衆中道世尊良久便是舉鞭處恁麼會還得否昭覺勤云外道因邪打正世尊看樓打樓阿難不善旁觀引得世尊拖泥帶水若據山僧見處待他道不問有言不問無言和聲便打及至阿難問外道有何所證亦和聲便打何故殺人須是殺人刀活人須是活人劒徑山杲舉雪竇語畢云邪正兩分正由鞭影天寧琦云欲識邪正不分麼誰是外道誰是世尊欲識邪正兩分麼世尊自世尊外道自外道此是天寧見處一任諸方貶剝壽昌經云此事可謂空谷傳聲虗堂習聽祇如世尊良久昭覺賜棒還是同是別若檢點得出則外道作佛其或未然佛即外道會麼龍飛鳳舞真奇怪不中胡僧碧眼看磬山修舉雪竇妙喜語畢云恰在鞭影裏批判且道離却鞭影一句作麼生道良久云三十年後此話大行福嚴容云世尊良久填溝塞壑外道得入灸瘢著艾且各與草鞋一緉要使疑殺天下今日或有問不問有言不問無言山僧惟豎一指且道與世尊是同是別古南門云雪竇恁麼道可謂明辨華夷雖然迷雲既開尚不見佛衲僧外道向甚處蹲立者裏透得許是同參南澗問云大小瞿曇鈍置太煞當時若是山僧便與和座掀倒然雖如是知我者少笑我者多報恩賢云法眼道住住汝擬向世尊良久處會那我要問不向良久處會向甚麼處會復云還知麼祇如者僧悟處與外道悟處是同是別若道是同灼然天下宗師盡為外道伴侶若道是別東土衲僧不如西天外道者裏緇素得許汝參學事畢百丈泐云運籌帷幄決勝千里不無世尊祇如外道便爾悟去且畢竟見何道理莫在世尊良久處麼情知你向者裏錯會棲霞成云外道置個問頭不出外道見解世尊據坐可謂大人器度不失赤子之心阿難猶自口喃喃真可發一冷笑然雖如是不因夜來鴈怎見海門秋佛日晳云雪竇妙喜二尊宿雖則氣吞佛祖名振古今檢點將來三十棒一棒也放他不過何故不合向鞭影邊妄分邪正崇先奇云世尊不但瞞人亦且自瞞被阿難一拶直得向驢前馬後立地者則且置祇如外道悟去還端的也未法雲云伶俐波旬一撥便轉多聞慶喜三搭不回直饒窺得鞭影猶是刻舟求劒世尊因波斯匿王問勝義諦中有世俗諦否若言無智不應二若言有智不應一一二之義其義云何世尊曰大王汝於過去龍光佛時曾問此義我今無説汝今無聞無説無聞是名一義二義翠巖真云波斯匿王善問不善答世尊善答不善問一人理上偏枯一人事上偏枯翠巖當時若見點一把火照看者黃面老子面皮厚多少薦福懷云諸仁者大王分明問世尊分明答賓主歷然作麼生説個無説無聞底道理愚菴盂云者黃面老子面皮厚多少祇可欺他俗漢被你當面熱瞞據山僧判斷將平天冠袞龍袍與世尊穿戴了將金縷袈裟與波斯匿王披了正恁麼時喚作世尊又是匿王喚作匿王又是世尊且道如何折合梅花連月和春送玉映清芬入戶來報恩賢云世尊雖則善答帶纍匿王墮在死水善權則不然待問一二之義其義云何舉起拂子云喚作拂子則觸不喚作拂子則背畢竟喚作甚麼待擬議隨與一喝直使匿王透去非惟不落一二之數亦且慶快平生靈巖儲云佛佛授手祖祖相傳如印印水似空合空雖則文彩全彰要且不存朕迹苟非具超方眼者未免又坐在無説無聞處或有問國清一二之義其義云何只對他道四海浪平龍睡穩九天雲靜鶴飛高世尊因外道問昨日説何法世尊曰昨日説定法曰今日説何法世尊曰今日説不定法曰昨日説定法今日何説不定法世尊曰昨日定今日不定五祖戒云世尊何得將別人物作自己用溈山哲云世尊大似看樓打樓大溈即不然待問昨日説定法今日何説不定法但云非汝境界薦福懷云黃面老子被外道拶著出自偶然雖然如此邪正未分若人辨得許你頂門具眼龍華宗云黃面瞿曇隨邪逐惡外道雖則言中有響怎奈眼裏無筋龍華若在一齊與他一頓世尊有異學問諸法是常耶世尊不對曰諸法是無常耶世尊亦不對曰世尊具一切智何不對我世尊曰汝之所問皆為戲論高峰妙云異學有言若啞世尊無語如雷者裏見得分明正是增益戲論何故諦聽諦聽世尊因黑氏梵志運神力以左右手擎合歡梧桐花兩株來供養世尊乃召仙人志應諾世尊曰放下著志遂放下左手一株花世尊又召仙人放下著志又放下右手一株花世尊又召仙人放下著志曰世尊我今兩手皆空更教放下箇甚麼世尊曰吾非教汝放捨其花汝當放捨外六塵內六根中六識一時捨却無可捨處是汝免生死處志於言下悟無生忍徑山琇云佛為三界大師尚墮在識情數量合喫二十棒梵志雖然悟去亦未出得識情數量合喫二十棒北山恁麼批判且道有過無過蕭何制律棲霞成云三界大師不合將閨閣中物搬出返被梵志看破若是壽昌待道我今兩手皆空更教放下個甚麼便與痛棒打出何故不見道殺人須用殺人刀活人須用活人劒世尊坐次見二人舁豬過乃問者個是什麼二人曰佛具一切智豬子也不識世尊曰也須問過太陽玄別二人語云不因世尊問洎乎忘却壽昌經云君子有成人之美萬峰藏云羿向前過世尊早墮了也萬壽範云世尊不是知而故問慣於平地生波設使此二人果是雄傑待問時即進前叉手而立曰老瞿曇你是甚麼心行敢保世尊有口如啞資福侶云利動君子黃梅覺云老瞿曇特殺無端當時恁麼問被二人呵呵大笑羿豬竟去又作麼生崇先奇舉太陽壽昌語畢云兩個老老大大都來以己方人殊不知黃面老子將欲取之必固與之白巖符云世尊老老大大向平地上撈甚魚蝦若不是者兩個孟八郎看你者番舉措如何合殺世尊在靈山會上拈花示衆是時百萬人天一皆默然唯迦葉尊者破顏微笑世尊曰吾有正法眼藏涅槃妙心實相無相微妙法門不立文字教外別傳付囑摩訶迦葉白雲端云迦葉善觀風雲別氣色雖然如是還覺頂門重麼黃龍心云直下穿過髑髏已是換却眼睛臨危不在悚人向甚處見釋迦老子雲峰悅因僧問靈山拈花意旨如何峰云一言既出駟馬難追迦葉微笑意旨如何峰云口是禍門石田薰云焦磚打著連底凍赤眼撞著火柴頭高峰妙云世尊扶頭迦葉扶尾直至如今擡舉不起莫有共著力者麼以兩手作扶勢云也只兀底耳徑山琇云世尊拈花人貧志短迦葉微笑馬瘦毛長若云吾有正法眼藏付囑摩訶迦葉也是空拳誑小兒烏石道云當時幸是迦葉一人設使百萬人天悉皆破顏微笑世尊正法眼藏涅槃妙心且道分付阿誰豎拂子云者裏還有破顏微笑者麼擊案云相識滿天下知心能幾人獅林則云今日不肖兒孫要問黃面老子者兩件物你從那裏得來待擬開口好與一喝雪竇雲舉手作拈花勢云衆中有解笑者麼若有可謂今之古之堪為英俊若無牙齒一具骨口唇兩片皮開合總由己胡為不自知喝一喝天童忞云從上祖禰不了至今殃及兒孫則且置且道靈山有付囑無付囑若道有付囑埋沒金色頭陀若道無付囑孤負釋迦老子試問諸人作麼生道得出格一句良久喝一喝云千聖不知何處去倚天長劒逼人寒金粟元云迦葉雖則動絃別曲怎奈鐵枷安在項上了也還有免得此過者麼直饒有也祇是個淈𣸩漢風穴喜云世尊具拏龍手迦葉有陷虎機然雖父為子隱子為父隱要且瞞他百萬人天一點不得雲菴悅云我若作飲光當時見伊道吾有正法眼藏云云便好再發一笑看者黃面老漢又如何折合崇先奇云一人訛言亂衆一人承虗接響總是髑髏前見鬼可惜當時一會俱不丈夫以致而今逐鹿不已五峰甫云就我看來總不如百萬人天在冷地裏眼骨轆地只管看且道他看個什麼看他兩個漢白日青天開了眼尿牀崇慶古云世尊平地骨堆飲光開眼失跌纍及後代兒孫烏龜却喚作鱉大衆山僧與麼批判也是徒勞唇舌阿呵呵金風一陳來掃却庭前葉崇化能云世尊拈花憐兒不覺醜迦葉微笑刺腦入膠盆白巖符云老瞿曇節外生枝大迦葉隨邪逐惡黃河水向源頭濁了也並須喫棒有分當時有人見他拈起青蓮便好一喝云草本不勞拈出他若更道吾有正法眼藏但以手捉鼻掩耳而出看者瞿曇別作個甚麼勾當世尊臨入涅槃文殊請再轉法輪世尊咄曰文殊吾四十九年未曾説一字請吾再轉法輪是吾曾轉法輪耶雪峰空徵云且道世尊從文殊請不從文殊請寶壽方云文殊如是問世尊如是答且道是轉法輪不是轉法輪若言是世尊向文殊曾説個甚麼來若言不是怎奈贓證現在友可玄云相逢盡道休官去林下何曾見一人白巖符云潦倒世尊靈龜拽尾瞞文殊則得我若見道請吾再轉法輪是吾曾轉法輪耶便好合掌云我今此去專為流通世尊於涅槃會上以手摩胸告衆曰汝等善觀吾紫磨金色之身瞻仰取足勿令後悔若謂吾滅度非吾弟子若謂吾不滅度亦非吾弟子時百萬億衆悉皆契悟雲峰悅云然則膏肓之病不足以發藥雲峰今日且作死馬醫汝等諸人皮下還有血麼東禪觀云其時衆中有個作者才見伊以手摩胸便出約住云瞿曇你者醜舉止休拈出也他若知非決定緘口免見百萬億衆墮邪倒見徑山沖云世尊平生用盡伎倆臨死之際求生不得生求死不得死山僧則不然要行便行要去便去八臂那吒擡不住遂化去徑山琇云病入膏肓莫能療治非但世醫拱手便是耆婆神醫只得倒退三舍北山遠孫今日却要為他療治去也乃豎拂子云巍巍堂堂煒煒煌煌觸處顯現初不覆藏遂擊拂子一下云柳色黃金嫩梨花白雪香高峰妙云黃面瞿曇四十九年顛之倒之橫説豎説貴圖末後殷勤殊不知賺他百萬億衆至今墮在鐵圍山下無由解脫雲居莊云瞿曇末上一場敗闕百萬億衆中更無一人有衲僧氣息諸人還見世尊以手摩胸麼水向石邊流出冷風從花裏過來香清化嶾云當時山僧若在但輕輕向世尊背上撫一下云老不休心非但令瞿曇滿面慙惶亦免使百萬人天杓卜聽虗聲崇先奇云漆以堅自割膏以明自焚黃面瞿曇至死不變強哉矯世尊既入涅槃迦葉尊者最後至世尊乃於棺中露雙趺示之迦葉作禮請如來以三昧火而自闍維即時金棺從七寶牀升舉繞拘尸羅城七匝却還本處化火光三昧而自焚之城山洽云黃面老子賣弄四十九年猶未足意臨末梢頭又做出許多伎倆真個不知死活雖然如是粉骨碎身未足酬諸經附法華經曰止止不須説我法妙難思諸增上慢者聞必不敬信天寧琦云説了也止得麼黃面老人分踈不下卓拄杖云有時拈在千峰頂劃斷天雲不放高寶壽新曰昔日有僧入冥見地藏藏曰你平生修何行業僧曰持法華經地藏乃問止止不須説為是説為是不説僧無對壽代僧云何必重宣白巖符云潦倒世尊把不住拏不牢將無上寶聚狼藉殆盡而乃云止止不須説此處無金三十兩圓覺經曰居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實雪堂行云枯樹雲充葉凋梅雪作花擊筒方木響蘸雪喫冬瓜長天秋水孤鶩落霞天童傑云釋迦老子擔得一擔矇𥋾出來撞著雪堂添得一擔顢頇祥符不是壓良為賤也要緇素分明生鐵鑄牛頭牽犂還拽耙智者笑欣欣愚人驚怪差古往今來幾百年更向鬼門重貼卦驀拈拄杖云看看釋迦老子來也向諸人道據虎頭收虎尾第一句下明宗旨乃卓一卓下座天寧琦云若然者道有也得道無也得向上也得向下也得得也得不得也得數片白雲籠古寺一條緑水繞青山報恩秀云居一切時不起妄念不於諸妄心亦不息滅不住妄想境不加了知不於無了知不辨真實不圭峰科此一段謂之忘心頓證又名忘心入覺萬松下四個不字且道合屬那一科博山來云四個不字是殺人刀是活人劒點鐵成金旋天轉地萬松門下卓卓全該若是絶學沙門更須從頭刪過吽楞嚴經曰若以能推的是汝心則認賊為子龍濟修別云若能推的不是汝心則認子為賊天童覺云如今推也是子是賊買帽相頭食魚去骨寶壽新云世尊只知其一不知其二龍濟只知其二不知其一者裏則不然能推的是心也得不是心也得何故朝朝正月半夜夜是元宵楞嚴經曰吾不見時何不見吾不見之處若見不見自然非彼不見之相若不見吾不見之地自然非物云何非汝博山來云盡大地是個釋迦阿難𡎺著釋迦鼻孔盡大地是個阿難世尊裂破阿難胸襟且道向甚麼處見甚麼處不見者裏著得一隻眼黃面瞿曇非但瞞人亦乃自瞞楞嚴經曰一人發真歸元十方虗空悉皆消殞五祖演云一人發真歸元十方虗空觸著磕著昭覺勤云一人發真歸元十方虗空錦上添花洞山度云一人發真歸元十方虗空八字打開乃展兩手下座楞嚴經曰見見之時見非是見見猶離見見不能及能仁圭云落花有意隨流水流水無心戀落花楞嚴經曰諸可還者自然非汝不汝還者非汝而誰能仁圭云常恨春歸無覓處不知轉入此中來喝一喝云三十年後莫道能仁教壞人家兒女楞嚴經曰汝但棄其生滅守於真常常光現前根塵識心自然銷落靈巖儲喝一喝云黃面老子和麩糶麵二千年來罕人酬價天寧既開者個行戶難教客貨久滯今朝一時攤向人前知時達變者便請滿載而去其或遲鈍卓拄杖云早晚行情不定莫言不道金剛經曰若有人持誦此經為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業即為消滅博山來云者般説話縛殺多少人解脫多少人兼雌帶黃滅胡種族若以因果評入地獄如箭射金剛經曰若見諸相非相即見如來法眼益別云若見諸相非相即不見如來天童覺云世尊説如來禪法眼説祖師禪會得甚奇特不會也相許寶華忍云大小世尊抱橋柱洗澡不肖則不然若見諸相非相即見諸相雖然要見如來則易見諸相則難白巖符云世尊話作兩橛法眼只見一邊者裏則不然若見諸相不必更見如來雖然在祖師門下須別有長處始得乃喝一喝涅槃經曰諸行無常是生滅法生滅滅已寂滅為樂徑山杲云真生無可生真滅無可滅寂滅忽現前蝦蟆吞却月天寧琦云寂滅不現前心心生與滅龜毛扇子扇泥牛一點血天奇瑞云世尊為大千世界之法主何得似靈龜拽尾拂迹成痕既是諸行無常因甚却存寂滅興善廣云可惜者黃面漢話作兩橛
