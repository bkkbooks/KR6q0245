body:
  text: 古杭白巖嗣祖沙門淨符彚集南三洪州黃檗斷際希運禪師南三百丈海嗣上堂汝等諸人盡是噇酒糟漢與麼行腳何處更有今日還知大唐國裏無禪師麼時有僧問祇如諸方尊宿盡聚衆開化為什麼却道無禪師檗曰不道無禪只是無師仰山寂云鵝王擇乳素非鴨類五祖戒代僧云謝和尚説得道理好石門聰云黃檗垂示不妨奇特才被這僧拶著失却一隻眼翠巖真云諸方盡道黃檗坐却者僧又道黃檗被者僧上來直得分疏不下殊不知霧豹澤毛未嘗下食庭禽養勇終待驚人法昌遇云我要無禪底做國師徑山杲云且道是醍醐句是毒藥句天童悟云黃檗大似龍頭蛇尾當時待道諸方匡徒領衆又作麼生何不和聲便打更若擬議連棒打出開先金云黃檗者漢眼空四海因甚被個布衲拶著便見瓦解冰消且道黃檗意作麼生要會麼三盞酒莊公子面一枝花插美人頭愚菴盂云黃檗一時將個正法眼擉瞎要津坐斷却被個噇酒糟漢一拶粉碎洞山瑩云黃檗雖則眼蓋乾坤氣吞寰宇要且太煞嘮嚷還有知黃檗落節處的麼良久云險資福廣云黃檗此語淚出痛腸不知者以為凌駕諸方恁麼則深屈古人也辨山管見略露一班良久云短歌微吟不能長法雲古云黃檗老漢大似倚勢欺人壓良為賤才被者僧一拶便乃眼睛卓朔口裏糢糊雖然如是還知古人落處麼慣釣鯨鯢澄巨浸却嗟蛙步輾泥沙黃檗因百丈問甚麼處去來檗曰大雄山下採菌子來丈曰還見大蟲麼檗便作虎聲丈拈斧作斫勢檗遂與丈一摑丈吟吟而笑便歸升堂謂衆曰大雄山下有一大蟲汝等諸人也須好看百丈老漢今日親遭一口仰山寂云百丈只解騎虎頭不解把虎尾五祖戒云百丈大似作賊人心虗黃檗熟處難忘雲居莊云師資相得針芥相投機鋒互換照用齊行譬如二龍爭珠拏雲攫霧不動波瀾二虎奪食活捉生擒不傷物命有者道百丈無陷虎之機黃檗有超師之作如斯理論刺腦入膠盆以拂子劃一劃云劈開華嶽連天秀放出黃河徹底清白巖符云盡謂這漢在草窠裏撥出個三腳蝦蟆便爾向十字街頭誇張賣弄豈大方之識度歟然據山僧看來也只好信他一半法忍謐云看他父子拳來拳應踢來踢應大似虎驟龍驤令人不可捉摹復乃升堂告衆是甚好心檢點將來總是有頭無尾黃檗在南泉為首座一日齋時捧鉢向南泉位上坐泉入堂見乃問長老甚麼年中行道檗曰威音王已前泉曰猶是王老師兒孫下去檗便捧鉢過第二位溈山祐云黃檗大似欺敵者亡仰山寂云不然須知黃檗有陷虎之機溈云子見處得與麼長雪竇顯云可惜王老師只見錐頭利我當時若作南泉待伊道威音王已前即便於第二位坐令黃檗者漢一生起不得雖然如此也須救取南泉雲峰悅云叢林盡道黃檗有陷虎之機南泉具殺虎之用若作與麼説話誠實苦哉殊不知者老賊有年無德喫飯坐處也不依本分若向雲峰門下説甚威音王已前更有大於王老師者總須喫棒趂出徑山杲云何待問他甚年行道才入堂見他在主位便捧鉢向第二位坐直饒黃檗有陷虎之機擬向甚處施設寶華忍云有收有放互換主賓黃檗固是作家不但騎虎頭亦解收虎尾南泉更為好手溈山云欺敵者亡也是火上著油仰山云須知黃檗有陷虎之機大似冷處著把火四大老分疆列土各自稱尊全提則俱全提敗缺則俱敗缺山僧今日將溈仰父子南泉叔姪縛作一團拋向諸人面前了也還有為四大老出氣者麼愚菴盂云王老師年尊何不退位致使後代兒孫向頭上屙是何道理靈隱禮云山僧住持事繁無暇為諸子葛藤只將者兩個漢放在語下作個注腳今日莫有坐山僧位者麼若有山僧捧鉢便歸方丈看他作麼生合煞壽昌存云二大老一等聲應氣求大似埋兵掉鬪檢點將來要且不是好心西遁超舉溈山欺敵者亡語畢云溈山此語似乎蹉過黃檗殊不知溈山者漢慣於埀鈎所謂借他香餌投青海引得鯤鼇上直鈎仰山道黃檗有陷虎之機此語似乎智過于師檢點將來也是擎將清水祭潮神溈山道子見處得與麼長人都謂深肯仰山不覺滿口稱贊不知溈山手腳更捷即就仰山之機還用仰山身上後來尊宿將此藥頭往往送入人口而往往當面蹉過或有道當時仰山因甚無後語向他道再參三十年黃檗因百丈問運闍黎開田不易檗曰隨衆作務丈曰有煩道用檗曰爭敢辭勞丈曰開得多少田檗將钁築地三下丈便喝檗掩耳而去溈山云黃檗開田功不浪施百丈住持令不虗行琅瑘覺云百丈一喝可謂埀絲於萬丈潭中黃檗掩耳獨聳於千峰頂上黃檗行腳在洪州開元寺偶裴相國休公到見壁間畫像問院主曰壁間是甚麼像主曰高僧真儀公曰真儀可觀高僧何在主無對公曰者裏有禪師否主曰近有一僧投寺頗似禪者公遂請相見舉前話問曰真儀可觀高僧何在檗朗聲曰裴休公應諾檗曰在甚麼處公於言下領旨徑山杲云裴公將錯就錯脫盡根塵黃檗信口埀慈不費心力似地擎山不知山之孤峻如石含玉不知玉之無瑕雖然如是黃檗只有殺人刀且無活人劍今日大資相公或問雲門真儀可觀高僧何在雲門亦召相公相公若應諾雲門即向道今日堂中特謝供養天寧琦云斐相國道高僧何在分明換卻眼睛黃檗更召相公剛把鉢盂安柄老妙喜與人錯下注腳便道似地擎山不知山之孤峻如石含玉不知玉之無瑕蹉過了也天寧則不然亦召相公相公應諾劈脊便棒免教者漢向死水裏淹殺博山奉云黃檗雖因風吹火用力不多檢點將來只有殺人刀且無活人劍黃檗因遊天台路逢一僧如舊識熟視之目光射人乃偕行屬澗水暴漲植杖而立僧率同渡檗曰兄要渡自渡僧乃褰衣躡波若履平地回顧曰渡來渡來檗曰咄者自了漢我早知當斫汝脛其僧歎曰真大乘法器我所不及慧雲盛云黃檗有膽無心放過者僧見他渡去好向道你只解恁麼去不解恁麼來待其渡來拈拄杖痛與一頓黃檗一日揑拳曰天下老和尚總在者裏我若放一線道從伊七縱八橫若不放過不消一揑僧便問放一線道時如何檗曰七縱八橫曰不放過不消一揑時如何檗曰普雲門偃因僧問如何是七縱八橫偃云念老僧年老如何是普偃云天光回照如何是天光回照偃云骼觜少人知黃檗示衆自達磨大師到中國惟説一心惟傳一法以佛傳佛不傳餘佛以法傳法不説餘法法即不可説之法佛即不可取之佛佛乃是本源清淨心也瑞巖慍云黃檗將達磨大師鼻孔出氣將謂無人檢點山僧不是抑他威光祇要家平戶怗黃檗因裴相國捧一尊像跪請曰乞師安名檗召裴休公應諾檗曰與汝安名竟公乃作禮曰謝師安名雪竇顯代休當時便喝徑山杲云裴公黃檗可謂如水入水似金博金雖然如是檢點將來不無滲漏今日蔡郎中或捧一尊像請雲門安名即向道清淨法身毗盧遮那佛若云謝師安名更向道下坡不走快便難逢天寧琦云裴公捧像黃檗安名冷地看來如阿家教新婦相似直是好笑笑須三十年妙喜既不能坐斷未免隨例顛倒便喚作清淨法身毗盧遮那佛周人以柏殷人以栗黃檗因南泉問定慧等學明見佛性此理如何檗曰十二時中不依倚一物始得泉曰莫便是長老見處麼檗曰不敢泉曰漿水錢且置草鞋錢教誰還檗休去雲峰悅云若不同牀睡焉知被底穿徑山杲云路逢劍客須呈劍不是詩人莫獻詩天寧琦云又是得便宜又是落便宜愚菴盂云老僧則不然南泉還漿水錢黃檗償草鞋錢不見道賊是小人智過君子黃檗因六僧新到五僧作禮一僧提起坐具作一圓相檗曰我聞有一隻獵犬甚惡曰尋羚羊聲來檗曰羚羊無聲到汝尋曰尋羚羊迹來檗曰羚羊無迹到汝尋曰尋羚羊蹤來檗曰羚羊無蹤到汝尋曰與麼則死羚羊也檗便休去明日升座曰昨日尋羚羊僧出來僧便出檗曰昨日公案未了老僧休去你作麼生僧無語檗曰將謂是本色衲僧元來祇是義學沙門連棒打出雪竇顯云只如聲響蹤迹既無獵犬向甚處尋逐莫是絶聲響蹤迹處見黃檗麼諸禪德要明陷虎之機也須是本分衲子古南門云黃檗鉤頭有餌者僧隨鉤直上雖然既為獵犬因甚羚羊到面前也不識若是個漢待黃檗云羚羊無聲到汝尋便把住云者老漢原來只在者裏恁麼則稍有衲僧氣息黃檗縱有陷虎之機又向甚處施設龍華體云雪竇龍頭蛇尾帶纍黃檗墮在聲迹坑穽當時者僧若是個本分衲子待道羚羊無聲到汝尋便好云不勞再勘拂袖便出直饒黃檗通身是眼也鑑伊不得保福達云與麼答話大似酒後當時接臨濟的甚處去也不妨令人疑著乃曰昨日公案未了老僧休去你作麼生龍頭蛇尾漢好與者僧一狀領過福州長慶大安禪師南三百丈海嗣住大溈時號懶安室中每問僧有句無句如藤倚樹意旨如何疏山仁聞特入嶺請益值慶泥壁次便問有句無句如藤倚樹豈不是和尚語慶曰是山曰忽遇樹倒藤枯句歸何處慶放下泥盤呵呵大笑歸方丈山隨後曰某甲三千里賣却布單特為此事而來和尚何得相弄慶喚侍者取錢二百與者上座去且囑曰向後有獨眼龍為汝點破在山後到明招舉前話招曰大溈可謂頭正尾正祇是不遇知音山亦不契猶問曰樹倒藤枯句歸何處招曰却使溈山笑轉新山於言下大悟乃曰溈山元來笑裏有刀開福寧舉有句無句語了良久云會麼深秋簾幕千家雨落日樓臺一笛風天目禮云有句無句如藤倚樹坐斷千差毒蛇當路樹倒藤枯句歸何處老僧直得五年分疏不下報恩秀云當時若問萬松有句無句如藤倚樹樹倒藤枯句歸何處但向道蒼天蒼天為什麼不見道春行冬令高峰妙云有句無句金烏吞玉兔如藤倚樹癩馬繫枯樁樹倒藤枯一冬燒不盡句歸何處石虎當途踞呵呵大笑龍頭蛇尾捺倒爛泥裏剛刀不斬無罪之人且道溈山過在甚處乃呵呵大笑下座杭州大慈寰中禪師南三百丈海嗣上堂山僧不解答話祇能識病時有僧出慈便歸方丈報慈遂徵云且道大慈識病不識病此僧出來是病不是病若言是病每日行住不可總是病若言不是病出來又作麼生雪竇顯云大凡扶樹宗乘須辨個得失且大慈識病不答話時有僧出便歸方丈雪竇識病不答話或有僧出劈脊便打諸方識病不答話有僧出必然別有長處敢有動著大唐天子只三人黃龍南云可惜放過當時見伊出來劈脊便打待伊知得行棒來處免見千古之下遭人檢點黃龍今日也識病會答話忽有個漢出來掀倒禪牀者裏合作麼生支準諸上座請代一轉語看翠巖芝云者僧才出大慈便歸方丈並無個道理什麼處是識病處如今也須子細天童覺云大慈雪竇二俱作家要且祇顧目前不防腳下或有個不識好惡不問東西底漢出來便掀倒禪牀直饒你全機大用祇恐著手腳不辦正當恁麼時還有識病底眼麼保寧茂云大慈只好依方修合自病却難下藥南堂欲云雪竇可使千古流芳要且未得勦絶若據山僧見處直須打了拖出何故大海不宿死尸愚菴盂云不是者僧怎見國手且道者僧是甚麼病我道者問便是還甘麼古南門云古南亦不解答話祇能識病有僧出但云膏肓之疾不堪醫治大衆動著了也若善承當便是千佛一數天童忞云大唐天子只三人雪竇太煞肋胸自點諸方必然別有長處布袋裏盛錐子不出頭是好手雖然既已見義不為非勇如今山僧亦識病不答話設有僧出便乃呵呵大笑若是諸方長處座中儘有江南客寶壽新云大慈與雪竇非唯識病亦且擅藥饒你盧醫扁鵲也須縮手歸降雖然祇如病犯膏肓作麼生治瞎七瞎八龍華體云辨山亦不解答話祇是識病待有僧出但向道太歲頭上不要動土才擬議連棒趂出白巖符云龍門萬仞雪浪稽天自非擅攫霧拏雲技者到者裏未免點額而歸雖然還識者僧麼大慈言云性空老漢雖則放去較危收來太速檢點將來總被者僧一狀領過西山音云山僧不識病祇解答話待有僧出山僧今日牙痛大慈因趙州問般若以何為體慈曰般若以何為體州呵呵大笑而出明日州掃地次慈却問般若以何為體州下掃拊掌大笑慈便歸方丈雪竇顯云前來也笑後來也笑笑中有刀大慈還識麼直饒識得也未免喪身失命溈山云才見呵呵大笑便與一掌明日問待伊大笑又與一掌大慈若下得者兩掌可謂生鐵鑄就風吹不入宗師家一等是搖撼乾坤直教如旱天霹𮦷萬里無雲轟一聲教他眼目定動豈不俊哉要識趙州大慈麼莫怪從前多意氣他家曾謁聖明君黃龍新云趙州金鍮不辨玉石不分直饒分去也未夢見大慈在黃龍震云般若非是無體二老不能知般若非是無用二老不能用若也能知能用一言可以截斷衆紛何必再三南華昺云兩個漢只解掩耳偷鈴不解移風易俗或有問南華般若以何為體劈脊便打待伊眼目定動却問般若以何為體靈俐漢忽然踏著必定自知落處古南門云雪竇與賊過梯古南則不然前來也笑後來也笑明眼衲僧分疏不下忽有個漢出來道古南也是與賊過梯直向道還我刀來大慈因僧辭問甚麼處去僧曰江西去慈曰我勞汝一段事得否曰和尚有什麼事慈曰將取老僧去得麼曰更有過於和尚者亦不能將去慈便休洞山價因其僧來舉似前話山責曰闍黎爭合恁麼道僧曰和尚作麼生山曰得法眼益別僧云和尚若去某甲提笠子汾陽昭代慈云知汝力微淨因成云者僧可謂擔頭不泊蠅是則固是要且只是個孤生獨死漢天童覺云大慈合伴不著者僧不如獨行也須是恁麼始得直饒大慈古佛也不奈者擔板漢何且道者漢別有什麼長處寶壽方別僧云某甲無者間氣力大慈示衆説得一丈不如行取一尺説得一尺不如行取一寸洞山價云説取行不得的行取説不得的雲居膺云行時無説路説時無行路不行不説時合行甚麼路洛浦安云行説俱到則本分事無行説俱不到則本分事在天童覺云絶是非沒蹤迹相逢不識面識面不相逢諸尊宿各有長處如今舌頭上無十字關腳跟下無五色線要行便行要説便説若有人問長蘆如何是要行便行向伊道步如何是要説便説向伊道阿廣胤標云者一夥漢一期拈弄各逞己見於唱教門中足可稱尊若到祖師門下各喫拄杖有分在雖然點石化為金玉易勸人除却是非難天台平田普岸禪師南三百丈海嗣僧參田打一拄杖僧近前把住拄杖田曰老僧適來造次僧却打田一拄杖田曰作家作家僧禮拜田把住曰是闍黎造次僧大笑田曰者個師僧今日大敗也鼓山賢云平田伸縮安間自是慣戰老將者僧前倨後恭遭他活陷真個弄巧成䂐雖然今日討者師僧亦不可得廣州安和寺通禪師南三百丈海嗣仰山作沙彌時一日喚寂子與我將牀子來山將到和曰却送舊處著山從之和復召慧寂山應諾和曰牀那邊是什麼物山曰枕子和曰者邊是什麼物山曰無物和復召慧寂山應諾和曰是什麼山無對和曰去高峰妙云潦倒安和用心不臧仰山命蹇為魅所著山僧恁麼道也是逆風秉炬洪州百丈法正禪師南三百丈海嗣嘗誦涅槃經不言姓名時呼為涅槃和尚一日謂衆曰汝等與我開田我為汝説大義衆開田了禮拜曰請和尚説大義丈乃展兩手衆罔措溈山曰百丈説大義可謂今古罕聞光前絶後大溈即不然但向道開田勞力請歸堂歇教他天下衲僧亡鋒結舌何故鶴有九皋難翥翼馬無千里謾追風廣教玉云百丈可謂將金彈子博他泥彈子雖然剖腹刳心未免釘樁搖櫓山僧今日領衆開田大衆請説大義但與唱個村田樂不特為兄弟釋煩慰勞要令天下衲僧個個解黏去縛且道是何節拍擊拂子云久立珍重趙州從諗禪師南三南泉願嗣因南泉上堂州出問明頭合暗頭合泉便下座歸方丈州曰者老漢被我一問直得無言可對首座曰莫道和尚無語好自是上座不會州便與座一掌曰者一掌合是堂頭老漢喫五祖戒云正賊走了邏賊人喫棒又云南泉當斷不斷返招其亂雲居舜云諸人作麼生會有底道首座落他綣繢與麼會又爭得山僧道趙州大似傍若無人趙州遊方時到臨濟才入門洗腳次濟便問如何是祖師西來意州曰恰值山僧洗腳濟近前作聽勢州曰會即便會啖作甚麼濟便歸方丈州曰三十年行腳今日錯為人下注腳法雲秀云衆中商量道趙州不識臨濟作賊却為他下個注腳臨濟當時作聽勢何不劈耳便掌若恁麼何曾夢見趙州識得臨濟殊不知兩個盡是老賊須知一個好手敢問諸人那個是好手具眼者辨取教忠光云臨濟有驗人眼趙州又飽叢林等間略露風規自然頭正尾正還會麼若不得流水還應過別山趙州因侍者報大王來也州曰萬福大王者曰未到在州曰又道來也黃龍南云頭頭漏泄罕遇仙陀侍者只解報客不知身在帝鄉趙州入草求人那覺渾身泥水徑山琇云侍者報客不知客是何人趙州蝦為子屈不覺打失眼睛且道徑山恁麼批判又且如何巡人犯夜愚菴盂云侍者虗報君情趙州望敵輕進直得雙鳳雲中扶輦下六龍海上駕山來佛日晳云趙州古佛猶作者般去就山僧即不然今日御駕親臨設有侍者報和尚萬歲來也便與劈面掌云莫誑山僧好何故天威不違顏咫尺何曾少間至尊前白巖符云趙州費盡鹽醬勞而無功侍者黃袍加身承當未敢二者俱不濟事則且置祇如道萬福大王者裏合作麼生始堪與趙州相見趙州因臺山路上有一婆子凡遊臺僧問臺山路向甚麼處去婆曰驀直去僧才行三五步婆曰好個師僧又恁麼去有僧舉似州州曰待我去勘過明日州便去問臺山路向甚麼處去婆曰驀直去州便行婆曰好個師僧又恁麼去州歸院謂衆曰臺山婆子我為你勘破了也報慈遂徵云前來僧也恁麼道後來趙州去也恁麼道且道甚麼處是勘破婆子處又云非唯被趙州勘破亦被者僧勘破雪竇顯云還知天下衲僧出者婆子圈繢不得麼琅瑘覺云大小趙州去者婆子手裏喪身失命雖然如此錯會者多寶峰文云大小趙州若檢點來也好喫婆子手中棒且道趙州過在什麼處若檢點得出方解不受人瞞歸宗門下莫有不受人瞞底麼喝一喝下座溈山哲云天下衲僧只知問路老婆要且不知腳下泥深若非趙州老漢怎顯汗馬功高仰山欽云錯婆子心肝趙州五臟一揑揑碎撒在諸人懷裏了也且道是有勘破無勘破良久云錯會者多高峰妙云諸方判斷盡道趙州勘破婆子若據高峰見處正是婆子勘破趙州且道以何為驗以手指云驀直去瑞巖慍云婆子如蟲禦木偶爾成文趙州見義勇為翻成特地諸人還會麼雲收雨霽長空濶一對鴛鴦畫不成笑巖寶云婆子率快平生只得一橛趙州慣能勘辨放過當陽當時才見道好個師僧又恁麼去但只鼓掌呵呵大笑而歸不獨與天下行腳衲僧增鋭亦使者婆子向去別有生涯愚菴盂云者婆子學得個紅綿套索底法兒不知陷害了多少良民不期撞著個魯智深華和尚人在他圈繢裏打個筋斗跳出來者婆子直得無計可施且那裏是趙州打筋斗處辨山音云且道那裏是趙州勘破處只為梅花寒未徹故來霜上又加雪凍開平地起龜文連纍青山迸白血育王雪云婆子勘破趙州作家始終作家趙州勘破婆子鈍置相鈍置且道其中人又作麼生良久云負恩者多崇慶古云趙州拶嶮崕句婆子施陷虎機雖則二俱作家未免傍觀者哂義山訥云臺山大路今古平夷無端被者婆子添土添沙高下成迹趙州雖能高處高平低處低平檢點將來怎奈反成坑塹西遁超云先輩大老有謂趙州問臺山路時婆子不應與那僧一例而答此是婆子失機處故被趙州勘破如此判斷恐趙州呌屈愚菴老人問趙州勘破婆子意旨如何超云火燒牛尾有雷無雨老人云未在更道超云重陽服甘菊到老眼不花東塔熹云趙州者漢大似假虞伐虢惜山僧不預其會當時若見伊説勘破了也但對云和尚今日亦被大衆勘破管教趙州者漢無殺合在本覺微云有者道婆子被趙州勘破有者道趙州被婆子勘破殊不知趙州婆子總被者僧勘破且道節文在什麼處以拄杖一畫云路從平處險人向靜中忙四祖浪云盡謂臺山婆子被趙州勘破殊不知趙州却被婆子勘破且道勘破在什麼處潤云大小趙州於婆子手裏納敗却來者裏本當時潤上座若在待道我為汝勘破了也但把火照看者老漢面皮厚多少趙州因僧問承聞和尚親見南泉是否州曰鎮州出大蘿蔔頭愚菴盂云要見南泉則易見趙州則難要見趙州則易見蘿蔔頭則難還有要見蘿蔔頭者麼請來與老僧相見老僧賣身供養他不見道拾薪設食乃至以身而為牀座勝法法云趙州古佛得南泉平常之道等間拈出不妨塞斷天下人口檢點將來猶是鼓粥飯氣今日有問新勝法親見磬山是否山僧但驀頭與伊一棒何故聻曹溪波浪如相似無限平人被陛沉東塔熹云鐵壁銀山截斷衆流不無他趙州者漢然要且只明陷虎機無出身路設有問山僧聞和尚親見龍池是否但對道問話即得禮拜了退青龍操云趙州塞者僧口則得塞天下人口則難
