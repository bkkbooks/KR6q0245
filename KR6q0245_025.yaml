body:
  text: 古杭白巖嗣祖沙門淨符彚集青四瑞州洞山悟本良價禪師青四雲巖晟嗣因僧問寒暑到來如何𢌞避山曰何不向無寒暑處去曰如何是無寒暑處山曰寒時寒殺闍黎熱時熱殺闍黎投子同云幾乎與麼去琅瑘覺云我即不然如何是無寒暑處僧堂裏去雲居舜云大小琅瑘作者個去就山僧即不然如何是無寒暑處三冬向暖火九夏取凉風黃龍新云洞山袖頭打領腋下剜襟爭奈者僧不甘如今有個出來問黃龍且作麼生支遣良久云安禪不必須山水滅却心頭火自凉寶峰文云大衆若也會得不妨神通遊戲一切臨時寒暑不相干若也不會且向寒暑裏經冬過夏上封才云洞山一句可謂主賓交參正偏涉入諸人如今向什麼處𢌞避無事上山行一轉借問諸人會也無泐潭準云若為人時冰也暖不為人時火也寒仰山欽云洞山與麼答話雖則頭正尾正只是鼻孔落在者僧手裏明眼道流試檢點看烏石道云洞山只有殺人刀且無活人劍山僧則不然忽有問寒暑到來如何𢌞避亦向他道何不向無寒暑處去𢌞避那裏是無寒暑處寒時熱殺闍黎熱時寒殺闍黎為什麼三冬炎暑熾九夏雪花飛五磊權云洞山古佛雖則善赴來機猶缺悟在何故不應話作兩橛若人檢點得出許你具一隻眼清化嶾云洞山老祖如將摩尼寶王直授凡庸者僧若是眼裏有筋不但三冬枯木秀管教九夏雪花飛道峰清云袖頭打領腋下剜襟還他洞山老人揀點將來未免向語脉裏轉却道峰即不然有問如何是無寒暑處只向道火焰不容蚊蚋泊長連牀上任高眠白巖符云金針密刺就中不犯鋒鋩玉線橫抽裏許渾忘斷續者是我洞山老祖垂手接人處所建立的宗旨如今有一類黃口雛禪道洞山與麼答話太涉廉纖若問我寒暑到來如何𢌞避驀頭與伊一棒何等痛快呵呵者好似個裸形之域笑我漢國衣冠我孔門子弟固不足與之較短論長獨惜其甕裏醯雞爭知天日顧左右云者裏還有識洞山者麼試為我下一轉語良久衆無語乃自代云霧鎖晴空峰不露雞鳴深夜月流輝五峰甫別真淨語云若也會得一任向寒暑裏經冬過夏遊戲神通若也不會寒時寒殺熱時熱殺摸索他寒暑不著百丈瑡云洞山老祖向茫無可據處抉出金剛眼睛直令人人自見可謂九轉還丹也然撿點將來只有殺人刀且無活人劒今日有問瑡上座寒暑到來如何𢌞避但向道向寒暑處𢌞避他若再問寒暑處作麼生𢌞避直向道瑡上座不可作洞上兒孫不得洞山與泰首座冬節喫果子次乃問有一物上拄天下拄地黑似漆常在動用中動用中收不得且道過在什麼處泰曰過在動用中山喚侍者掇退果桌同安顯於過在什麼處下代泰云不知琅瑘覺云若不是洞山老人焉能辨得雖然如是洞山猶缺一著在溈山哲云諸人還知洞山落處麼若也不知往往作是非得失會去山僧道者果子非但首座不得喫即使三世諸佛也不敢正眼覷著雲蓋本云洞山雖有打破虗空底鉗錘要且無補綴底針線待伊道過在動用中但向道請首座喫果子泰首座若是個衲僧喫了也須吐出淨慈昌云洞山雖然掇退果桌要且塞泰首座口不得照覺勤云天下衲僧盡道泰首座箭鋒不相拄所以遭洞山貶剝後來溈山哲道此果子莫道泰首座不得喫三世諸佛也不敢正眼覷著宗師家正令當行十方坐斷有定乾坤句辨龍蛇眼不妨難趂當時若是個英靈衲子解捋虎鬚待道過在什麼處便拈起果子云和尚畢竟喚作什麼待他擬議劈面便擲何故有意氣時添意氣不風流處也風流溈山果云洞山壓良為賤泰首座有理難伸山僧略見不平要為泰公雪恥當時才見與麼問只向道靈山授記未到如此待他擬議拈果子劈面便擲不惟塞斷洞山咽喉免見後人妄生卜度保寧茂云者個說話在今諸方每至冬夜未嘗不拈出注解一上然于正文未嘗道著一字有底道洞山只見錐頭利不見鑿頭方抑屈人作麼有底道泰首座不得果子喫要且盡大地人皆不得喫成人者少敗人者多殊不知洞山有偏正回互不犯的手腳直饒泰首座道不在動用中也不得他果子喫良久云水流黃葉來何處牛帶寒鴉過別村南堂欲云太阿橫按凜凜神威寶鑑當臺澄澄光采祇如掇退果桌又作麼生雲自帝鄉出水歸江漢流烏石道云洞山和盤托出首座當面錯過帶纍衆人都不得果子喫當時若有個漢出來道和尚莫談天說地且請喫果子教洞山者漢滿面慙惶無著身處雖然也須救取泰首座始得擊拂子云妙藥不醫冤債病橫財豈富命窮人雲居莊云當斷不斷反招其亂若是徑山見他道過在什麼處便與掀倒果桌亦使旁觀知有宗門爪牙雖然也須腳踏實地始得拈拄杖云不向藍田射石虎何人知是李將軍卓拄杖下座劍門云我當時若在亦對云過在動用中待渠令侍者掇退果桌便拈起果子劈面擲笑巖寶云泰公便恁麼道有什麼過當時才見舉話拈果子驀口𡎺云和尚比來請客直饒洞山古佛吞吐不及鼓山賢云大小洞山心行不少泰首座既遭活陷黜罰何疑劒門猶欲強作主宰好與三十痛棒古南門云祇如首座恁麼道因甚洞山便掇退果桌者裏明得萬兩黃金也合消不然喫水也須防噎又云要見洞山則易見泰首座則難石霜尊云洞山老人祇有殺人刀且無活人劒何不當時待首座道過在動用中但云作家作家首座若是個本分衲僧必然另有長處豈不佛法人情兩盡其美東塔熹云洞山老漢無大人相若是山僧見伊道過在動用中只消云作家禪客宛爾不同不惟使伊一時好采且令人千古疑著白巖符云我若作泰首座待問過在什麼處亦向道過在動用中他若喚侍者掇退果桌便好拍掌呵呵大笑看洞山者漢又當作何苟當洞山解夏上堂秋初夏末兄弟東去西去直須向萬里無寸草處去良久曰祇如萬里無寸草處作麼生去顧左右曰欲知此事直須枯木上生花方與他合石霜諸云出門便是草太陽玄云如今直得不出門亦是草漫漫地且道合向什麼處行履莫守寒巖異草青坐著白雲宗不妙圓通善云且道諸人即今腳跟下一句作麼生道若道萬里無寸草許你參見洞山若道出門便是草許你參見石霜若道不出門亦是草漫漫地許你參見太陽若總道不得却許你參見延聖何故惟有好風來席上更無閒語落人間白雲端云若見得菴主便見得洞山若見得洞山便見得菴主見洞山則易見菴主則難不見道雲在嶺頭閒不徹水流㵎底太忙生菴主蓋指石霜溈山果云斬釘截鐵豁開向上玄關語諦言誠直指當人要路且作麼生會他出門便是草石霜恁麼道上封恁麼舉你諸人不得動著動著三十棒徑山杲云師子一滴乳迸散十斛驢乳雪巖滿云三個老漢雖然異口同音未免撞頭磕額何也一人大開口了合不得一人高擡腳了放不下一人緊閉門了出不去王山即不然遍十方界非外全在一微塵在一微塵非內遍十方界祇者一微塵許也須及盡不可得向那裏安門甚處入草還會麼休侵洞嶺初秋草請看疏山臘月蓮烏石道云洞山背手彎弓石霜當面架箭雖然用處不同直是眼親手便石溪要且不然萬里無寸草處畢竟作麼生去良久云四海五湖龍世界十洲三島鶴乾坤擊拂子下座鼓山賢云洞山恁麼說話正是瑞鳳不棲於凡木金龍豈守於寒潭轉功就位轉位就功即不無看來也祇似猢猻上樹捨一取一未為好手且作麼生是本分底去處良久云釣船載到瀟湘岸氣噎無聊問白鷗百丈雪云山僧則不然兄弟東去西去直須向冰河發𦦨處去只如冰河發𦦨處作麼生去良久云兔角杖頭挑日月龜毛繩子縛虗空東山澓云三大老忘却自己四大五臟盡力提持恐人入草今日東山解制臘節初臨春氣未至正值燒痕滿界衆兄弟直須向乾茅叢裏信手拈來寸寸瓊枝縷縷玉葉不妨和身臥在荊棘林中纍地輥他十七八輥起來通身荊棘非但佛祖難親饒他舜若多神擬著則鮮血淋漓縱使臘月三十索債盈門難以近傍東山如是告報大似逐客顛狂自露通身醜惡雖然也不得錯舉天童忞云者一隊漢怪力亂神只知一重去一重一步高一步及乎輥到牛角尖裏和自己動彈不得山僧為伊撥轉天關打開籬落貴要諸人個個濶步坦道免蹈者輩嶮僻之途還肯恁麼承當者麼卓拄杖云如今四海清如鏡行人莫與路為𬽦靈隱禮云洞山祇解借功明位焉知玉殿苔生石霜雖能轉位投機猶未回途復妙正饒功位齊轉芝生朽木功位齊隱雪凍紅爐佛日要問他二老祇如五馬不嘶一牛不飲處如何趨向石塔忍云大衆總似者一隊老古錐平日向甚麼處下腳興國者裏四望青青不妨東去西去略無些子妨礙只是有一件事不可不向諸人說破雖是王道坦坦畢竟不許販賣私鹽崇先奇云從苗辨地因語識人二俱作家且如今東去西去者盡是草裏漢又何曾有出身路良久云臯亭恁麼舉不圖打草祇要驚蛇天目律云者一班草裏漢著甚死急蓮柎策云洞山老人把住玄關嚴行正敕直得春秋寒暑迥絶往來南北東西渾無行路然則萬里無寸草且置出門便是草又作麼生金雞破琉璃殼玉兔挨開碧海門瓶山謙云洞山一期逞俊爭知當地草深當時若有個漢待老新豐語未絶便好呵呵大笑云老和尚逆風揚塵作麼不惟勘破洞山亦乃坐斷後人舌頭洞山供養雲巖真次僧問先師道祇者是莫便是否山曰是曰意旨如何山曰當時幾錯會先師意曰未審先師還知有也無山曰若不知有爭解恁麼道若知有爭肯恁麼道長慶稜云既知有為甚恁麼道又云養子方知父慈龍華體云諸禪德者則公案若喚作雲巖真話未免烏焉成馬何故不見道世間無限丹青手到此都來畫不成洞山因僧問時時勤拂拭為什麼不得他衣鉢山曰直饒本來無一物也未合得他衣鉢曰未審甚麼人合得山曰不入門者曰祇如不入門者還得也無山曰雖然如此不得不與他又曰直道本來無一物猶未合得他衣鉢汝道什麼人合得者裏合下得一轉語且道下得甚麼語時有一僧連下九十六轉語並不契末後一語始愜洞山意山曰闍黎何不早恁麼道別有一僧密聽祇不聞末後一語遂請益其僧僧不肯說如是三年相從終不為舉一日因疾其僧曰某甲三年請舉前話不蒙慈悲今日再不為舉當殺上座去也其僧悚然乃為舉曰直饒將來亦無處著僧乃禮謝雪竇顯云他既不受是眼將來必應是瞎還見祖師衣鉢麼若於此入門便乃兩手分付非但大庾嶺頭一個提不起設使闔國人來且欵欵將去翠巖芝云總不合得他衣鉢却與古佛同參且道參阿誰天童覺云長蘆則不然直須將來若不將來爭知不受將來底必應是眼不受底真個是瞎還會麼照盡體無依通身合大道古南門云洞山理長則就雪竇舉一明三祇如將來既不受諸人早晚橫披豎搭是衣不是衣一日過堂兩度溼是鉢不是鉢若是爭奈洞山不肯若不是祖師衣鉢掉向甚處去也即今日用行持又是個什麼諸仁者若於此入門何待兩手分付庾嶺力爭管取黃梅兒孫傳遍天下勝法法云二大老徹底舉揚未免各見一邊勝法則不然若有將來必當是受若是不受必不將來將來的也非是眼不受的也非是瞎還見祖師衣鉢麼萬古碧潭空界月再三撈摝始應知洞山因僧問三身之中阿那身不墮衆數山曰吾常於此切曹山寂因僧問吾常於此切意作麼生曹云要頭便斫將去雪峰存因僧問吾常於此切意作麼生峰以拄杖劈面打云我也曾到洞山來承天宗云一轉語海晏河清一轉語風高月冷一轉語騎賊馬趂賊試請辨看忽有個僧出來道總不與麼也許伊具一隻眼徑山杲云恁麼葛藤也未夢見三個老漢在復云何不向膏肓穴上下一針博山來云近不得倚遠不得携推之弗前約之弗後洞山於此若鐵橛也若夫辨奇貨採驪珠求華璞追藍琰安可以語於此哉離乎言句親之可矣廣胤標云盲者無以與乎文章之觀聾者無以與乎鐘鼓之聲三個老漢一手提持赤心片片大似豐城寶劍當面擲只是知恩者少者僧非但耳聾亦兼眼瞎錯過當陽如今還有不錯過的麼關門令尹誰能識河上仙翁去不回洞山因辭京兆興善平禪師平曰什麼處去山曰沿流無定止平曰法身沿流報身沿流山曰總不作此解平乃撫掌保福寧云洞山自是一家乃別云覓得幾人崇先奇云保福老漢錯下名言殊不知洞山老人居天下之廣居立天下之正位保福又道覓得幾人果然搆不著洞山於扇上書佛字雲巖見却書不字山又改作非字雪峰見乃一時除却興化獎代洞山云吾不如汝白楊順云我若作洞山只向雪峰道你非吾眷屬天鉢元云洞山雲巖平地起堆雪峰老漢因事長智洞山有一僧不安要見山山遂往見僧曰和尚何不救取人家男女山曰你是什麼人家男女曰某甲是大闡提人家男女山良久僧曰四山相逼時如何山曰老僧日前也向人家屋簷下過來曰回互不回互山曰不回互曰教某甲向甚處去山曰粟畬裏去僧噓一聲曰珍重便坐脫山以拄杖敲頭三下曰汝只解與麼去不解與麼來昭覺勤云大凡行腳人正要透脫者一件事者僧既是大闡提人家男女直至四山相逼手腳忙亂若不是洞山具大慈悲放一線道與他平展爭解恁麼去所以古人道臨終之際若一毫頭聖凡情量未盡未免入驢胎馬腹裏去只如洞山道我亦曾從人家屋簷下過粟畬裏去鼎鼎礙四山不礙四山到者裏須是桶底子脫始得且道洞山意作麼生還會麼金雞破琉璃殼玉兔挨開碧海門洞山因僧問和尚尋常教人行鳥道未審如何是鳥道山曰不逢一人曰如何行山曰直須足下無私曰祇如行鳥道莫便是本來面目否山曰闍黎因甚顛倒曰甚處是學人顛倒山曰若不顛倒因甚麼喚奴作郎曰如何是本來面目山曰不行鳥道理安洸云不行鳥道始是本來面目因甚尋常却只教人行鳥道且道洞山意作麼生良久云渡河須用筏到岸始辭舟鳳山啓云識尊卑明貴賤自然君君臣臣父父子子冠履不致倒置錢穀不肯浪費當今之世孟八郎漢見處瞞盰得之鹵莽菽麥不分金鍮不辨以其素無大志自甘顛倒故也且道不行鳥道又是如何面目良久云不辭向汝道相續也大難白巖符云若論本來面目直饒你不行鳥道要恰洞山意亦未可在然則爭奈洞山現有語在何者裏跨得一步不妨作個脫灑衲僧不然總是途中未了漢洞山與密師伯在餅鋪密於地上𦘕一圓相謂山曰把將去山曰拈將來保寧𠲸云非但二人提不起盡大地人亦提不起天童忞召衆云諸人還提得起麼良久云也須是個踞地獅子始得若是山僧待他道拈將來便與一掌者一掌有生復有死有利亦有害洞山有偈曰貪嗔癡太無知賴我今朝識得伊行便打坐便捶分付心王子細推無量劫來不解脫問汝三人知不知神鼎諲云我則不然貪嗔癡實無知十二時中任從伊行即往坐即隨分付心王擬何為無量劫來原解脫何須更問知不知紫柏可云鍛鍊自心鉗錘猛密須是洞山咳嗽掉臂戲笑譏呵無非解脫三昧還他神鼎雖然如神鼎不打洞山爐鞴中鋾鑄過來安得便恁麼自在洞山不打神鼎見地上得個消息從汝朝打暮捶敢保貪嗔癡驢年也未調伏在者裏揀別得許汝會如來禪若是祖師禪猶隔鄉關萬里大覺升云恁麼說話幸遇不在大覺門下過若在大覺門下打折驢腰未放過在何故既有讓王節何爭洗耳清雖然如是也須是個人始得洞山不安有僧問和尚違和還有不病者麼山曰有曰不病者還看和尚否山曰老僧看他有分曰未審和尚如何看他山曰老僧看時則不見有病博山來云不二門開日面月面總不似洞山癖病混之弗得類之不齊病中善看病也者僧眼裏有筋皮下有血要見洞山也不難洞山問密師伯作什麼密曰把針山曰把針事作麼生密曰針針相似山曰二十年同行作者個語話密曰長老又作麼生山曰大地火發天童覺云大地火發間不容髮南海崑崙天寒不襪祖祖相傳一堆搕𢶍南林弘云神山一段古錦風吹不入雨打不溼被洞山一拶直得零零落落至今補不得洞山與雲居渡水山問水深淺居曰不溼山曰粗人居曰和尚作麼生道山曰不乾五祖演云二老恁麼說話還有優劣也無山僧今日因行掉臂為諸人說破過水一句不濕庫藏珍珠堆積過水一句不乾無錐說甚貧寒乾溼二途俱不涉任他緑水與青山笑巖寶云演師恁麼道與他洞山有交涉無交涉還辨得麼若能辨得不獨識破五祖亦能親見洞山若不能辨得山僧略為諸人說破洞山不下為人手五祖能談本分禪洞山因僧問如何是沙門行山曰頭長三尺頸長二寸因令侍者持此語問三聖然聖於侍者手上掐一掐山肯之文峰玉云妙得衲僧家轉身活路還他新豐老人三聖雖能暗號私通終是輸他一著今日若問文峰頭長三尺頸長二寸意旨如何向道待你四腳踏地時自然有個分曉洞山垂語知有佛向上人方有語話分僧問如何是佛向上人山曰非佛保福展別云佛非雲門偃云名不得狀不得所以言非法眼益云方便呼為佛天童覺云二老宿相去多少直是刁刀相似魚魯參差到者裏轉劫外機放風前箭橫身擔荷撒手承當具者般眼目始得還辨得麼易分雪裏粉難辨墨中煤徑山杲云二尊宿恁麼提持佛向上事且緩緩者裏則不然如何是佛向上事拽拄杖劈脊便打免教伊在佛向上軃跟報恩秀云我要問洞山佛向上人還有答話分也無天寧琦云我者裏無向上向下佛是西天老比丘今朝有酒今朝醉明日無錢明日求東明際舉雲門語畢云大小雲門猶作者般見解山僧當時若在但冷笑一聲大珠云控佛祖玄關揭人天正眼須還大慧若據佛向上事非但者老漢縱饒西天四七東土二三到來大珠者裏未敢相許何也不見道向上一路千聖不傳龍華體舉雲門語畢驀拈拄杖召衆云者個是拄杖子有甚名不得以杖倒卓云不可不喚作拄杖子有甚狀不得雖然不是龍門客切忌遭點額洞山到南泉值馬祖諱辰修齊泉設問云來日設齊未審馬祖還來否衆皆無對山出對曰待有伴即來泉曰此子雖後生甚堪雕琢山曰和尚莫壓良為賤慧雲盛云南泉倚勢欺人洞山因客見主雖與馬祖把臂共行猶較王老師七步洞山上堂有一人在千人萬人中不背一人不向一人你道此人具何面目雲居出曰某甲參堂去資福廣於具何面目下著語云七凹八凸於參堂去下著語云只得一橛復云虗白堂啓珍珠簾垂面面無私識者其誰任是抽身快便猶難合伴同歸然則洞山底意畢竟如何金針雙鎖備挾路隱全該紫梅周云雲居者漢承虗接響則不無要識此人面目只恐新豐老子也窺覷不著為甚麼不見道雖處寰闠中從來不見客洞山與密師伯山行次見一兔子從草中躍出密曰俊哉大似白衣拜相山曰老老大大作者個語話密曰你又作麼生山曰積代簪纓暫時落魄廣潤融云者二老漢一人尚行心處路一人猶挂本來衣若遇廣潤各與二十苕帚柄脫有問長老你又作麼生乃卓拄杖云會麼人居大國方知貴水到瀟湘一樣清且道山僧還有滲漏也無若檢點得出二十苕帚柄山僧自喫如無更有二十各領歸堂去洞山問座主曰不可以智知不可以識識喚作什麼語曰贊法身語山曰喚作法身早是贊也主無語天寧琦云者裏合下得什麼語塞却洞山口復云千龍池傳別云喚作法身早是謗也潭州神山僧密禪師青四雲巖晟嗣與洞山行因過獨木橋洞山先過了乃拈起木橋曰過來神曰價闍黎洞山乃放下木橋普明燁云洞山用劒刃上事若非神山也大難承當雖然洞山鼻孔却在神山手裏幽溪和尚青四雲巖晟嗣僧問大用現前不存軌則時如何溪起身繞禪牀一匝而坐僧擬進語溪遂與一踏僧歸位立溪曰汝恁麼我不恁麼汝不恁麼我却恁麼僧再擬進語溪又與一踏曰三十年後吾道大行天童華云善射者箭不虗發若是個漢何處更有幽溪雖然如是最初一踏何異最後一踏天寶樞云幽溪門庭壁立家法森嚴不因者僧怎見汗馬功高古塘云者老漢費盡腕頭氣力要且踏者僧不著白巖符云顛倒乾坤粉碎華嶽還他幽溪者漢怎奈撞著個鈍根阿師未免勞而無功者僧若肘後有符待他繞禪牀一匝而坐便好呵呵大笑云者老漢一釣便上管教幽溪死在手裏
