body:
  text: 古杭白巖嗣祖沙門淨符彚集南三趙州上堂至道無難唯嫌揀擇才有語言是揀擇是明白老僧不在明白裏是汝還護惜也無時有僧問既不在明白裏護惜箇什麼州曰我亦不知僧曰和尚既不知為甚道不在明白裏州曰問事即得禮拜了退雪竇顯云趙州倒退三千里天童覺云這僧也如切如磋不能見機而變趙州也如琢如磨幾乎事不解交衆中祇管道退身有分殊不知盡力提持還體悉得麼焦磚打著連底凍天童悟云大小趙州大似推惡離己何不與他本分草料古南門云趙州貴圖本分不知翻成分外雖然不得五丁力蠶叢路不通汝等諸人問甚護惜不護惜並須喫古南棒我今為汝保任此事終不虗也趙州因婆子令人送錢請轉藏經州受財了却下禪牀轉一匝乃曰傳與婆轉藏經已竟其人回舉似婆子婆子曰比來請轉全藏如何只為轉半藏徑山杲云衆中商量道如何是那半藏或云再繞一匝或彈指一下或咳嗽一聲或喝一喝或拍一拍恁麼見解只是不識羞若是那半藏莫道趙州再繞一匝直饒繞百千萬匝於婆子分上只得半藏設使更繞須彌山百千萬億匝於婆子分上亦只得半藏假饒天下老和尚亦如是繞百千萬億匝於婆子分上也只得半藏設使山河大地森羅萬象若草若木各具廣長舌相異口同音從今日轉到盡未來際於婆子分上亦只得半藏諸人要識婆子麼良久云鴛鴦繡出從君看不把金針度與人天寧琦云這婆子謂趙州只轉得半藏弄假像真當時何不向未繞禪牀時會取車溪沖云諸上座且道那裏是他轉半藏處還會麼五五二十五欲識全藏麼良久云善吉維摩談不到目連鶖子視如盲寶壽方云諸禪德且道那半藏還曾有人轉得麼山僧今日為你轉去也良久云如是如是又良久云不是不是靈隱禮云二人驀拶相逢抑揚一大藏教直得龍吟霧起虎嘯風生若據正眼看來合喫山僧棒在愚菴盂云趙州既受施利許為轉藏以不全轉大失所望歷來諸方批判總為那半藏欲補趙老之不足細算大藏之數却也爭不多了其餘只待星宿劫千佛出世以補之或不能待山僧不惜腕頭氣力代為一二却也懶下禪牀更不能繞經周匝極是省便分明計取數目更不可謂老僧負汝也趙州示衆把定乾坤眼綿綿不漏絲毫我要你會你且作麼生會天童覺云還端的也未直饒你這裏會得七穿八穴我也知你出趙州綣繢不得寶壽新云漏與不漏虗空著楔會與不會混沌增眉饒你把得定放得開猶未是十成穩當大衆還識乾坤眼麼從來不藉三光力照徹山河萬斛金趙州因僧問如何是道州曰墻外的曰不問這箇道州曰問甚麼道曰大道州曰大道透長安烏石道云趙州雖然指出分明可惜這僧當面錯過石溪則不然忽有人問如何是道但向他道昨日有人從四安來今朝出廣德去且道與趙州是同是別良久云看腳下天奇瑞云這僧只解問路不知當面蹉過趙州貪渡行人那防失却船錢大慈云這老漢真個八字打開分明倜儻其奈這僧當面蹉過今日有人問如何是道向他道富春到天目一百二十里且道與古人是同是別乃噓一聲趙州因僧問百骸俱潰散一物鎮常靈時如何州曰今朝又風起徑山杲云今朝又風起閙處莫插嘴觸著閻羅王帶纍陰司鬼天寧琦云天寧下個注腳也要醉後添杯今朝又風起不必更疑猜就地撮將黃葉去入山推出白雲來靈巖儲云今朝又風起老君元姓李寥寥宇宙間極目誰知己喝一喝趙州因僧問萬法歸一一歸何處州曰我在青州做領布衫重七斤昭覺勤云摩醯三眼一句洞明似海朝宗千途共轍雖然如是更有一著在忽有問蔣山萬法歸一一歸何處只對道飢來喫飯困來打眠仰山欽云大小趙州腳跟下紅線不斷等間問著便見牽東補西若是道林則不然萬法歸一一歸何處劈脊便與三十雖則太煞傷慈要且一時慶快拈拄杖云只今莫有與麼問底麼乃靠拄杖云放過一著靈隱林云趙州雖則善用太阿截斷這僧舌頭未免自揚家醜靈隱則不然或有問萬法歸一一歸何處只向他道今日熱如昨日熱高峰妙云大小趙州拖泥帶水非特不能為這僧斬斷疑情亦乃賺天下衲僧死在葛藤窠裏西峰則不然今日忽有人問萬法歸一一歸何處只向他道狗舐熱油鐺天界盛云要頭斫將去要皮剝將去要心刳將去且喜沒箇法子奈得白拈賊何東明際云趙州恁麼答話大似熟處難忘山僧則不然設有問萬法歸一一歸何處但向道大地山河一片雪金粟元云與麼答話美則美矣只是有些兒汗臭氣趙州因僧問如何是趙州州曰東門西門南門北門徑山杲云這僧問趙州趙州答趙州得人一馬還人一牛人平不語水平不流會麼受恩深處宜先退得意濃時便好休天寧琦云盡這僧神通跳趙州關不過大丈夫漢當衆決擇未到弓折箭盡即便拱手歸降何不著一轉語教他納欵去且道著得個什麼語磬山修云這僧設個問頭也甚奇怪道他未會爭敢入虎窟捋虎鬚道他會爭肯恁麼休去趙州因官人問和尚還入地獄否州曰老僧末上入官曰大善知識為什麼入地獄州曰我若不入阿誰教化你福嚴容云趙州老漢手腳不同不唯入水拖人且能面奪旗幟雖然未免露柱勘破趙州因僧問如何是毗盧頂相州曰老僧自小出家不曾眼花天童華云大小趙州語上偏枯若有問山僧如何是毗盧頂相只對道大的大小的小天童傑云若向趙州語下見得坐殺天下衲僧若向應菴語下見得走殺天下衲僧華藏又且不然忽有問如何是毗盧頂相只對他道碌磚趙州因僧問未有世界早有此性世界壞時此性不壞如何是不壞之性州曰四大五蘊曰此猶是壞底如何是不壞之性州曰四大五蘊昭覺勤云千尺寒潭徹底清趙州因僧問三身中那個是本來身州曰缺一不可義山訥云大小趙州被人一拶直得分踈不下而今若有問義山三身中那個是本來身便起身叉手而立待他眼目定動劈脊便打趙州因一秀才問佛不違衆生願是否州曰是曰某甲就和尚乞取手中拄杖得否州曰君子不奪人所好曰某非君子州曰老僧亦非佛義山訥云趙州古佛與奪自由自非過量人未免向是非窠裏走却海門涌云趙州古佛有齒無德當時何不成人之美若是海門便兩手授之待擬接劈脊便打不惟直下使他得出一身白汗慶快平生亦使後來慕佛之士知我衲僧作用長沙招賢景岑禪師南三南泉願嗣一夕與仰山玩月次仰曰人人盡有這個祇是用不得岑曰恰是倩汝用仰曰你作麼生用岑劈胸與一踏踏倒仰山起來曰㘞你直下似箇大蟲長慶稜云前彼此作家後彼此不作家乃別云邪法難扶保福展云好一箇月只是用力大多被他踏破却成兩個人人盡道岑大蟲奇特須知仰山有陷虎之機德山密云好更與一踏琅瑘覺云李陵雖好手爭免陷番身徑山杲云小釋迦有陷虎機老大蟲却無牙齒當時一踏豈造次驀然倒地非偶爾衆中還有緇素得二老出者麼良久云設有也是掉棒打月天寧琦云二大老如斯吐露於建化門頭足可觀光若是這箇事料掉沒交涉龍翔欣云一人開關延敵一人埋兵掉鬬若是這箇事總未夢見在寶慶法云小釋迦不會作客勞煩主人恰是倩汝用便與本分草料直饒戴角猛虎也教倒退三千里法忍謐云盡道小釋迦被岑大蟲一捺捺倒殊不知岑大蟲被小釋迦一坐坐地至今起不得如今莫有為伊起得者麼還我大蟲來長沙因一秀才看千佛名經乃問百千諸佛但見其名未審居何國土還化物也無沙喚秀才才應諾沙曰黃鶴樓崔皓題詩後秀才還曾題也無曰未曾題沙曰得間題取一篇好溈山果云若是個漢才見長沙恁麼道但云黃鶴樓要題也不難未審百千諸佛居何國土若下得這一拶非唯坐斷長沙舌頭亦乃名標青史昭覺勤云驀刀劈面解辨者何人劈面當胸承當者有幾若能向奔流度刃疾焰過風處見長沙橫身為物去不消一揑其或隨言詮入露布便謂問東答西捩轉話頭且喜沒交涉畢竟作麼生是長沙端的處還委悉麼殺人刀活人劒磬山修云長沙雖得殺人刀活人劒不無龍頭蛇尾若是山僧則不然待他問聲未絶便喚云秀才他擬應諾遽索云居何國土雲門信云可惜百千諸佛被長沙和尚埋向一座黃鶴樓裏喚作注解得麼癡人面前不得説夢天界盛云岑大蟲灑食大地皮毛有滴血處可成甘露種族雖然在崇先又且不然待問百千諸佛但見其名未審居何國土但呼云秀才待應諾便向道你好個彩頭一試便中狀元翠巖哲云長沙古佛雖然善赴來機怎奈措大猶忙有辜鶴樓勝槩今日若有問翠巖百千諸佛未審居何國土但向道碧玉殿流聲浩浩紫金光湧汗淋淋紫梅周云長沙與麼酬對可謂千佛頂上拈來萬國土中指出雖然也是借手行拳因人施設紫梅則不然有問百千諸佛未審居何國土但對道你今日曾喫飯麼待道不曾便向道不喫却不要肚飢麼大衆且道與長沙相去幾何見之不取思之千里長沙示衆我若一向舉唱宗乘法堂前須草深一丈四祖澤云如斯舉唱未當宗乘山僧則不然直使盡大地無寸土更須三十棒何故聻鯨吞海水盡露出珊瑚枝大覺升云何止草深一丈山僧若舉唱宗乘直得盡大地人訕謗不已雖然如是不入驚人浪難逢快意魚白巖符徵云長沙恁麼道且道意在於何為復意在入埀手為復意在孤峰獨宿若辨別得許你與長沙同一眼見同一耳聞辨別不得九間僧堂裏稱禪客黑面老子打你鬼骨臀有日在長沙因僧問南泉遷化後向甚麼處去沙曰東家作驢西家作馬曰未審意旨如何沙曰要騎便騎要下便下徑山杲云今日有問雲門圓悟老人遷化後向甚麼處去向道入阿鼻大地獄去未審意旨如何飲洋銅汁吞熱鐵丸或更問還救得也無救不得為什麼救不得是者老漢家常茶飯天寧琦云若欲報德酬恩須是長沙妙喜忤逆兒孫始得雖然珊瑚枕上兩行淚半是思君半恨君長沙因僧問如何轉得山河國土歸自己去沙曰如何轉得自己成山河國土去曰不會沙曰湖南城下好養民米賤柴多足四鄰僧無語沙乃示偈曰誰問山河轉山河轉向誰圓通無兩畔法性本無歸昭覺勤云得人一牛還人一馬天童覺云雖然主賓互換要且泥水不分忽然捩轉鼻頭恁麼不恁麼總不得又合作麼生如今王令稍嚴不許攙行奪市瑞巖慍云者僧擔一擔矒𥋾換得一擔𣸩淈雖然不因夜來鴈怎見海門秋磬山修云饒你轉得山河大地歸自己去却是埋沒己靈更饒你轉得自己成山河大地去猶是背覺合塵總不恁麼且道轉即是不轉即是長沙一日令僧問同參會和尚曰和尚見南泉後如何會默然曰和尚未見南泉已前作麼生會曰不可更別有也僧回舉似沙沙曰百尺竿頭不動人雖然得入未為真百尺竿頭重進步十方世界示全身僧便問祇如百尺竿頭如何進步沙曰朗州山澧州水曰不會沙曰四海五湖皇化裏徑山杲云要見長沙還須更進一步若有人問如何是者一步待我欵欵地與你葛藤保寧全云妙喜道要見長沙更進一步保寧則不然要識長沙更退一步畢竟如何換骨洗腸重整頓通身是眼更須參博山來云會公坐殺法身不通凡聖岑老碧天雲外更鬬精華白牛牯觸牧多方死貓兒解弄也活與盲人點眼聾者開聰會公還識痛癢麼天童忞云徑山保寧二大老一腳前一腳後檢點將來未得歇在要識長沙直須倒却剎竿子始得為甚如此打破淨瓶無一事杜鶻啼在落花枝長沙因三聖令秀上座問南泉遷化向甚麼處去沙曰石頭作沙彌時參見六祖秀曰不問石頭見六祖南泉遷化向甚麼處去沙曰教伊尋思去秀曰和尚雖有千尺寒松且無抽條石笋沙默然秀曰謝和尚答話沙亦默然秀回舉似三聖聖曰若實與麼猶勝臨濟七步然雖如此待我更看至明日聖乃上問承問和尚昨日答南泉遷化一則語可謂光前絶後今古罕聞沙亦默然昭覺勤云也大奇也大奇長沙畫虎却成狸南泉一去無消息空使行人説是非南澗問云者則公案汝諸人作麼生斷祇如長沙三處默然汝諸人作麼生會若也會得為我各下一轉語復頌之曰一則南泉遷化語光前絶後古今希大蟲無齒果然別不是親遭不易知長沙遊山歸至門首首座問和尚甚處去來沙曰遊山來座曰到甚麼處沙曰始從芳草去又逐落花回座曰大似春意沙曰也勝秋露滴芙蓉雪竇顯云謝師答話寶壽方云首座若是個漢當時待道始從芳草去又逐落花回便好云和尚此回遊山不易看者漢又當作何去就長沙因竺尚書來謁乃喚尚書書應諾沙曰不是尚書本命曰不可離却即今祇對別有第二主人沙曰喚尚書作至尊得麼曰恁麼則總不祇對時莫是弟子主人否沙曰非但祇對與不祇對時無始劫來是個生死根本乃示以偈曰學道之人不識真只為從前認識神無量劫來生死本癡人喚作本來人徑山杲云即今祇對者既不是本來人却喚甚麼作本來人良久云我恁麼道且作死馬醫理安洸云區礦別金長沙好手妙喜雖是直捷提持要且未能起膏肓之疾如今有般漢奴郎不辨菽麥不分不能出意想窠臼五蘊身田盡道豈有第二人苦哉苦哉若與麼閻老子打算飯錢莫言不道長沙因皓月供奉問古德曰了即業障本來空未了應須償夙債祇如師子尊者二祖大師為甚却償債去沙曰大德不識本來空曰如何是本來空沙曰業障是白巖符云玉解連環珠穿九曲須讓他長沙作手若以過量衲僧巴鼻論本分草料猶欠也當時問如何是本來空便與劈頭一棒則千古稱尊又豈止大蟲而已鄂州茱萸禪師南三南泉願嗣上堂擎起一橛竹曰還有人向虗空裏釘得橛麼時有靈虗上座出衆曰虗空是橛萸便打靈曰莫錯打某甲萸擲竹便歸方丈雲門偃云矢上加尖有僧云和尚適來與麼道那門云槌鐘謝響得個蝦蟆出來雪竇顯云若要此話大行直須打了趂出法雲秀云茱萸只知瞻前者僧不能顧後仔細檢點將來兩個總須喫棒棲賢諟云且道者僧出來與麼道具眼不具眼茱萸當時便打且道打伊甚麼處試檢看南堂欲云茱萸空中釘橛靈虗旱地遭釘雪竇不管盡法無民只要話行千古檢點將來總是一隊撩虗漢天童悟云茱萸當時打者僧果錯不錯若錯為甚歸方丈若不錯為甚歸方丈試斷看復云疑殺人白巖符云一等收放得宜就中茱萸可愛是則是當時被者僧個久知和尚言清行清濁又作麼生茱萸因趙州執杖上法堂從東過西萸曰作甚麼州曰探水萸曰我者裏一滴也無探箇甚麼州以杖靠壁便下去溈山云趙州善能探水不犯波瀾茱萸一滴也無怎奈關防不得琅瑘覺云勢敗奴欺主年衰鬼弄人天童華云茱萸一滴也無滔天白浪趙州以杖靠壁不犯清波雖然二老同死同生怎奈山僧未肯放過理安洸云茱萸墻塹不牢趙州探竿短小檢點將來二俱不了衢州子湖利蹤禪師南三南泉願嗣於門下立牌曰子湖有一隻狗上取人頭中取人心下取人足擬議即喪身失命臨濟會下有二僧來參方揭簾湖便喝曰看狗僧回首湖便歸方丈雪竇顯云衆中總道者僧著一口著即著了怎奈者僧在敢問諸人子湖狗著者便死因什麼者僧在若無通方眼救得者僧設使子湖出世咬殺百千萬個有甚麼益我當時若見先斫下牌然後入院待者老漢喝云看狗與伊放出個焦尾大蟲如今諸人要見麼日勢稍晚歸堂神鼎諲云古人提唱一段因緣誠非細事你道正恁麼時下得甚麼語神鼎當時若在即喝云者畜生又云死又作退勢天童華云者老漢雖慣得其便怎奈咬者僧不殺且道利害在什麼處天寶樞云若是個漢踏碎却牌直入相見待他道看狗便與擒住云畜生畜生直教子湖進不得退不得一不鈍置臨濟二不孤負自己萬峰蔚云入門一喝頭正尾正擬議思量喪却性命且作麼生入得他家門戶百丈泐云不入虎穴焉得虎子當時二僧待他喝曰看狗便與攔胸把住曰者畜生莫探頭好他擬作伎倆拂袖便行豈不痛快子湖一夜於僧堂前呌曰有賊有賊衆皆驚動有僧自堂內出湖把住曰維那捉得也捉得也僧曰不是是某甲湖曰是即是祇是汝不肯承當翠巖芝云子湖也是相頭買帽溈山果云子湖恁麼大似按牛頭喫草天界盛云大小子湖龍頭蛇尾若是崇先待道不是是某甲便即推倒曰你還要偷老僧那子湖因劉鐵磨到乃問久響劉鐵磨莫便是否磨曰不敢湖曰左轉右轉磨曰和尚莫顛倒湖便打昭覺勤云子湖棒頭有眼只為權柄在手鐵磨皮下有血還他竿木隨身雖然柔弱勝剛強且要話在荊州白馬曇照禪師南三南泉願嗣常曰快活快活及臨終時乃呌曰苦苦又曰閻羅王來取我也院主問和尚當時被節度使拋向水中神色不變如今何得恁麼地照乃舉起枕子曰汝道當時是如今是院主無對照乃擲下枕子法眼益代院主當時但掩耳出去清涼欽云當時好奪枕子劈面便擲雲峰悅云苦苦當時是即今是奪枕子呈似云閻羅王只在者裏大溈智云徹底老婆心天寶樞云白馬死却活院主活却死三更過鐵圍日輪正當午白巖符云頭正尾正在白馬猶欠也院主道如今何得恁麼地但仍高聲呌云苦苦閻羅王來取我也不妨疑殺天下乃無端舉枕云云那裏討甚麼奇特鄧州香巖下堂義端禪師南三南泉願嗣上堂語是謗寂是誑語寂向上有事在老僧口門窄不能為汝説得便下座靈隱嶽云香巖與麼道是説不説良久云喫茶去天目禮云若教頻下淚滄海也須乾本覺微云香巖舌頭拖地松源錯下注腳清福只管坐地看揚州日子和尚南三南泉願嗣因亞溪來參子作起勢溪曰者老山鬼猶見某甲在子曰罪過罪過適來失祇對溪欲進語子便喝溪曰大陳當前不妨難禦子曰是是溪曰不是不是趙州諗云可憐兩個漢不識轉身句天寧慧云趙州不識好惡妄判古人殊不知者兩個漢得便宜處是失便宜致使後來都成了龍頭蛇尾諸禪德且道那裏是他龍頭蛇尾試檢點看
