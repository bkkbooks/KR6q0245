body:
  text: 古杭白巖嗣祖沙門淨符彚集南五袁州仰山南塔光涌禪師南五仰山寂嗣因僧問文殊是七佛之師未審文殊還有師否塔曰遇緣即有曰如何是文殊師塔豎起拂子僧曰莫只者便是麼塔放下拂子叉手寶壽方云文殊固有師也只是無人敢道直饒南塔與麼提持在他七佛之師則得若論文殊之師就是老僧也只好口挂壁上南塔因歸省仰山山問汝來作甚麼塔曰禮覲和尚山曰還見和尚麼塔曰見山曰和尚何似驢塔曰某甲見和尚亦不似佛山曰不似佛似個什麼塔曰若有所似與驢何別山大驚曰凡聖兩忘情盡體露吾以此驗人二十年無決了者子保任之白巖符云盡謂他父子如空合空似水投水只是仰山末上欠驅耕奪食辣手若以山僧看來却是仰山惡毒何故當途錦穽雖智者難忘日云仰山不合大驚小怪與伊驀頭印定當時待伊道若有所似與驢何別便好震威喝出溈仰法道不致今日晉州霍山景通禪師南五仰山寂嗣參仰山山閉目坐通乃翹起右足曰如是如是西天二十八祖亦如是東土六祖亦如是和尚亦如是景通亦如是仰下禪牀打四藤條通因此自稱集雲峰下四藤條天下大禪佛雪竇顯云仰山藤條未到折因甚只與四下須是個斬釘截鐵漢始得翠巖芝云此四藤條亦不得作賞會亦不得作罰會如今作麼生會昭覺勤云師資會合輥芥投針一期借路經過不免相鈍置雪竇道藤條未到折因甚只打四下胡餅裏討甚麼汁又云須是斬釘截鐵漢始得大似隨邪逐惡雲蓋智云大禪佛翹一足仰山打四藤條不是盲枷瞎棒且欲分付知音若不同牀睡焉知被底穿天童忞云者囫圇吞棗漢你要知者四藤條落處麼一藤條打他西天二十八祖亦如是一藤條打他東土六祖亦如是一藤條打他和尚亦如是一藤條打他某甲亦如是諸仁者還肯山僧恁麼判斷也無若肯不惟埋沒仰山何處有他大禪佛若不肯怎奈囫圇吞棗者裏也須是個斬釘截鐵漢始得杭州無著文喜禪師南五仰山寂嗣在仰山充典座文殊嘗現於粥鑊上著以攪粥篦便打曰文殊自文殊文喜自文喜殊乃説偈曰苦瓠連根苦甜瓜徹蒂甜修行三大劫却被老僧嫌白巖符云無著老漢眼中猶有物在若是個見怪不怪底衲僧莫説一文殊現相縱使百千萬億文殊遍空遍界還動得他一絲毫麼髻珠是徵云且道粥鑊邊打底與當年金剛窟見底是同是別者裏定當得要見無著也不難魏府興化存獎禪師南五臨濟玄嗣在大覺為院主一日覺喚院主我聞你道向南方行腳一遭拄杖頭不曾撥著一個會佛法底你憑個甚麼道理與麼道化便喝覺便打化又喝覺又打化來日從法堂過覺召院主我直下疑你昨日者兩喝化又喝覺又打化再喝覺又打化曰存獎在三聖師兄處學得個賓主句總被師兄折倒了也願與存獎個安樂法門覺曰者瞎漢來者裏納敗缺脫下衲衣痛與一頓化於言下薦得臨濟於黃檗處喫棒底道理中峰本云二虎之下獸不容蹄兩刃之間人不容足當大覺興化棒喝交馳之際豈容心思意解於其間哉雖然祗如大覺云脫下衲衣痛與一頓興化言下大悟又悟個甚麼者裏見得許你作臨濟半個兒孫南澗問云龍驤虎驟舉步猶迷一縱一擒翻成鈍置三聖大覺各具一隻眼若非興化老漢洎合勞而無功脫下衲衣痛與一頓則且置作麼生是臨濟在黃檗喫棒底道理驀拈拄杖云太平本是將軍致不許將軍見太平白巖符云興化一生點胸點肋坐斷天下人舌頭到者裏為什麼不震威再喝却道我在三聖學得個賓主句總被師兄折倒了也而大覺棒未折為什麼不盡令行乃亦曰者瞎漢來者裏納敗缺脫下衲衣痛與一頓者裏也有些子誵訛你若不曾與他興化大覺二老打個契合過來要作臨濟兒孫且緩緩即饒你與二老契勘分明白巖者裏未敢全許為什麼不見道我尚未曾向紫羅帳裏與你撒珍珠興化示衆若是作家戰將不用如何若何便請單刀直入時有旻德長老出衆便喝化亦喝德又喝化亦喝德禮拜歸衆化曰適來若是別人三十棒一棒也較不得何故為他旻德會一喝不作一喝用首山念云看他興化與麼用為什麼放得他過諸上座且道甚處是一喝不作一喝用前一喝後一喝且道那個是賓那個是主雖然如是亦須仔細便下座又曰二俱有過二俱無過琅瑘覺云且道那一喝是不作一喝用興化若無後句疑殺天下人雖然如是曉者還稀昭覺勤云作家相見須是恁麼機如掣電眼似流星原始要終扶頭接尾所謂羽毛相似言氣相合祇如兩家互換相喝且作麼生辨得一喝不作一喝用要作臨濟兒孫切須明取且道二老宿意作麼生百尺竿頭須進步紫羅帳裏撒真珠教忠光云興化與旻德各出隻手要發明臨濟正法眼藏殊不知臨濟一宗掃土而盡且道利害在什麼處具眼者辨取雲居莊云二尊宿一人買帽相頭一人隔靴抓癢雖則一期施設怎奈遞相鈍置何故見義不為何勇之有伏龍長云陳雲動地而來雪刃挨身而入鐵旗鐵鼓未為好手全殺全活方見作家較他登九龍御輦而被烹失千里烏騅而自刎者蓋相萬萬劒戟盡為農器用馬牛歸放華山陽何以見得王登寶位野老謳歌通玄奇云者兩個漢大似一對無孔鐵錘看他你擲我拋遞相抑揚雖則二俱敏手旻德未免輸他一籌被伊塗污面門至今羞慙無地報恩琇云且道那裏是他一喝不作一喝用處直饒倜儻分明要見旻德則易見興化則難靈隱禮云首山但識二俱有過二俱無過殊不知興化父子個裏殺活二俱放過二俱不放過諸仁者且道靈隱底是首山底是良久喝一喝云不得動著動著三十棒棲霞成云興化旻德聚頭作閙主賓歷然即不無一喝不作一喝用也須更見臨濟始得崆洞慈云一人權衡在手收放自由一人影草隨身逢場作戲雖則舒展無殊主賓有序怎奈互相鈍置檢點將來二俱失利何故當仁不讓始是丈夫喝寶掌白云興化和尚向針鋒上削鐵電影裏驅雷送斷鴈於秋旻掃殘霞於賸水職到威成毋容少滲者裏還著得佛法身心也無若教頻下淚滄海也須乾廣胤標云看他興化父子主賓互換師授資承赤手提持二俱作者則固是為什麼興化又道他旻德會一喝不作一喝用還知者老漢為人處麼佛日晳云興化雖慣向針鋒尖上張弓架箭電光影裏辨敵施能檢點將來也只是擒降將的手段旻德雖則久經行陳不顧危亡怎奈鼻孔落在興化手裏果是臨濟德山把手共行的漢待興化未開口已前踏翻香案拽下座爛捶一頓管取興化生受生受即今還有恁麼人麼新隆安性命在汝手裏有麼有麼喝一喝云金翅鳥王當宇宙個中誰是出頭人資國秀云興化生平氣宇如王因甚到者裏便全身放下還委悉麼從來相識貴知音水入水兮金博金不似尋常盲瞎漢強將亂喝當生平是則是祇如教忠道臨濟一宗掃土而盡又作麼生喝多謂海枯終見底誰知人老不知心興化侍臨濟因洛浦來參濟問甚麼處來浦曰鑾城來濟曰有事相借問得麼浦曰新戒不會濟曰打破大唐國覓個不會的人也無參堂去化隨後問適來新到是成褫他不成褫他濟曰我誰管你成褫不成褫化曰和尚祇解將死就地彈不解將一轉語蓋覆却濟曰你又作麼生化曰請和尚作新到濟遂曰新戒不會化曰却是老僧罪過濟曰你語藏鋒化擬議濟便打至晚濟又曰我今日問新到是將死就地彈就窠子裏打及至你出得語又喝起了向青雲裏打化曰草賊大敗濟便打廣教玉云若論此事擊石火閃電光搆得搆不得俱未免喪身失命看他臨濟權衡在手縱奪隨宜興化雖云為衆竭力未免禍出私門總似今日門風委地汝輩瞻前顧後有什麼氣息喝一喝云龍象蹴踏是誰堪雪曲應希徒側耳興化見同參僧來才上法堂化便喝僧亦喝化又喝僧亦又喝化近前拈棒僧又喝化曰你看者瞎漢猶作主在僧擬議化直打下法堂侍者問適來者僧有甚觸忤和尚化曰是他適來也有權也有實也有照也有用及乎我將手向伊面前橫兩橫到者裏却去不得似者般瞎漢不打更待何時昭覺勤云辨王庫刀振塗毒鼓掣電未足以擬其迅震霆未足以方其威可謂善驅耕夫之牛能奪飢人之食祇如主賓互換有照有用有權有實則且置甚處是興化將手向伊面前橫兩橫處者裏洞明得可以荷負臨濟正法眼藏如或泥水不分未免瞎驢隨大隊天童華云興化門墻千仞從來家法森嚴者僧暗透重關要看洞中春色好則好未免二俱失利祇如興化道我將手向伊面前橫兩橫又作麼生天堂未就地獄先成育王光云高提祖印獨耀寰中大啓洪爐烹凡煅聖非興化不能同參非同參不能見興化直得主賓互換照用雙行且道那裏是興化將手向伊面前橫兩橫處者裏明得臨濟一宗不至掃土脫或未然育王為你道破拈拄杖卓一卓云金鏃慣調曾百戰鐵鞭多力恨無讐南堂欲云阿呵呵獅子兒返躑龍馬駒𨁝跳打破上頭關主賓俱失照有底便道當時再與一喝不然掀倒禪牀拂袖而去恁麼見解有甚共語處山僧不逢別者終不開拳適值大道師兄遠臨要使現前一衆與他古人兩得相見還委悉麼青山不鎖長飛勢滄海合知來處高靈隱禮云興化據寰中正令展肘後神符直得盡大地人一時喫棒其奈令行太嚴未免傷鋒犯手要知者僧納敗處麼當斷不斷反招其亂縱饒不顧危亡掀倒禪牀喝散大衆也只是個有頭無尾客作擔板漢白巖符云者僧若是個識休咎辨機宜底漢子待興化近前拈棒便好退身三步云住住今日若是別人怪和尚去在他若眼目定動却好與一喝拂袖而出不獨見向來同參契誼而臨濟正法眼藏在掌握矣興化因僧問四方八面來時如何化曰打中間底僧便禮拜化曰我昨日赴個村齋中途遇一陳卒風暴雨却向古廟裏軃避得過福嚴容云者僧雖解單刀直入怎奈興化有百匝千重所以將在謀而不在勇興化雖運籌帷幄決勝千里未免旁觀者哂若問山僧四方八面來時如何未是作家他若擬議劈脊便棒棲霞成云者僧禮拜不是好心若非興化頂門有眼幾幾乎被伊揭却腦蓋資國秀云者僧有擒王射馬之才怎奈龍頭蛇尾興化有破壁更旗之術猶虧末後一槌當時若是見他禮拜劈脊便打何故不入虎穴焉得虎子雖然祗如興化末上與麼道又作麼生蟠龍長云為人須為徹殺人須見血興化恁麼猶欠穩在若當時就其旗鼓未動氣力未衰便能活捉生擒非但與者僧浣腸換骨亦且免慕羶之流向卒風暴雨處軃跟興化因後唐莊宗車駕幸河北回至魏府行宮詔問曰朕收中原獲得一寶未曾有人酬價化曰請陛下寶看帝以兩手舒幞頭腳化曰君王之寶誰敢酬價報慈遂徵云且道興化肯莊宗不肯莊宗若肯莊宗興化眼在什麼處若不肯莊宗過在什麼處雪竇顯云至尊所得只可旁觀若非興化作家往往高價酬却雲峰悅云真不掩偽曲不藏直有眼者辨取翠巖芝云興化當時下一著可謂酩酊如今作麼生斷黃龍心云興化一期見機而作怎奈埋沒伊一朝天子當時若但向道蚌蛤之珠收得也無用處教伊向後別有生涯免得遞相鈍置如今若有人問又作麼生酬償笑巖寶云作家君王不妨做得出説得行興化明眼宗師亦善能相席別償然略且蒙昧當時未必光輝後世我若作興化待帝舒幞頭腳直云陛下何得説真方賣假藥瞥令喜識見盡寶愛情忘不獨致君王得大解脫亦免使天下人承虗接響只在光影門頭做活計博山來云徑寸之璧照乘之珠望中原光影萬一不得為比文殊寶冠隱晦不得淨名方丈説示不來興化畢竟酬價不可得然雖如是誰道黃金如糞土天童忞云雪竇興化不無顢頇放過黃龍晦堂太煞傷觸風化若是山僧待他引幞頭腳但云皇天無親惟德是輔不惟使莊宗履安知危亦顯衲僧家袖裏有金錘以拂子畫一畫云且道者寶作麼生酬價良久云可憐三尺龍鬚喚作尋常破布寶掌白云莊宗是一朝天子輕將中原之寶撒向人前興化是天下宗師且不能逆鱗擒角當時待伊引幞頭腳便道魚珠不勞拈出縱使同光十倍施呈也較三千里何故隨處等間垂一釣會須牽動碧潭龍白巖符云盡道興化只有順捋虎鬚的胸襟且無逆披龍鱗的辣手殊不知他興化舌頭是龍泉是石密大有利害若人委悉得請為同光帝別代一轉語興化到雲居問權借一問以為影草時如何居無對化曰想和尚答者話不得不如禮拜了退居後出住曰我二十年前不曾對興化一語為他致個問頭奇特如今思量當時不消道個何必化聞乃曰雲居老漢二十年祇道得個何必若是興化即不然怎如道個不必徑山杲云何必不必綿綿密密覿面當機有人續得末後句許伊親見二尊宿天童忞云雲居放憨興化廝賴雖則互相激揚怎奈只作得個賓中主作不得主中主若是天童如今有個衲僧恁麼問但云好才擬議劈脊打出不惟使他差異禪和無開口處且顯宗師家有三玄戈甲照用同時底手眼興化示衆我聞前廊下也喝後架裏也喝諸子汝莫盲喝亂喝直饒喝得興化向半天裏却撲下來一點氣也無待我欵欵地蘇息起來向你道未在何故我未曾向紫羅帳裏撒珍珠與你諸人去在胡喝亂喝作麼天寧琦云我當時若見只向他道何必待者老漢東西顧視却與一喝驚羣須是英靈漢敵勝還他師子兒興化曰若立一塵家國興盛野老顰蹙不立一塵家國喪亡野老安怗雪竇顯舉若立一塵家國興盛不立一塵家國喪亡遂拈拄杖云還有同生同死底衲僧麼昭覺勤云當時若有個漢出來道得一句互為賓主免得雪竇者老漢後面自點胸鼓山賢云且道立即是不立即是若道有時立有時不立却似瘧病相似若道雙照雙遮遮照同時猶未離教家極則畢竟作麼生拈拄杖卓一卓鎮州寶壽沼禪師南五臨濟玄嗣僧問訊次壽曰百千諸聖盡不出此方丈內僧曰祇如古人道大千沙界海中漚未審此方丈向甚麼處著壽曰千聖現在僧曰阿誰證明壽便擲下拂子僧從西過東立壽便打僧曰若不久參焉知端的壽曰三十年後此話大行昭覺勤云寶壽在方丈裏布網張羅者僧釣餌邊擎頭戴角三度衝浪上來三度被他籠且道他得個什麼還會麼重賞之下必有勇夫寶壽因僧問萬里無片雲時如何壽曰青天也須喫棒曰未審青天有什麼過壽便打天奇瑞云大小寶壽可謂為人為徹殺人見血證果興云寶壽者漢不妨説也説得到用也用得到只是遲了若是山僧待道萬里無片雲時如何便與劈頭一棒免得他向青天著倒寶壽因胡釘鉸參壽問莫是胡釘鉸麼胡曰不敢壽曰還釘得虗空麼胡曰請和尚打破來壽便打胡曰和尚莫錯打某甲壽曰向後有多口阿師與你點破在胡後到趙州舉前話州曰汝因甚麼被他打胡曰不知某甲過在甚麼處州曰祇者一縫尚不奈何胡乃有省雪竇顯云我要打者三個漢一打趙州不合瞎却胡釘鉸眼二打寶壽不能塞斷趙州口三打胡釘鉸不合放過寶壽驀拈拄杖云更有一個大衆一時退乃擊禪牀一下溈山哲云者漢雖然省去可惜趙州放過當時待問過在甚麼處劈脊便棒非但承他寶壽威光亦乃與叢林為龜為鑑徑山杲云直饒釘得者一縫檢點將來亦非好手可憐兩個老禪翁却對俗人説家醜鼓山永云寶壽雖具打破虗空底鉗錘未免傷鋒犯手胡公末後悟去誰知眼尚𥉌𭿇天寧琦云胡釘鉸原不知者一縫當時趙州若不與賊過梯便是踏破百二十緉草鞋也未瞥地在雖然釘鉸明得也較寶壽三千里資福廣云千鈞之弩不為鼷鼠發機寶壽不得無過趙州雖善挽轉也是就地彈雲溪挺云寶壽雖則孫承祖業未免依樣畫葫蘆胡釘鉸終是死漢若解知恩報恩打趙州拳頭有分在寶壽因西院來參問踏倒化城來時如何壽曰不斬死漢院曰斬壽便打院連道斬斬壽又隨聲打少頃乃謂侍僧曰適來者僧將赤肉抵他乾棒著甚死急次有一僧來白曰某甲啓和尚者問話底僧在大覺處來兩人同參在者裏見解總與麼恐已後委悉和尚法道須是趂出二人若不趂出已後難得人承嗣壽即將陳白僧趂出風穴喜云西院踏破化城要且腳跟未得點地寶壽不斬死漢早已血濺梵天則且置祇如趂出者僧意作麼生韜略雙全多意氣安南塞北一齊收寶壽問新到近離甚處曰崔禪壽曰還將得崔禪喝來麼曰不將得來壽曰與麼則不從崔禪來僧便喝壽拈棒僧擬議壽便打雲居舜云寶壽與麼問也險者僧食到口邊被人奪却白巖符云者僧不妨頑軟怎奈有始無終若是個漢當時待拈棒好更與一喝拂袖便出管取寶壽另眼相看鎮州三聖慧然禪師南五臨濟玄嗣到德山才展具山曰不用展炊巾者裏無殘羮餿飯聖曰賴遇無設有向甚處著山便打聖接棒推倒向繩牀上山大笑聖哭曰蒼天蒼天便下參堂琅瑘覺云若無欒布作怎得見韓光溈山行云三聖撥草瞻風有舒有卷德山勘凡聖有放有收德山笑去即且置三聖哭蒼天便出意作麼生不貪香餌味可謂碧潭龍雲巖遊云三聖便展坐具作賊人心虗山云不用展炊巾尾巴露也聖云設有向什處著口是禍門山便打裂破古今聖接棒推山向繩牀上老鼠入牛角更有一轉語待無舌人忌口却向汝道清化嶾云赤眼火金剛伎倆恰相當好手逢好手何更哭蒼蒼洞中春色幾人知門外秋紅風落了三聖到仰山山問汝名甚麼聖曰慧寂山曰慧寂是我名聖曰我名慧然山大笑而已昭覺勤舉雪竇頌畢云者個笑千古萬古清風凜凜地為甚麼雪竇却道只應千古動悲風也是死而不弔徑山杲云兩個藏身露影漢殊不顧旁觀者哂愚菴盂云仰山向虗空裏穵縫三聖煉石補天陳希夷一覺睡千年至今不知直是好笑鳳山啓云同聲相應同氣相求出沒卷舒隨機自在自是衲僧巴鼻若只對泥神土地而壁立萬仞又安知雲龍之變化霧豹之文蔚哉雖然且道仰山一笑是何節拍擲拄杖歸方丈三聖上堂曰我逢人即出出即不為人便下座興化獎云我即不然逢人即不出出即便為人保寧勇云此二尊宿恁麼為人猶在半途保寧今日路見不平拈拄杖下座大衆一時走散擲杖歸方丈寶峰文云者兩個老古錐竊得臨濟些子活計各自分疆列界氣衝宇宙使明眼衲僧見只得好笑且道笑個甚麼還知落處麼若知一任七顛八倒若不知且向二老葛藤裏咬嚼昭覺勤云一人在孤峰頂上土面灰頭一人在十字街頭斬釘截鐵有頭有尾同死同生且道出即不為人底是出即便為人底是萬古碧潭空界月再三撈摝始應知靈隱嶽云二老漢滅却臨濟正法眼却向長安路上把手共行直至於今遞相鈍置且如何是共行一句掣開金殿鎖撞動玉樓鐘天童覺云墮也墮也今日不是減古人聲光且要長後人節操若是本色漢提佛祖印轉鐵牛機把拄杖一時穿却方見衲僧手段徑山杲云真淨老人大似欺誣亡沒杲上座即不然豁開三要三玄路坐斷須彌第一峰且道在三聖分上耶在興化分上耶具眼者辨取仰山欽云二老可謂一條拄杖兩人舁今日被天寧拗作兩橛了也以拄杖倚左邊云且聽各自平分報恩秀云者兩個漢大似才高語壯倚勢欺人拈拄杖云還見三聖興化麼復靠却杖云直饒具衲僧手段也且向者邊立天寧琦云三聖興化明眼宗師因什麼活計本同生涯逈異但有路可上更高人也行徑山琇云一人得其體一人得其用總未有作家手段萬壽既已出了且道有為人處無為人處祝融峰頂上露滴萬年松烏石道云一人向高高峰頂立一人向深深海底行欲扶臨濟正宗猶迂遠在石溪則不然何以見得兩頭俱坐斷一劒倚天寒松隱然云者二老同門出入夙世怨家一人向孤峰頂上臥月眠雲一人向十字街頭揚塵簸土檢點將來二俱漏逗各與三十拄杖且道龍峰與麼是賞伊是罰伊驀拈拄杖卓一卓云天上有星皆拱北人間無水不朝東雪竇雲云者兩個漢一人有餘處不足一人不足處有餘細檢將來好各與三十拄杖復云山僧與麼批判且道是為人不為人具眼者辨取愚菴盂云山僧今日出也還是為人是不為人若是為人則落興化圈套裏若不為人又落三聖圈套裏若總不恁麼又落山僧圈套裏畢竟如何喝一喝云一把柳絲收不得和煙搭在玉欄杆棲霞成云者兩個漢鼓兩片皮美則美矣善則未善何故靈龜負圖自取喪身之兆寶壽新云三聖有割己之能豈無為人之心興化有為人之心豈無割己之能還端的得麼易分雪裏粉難辨墨中煤五磊權云欽祖幸然拗折今日不肖兒孫未免更將鸞膠為伊續起逢人即出逢人不出兩彩一賽如箭中的金鳳銜花下彩樓眼裏瞳人吹觱栗三臺須是大家催無限清風生八極資福侶云三聖如虎頭戴角興化如牛羊無角識得二老一飲一咄寶掌白云三聖興化二尊宿將一箇稱錘拋來擲去使人啖不入且道當恁麼時誰者在先誰者在後良久云一把柳絲收不得和煙搭在玉欄杆神鼎澤云者兩個漢大似手執兵符各霸一方若到老祖門下總與三十拄杖趂出何故四祖新開鋪席賞罰分明菩提珍舉真淨語畢云真淨老人錯下名言纍及後人循途守轍列界分疆殊不知二大老背手抽金鏃翻身控角弓激揚臨濟賓主即不無若是活計何曾夢見今日新菩提落處也要諸人共知以拄杖畫一畫云自出洞來無敵手得饒人處且饒人乃擲下拄杖下座河渚謙云一人牙如劒樹一人口似血盆共拈一條龜毛索子擬穿天下人鼻孔殊不知自己鼻孔却被天下人穿却三聖問僧近離甚處僧便喝聖亦喝僧又喝聖又喝僧曰行棒即瞎便喝聖拈棒僧轉身作受棒勢聖曰下坡不走快便難逢便打僧曰者賊便出去聖遂拋下棒次有僧問適來怎容得者僧聖曰是伊曾見先師來天井新云拈頭作尾則易看樓打樓則難何故不見道白雲盡處是青山行人更在青山外法忍謐云者僧具超方手眼三聖展格外威權雖然縱奪可觀未免旁觀者哂覆盆菴主南五臨濟玄嗣因有僧從山下哭上盆閉却門僧於門上畫一圓相門外立地盆從菴後出却從山下哭上僧喝曰猶作者個去就在盆便換手捶胸曰可惜先師一場埋沒僧曰苦苦盆曰菴主被謾白巖符云有僧從山下哭上揑怪不少盆閉却門著忙作麼僧於門上畫一圓相門外立地我早候白盆從菴後出却從山下哭上伊更候黑僧喝曰猶作者個去就在明於責人昧於責己盆換手捶胸曰可惜先師一場埋沒赤眼撞著火柴頭僧曰苦苦灼然灼然盆曰菴主被謾咦且信一半復云者兩個漢驀拶相逢如龍得水似虎逢山意氣威獰則不無若到白巖者裏且各與他二十拄杖為什麼古佛堂前無如是事瓶山謙云者僧鬼家伎倆姑置不論菴主隨邪逐惡好與二十笤帚
