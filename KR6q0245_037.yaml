body:
  text: 古杭白巖嗣祖沙門淨符彚集青六撫州金峰從志禪師青六曹山寂嗣上堂事存函葢合理應箭鋒拄還有人道得麼若有人道得金峰分半院與他住時有僧出禮拜峰曰相見易得好共住難為情便下座天童覺云重賞之下必有勇夫者僧擬乎強取金峰却又不甘還知蚌𧑐相持總落漁人之手麼若也辨得函葢箭鋒金峰一院兩手分付寶壽新云金峰將個破院子看得活寶相似放又恐放去揑又怕捏殺當時者僧若是個漢待道有人道得金峰分半院與他住便好掀倒禪牀喝散大眾管教一院兩廊雙手分付還有旁不甘底麼出來與金峰作主金峰因僧侍次乃謂僧曰舉一則因緣汝第一不得亂會僧曰請和尚舉峰豎起拂子僧良久峰曰知道闍黎亂會僧以目視東西峰曰雪上霜昭覺勤云金峰起模畵樣者僧好肉剜瘡不唯雪上加霜亦且將錯就錯山僧亦有一則機緣只是不舉向諸人何故六耳不同謀清化嶾云古洞雲興碧潭霧起金峰老漢不合教壞人家男女怎如山僧者裏全無佛法道理金峰一日拈起枕子示僧曰一切人喚作枕子金峰道不是僧曰未審和尚喚作什麼峰拈起枕子僧曰恁麼則依而行之峰曰你喚作什麼曰枕子峰曰落在金峰窠裏法雲秀云買賣不相當牛頭南馬頭北與麼說話也未出得金峰窠窟在畢竟如何心不負人面無慙色雲葢本云賣寶遇著瞎波斯昭覺勤云渾圇無縫罅綿密不通風𦘕也𦘕不成描也描不就喚作枕子固是落在金峰窠窟裏直饒不喚作枕子未免亦落在金峰窠窟裏且作麼生出得金峰窠窟識取鈎頭意莫認定盤星髻珠昰云平地上栽荊棘不善趨避者刺手刺脚未審和尚喚作什麼他拈起枕子便好一喝當時者僧若能下得者一喝管取金峰在窠窟裏出頭不得金峰因僧問訊次乃把住曰輙不得向人道我有一則因緣舉似你僧作聽勢峰與一掌僧曰為什麼打某甲峰曰我要者話行明招謙云可惜許金峰好一則因緣被者僧塌却若要話行者一掌須是金峰自喫始得昭覺勤別云六耳不同謀金峰上堂老僧二十年前有老婆心二十年後無老婆心僧便問如何是和尚二十年前有老婆心峰曰問凡答凡問聖答聖如何是二十年後無老婆心峰曰問凡不答凡問聖不答聖天童傑云烏巨當時若見但冷笑兩聲者老漢忽若瞥地自然不墮聖凡窠臼報恩琇云金峰可謂得向上鉗錘不落時人窠窟然檢點將來也是自起自倒壽昌浩云金峰老漢縝密處水泄不通疎頑時隨邪逐惡者僧貪他香餌未免墮在聖凡窠窟裏百劫千生出身無路興國今日平高就下買帽相頭諸仁者莫謂山僧為你說老婆禪好喝一喝泰云二十年前有老婆心也沒交涉二十年後無老婆心也沒交涉畢竟如何再遲二十年與諸人道破金峰因僧問是身無知如土木瓦石此意如何峰下禪牀扭僧耳朵僧負痛作聲峰曰今日始捉著個無知漢僧作禮出峰召闍黎僧回首峰曰若到堂中切不得舉著曰為什麼峰曰恐有人笑金峰老婆心南山寶云殺人刀活人劒在金峰慣得其妙怎奈者僧貪觀天上月失却手中橈當時若是個漢待伊擬下禪牀便與一啐管取金峰作伎倆不成金峰一日見僧來便起身僧便出去峰曰恰共昨日那師僧見解不別僧遂回曰昨日僧道什麼峰曰恰與麼問曰知道金峰有眼峰曰金峰且置你今日何處喫飯曰道著即不中峰曰與麼則無來處也曰老婆心堪作什麼峰曰金峰問僧不曾弱他就中闍黎無話會處曰豈是分外峰曰小慈妨大慈昭覺勤云鈎頭香餌放去收來衝浪錦鱗搖頭振𩮻雖金峰不曾弱他奈者僧承機自弱還會麼小慈妨大慈金峰問僧甚處來曰東國來峰曰作麼生過得金峰關曰公驗分明峰曰試呈似金峰看僧展兩手峰曰金峰關從來無人過得曰和尚過得麼峰曰波斯喫胡椒仰山欽云過關須是透關眼守關須是把關人金峰不覺瞌睡致被者僧衝突雖然蕩蕩一條官驛路晨昏曾不禁人行金峰因僧問金杯滿酌時如何峰云金峰不勝酩酊昭覺勤云承言會宗明機普應則不無金峰子細檢點將來也大漏逗若有人問蔣山金杯滿酌時如何只對他道山僧自來天戒撫州曹山慧霞禪師青六曹山寂嗣僧問佛未出世時如何山曰曹山不如曰出世後如何山曰不如曹山天童覺云佛與曹山主賓互換出世不出世各具一隻眼未有常行而不住未有常住而不行還會麼幽洞豈拘關鎖意縱橫不涉兩頭機報恩秀云曹山不如自携瓶去酤村酒不如曹山却著衫來作主人天童拈處不礙裂開萬松著語何妨揑聚佛與曹山主賓和合出世不出世雙眼圓明終日在途中不離家舍終日在家舍不離途中還會麼雲生洞口還歸洞密密金刀剪不開天寧琦云大小曹山口甜心苦若有人問壽山佛未出世時如何好出世後如何好與他三個好且聽一生參龍華體云曹山可謂寶鏡高懸妍并照美則美矣未免話作兩橛今日若有問新弁山佛未出世時如何向道以吾為隱乎出世後如何吾無隱乎爾且道與曹山是同是別壽昌浩云正偏妙叶還他本分宗師就裏明機須當陽有準若有問山僧佛未出世時如何水足草足出世後如何牽犂拽耙何故不見道雲散家家月春來處處花曹山因僧侍立山曰道者可煞熱曰是乃問祇如恁麼熱向什麼處迴避山曰向鑊湯爐炭裏𢌞避曰鑊湯爐炭裏作麼生𢌞避山曰眾苦不能到昭覺勤云回機轉位宛爾通方直下似臘月蓮花雖然如是斬釘截鐵更饒一路或有問山僧恁麼熱向什麼處𢌞避只向他道鑊湯爐炭裏𢌞避鑊湯爐炭裏如何向避向道熱殺也且道還有為人處也無資福侶云親切提持圓融自在還他曹山然檢點將來尚存義路山僧者裏則不然若有問鑊湯爐炭裏作麼生𢌞避向他道知汝信不及洞山度云諸禪德只如鑊湯爐炭裏苦不可言因甚道眾苦不能到還知古人落處也無若知落處寒則普天普地寒熱則普天普地熱者裏會得更須知有向上一竅其或未然只知事逐眼前過不覺老從頭上來龍潭觀云喜善則不然寒暑到來向什麼處𢌞避只向伊道三條椽下七尺單前他若更問祇如三條椽下七尺單前作麼生𢌞避向道熱則乘凉寒便添衣曹山因僧問四山相逼時如何山曰曹山在裏許曰還求出也無山曰在裏許即求出灜山誾云潦倒曹山被者僧拶得立地尿出白巖符云與麼答話大似自語相違我若作曹山待道還求出也無不求出他必問為什麼不求出却向道是他受用慣常洪州鳳棲山同安丕禪師青六雲居膺嗣僧問如何是和尚家風安曰金雞抱子歸霄漢玉兔懷胎入紫薇曰忽遇客來將何祇待安曰金果早朝猿摘去玉華晚後鳳啣歸廣福勤云廣福則不然有問如何是和尚家風祇向他道翠竹叢邊歌欵乃碧巖深處臥烟蘿忽遇客來將何祇待沒底籃兒盛皓月無心盌子貯清風徑山杲云同安家風不妨奇怪徑山要且不然有問如何是和尚家風但向道齋時一鉢和羅飯禪道是非總不知客來將何祇待蒸餅䬪飥天寧琦云正偏回互不犯鋒鋩問答縱橫唯明尊貴同安老人慣得其便或有人問天寧如何是和尚家風向道鉢盂鐼子忽遇客來將何祇待飯後一杯茶且道與古人是同是別天童忞云同安十分奇怪大慧一味尋常從上家風但只恁麼達磨一宗埽土而盡大覺門下又復不然有問如何是和尚家風爛研巴豆三千顆瀉却諸方五味禪客來將何祇待換骨洗腸重整頓通身是眼更須參紫梅周云同安家風太殺富貴要且無衲僧氣味者裏則不然忽有問如何是和尚家風但對道鬱鬱長松盤翠葢林林修竹結青垣忽遇客來將何祇待齋時炊燕麥午後點麤茶且道與古人相去多少鳳山啟云同安老祖富同金谷俠比孟甞雖則賣弄祖父家風未免糜費常住脫有問妙叶家風向他道鉏翻碧落雲千頃消受青山月一瓢客來將何欵待只有家常飯殊無五味香同安問僧甚處來曰湖南安曰還知同安者裏風雲體道花檻璇璣麼曰知安曰非公境界僧便喝安曰短敗樵人徒誇書劒僧擬進語安曰劒甲未施賊身已露百丈泐云者僧祇知貪程不覺錯路同安善於接機却費許多周折百丈則不然問他甚處來曰湖南便云劒甲未施賊身已露不特令者僧慶快平生亦免使諸人話墮同安看經次見僧來參遂以衣袖葢却頭僧近前作弔慰勢安放下衣袖提起經曰會麼僧却以衣袖葢頭安曰蒼天蒼天寶壽方云盡道者兩個漢大似赤眼撞著火柴頭殊不知他是個名門老將遇著孫武子家兒孫自然縱奪可觀互換有準雖然笑殺釣魚臺上客有分在泰云橫身宇宙明暗交馳換手捶胷互為賓主所謂作家相遇各盡來機然就中一句終是未曾道著池州嵆山章禪師青六雲居膺嗣在投子作柴頭一日侍投子同喫茶次子舉茶盌曰森羅萬象總在裏許山遂將茶潑却曰森羅萬象在什麼處子曰可惜一盌茶明招謙云嵆山未潑茶前合下得什麼語免他道可惜一盌茶歙州朱溪謙禪師青六雲居膺嗣韶國師行脚時到參值犬咬靈鼠韶便問是什麼聲溪曰犬咬靈鼠聲韶曰既是靈鼠因甚麼却被犬咬溪曰咬殺也韶曰好個犬溪便打韶曰莫打某甲話在溪休去昭覺勤云朱溪八面受敵固宜委曲接人國師一著當機未免承虗接響當時待他道莫打某甲話在但向道已後須遇人始得杭州佛日本空禪師青六雲居膺嗣參夾山入方丈纔至階前山便問甚處來曰雲居來山曰即今在什麼處曰在夾山頂𩕳上山曰老僧行年在坎五鬼臨身日擬上階山曰三道寶階從何而上曰三道寶階曲為今時向上一路請師直指山便揖日乃上階禮拜山問闍黎與什麼人同行曰木上座山曰何不來相看老僧曰和尚看他有分山曰在甚處曰在堂中山便同日下到堂中日遂取拄杖擲在山面前山曰莫從天台得否曰非五嶽之所生山曰莫從須彌得否曰月宮亦不逢山曰恁麼則從人得也曰自己尚是冤家從人得堪作什麼山曰冷灰裏有一粒豆𪹼寶壽方云本公一酬一對大有來由不媿為雲居嫡子然敲磕將來不無話作兩橛當時待問木上座在甚處何不向道某甲乍到勞倦別日再來呈似拂袖便出夾山眼裏有睛自當大開東閣却乃曰在堂中衲僧分上成得個甚麼潭州報慈藏嶼禪師青六龍牙遁嗣僧問情生智隔相變體殊只如情未生時如何慈曰隔曰情未生時隔個什麼慈曰者個梢郎子未遇人在瑯瑘覺云報慈不妨入泥入水若據衲僧門下遠之遠矣黃龍新云也是小慈妨大慈者僧還同受屈梢郎子未遇人在今時往往作是非會不作是非會如何理論良久云天上有星皆拱北人間無水不朝東開福寧云報慈一隔佛祖命脉放去收來凡聖罔測東禪觀云報慈始初大開東閣末梢只以麤茶備禮南㵎問云報慈可謂冰稜上行劒刃上走怎怪者僧對面千里大同安云慈禪法施非慳無問其人將至寶一時擿出怎奈困神窮子見不能取乃曰惜哉如何而處隋州護國守澄淨果禪師青六疎山仁嗣僧問鶴立枯松時如何國曰地下底一場懡㦬曰滴水滴凍時如何國曰日出後一場懡㦬曰會昌沙汰時護法善神向甚麼處去國曰三門頭兩個漢一場懡㦬博山來云護國三懡㦬囫圇無縫罅便是具鐵眼銅睛底漢子也分剖不下惟同道者方知且道誰是同道者直饒你知得道得總是一場懡㦬南七汝州風穴延沼禪師南七南院顒嗣在郢州衙內陞座曰祖師心印狀似鐵牛之機去即印住住即印破祇如不去不住印即是不印即是時有盧陂長老出問某甲有鐵牛之機請師不搭印穴曰慣釣鯨鯢沉巨浸却嗟蛙步蹍泥沙陂佇思穴喝曰長老何不進語陂擬議穴打一拂子曰還記得話頭麼陂擬開口穴又打一拂子牧主曰信知佛法與王法一般穴曰太守見個甚麼道理牧曰當斷不斷反招其亂穴便下座昭覺勤云風穴擐三玄戈甲施四種賓主明立信旗密排陣敵及至盧陂纔跨鐵牛畫時擒下遂令牧主知歸所謂龍驤虎驟鳳翥鸞翔雖然若是崇寧待伊道有鐵牛之機劈脊便棒殺人刀活人劒還知落處麼報恩秀云風穴道太守見個甚麼道理者裏便好與盧陂雪屈天寧琦云擊石火閃電光搆得搆不得未免喪身失命風穴壁立千仞坐斷盧陂舌頭盧陂若是個人未到牧主檢責纔見他道祖師心印狀似鐵牛之機呵呵大笑他若擬議拍一拍便行無端請師不搭印倚他門戶旁他牆剛被時人喚作郎如今有人與風穴作主我要問他心印在什麼處博山來云風穴泥印子在手印住也得印破也得盧陂不搭印正是鐵牛機可惜乾𪹼𪹼地若帶些水頭管取他泥印子爛去磬山修云決戰者不顧其首盧陂也是一員猛將敢來奪令攙旂怎奈風穴作家陣勢排定教你無門可入無路可出自非披三玄戈甲七事隨身者孰能如是雖然當時不得牧主怎生收煞天童忞云風穴據令牧主知歸可謂龍驤虎驟鳳翥鸞翔旦暮一時千秋或遇祇如盧陂落節且道過在什麼處焦山乘云風穴牧主早已被盧陂看破龍華宗云向弓弦上走馬針鋒上削鐵卷舒自在收放臨時還他興化老漢若是龍華又且不然遂拍膝一下云自有一雙窮相手未曾容易舞三臺崇慶古云者僧祇解據虎頭不解收虎尾累及風穴喪盡生平何似我龍上座入水不動波出林不動草便能以鐵牛機一印印定且道憑何證據呈拄杖云應如是知如是見如是信解復卓一卓大覺昇云風穴正令全行盧陂退身賣陣檢點將來總讓牧主一籌何故伯牙縱有高山調不是知音也是閒白巖符云大小風穴一期做處却被個俗官覰破若不得個隱身符子討甚衲僧好與盧陂長老一狀領過風穴參南院入門不禮拜院曰入門須辨主穴曰端的請師分院於左膝拍一拍穴便喝院於右膝拍一拍穴又喝院曰左邊一拍且置右邊一拍作麼生穴曰瞎院便拈棒穴曰莫盲枷瞎棒奪打和尚莫言不道院擿下棒曰今日被黃面浙子鈍置一場穴曰和尚大似持鉢不得詐道不饑院曰闍黎曾到此間麼穴曰是何言歟院曰老僧好好借問穴曰也不得放過靈隱嶽云嗄也甚奇怪一個禿笤一個破糞箕搕𢶍堆頭也用得著然未免鈍置門風若據令而行總欠一著南堂欲云精金躍冶正要鉗錘赤驥追風豈資鞭影是他南院末上太殺傷慈直到下梢分疎不下本覺者裏設有問入門須辨主端的請師分便與連棒趁出何故當門不用栽荊棘免得人來惹著衣風穴上堂若立一塵家國興盛野老顰蹙不立一塵家國喪亡野老安怗於此明得闍黎無分全是老僧於此不明老僧却是闍黎闍黎與老僧亦能悟却天下人亦能瞎却天下人欲識闍黎麼右邊一拍曰者裏是欲識老僧麼左邊一拍曰者裏是雲門偃云者裏即易那裏即難瑯瑘覺云杓卜聽虗聲雪竇顯舉若立一塵家國興盛不立一塵家國喪亡遂拈拄杖云還有同生同死底衲僧麼白雲端云大眾立即是不立即是良久云心不負人面無慚色拍禪牀一下五祖演云太平即不然若立一塵法堂前草深一丈不立一塵錦上鋪花何也不見道九九八十一窮漢受罪畢纔擬展脚眠蚊蟲獦蚤出靈隱嶽云大小風穴醋氣猶在何故始作翕如也縱之純如也皦如也繹如也以成喝一喝報恩秀云雲門矢上加尖瑯瑘腦後拔楔此亦一塵廢立家國興亡也其實中心樹子何曾少動烏石道云風穴大似個賣卜漢未拋卦錢時吉凶禍福盡在自身擿下卦錢禍福吉凶盡在他人分上然雖如是且道他以手左邊拍一拍右邊拍一拍意作麼生愚菴盂云喫官酒臥官街當處死當處埋妙手何須誇徧拍三台須是大家催洞山瑩云風穴將十方常住一片田地開兩路門頭與人較奢論富美則美矣檢點將來少些大人氣相洞山則不然卓拄杖云蕩蕩皇風成一片不知何處有封疆廣潤融云者黃面浙子把臨濟主賓玄要一時瓜分得七花八裂了也雖然幸喜伊能喝不作喝用故門風不致掃土且道那裏是喝不作喝用處遂一喝風穴因僧問語默涉離微如何通不犯穴曰常憶江南三月裏鷓鴣啼處百花香雪竇顯云曾有人問我對他道劈腹剜心又且如何復云因風吹火別是一家傷鼈恕龜必應有主鼓山珪云且道是犯不犯南華昺云風穴入林不動草入水不動波眼睛裏倒卓須彌眉毛裏橫安世界畢竟落在甚處只許老胡知不許老胡會西禪需舉雪竇語畢云二老漢一人如三春和煦一人如雪上加霜雖則來機不昧縱奪可觀其奈未出者僧所問曾有僧問西禪向伊道泥牛吼處千華秀木馬嘶時萬木秋復云師子頻呻象王回顧三千年後和泥合水莫道見西禪來天童覺云露躶躶圓陀陀直是無稜縫且道風穴無稜縫何似雪竇無稜縫還會麼和光惹事刮篤成家天童傑云風穴老祖將白和麩殻糶了引得後來人徒向百花深處作道理成羣作隊外邊打之遶徑山則不然有問語默涉離微如何通不犯即向他道置將一問來中峰本云者僧問處如大浸稽天無物不在波瀾之內風穴固是入水不溺怎奈全身在裏許雲居莊云者僧與麼問風穴與麼答似則似矣是則未是雖然你要見他風穴三生六十劫積翠潤云者裏若有問語默涉離微如何通不犯便劈脊棒云話墮了也風穴因僧問九夏賞勞請師言薦穴曰出袖拂開龍洞雨泛杯波湧鉢囊華昭覺勤云風穴用得當陽事不妨風流儒雅要且只道得途中句或有問道林九夏賞勞請師言薦向道四絕堂邊呈瑞氣三湘江畔奪高標風穴因真園頭同念法華問訊次穴問真如何是世尊不說說迦葉不聞聞真曰鵓鳩樹上啼穴曰你作許多癡福作麼何不體究言句乃問念法華你作麼生念曰動容揚古路不墮悄然機穴却顧真曰你何不看念法華下語高峰妙云山僧昔年侍立先師次亦甞被問此話擬下語間遂遭一頓熱棒打出直得三日忍痛不已大眾端要見二老優劣但將妙上座喫棒處看風穴因僧問古曲無音韻如何和得齊穴曰木雞啼子夜芻狗吠天明徑山杲云者黃面浙子恁麼答話也做臨濟兒孫未得在今日或有問徑山古曲無音韻如何和得齊只向他道木雞啼子夜芻狗吠天明南堂欲云先行不到末後太過要見條理始終須是金聲玉振磬山修云妙喜老人恁麼答話亦未作得風穴兒孫在有人問磬山古曲無音韻如何和得齊但向他道木雞啼子夜芻犬吠天明報恩賢舉妙喜語畢云富而好禮以見無驕財不苟得方無濫取徑山老人只欲抑人揚己不顧旁觀自不能逃二者之咎雖然還知他為人處麼若非捨己從人那見婆心切切喝一喝甌峰承云此三大老一人得第一句一人得第二句一人得第三句有人揀辨得出堪為濟下兒孫其或未然鄭州出曹門風穴因僧問如何是學人自己穴曰是汝自己僧禮拜穴便打天寶樞云是汝自己以水澆水劈脊便棒徹骨徹髓郢州芭蕉繼徹禪師南七芭蕉清嗣僧問有一人不捨生死不證涅槃師還提携也無蕉曰不提携曰為什麼不提携蕉曰林溪麤識好惡天童覺云芭蕉雖然識好惡且不能驅耕夫之牛奪饑人之食如今有問長蘆便和聲打為什麼如此從來不識好惡洞山瑩云芭蕉雖識好惡大似醉後添杯要活者僧不得天童不識好惡是則驅耕奪食雖活者僧未免傷鋒犯手若有問新豐但向道利劒不斬死漢他若是個衲僧管取別有生涯郢州興陽歸靜禪師南七西院明嗣初參西院便問擬問不問時如何院便打陽良久院曰若喚作棒眉鬚墮落陽於言下大悟保福展云雖然如是你眉毛有幾莖開福寧云者僧却有陷虎之機西院不覺投他深穽若人辨得親佩毗盧印當陽捋虎鬚如其見解未圓棒頭有眼明如日要識真金火裏看樟山量云興陽悟去則且置諸人還知西院落處麼良久乃曰倚天長劍用無痕
