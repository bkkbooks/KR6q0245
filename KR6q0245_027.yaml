body:
  text: 古杭白巖嗣祖沙門淨符彚集南五魏府大覺和尚南五臨濟玄嗣參臨濟濟見豎起拂子覺展坐具濟擿下拂子覺收坐具參堂去時眾議曰此僧莫是和尚親故不禮拜又不喫棒濟聞令侍者喚覺至曰大眾道汝來參長老又不禮拜又不喫棒莫是長老親故覺乃珍重下去如菴彰云風來樹動雨過山青若二老者可謂作家相見逈出常情雖然檢點將來大覺猶欠一籌當時待侍者來喚便好掌云者一掌合是堂頭老漢喫非唯塞斷臨濟咽喉且使一眾狐疑渙然冰釋定州善崔禪師南五臨濟玄嗣因州將王令公於衙署張座請說法崔陞座拈拄杖曰出來也打不出來也打僧出曰崔禪聻崔便擿却拄杖曰久立令公伏惟珍重便下座五祖戒別僧便推倒禪牀瑯瑘覺云久經行陣者終不展鎗旗雲葢智云身挨白刃不懼死生也須是者僧始得崔禪為什麼當機放過要會麼錦鱗已得休勞力收取絲綸歸去休薦福行云崔禪美則美矣善則未善何故大似放過者僧山僧即不然待者僧出眾未開口便與痛棒他若皮下有血必然別有生涯龜峰光云崔禪布長蛇偃月大陣欲統四大部洲為一世界不是者僧攙旗奪鼓未免陷在虜庭且道坐籌帷幄鎮靜八方水乳和同風雲會合一句作麼生道若不藍田射石虎幾乎悞殺李將軍南㵎問云雲葢道者僧身挨白刃不懼死生可惜崔禪當機放過殊不知者僧喫了崔禪一頓棒至今轉身不得要識崔禪麼運籌帷幄決勝千里寶掌白云崔禪擬欲當堂據令十處埋兵不知冷地裏被個販私鹽漢突圍而入幾乎打破蔡州白巖符云者僧疋馬單刀向龍蛇陣裏斬將搴旗不妨許伊是個豪中豪爭奈崔禪韜略尤能妙出孫吳雖然總不禁王公冷眼廣教玉云出來也打不出來也打渾鋼打就生鐵鑄成僧出曰崔禪聻滿地刀鎗崔擿却拄杖便下座掘地陷平人古人盡道者僧不顧危亡身挨白刃殊不知大小崔禪被者僧靠來只得將錯就錯還有識他汗臭氣者麼幽州譚空禪師南五臨濟玄嗣因鎮州牧有姑為尼行脚回欲開堂為人牧令空勘過空問曰聞汝欲開堂為人是否尼曰是空曰尼是五障之身你作麼生為人尼曰龍女八歲南方無垢世界成等正覺又作麼生空曰龍女現十八變你試一變看尼曰不是野狐精變個什麼空便打鎮州牧主聞云和尚拄杖折那翠巖芝云且道尼具眼不具眼只擔得條斷貫索作麼生會鄂州灌溪志閑禪師南五臨濟玄嗣參臨濟濟驀胸搊住溪曰領領濟托開曰且放你一頓天童華云灌溪氣宇如王被臨濟活埋在鎮州城裏十字街頭當時若是光孝棒折也不放在何故家肥生孝子國霸有謀臣靈隱嶽云爐鞴之所鈍鐵猶多雖然如是不因夜來雁爭見海門秋灌溪住後上堂我在臨濟爺爺處得半杓末山孃孃處得半杓共成一杓喫了直至如今飽不饑天童覺云灌溪恁麼說話且道是臨濟處得底末山處得底雖然一箭落雙鵰怎奈有時走殺有時坐殺且作麼生得恰好去揑聚放開全在我拈來拋去更由誰灌溪上堂十方無壁落四面亦無門露裸裸赤灑灑沒可把便下座崇覺空云灌溪老漢向十字街頭逞風流賣惺惺道我解穿珍珠解玉版濄亂絲卷筒絹婬坊酒肆瓦合輿臺虎穴魔宮那吒忿怒遇文王興禮樂逢桀紂逞干戈今日被崇覺覰見一場懡㦬灌溪因僧問久嚮灌溪到來只見漚麻池溪曰汝只見漚麻池要且不見灌溪曰如何是灌溪溪曰劈箭急玄沙備云更學三十年未會禪在天童悟云灌溪雖能拽轉鼻孔爭奈惹人情見何不待伊問如何是灌溪劈脊便打鎮州萬壽和尚南五臨濟玄嗣一日過訪寶壽寶坐不起萬展坐具寶下禪牀萬却坐寶驟步入方丈閉却門萬乃歸院翌日寶壽來復謁萬亦坐不起寶展坐具萬亦下禪牀壽却坐萬遂歸方丈閉却門寶於侍者寮取灰圍却方丈門便歸去萬開門見曰我不恁麼他却恁麼磬山修云二老一衝一撞如兩虎相見各露爪牙無有一毫虧損處不媿同參足為模範雖然總未免傍觀者哂白巖符云二老主賓相見進退可觀使覆師辱國者見得不汗下雖然二手平出就中一個占先還委悉麼我若作萬壽見灰圍却門便展具望空與伊三拜桐峰菴主南五臨濟玄嗣因僧問者裏忽遇大蟲作麼生峰便作虎聲僧作怕怖勢峰大笑僧曰者老賊峰曰爭奈老僧何僧却大笑雪竇顯云是即是兩個惡賊只解掩耳偷鈴愚菴盂云桐峰不用棒所以妙者僧不用喝所以妙桐峰大笑者僧亦大笑梁山泊裏稱豪傑看來都是不良人雲山和尚南五臨濟玄嗣問僧甚處來曰西京來山曰還將得西京主人書來否曰不敢妄通消息山曰作家師僧天然有在曰殘羮餿飯誰喫山曰獨有闍黎不甘喫僧便作吐勢山喚侍者曰扶出者病僧著僧便出去昭覺勤云一往觀來二俱作家節節勘證二俱落草當時若有人截斷葛藤不妨光前絕後還委悉麼多虗不如少實定上座南五臨濟玄嗣鎮府齋回到橋上坐次有三座主至一座主問如何是禪河深處須窮到底定擒住擬拋向橋下其二座主遽前勸曰休休莫怪觸忤上座且望慈悲定曰若不是者兩個座主直教他窮到底南㵎問云定上座性命在二座主手裏睦州尚書陳操居士南五睦州陳嗣一日偕僚屬登樓次遙見數僧來有一官人曰來者總是行脚僧公曰不是曰焉知不是公曰待來驗看須臾僧至樓前公驀喚曰上座僧皆舉首公謂眾官曰不信道溈山云陳尚書可謂手擎仲尼日月腰佩毗盧金印非惟儒士驚懾亦乃衲僧罔措不見道當機如電拂方免病棲蘆天童覺云陳操尚書白拈賊瞞長蘆一點不得鼓山永云者僧有理難伸死而不弔尚書按劍當門誰敢正眼覰著通玄奇云尚書可謂善識休咎閙裏換人眼睛者僧雖則舉首稱奇可惜還同受屈天井新云諸官施陷虎機尚書具透關眼山僧只得眼橫鼻直檢點將來溈山不惟塗汙尚書亦乃埋沒自己且作麼生是行脚僧汗臭氣當言不避截舌髻珠昰云眾官人被尚書當面熱瞞情猶可恕帶累他數員禪客平白受屈其可恕乎尚書齋次拈餬餅問僧曰江西湖南還有者個麼曰尚書適來喫個什麼書曰敲鐘謝響灜山誾云者僧俊鶻冲霄到也快便怎奈末上遭他網子祇如道敲鐘謝響者裏合作麼生對他何不道草賊大敗青五瑞州九峰道虔禪師青五石霜諸嗣在石霜典侍司會霜遷化眾欲舉首座繼席峰白眾曰須明得先師意始可住座曰先師有什麼意峰遂問先師道休去歇去冷湫湫地去一念萬年去寒灰枯木去古廟香爐去一條白練去其餘則不問一條白練去首座作麼生會座曰者個祇是明一色邊事峰曰元來未會先師意在座曰你不肯我那但裝香來香烟斷處若去不得即不會先師意遂焚香香烟纔起座便脫去峰拊其背曰坐脫立亡即不無先師意未夢見在雲居舜曰侍者平生只具一隻眼開福寧徵云且道首座是會先師意不會先師意若道會虔侍者為甚道坐脫立亡即不無先師意未夢見在若道不會其奈首座良哉快便撒手便行且道利害在什麼處會麼路遠夜長休把火大家吹滅暗中行南華昺云透生死關高超物表秉殺活劒獨據寰中若非智眼洞明未免扶籬摸壁要會麼春蘭與秋菊各自一時榮薦福行云大凡本分法席肘臂欲其重非重不能權衡佛祖爪牙欲其利非利無以開拓人天看他石霜遷化首座侍者各出一隻手扶持石霜宗旨直是光前絕後今古罕聞諸人要辨來端各請抝折弓箭踏翻射垛來與老僧相見徑山杲云兩個無孔鐵錘就中一個最重天寧琦云首座坐脫立亡侍者說黃道黑先師意在鈎頭須信曲中有直若在臨濟門下三十棒教誰喫纔說是非者便是是非人報恩秀云首座擔板只得一橛當時見道恁麼則未會先師意在只消道吾不如汝管教九峰無地容身不見道爭之不足讓則有餘雲門澄云諸方盡謂首座未會先師意以徑山檢點將來恰是九峰未會何也置枯木堂做死工夫豈不是石霜意承言者喪滯句者迷豈不是洞上宗見首座恁麼便謂不會先師意蹉過了也首座見他不會便乃盡令而行正恁麼時還是一色耶非一色耶九峰到者裏渾身是眼鑑不及滿身是口辨不得只得強作主宰道坐脫立亡則不無先師意未夢見在當時雖得便宜爭奈後來有個徑山澄長老冷眼難瞞要與首座雪屈大眾是他一賓一主共作一番廣大佛事了也你諸人徒向他舌頭底覓是非分得失便覺遠矣山僧如此批判大眾還甘麼良久云莫將閒學解埋沒祖師心博山來云善建者不善辨者若訥首座損其華填其實潔其操楷其式住持事業豈其然乎九峰太煞勁挺不近人情還會石霜意也未總好與三十笤帚福嚴容云首座坐斷十方不能密移一步若是山僧見道作麼生會好向云吹毛寶劒逼人寒他若擬議便與一喝云莫埋沒先師好管取九峰結舌且贏得一代住持清化嶾云者兩個漢好似吳越搖船各使一邊吾想石霜老祖決未肯點頭在理安洸云我若作首座待伊道明什麼邊事但向道先師無此語莫謗先師好雲溪挺云首座只知其一不知其二九峰只知其二不知其一要且先師意總未夢見在龍泉濌云一人善觀風化一人太殺煎逼可惜石霜一宗掃地而盡若是冰河𦦨發枯木花開的漢待他道明甚麼邊事和聲便棒不特光揚祖道亦使九峰倒退三千白巖符云石霜擿下一隻沒底船首座攔頭侍者把柂直入洪波浩渺間撑風載月興亦至矣但不知船艙裏有幾人坐得穩當九峰因僧問西天夏末得道者如林此間夏末還有得道者麼峰曰有曰何者是峰曰頭帶午夜月脚踏黃金地徑山琇云今日忽有問徑山此間夏末有人得道麼但對道無曰何謂無向道個個眉毛橫眼上人人鼻孔大頭垂且道九峰是徑山是九峰因僧問如何是頭峰曰開眼不覺曉如何是尾曰不坐萬年牀有頭無尾時如何曰終是不貴有尾無頭時如何曰雖飽無力直得頭尾相稱時如何曰兒孫得力室內不知博山來云指活路于中舌頭不粘著肉披全提於向上頭顱不拄著天九峰口齒若梭腸自有巧婦針線也所貴者兒孫得力室內不知且道不知底是何事靈隱禮云洞山明妙叶於正偏四臣咸奉一君九峰辨貴賤於內紹五子全身歸父殊不知威音那畔五馬不嘶今世門頭一牛不飲且道雲生碧嶂風起青萍枯木龍吟髑髏喜笑又作麼生乃卓拄杖云萬古碧潭空界月再三撈摝始應知台州湧泉景欣禪師青五石霜諸嗣因強德二禪客於路次見泉騎牛不識乃曰蹄角甚分明爭奈騎者不鑒泉驟牛而去及回見二禪客於樹下煎茶泉下牛與坐乃問近離甚處強曰那邊泉曰那邊事作麼生強提起茶盞泉曰此猶是者邊事那邊事作麼生強無對泉曰莫道騎者不鑒好保寧勇代泉指參隨人云歸到山中分明舉似寶壽方云大小湧泉大似南頭失利却來北頭盤本當時待道頭角甚分明爭奈騎者不鑒何不下牛向前搊住曰速道速道他若擬議便與劈面一掌却好曰莫道騎者不鑒好湧泉因雪峰來訪乃門送峰入轎了泉曰者個四人舁那個幾人舁峰乃踊身起曰道什麼泉再問峰曰行他不會泉曰知即知只是道不得雲居莊云有主有賓全收全放直須識取湧泉雪峰脫或未然切忌向虗空裏釘橛福州覆船洪薦禪師青五石霜諸嗣僧問鈎錐不到處請師到船良久僧曰掣電之機徒勞佇思船曰出格一句汝試道看僧近前三步却退後船曰此是出格句即今事作麼生僧拂袖便出船曰也是天津橋上漢昭覺勤云者僧渾金璞玉覆船大冶宏開百煉千煅成一個金剛王寶劒還委悉麼也是天津橋上漢北斗南頭著眼看覆船因僧問如何是師子子船曰善哮吼僧拊掌曰好手好手船曰青天白日却被鬼迷僧作掀禪牀勢船便打僧曰驢事未去馬事到來船曰灼然作家僧拂袖便出船曰將甌盛水擬比大洋灜山誾云若不是覆船肘後符靈幾被者僧奪却澧州洛浦元安禪師青五夾山會嗣結菴夾山經年不訪山乃作書令僧馳問浦接得便坐却展手索曰還有麼僧無對浦便打云歸去舉似和尚僧回舉似山山曰者僧若開書三日內必來若不開書此人救不得矣三日後浦果至見夾山不禮拜當面叉手而立山曰雞棲鳳巢非其同類出去浦曰自遠趨風請師一接山曰目前無闍黎此間無老僧浦便喝山曰住住且莫草草匇匇雲月是同溪山各異截斷天下人舌頭則不無闍黎爭教無舌人解語浦佇思山便打浦因茲伏膺興化獎代浦云但知作佛莫愁眾生雪竇顯云者漢可悲可痛鈍置他臨濟他既雲月是同我亦溪山各異說什麼無舌人不解語以坐具劈口便摵夾山若是個知方漢必然明牕下安排五祖戒出洛浦語云更說道理看便出去昭覺勤云雪竇雖是賊過後張弓不妨與臨濟雪屈若子細檢點將來令行一半倘若擔荷正法眼藏待伊道爭教無舌人解語便與掀倒禪牀喝散大眾更待什麼明窓下安排剔起便行直饒機如掣電眼似流星辨瀉懸河也卒著手脚不得且道誵訛在什麼處乃云險東山澓云洛浦當時雖無言可對無理可伸其不知如勾踐之行成卒能臥薪甞膽洛浦上堂孫臏今日收舖去也有卜者出來時有僧出曰請和尚一卜浦曰你家爺死僧無語法眼益代撫掌三下徑山杲云者僧沒興死却爺又彼他人撫掌信知禍不單行福無雙至然洛浦善卜法眼善斷若子細思量爻象吉凶二老一時漏逗既占得火風鼎卦何故斷作地火明夷雲門即不然驀拈拄杖云孫臏門下死却郎罷連卓三下云會麼內屬艮宮再求外象又卓三下云千神萬靈萬聖千靈莫順人情復卓一下云吉凶上卦天寧琦云洛浦道你家爺死拄却舌頭妙喜牙上生牙角上生角妄談休咎強說是非一時抖亂六十四卦了也天童忞云大慧老人錯下名言要知者僧正是因禍致福第恨不解即慶為祥能仁門下龍象必定別有長處不妨為者僧下一轉語金粟元云洛浦開大卜舖善斷吉凶可惜者僧不還卦錢帶累傍人拊掌今日者裏則不然孫臏收舖去也有卜者出來忽孝子出云請和尚一卜祇向他道汝家爺活大眾他家爺已死為甚却道活豈不聞七十一年名著於鄉善士之風山高水長洛浦因木平道參問一漚未發已前如何辨其水脉浦曰移舟諳水脉舉棹別波瀾平不契乃參蟠龍問一漚未發已前如何辨其水脉龍曰移舟不別水舉棹即迷流平從此悟入雲峰悅云木平若於洛浦言下會去猶較些子可惜許向蟠龍死水裏淹殺後有問如何是木平對曰不勞斤斧果然只在者裏諸禪德大凡發言超方也須甄別邪正識辨真偽帶些子眼筋始得雖然如是也是賊過後張弓高峰妙云若不是悅公洎合被他瞞却然雖如是且道蟠龍誵訛在什麼處移舟不別水舉棹即迷源天童忞云者則機緣大似狙公賦芧曰朝三而暮四眾狙皆怒曰然則朝四而暮三眾狙皆悅名實未虧而喜怒為用固矣真詮不謬而迷悟攸分何也諸仁者於此還曾揀辨得明麼出來通個消息不則射虎不真徒勞沒羽良久云參報恩琇云二大老恁般答話且道還有優劣也無若道無優劣為甚一能令人悟一不能令人悟若道有優劣優劣在什麼處咄到岸休爭筏歸家罷問程古南門云恁麼答話雖則啐同時若是一漚未發已前敢保未在今日若有人問山僧一漚未發已前如何辨其水脉向他道晴湖平似鏡不礙往來看洛浦因僧問學人擬歸鄉時如何浦曰家破人亡子歸何所曰恁麼則不歸去也浦曰庭前殘雪日輪消室內紅塵遣誰掃乃有偈曰決志歸鄉去乘舟泛五湖舉篙星月隱停棹日輪孤解纜離邪岸張帆出正途到來家蕩盡免作屋中愚天奇瑞云者僧曠劫孤露所以念念不忘洛浦雖然冰消瓦解又恐創建璚樓外脫牢籠內存經紀不免更贈一言何故雁飛不到處人被利名牽洛浦因侍者云肇法師製得四論也甚奇怪浦曰肇公甚奇怪要且不見祖師者無對清涼欽代云和尚什麼處見祖師雲居錫云甚麼處是肇公不見祖師處莫是有許多言語麼又云肇公有多少言語洛浦問蛤溪曰自從棃溪別後今得幾載溪曰和尚猶記得昔年事浦曰見說道者總忘却年月也溪曰和尚住持事繁且容子細看浦曰打則打會禪漢溪曰某甲消得浦曰道者住山事繁青龍斯云二老可謂有主有賓有收有放檢點將來總是互揚家醜弁山今日將條龜毛索子縛作一團拋向山門外寶珠池浸殺了也還有相救者麼如無煩東禪長老為伊解交洛浦問僧近離甚處曰荊南浦曰有一人與麼去還逢麼曰不逢浦曰為甚麼不逢曰若逢即頭粉碎浦曰闍黎三寸甚密雲門偃於江西見其僧乃問還有此語不僧云是門云洛浦倒退三千里白巖符云者僧應對有據不妨許伊是個行脚師僧為甚却向雲門手裏生被活埋有人能於雲門語下代者僧出一隻手山僧當與你個東瓜印洛浦臨終告眾曰今有一事問你諸人若道者個是即頭上安頭若道不是即斬頭求活首座曰青山不舉足日下不挑燈浦曰是什麼時節作者個語話時有彥從上座對曰離此二途請和尚不問浦曰未在更道從曰彥從道不盡浦曰我不管你盡不盡從曰彥從無侍者祇對和尚浦休去至晚喚從至曰闍黎今日祇對甚有來由汝合體得先師意先師道目前無法意在目前不是目前法非耳目之所到且道那句是賓那句是主若檢得出分付鉢袋子從曰彥從不會浦曰汝合會曰彥從實不會浦喝出乃曰苦苦洛浦既告眾矣至明日又僧舉前話問浦浦曰慈舟不棹清波上劒峽徒勞放木鵞報慈遂徵云且道從上座實不會為復怕見鉢袋子粘著伊博山來云將遷化之時託契於兒孫其妙思天造情懷自別首座彥公大有出身之路奈娛老者難以言句取則若迹解求之未免諳圖索馬也
