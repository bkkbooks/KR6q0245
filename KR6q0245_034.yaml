body:
  text: 古杭白巖嗣祖沙門淨符彚集青六福州長慶慧稜禪師青六雪峰存嗣因僧問衆手淘金誰是得者慶曰有伎倆者得曰學人還得也無慶曰太遠在雪竇顯代者僧當時便喝復云有伎倆者得一手分付有伎倆者不得兩手分付學人還得也無蒼天蒼天高峰妙云西峰則不然今日有問衆手淘金誰是得者只向道阿誰無分學人還得也無猶嫌少在南堂欲云長慶和盤托出者僧當面蹉過雪竇忍俊不禁不免按牛頭喫草今日有問靈巖衆手淘金誰是得者只向他道物見主眼卓豎學人還得也無又爭怪得老僧長慶上堂淨潔打疊了却近前就我覓我劈脊與你一棒有一棒到你你須生慙愧無一棒到你你又向什麼處會雪竇顯云雪竇即不然淨潔打疊了也直須近前就我覓我劈脊與你一棒有一棒到你你即受屈無一棒到你與你平出但與麼會黃龍清云長慶只知支離臃腫不知道之根源雪竇引蔓牽枝未免隨波逐浪寶峰則不然淨潔打疊了近前來只向道會麼歸堂去雖然如是也須是仙陀婆始得天童覺云死口喫常住飯展腳臥長連牀求個知慙愧者難得還知長慶棒頭落處麼雷開蟄戶電燒尾引出崢嶸頭角來天寧琦云衆中商量道坐在淨潔地上必須打疊近前覓底喫棒有分覓底是病棒底是藥所以雪竇云有一棒到你你即受屈無一棒到你與你平出杜撰禪和如麻似粟殊不知二大老一個掘地為坑一個夷井塞竈皆欲坐致太平爭奈返招怪笑毗婆尸佛早留心直至如今不得妙天界盛云天界則不然不消先打疊了來到者裏便劈脊與你一棒有一棒到你你作麼生會無一棒到你也須具大慚愧還有知長慶天界落處麼石壓笋斜出巖懸花倒生古南門云古南又不然淨潔打疊了也直須近前我劈脊與你一棒有一棒到你免你向淨潔處躲跟無一棒到你你須自解作活計始得天童忞云天童又且不然淨潔打疊了也待你向前我劈脊與你一棒有一棒到你你須知些痛癢無一棒到你你須生些慙愧拈拄杖卓一卓云且道有棒到你無棒到你夾路桃花風雨後馬蹄何處避殘紅寶掌白云長慶只知老婆垂手不知腫不益肥雪竇熱處刺頭未免相錮著鐵寶掌則不然淨潔打疊了也却近前問我覓我劈脊與你一棒有一棒到你蒼天蒼天無一棒到你蒼天蒼天長慶與保福遊山次福問古人道妙峰山頂莫祇者個便是也無慶曰是即是可惜許鏡清怤云若不是孫公便見髑髏遍野雪竇顯云今日共者漢遊山圖個什麼復云百千年後不道全無只是少理安洸云平田淺草略露風規是則酒逢知己飲檢點將來猶虧一半長慶拈拄杖示衆曰識得者個一生參學事畢雲門偃云識得者個為什麼不住靈巖安云恁麼住者喪我兒孫恁麼去者寒灰發𦦨然雖如是未得剿絶拈拄杖云識得者個麼敲出鳳凰五色髓擊碎驪龍明月珠長慶上堂總似今日老胡有望保福展出曰總似今日老胡絶望報慈遂云恁麼道是相見語不是相見語天童覺云富嫌千口少貧恨一身多雲居莊云總似今日老胡有望金將石試總似今日老胡絶望玉將火試擊拂子云一年春已過臺榭緑陰多寶壽方云二大老春蘭秋菊各擅其長初不許以優劣較然敲磕將來大似徐六擔板長慶上堂撞著道伴交肩過一生參學事畢雪竇顯云是即是針不劄風不入有什麼用處昭覺勤云撞著道伴交肩過露柱燈籠共證明古南門云相識滿天下知心能幾人長慶因僧問羚羊挂角時如何慶曰草裏漢曰挂角後如何慶曰亂呌喚曰畢竟如何慶曰驢事未去馬事到來雪竇顯云寧可碎身如微塵終不瞎個衆生眼長慶較些子復云一般漢設使羚羊未挂角也似萬里望鄉關南堂欲云長慶恁麼答話瞎却天下人眼去在雪竇道終不瞎個衆生眼萬里望鄉關長慶因僧問長期進道西天以蠟人為驗未審此間以何為驗慶曰鐵彈子曰意旨如何慶曰大的大小的小瑞巖慍云長慶與麼答話也是貪觀雲裏雁失却渡頭船我此一衆個個自謂握靈蛇之珠抱荊山之璞且山僧如此批判還有不甘者麼良久云擬心湊泊終難會達者應須暗裏驚長慶問秀才曰佛教有衆生日用而不知儒亦曰百姓日用而不知且道不知個甚麼才曰不知大道雲門偃云灼然不知寶壽新云長慶解放不解收雲門解收不解放饒你總不與麼只好與新上座挈草鞋長慶因僧問如何是合聖之言慶曰山僧被闍黎一問只得口似匾擔曰何故如此慶曰適來問什麼昭覺勤云是則是應機無差爭奈大驚小怪或有問道林如何是合聖之言只對他道志公不是間和尚剪刀只在臥牀頭資福侶云道林何用繁詞若有問如何是合聖之言向他道如是如是長慶因僧問如何是正法眼慶曰有願不撒沙保福曰不可更撒也雪竇顯云夫宗師決定以本分相見不敢撒沙且那個是諸人正眼不受人瞞底漢出來對衆道看共相知委若道不得翠峰與你一一點過開眼也著合眼也著古南門云長慶戒慎恐懼保福飲牛上流雪竇和泥合水雖皆為衆點眼古南不妨代一轉語更為點破諸人要不受人瞞直須不自瞞好長慶因僧問有問有答賓主歷然無問無答時如何慶曰怕爛却那睦州明因僧問有問有答賓主歷然無問無答時如何州云相逢盡道休官好林下何曾見一人昭覺勤云若有問崇寧有問有答賓主歷然無問無答時如何向道收得安南又憂塞北洞山瑩云二老漢只解較儉不較奢洞山則不然有人恁麼問但向道心不負人面無慚色漳州保福從展禪師青六雪峰存嗣因僧問雪峰平生有何言句得似羚羊挂角時福曰我不可作雪峰弟子不得雪竇顯云一千五百個布衲保福較些子昭覺勤云翡翠羽毛麒麟頭角重重光彩的的相承要明陷虎之機須施嶮崖之句雖然如是只知與麼來不知與麼去或問山僧五祖平生有何言句得似靈羊挂角時只對他道不敢孤負先師委悉麼山高豈礙白雲飛笑巖寶云保福要且只有千尺寒松我若作保福待問雪峰平生有何言句得似靈羊挂角時劈脊便打云我不可作雪峰弟子不得雪竇道一千五百個布衲保福較些子只見錐頭利不見鑿頭方靈巖儲云圓悟可謂言中有響句裏藏鋒檢點將來未免依他作解祥符則不然或問三峰生平有何言句得似靈羊挂角時對道珊瑚枕上兩行淚半是思君半恨君清化嶾云者話大似黑漆皮燈籠外暗內明爭奈無人見得若見得保福無藏身之地保福聞長生卓菴乃往相訪茶話次生問曾有僧問祖師西來意某甲舉拂子示之不知得不得福曰從展爭敢道得不得有個問有人讚歎此事如虎戴角有人輕毀此事分文不值一等是恁麼事因甚麼毀讚不同生曰適來出自偶爾一老宿云毀又爭得又一老宿云惜取眉毛好太原孚云若無智眼難辨得失雪竇顯別云若非和尚證明拂子一生無用報慈遂云一等是恁麼事為什麼有得有不得保福問長慶盤山道光境俱忘復是何物洞山道光境未忘復是何物據此二老商量尤未得勦絶作麼生道得勦絶慶良久福曰情知和尚向鬼窟裏作活計慶却問汝又作麼生福曰兩手扶犂水過膝雪竇顯云俱忘未忘總由我保福因什麼道未得勦絶灼然能有幾個諸人又作麼生道免得長慶在鬼窟裏良久云柳絮隨風自西自東大溈秀云保福拈提頗有宗風及乎問著又却拖泥帶水天童覺云俱忘未忘奪人奪境為什麼保福不肯長慶太平本是將軍致不許將軍見太平古南門云保福向懸崖走馬劒刃翻身固是好手雖然呈能露巧之時何似帝力不知之世具眼者辨法忍謐云盤山洞山固是廉纖保福長慶未見勦絶若在衲僧門下又當如何到頭霜夜月任運落前溪白巖符云保福與麼問將謂較他二老別有長處及被稜公一拶依舊聯聯纖纖今日或有問白巖作麼生道得勦絶轉身便歸方丈保福上堂此事如擊石火閃電光搆得搆不得未免喪身失命僧便問未審搆得底人還免喪身失命也無福曰適來且置闍黎還搆得麼曰若搆不得未免大衆怪笑福曰作家作家曰和尚是什麼心行福曰一杓屎攔面潑也不知臭雪竇顯云諸上座保福有生擒虎兕底爪牙者僧也不易相敵雖然如此要且放過保福一著祇如雪竇與大衆還許諸方檢責也無若免不得平地上死人無數其中有得活底麼乃拈起拄杖云來也來也護國元云能擒能縱能殺能活保福可謂作家者僧可惜許錯轉話頭待他道闍黎還搆得麼向道明眼宗師天然有在當時下得者語直饒保福全機更買草鞋行腳何故不見道得人一牛還人一馬古南門云保福與者僧敲擊且置且道搆得底是個什麼又那個是搆得底那個是搆不得底大衆還曾簡責也未古南不避口業為你分析一上搆不得底活得也無用搆得底死去又何妨忽有個出來道只今是死是活拈拄杖便趁保福因僧侍立次乃曰你得與麼粗心曰甚處是某甲粗心處福拈一塊土度與曰拋向門外著僧接土拋了却又問甚處是某甲粗心處福曰我見你觸著磕著所以道你粗心雪竇顯云然則者僧被熱瞞爭奈真不掩偽曲不藏直雪竇將今視古於理不甘你者一隊漢或僧堂裏來寮舍內出築著磕著亦乃不知近來粗心轉盛我若放過便見諸方檢責卓拄杖下座古南門云雪竇也似隨摟搜説甚築著磕著遂卓拄杖云直得百雜碎了也你輩粗心還知麼清化嶾云保福為憐三尺子不惜兩莖眉者僧若與麼會去也是韓獹逐塊寶掌白云保福有點鐵成金起死回生的手段爭奈者僧蒙袋到底粗心有甚可救處山僧慨古思今寧忍坐觀屈辱乃驀拈拄杖攛下云開也築著合也築著汝等更若粗心山僧與你保任此事終不虗也保福因僧問家貧遭劫時如何福曰不能盡底去曰為什麼不能盡底去福曰賊是家親曰既是家親為什麼翻成家賊福曰內既無應外不能為曰忽然捉敗功歸何處福曰賞亦不曾聞曰恁麼則勞而無功福曰功即不無成而不取曰既是成功為什麼不取福曰不見道太平本是將軍致不許將軍見太平徑山杲云絲來線去弄精魂天寧琦云家無白澤之圖必無如是妖怪保福在病問僧曰我與汝相識年深有何方術相救相救僧曰方術甚有聞説和尚不解忌口清涼欽別云和尚解忌口麼雪竇顯別云只恐難為和尚瑞巖慍云者僧也不易得怎奈保福心且未甘當時只好輕輕道和尚病得幾時看他出什麼語但云不堪發藥豈不籠古今越州鏡清道怤禪師青六雪峰存嗣僧問學人未達其源乞師方便清曰是什麼源曰其源清曰若是其源怎受方便僧禮拜退侍者問和尚適來莫是成褫伊麼清曰無曰莫是不成褫伊麼清曰無曰未審師意如何清曰一點水墨兩處成龍雪竇顯於爭受方便處云死水裏浸却有甚用處於兩處成龍處云猶較些子復云雪竇不是減鏡清威光要與者僧相見是什麼源其源三十年後與汝三十棒五祖戒云與麼道也太險雖然語險爭奈用得者一點親要會麼莫怪鏡清多意氣他家曾謁聖明君昭覺勤云鏡清具本分鉗錘有作家爐鞴正如明鏡當臺舉無遺照雖則赴感應機要且猶費葛藤若是山僧是什麼源其源劈脊便棒未審師意如何劈脊便棒非唯截斷衆流亦乃光揚宗眼南堂欲云鏡清一點水墨兩處成龍直得傾湫倒嶽雲黯長空雪竇要減他威光與者僧相見且欵欵地山僧見處也要諸人共知是什麼源其源劈脊便棒直下悟去裂破古今古南門云雪竇也則放過是什麼源其源待甚三十年劈脊便棒何故是真難掩是偽不昌靈巖儲云佛果奢而不儉鏡清儉而不奢固是二俱好手未免者僧不甘當時若問靈巖學人未達其源乞師方便對他道今日有齋不特使那僧虗來實往亦免者一隊漢飯後添羮廣教玉云學人未達其源乞師方便家住大梁城更覓長安路是什麼源金錘劈面其源蒼天中更添冤苦若是其源爭受方便雖然赤心片片可惜放過適來莫是成褫伊麼也須問過無純鋼打就莫是不成褫伊麼掉轉鎗頭無生鐵鑄成未審師意如何相逼來也一點水墨兩處成龍大衆試把火來照看鏡清面皮厚多少鏡清一日於僧堂前自擊鐘曰玄沙道底玄沙道底僧便問玄沙道什麼清乃畫一圓相僧曰若不久參怎知與麼清曰失錢遭罪雪竇顯云洎被打破蔡州城古南門云者僧雖善成褫鏡清若論蔡州城打破多時了也鏡清問僧近離甚處曰石橋清曰本分事作麼生曰近離石橋清曰我豈不知你近離石橋本分事作麼生曰和尚何不領話清便打僧曰某甲話在清曰你但喫棒我要者話行雪竇顯云然則倚勢欺人怎奈事不孤起者僧若能慎初護末棒須是鏡清自喫鏡清上堂良久有僧問祖歌如何唱清曰拖送醉人酒曰與麼則孤負和尚也清曰猛虎不食伏肉大覺升云鏡清雖縱奪可觀却乃添杯醉後大覺則不然今日有問祖歌如何唱向他道上大人與麼則孤負和尚也可知禮也且道與鏡清是同是別鏡清因僧問學人啐請師清曰還得活也無曰若不活遭人怪笑清曰也是草裏漢雪竇顯云衲僧有此奇特事若一個半個互相平展古聖也不虗出來一回證果成云鏡清者漢大似不打自招白巖符云鏡清門下有此一僧固不虗費油鹽漿水為什麼却道也是草裏漢莫是鏡清慣壓良為賤麼且喜沒交涉莫是明罰暗賞麼且喜沒交涉畢竟如何良久云敕律吉鏡清住菴時有行者來徐徐近繩牀取拂子提起問曰某甲定喚者個作拂子菴主喚作什麼清曰不可更安名立字也行者乃擲却拂子曰著甚死急明招謙代云敢死喘氣寶壽方云行者也不妨是個行家可惜菴主當時放過若不放過管取行者報恩有分鏡清問僧門外是什麼聲曰雨滴聲清曰衆生顛倒迷己逐物曰和尚作麼生清曰洎不迷己曰洎不迷己意旨如何清曰出身猶可易脫體道應難黃龍心云説難説易轉見迷己要不迷己如今喚作甚麼聲琅瑘覺云得即得大似平地陷人法雲秀云出身句諸人總知脫體句還有道得底麼良久云事難方見丈夫心光相得云者裏則不然門外是什麼聲雨滴聲便與合掌云真語者實語者如語者不誑語者不異語者或有道者僧一樣答話為什麼毀譽不同向道一點水墨兩處成龍勝法法云琅瑘雖解拗曲作直決定不知是甚麼聲理安洸云爐鞲不熱頑礦難鎔當時待伊道和尚作麼生劈脊便棒非惟勦絶者僧亦乃頭正尾正鏡清問僧趙州喫茶話你作麼生會僧便出去清曰邯鄲學唐步雪竇顯云者僧不是邯鄲人為什麼學唐步若辨得出與你茶喫南堂欲云鏡清親見者僧是邯鄲人雪竇因什麼道不是拈拄杖畫一畫云有口不得茶喫者多鏡清問靈雲行腳事大乞師指南靈曰浙中米作麼價清曰若不是道怤洎作米價會却大溈秀云靈雲只解放去不能收來若不是某甲洎作米價會却何不更問你作什麼會他若擬對便與熱棒打出白巖符云善射者不輕發發必中的勤老可謂善射矣然只有殺人箭且無活人箭若是山僧待道若不是某甲洎作米價會却便高聲喚侍者云教維那領向明窗下安排鏡清在雪峰普請次峰問溈山道見色便見心還有過也無清曰古人與麼道那峰曰雖然如此我要共你商量清曰若與麼不如某甲钁地去靈隱泉云雪峰探竿在手影草隨身若不是鏡清普請幾乎狼藉鏡清因僧問新年頭還有佛法也無清曰有曰如何是新年頭佛法清曰元正啓祚萬物咸新曰謝師答話清曰鏡清今日失利又僧問明教新年頭還有佛法也無教曰無曰年年是好年日日是好日為什麼却無教曰張公喫酒李公醉曰老老大大龍頭蛇尾教曰明教今日失利昭覺勤云道有也失利道無也失利且道誵訛在什麼處者裏明得不妨識進退別休咎始知一句下有分身之意有出身之路今日或有問崇寧新年頭還有佛法也無對他道不在者兩頭他或道為什麼如此向道崇寧今日失利且道與古人是同是別徑山杲云二尊宿一人向高高峰頂立不露頂一人向深深海底行不溼腳是則也是未免有些誵訛今日或有問杲上座新年頭還有佛法也無只向道今日一隊奴僕在茶堂裏村歌社舞弄些神鬼直得點胸尊者惡發把鉢盂峰一擲擲過恆河沙世界外驚得憍陳如怕怖慞惶倒騎露柱跳入擔板禪和鼻孔裏撞倒舒州天柱峰安樂山神忍俊不禁出來攔胸搊住曰尊者你既稱阿羅漢出三界二十五有塵勞超分段生死因什麼有許多無明被者一問不勝懡㦬却回佛殿裏第三位打坐依舊點胸點肋道天上天下唯我獨尊自云住住杲上座他問新年頭佛法為什麼一向虗空裏打筋斗説脫空謾人良久云杲上座今日失利天寧琦云有佛法無佛法盡被鏡清明教二大老當頭坐斷不許後人摶量妙喜以虗空口掉廣長舌將三千大千世界過現未來佛及衆生真如凡聖陰陽寒暑乘除加減束作一句卷舒無礙收放自由管什麼新年頭舊年尾佛法道有也得道無也得誰敢正眼覷著若到天寧門下更須勘過少年曾決龍蛇陳潦倒還同稚子歌道林慧云鏡清明教總是個撒蓬塵漢丈夫氣槩安肯踏他故轍今日有問辨山新年頭還有佛法也無向道沿村𪹼竹連天響萬里歌謠賀太平伊若眼目定動便與劈脊一棒何故好日彼此要發利市大覺升云一人道有一人道無二俱失利膽大心粗大覺有三十拄杖一時發付且道在鏡清分上明教分上二僧分上若檢點得出可與古人把手同行紫梅周云道有也失利道無也失利孟夏漸熱仲冬嚴寒是則是祇如有人問樂平新年頭還有佛法也無且道合作麼生良久云山僧今日失利鏡清因僧問新年頭還有佛法也無清曰有僧曰如何是新年頭佛法清曰孟春猶寒劍門永云劍門則不然今日若有人問如何是新年頭佛法向道孟春猶寒鼓山賢云鏡清劍門二語既是一般因甚麼有異善知時節同露春光則不無若是新年頭佛法俱未夢見在
