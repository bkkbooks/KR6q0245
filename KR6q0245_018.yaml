body:
  text: 古杭白巖嗣祖沙門淨符彚集南三終南山雲際師祖禪師南三南泉願嗣問南泉摩尼珠人不識如來藏裏親收得如何是藏泉曰與汝往來者是祖曰不往來者如何泉曰亦是藏祖曰如何是珠泉召師祖祖應諾泉曰去汝不會我語祖從此信入雪竇顯向往來者是處云草裏漢向不往來者亦是處云雪上加霜向如何是珠處別云險又云百尺竿頭作伎倆不是好手這裏著得箇眼主賓互換便能深入虎穴或不漝麼縱饒師祖悟去也是龍頭蛇尾白雲端云這僧一顆摩尼珠可謂希世之寶大可憐生幾乎落在萬丈深坑猶賴南泉老手親為托起且道此珠現今在什麼處乃云海神知貴不知價留與人間照光夜淨因成云南泉應機酬對縱奪可觀檢點將來終未能指出他珠在直饒道汝不會我語正是藏畢竟珠在甚麼處莫是海神知貴不知價麼此是近來新婦禪不勞拈出拍禪牀云珠之與藏被老僧一拍粉碎諸人更來這裏討什麼碗又拍一下照覺勤云南泉一期垂手收放擒縱則不無要且未見向上事在只如盡大地是如來藏向甚麼處著珠盡大地是摩尼珠喚什麼作藏若明得有轉身處許你具一隻眼南堂欲云南泉入草求人雪竇橫身虎穴則且置且道師祖悟去畢竟承誰恩力這裏著得箇眼便見頭正尾正古南門云南泉太煞繁詞待問如何是如來藏但云更莫別求如何是珠一槌粉碎了也不妨好手諸人還會麼理安洸云南泉用盡自己心笑破他人口山僧則不然有問如何是藏錦包特石如何是珠鐵褁泥團宣州刺史陸亘大夫南三南泉願嗣問南泉大悲菩薩用許多手眼作麼泉曰如國家用大夫作什麼雪竇顯別南泉云不及大夫所問保寧勇別云也未為分外大夫因南泉遷化來弔慰院主問大夫何不哭先師大夫曰院主道得亘即哭主無對長慶稜云且道合哭不合哭池州甘贄行者南三南泉願嗣入南泉設齊時黃檗為首座贄請施財檗曰財法二施等無差別贄曰恁麼道爭消得某甲䞋便舁錢出去須臾復入曰請施財檗曰財法二施等無差別贄乃行䞋翠巖真云甘贄行者黠兒落節黃檗施財何曾夢見雲居元云大小黃檗被甘贄換却一隻眼徑山杲云一等是隨邪逐惡雲居羅漢較些子靈隱嶽云總是掩耳偷鈴殊不知甘贄有收有放首座徹底惺惺雲收雨霽長空濶一對鴛鴦畫不成愚菴盂云翠巖大慧觀風知變裁抑有方只是但見錐頭利不見鑿頭方黃檗運籌帷幄決勝千里行者兩度衝鋒一擡一捺可謂用盡自己心笑破他人口唯南泉老漢却能坐觀成敗靈巖儲云翠巖雖則一手擡一手搦肘臂終不外曲首座固是熟處難忘未免執一不變行者可謂豫奪臨時太殺希功冀效爭似梁溪五居士設齊行䞋不矜不伐祇要諸人飽便休青龍斯云黃檗大似停囚長智行者亦似貧兒賣富雖然二俱作家檢點將來不無滲漏若是山僧作黃檗待行者請施財信手拈來劈面便擲行者雖通身是眼管教措手不及明招補徵云行者兩度請行施是好心不是好心黃檗答話兩轉一般行者為甚肯一不肯一甘贄開接待有問曰行者接待不易贄曰譬如餧驢餧馬琅瑘覺云快把飯來五祖演云願行者長似今日高峰妙云琅瑘和尚美則美矣只是做造愴忙不堪供養五祖和尚不鑑來風一鍋淡虀羮可惜著了許多鹽醋譬如餧驢餧馬只向他道殘羮餿飯不勞搬出大衆且道與古人是同是別定當得出日消萬兩黃金不然喫水也須防噎鎮州普化和尚南三盤山積嗣居常入市振鐸曰明頭來明頭打暗頭來暗頭打四方八面來旋風打虗空來連架打一日臨濟令僧捉住曰總不恁麼來時如何化拓開曰來日大悲院裏有齊僧回舉以濟濟曰我從來疑著這漢五祖演云若是五祖則不然有人問總不恁麼來時如何和聲便打是他須道五祖盲枷瞎棒我只要你恁麼道何故一任舉似諸方雲門信云普化和尚恁麼作怪被臨濟將鼻孔一揑酸去十分若無大悲院躲得過何處見有普化福嚴容云普化恁麼帶纍人上天無路入地無門且道端的在什麼處臨濟道我從來疑著者漢也未必是好心雪竇雲云普化與麼答話雖則超今邁古令人景仰不及檢較將來要且未能塞斷衲僧咽㗋去在今日有問山僧總不恁麼來時如何但向伊道谷谷孤谷谷孤普化因臨濟與河陽木塔二長老同在僧堂內坐相與議曰普化者漢每日在街市掣風掣顛如他是凡是聖正議時化忽從外入來濟便問汝是凡是聖化曰汝且道我是凡是聖濟便喝化以手指曰河陽新婦子木塔老婆禪臨濟小廝兒却具一隻眼濟曰者賊化曰賊賊便出去首山念云者兩個賊有個正賊且道那個是正賊復代云劉盆子普化同臨濟在一施主家齊濟問毛吞巨海芥納須彌為復是神通妙用為復是法爾如然化遽躍倒飯牀濟曰太粗生化曰者裏是甚麼所在說粗說細濟休去明日又同一施主家齊濟問今日供養何似昨日化又躍倒飯牀濟曰太粗生化曰瞎漢佛法說甚麼粗細濟乃吐舌雪竇顯云兩個老賊喫飯也不了好與三十棒棒雖行且那個正賊南堂靜云二尊宿如二龍爭珠拏雲攫霧不動波瀾如二虎爭餐活捉生擒不傷物命者裏或有問毛吞巨海芥納須彌為復是神通妙用為復是法爾如然只向道一拳拳倒黃鶴樓一踢踢翻鸚鵡洲有意氣時添意氣不風流處也風流南華昺云臨濟覿面提撕普化全機酬酢直得南山鱉鼻吞却東海鯉魚陝府鐵牛觸倒嘉州大象為甚如此相逢不下馬各自奔前程昭覺勤云精金不百鍊怎見光輝至寶不酬價怎辨真假不是臨濟不能他普化不是普化不能抗他臨濟所謂如水入水如金博金雖然如是放過則彼此作家檢點則二俱失利具擇法眼者試請辨看天童華云一出一沒一往一來猛虎口裏奪餐毒蛇頭上揩癢要且未稱大丈夫事二老名喧宇宙價重當時山僧豈可謹密三寸二俱放過為他弄假像真二俱不放過為他搕𢶍太甚是汝諸人若作佛法商量達磨一宗掃土而盡南堂欲云雪竇與麼道也好與二十棒且道過在甚麼處不見道正賊走却邏縱人喫棒磬山修云者二老宿一個具擒龍之手一個得陷虎之機可謂作家相見且道誰是陷虎誰是擒龍具擇法眼者試辨取看古南門云者兩個漢驀拶相逢拳來腳應不是冤家不聚頭敢問大衆臨濟一條棒尋常橫打豎打到者裏因甚却吐舌還見二老漢麼一聲羌笛離亭晚君向瀟湘我向秦棲霞成云臨濟兩度撩撥也只要勘破普化而普化是個擔板漢兩度被臨濟扭揑鼻孔全然不知雪竇與麼道勘破了也於今得一機者還識臨濟吐舌麼慧雲盛云普化掀天關臨濟轉地軸就其作為不妨峻峭正眼看來二俱瞎漢好各與三十拄杖忽有個漢道慧雲棒教誰喫打云龍蛇易辨衲子難瞞壽州良遂禪師南三麻谷徹嗣參麻谷谷見來便將鋤頭去鋤草良到鋤草處谷殊不顧便歸方丈閉却門良次日復去谷又閉却門良乃敲門谷問阿誰良擬稱名忽爾契悟遽曰和尚莫瞞良遂良遂若不來禮拜和尚洎乎被經論賺過一生谷便開門相見及歸講肆乃謂衆曰諸人知處良遂總知良遂知處諸人不知雲門偃云便有逆水之波又云作麼生是良遂知處東林顏云作麼生是良遂知處鸕語鶴靈隱嶽云為人為徹咬著生鐵逆水之波虗空釘橛金州操禪師南三章敬惲嗣請米和尚齊不排坐位米到展坐具禮拜州下禪牀米乃坐州位州却席地而坐齊訖米便去侍者曰和尚受一切人欽仰今日坐位被人奪却州曰三日後若來即受救在米三日後果來曰前日遭賊鏡清怤因僧問米和尚道前日遭賊意旨如何清云止見錐頭利不見鑿頭方愚菴盂云當時米和尚一到便席地而坐絶教金州上天無路入地無門直坐到樓至如來出世我那時再來與渠相見以手斫額云猫報恩賢云金州失位米胡遭賊稱鈎打釘剛是拽直可惜侍者缺伶俐若是個漢待米和尚道前日遭賊便好問和尚失却甚麼當時下得者語非但米師欽服直使金州退身有分五臺山祕魔巖和尚南三永泰湍嗣常持一木杈凡見僧來才禮拜即叉却頸曰那個魔魅教汝出家那個魔魅教汝行腳道得也叉下死道不得也叉下死速道速道霍山通聞往見之未禮拜便攛入懷中祕乃拊通背三下通拍手曰師兄三千里外賺我來三千里外賺我來保福展云當斷不斷返招其亂首山念云千聞不如一見法眼益於速道速道下代僧云乞命乞命法燈欽代僧但引頸示之報慈遂代僧云老兒家放下杈子得也五祖戒云山僧當時若見奪取杈來驀項叉倒點把火照看伊面皮厚多少明招謙云我當時見伊欲道未道之際先與一杈琅瑘覺云雷聲甚大雨點全無湖南上林戒靈禪師南三永泰湍嗣初參溈山溈問大德作什麼來林曰介胄全具溈曰盡卸了來與大德相見林曰卸了也溈咄曰賊尚未打卸作甚麼林無對仰山代曰請和尚屏却左右溈山以手指曰喏喏林後參永泰方諭其旨愚菴盂云且道上林悟溈山旨耶悟仰山旨耶若從溈山上悟來甲胄何在若從仰山上悟來試問仰山還曾屏却也未若總不恁麼從自己領得卸却個甚麼僧曰和尚何得以己方人盂以手指曰喏喏青三潭州道吾宗智禪師青三藥山儼嗣離藥山見南泉泉問闍黎名甚麼吾曰宗智泉曰智不到處作麼生宗吾曰切忌道著泉曰灼然道著即頭角生三日後吾與雲巖在後架把針南泉見乃問智頭陀前日道智不到處切忌道著道著即頭角生合作麼生行履吾便抽身入僧堂泉便歸方丈五磊權云前輩與麼說話大似病鳥棲蘆太殺無轉智者裏則不然智不到處正好道著雨灑巖花風生殿角診候臨時應病與藥看孔著楔解粘去縛天馬挨開大施門震動乾坤星斗落道吾因雲巖不安乃問離此殼漏子向甚麼處相見巖曰不生不滅處相見吾曰何不道非不生不滅處亦不求相見雪竇顯云侍者與我記取者一問昭覺勤別云何處不逢渠雲居莊云不生不滅與非不生不滅處總無相見分若問雲居脫却殼漏子向甚麼處相見只向他道什麼處不相見驀拈拄杖劃一劃下座白巖符云者兩個漢尋常出一言吐一語如鐵蒺黎誰敢咬嚼為甚到者裏却似個座主態莫有知他落處者麼設有切忌話作兩橛道吾指佛桑花問僧者個何似那個曰直得寒毛卓豎吾曰畢竟如何曰道吾門下底吾曰十里大王昭覺勤云以膠投漆影知形不諳正去偏來怎解明投暗合還委悉麼蝦蟇跳上梵天蚯蚓驀過東海徑山策云不開戶牗安知明月之光不泛仙槎安覩天河之勢道吾以楔拔楔者僧以智破智雖然驀路相逢未免三頭六臂還委悉麼愛他年少子翻作白頭翁道吾示衆高不在絶頂富不在福嚴樂不在天堂苦不在地獄徑山杲云高在絶頂富在福嚴樂在天堂苦在地獄南堂欲云一人高高處觀之不足一人低低處平之有餘唱教門中足可觀光衲僧門下猶缺悟在本覺又作麼生但將飯向無心碗自有人提折腳鐺能仁鑑云二大老各得一坐具地便乃分疆列界若是衲僧門下事終未得在祇如悲華者裏又且如何衲被蒙頭萬事休此時山僧都不會道吾因雲巖臨遷化遣書來辭吾覽書畢乃謂洞山密師伯曰雲巖不知有我悔當時不向伊道雖然如是要且不違藥山之子報慈遂徵云古人與麼道還知有也未雲巖當時不會什麼處是他不會處翠巖芝云道吾道雲巖不知有悔當時不向伊說只如與麼道道吾還知有也無潭州雲巖曇晟禪師青三藥山儼嗣因藥山問聞汝解弄獅子是否巖曰是山曰弄得幾出巖曰弄得六出山曰我亦弄得巖曰和尚弄得幾出山曰我只弄得一出巖曰一即六六即一巖後到溈山山問承聞長老在藥山弄獅子是否巖曰是溈曰長弄有置時巖曰要弄即弄要置即置溈曰置時獅子在什麼處巖曰置也置也法昌遇云好一場獅子只是有頭無尾我當時若見溈山道置時獅子在什麼處便與放出踞地金毛直教溈山藏身無路泐潭準云藥山雲巖鈍置殺人兩父子弄一個獅子也弄不出若是準上座只消自弄乃拈拄杖云大衆高著眼遂擲下云個中消息子能有幾人知棲霞成云雲巖自謂解弄六出及到大溈一出也弄不來當時若解哮吼一聲管教大溈倒退三千里洞山度云雲巖雖善藏鋒不合將金毛收入窟裏若是山僧待問置時獅子在什麼處便與劈面一掌管教大溈者漢𢌞避不及今日人天普集為諸人弄一出看乃驀拈拄杖喝一喝云哮吼一聲百獸懼從教香象也奔馳雲巖問僧汝爺在否曰在巖曰年多少曰年八十巖曰汝有個爺不年八十還知否曰莫是恁麼來者麼巖曰恁麼來者猶是兒孫洞山價云直是不恁麼來者亦是兒孫溈山果云恁麼也不得不恁麼也不得畢竟作麼生良久云從來無位次不用強安排百丈泐云要識爺則易識兒孫則難年來家計蕭條甚千里懸懸望信稀雲巖掃地次道吾曰太區區生巖曰須知有不區區者吾曰恁麼則有第二月也巖豎起掃帚柄曰者個是第幾月吾休去玄沙備云正是第二月長慶稜問玄沙被他倒轉掃帚柄驀面摵又作麼生沙休去羅山間云噫兩個漢不識好惡雲巖個漢縛手縛腳死來多少時也雲門偃云奴見婢殷勤溈山哲云將勤補拙保福展云雲巖大似泥裏推車步步區區雪竇顯於恁麼則有第二月也處別云洎合放過溈山行云道吾平地生堆雲巖因行掉臂玄沙道正是第二月面皮厚多少且道雲巖豎起掃帚意作麼生十成好個金剛鑽攤向門前賣與誰天寧琦云雲巖豎帚道吾休去總是第二月那個是不區區者此夜一輪滿清光何處無報恩秀云者一隊漢盡謂雲巖不能用掃帚摵打斷葛藤殊不知爛泥中有刺博山來云糞草堆頭辨實掃帚柄裏橫身管他第二月第幾月用得著便用玄沙雲門語裏有刺是賞伊罰伊莫嫌霜露冷添得好清香磬山修云我若作道吾待道者是第幾月但云恰是管教他掃帚無地放在鼓山賢云玄沙長慶者一輩漢衆口鑠金非是不知雲巖意總只要渠據令而行雪峰門下不道不是藥山門下猶隔十萬里在雲巖因道吾問大悲千手眼那個是正眼巖曰如人夜間背手摸枕子吾曰我會也巖曰作麼生會吾曰遍身是手眼巖曰道即太殺道只道得八成吾曰師兄又作麼生巖曰通身是手眼白巖符云二大老雖則眉毛倣佛鼻孔依稀要且不失其為大悲正眼若是寶壽又且不然今日有問大悲千手眼阿那個是正眼向道瞎他若道我會也山僧要問他雲門亭裏為什麼不見唐公嶺外事擬議不來痛與一頓趂出為什麼不見道通身是手眼雲巖因院主遊石室回巖問汝去入到石室裏為什麼便回主無對洞山代曰彼中已有人占了也巖曰汝更去作什麼山曰不可人情斷絶去也天童覺云低頭失却針開眼拾得線線無頭而莫度針無穴以難穿到者裏鸞膠續絃須是洞山始得雲巖示衆有箇人家兒子問著無有道不得底洞山出問曰他屋裏有多少典籍巖曰一字也無山曰怎得與麼多知巖曰日夜不曾眠山曰問一段事得麼巖曰道得却不道天寧琦云道得却不道作麼生會常恨春歸無覓處不知轉入此中來雲巖問僧作什麼來曰石上語話來巖曰石還點頭也無僧無對巖自代云未語話時却點頭洞山瑩代僧云多幸和尚證明證果興代僧云要他點頭堪作甚麼復云當時者僧下得者一語管取雲巖老漢退休有分秀州華亭船子德誠禪師青三藥山儼嗣夾山來參子問大德住什麼寺山曰寺即不住住即不似子曰不似似個什麼山曰不是目前法子曰甚處學得來山曰非耳目之所到子曰一句合頭語萬劫繫驢橛子又曰埀絲千尺意在深潭離鈎三寸子何不道山擬開口被子一撓打落水中山才上船子曰道道山擬開口子又打山豁然大悟乃點頭三下子曰竿頭絲線從君弄不犯清波意自殊山遂問拋綸擲釣師意如何子曰絲懸緑水浮定有無之意山曰語帶玄而無路舌頭談而不談子曰釣盡江波金鱗始遇山乃掩耳子曰如是如是遂囑曰汝向去直須藏身處沒踪跡沒踪跡處莫藏身吾二十年在藥山只明斯事汝今既得他後莫住城隍聚落但向深山裏钁頭邊覓取一個半個接續無令斷絶山乃辭行頻頻回顧子遂喚闍黎山回首子豎起橈子曰汝將謂別有那乃覆却船入水而逝長蘆了云棹頭撥轉河漢星輝船子踏翻天地黯黑豎起拂子云者個是钁頭邊乾白露淨底還知沒踪跡處隱身不得底麼白巖符云如今答合頭語者甚多安得盡如夾山棄衆之見船子又安得如船子鉗錘之接夾山者兩個漢直是千古一遇然船子云吾二十年在藥山只明斯事且道是甚麼事一僧出衆舉起坐具云莫是者個事麼巖驀拈拄杖曰無將鶴唳誤作鶯啼直打出法堂船子有偈曰三十年來海上遊水清魚現不吞鈎釣竿斫盡重栽竹不計工程得便休百丈雪云大小船子雖是落草求人太嘮嚷生辨山即不然數十年來山上遊草深林密獸羣稠等閒撒下漫天網也有金毛也有猴且道猴子堪作何用尋常翻個筋斗子惹得傍觀笑不休復顧左右云莫有金毛獅子麼出來抖擻牙爪看宣州樹慧省禪師青三藥山儼嗣道吾來相看值樹臥次吾乃近前牽被覆之樹問作麼吾曰蓋覆樹曰臥的是坐的是吾曰不在者兩頭樹曰怎奈蓋覆何吾便喝昭覺勤云樹臥起道吾蓋覆一喝當頭掀翻露布溈山智云相逢不相避個裏聊遊戲喝一喝云翻天覆地寶壽方云者兩個漢一挨一拶未肯放過不失其為主賓敲磕也乃臨末稍頭道吾一喝樹為什麼便竟爾休去者裏覷見一班許你與樹相見鄂州柏巖明哲禪師青三藥山儼嗣洞山與密師伯到訪柏問二上座甚麼處來山曰湖南柏曰觀察使姓什麼曰不得姓柏曰名甚麼曰不得名柏曰還治事也無曰自有廊幕在柏曰還出入也無曰不出入柏曰豈不出入山拂袖便出明日柏入堂召二上座曰昨日老僧對闍黎一轉語不相契一夜不安今請上座別下一轉語若愜老僧意便開粥相伴過夏山曰却請和尚問柏曰不出入事如何洞山曰太尊貴生柏乃開粥同共過夏昭覺勤云正偏回互只要圓融直截當機惟崇尊貴洞山觀機而作柏巖理長則就雖然如是在蔣山者裏須別作個眼目始得當時待伊道不委名便好一拶道他不委你你不委他敢問者裏合道得什麼語還有人道得麼若有道得山僧也不開粥只分付個龜毛拂子若道不得更參三十年天童傑云明投暗合八面玲瓏不犯當頭轉身有路曹洞門下足可觀光若是臨濟兒孫棒折也未放在當時見道不委姓劈脊便與一拳者裏挨得身轉非但開粥相延亦且明窗下安排有麼有麼喝一喝云漆桶參堂去天童覺云主張門戶自有傍來拱默威嚴誰敢正視借功施設轉位提持左右分權不犯尊貴一路還知尊貴處麼寶殿無人空侍立不種梧桐免鳳來天寧琦云要會尊貴一路麼報恩不開兩片皮你諸人向甚處摸索寶壽新云若是新上座待伊道太尊貴生便好驀面唾還有傍不忿底麼出來與洞山作主看澧州高沙彌青三藥山儼嗣一日齊時見藥山自打鼓高乃捧鉢作舞入堂山便擲下椎曰是第幾和高曰是第二和山曰如何是第一和高就桶舀一杓飯便出廣胤標云二老漢如此唱和將謂旁若無人木菴當時若在和飯桶一齊踢翻看他作何去就高沙彌結菴藥山之陽一日來禮拜值雨藥山問你來也高曰是山曰可煞濕高曰不打者破鼓笛雲巖曰皮也無打甚麼鼓道吾曰鼓也無打甚麼皮山曰今日大好一場曲調青龍斯云者夥懵懂漢只會賣鹽不顧看稱當時山僧若在只向道大好不打者破鼓笛更說甚麼好曲調管教者棚傀儡一時收場不及寶慶法云藥山父父子子將者一片地胡鑽亂鑿忽有性躁漢出來與他一槌便見氷消瓦解雲溪挺云雲巖道吾雖善鼓沒絃琴唱無腔曲要且鼻孔總在沙彌手裏高沙彌初參藥山山問甚麼處來高曰南嶽來山曰何處去高曰江陵受戒去山曰受戒圖個什麼高曰圖免生死山曰有一人不受戒亦無生死可免汝還知否高曰恁麼則佛戒何用山曰者沙彌猶掛脣齒在高乃禮拜而退更不登戒雲居顯云高沙彌向一言點撥處直下知歸如鵝王擇乳金翅摩天甚生意氣雖然若一向恁麼喪我兒孫雲居者裏不解弄死蛇頭只是應病與藥今日用十支法黑漆衣鉢向人天衆前兩手分付何故曹溪波浪如相似無限平人被陸沉龍淵法云者漢被藥山換却眼睛要識那一人還未在樟山量云污他清白門風教壞人家兒女藥山老漢固已不能逃其責若夫高公不圖國靖祇貴在封侯是又豈非有君心於社稷者哉賢峰竟云善垂香餌設錦穽可稱漁獵能豎赤幟拔連城還他勇敢藥山父子其謂歟是即是祇如道有一人不受戒亦無生死可免且道是什麼人友可玄云者裏則不然待道有一人不受戒亦無生死可免便好驀面唾當時高上座若下得者般手腳不惟見自己氣槩天然亦使藥山老漢截舌有分
