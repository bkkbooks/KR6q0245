body:
  text: 古杭白巖嗣祖沙門淨符彚集南四杭州徑山洪諲禪師南四溈山祐嗣因僧問奄息如灰時如何諲曰猶是時人功幹曰幹後如何諲曰耕人田不種曰畢竟如何諲曰禾熟不登場天童華云鳳閣香沉雪巢夜冷半窓明月和氣靄然正與麼時且道歸宗與徑山還有相見分也無見與不見且止只如這僧與麼還具眼麼苟或未然雲藏無縫襖鳥宿未萌枝保寧茂云打鼓弄琵琶相逢兩會家九年人不識幾度過流沙滁州定山神英禪師南四溈山祐嗣因樹省行脚時參問不落數量請師道山提起數珠曰是落不落曰圓珠三竅時人知有請師圓前話山便打樹拂袖便出山曰三十年後搥胸大哭去在樹住後示眾曰老僧三十年前被定山熱瞞一上不同小小雪竇顯云定山用即用爭奈險樹知即知要且未具擇法眼試請辨看古南門云眾中商量道樹被定山瞞殊不知定山被樹引得牽筋動骨諸人還辨得麼如辨不得莫待三十年只今也須搥胸大哭一上且道古南又具什麼眼襄州延慶法端禪師南四溈山祐嗣因僧問蚯蚓斬為兩段兩頭俱動佛性在阿那一頭慶展兩手洞山价別云即今問底在阿那一頭笑巖寶別云但呼闍黎僧若應諾却問云端的在阿那一頭慧雲盛別慶和聲便打云在這一頭京兆米和尚南四溈山祐嗣問僧近離甚處曰藥山米曰藥山老子近日如何曰大似一片頑石米曰得漝麼鄭重曰也無你提掇處米曰非但藥山米胡亦漝麼僧近前顧視而立米曰看看頑石動也僧便出雪竇顯云米胡也縱奪可觀爭奈死而不弔溈山云米胡好片頑石多少遊人不識及乎衲僧一見不免將南作北昭覺勤云雪竇細處細如米末冷處冷似氷霜要且只見錐頭利若據蔣山見處只這米胡趂得老鼠打破油甕天童華云這僧豈不是具眼底尀耐將藥山一片頑石到處賣弄苟非米胡深辨端倪幾遭惑亂寶掌白云者僧一問一酬有賓有主豈不是曾見藥山來可惜米胡錯過一著若是白上座待他轉身出時劈脊便棒何故我要使者頑石生光白巖符云者僧進退可觀米師延納有禮主賓相見不玷旁觀只是總未免被塊頑石累却諸禪德還有能為他拈却者麼本分宗師試出手看米胡令僧去問仰山今時人還假悟否山曰悟即不無怎奈落在第二頭米深肯之投子青云仰山與麼道還免得自己不落麼若免得更有一人大不肯在若免不得亦落第二頭米胡雖然肯他自己還有出身之路也無諸人試檢點看若撿點得出二人瓦解氷消不然且莫造次泐潭清云門庭施設米胡深肯仰山入理深談第一頭猶未悟在天童華云米胡提本分鉗錘仰山展劒刃上事二老於唱教門中足可稱尊若是衲僧門下總是喫棒底漢伏龍長云如鏡鑑像像不來時鏡將何鑑如氷融水水歸源後氷復何融只如仰山米胡與麼道還有為人處也無若把半斤稱八兩依然錯認定盤星喝一喝米胡因僧問自古上賢還達真理也無米曰達曰祇如真理作麼生達米曰當時霍光賣假銀城與單于契書是什麼人做曰某甲直得杜口無言米曰平地教人作保昭覺勤云米胡是大善知識徑山杲舉至契書是什麼人做處云徑山當時若作者僧下一轉語塞却者老漢口且道下甚麼語良久云若教容易得便作等閒看笑巖寶云米胡佛果俱大善知識要且不能盡善何故割雞焉用牛刀福州九峰慧慈禪師南四溈山祐嗣因溈山上堂汝等諸人只得大機不得大用慈便抽身出去溈召慈慈更不回顧溈曰此子堪為法器保福展云依稀似曲失前忘後暠山季徵云九峰抽身出去是大用不是大用溈山道此子堪為法器是賞伊是罰伊晉州霍山和尚南四溈山祐嗣因仰山會下一僧至自稱集雲峰下四藤條天下大禪佛參霍乃喚維那打鐘著僧乃驟步而去雪竇顯云者漢雖見機而變怎奈有頭無尾昭覺勤云者漢擔却仰山冬瓜印子向人前賣弄若不是霍山幾被塗糊雖然如是可惜令行一半當時不用喚維那好與擒住更打四藤條且聽者漢疑三十年證果興云者兩個漢都來雷聲浩大雨點全無元康和尚南四溈山祐嗣因訪石樓樓纔見便收足坐康曰得與麼威儀周足樓曰汝適來見個什麼康曰無端被人領過樓曰須是與麼始為真見康曰苦哉賺殺幾人來樓便起身康曰見即見矣動則不動樓曰盡力道不出定也康拊掌三下南泉願云天下人斷者兩個漢是非不得若斷得與他同參蘄州三角山法遇菴主南四溈山祐嗣因荒亂魁師入山執刃而問曰和尚有甚財寶角曰僧家之寶非君所宜魁曰是何寶角震聲一喝魁不悟以刃加之龍唐柱云渠魁大似瞎眼波斯焉能辨得真寶三角不善深藏未逢別者轍爾開拳所以二俱有咎一場懡㦬當時待道是何寶好與云折脚鐺品字竈無底鉢盂斷鼻草鞋汝若用得著一任將去使渠知我衲僧風味放下夜叉心突起菩薩面也未可知白巖符云一個按劒夜光一個袖手嫂溺二俱有過黃口雌禪誰不恁麼道殊不知投桃報李各盡其私之二人者直是脫體風流千秋未已豈汎汎輩可得而知哉襄州常侍王敬初居士南四溈山佑嗣視事次米胡至公乃舉筆示之米曰還判得虗空麼公擲下筆入後堂更不相見米致疑明日憑鼓山供養主入探其意米亦隨入潛屏蔽間偵伺主就席乃問昨日米和尚未審有甚言句便不相見公曰獅子咬人韓獹逐塊米遽出朗笑曰我會也公曰會即不無試道看米曰請常侍舉公乃豎起一隻箸米曰者野狐精公曰者漢徹也溈山云常侍雖是個俗漢筆下有生殺之權米師是一方知識要且出他綣繢不得當時待他擲下筆但向道我從來疑著者漢灜山誾云王常侍可謂鐵眼銅睛不但令米胡致疑亦可疑殺天下人雖然當時也草草放過待道者野狐精復抽身便入何故要教伊疑個徹底寶壽方云且道當時常侍舉筆處合作個什麼苟當免得遭他檢點敬初與臨濟到僧堂乃問者一堂師僧還看經也無濟曰不看經曰還習禪也無濟曰不習禪曰禪又不習經又不看究竟教他做什麼濟曰總教伊成佛作祖去初曰金屑雖貴落眼成翳濟曰我將謂你是個俗漢靈隱嶽云一著高一著一步濶一步明眼人前猶涉露布鳳棲不在梧桐樹徑山杲云臨濟氣宇如王握金剛王寶劒橫行海內等閒遇著者官人瓦解氷消天寧琦云臨濟吹毛劒甚處去也若也拈出有什麼王常侍自出洞來無敵手得饒人處且饒人普明領云盡謂臨濟大師到者裏失却一隻眼殊不知者兩個漢狹路相逢兩彩一賽南㵎問云二大老相見明如杲日寬若太虗所謂本色作家一挨一拶全彰本地風光若不是恁麼人怎識得恁麼話者裏還有識得者一堂師僧者麼水不洗水金不博金橫身當宇宙誰是個般人棲霞成云妙喜佩肘後符懸當臺鏡檢點將來祇具一隻眼殊不知者官人被臨濟一推至今起不得白巖符云問既不良答亦非善從尋常語裏密布鎗旗二老用心亦至矣然要風行六合雲卷長空又須是別轉一途始見衲僧眼目古塘云臨濟老人等閒被官人一拶便見腦門著地且道官人具什麼眼揚州光孝慧覺禪師南四趙州諗嗣到崇壽法眼眼問近離甚處覺曰趙州眼曰承聞趙州有栢樹子話是否覺曰無眼曰往來皆謂僧問如何是祖師西來意州曰庭前栢樹子上座何得道無覺曰先師實無此語和尚莫謗先師好徑山杲云若道有此語錯過覺鐵嘴若道無此語又錯過法眼若兩邊俱不涉又錯過趙州直饒總不恁麼別有透脫一路入地獄如箭射鼓山珪云覺鐵嘴名不虗得只是不曾夢見趙州天寧琦云祖師西來意庭前栢樹子此話已徧天下了也因甚覺鐵嘴却道先師無此語眾中往往商量道趙州只是一期方便不可作實解所以道無與麼亂統謗他古佛不少妙喜云若道有此語蹉過覺鐵嘴若道無此語蹉過法眼若道兩邊俱不涉又蹉過趙州今日烟波無可釣不須新月更為鈎笑巖寶云法眼當時失却一隻眼覺公與麼道亦扶趙州不起愚菴盂云衲子競頭紛紜栢樹子話則所尚者豈非話柄縱你識得趙州意還須知有覺鐵嘴者一門檻在乃卓拄杖一下云今日要與光孝相見者試道看一僧纔出菴便打僧掀翻香案菴直打趁出院洪州新興嚴陽尊者南四趙州諗嗣參趙州問一物不將來時如何州曰放下著陽曰既是一物不將來放下個甚麼州曰放不下擔取去陽於言下大悟勝果𠁼於嚴陽初問下著語云抱贓呌屈於進語下著語云苦哉苦哉香云趙州就罏打鐵費炭不多嚴陽惹禍上身抖擻不下雖然悟去也是庭前生瑞草好事不如無石梯和尚南四茱萸嗣一日見侍者托鉢赴堂乃問什麼處去曰赴堂齋去梯曰我豈不知汝上堂齋去曰除此外別道個什麼梯曰我只問汝本分事曰若論本分事某甲實是赴堂齋去梯曰汝不謬為吾侍者天童覺云放過即不可如今直與扭得鼻孔痛打得骨頭出始得免見瞎驢趂大隊所以道平地上死人無數透得荊棘林是好手且道適來者僧透得也未多虗不如少實清化嶾云入此門來直須田地穩密堪受鉗錘百煉千敲終始不變所謂要識真金火裏看也石梯肯他也是羅公照鏡當時何不與他三十棒使渠縱遇百味珍饈也須吐却始得慧雲盛云太公釣鯉魚負命上鈎絲脚跟點地還他侍者鼻孔撩天且待別時日容遠禪師南四子湖蹤嗣因奯上座參日拊掌三下曰猛虎當軒誰是敵者奯曰俊鷂冲天阿誰捉得日曰彼此難當奯曰且休未要斷者公案日將拄杖舞歸方丈奯無語日曰死却者漢也昭覺勤云力敵勢均不妨好頭對眼親手辨彼此沒便宜下梢可惜放過待他將拄杖舞歸方丈却好與拊掌三下拂袖便行非唯頭尾完全亦免遭人指註大溈智云強中更有強中手天下元無第一人還知麼伎倆全無波旬失途到者裏無你解會處自檢點看筠州末山尼了然禪師南四高安愚嗣因灌溪到問如何是末山山曰不露頂如何是末山主山曰非男女相溪乃喝曰何不變去山曰不是神不是鬼變個甚麼溪於是伏膺作園頭三載天童覺云非男女之相出有無之量透萬機之前超三界之上窮而通簡而當松含風而夜寒溪帶雨而春漲靈隱禮云末山弄假像真尋常得此便灌溪酬本及末一飽忘百饑乃至漚麻句下倒轉成褫劈箭鋒前誰當齧鏃要識末山落處麼大鵬欲展摩霄翅誰顧崩騰六合雲襄州關南道吾禪師南四關南常嗣因趙州訪南乃著豹皮裩執吉獠棒在三門下翹一足等候纔見州便高聲唱喏而立州曰小心祇候著南又唱喏一聲而去鳳山啟云大小關南無端向人納敗闕雖然還知趙州出不得他圈繢麼梁山泊裏稱豪傑看來都是不良人婺州金華俱胝禪師南四天龍嗣初住菴時有實際尼來戴笠執錫遶菴三匝曰道得即下笠子如是三問胝皆無對尼便去胝曰日色稍晚請且住去尼曰道得即住胝又無對尼既去胝感悔欲棄菴徧參其夜山神告曰禪師不須離此將有肉身菩薩來為說法旬餘果天龍至菴𦙆迎禮具陳前事龍豎一指示之胝當下大悟自是凡有學者參問胝唯豎一指及將順世謂眾曰吾得天龍一指頭禪一生用不盡玄沙備云我當時若見抝折指頭報慈遂徵云且道玄沙恁麼道意作麼生曹山章云俱胝承當處鹵莾只認得一機一境一等是拍手拊掌是他西園奇怪報慈遂徵云且道俱胝還悟也未若悟為甚麼曹山道承當處鹵莾若不悟俱胝又道用一指頭禪不盡且道曹山意作麼生雲居錫徵云只如玄沙與麼道是肯伊是不肯伊若肯伊何言抝折指頭若不肯伊俱胝過在什麼處徑山杲舉瑯瑘頌俱胝一指報君知朝生子撲天飛若無舉鼎山力千里烏騅不易騎乃云俱胝和尚不得瑯瑘為伊出氣幾乎埋沒妙喜既恁麼舉不免隨後也有個註脚俱胝一指頭喫飯飽方休腰纏十萬貫騎鶴上揚州天童忞云瑯瑘妙喜只顧盤中喝彩不解馬上奪標諸人要知者一指頭落處分明麼更聽山翁念個真言補闕一指頭禪誰不有靈樞妙轉在天龍巨靈擡手無多子分破華山千萬重青四潭州石霜慶諸禪師青四道吾智嗣因僧在牕外問咫尺之間為什麼不覩師顏霜曰徧界不曾藏僧舉問雪峯徧界不曾藏意旨如何峰曰什麼處不是石霜僧回舉似霜霜曰者老漢著甚死急峰聞曰老僧罪過洞山价云笑殺土地玄沙備云山頭老漢錯過石霜瑯瑘覺云雪峰雖有利人之心且無出人之眼石霜雖有出人之眼且未知有向上一竅太陽玄云今時人要明此事大須子細只如石霜恁麼道落在甚麼處若不子細非但累及石霜和他雪峰累及淨因成云諸人要識石霜雪峰麼天共白雲曉水和明月流天童覺云雪峰石霜相去多少直是千里萬里若有問長蘆徧界不曾藏意旨如何向道什麼處是石霜報恩秀云者僧愈尋愈遠轉問轉疑雪峰不惜性命橫身相為猶較天童十萬八千還會麼拈却肯路根塵空脫體無依活卓卓清化嶾云且道者僧還見石霜不見石霜若見是何面貌若不見怎奈徧界不曾藏石霜尊云二大老一人舌拄梵天一人華鋪錦上且道那個是華鋪錦上那個是舌拄梵天若檢點得出如久客還故鄉檢點不出且居門外鳳山啟云石霜藏身露影雪峰為蛇畵足二老宿雖則同行却不同步天童道什麼處是石霜潮平兩岸濶風正一帆懸白巖符云者兩個漢與麼答話大似依科判斷據義消文祖師門下笑破口唇皮當時問咫尺之間為甚麼不覩師顏何不向道許子親見石霜石霜因裴相國參乃拈裴手中笏問在天子手中為珪在官人手中為笏在老僧手中且道喚作什麼裴無對霜乃留下笏雪竇顯云弄巧成拙保寧勇代相國云只恐和尚使不著百丈泐云為石霜助惡則扶強抑弱為裴公本則重俗輕僧不如一齊趂出免見以平報不平恁麼得人憎清化嶾云我若作相國只消道個太俗生且看石霜老漢還留得下麼雲溪挺代相國云不惜為他安名只恐負累和尚石霜因雲葢元問萬戶俱閉即不問萬戶俱開時如何霜曰堂中事作麼生葢無語經半年乃對曰無人接得渠霜曰道即太殺道只道得八成葢曰和尚又作麼生霜曰無人識得渠翠巖芝云先行不到末後太過天童覺云穩密田地忌墮功勳貼肉衣裳會須脫却宗中辨的量外轉機須仔細始得同中之異灼然尚帶依希異中之同直是難臻妙極還知石霜父子轉側處麼燭曉玉人初破夢夜寒青女未登機天寧琦云或有問永祚萬戶俱開時如何向他道且喜到來你道與古人是同是別靈巖儲云者兩個漢無端於白晝裏擘開鬼眼栽荊棘全不顧旁觀者哂靈巖則不然設有問堂中事作麼生但向道祇有憍陳如較些子白巖符云脫體無依要見寸絲不掛尊嚴不犯會須及盡今時在者裏毫忽之差則律呂有所不應矣還知石霜父子穩密處麼方外那許論量石霜因僧問真身還出世也無霜曰不出世曰怎奈真身何霜曰琉璃瓶子口天童覺云通身及盡徹底無功撒手興來隨處得用還識石霜老漢麼當堂無影迹遍界不曾藏寶壽新云好個琉璃瓶然雖有口要且無底還用得麼差之毫釐失之千里石霜因僧辭霜問船去陸去曰遇船即船遇陸即陸霜曰我道半途稍難僧無對雲門偃代云三十年後此話大行又云臨行一句永劫不忘石霜因僧問三千里外遠聞石霜有個不顧是否霜曰是曰祇如萬象歷然是顧不顧霜曰我道不驚眾曰不驚眾是與萬象合如何是不顧霜曰徧界不曾藏雪竇顯云誰是不顧者石霜因僧問如何是祖師西來意霜乃咬齒示之僧不契九峰䖍因僧問先師咬齒意旨如何虔云寧可截舌不犯國諱雲葢元亦因僧問先師咬齒意旨如何元曰我與先師有甚冤讐薦福璨云諸人要知二老用處麼子為父隱直在其中矣石霜示眾初機未覯大事先須識取頭其尾自至踈山仁便問如何是頭霜曰直須知有如何是尾霜曰盡却今時有頭無尾時如何霜曰吐得黃金堪作什麼有尾無頭時如何霜曰猶有依倚在直得頭尾相稱時如何霜曰渠不作個解會亦未許渠在福善品云既是頭尾相稱為甚麼亦不許渠在幾多人到者裏一似遇著鐵壁
